# Garura Configuration

project:
  name: Garura
  type: Agentic Framework

platform: github

github:
  repo: https://github.com/kapilvirenahuja/garura.git
  owner: kapilvirenahuja   # GitHub account handle (from repo URL), not the display name
  name: garura             # repo name (lowercase, as in the URL)

# Schema documentation: uncomment and populate to switch to GitLab.
# GitLab owner is a group path (may be nested, e.g. dx_innovations/phoenix).
# The adapter URL-encodes the full path when building API calls (slashes → %2F).
#gitlab:
#  host: gitlab.com            # or your self-hosted GitLab hostname
#  owner: your-group/subgroup  # group path (nested groups allowed)
#  name: your-project          # project name (as in the URL)

# Source of truth locations
components:
  skills: ./core/components/skills/
  plays: ./core/components/plays/
  agents: ./core/components/agents/
  memory: ./core/components/memory/

# Claude Code derived locations (populated by /sud:install)
claude:
  skills: ./.claude/skills/
  agents: ./.claude/agents/

# Global Claude Code locations (for /sud:install global mode)
global-claude:
  skills: ~/.claude/skills/
  agents: ~/.claude/agents/

# Factory Droid derived locations (populated by /sud:install factory adapter)
factory:
  skills: ./.factory/skills/
  droids: ./.factory/droids/

# Global Factory Droid locations (for /sud:install factory adapter, global mode)
global-factory:
  skills: ~/.factory/skills/
  droids: ~/.factory/droids/

# Long-Term Memory (LTM)
ltm:
  source: ./core/components/memory/
  project-target: ./.garura/core/memory/
  global-target: ~/.garura/core/memory/

# Short-Term Memory (STM) — Issue-centric artifacts (ADR 008, ADR 010, ADR 017)
# Variables: {stm_base} = base-path, {stm_pending} = pending-path, {stm_archive} = archive-path
# All agents, plays, and skills resolve these from config — never hardcode paths.
# Per ADR 017, only 5 structure keys are permitted: specs, evidence, checkpoint, context, review.
stm:
  base-path: .garura/project/issues/
  pending-path: .garura/project/issues/_pending/
  archive-path: .garura/project/issues/_archive/
  structure:
    specs: "{issue-number}/specs/"
    evidence: "{issue-number}/evidence/{play-name}/{YYYYMMDD-HHMMSS}.md"
    checkpoint: "{issue-number}/checkpoint/{play-name}/{YYYYMMDD-HHMMSS}.md"
    context: "{issue-number}/context/"
    review: "{issue-number}/review/"

# Product model (ProductOS) — the persistent product structure, ICE, profile, and
# decisions. The product-os tree lives at {product.base-path}product-os/; the
# product profile at {product.base-path}product-os/profile.yaml.
product:
  base-path: .garura/product/

# Standards resolution — first play-specific section; pattern for future plays
standards:
  pr-severity-taxonomy: ./core/components/memory/standards/rules/pr.md

# start-change play configuration
start-change:
  worktree: false   # set up a git worktree on start only when true (C3)

# implement play configuration
# plan-tracking — publish the epic's build plan to its tracked issue and keep
#   piece states current there as the build moves (C12). The plan survives a
#   lost session. Default true when absent or unreadable.
implement:
  plan-tracking: true

# review-pr play configuration
review-pr:
  bypass: true
  confidence_threshold: 0.5
  reviewer_count: 3
  standards_order: [kb, ltm, stm]
  fallback_reviewers: []
  activity_window_days: 90

# craft-ice play configuration
# hitl — human-in-the-loop for the ICE-spec approval checkpoint (C6).
#   true  → a human approves the generated spec at the checkpoint before any
#           downstream play is selected.
#   false → the checkpoint is skipped and the spec is auto-approved per policy.
# Default true (fail safe toward human approval) when absent or unreadable.
craft-ice:
  hitl: true

# Evidence recording — when false, STM evidence writes are skipped across ship and all sub-plays
evidence:
  record: false

# Grounding eval — the content-quality judge over product-model grounding docs
# (domain/capability/functionality/epic). The linter (lint_grounding.py) checks shape;
# this judge checks whether each section is actually understandable, scored against
# standards/schemas/product-os/grounding/_content-standard.md. Spec + rubric + judge
# prompt + verdict shape live at standards/rules/grounding-eval.md.
grounding-eval:
  # The content-quality judge ALWAYS runs as an isolated, clean-context sub-agent — it
  # sees only the doc + rubric + per-section guidance, never the brief or the author's
  # reasoning, so it cannot reward-hack. Optionally pin a different model for stronger
  # isolation; omit (inherit) to use the session model.
  judge:
    model: inherit          # inherit | a claude model id (e.g. claude-haiku-4-5-20251001)
  gate: all-pass            # every judged criterion must be pass|na to proceed

# Product artifacts — parallel to project, not nested (ADR 017 whitelist)
# Stage-centric sub-folders, one per SDLC stage. Operational artifacts
# (checkpoints, status, evidence) for product-scoped plays live at the
# product root using underscore-prefixed subfolders, orthogonal to the
# stage layout. The 6 stage folders are all direct children of base-path.
#
# Layout (defect D1 fix 2026-04-14; D8/D9 updates 2026-04-14):
#   .garura/product/
#   ├── user-provided/     user inputs (brief + future notes / questions)
#   ├── specification/     market-brief, project-profile, quality-profile, domain-selection, domain-grounding (opportunity + domain shape — what the product SPACE is)
#   ├── scope/             mvp-recommendation, scope.yaml, enriched-capabilities, validation-intent-epics, epics/ (v1 scope contract — what we're BUILDING)
#   ├── architecture/      build-architecture output
#   ├── experience/        design-experience output
#   ├── research/          product domain library — KB copies (with provenance header, origin: kb) + researched domains (origin: stm_research), both scoped to this product run (Defect 8 Pull-to-Product)
#   ├── _checkpoints/      play-lifecycle (orthogonal to stages)
#   ├── _evidence/         play-lifecycle (orthogonal to stages)
#   └── _status/           play-lifecycle (orthogonal to stages)
product:
  base-path: .garura/product/
  directories:
    user-provided: user-provided/
    specification: specification/
    scope: scope/
    architecture: architecture/
    experience: experience/
    research: research/

# gate switches (#466, three kinds per #467) — every human checkpoint resolves here;
# see standards/rules/gate-config.md. Pinned gates (grill, launch, learn) ignore this
# block entirely. Conditional plays consult the learned policy before falling through
# to classes/default.
gates:
  default: on
  classes:
    docs-only: on
    standard: on
    one-way-door: on
  # Chain gates off per the #467 ruling (Batch C) — each play carries its
  # replacement machine checks; skips are always recorded. Flip any back to on
  # to restore the human wait; the checkpoint machinery is kept, not removed.
  plays:
    start-change: off
    commit-change: off
    propose-change: off
    review-change: off
    merge-change: off
    # Execute-side gates off per the #467 ruling (Batch D) — replaced by machine
    # preconditions in the same change. fix-bug and implement were pinned; the ruling
    # unpins them (an intent change), so the config switch now governs them too.
    validate: off
    fix-bug: off
    implement: off
    refactor: off
  conditional:
    streak: 3                                # clean approvals a shape needs to earn auto
    ledger: .garura/core/gate-evals.jsonl    # live-eval ledger (append-only, committed)
    policy: .garura/core/gate-policy.yaml    # learned per-project policy (distilled)
