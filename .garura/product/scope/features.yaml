domains:

  # ============================================================
  # DOMAIN 1: AGENTIC METHODOLOGY (prefix AM)
  # ============================================================

  - slug: agentic-methodology
    status: applied-and-evolving
    rollup_notes: >
      Agentic Methodology is Garura's core differentiator and substrate. It is not
      "LIVE and done" — it is applied today and continuously evolves as new
      dogfooding use cases surface gaps (new plays, new agents, new skills, new KB
      entries). Component Architecture is fully operational; L2 is applied (not a
      build target); L3 is partial; L4/L5 are directional with limited detail today.
    capabilities:

      - slug: component-architecture
        status: live
        rollup_notes: >
          Every feature LIVE and dogfooded. This is the ONLY capability whose
          features enumerate plays/agents/skills/memory — they ARE the methodology.
          AM-F005 (Project LTM) and AM-F006 (Global KB) are PARTIAL because their
          curation/review workflows are still maturing.
        features:

          - id: AM-F001
            name: Plays
            status: live
            notes: >
              21 plays ship today. Every play is compiled from intent.yaml via
              /create-play. Dogfooded — new plays added as new use cases emerge.
            plays_inventory:
              - briefs
              - build-arch
              - capture-learning
              - check-drift
              - commit-code
              - create-play
              - create-pr
              - design-exp
              - distill
              - enhance
              - fix-it
              - implement-epic
              - merge-pr
              - prepare-epic
              - capture
              - review-pr
              - ship
              - specify-product
              - start-feature
              - start-feature-planning
              - validate-epic
            evidence:
              - core/components/plays/
              - docs/adr/001-three-layer-hierarchy.md
              - docs/adr/013-play-maturity-model.md
            gap_items: []

          - id: AM-F002
            name: Agents
            status: live
            notes: >
              19 domain + utility agents ship today. Autonomous per ADR 005;
              Task-tool invocable with JSON contracts.
            agents_inventory:
              - code-builder
              - designer
              - doc-builder
              - engineering-manager
              - eval-generator
              - feature-steward
              - intent-crafter
              - intent-resolver
              - judge
              - knowledge-extractor
              - market-analyst
              - product-keeper
              - project-orchestrator
              - quality-auditor
              - repo-orchestrator
              - scriber
              - tech-architect
              - tech-designer
              - test-engineer
            evidence:
              - core/components/agents/
              - docs/adr/004-agent-naming.md
              - docs/adr/005-skills-as-capabilities.md
            gap_items: []

          - id: AM-F003
            name: Skills
            status: live
            notes: >
              47 skills implementing domain capabilities. Model-invocable,
              agent-orchestrated. Continuously added as new capabilities surface.
            skills_inventory:
              - analyze-changes
              - analyze-pr
              - archive-issue-stm
              - audit-spec-gaps
              - check-drift
              - compile-design-spec
              - configure-capabilities
              - create-commit
              - derive-design-patterns
              - derive-logical-architecture
              - derive-nfr-spec
              - derive-physical-architecture
              - derive-quality-profile-from-epics
              - derive-quality-vision
              - distill
              - draft-implementation-plan
              - draft-lld
              - draft-product-spec
              - draft-technical-approach
              - draft-verification-scenarios
              - enrich-capabilities
              - evals-creator
              - generate-intent-epics
              - generate-screen-inventory
              - generate-wireframes
              - manage-issue
              - map-user-flows
              - merge-pr
              - quality-check
              - quality-check-scoped
              - recommend-mvp
              - research-domain-context
              - research-market-opportunity
              - resolve-issues
              - scout-project
              - setup-branch
              - submit-pr
              - sync-claude
              - sync-droids
              - synthesize-personas
              - validate-abstraction-layer
              - validate-architecture-spec
              - validate-implementation-design
              - validate-intent-epics
              - validate-kb-extension
              - validate-screen-coverage
              - write-evidence
            evidence:
              - core/components/skills/
              - docs/adr/005-skills-as-capabilities.md
              - docs/adr/009-skill-ltm-organizational-knowledge.md
            gap_items: []

          - id: AM-F004
            name: Memory — STM (Short-Term Memory)
            status: live
            notes: >
              Issue-centric STM under .garura/project/issues/{n}/. Capability is
              built and done: schema locked, lifecycle defined (archive-issue-stm),
              folder whitelist enforced (ADR 017).
            evidence:
              - .garura/project/issues/
              - docs/adr/008-issue-centric-stm-and-nwwi.md
              - docs/adr/017-folder-whitelist.md
              - core/components/memory/standards/rules/resolution.md
              - core/components/skills/archive-issue-stm/
            gap_items: []

          - id: AM-F005
            name: Memory — Project LTM
            status: partial
            notes: >
              Project-scoped long-term memory under .garura/product/. Structure
              locked; automated STM→LTM promotion via distill/capture-learning is
              in flight; retention/archival policy not yet enforced.
            evidence:
              - .garura/product/
              - core/components/memory/standards/rules/
              - core/components/plays/distill/
              - core/components/plays/capture-learning/
            gap_items:
              - Automated STM→LTM promotion (distill + capture-learning wiring)
              - LTM retention and archival policy enforcement

          - id: AM-F006
            name: Memory — Global KB
            status: partial
            notes: >
              Cross-project knowledge base at core/components/memory/knowledge/.
              Substrate is shipped; several KB entries are actively in review.
              Open KB-review issues exist — content maturity is mid-flight.
            evidence:
              - core/components/memory/knowledge/
              - core/components/memory/standards/
              - docs/adr/009-skill-ltm-organizational-knowledge.md
            gap_items:
              - Resolve open KB-review issues (domain-taxonomy completeness, CTC gaps)
              - Standardize promotion workflow from Project LTM → KB
              - Publish KB review SLA / review queue

          - id: AM-F007
            name: Three-Layer Hierarchy
            status: live
            notes: >
              Plays → Agents → Skills hierarchy enforced by /create-play compilation
              and agent-first delegation rules.
            evidence:
              - docs/adr/001-three-layer-hierarchy.md
              - docs/philosophy/architecture.md
            gap_items: []

          - id: AM-F008
            name: Human-in-the-Loop Approval
            status: live
            notes: >
              Core principle is human-in-the-loop — every play embeds explicit
              approval gates at commits, PRs, destructive actions, and multi-phase
              plan approvals. "Tether/Vanish/Orbit" is a personal convention
              (user-owned rule), not a protocol Garura imposes; plays accept any
              configured approval response surface. A bypass configuration is
              supported for autonomous environments (review-pr.bypass=true per
              project review feedback).
            evidence:
              - core/components/memory/standards/rules/
              - CLAUDE.md
              - docs/adr/002-l1-checkpoint-model.md
            gap_items:
              - Formalize the approval-response convention as a configurable policy
              - Document the bypass-configuration contract and audit implications

          - id: AM-F009
            name: Evidence & Checkpoint Substrate
            status: live
            notes: >
              Every play writes evidence artifacts (write-evidence skill) and stage
              checkpoints to STM; self-commit of evidence per ADR 012.
            evidence:
              - core/components/skills/write-evidence/
              - docs/adr/002-l1-checkpoint-model.md
              - docs/adr/012-evidence-self-commit.md
            gap_items: []

      - slug: l2-spec-driven
        status: applied
        rollup_notes: >
          L2 is the methodology Garura APPLIES — it is not a Garura build target.
          The L2 pipeline (specify-product → design-exp → build-arch → prepare-epic →
          implement-epic → validate-epic) runs end-to-end today. Features below
          describe the L2 invariants Garura guarantees for its own users.
        features:

          - id: AM-F010
            name: Maturity Ladder Engine
            status: partial
            notes: >
              Ladder L1-L5 defined in docs/philosophy/idsd.md; referenced in
              project_profile.delivery_ambition. Runtime per-capability enforcement
              gates and automated posture measurement are not shipped.
            evidence:
              - docs/philosophy/idsd.md
              - docs/adr/014-three-axis-project-profiling.md
            gap_items:
              - Per-capability level enforcement
              - Level-up / level-down recommendation from observed outcomes
              - Automated posture measurement against declared level

          - id: AM-F011
            name: Persistent Memory Substrate
            status: live
            notes: >
              Structured artifact tree (STM + Project LTM + KB) with schema
              validation, provenance headers, and git-based multi-contributor
              continuity. This is the L2 invariant — memory persists across
              sessions and is structurally queryable.
            evidence:
              - core/components/memory/
              - docs/philosophy/architecture.md
            gap_items: []

          - id: AM-F012
            name: Spec-to-Test Continuity
            status: partial
            notes: >
              Artifact chain intent → scope → epic → plan → implementation →
              scenarios → tests is enforced by validators (validate-intent-epics,
              validate-architecture-spec, validate-screen-coverage, check-drift).
              Automated propagation on upstream change is incomplete.
            evidence:
              - core/components/skills/validate-intent-epics/
              - core/components/skills/check-drift/
              - core/components/skills/evals-creator/
            gap_items:
              - Automatic drift propagation from upstream artifact changes
              - Intent-to-test-code synthesis (see WI-F011)

      - slug: l3-intent-driven
        status: partial
        rollup_notes: >
          Intent compilation via /create-play is LIVE. Scope auto-narrowing via
          configure-capabilities is LIVE. Epic auto-generation via
          generate-intent-epics is LIVE. Runtime intent inference across plays is
          PLANNED — that is the boundary to L4.
        features:

          - id: AM-F013
            name: Intent Compilation
            status: live
            notes: >
              intent.yaml schema + /create-play compiles intent specifications
              into executable plays. Every Garura play (21 total) is a compiled
              artifact from its reference/intent.yaml.
            evidence:
              - core/components/plays/create-play/
              - core/components/memory/standards/schemas/intent-epic.yaml
              - core/components/plays/{play}/reference/intent.yaml
            gap_items: []

          - id: AM-F014
            name: Intent Inference
            status: partial
            notes: >
              intent-crafter agent interviews users to produce intent.yaml;
              intent-resolver agent produces task DAGs from intents. Cross-play
              intent matching (which play best serves this intent?) is not yet
              shipped — that is the L4 transition.
            evidence:
              - core/components/agents/intent-crafter.md
              - core/components/agents/intent-resolver.md
            gap_items:
              - Cross-play intent matching
              - Runtime intent context binding across plays

          - id: AM-F015
            name: Scope Auto-Narrowing
            status: live
            notes: >
              configure-capabilities skill walks KB cross-tree constraints and
              auto-selects capabilities based on project_profile; rejected set is
              recorded with rationale.
            evidence:
              - core/components/skills/configure-capabilities/
              - core/components/memory/knowledge/domain/_cross-tree-constraints.yaml
            gap_items: []

          - id: AM-F016
            name: Epic Auto-Generation
            status: live
            notes: >
              generate-intent-epics instantiates one intent epic per enriched
              capability with every mandatory field populated and KB-sourced.
            evidence:
              - core/components/skills/generate-intent-epics/
              - core/components/skills/validate-intent-epics/
            gap_items: []

      - slug: l4-signal-driven
        status: planned
        rollup_notes: >
          L4 is directional. The ONE known architectural shift: instead of
          /create-play (compile-time play authoring), plays are assembled at
          runtime via intent-resolution — each invocation determines its own
          path from intent + signals + context. No concrete feature list yet;
          deliberately empty until L4 use cases are elaborated in a dedicated
          research pass.
        target_milestone: post-v1 (TBD)
        features: []

      - slug: l5-goal-driven
        status: planned
        rollup_notes: >
          L5 is aspirational. No feature list — architecture direction for goal
          decomposition, self-correction loops, autonomous completion, and
          outcome verification is not yet articulated in enough detail to
          commit features. Deliberately empty pending future research pass.
        target_milestone: post-v1 (TBD)
        features: []

  # ============================================================
  # DOMAIN 2: ENGINEERING OBSERVABILITY (prefix EO)
  # ============================================================

  - slug: engineering-observability
    status: partial
    rollup_notes: >
      quality-check, quality-check-scoped, check-drift, briefs ship as local
      measurement/rendering substrate. Cross-project aggregation, dashboards,
      and signal routing are the persistent gap — these are the Control Tower
      features.
    capabilities:

      - slug: quality-signals
        status: partial
        rollup_notes: >
          quality-check and quality-check-scoped skills run locally and emit
          structured findings. No cross-project aggregation, trend tracking, or
          dashboard surface.
        features:
          - id: EO-F001
            name: Test Coverage
            status: partial
            notes: >
              Per-project coverage measurement via quality-check. Cross-project
              aggregation and trend tracking not shipped.
            evidence:
              - core/components/skills/quality-check/
              - core/components/memory/knowledge/quality/testing/
            gap_items:
              - Cross-project aggregation
              - Trend tracking
              - Coverage dashboard

          - id: EO-F002
            name: Lint
            status: partial
            target_milestone: v1.1 May
            notes: >
              Per-Stage-1/2 user input reconciliation (2026-04-18): status
              restored to partial. Lint runs in quality-check for Node/TypeScript
              stack as part of existing quality-check framework; broader
              multi-stack adapter coverage, aggregation, and governance surface
              remain pending.
            evidence:
              - core/components/skills/quality-check/
            gap_items:
              - Multi-stack lint adapter coverage
              - Multi-project lint aggregation
              - Lint trend dashboard
              - Lint policy enforcement surface

          # EO-F003 (Build Health) removed 2026-04-18 per user feedback: not needed.
          # ID retired — NOT reused.

          - id: EO-F004
            name: Security Scans
            status: partial
            target_milestone: v1.2 Jul
            notes: >
              Per-Stage-1/2 user input reconciliation (2026-04-18): status
              restored to partial. Security scanning baseline (npm audit)
              integrated in quality-check for Node ecosystem; broader scanner
              integration, vulnerability aggregation, and posture dashboard
              remain pending.
            evidence:
              - core/components/skills/quality-check/
            gap_items:
              - Additional scanner integration (Snyk/Dependabot equivalent)
              - Vulnerability aggregation
              - Security posture dashboard

      - slug: debt-signals
        status: partial
        rollup_notes: >
          check-drift detects spec drift and emits a debt catalog. Tech-debt
          governance rules exist (Fowler quadrant). No trend dashboard or
          debt-driven routing.
        features:
          - id: EO-F005
            name: Tech Debt
            status: partial
            notes: >
              check-drift emits tech-debt catalog per project. Trend tracking
