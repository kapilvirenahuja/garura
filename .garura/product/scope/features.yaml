            evidence:
              - core/components/skills/check-drift/
              - core/components/memory/knowledge/quality/tech-debt/
            gap_items:
              - Debt trend dashboard
              - Debt-driven play routing

          - id: EO-F006
            name: Domain Debt
            status: planned
            target_milestone: v1.2 Jul
            notes: >
              No first-class domain-debt detection (capability-level drift,
              taxonomy debt) shipped beyond the general check-drift surface.
            evidence: []
            gap_items:
              - Domain taxonomy drift detection
              - Capability staleness indicators

          - id: EO-F007
            name: Spec Debt
            status: partial
            notes: >
              Spec drift (locked spec vs implementation) detected by
