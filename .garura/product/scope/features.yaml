# Features: 3-Tier Domain → Capability → Feature Model
# Moved from specification/implementation-inventory.yaml (2026-04-18)
# Renamed to features.yaml per user direction: this is the feature catalog.
#
# Totals: 5 domains / 21 capabilities / 81 features
#
# MODEL NOTES
# - Single node per domain (no duplicates). Capabilities nest under domain.capabilities[];
#   features nest under capability.features[].
# - Plays, agents, skills, memory layers are methodology components — they surface only
#   under Agentic Methodology / Component Architecture as features, NOT as evidence
#   scattered across every capability. Component Architecture enumerates them in the
#   zoomed-in component lists.
# - Agentic Methodology capabilities are "applied + evolving via dogfooding" — Garura
#   uses L2/L3 and extends them as new use cases emerge, but Garura-as-product is not
#   re-building L2/L3 methodology theory.

