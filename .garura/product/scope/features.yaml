specify_product_enhancements_needed:
  description: >
    Changes applied here reflect user feedback that specify-product (the play)
    did not produce the right feature catalog on first pass. Track as an
    enhancement backlog for specify-product itself.
  items:
    - Author features.yaml under product/scope/ (not specification/). DONE in this revision.
    - Enumerate plays/agents/skills under Component Architecture as zoomed-in feature sub-lists. DONE.
    - Distinguish "applied and evolving" from "live and done" as a capability-level status. DONE (new status value).
    - Do not auto-fabricate L4/L5 feature lists; leave empty pending dedicated research. DONE.
    - '"Tether" is a user-convention, not a Garura protocol — describe as human-in-the-loop with bypass config. DONE.'
    - Single node per domain in the YAML hierarchy — capabilities nest, no domain-row duplication. DONE.

ambiguous_mappings:
  - topic: memory as one feature vs three
    decision: Split into three features (STM AM-F004, Project LTM AM-F005, Global KB AM-F006)
    rationale: >
      The three layers have distinct lifecycles, governance, and shipped state.
      STM is LIVE (built and done); Project LTM and Global KB are PARTIAL.
      A single combined feature would hide that status nuance.

  - topic: Human-in-the-Loop — own feature or part of Plays?
    decision: Own feature (AM-F008)
    rationale: >
      Human-in-the-loop is a cross-cutting approval convention used by commits,
      PRs, destructive actions, and multi-phase plan approvals. Bypass config
      makes it policy-configurable, not a fixed protocol.

  - topic: Evidence & checkpoint substrate — feature or part of Memory?
    decision: Own feature (AM-F009)
    rationale: >
      Evidence is a write-centric concern with a dedicated skill
      (write-evidence) and a self-commit ADR (012). Distinct from the memory
      read/query concern.

  - topic: L2 as a build target for Garura
    decision: Mark capability status=applied (not a Garura build target)
    rationale: >
      Garura APPLIES L2 methodology; it does not build L2 theory as a product
      capability. The pipeline IS L2 in practice — features under this
      capability describe the invariants, not active build work.

  - topic: L4 / L5 feature enumeration
    decision: Empty feature list with directional rollup_notes only
    rationale: >
      L4's only known shift (runtime intent-resolution replacing /create-play)
      is too abstract to commit as discrete features. L5 has no concrete
      direction yet. Fabricating features would be false precision.

  - topic: EE IDE integration features — count as 5 or combine?
    decision: Five separate features (EE-F001 through EE-F005)
    rationale: >
      Each IDE has its own extension API, release cadence, and parity status.
      Collapsing would hide that Claude Code is LIVE while Copilot/Cursor/
      Codex are PLANNED — which is the actionable distinction.

decisions_on_status:
  agentic_methodology_applied_and_evolving: >
    NOT "live and done" — applied today and continuously evolved via
    dogfooding. Component Architecture is LIVE end-to-end; L2 is APPLIED
    (not a build target); L3 is PARTIAL; L4/L5 are directional.

  component_architecture_live: >
    Every sub-feature ships today and is dogfooded by Garura itself. 21 plays,
    19 agents, 47 skills, three memory layers (STM live; Project LTM partial;
    Global KB partial), three-layer hierarchy, human-in-the-loop approval,
    evidence substrate.

  global_kb_partial_not_live: >
    Previously marked LIVE; corrected to PARTIAL. KB content maturity is
    mid-flight with open review issues; substrate is live, content curation is not.

  l2_spec_driven_applied: >
    Pipeline is end-to-end operational and applied by Garura itself. Not a
    Garura build target — marked status=applied. Feature-level PARTIALs
    (Maturity Ladder, Spec-to-Test) are applied-quality gaps, not build work.

  l3_intent_driven_partial: >
    Intent compilation (/create-play) is LIVE. Scope auto-narrowing and epic
