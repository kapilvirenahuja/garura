  - slug: work-intelligence
    status: partial
    rollup_notes: >
      manage-issue and scout-project skills provide intake and project
      context. Epic decomposition, eval generation, and fix-it loop are LIVE.
      Sprint planning, RCA, and blast-radius analysis are PARTIAL. Routing,
      scoring, grooming, story generation, and test code synthesis are PLANNED.
    capabilities:

      - slug: agentic-triage
        status: planned
        rollup_notes: >
          Automatic triage — incoming defects / enhancements / epics routed to
          the human or agent best suited for the work, based on profiles.
          Priority is anchored to product vision + roadmap: if a request is
          not traceable to vision or roadmap, its priority is BLOCKED and
          work does not proceed. Agent-time allocation follows the same
          anchor — system priority reflects how the product is progressing,
          which makes upstream specify-product / market / features artifacts
          load-bearing for triage.
          (Renamed from intent-anchored-triage — user feedback: name was
          unclear.)
        features:
          - id: WI-F001
            name: Profile-Based Auto-Triage
            status: planned
            target_milestone: v1.1 May
            notes: >
              Profiles of people AND agents — skills, historical fit, current
              load — used to automatically route defects, enhancements, and
              epics to the best-suited worker. No human dispatcher in the
              loop for the routing decision; dispatcher only approves or
              overrides.
            evidence:
              - core/components/skills/manage-issue/
            gap_items:
              - Profile schema for people and agents (skills, fit history, load)
              - Automatic matcher (work item → best-suited profile)
              - Override + feedback loop (approve/override becomes training signal)

          - id: WI-F002
            name: Vision-Anchored Priority
            status: planned
            target_milestone: v1.1 May
            notes: >
              Priority is computed from traceability to product vision +
              roadmap. Unmapped request → priority=BLOCKED → work does not
              proceed. This is a hard gate, not a scoring nudge. Makes the
              specify-product → features → roadmap artifacts load-bearing:
              if it's not in the plan, it doesn't run.
            evidence: []
            gap_items:
              - Traceability graph (request → vision → roadmap → features)
              - BLOCKED state semantics in issue lifecycle
              - Roadmap-change propagation to active priorities

          - id: WI-F003
            name: Agent-Time Allocation
            status: planned
            target_milestone: v1.1 May
            notes: >
              Where agents spend time follows product progress. Ties directly
              to OTEL telemetry (EO-F015) and autonomy tracking (AG-F011) —
              the system observes where agent-hours land, compares against
              roadmap priority, and surfaces drift ("agents spent 40% on
              capability X but X is deferred to v1.2 — why?"). Replaces
              "blast-radius analysis" as the WI concern — blast-radius is a
              technical-change concern that stays with PR analysis.
            evidence:
              - core/components/skills/analyze-changes/
              - core/components/skills/analyze-pr/
            gap_items:
              - Agent-time accounting against roadmap
              - Drift detection (time-spent vs priority)
              - Reallocation surface

      - slug: agentic-planning
        status: partial
        rollup_notes: >
          Planning is AGENTIC — no story backlogs, no burndowns, and sprints
          themselves are questionable. Agents deliver faster than story-level
          decomposition assumes, so the planning unit re-anchors to RELEASES
          (what ships) rather than sprints (what iterates). Capacity is
          computed across PEOPLE + AGENTS combined, with token budget as a
          first-class dimension (Opus vs Sonnet cost, per-play token
          forecast). OTEL telemetry (EO-F015) is the data spine that lets
          capacity reason run in reverse: observe spend + outcome, then
          compute "how many people + how many agents do you need?"
        features:
          - id: WI-F004
            name: Release Planning
            status: planned
            target_milestone: v1.2 Jul
            notes: >
              The planning unit is a RELEASE — what ships. Not a
              program-increment, not a sprint. Agentic assembly of candidate
              work items against release target, anchored to roadmap
              (WI-F002 Vision-Anchored Priority). Replaces the earlier "PI
              Planning" framing.
            evidence: []
            gap_items:
              - Release schema (date, theme, capability targets)
              - Release candidate assembly from priority queue
              - Release-to-roadmap traceability

          - id: WI-F005
            name: Agentic Iteration Planning
            status: planned
            target_milestone: v1.2 Jul
            notes: >
              Whether "sprints" and "burndowns" survive is open — the user's
              position is that they likely do not in an agentic world.
              start-feature-planning today scaffolds per-feature planning.
              Target state: the planner is an agent that reasons across
              people + agents, assembles parallel work bundles against
              release pressure, and abandons the fixed time-box cadence
              that sprints imply. Burndowns replaced by spend-vs-outcome
              tracking (AG-F011 Autonomy Tracking).
            evidence:
              - core/components/plays/start-feature-planning/
            gap_items:
              - Agentic planner (assembles work bundles from profiles + priority)
              - Parallel-work coordination surface
              - Decision: retain or retire sprint cadence

          - id: WI-F006
            name: People + Agent Capacity (Token Budget)
            status: planned
            target_milestone: v1.2 Jul
            notes: >
              Capacity is computed across PEOPLE + AGENTS combined. Token
              budget is a first-class dimension — Opus vs Sonnet cost
              awareness at planning time. OTEL telemetry (EO-F015) feeds
              historical spend per play / per capability; the planner
              reverses that to answer "for this release scope, how many
              people + how many agents, at which model tiers, within what
              token budget?" This is where the project-level intelligence
              accumulates.
            evidence: []
            gap_items:
              - Per-play / per-capability token cost model (Opus vs Sonnet)
              - Historical-spend ingestion from OTEL
              - Reverse capacity model (scope → people + agents + budget)
              - Budget guardrails at play invocation

      - slug: backlog-lifecycle
        status: deferred-for-reconsideration
        target_milestone: post-v1 (TBD)
        rollup_notes: >
          Deferred for further thought. Traditional backlog-lifecycle (stories,
          grooming, story-generation) may not be needed in an agentic world —
          agents deliver faster than story-decomposition assumes, and release
          planning (WI-F004) + priority (WI-F002) plus epic decomposition
          (WI-F007, LIVE) may cover the end-to-end flow without a classical
          backlog. Intentionally NOT detailed out. Retain only the LIVE
          feature (Epic Decomposition); prior WI-F008 and WI-F009 are
          dropped pending a later rethink.
        features:
