  key_findings: |
    Component Architecture is LIVE end-to-end (21 plays + 19 agents + 47 skills +
    three memory layers + hierarchy + human-in-the-loop + evidence substrate).
    L2 Spec-Driven is APPLIED (Garura runs on it; not a Garura build target).
