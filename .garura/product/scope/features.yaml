  # ============================================================
  # DOMAIN 3: AI GOVERNANCE (prefix AG)
  # ============================================================

  - slug: ai-governance
    status: partial
    rollup_notes: >
      Evidence artifacts with play/agent/step attribution are written to STM.
      Post-merge learning extraction (distill, capture-learning) exists. Full
      audit trail, signed attribution, compliance exports, access control, and
      token/budget governance are not shipped.
    capabilities:

