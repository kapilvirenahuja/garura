failure_conditions:
  - "A play is rebuilt with a new intent.yaml version but the associated evals are not regenerated, causing evals to pass against the old intent while failing against the new intent"
  - "A synthesized test has an ambiguous then clause (multiple valid interpretations), causing the test to pass against an implementation that violates the intended scenario"
  - "fix-it proposes a fix that patches the symptom without completing the 5-whys RCA, causing the root cause to recur at the next feature addition"
  - "A fix is validated by a regression test but a later feature addition changes the same behavior without updating the regression test, causing the defect to resurface"
  - "A repeated defect pattern occurs across multiple issues but fix-it treats each occurrence as an independent defect without recognizing the pattern"

