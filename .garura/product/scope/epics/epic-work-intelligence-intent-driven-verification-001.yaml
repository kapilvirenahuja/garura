# epic-work-intelligence-intent-driven-verification-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.

id: "EPIC-work-intelligence-intent-driven-verification-001"
domain: "work-intelligence"
capability: "WI-F010"

intent:
  goal: >
    A software engineer operating Garura at the intent-driven level (L3) gets intent-traceable
    step evaluations on every play and scenario evaluations on every capability that pass on
    canonical traces, and gets the fix-it play closing at least 95% of filed defects without
    reopening within the same milestone window.
  constraints:
    - "The evaluations-creator skill completes evaluation generation for a full play in under 2 minutes."
    - "The synthesized test suite runs in under 5 minutes for a single capability's test file."
    - "OWASP ASVS Level 1 baseline — evaluation files and test synthesis outputs are internal artifacts; no external auth surface; test files written to project test directories under the memory folder whitelist."
    - "WCAG 2.1 AA — applies to any user-interface rendering of test results or root-cause-analysis reports."
    - "Audit trail — every defect resolution has root-cause-analysis evidence in short-term memory; the fix-it play closing without a root-cause-analysis artifact is a compliance defect."
    - "Test synthesis covers at least one language ecosystem (Node and TypeScript) at launch; synthesized tests trace to scenarios in the intent epic and are executable out of the box."
    - "Every defect filed against a Garura play has root-cause-analysis evidence before a fix is proposed; the 5-whys structure in the root-cause-analysis template is enforced by the fix-it play."
    - "A regression test is mandatory on every fix — no fix-first-test-later; the regression test is required before the fix-it play marks the defect closed."
    - "Test synthesis requires a compatible test runner (Jest, Vitest, or equivalent) present in the project."
  failure_scenario:
    - "A play is rebuilt with a new intent file but the associated evaluations are not regenerated — evaluations pass against the old intent while failing against the new intent."
    - "A synthesized test has an ambiguous then clause with multiple valid interpretations — the test passes against an implementation that violates the intended scenario."
    - "The fix-it play proposes a fix that patches the symptom without completing the 5-whys root-cause-analysis — the root cause recurs at the next feature addition."
    - "A fix is validated by a regression test but a later feature addition changes the same behavior without updating the regression test — the defect resurfaces."
    - "A repeated defect pattern occurs across multiple issues but the fix-it play treats each occurrence as an independent defect without recognizing the pattern."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "software engineer building or rebuilding any Garura play with a valid intent file and a locked epic"
      given: "the evaluations-creator runs as part of the play build step"
      then: "a step-evaluation file exists for every play step and a scenario-evaluation file exists for every success and failure scenario in the intent, with all evaluations passing on their canonical traces."
      measure: "Evaluations-creator exit code 0; step-evaluation file count equals play step count in the intent file; scenario-evaluation count equals success scenario count plus failure scenario count from the epic; all evaluations pass against the canonical play trace captured at build time."
    - id: S2
      persona: "software engineer who has filed a defect against a Garura play using the capture workflow"
      given: "the fix-it play completes the root-cause-analysis-driven fix"
      then: "a regression test is linked to the defect in short-term memory and the fix does not reopen within the same milestone window in at least 95% of cases."
      measure: "Regression test file exists in short-term memory linked to the defect issue number; fix-it play exit code 0; defect reopening rate under 5% measured across all defects closed by the fix-it play in a 30-day window; tracked via defect reopen events in the issue tracker."
  recovery:
    - id: REC1
      for_failure_scenario: "A play is rebuilt with a new intent file but the associated evaluations are not regenerated — evaluations pass against the old intent while failing against the new intent."
      trigger: "Continuous integration reports an evaluation pass on the old intent but the play exhibits changed behavior; or the play rebuild step exits without running the evaluations-creator after an intent change."
      direction: "The evaluations-creator runs in the play rebuild step alongside the play recompilation; a rebuilt play with unapplied evaluation updates is a blocking continuous-integration failure until evaluations are regenerated; when triggered, run the rebuild step to force evaluation regeneration before proceeding."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_scenario: "A synthesized test has an ambiguous then clause with multiple valid interpretations — the test passes against an implementation that violates the intended scenario."
      trigger: "A defect is found in production that was covered by a passing synthesized test; or a code review identifies a test that passes but does not actually verify the intended behavior."
      direction: "Scenario structure discipline: the scenarios rule (given, when, then format with binary-testable then clauses) prevents ambiguous then clauses at authoring time; the scenario review gate before synthesis rejects ambiguous scenarios before tests are synthesized; when triggered, update the scenario's then clause to be unambiguous and re-synthesize the tests."
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_scenario: "The fix-it play proposes a fix that patches the symptom without completing the 5-whys root-cause-analysis — the root cause recurs at the next feature addition."
      trigger: "The same defect reopens at the next feature addition; or a code review identifies that the fix addressed the symptom but not the root cause."
      direction: "The fix-it play enforces 5-whys root-cause-analysis before proposing any fix; the root-cause-analysis template is a required output before the fix-it play enters the implementation step; a shallow root-cause-analysis (fewer than 3 why levels) is a blocking failure that requires the developer to deepen the analysis before proceeding; when triggered retroactively, re-open the defect and run a full 5-whys analysis before applying a new fix."
      handoff: human
      derivable_at_l4: false
    - id: REC4
      for_failure_scenario: "A fix is validated by a regression test but a later feature addition changes the same behavior without updating the regression test — the defect resurfaces."
      trigger: "The original defect reopens after a feature addition; or drift detection surfaces a regression test that no longer matches the current implementation."
      direction: "The regression test is linked to the defect in short-term memory; drift detection includes regression-test staleness detection; any merge that touches the same code paths as a linked regression test triggers a review flag; when triggered, update the regression test to cover the new behavior and re-run to verify the fix still holds."
      handoff: human
      derivable_at_l4: false
    - id: REC5
      for_failure_scenario: "A repeated defect pattern occurs across multiple issues but the fix-it play treats each occurrence as an independent defect without recognizing the pattern."
      trigger: "A developer or reviewer notices the same root cause appearing in multiple closed defects; or a pattern analysis reveals multiple defects with the same 5-whys root."
      direction: "A defect-history check inside the fix-it play searches the defect history for similar patterns before beginning root-cause-analysis and surfaces any matches; the pattern library curation is tracked as a post-version-1 advanced enhancement; when triggered manually, search the defect history for similar patterns and consolidate the root cause analysis before applying fixes across all affected issues."
      handoff: human
      derivable_at_l4: false

connections:
  before_chain:
    intents:
      - "EPIC-agentic-methodology-l3-intent-driven-001"
  after:
    intents: []
  peers:
    intents:
      - "EPIC-agentic-methodology-l2-spec-driven-001"
  dependency_check: "All before_chain epics carry expectations.vetted.status: approved and post_implementation.status: delivered before this epic begins."

