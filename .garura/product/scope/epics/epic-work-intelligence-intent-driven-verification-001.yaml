business_rules:
  - "Mandatory for L3+ — every play must have step evals generated from intent.yaml before the play ships (WI-F010)"
  - "Mandatory for L3+ with test automation — synthesized tests must trace to scenarios; no test without a traceable scenario (WI-F011)"
  - "Mandatory for L3+ production systems — every defect resolution goes through structured RCA before a fix is proposed (WI-F012)"
  - "Mandatory (never excludable) — fix-it loop closure is required for every defect; the fix-it play is the only approved path for defect resolution (WI-F013)"
  - "Regression test is mandatory on every fix — no fix-first-test-later; regression test is required before fix-it marks the defect as closed (WI-F013)"
  - "5-whys structure in RCA template — fix-it enforces RCA depth before proposing any fix; shallow RCA is a blocking failure"

hypothesis: >
  We believe that ensuring every Garura play has intent-traceable step evals and scenario
  evals for software engineers operating at L3 delivery ambition will result in evals passing
  on canonical traces for 100% of plays with attached evals and fix-it closing ≥ 95% of
  defects without reopening. We will know this is true when evals-creator exits 0 with full
  coverage for every play in a 30-day window and the defect reopen rate measured by the
  issue tracker stays below 5%.

assumptions_requiring_validation:
  - "Test synthesis for Node/TypeScript produces tests that are executable out-of-box on the Garura codebase — this assumes the synthesized tests use standard Node test runner conventions; non-standard runner configurations would require additional adapter work"
  - "evals-creator can generate step evals for all 42+ existing plays without requiring manual scenario annotation — plays that lack explicit scenario declarations in their intent.yaml cannot be covered by automated eval generation"
  - "fix-it's 95% non-reopen rate is achievable with 5-whys RCA enforcement — if root causes require architectural changes that are deferred, the defect will reopen regardless of RCA depth"

dependencies:
  - "Node/TypeScript test runner compatibility — WI-F011 test synthesis requires a compatible test runner (Jest, Vitest, or equivalent) present in the project"

