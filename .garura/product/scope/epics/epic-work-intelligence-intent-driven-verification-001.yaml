  - "Cross-defect correlation and pattern library — Advanced depth for WI-F013; post-v1; defect-history correlation is a signal-driven (L4) feature"
  - "Fleet-wide fix loop across multiple projects — Enterprise depth; post-v1 enterprise milestone"
  - "Test synthesis for languages other than Node/TypeScript at launch — multi-language support is post-v1; v1 ships ≥ 1 language ecosystem"
  - "Automated scenario generation from implementation (reverse-synthesis) — intent must drive tests, not the reverse; reverse-synthesis violates the intent-first principle"

must_not_break:
