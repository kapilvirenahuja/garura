  - "EPIC-agentic-methodology-l2-spec-driven-001 — spec-lock gate and check-drift produce the locked specs that evals validate against; eval generation depends on the spec being locked and stable"
  - "Existing fix-it play behavior — WI-F013 fix-it loop closure hardening must not regress the existing RCA workflow for defects already filed"

