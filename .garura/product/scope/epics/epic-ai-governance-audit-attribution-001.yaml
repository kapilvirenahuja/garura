expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "developer running any Garura play that produces a commit (ship, commit-code, create-commit, or any evidence-committing play)"
      given: "the commit lands in the repository"
      then: "the commit message contains a valid AI-authorship trailer in 100% of play-produced commits within a 30-day window"
      measure: "git log --format='%B' for the 30-day window shows an AI-authorship trailer on every play-produced commit; trailer format matches the canonical format; zero play-produced commits missing a trailer found by the attribution audit script"
    - id: S2
      persona: "compliance officer or software engineer reviewing a specify-product run or any inferred-decision-producing play"
      given: "the run completes"
      then: "a decision-manifest.yaml exists at the expected path with one entry per inferred decision, and every entry has a non-null tier, grounding_source, and recommendation field"
      measure: "decision-manifest.yaml present at the play-specified output path; entry count equals the count of inferred decisions tracked in the play's decision log; every entry has tier != null, grounding_source.kind != null, and recommendation.length > 0; zero silently resolved decisions found by the DSD audit"
  recovery:
    - id: REC1
      for_failure_condition: "A commit hook is not invoked (hook not installed or misconfigured), causing a play-produced commit to land in the repository without an AI-authorship trailer"
      trigger: "git log shows a play-produced commit missing the AI-authorship trailer; or ship/commit-code play pre-commit validation detects hook not installed"
      direction: "Ship and commit-code plays verify the hook is installed before the first commit attempt; a missing hook is a blocking failure, not a warning; hook installation is part of the first-run onboarding (EE-F012 bootstrap) and must be reinstalled if missing"
      handoff: human
      derivable_at_l4: false
    - id: REC2
      for_failure_condition: "A developer resolves an inferred decision during a play run without writing it to the decision-manifest.yaml, leaving the decision only in conversation history and breaking the audit trail"
      trigger: "DSD audit finds decisions in conversation history with no corresponding decision-manifest.yaml entry; or a play completes with primary artifacts written but no manifest file at the expected path"
      direction: "DSD rule enforced in agent system prompt: every inferred decision goes to decision-manifest.yaml BEFORE the primary artifact write; the skill write order in generate-intent-epics and all other decision-producing skills writes the manifest first, then the primary artifacts; when a gap is detected, the manifest must be backfilled before the audit bundle is generated"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC3
      for_failure_condition: "A compliance officer requests an audit bundle and symlinked artifacts are not resolved, producing an incomplete bundle that may invalidate the audit"
      trigger: "audit bundle manifest lists symlink paths rather than resolved file contents; auditor finds missing artifacts in the bundle"
      direction: "Symlink resolution policy in the audit bundle generator resolves all symlinks to their target files before bundle packaging; the bundle manifest lists resolved paths only; when a generation error occurs, the developer must re-run bundle generation with symlink resolution enabled before delivering to the auditor"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_condition: "Attribution data in evidence files is modified post-hoc and tampered evidence cannot be detected because v1 does not have tamper-evident storage"
      trigger: "auditor reports evidence file contents inconsistent with git commit log; or an internal review detects evidence file modification timestamps later than the originating commit"
      direction: "v1 documents this gap explicitly in the audit bundle's limitations section; tamper-evident storage is the Advanced depth target for AG-F004/F005 (post-v1, when external regulations enter scope); when triggered, requires human investigation of the modification and git history to reconstruct the original evidence"
      handoff: human
      derivable_at_l4: false
