failure_conditions:
  - "A commit hook is not invoked (hook not installed or misconfigured), causing a play-produced commit to land in the repository without an AI-authorship trailer"
  - "A developer resolves an inferred decision during a play run without writing it to the decision-manifest.yaml, leaving the decision only in conversation history and breaking the audit trail"
  - "A compliance officer requests an audit bundle and symlinked artifacts are not resolved, producing an incomplete bundle that may invalidate the audit"
  - "Attribution data in evidence files is modified post-hoc and tampered evidence cannot be detected because v1 does not have tamper-evident storage"

constraints:
  performance:
    value: "Commit hook adds < 200ms to commit time; audit bundle generation completes in < 30s for a typical 30-day evidence set"
    source_for_quantification:
      source: kb_default
      source_reference: "200ms hook overhead derived from developer workflow threshold; 30s bundle generation derived from solo-dev usability threshold"
      user_grounded: true
      user_grounding_basis: "batch-accepted as KB-default via Stage 4 review"
  security:
    value: "OWASP ASVS Level 1 — attribution artifacts are internal git objects; no external auth surface; TLS 1.3 for any remote audit bundle delivery"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.security_level=elevated maps to OWASP ASVS Level 1 for internal audit surfaces"
  accessibility:
    value: "WCAG 2.1 AA — audit bundle output is structured YAML/JSON; AA constraint inherited for any UI-rendered audit report"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.audience includes compliance-officer (secondary role); WCAG 2.1 AA is the org-wide baseline"
  compliance:
    - value: "ai-usage-traceability — RATCHETED: 100% of play-produced commits MUST carry AI-authorship commit trailer regardless of depth selection; this is a mandatory business rule, not a best effort target"
      source_for_quantification:
        source: profile_nfr
        source_reference: "profile.compliance.categories includes 'ai-usage-traceability'; ratchet fired on AG-F004 per enrich-capabilities Stage 4"
    - value: "audit-trail — every inferred decision must have tier-rationale in decision-manifest.yaml before primary artifact write; zero silent resolutions"
      source_for_quantification:
        source: profile_nfr
        source_reference: "profile.compliance.categories includes 'audit-trail (AI vs human attribution)'; AG-F005 mandatory for L3+ delivery ambition"

business_rules:
  - "RATCHETED: 100% of play-produced commits MUST carry AI-authorship commit trailer — mandatory regardless of depth, driven by compliance.categories includes 'ai-usage-traceability' (AG-F004)"
  - "Evidence files must attribute every step to agent or user — step-level attribution is a non-negotiable audit requirement (AG-F004)"
  - "Every inferred decision must have tier-rationale in a decision manifest — Decision Surfacing Discipline (Defect 23) enforcement (AG-F005)"
  - "Compliance audit bundle must be generated on demand — mandatory when compliance.required=true (AG-F006)"
  - "Audit bundle must include intent, scope, epics, evidence, decisions — complete artifact chain; incomplete bundles are a compliance defect (AG-F006)"
  - "decision-manifest.yaml is written BEFORE any primary artifact — write order is enforced in all decision-producing skills"

hypothesis: >
  We believe that enforcing AI-authorship commit trailers on 100% of play-produced commits
  and recording every inferred decision in a decision manifest for compliance officers and
  software engineers operating Garura will result in a fully auditable AI-vs-human
  attribution chain reviewable on demand. We will know this is true when zero play-produced
  commits lack an AI-authorship trailer and zero inferred decisions lack a decision manifest
  entry in a 30-day window.

assumptions_requiring_validation:
  - "The commit hook can be installed universally as part of the first-run onboarding (EE-F012) — if some play execution contexts (Factory Droids, CI mode) do not run the hook, the 100% enforcement target is unreachable without harness-specific solutions"
  - "All 42+ plays that produce commits have been identified and audited — if there are commit-producing plays not yet catalogued, the coverage sweep in this epic's appetite will miss them"
  - "Decision Surfacing Discipline can be enforced via agent system prompt without a runtime gating mechanism — if agents bypass the prompt rule, silent decisions will occur without a technical gate"

dependencies:
  - "Commit hook installation as part of EE-F012 first-run onboarding — the attribution hook must be installed during garura init; this is a dependency on the first-run-onboarding epic"

depends_on:
  - "EPIC-agentic-methodology-component-arch-001"

