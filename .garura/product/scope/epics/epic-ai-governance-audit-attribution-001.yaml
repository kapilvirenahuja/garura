# epic-ai-governance-audit-attribution-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.
# RATCHET: compliance.categories includes 'ai-usage-traceability' — commit-trailer enforcement
# is mandatory regardless of depth selection.

id: "EPIC-ai-governance-audit-attribution-001"
domain: "ai-governance"
capability: "AG-F004"

intent:
  goal: >
    A compliance officer reviewing a solo-developer Garura project can confirm that 100% of
    commits produced by plays carry an AI-authorship trailer and every inferred decision is
    recorded in a decision manifest with a tier rationale — making the AI-vs-human attribution
    chain auditable on demand.
  constraints:
    - "The commit hook adds less than 200 milliseconds to commit time."
    - "Audit bundle generation completes in less than 30 seconds for a typical 30-day evidence set."
    - "OWASP ASVS Level 1 baseline — attribution artifacts are internal git objects; no external auth surface; TLS 1.3 for any remote audit bundle delivery."
    - "WCAG 2.1 AA — applies to any user-interface rendering of an audit report."
    - "AI-usage-traceability (ratcheted) — 100% of commits produced by plays must carry an AI-authorship trailer regardless of depth; this is a mandatory business rule, not a best-effort target."
    - "Audit-trail — every inferred decision has a tier rationale recorded in the decision manifest before the primary artifact is written; zero silent resolutions."
    - "Compliance audit bundle is generated on demand and includes intent, scope, epics, evidence, and decisions."
  failure_scenario:
    - "A commit hook is not invoked because the hook is not installed or is misconfigured — a play-produced commit lands in the repository without an AI-authorship trailer."
    - "A developer resolves an inferred decision during a play run without writing it to the decision manifest — the decision exists only in conversation history and the audit trail is broken."
    - "A compliance officer requests an audit bundle and symlinked artifacts are not resolved — the bundle ships incomplete and may invalidate the audit."
    - "Attribution data in evidence files is modified after the fact and tampered evidence cannot be detected because version 1 does not have tamper-evident storage."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "developer running any Garura play that produces a commit"
      given: "the commit lands in the repository"
      then: "the commit message carries a valid AI-authorship trailer on 100% of commits produced by plays in a 30-day window."
      measure: "git log over the 30-day window shows an AI-authorship trailer on every play-produced commit; trailer matches the canonical format; zero play-produced commits missing a trailer found by the attribution audit script."
    - id: S2
      persona: "compliance officer or software engineer reviewing a spec run or any inferred-decision-producing play"
      given: "the run completes"
      then: "a decision manifest exists at the expected path with one entry per inferred decision, and every entry has a non-null tier, grounding source, and recommendation field."
      measure: "Decision manifest present at the play-specified output path; entry count equals the count of inferred decisions tracked in the play's decision log; every entry has tier non-null, grounding_source.kind non-null, and recommendation length greater than 0."
  recovery:
    - id: REC1
      for_failure_scenario: "A commit hook is not invoked because the hook is not installed or is misconfigured — a play-produced commit lands in the repository without an AI-authorship trailer."
      trigger: "git log shows a play-produced commit missing the AI-authorship trailer; or the ship and commit-code plays detect the hook is not installed at pre-commit validation."
      direction: "The ship and commit-code plays verify the hook is installed before the first commit attempt; a missing hook is a blocking failure, not a warning; hook installation is part of the first-run onboarding and must be reinstalled if missing."
      handoff: human
      derivable_at_l4: false
    - id: REC2
      for_failure_scenario: "A developer resolves an inferred decision during a play run without writing it to the decision manifest — the decision exists only in conversation history and the audit trail is broken."
      trigger: "The decision-surfacing audit finds decisions in conversation history with no corresponding decision manifest entry; or a play completes with primary artifacts written but no manifest file at the expected path."
      direction: "The decision-surfacing rule lives in the agent system prompt: every inferred decision goes to the decision manifest before the primary artifact is written; all decision-producing skills write the manifest first, then the primary artifact; when a gap is detected, the manifest is backfilled before the audit bundle is generated."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC3
      for_failure_scenario: "A compliance officer requests an audit bundle and symlinked artifacts are not resolved — the bundle ships incomplete and may invalidate the audit."
      trigger: "The audit bundle manifest lists symlink paths rather than resolved file contents; the auditor finds missing artifacts in the bundle."
      direction: "Symlink resolution in the audit bundle generator resolves all symlinks to their target files before bundle packaging; the bundle manifest lists resolved paths only; on error the developer re-runs bundle generation with symlink resolution enabled before delivering to the auditor."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_scenario: "Attribution data in evidence files is modified after the fact and tampered evidence cannot be detected because version 1 does not have tamper-evident storage."
      trigger: "The auditor reports evidence file contents inconsistent with the git commit log; or an internal review detects evidence file modification timestamps later than the originating commit."
      direction: "Version 1 documents this gap explicitly in the audit bundle's limitations section; tamper-evident storage is the advanced-depth target for the attribution and decision-provenance features (post-version-1); when triggered, a human investigates the modification and reconstructs the original evidence from git history."
      handoff: human
      derivable_at_l4: false

connections:
  before_chain:
    intents:
      - "EPIC-agentic-methodology-component-arch-001"
      - "EPIC-engineering-experience-first-run-onboarding-001"
  after:
    intents: []
  peers:
    intents: []
  dependency_check: "All before_chain epics carry expectations.vetted.status: approved and post_implementation.status: delivered before this epic begins. Specifically, the AI-authorship commit hook must be installed during the first-run onboarding before this epic's enforcement can run."

