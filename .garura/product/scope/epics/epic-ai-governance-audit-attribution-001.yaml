id: "EPIC-ai-governance-audit-attribution-001"
domain: "ai-governance"
capability: "AG-F004"

provenance:
  source: brief_explicit
  source_quote: "ai-governance / audit-attribution (AG-F004/F005/F006) — ratchet applied: ai-usage-traceability compliance category fires commit-trailer enforcement"
  confidence: high

problem_statement: >
  AI coding tool workflows produce commits, evidence files, and decisions with no persistent
  attribution chain distinguishing AI-generated from human-authored actions. Market brief
  gap 2 confirms: as of April 2026, no major AI coding tool (GitHub Copilot, Cursor, Windsurf)
  provides a built-in compliance surface with AI-vs-human attribution traces (validated via
  Augment Code SOC2 guide, Probo compliance guide). The compliance ratchet fires for this
  product: profile compliance.categories includes 'ai-usage-traceability', mandating 100%
  of play-produced commits carry an AI-authorship commit trailer. Current status is PARTIAL —
  commit-level attribution is not yet enforced across all 42 plays. For a solo contributor,
  every unattributed AI commit represents a 100% attribution gap for that commit with no
  human-authored commits to triangulate from.

intents:
  - >
    Ensure 100% of play-produced commits carry an AI-authorship commit trailer and every
    inferred decision is recorded in a decision manifest with tier-rationale, making the
    AI-vs-human attribution chain auditable on demand for compliance officers reviewing
    a solo-dev Garura-managed project.

intent_lock:
  locked_at: "2026-04-18T05:00:00Z"
  intent_hash: "sha256:66b8f1898dbd9614184a50d15e9fb8e86fb31503b567a6fec315232092ad183c"
  locked_by: "specify-product-stage-5-validate"
  immutability_note: >
    Intent content is immutable after lock. Post-v1 drift requiring a scope change must
    be handled via a Product-Drift successor epic, not by editing this intent block. The
    features[] ledger and epic_status rollup below may evolve as capabilities move through
    PLANNED → PARTIAL → LIVE; the intent itself is sealed.

appetite: "2 weeks"

in_scope:
  - "AG-F004 AI-Authorship Attribution at Standard depth: commit hook enforcement on 100% of play-produced commits; pre-commit validation in ship/commit-code plays; evidence files attribute every play step to agent or user"
  - "AG-F005 Decision Provenance at Standard depth: decision-manifest.yaml produced on every specify-product run and every inferred-decision-producing play; every decision has tier-rationale (high/mid/low) with grounding source"
  - "AG-F006 Evidence Export at Standard depth: compliance audit bundle generated on demand; bundle includes intent, scope, epics, evidence, decisions in a structured artifact set"
  - "Coverage sweep: audit all 42+ plays that produce commits and verify commit hook invocation on each"
  - "Decision Surfacing Discipline (DSD) enforcement: zero inferred decisions resolved silently — all go to decision-manifest.yaml before primary artifact write"

anti_goals:
  - "Line-level AI attribution — Advanced depth for AG-F004; requires significant storage and diff-tool complexity; no external regulation demands line-level in v1"
  - "Tamper-evident signed attestation — Advanced/Enterprise depth for AG-F005/F006; post-v1 when external regulations (SOC2, ISO27001) enter scope"
  - "SOC2 / ISO27001 auditor template adapters — post-v1; AG-F006 roadmap item for the enterprise milestone (Jul 2026)"
  - "Historical replay with divergence analysis — Enterprise depth for AG-F005; post-v1 when external regulations require historical audit depth"
  - "GDPR or HIPAA compliance adapters — external_regulations_in_scope_v1=[] confirms these are out of v1 scope"

must_not_break:
  - "EPIC-agentic-methodology-component-arch-001 — the evidence substrate (AM-F009) is the foundation for attribution; the commit hook must not interfere with the evidence self-commit pipeline"
  - "Existing commit hook behavior — the AI-authorship trailer must be appended without breaking existing commit message formats, CI parse rules, or changelog generators"

foundation_investment: false

