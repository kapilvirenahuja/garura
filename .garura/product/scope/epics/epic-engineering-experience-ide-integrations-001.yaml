appetite: "2 weeks"

in_scope:
  - "EE-F001 Claude Code Integration at Standard depth: sync-claude completes with zero drift on 100% of runs; every modified component available in Claude Code within 30s of sync; local-edit conflict detection before overwrite"
  - "EE-F004 Factory Droids Sync at Standard depth: sync-droids completes reliably; parity tests pass on all core plays; governance signals (AI-authorship, token count, invocation context) captured and retrievable in audit trail"
  - "EE-F005 Codex CLI Adapter at Standard depth: CLI adapter delivers script-friendly output format; CI-mode behavior is deterministic with no interactive prompts; non-interactive policy pre-approvals for CI-invoked plays"
  - "Invocation-context capture in sync-droids: every Factory Droid play execution records the AI-authorship trailer equivalent for the Droid context"

anti_goals:
  - "Advanced update/upgrade flow with drift detection for EE-F001 — post-v1; v1 scope is the Standard sync-claude deployment only"
  - "Multi-tenant Claude Code with governance — Enterprise depth; post-v1 enterprise milestone (Jul 2026)"
  - "JetBrains, VS Code, or other IDE-specific adapters — v1 targets Claude Code as the reference harness only; other IDEs are post-v1"
  - "Real-time sync without explicit /sync-claude invocation — always-on sync is a post-v1 enhancement"

must_not_break:
  - "EPIC-agentic-methodology-component-arch-001 — sync-claude is the deployment mechanism for the three-layer hierarchy; a sync failure that corrupts deployed components breaks all plays"
  - "EPIC-engineering-experience-cli-slash-commands-001 — /sync-claude runs the same pipeline as the first-run bootstrap; any sync change must preserve /help discoverability and command registry integrity"
  - "User-customized components in ~/.claude/ — sync must not overwrite local modifications without a Tether/Vanish gate"

