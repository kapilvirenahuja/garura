    value: "sync-claude completes in < 30s; sync-droids parity tests complete in < 2 minutes; Codex CLI non-interactive play exits within the same timeout as interactive mode"
    source_for_quantification:
      source: kb_default
      source_reference: "kb.engineering-experience.EE-F001.success_criteria[0]; 30s derived from developer workflow cadence threshold"
      user_grounded: true
