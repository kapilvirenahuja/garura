  security:
    value: "OWASP ASVS Level 1 — sync operates on local file system; no external network calls except to npm registry; TLS 1.3 for all remote sync endpoints; Factory Droid credentials stored in environment variables, not in play files"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.security_level=elevated maps to OWASP ASVS Level 1 for local deployment surfaces"
  accessibility:
    value: "WCAG 2.1 AA — sync and CLI adapter output is terminal text; AA constraint inherited for any UI-rendered sync status"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.audience includes designers and PMs; WCAG 2.1 AA is the org-wide baseline"
  compliance:
