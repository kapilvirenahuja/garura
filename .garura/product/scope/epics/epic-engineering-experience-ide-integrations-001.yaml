business_rules:
  - "Mandatory for Garura — Claude Code is the reference harness where every play and agent runs (EE-F001); sync-claude is the sole deployment mechanism"
  - "sync-claude is read-only on ~/.claude/ relative to the source — no direct edits to deployed components allowed; all changes go through source then sync"
  - "Factory Droids are optional — conditional on org using Factory; selected because governance signal capture is required by ai-usage-traceability compliance category (EE-F004)"
  - "Codex CLI adapter is optional — conditional on CI-driven workflow; selected for CI integration completeness (EE-F005)"
  - "invocation-context capture in sync-droids is non-optional once Factory Droid support is enabled — governance gap is a compliance blocker"

hypothesis: >
  We believe that delivering zero-drift sync, governance-signal capture for Factory Droids,
  and non-interactive CI mode for Codex CLI for software engineers and platform engineers
  operating Garura harnesses will result in every harness always running the source-authoritative
  version of every component with complete governance attribution. We will know this is true
  when zero drift reports appear across 100% of /sync-claude runs and 100% of Factory Droid
  executions produce a governance signal record in a 30-day window.

assumptions_requiring_validation:
  - "Factory Droids expose sufficient invocation-context APIs for Garura to capture AI-authorship identifiers — if the Factory Droid API does not expose invocation context, the governance signal capture cannot be implemented at Standard depth"
  - "Codex CLI exposes a non-interactive mode that Garura can detect and use for policy pre-approvals — this has not been verified against the Codex CLI v1 API"
  - "sync-claude's conflict detection can distinguish user-intentional customizations from accidental file modifications — false positives (treating normal file updates as customizations) would make sync unusable"

dependencies:
  - "Factory Droids API documentation — EE-F004 requires understanding the Factory invocation-context API for governance signal capture"
  - "Codex CLI non-interactive mode specification — EE-F005 requires a stable non-interactive mode API"

