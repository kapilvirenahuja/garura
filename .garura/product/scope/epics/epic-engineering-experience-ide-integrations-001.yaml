expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "developer who has modified a play source file in core/components/"
      given: "they run /sync-claude"
      then: "every modified component is available in Claude Code within 30s and the sync status output shows 0 unexpected changes and 0 errors"
