# epic-engineering-experience-ide-integrations-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.

id: "EPIC-engineering-experience-ide-integrations-001"
domain: "engineering-experience"
capability: "EE-F001"

intent:
  goal: >
    A developer using any supported harness — Claude Code, Factory Droids, or the Codex
    command-line interface — sees every component update reflected within 30 seconds of running
    the sync play, gets governance signals captured on 100% of Factory Droid runs, and gets
    deterministic non-interactive behavior on Codex command-line continuous-integration runs.
  constraints:
    - "The Claude Code sync play completes in under 30 seconds."
    - "Factory Droid parity tests complete in under 2 minutes."
    - "A Codex command-line non-interactive play exits within the same timeout as the interactive mode."
    - "OWASP ASVS Level 1 baseline — sync operates on the local file system; no external network calls except to the npm registry; TLS 1.3 for all remote sync endpoints; Factory Droid credentials live in environment variables, not in play files."
    - "WCAG 2.1 AA — applies to any user-interface rendering of sync status."
    - "AI-usage-traceability — Factory Droid runs capture invocation context so AI-authorship attribution carries through; zero Droid-produced commits without governance signals."
    - "The sync play is read-only on the deployed components relative to the source — no direct edits to deployed components; all changes go through source then sync."
  failure_scenario:
    - "A developer with a customized component in the global Claude folder runs the sync play without conflict detection — the customized component is silently overwritten."
    - "A Factory Droid run does not have invocation-context capture implemented — AI-generated commits from Droids carry no AI-authorship trailer."
    - "A Codex command-line invocation of a Garura play in continuous-integration mode reaches a Tether or Vanish gate and hangs indefinitely waiting for user input."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "developer who has modified a play source file in the components directory"
      given: "they run the sync play"
      then: "every modified component appears in Claude Code within 30 seconds and the sync status output reports 0 unexpected changes and 0 errors."
      measure: "Sync play exits 0; modified components appear in the global Claude folder with matching checksums; sync duration under 30 seconds measured from invocation to completion; status output shows a diff of changed files and a '0 unexpected changes' summary."
    - id: S2
      persona: "Factory Droid run executing any core Garura play in a continuous-integration pipeline"
      given: "the run completes"
      then: "the play's governance signals (AI-authorship identifier, token count, invocation timestamp) are captured in the audit trail and retrievable via the evidence export."
      measure: "Governance signal record exists in the audit trail for 100% of Factory Droid play executions; record contains AI-authorship identifier, token count, invocation timestamp, and play name; verified by querying the audit trail after a Factory Droid pilot run."
  recovery:
    - id: REC1
      for_failure_scenario: "A developer with a customized component in the global Claude folder runs the sync play without conflict detection — the customized component is silently overwritten."
      trigger: "The developer notices unexpected behavior change in Claude Code after sync; the sync output shows a modified component that the developer had customized."
      direction: "Conflict detection before sync: the sync play checksums all local components against source before any write; any local modification triggers a Tether approval gate showing the diff before overwrite proceeds; if already overwritten, restore from source and re-apply customizations."
      handoff: human
      derivable_at_l4: false
    - id: REC2
      for_failure_scenario: "A Factory Droid run does not have invocation-context capture implemented — AI-generated commits from Droids carry no AI-authorship trailer."
      trigger: "git log shows Droid-produced commits without AI-authorship trailers; or audit-trail query returns no governance signal records for Droid executions."
      direction: "Invocation-context capture must be implemented in the Droid sync play before Factory Droid functionality is enabled for any production use; governance signal capture is a blocking requirement; when detected post-production, disable Factory Droid runs until invocation-context capture is implemented and backfill any missing trailer records manually."
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_scenario: "A Codex command-line invocation of a Garura play in continuous-integration mode reaches a Tether or Vanish gate and hangs indefinitely waiting for user input."
      trigger: "The continuous-integration pipeline shows a hanging Garura play step with no activity after the expected completion time."
      direction: "A non-interactive mode flag in the Codex command-line adapter; policy pre-approvals configured before continuous-integration plays run; any play reaching a Tether or Vanish gate in non-interactive mode emits a structured failure immediately rather than waiting for input; kill the hanging step and configure policy pre-approvals before re-running."
      handoff: human
      derivable_at_l4: false

connections:
  before_chain:
    intents:
      - "EPIC-agentic-methodology-component-arch-001"
  after:
    intents: []
  peers:
    intents:
      - "EPIC-engineering-experience-cli-slash-commands-001"
  dependency_check: "All before_chain epics carry expectations.vetted.status: approved and post_implementation.status: delivered before this epic begins."

provenance:
  source:
    kind: brief_explicit
    quote: "engineering-experience / ide-integrations (EE-F001 LIVE, EE-F004 PARTIAL, EE-F005 PARTIAL) — Stage-3 user input reconciled against Stage-1/2 ground truth"
    confidence: high
  appetite: "2 weeks"
  business_rules:
    - "Mandatory for Garura — Claude Code is the reference harness where every play and agent runs; the sync play is the sole deployment path."
    - "The sync play is read-only on deployed components relative to source — no direct edits to deployed components; all changes go through source then sync."
    - "Factory Droids are optional — conditional on the org using Factory; selected because governance signal capture is required by the ai-usage-traceability compliance category."
    - "The Codex command-line adapter is optional — conditional on continuous-integration-driven workflow; selected for continuous-integration completeness."
    - "Invocation-context capture in the Droid sync play is non-optional once Factory Droid support is enabled — governance gap is a compliance blocker."
    - "Factory Droid invocation-context capture depends on the Factory invocation-context interface."
    - "The Codex command-line non-interactive behavior depends on a stable non-interactive mode in the Codex command-line interface."
  kb_source:
    capability: "EE-F001"
    rules_applied:
      - "EE-F001 mandatory-conditional — Garura is the product; Claude Code is the reference harness."
      - "EE-F004 optional-conditional — org uses Factory Droids; governance-signal capture mandatory when enabled."
      - "EE-F005 optional-conditional — continuous-integration-driven workflow; non-interactive mode required."
      - "Sync is read-only — no direct edits to deployed components."
      - "Invocation-context capture — required for Factory Droid governance compliance."
    experiential_warnings:
      - "Editing the global Claude folder directly instead of source then sync."
      - "Missing invocation-context capture for Factory Droid runs (attribution gap risk)."
  uses_mocks: false
  demock_epic_ref: null
  foundation_investment: false
