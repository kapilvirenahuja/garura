    - id: S2
      persona: "Factory Droid run executing any core Garura play in a CI pipeline"
      given: "the run completes"
      then: "the play's governance signals (AI-authorship identifier, token count, invocation timestamp) are captured in the audit trail and retrievable via the AG-F006 evidence export"
      measure: "governance signal record exists in the audit trail for 100% of Factory Droid play executions; record contains: AI-authorship identifier, token count, invocation timestamp, play name; verified by querying the audit trail after a Factory Droid pilot run"
  recovery:
    - id: REC1
      for_failure_condition: "A developer with a customized component in ~/.claude/ runs /sync-claude without conflict detection, causing the customized component to be silently overwritten"
      trigger: "developer notices unexpected behavior change in Claude Code after sync; /sync-claude exit shows a modified component that the developer had customized"
      direction: "Conflict detection before sync: /sync-claude checksums all local components against source before any write; any local modification triggers a Tether/Vanish gate showing the diff before overwrite proceeds; if already overwritten, restore from source and re-apply customizations"
      handoff: human
      derivable_at_l4: false
    - id: REC2
      for_failure_condition: "A Factory Droid run does not have invocation-context capture implemented, causing AI-generated commits from Droids to carry no AI-authorship trailer"
      trigger: "git log shows Droid-produced commits without AI-authorship trailers; or audit trail query returns no governance signal records for Droid executions"
      direction: "invocation-context capture must be implemented in sync-droids before Factory Droid functionality is enabled for any production use; governance signal capture is a blocking requirement for EE-F004 completion; when detected post-production, disable Factory Droid runs until invocation-context capture is implemented and backfill any missing trailer records manually"
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_condition: "A Codex CLI invocation of a Garura play in CI mode reaches a Tether/Vanish gate and hangs indefinitely waiting for user input"
      trigger: "CI pipeline run shows a hanging Garura play step with no activity after the expected completion time"
      direction: "Non-interactive mode flag in Codex CLI adapter; policy pre-approvals configured before CI-mode plays run; any play reaching a Tether/Vanish gate in non-interactive mode emits a structured failure immediately rather than waiting for input; kill the hanging CI step and configure policy pre-approvals before re-running"
      handoff: human
      derivable_at_l4: false
