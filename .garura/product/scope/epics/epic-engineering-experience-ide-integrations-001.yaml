id: "EPIC-engineering-experience-ide-integrations-001"
domain: "engineering-experience"
capability: "EE-F001"

provenance:
  source: brief_explicit
  source_quote: "engineering-experience / ide-integrations (EE-F001 LIVE, EE-F004 PARTIAL, EE-F005 PARTIAL) — Stage-3 user input reconciled against Stage-1/2 ground truth"
  confidence: high

problem_statement: >
  When a developer deploys updated plays, agents, or skills via /create-play or
  direct source edits, the harness (Claude Code, Factory Droids, Codex CLI) continues
  running the stale version until an explicit sync. Without reliable drift detection and
  idempotent sync across all three harnesses, every component update is a deployment
  risk — the developer cannot trust that the behavior they observe in Claude Code matches
  the source they authored. The compliance-critical failure: governance data is missing
  from Factory Droid runs when sync-droids does not capture invocation context —
  AI-generated commits from Droids carry no authorship trailer, violating the
  ai-usage-traceability compliance category.

intents:
  - >
    Ensure every component update is reflected in Claude Code within 30s of /sync-claude
    with zero drift, Factory Droid runs capture governance signals on 100% of executions,
    and a Codex CLI adapter delivers deterministic CI-mode behavior for script-driven workflows.

