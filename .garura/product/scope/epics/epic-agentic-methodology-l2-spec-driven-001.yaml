business_rules:
  - "Mandatory when industry=developer-tools and methodology in product idea (AM-F010) — maturity ladder is the backbone of Garura's differentiation"
  - "Mandatory for any cross-session AI methodology product (AM-F011) — persistent memory is the architectural differentiator vs Copilot/Cursor/Windsurf"
  - "Mandatory for L2+ projects (AM-F012) — spec-to-test chain is the core L2 promise"
  - "Minimum 2 success scenarios + 2 failure conditions per capability — validator enforces this before lock"
  - "Per-capability level drift must stay below 10% of all active capabilities"
  - "check-drift detects ≥ 90% of spec-vs-implementation divergences — enforcement via scheduled post-merge run"

hypothesis: >
  We believe that delivering a persistent maturity-ladder engine with spec-lock gate
  enforcement and drift detection for software engineers operating at L2 delivery ambition
  will result in 100% of locked intent epics passing schema validation with zero silent
  spec-drift reaching implementation. We will know this is true when validate-intent-epics
  exits 0 on every locked epic in a 30-day window and check-drift surfaces ≥ 90% of
  introduced divergences in pilot runs.

assumptions_requiring_validation:
  - "The spec-lock gate is tight enough to block all shallow epics — this assumes the validate-intent-epics schema covers all field-level quality signals; a missed validation rule would allow shallow epics through"
  - "check-drift's divergence detection algorithm catches the most common spec-vs-implementation drift patterns in YAML/Markdown artifacts; this has not been verified across all diff types"
  - "STM→LTM promotion via distill/capture-learning covers all promotion use cases — this assumes developers do not need to promote artifacts outside the play-managed workflows"

