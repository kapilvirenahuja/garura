expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "developer invoking the spec-lock gate (/specify-product Stage 5 validate step)"
      given: "an intent epic authored for any Garura v1 capability"
      then: "validate-intent-epics exits 0 with 0 blocking violations in 100% of runs"
      measure: "validate-intent-epics exit code 0 on every locked epic in a 30-day window; tracked by CI evidence artifacts produced by the validate step — any non-zero exit triggers a blocking failure recorded in the play's status.json"
    - id: S2
      persona: "developer running check-drift post-merge on a branch that diverges from a previously locked spec"
      given: "a spec previously locked and an implementation branch that diverges from it"
      then: "≥ 90% of spec-vs-implementation divergences are surfaced as actionable findings in the drift report within 5 minutes"
      measure: "drift detection precision ≥ 90% measured across pilot runs where divergences were artificially introduced and check-drift was run; each detected divergence produces a finding entry in the drift report with a specific field reference"
  recovery:
    - id: REC1
      for_failure_condition: "A team declares L3 delivery ambition and continues shipping without sealed intent artifacts, causing the lock-gate trust to collapse and downstream skills to accept partial intents producing shallow outputs"
      trigger: "validate-intent-epics exits non-zero during Stage 5; or downstream design/implementation artifacts contain shallow content derived from unsealed intents"
      direction: "Lock-gate enforcement is hard: validate-intent-epics must exit 0 before any downstream Stage 5/6 skill can proceed; the play halts on non-zero exit with explicit failure evidence identifying the specific field violations requiring remediation"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_condition: "A manual STM→LTM promotion copies artifacts without the canonical canonicalization pass, causing silent drift between STM evidence and LTM canonical content"
      trigger: "LTM content reviewer notices drift between STM evidence files and promoted LTM content; or a downstream skill produces output inconsistent with expected LTM canonical state"
      direction: "distill and capture-learning plays enforce canonicalization before promotion; manual promotions are explicitly discouraged in CLAUDE.md; the AG-F010 promotion workflow gap is tracked as a known v1 limitation requiring human remediation when triggered"
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_condition: "An upstream intent.yaml change occurs and check-drift is not run before the next feature implementation, causing tests to pass against stale scenarios that no longer reflect the revised intent"
      trigger: "test suite passes but a spec review reveals stale scenario references; or check-drift surfaces divergences in a delayed run after implementation has already proceeded"
      direction: "check-drift scheduled post-merge run in the merge-pr play prevents this by detecting drift immediately after merge; propagation gap is documented as a v1 known limitation with scheduled check as mitigation; when triggered, requires human review of test-vs-spec alignment and scenario updates"
      handoff: human
      derivable_at_l4: false
