id: "EPIC-agentic-methodology-l2-spec-driven-001"
domain: "agentic-methodology"
capability: "AM-F010"

provenance:
  source: brief_explicit
  source_quote: "agentic-methodology / l2-spec-driven (LIVE) — Stage-3 user input; delivery_ambition.current_level: L2-spec-driven"
  confidence: high

problem_statement: >
  When an AI-assisted development session ends, all spec decisions — which capabilities
  to build, which constraints to enforce, which scenarios to validate — are discarded.
  Without a persistent maturity-ladder engine, teams re-litigate the same architectural
  questions in every new session, with no record of the constraints that shaped prior
  decisions. Market brief gap 4 confirms: no AI coding tool connects spec decisions to
  test generation in a persistent artifact chain (MemNexus Feb 2026, Cuckoo Network Jun 2025).
  The concrete failure: when an intent.yaml changes upstream, downstream scenarios are not
  updated — tests pass against stale specs silently, with no second reviewer on a solo project.

intents:
  - >
    Ensure 100% of intent epics pass validate-intent-epics schema validation before the
    spec-lock gate, and check-drift detects ≥ 90% of spec-vs-implementation divergences
    post-merge within the same session.

intent_lock:
  locked_at: "2026-04-18T05:00:00Z"
  intent_hash: "sha256:a1eba95180e99dbf8e42a25ddca1ce1a00a9da1c585553f03c2b3ccce8e439dc"
  locked_by: "specify-product-stage-5-validate"
  immutability_note: >
    Intent content is immutable after lock. Post-v1 drift requiring a scope change must
    be handled via a Product-Drift successor epic, not by editing this intent block. The
    features[] ledger and epic_status rollup below may evolve as capabilities move through
    PLANNED → PARTIAL → LIVE; the intent itself is sealed.

appetite: "2 weeks"

in_scope:
  - "AM-F010 Maturity Ladder Engine at Advanced depth: per-capability level declaration, per-capability climbing enforcement, level-up transition with zero schema-breaking changes in ≥ 95% of transitions"
  - "AM-F011 Persistent Memory Substrate at Advanced depth: STM→LTM promotion workflow completion; 100% of memory writes conform to folder whitelist"
  - "AM-F012 Spec-to-Test Continuity at Advanced depth: spec-lock gate enforcement (validate-intent-epics blocks non-schema-valid epics), check-drift scheduled run detecting ≥ 90% of spec-vs-implementation drift"
  - "Minimum 2 success scenarios + 2 failure conditions per capability — validator enforces this gate before lock"
  - "Per-capability level drift monitoring: level drift below 10% of all active capabilities"

anti_goals:
  - "Enterprise memory governance (access control, retention policy, multi-team memory sharing) — deferred to post-v1 per AG-F008 Q3 decision"
  - "Automated upstream-to-downstream intent propagation — propagation automation is a planned post-v1 gap; v1 delivers detection (check-drift) not automated propagation"
  - "Brownfield STM→LTM migration tooling — the May 2026 brownfield milestone owns this surface"
  - "L4 signal-driven or L5 goal-driven maturity ladder rungs — Q2-Q3 2026 roadmap horizon; not in v1 scope"

must_not_break:
  - "EPIC-agentic-methodology-component-arch-001 — the three-layer hierarchy and evidence substrate must remain fully functional; l2-spec-driven builds on top of AM-F001 through AM-F009"
  - "Existing STM folder structure per ADR 017 — memory writes must continue to respect the whitelist; no new memory paths introduced without whitelist update"

