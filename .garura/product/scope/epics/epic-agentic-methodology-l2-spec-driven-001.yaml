success_scenarios:
  - scenario: >
      Given an intent epic authored for any Garura v1 capability, when the developer
      invokes the spec-lock gate (/specify-product Stage 5 validate step), then
      validate-intent-epics exits 0 with 0 blocking violations in 100% of runs.
    evidence: >
      validate-intent-epics exit code 0 on every locked epic in a 30-day window.
      Tracked by CI evidence artifacts produced by the validate step — any non-zero
      exit triggers a blocking failure recorded in the play's status.json.
  - scenario: >
      Given a spec previously locked and an implementation branch that diverges from it,
      when check-drift runs post-merge on that branch, then ≥ 90% of spec-vs-implementation
      divergences are surfaced as actionable findings in the drift report within 5 minutes.
    evidence: >
      Drift detection precision ≥ 90% measured across pilot runs where divergences were
      artificially introduced and check-drift was run. Each detected divergence produces
      a finding entry in the drift report with a specific field reference.

failure_scenarios:
  - scenario: >
      Given a team that has declared L3 delivery ambition, when they continue shipping
      without sealed intent artifacts (epics not validated before lock), then the
      lock-gate trust collapses and downstream skills accept partial intents producing
      shallow outputs.
    impact: >
      Downstream skills (generate-intent-epics, validate-intent-epics) receive partial
      intents and produce output that silently passes validation but fails downstream
      design and implementation checks. Solo-dev impact: no peer review to catch missing
      intent seals before they block the pipeline.
    mitigation: >
      Lock-gate enforcement is hard: validate-intent-epics must exit 0 before any
      downstream Stage 5/6 skill can proceed. The play halts on non-zero exit with
      explicit failure evidence.
  - scenario: >
      Given a manual STM→LTM promotion, when the promotion copies artifacts without
      the canonical canonicalization pass, then silent drift occurs between STM evidence
      and LTM canonical content.
    impact: >
      LTM loses ground truth; reviewers cannot trust LTM content. Solo-dev impact:
      all promotion decisions rest on one contributor — no second reviewer catches
      premature or missed promotions.
    mitigation: >
      distill and capture-learning plays enforce canonicalization before promotion.
      The AG-F010 promotion workflow gap is tracked as a known v1 limitation;
      manual promotions are explicitly discouraged in CLAUDE.md.
  - scenario: >
      Given an upstream intent.yaml change, when check-drift is not run before the
      next feature implementation, then tests pass against stale scenarios that no
      longer reflect the revised intent.
    impact: >
      False confidence: tests green, spec stale. The defect surfaces at the next
      spec-review cycle, not at the time of the change.
    mitigation: >
      check-drift scheduled post-merge run in the merge-pr play; propagation gap
      documented as a v1 known limitation with a scheduled check as mitigation.

