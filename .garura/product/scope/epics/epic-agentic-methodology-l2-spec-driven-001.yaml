# epic-agentic-methodology-l2-spec-driven-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.

id: "EPIC-agentic-methodology-l2-spec-driven-001"
domain: "agentic-methodology"
capability: "AM-F010"

intent:
  goal: >
    A developer operating Garura at the spec-driven level (L2) gets every locked intent epic
    through schema validation before the spec is sealed, and gets at least 90% of
    spec-vs-implementation divergences surfaced within the same session after a merge.
  constraints:
    - "Level-up transitions complete with zero schema-breaking changes on at least 95% of transitions."
    - "Drift detection surfaces findings within 5 minutes of a post-merge run."
    - "OWASP ASVS Level 1 baseline — persistent memory holds spec artifacts; no external auth; TLS 1.3 for any remote memory sync."
    - "WCAG 2.1 AA — applies to maturity-ladder status output and drift reports rendered in a user interface."
    - "Memory governance — all promotions from short-term memory to long-term memory follow the documented canonicalization workflow; no silent promotions."
    - "Every locked epic must carry at least 2 success scenarios and at least 2 failure scenarios before the lock gate accepts it."
    - "Per-capability level drift stays below 10% of all active capabilities."
  failure_scenario:
    - "A team declares L3 delivery ambition and ships without sealed intent artifacts — the lock-gate trust collapses and downstream skills accept partial intents that produce shallow outputs."
    - "A manual promotion from short-term memory to long-term memory copies artifacts without the canonicalization pass — silent drift opens between the short-term evidence and the long-term canonical content."
    - "An upstream intent file changes and drift detection is not run before the next feature lands — tests pass against stale scenarios that no longer reflect the revised intent."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "developer invoking the spec-lock gate at the spec validation step"
      given: "an intent epic authored for any Garura version-1 capability"
      then: "the validator exits 0 with zero blocking violations on 100% of runs in a 30-day window."
      measure: "Validator exit code 0 on every locked epic in a 30-day window; any non-zero exit triggers a blocking failure recorded in the play's status file."
    - id: S2
      persona: "developer running drift detection after a merge"
      given: "a previously locked spec and an implementation branch that diverges from it"
      then: "at least 90% of spec-vs-implementation divergences appear as actionable findings in the drift report within 5 minutes."
      measure: "Drift detection precision at least 90% across pilot runs where divergences were artificially introduced; each detected divergence produces a finding entry with a specific field reference."
  recovery:
    - id: REC1
      for_failure_scenario: "A team declares L3 delivery ambition and ships without sealed intent artifacts — the lock-gate trust collapses and downstream skills accept partial intents that produce shallow outputs."
      trigger: "The validator exits non-zero during the spec validation step; or downstream design and implementation artifacts contain shallow content derived from unsealed intents."
      direction: "Lock-gate enforcement is hard — the validator must exit 0 before any downstream stage proceeds; the play halts on non-zero exit with explicit failure evidence identifying the specific field violations that need remediation."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_scenario: "A manual promotion from short-term memory to long-term memory copies artifacts without the canonicalization pass — silent drift opens between the short-term evidence and the long-term canonical content."
      trigger: "A long-term memory reviewer notices drift between short-term evidence files and promoted content; or a downstream skill produces output inconsistent with expected long-term canonical state."
      direction: "The distill and capture-learning plays enforce canonicalization before promotion; manual promotions are discouraged in the project guide; the promotion workflow gap is tracked as a known version-1 limitation requiring human remediation when triggered."
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_scenario: "An upstream intent file changes and drift detection is not run before the next feature lands — tests pass against stale scenarios that no longer reflect the revised intent."
      trigger: "The test suite passes but a spec review reveals stale scenario references; or drift detection surfaces divergences in a delayed run after implementation has already proceeded."
      direction: "Drift detection runs post-merge inside the merge-pr play and catches drift immediately after merge; the propagation gap is documented as a known version-1 limitation with the scheduled check as mitigation; when triggered, a human reviews test-vs-spec alignment and updates the scenarios."
      handoff: human
      derivable_at_l4: false

connections:
  before_chain:
    intents:
      - "EPIC-agentic-methodology-component-arch-001"
  after:
    intents:
      - "EPIC-agentic-methodology-l3-intent-driven-001"
  peers:
    intents: []
  dependency_check: "All before_chain epics carry expectations.vetted.status: approved and post_implementation.status: delivered before this epic begins."

provenance:
  source:
    kind: brief_explicit
    quote: "agentic-methodology / l2-spec-driven (LIVE) — Stage-3 user input; delivery_ambition.current_level: L2-spec-driven"
    confidence: high
  appetite: "2 weeks"
  business_rules:
    - "Mandatory when industry is developer-tools and the product idea names a methodology — the maturity ladder is the backbone of Garura's differentiation."
    - "Mandatory for any cross-session AI methodology product — persistent memory is the architectural differentiator vs Copilot, Cursor, and Windsurf."
    - "Mandatory for level-2 (L2) projects and higher — the spec-to-test chain is the core L2 promise."
    - "Every locked epic carries at least 2 success scenarios and at least 2 failure scenarios — the validator enforces this before lock."
    - "Per-capability level drift stays below 10% of all active capabilities."
    - "Drift detection catches at least 90% of spec-vs-implementation divergences — enforced via the scheduled post-merge run."
  kb_source:
    capability: "AM-F010"
    rules_applied:
      - "AM-F010 mandatory-conditional — industry developer-tools plus methodology in product idea."
      - "AM-F011 mandatory-default — cross-session AI methodology product."
      - "AM-F012 mandatory-conditional — delivery_ambition.current_level at or above L2."
      - "Spec-lock gate — the validator blocks non-schema-valid epics."
      - "Drift detection — scheduled post-merge run."
    experiential_warnings:
      - "Declaring target level without staging artifact migrations."
      - "Writing short-term memory artifacts into long-term memory prematurely."
      - "Bypassing schema validation at write time."
      - "Editing downstream artifacts without re-validating upstream."
  uses_mocks: false
  demock_epic_ref: null
  foundation_investment: false
