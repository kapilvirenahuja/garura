failure_conditions:
  - "Intent schema accepts TBD as a placeholder in mandatory fields, allowing downstream plays to receive hollow artifacts with TBD values leaking into plans and designs"
  - "A cross-tree constraint references a feature ID not found in any domain-taxonomy file, causing scope auto-narrowing to fail with an orphan-reference error"
