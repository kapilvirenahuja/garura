expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "software engineer or product manager operating at L3 delivery ambition"
      given: "a specify-product run for any 9-capability product scope with a valid enriched capabilities file"
      then: "validate-intent-epics reports 0 blocking violations across all 9 generated epic files on the first run"
      measure: "validate-intent-epics exits 0 on the first run for ≥ 95% of specify-product executions in a 30-day window, measured by the validate step's exit code recorded in each run's status.json"
    - id: S2
      persona: "software engineer or product manager running specify-product Stage 3"
      given: "a specify-product Stage 3 run against any product scope with cross-tree constraints defined"
      then: "scope.yaml contains a constraint_trace section with one decision entry per CTC from the cross-tree-constraints file, including every constraint that did not fire with a documented reason for non-firing"
      measure: "constraint_trace entry count equals total CTC count from _cross-tree-constraints.yaml; every entry has a non-null decision field; verified by counting entries in the generated scope.yaml against the CTC file's constraint count"
  recovery:
    - id: REC1
      for_failure_condition: "Intent schema accepts TBD as a placeholder in mandatory fields, allowing downstream plays to receive hollow artifacts with TBD values leaking into plans and designs"
      trigger: "validate-intent-epics reports placeholder_value violations; design-exp or build-arch artifacts contain TBD-anchored values that fail implementation"
      direction: "Quantification regex in validate-intent-epics catches any non-numeric constraint value; no-TBD rule catches placeholder tokens across all string fields; pipeline blocks on first violation before downstream consumption"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_condition: "A cross-tree constraint references a feature ID not found in any domain-taxonomy file, causing scope auto-narrowing to fail with an orphan-reference error"
      trigger: "configure-capabilities returns orphan_reference error; specify-product Stage 3 stalls with no clear recovery path shown to the user"
      direction: "validate-kb-extension pre-flight checks every feature ID in every constraint before configure-capabilities runs; any dangling reference is a blocking failure emitted before the constraint walk begins, surfacing the specific missing ID and its referencing constraint"
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_condition: "A generated epic is missing a mandatory field, blocking the pipeline at Stage 5 and requiring manual inspection to identify the specific field"
      trigger: "validate-intent-epics reports missing_field violations with field-level detail; pipeline stalls at Stage 5"
      direction: "Template completeness check in generate-intent-epics verifies every mandatory field is non-null before the file is written; structured failure emitted with field-level detail if derivation fails, so the cycle-back to generate-intent-epics includes the specific field and its derivation gap"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_condition: "A generated epic's kb_source.capability points to a feature ID deprecated or renamed in the domain-taxonomy, severing the audit trail from epic to KB feature"
      trigger: "validate-intent-epics reports dangling_kb_source violations; downstream build-arch and design-exp cannot trace architectural decisions back to the KB source"
      direction: "validate-kb-extension pre-flight verifies all feature IDs in scope.yaml against the current domain files before generate-intent-epics runs; stale IDs are surfaced before epic writing begins, requiring the user to update the domain taxonomy or the capability reference"
      handoff: human
      derivable_at_l4: false
