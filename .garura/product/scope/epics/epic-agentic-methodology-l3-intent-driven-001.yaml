business_rules:
  - "Mandatory when delivery_ambition.roadmap_horizon >= L3 (AM-F013) — intent compilation machinery is required for the L3 pipeline"
  - "Mandatory when delivery_ambition.roadmap_horizon >= L3 (AM-F014) — intent inference is required to produce schema-valid intent.yaml"
  - "Mandatory for any specify-product run (AM-F015) — scope auto-narrowing is the configure-capabilities execution itself"
  - "Mandatory for any specify-product run at L3+ (AM-F016) — epic auto-generation is the generate-intent-epics skill execution"
  - "Mandatory for any L3+ product (WI-F007) — epic decomposition: one intent epic per enriched capability, every field KB-sourced"
  - "Intent schema: no TBD values — quantification regex must pass on all constraint fields; placeholder tokens are blocking violations"
  - "Every cross-tree constraint must be walked and recorded — non-firing constraints are recorded with their non-firing reason; zero CTCs skipped"

hypothesis: >
  We believe that automating intent compilation, intent inference, scope narrowing, and
  epic generation for software engineers and product managers operating at L3 delivery
  ambition will result in every specify-product run producing epics that pass
  validate-intent-epics with zero blocking violations on the first run. We will know
  this is true when validate-intent-epics exits 0 on the first run for ≥ 95% of
  specify-product executions in a 30-day window.

assumptions_requiring_validation:
  - "The enriched-capabilities pipeline produces sufficient structured data for generate-intent-epics to fill every mandatory epic field without user intervention — this assumes the KB research files for all 9 capabilities are complete enough to derive all mandatory fields"
  - "The constraint_trace format in scope.yaml is stable enough for downstream skills to parse reliably — any format change is a breaking change for enrich-capabilities, generate-intent-epics, and derive-quality-profile-from-epics"
  - "validate-intent-epics covers all the blocking failure modes that would cause downstream design or implementation stalls — if there are undiscovered validation rules, epics that look valid now may fail later"

