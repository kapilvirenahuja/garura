id: "EPIC-agentic-methodology-l3-intent-driven-001"
domain: "agentic-methodology"
capability: "AM-F013"

cross_cutting_justification: >
  This epic covers features from agentic-methodology (AM-F013 Intent Compilation,
  AM-F014 Intent Inference, AM-F015 Scope Auto-Narrowing, AM-F016 Epic Auto-Generation)
  and work-intelligence (WI-F007 Epic Decomposition). WI-F007 was reclassified from
  work-intelligence/backlog-lifecycle to agentic-methodology/l3-intent-driven per
  user Q2 decision in Stage 3 (see scope.yaml capability_classification_changes).
  The product scope explicitly names "L3 Intent-Driven" as a cross-file capability
  that encompasses the intent compilation, intent inference, scope narrowing, epic
  generation pipeline, and epic decomposition as a unified L3 substrate.
  Single-module-scope does not apply because WI-F007 is methodology substrate (not
  backlog tooling) and its KB source file is work-intelligence.md while its
  operational capability is agentic-methodology. Ownership is delineated:
  AM-F013/F014/F015/F016 are owned by the agentic-methodology domain; WI-F007
  retains its KB source in work-intelligence.md but is governed by this epic.

provenance:
  source: brief_explicit
  source_quote: "agentic-methodology / l3-intent-driven (PARTIAL → MOSTLY LIVE after WI-F007 inclusion) — Stage-3 user input + Q2"
  confidence: high

problem_statement: >
  Even teams using spec-driven methods hand-author epics that drift from their KB capability
  definitions — missing cross-tree constraints, using TBD placeholder values, and producing
  shallow scenarios that fail downstream validation. Without intent compilation (AM-F013),
  intent inference (AM-F014), scope auto-narrowing with explicit constraint walking (AM-F015),
  and capability-to-epic automation (AM-F016 + WI-F007), every specify-product run relies on
  manual selection that misses constraints and produces shallow epics. Market brief gap 4
  confirms: no AI coding tool connects the intent behind a feature to test generation in
  a persistent artifact chain. The concrete failure: a constraint referencing an unknown
  feature ID causes configure-capabilities to block with no clear recovery path.

intents:
  - >
    Ensure 100% of specify-product runs produce intent epics that pass validate-intent-epics
    with zero blocking violations on the first run, eliminating manual epic authoring for
    software engineers and product managers operating at L3 delivery ambition.

intent_lock:
  locked_at: "2026-04-18T05:00:00Z"
  intent_hash: "sha256:2e55c1e1644c06d13682de5257e43eeb6bcd22f931d0e279a00d28aeb94ae546"
  locked_by: "specify-product-stage-5-validate"
  immutability_note: >
    Intent content is immutable after lock. Post-v1 drift requiring a scope change must
    be handled via a Product-Drift successor epic, not by editing this intent block. The
    features[] ledger and epic_status rollup below may evolve as capabilities move through
    PLANNED → PARTIAL → LIVE; the intent itself is sealed.

appetite: "2 weeks"

in_scope:
  - "AM-F013 Intent Compilation at Advanced depth: /create-play compiles intent.yaml into executable plays; every Garura play is a compiled artifact from its reference/intent.yaml"
  - "AM-F014 Intent Inference at Advanced depth: intent-crafter/resolver agents produce schema-valid intent.yaml on ≥ 95% of runs; no TBD placeholders in mandatory fields"
  - "AM-F015 Scope Auto-Narrowing at Advanced depth: configure-capabilities produces scope.yaml with complete constraint_trace on 100% of specify-product Stage 3 runs; every CTC walked and its decision recorded"
  - "AM-F016 Epic Auto-Generation at Advanced depth: generate-intent-epics instantiates one schema-valid epic per enriched capability; 100% of generated epics pass validate-intent-epics"
  - "WI-F007 Epic Decomposition at Advanced depth: each enriched capability produces exactly one intent epic traceable to a real KB feature ID; every epic has ≥ 2 success scenarios + ≥ 2 failure conditions"
  - "Quantification regex enforcement on all constraint fields in generated epics"
  - "Cross-tree constraint walk completeness — zero CTCs skipped; every constraint recorded in constraint_trace including non-firing constraints"

anti_goals:
  - "Enterprise intent history or learned routing — requires security_level=high or critical; post-v1 L4/L5 roadmap horizon"
  - "Automated upstream intent-propagation to downstream test cases — detection (check-drift) not propagation; propagation automation is a post-v1 planned gap"
  - "Persona-specific intent decomposition — multi-persona epic splitting is post-v1; v1 produces one epic per capability regardless of persona count"
  - "Real-time intent inference during development (as opposed to at specify-product time) — post-v1 signal-driven feature"

must_not_break:
  - "EPIC-agentic-methodology-component-arch-001 — three-layer hierarchy and evidence substrate; this epic adds automation layers on top of the substrate"
  - "EPIC-agentic-methodology-l2-spec-driven-001 — spec-lock gate and check-drift; the L3 epic generates the artifacts that the L2 gate validates; the gate must remain functional"
  - "Existing scope.yaml constraint_trace format — downstream skills (enrich-capabilities, generate-intent-epics, derive-quality-profile-from-epics) parse this format; field renames are breaking changes"

