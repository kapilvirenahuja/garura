# epic-agentic-methodology-l3-intent-driven-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.
# Cross-cutting: covers agentic-methodology features AM-F013/F014/F015/F016 plus work-intelligence WI-F007
# (Epic Decomposition), governed by the agentic-methodology domain per Stage 3 Q2 decision.

id: "EPIC-agentic-methodology-l3-intent-driven-001"
domain: "agentic-methodology"
capability: "AM-F013"

intent:
  goal: >
    A software engineer or product manager operating Garura at the intent-driven level (L3) gets
    every intent epic produced by a spec run through schema validation on the first try, with
    zero blocking violations and no manual epic authoring.
  constraints:
    - "Epic generation completes all nine epics within 5 minutes."
    - "Epic validation completes the full batch within 2 minutes."
    - "OWASP ASVS Level 1 baseline — epic files are internal artifacts; no external auth surface; files land in the project memory folder whitelist."
    - "WCAG 2.1 AA — applies to any user-interface rendering of epic content."
    - "Audit trail — every spec run produces a decision manifest capturing every inferred decision with a tier rationale; zero silent resolutions."
    - "Intent files reject placeholder tokens — quantification regex must pass on all constraint fields."
    - "Every cross-tree constraint is walked and recorded — non-firing constraints are recorded with their non-firing reason; zero cross-tree constraints skipped."
  failure_scenario:
    - "The intent schema accepts a placeholder token in a mandatory field — downstream plays receive hollow artifacts with placeholder values leaking into plans and designs."
    - "A cross-tree constraint references a feature identifier not found in any domain file — scope auto-narrowing fails with an orphan-reference error and the spec run stalls with no clear recovery path."
    - "A generated epic is missing a mandatory field — the pipeline blocks at the spec validation stage and requires manual inspection to identify the specific field."
    - "A generated epic points its capability identifier at a feature that has been deprecated or renamed in the domain catalog — the audit trail from epic back to KB feature is severed."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "software engineer or product manager operating at the intent-driven level (L3)"
      given: "a spec run for a nine-capability product scope with a valid enriched-capabilities file"
      then: "the validator reports zero blocking violations across all nine generated epic files on the first run."
      measure: "Validator exits 0 on the first run for at least 95% of spec runs in a 30-day window — measured by the validation step's exit code recorded in each run's status file."
    - id: S2
      persona: "software engineer or product manager running the capability-configuration step"
      given: "a spec run against any product scope with cross-tree constraints defined"
      then: "the scope file carries a constraint trace with one decision entry per cross-tree constraint, including every constraint that did not fire and a documented reason for non-firing."
      measure: "Constraint-trace entry count equals total cross-tree constraint count from the constraints file; every entry has a non-null decision field; verified by counting entries against the constraints file count."
  recovery:
    - id: REC1
      for_failure_scenario: "The intent schema accepts a placeholder token in a mandatory field — downstream plays receive hollow artifacts with placeholder values leaking into plans and designs."
      trigger: "The validator reports placeholder-value violations; or downstream design and architecture artifacts contain placeholder-anchored values that fail implementation."
      direction: "The quantification regex in the validator catches any non-numeric constraint value; the no-placeholder rule catches placeholder tokens across all string fields; the pipeline blocks on the first violation before downstream consumption."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_scenario: "A cross-tree constraint references a feature identifier not found in any domain file — scope auto-narrowing fails with an orphan-reference error and the spec run stalls with no clear recovery path."
      trigger: "The capability-configuration step returns an orphan-reference error; the spec run stalls with no clear recovery path shown to the user."
      direction: "A pre-flight check verifies every feature identifier in every constraint before capability-configuration runs; any dangling reference is a blocking failure surfaced before the constraint walk, naming the specific missing identifier and its referencing constraint."
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_scenario: "A generated epic is missing a mandatory field — the pipeline blocks at the spec validation stage and requires manual inspection to identify the specific field."
      trigger: "The validator reports missing-field violations with field-level detail; the pipeline stalls at the spec validation stage."
      direction: "The template completeness check inside epic generation verifies every mandatory field is non-null before the file is written; a structured failure with field-level detail is emitted if derivation fails, so the cycle-back to epic generation carries the specific field and its derivation gap."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_scenario: "A generated epic points its capability identifier at a feature that has been deprecated or renamed in the domain catalog — the audit trail from epic back to KB feature is severed."
      trigger: "The validator reports dangling kb_source violations; downstream architecture and design steps cannot trace decisions back to the KB source."
      direction: "The KB-extension pre-flight verifies all feature identifiers in the scope file against the current domain files before epic generation runs; stale identifiers surface before epic writing begins, requiring the user to update the domain catalog or the capability reference."
      handoff: human
      derivable_at_l4: false

connections:
  before_chain:
    intents:
      - "EPIC-agentic-methodology-l2-spec-driven-001"
  after:
    intents:
      - "EPIC-work-intelligence-intent-driven-verification-001"
  peers:
    intents: []
  dependency_check: "All before_chain epics carry expectations.vetted.status: approved and post_implementation.status: delivered before this epic begins."

provenance:
  source:
    kind: brief_explicit
    quote: "agentic-methodology / l3-intent-driven (PARTIAL → MOSTLY LIVE after WI-F007 inclusion) — Stage-3 user input + Q2; cross-cutting scope spans agentic-methodology and work-intelligence per the L3 Intent-Driven product-scope item."
    confidence: high
  appetite: "2 weeks"
  business_rules:
    - "Mandatory when delivery_ambition.roadmap_horizon is at or above L3 — intent compilation machinery is required for the L3 pipeline."
    - "Mandatory when delivery_ambition.roadmap_horizon is at or above L3 — intent inference is required to produce a schema-valid intent file."
    - "Mandatory for any spec run — scope auto-narrowing is the capability-configuration execution itself."
    - "Mandatory for any spec run at L3 and above — epic auto-generation is the epic-generation skill execution."
    - "Mandatory for any L3 and above product — epic decomposition produces one intent epic per enriched capability, every field traceable to a KB source."
    - "Intent schema rejects placeholder values — quantification regex must pass on all constraint fields; placeholder tokens are blocking violations."
    - "Every cross-tree constraint is walked and recorded — non-firing constraints are recorded with their non-firing reason; zero constraints skipped."
  kb_source:
    capability: "AM-F013"
    rules_applied:
      - "AM-F013 mandatory-conditional — delivery_ambition.roadmap_horizon at or above L3 (Intent Compilation)."
      - "AM-F014 mandatory-conditional — delivery_ambition.roadmap_horizon at or above L3 (Intent Inference)."
      - "AM-F015 mandatory-default — any spec run (Scope Auto-Narrowing)."
      - "AM-F016 mandatory-default — any spec run at L3 and above (Epic Auto-Generation)."
      - "WI-F007 mandatory-conditional — any L3 and above product; KB source in work-intelligence."
      - "No-placeholder rule — placeholder tokens are blocking violations in the validator."
      - "Constraint-trace completeness — every cross-tree constraint walked and recorded including non-firing."
    experiential_warnings:
      - "Inlining implementation details in the intent file."
      - "Missing profile fields that cross-tree constraints depend on."
      - "Editing generated epics without re-validating against the schema."
  uses_mocks: false
  demock_epic_ref: null
  foundation_investment: false
