failure_conditions:
  - "A coverage tool output format changes in an npm dependency update and quality-check fails to parse the new format, silently exiting 0 with no coverage data"
  - "A developer facing lint-noise fatigue disables a lint rule globally without a documented justification, causing subsequent PRs to silently allow the suppressed issue type"
  - "A security scanner produces 200 findings including low-severity CVEs in transitive dependencies, overwhelming the developer and causing them to ignore the security signal entirely"
  - "A coverage percentage is high (e.g., 85%) but achieved by covering only the happy path, providing false confidence that the implementation is well-tested"

constraints:
  performance:
    value: "quality-check completes in < 3 minutes per PR; security scanner run completes in < 5 minutes; posture dashboard loads within 5 minutes of scan completion"
    source_for_quantification:
      source: kb_default
      source_reference: "kb.engineering-observability.EO-F001.success_criteria[0]; 3-minute CI threshold derived from developer PR review cadence"
      user_grounded: true
      user_grounding_basis: "batch-accepted as KB-default via Stage 4 review"
  security:
    value: "OWASP ASVS Level 1 — quality-check is an internal CI tool; no external auth surface; scanner results stored in STM folder whitelist paths; TLS 1.3 for any remote vulnerability database queries"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.security_level=elevated maps to OWASP ASVS Level 1 for internal CI tool surfaces"
  accessibility:
    value: "WCAG 2.1 AA — quality-check output is CLI text and PR comments; posture dashboard is a UI surface; AA compliance required for the dashboard"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.audience includes engineering-lead; WCAG 2.1 AA is the org-wide baseline"
  compliance: []

business_rules:
  - "Mandatory for L2+ projects — test coverage must be measured and surfaced per PR (EO-F001); coverage gate blocks merges below configured threshold"
  - "Mandatory for any L2+ project — lint runs on every supported stack; violations surfaced per PR; not suppressible without justification (EO-F002)"
  - "Mandatory when security is in-scope (profile security_level=elevated confirms inclusion) — security scans run on every project (EO-F004); EO-F003 deferred per Stage 3 Q1 user decision"
  - "Lint violations must be surfaced per PR — not suppressed or deferred without a documented justification (EO-F002)"
  - "Security posture dashboard shows only actionable items by default — severity policy baseline prevents noise overwhelm"

hypothesis: >
  We believe that delivering integrated coverage, lint, and security quality signals per PR
  for software engineers and engineering leads on Garura-managed projects will result in
  every PR receiving a quality-check report within 3 minutes on ≥ 95% of supported stacks.
  We will know this is true when quality-check reports appear on ≥ 95% of PRs across
  supported stacks and zero coverage silent-failure incidents occur in a 30-day window.

assumptions_requiring_validation:
  - "≥ 1 language ecosystem (Node/npm) at launch is sufficient to demonstrate the quality-signals capability value proposition to solo founders — if the initial adopters use a different primary stack, the scanner integration will miss the target"
  - "The 3-minute quality-check completion time is achievable without parallel execution across all supported stacks — serial execution across multiple stacks may exceed 3 minutes as the stack count grows"
  - "Severity filtering policy (critical/high block, medium/low inform) is the right threshold for solo-dev adopters — if the profile shifts toward enterprise adopters with stricter policies, the default threshold will need adjustment"

dependencies:
  - "Stack-specific coverage tool adapters for each supported language ecosystem — EO-F001 requires adapters for each stack's coverage output format"
  - "Vulnerability database access for security scanner — EO-F004 requires access to at least one CVE/vulnerability database (npm audit is free; additional databases may have access requirements)"

depends_on:
  - "EPIC-agentic-methodology-component-arch-001"

uses_mocks: false

kb_source:
  capability: "EO-F001"
  rules_applied:
    - "EO-F001 mandatory-conditional: quality is tracked in L2+ projects"
    - "EO-F002 mandatory-default: lint on every supported stack"
    - "EO-F004 mandatory-conditional: security is in-scope; profile security_level=elevated confirms inclusion"
    - "EO-F003 deferred: Stage 3 Q1 user decision; not in v1 scope"
    - "lint-suppression policy: justification comment required for global disables"
    - "severity policy baseline: critical/high block; medium/low inform"
  experiential_warnings:
    - "Chasing coverage percentage rather than scenario coverage — high % can mask shallow assertions"
    - "Disabling lint rules instead of fixing root cause"
    - "Treating security scan output as a complete prioritization rather than a raw findings list"

expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "developer submitting a PR on any Garura-managed project using a supported stack"
      given: "quality-check runs in CI"
      then: "coverage delta and lint violations are surfaced in the PR as reviewable findings within 3 minutes of CI run start, and quality-check exits with a deterministic pass or fail in ≥ 95% of supported stack runs"
      measure: "quality-check exit code is deterministic (0 = pass, non-0 = fail with findings) in ≥ 95% of CI runs across supported stacks in a 30-day window; coverage delta appears in the PR review surface within 3 minutes of CI trigger; measured by CI run timestamps and PR comment timestamps"
    - id: S2
      persona: "engineering lead reviewing security posture on a Garura-managed project with npm dependencies"
      given: "the security scanner runs in CI"
      then: "a severity-tagged vulnerability list is available in the posture dashboard within 5 minutes of the scan completing, showing only critical and high severity items by default"
      measure: "security posture dashboard for the project shows the vulnerability list within 5 minutes of scan completion; dashboard default view contains only critical and high items; severity tagging covers all findings (critical/high/medium/low); measured by dashboard load time after scan completion"
  recovery:
    - id: REC1
      for_failure_condition: "A coverage tool output format changes in an npm dependency update and quality-check fails to parse the new format, silently exiting 0 with no coverage data"
      trigger: "quality-check exits 0 but no coverage delta appears in the PR; or stack-specific adapter test fails during CI with a parse error on the coverage output"
      direction: "Stack-specific adapter tests verify coverage parsing on each CI run; format-change detection emits a warning (not a silent pass) when coverage output is not parseable; the quality-check step fails explicitly on parse error rather than silently succeeding; when triggered, update the adapter to handle the new format before re-enabling the stack"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_condition: "A developer facing lint-noise fatigue disables a lint rule globally without a documented justification, causing subsequent PRs to silently allow the suppressed issue type"
      trigger: "CI flags a new global disable without a justification comment; or a lint policy violation appears in the quality-check output"
      direction: "Disable-comment requires a documented justification string; global rule disables require a decision-manifest entry; CI flags any new global disable without a justification comment as a lint policy violation; when triggered, the developer must add a justification comment or re-enable the rule"
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_condition: "A security scanner produces 200 findings including low-severity CVEs in transitive dependencies, overwhelming the developer and causing them to ignore the security signal entirely"
      trigger: "developer reports signal fatigue; or security posture dashboard shows hundreds of findings with no filtering applied"
      direction: "Severity filtering + policy baseline: dashboard default view shows only critical and high items; the policy threshold blocks PRs only on critical findings; medium/low findings are available in an expandable view but do not block progress; configure the policy threshold to critical/high-only before enabling the security scanner for a new project"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_condition: "A coverage percentage is high (e.g., 85%) but achieved by covering only the happy path, providing false confidence that the implementation is well-tested"
      trigger: "a defect is found in production that was covered by a passing test with shallow assertions; or a code review identifies a scenario that tests touch but do not actually verify"
      direction: "Coverage delta (not absolute percentage) is the primary surfaced metric per PR; mutation testing is documented as a post-v1 planned enhancement for coverage masking detection; developers are warned in the quality-check output that high coverage does not guarantee scenario coverage; when triggered, add scenario-specific test cases for the uncovered behavior"
      handoff: human
      derivable_at_l4: false
