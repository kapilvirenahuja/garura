problem_statement: >
  Quality signals (coverage, lint, security) run in CI but their results are disconnected
  from the developer's moment of decision — DORA metrics and CVE aggregations live in
  manager-layer tools (Jellyfish, LinearB, Swarmia) while AI coding assistants operate
  at the individual developer level with no upward visibility (market brief gap 3, validated
  via CodePulseHQ SEI guide). Solo founders operating without a security team have no
  second reviewer to notice when a signal goes silent. The KB failure scenario is precise:
  a coverage tool output format change can silently eliminate quality visibility for weeks
  on a solo-dev project, while high coverage percentages mask shallow test assertions
  that let defects through to production.

intent: >
  Ensure every PR on a Garura-managed project receives a quality-check report (coverage
  delta, lint violations, security scan) in < 3 minutes, with quality-check running
  on ≥ 95% of supported stacks and security posture available per project.

