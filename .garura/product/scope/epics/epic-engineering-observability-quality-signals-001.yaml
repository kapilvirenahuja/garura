# epic-engineering-observability-quality-signals-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.

id: "EPIC-engineering-observability-quality-signals-001"
domain: "engineering-observability"
capability: "EO-F001"

intent:
  goal: >
    A developer submitting a pull request on a Garura-managed project gets a quality-check
    report — coverage delta, lint violations, and a security scan summary — in under 3 minutes,
    with the quality check running on at least 95% of supported stacks.
  constraints:
    - "Quality check completes in under 3 minutes per pull request."
    - "The security scanner run completes in under 5 minutes."
    - "The security posture dashboard loads within 5 minutes of scan completion."
    - "OWASP ASVS Level 1 baseline — quality check is an internal continuous-integration tool; no external auth surface; scanner results stored in the project memory folder whitelist; TLS 1.3 for any remote vulnerability database queries."
    - "WCAG 2.1 AA — applies to the posture dashboard and any user-interface rendering of quality output."
    - "Mandatory for L2 and above projects — test coverage is measured and surfaced per pull request; the coverage gate blocks merges below the configured threshold."
    - "Lint runs on every supported stack — violations are surfaced per pull request and are not suppressible without a documented justification."
    - "Mandatory when security is in scope — security scans run on every project."
    - "Severity policy baseline — critical and high findings block; medium and low findings inform; the posture dashboard shows only actionable items by default."
  failure_scenario:
    - "A coverage tool output format changes in an npm dependency update and the quality check fails to parse the new format — it silently exits 0 with no coverage data."
    - "A developer facing lint-noise fatigue disables a lint rule globally without a documented justification — subsequent pull requests silently allow the suppressed issue type."
    - "A security scanner produces 200 findings including low-severity vulnerabilities in transitive dependencies — the developer is overwhelmed and ignores the security signal entirely."
    - "A coverage percentage is high (for example, 85%) but achieved by covering only the happy path — false confidence that the implementation is well tested."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "developer submitting a pull request on any Garura-managed project using a supported stack"
      given: "the quality check runs in continuous integration"
      then: "the coverage delta and lint violations appear in the pull request as reviewable findings within 3 minutes of the run starting, and the quality check exits with a deterministic pass or fail on at least 95% of supported stack runs."
      measure: "Quality check exit code is deterministic (0 for pass, non-zero for fail with findings) on at least 95% of continuous-integration runs across supported stacks in a 30-day window; coverage delta appears in the pull request review surface within 3 minutes; measured by run timestamps and pull-request comment timestamps."
    - id: S2
      persona: "engineering lead reviewing security posture on a Garura-managed project with npm dependencies"
      given: "the security scanner runs in continuous integration"
      then: "a severity-tagged vulnerability list appears in the posture dashboard within 5 minutes of the scan completing, showing only critical and high severity items by default."
      measure: "Posture dashboard for the project shows the vulnerability list within 5 minutes of scan completion; the default view contains only critical and high items; severity tagging covers all findings (critical, high, medium, low); measured by dashboard load time after scan completion."
  recovery:
    - id: REC1
      for_failure_scenario: "A coverage tool output format changes in an npm dependency update and the quality check fails to parse the new format — it silently exits 0 with no coverage data."
      trigger: "The quality check exits 0 but no coverage delta appears in the pull request; or a stack-specific adapter test fails during continuous integration with a parse error on the coverage output."
      direction: "Stack-specific adapter tests verify coverage parsing on each continuous-integration run; format-change detection emits a warning (not a silent pass) when coverage output is not parseable; the quality-check step fails explicitly on parse error rather than silently succeeding; when triggered, update the adapter to handle the new format before re-enabling the stack."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_scenario: "A developer facing lint-noise fatigue disables a lint rule globally without a documented justification — subsequent pull requests silently allow the suppressed issue type."
      trigger: "Continuous integration flags a new global disable without a justification comment; or a lint-policy violation appears in the quality-check output."
      direction: "A disable comment requires a documented justification string; global rule disables require a decision-manifest entry; continuous integration flags any new global disable without a justification comment as a lint-policy violation; when triggered, the developer adds a justification comment or re-enables the rule."
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_scenario: "A security scanner produces 200 findings including low-severity vulnerabilities in transitive dependencies — the developer is overwhelmed and ignores the security signal entirely."
      trigger: "The developer reports signal fatigue; or the security posture dashboard shows hundreds of findings with no filtering applied."
      direction: "Severity filtering and policy baseline: the dashboard default view shows only critical and high items; the policy threshold blocks pull requests only on critical findings; medium and low findings are available in an expandable view but do not block progress; configure the policy threshold to critical-and-high-only before enabling the security scanner for a new project."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_scenario: "A coverage percentage is high (for example, 85%) but achieved by covering only the happy path — false confidence that the implementation is well tested."
      trigger: "A defect is found in production that was covered by a passing test with shallow assertions; or a code review identifies a scenario that tests touch but do not verify."
      direction: "Coverage delta (not absolute percentage) is the primary surfaced metric per pull request; mutation testing is documented as a post-version-1 planned enhancement for coverage masking detection; the quality-check output warns that high coverage does not guarantee scenario coverage; when triggered, add scenario-specific test cases for the uncovered behavior."
      handoff: human
      derivable_at_l4: false

