    - "Mandatory for any L2 and above project — lint runs on every supported stack; violations surfaced per pull request; not suppressible without justification."
    - "Mandatory when security is in scope (profile security_level=elevated confirms inclusion) — security scans run on every project; the build-health feature is deferred per the Stage 3 user decision."
    - "Lint violations are surfaced per pull request — not suppressed or deferred without a documented justification."
