  locked_at: "2026-04-18T05:00:00Z"
  intent_hash: "sha256:808df0fa8973028edc5617e5cd299792580bc92936d353401b10098ce9ae461a"
  locked_by: "specify-product-stage-5-validate"
  immutability_note: >
    Intent content is immutable after lock. Post-v1 drift requiring a scope change must
    be handled via a Product-Drift successor epic, not by editing this intent block. The
    features[] ledger and epic_status rollup below may evolve as capabilities move through
    PLANNED → PARTIAL → LIVE; the intent itself is sealed.

appetite: "2 weeks"

in_scope:
  - "EO-F001 Test Coverage at Standard depth: quality-check runs successfully on ≥ 95% of supported stacks; coverage deltas surfaced per PR within 3 minutes of CI run start"
  - "EO-F002 Lint at Standard depth: lint runs on ≥ 95% of supported stacks; lint violations surfaced per PR; violations not suppressible without a documented justification comment"
  - "EO-F004 Security Posture at Standard depth: security scanner integration for ≥ 1 language ecosystem at launch (Node/npm); vulnerability aggregation with severity (critical/high/medium/low) tags; posture dashboard per project showing actionable items only"
  - "Stack-specific adapter resilience: format-change detection in quality-check for supported stack adapters"
  - "Severity policy baseline: security scan configured with a policy threshold so only actionable vulnerabilities reach the developer"

anti_goals:
  - "EO-F003 Build Health — deferred to v1.1-v1.5 per Stage 3 Q1 user decision; not in v1 scope"
  - "Cross-project vulnerability aggregation — Advanced depth for EO-F004; post-v1; v1 is per-project scans only"
  - "Vulnerability prioritization engine — Advanced depth; post-v1 functionality"
  - "Policy-governed lint rules for multi-team enforcement — Enterprise depth; solo-dev profile does not have a multi-team structure in v1"
  - "Mutation testing as a supplementary signal — post-v1; advanced quality signal for coverage masking detection"

must_not_break:
  - "EPIC-agentic-methodology-component-arch-001 — quality-check is invoked as a play step; the Play→Agent→Skill hierarchy must remain intact for quality-check invocations"
  - "Existing CI pipeline configurations — quality-check must run as an additive CI step; it must not replace or break existing project-level CI configurations"

