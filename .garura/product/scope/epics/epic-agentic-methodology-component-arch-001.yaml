failure_conditions:
  - "A developer under time pressure edits a compiled SKILL.md directly instead of going through /create-play --build, causing the compiled artifact to drift from its intent.yaml and losing the manual edits on the next rebuild"
  - "A play author bypasses the agent delegation rule and inlines domain logic directly in the play markdown, making the play untestable and causing evidence files to be inconsistent across runs"
  - "A play writes output artifacts to a path outside the STM folder whitelist, causing file-system pollution and cross-issue leakage"
  - "A self-commit step in a play fails silently, leaving the evidence artifact in the working tree only and losing it at session end"

