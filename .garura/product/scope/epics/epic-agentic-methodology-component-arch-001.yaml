expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "solo founder working on a Garura-managed project"
      given: "they perform any engineering action (commit, PR, spec, feature)"
      then: "≥ 95% of those actions are invoked via a play with a traceable evidence artifact rather than ad-hoc tool use"
      measure: "play invocation log for a 30-day window shows ≥ 95% play-invoked vs ad-hoc; measured by counting sessions where all major actions appear in play evidence files vs sessions with only ad-hoc git/tool invocations"
    - id: S2
      persona: "developer on a Garura-managed project"
      given: "a play is invoked"
      then: "the invocation succeeds and produces a valid evidence artifact in ≥ 90% of runs over the trailing 30-day window"
      measure: "play invocation success rate ≥ 90% over rolling 30 days; measured by play status artifacts — failed runs have explicit failure evidence, not silent drops"
  recovery:
    - id: REC1
      for_failure_condition: "A developer under time pressure edits a compiled SKILL.md directly instead of going through /create-play --build, causing the compiled artifact to drift from its intent.yaml and losing the manual edits on the next rebuild"
      trigger: "/create-play --rebuild detects drift between SKILL.md and intent.yaml; or developer notices manual edits silently reset after a rebuild"
      direction: "Hard rule in CLAUDE.md enforces no direct SKILL.md edits; /create-play --rebuild emits a Tether/Vanish gate before overwriting; recipe-changes-via-rebake rule enforced in agent system prompt so the developer is prompted to go through the intent-change path instead"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_condition: "A play author bypasses the agent delegation rule and inlines domain logic directly in the play markdown, making the play untestable and causing evidence files to be inconsistent across runs"
      trigger: "play step evals fail because inlined logic produces inconsistent outputs; or /create-play compiler emits agent-delegation warning during compilation"
      direction: "CLAUDE.md agent-first rule enforced at every invocation; /create-play compiler emits a warning when it detects domain logic patterns in play markdown that should be delegated to a named agent, guiding the author to extract the logic into an agent"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC3
      for_failure_condition: "A play writes output artifacts to a path outside the STM folder whitelist, causing file-system pollution and cross-issue leakage"
      trigger: "preflight validator in the play catches the out-of-whitelist path and returns a structured failure before the write occurs"
      direction: "Folder-whitelist rule enforcement per ADR 017; preflight validators in every play that writes artifacts check the output path before the write; the play must be fixed to write to a whitelisted path"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_condition: "A self-commit step in a play fails silently, leaving the evidence artifact in the working tree only and losing it at session end"
      trigger: "commit verification step detects the commit did not land in git; or evidence artifact is present in working tree but absent from git log after session"
      direction: "Commit verification step in every evidence-producing play; ADR 012 post-commit hook verifies the commit landed before the play proceeds; on failure the play emits a structured failure requiring human resolution of the git state"
      handoff: human
      derivable_at_l4: false
