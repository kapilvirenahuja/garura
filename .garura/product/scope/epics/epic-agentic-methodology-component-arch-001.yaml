business_rules:
  - "All 9 component-architecture features (AM-F001 through AM-F009) are mandatory — never excludable for any Garura-based product"
  - "Every play is a compiled artifact traceable to an intent.yaml — direct SKILL.md edits are forbidden (CLAUDE.md hard rule)"
  - "100% of domain tasks in plays must be delegated to agents — inlining domain logic in plays is forbidden (agent-first rule)"
  - "Every skill must be model-invocable only — no direct play-to-skill calls; skills are only invoked via agents"
  - "100% of play-produced artifacts must land under the STM folder whitelist per ADR 017 — zero whitelist violations"
  - "Every Tether/Vanish decision must produce an evidence artifact — AskUserQuestion is forbidden at destructive steps"
  - "100% of play steps must produce evidence — evidence self-committed per ADR 012; rollback must succeed on ≥ 95% of failure cases"

hypothesis: >
  We believe that enforcing the Play → Agent → Skill three-layer hierarchy with compiled
  artifacts and evidence substrate for solo founders working on Garura-managed projects
  will result in ≥ 95% of engineering actions being invoked via plays with full KB
  traceability. We will know this is true when a 30-day play invocation log shows ≥ 95%
  play-invoked vs ad-hoc engineering actions with zero silent evidence losses.

assumptions_requiring_validation:
  - "Solo founders operating Garura will consistently use play invocations rather than ad-hoc tool calls once the slash-command surface is complete — this assumes the command discoverability investment (cli-slash-commands epic) has landed first"
  - "The 95% invocation rate is achievable without requiring the developer to change established workflows — this assumes Garura plays cover enough of the frequent-action surface to be the lower-friction path"
  - "/create-play --rebuild correctly detects all categories of compiled-artifact drift — this assumption would fail if the compiler misses a drift pattern introduced by a new play type"

