# epic-agentic-methodology-component-arch-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.

id: "EPIC-agentic-methodology-component-arch-001"
domain: "agentic-methodology"
capability: "AM-F001"

intent:
  goal: >
    A solo founder running a Garura-managed project invokes at least 95% of their engineering
    actions through Garura plays — every one carrying a traceable evidence trail — over a
    rolling 30-day window.
  constraints:
    - "Play invocation success rate at least 90% over a rolling 30-day window."
    - "Every play step writes its evidence file and commits it within 30 seconds of the step completing."
    - "OWASP ASVS Level 1 baseline — internal tooling surface, no external auth, evidence commits and the project memory folder are access-controlled."
    - "WCAG 2.1 AA — applies to any command-line output rendered in a user interface."
    - "AI-authorship traceability — 100% of commits produced by plays carry an AI-authorship trailer in the commit message."
    - "All nine component-architecture features (the three layers, the three memory tiers, the hierarchy invariant, the approval gate, and the evidence substrate) must remain mandatory for every Garura-based product."
    - "Every play is a compiled artifact traceable to its intent file — hand editing a compiled play file is forbidden."
    - "Every domain task inside a play is delegated to an agent — inlining domain logic in a play is forbidden."
    - "Every skill is invoked only via an agent — plays never call skills directly."
    - "Every artifact written by a play lands under the project memory folder whitelist — zero whitelist violations."
    - "Every decision that pauses for a human uses the Tether or Vanish approval protocol — raw yes/no prompts are forbidden at destructive steps."
  failure_scenario:
    - "A developer under time pressure edits a compiled play file directly instead of going through the play rebuild workflow — the compiled artifact drifts from its intent file and the manual edit is lost on the next rebuild."
    - "A play author bypasses agent delegation and inlines domain logic in the play markdown — the play becomes untestable and its evidence files vary run to run."
    - "A play writes an output artifact to a path outside the project memory folder whitelist — files leak across issues and pollute the workspace."
    - "A self-commit step in a play fails silently — the evidence artifact stays in the working tree only and is lost at session end."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "solo founder working on a Garura-managed project"
      given: "they perform any engineering action — a commit, a pull request, a spec, a feature"
      then: "at least 95% of those actions are invoked via a play with a traceable evidence artifact, not via ad-hoc tool use."
      measure: "Play invocation log over a 30-day window shows at least 95% play-invoked vs ad-hoc actions, counted from session evidence files."
    - id: S2
      persona: "developer on a Garura-managed project"
      given: "a play is invoked"
      then: "the invocation succeeds and produces a valid evidence artifact on at least 90% of runs over a trailing 30-day window."
      measure: "Play invocation success rate at least 90% over a rolling 30-day window — failed runs carry explicit failure evidence, not silent drops."
  recovery:
    - id: REC1
      for_failure_scenario: "A developer under time pressure edits a compiled play file directly instead of going through the play rebuild workflow — the compiled artifact drifts from its intent file and the manual edit is lost on the next rebuild."
      trigger: "The play rebuild step detects drift between the compiled file and the intent file; or the developer notices manual edits silently reset after a rebuild."
      direction: "Hard rule in the project guide forbids direct edits to compiled play files; the play rebuild step emits a Tether approval gate before overwriting; the change-via-rebuild rule lives in the agent system prompt so the developer is redirected onto the intent-change path."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_scenario: "A play author bypasses agent delegation and inlines domain logic in the play markdown — the play becomes untestable and its evidence files vary run to run."
      trigger: "Play step evaluations fail because inlined logic produces inconsistent outputs; or the play compiler emits an agent-delegation warning during compilation."
      direction: "The agent-first rule is enforced at every invocation; the play compiler emits a warning when it detects domain-logic patterns in a play that should be delegated to a named agent, guiding the author to extract the logic into an agent."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC3
      for_failure_scenario: "A play writes an output artifact to a path outside the project memory folder whitelist — files leak across issues and pollute the workspace."
      trigger: "The pre-write validator inside the play catches the out-of-whitelist path and returns a structured failure before the write occurs."
      direction: "Folder-whitelist enforcement is mandatory for every play that writes artifacts; pre-write validators check the output path before the write; the play is fixed to write into a whitelisted path."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC4
      for_failure_scenario: "A self-commit step in a play fails silently — the evidence artifact stays in the working tree only and is lost at session end."
      trigger: "The commit verification step detects the commit did not land in git; or the evidence artifact is present in the working tree but absent from git log after the session."
      direction: "Every evidence-producing play runs a commit verification step; the post-commit hook verifies the commit landed before the play proceeds; on failure the play emits a structured failure requiring human resolution of the git state."
      handoff: human
      derivable_at_l4: false

