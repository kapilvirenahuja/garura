# epic-engineering-experience-first-run-onboarding-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.

id: "EPIC-engineering-experience-first-run-onboarding-001"
domain: "engineering-experience"
capability: "EE-F010"

intent:
  goal: >
    A solo founder on a clean macOS or Linux machine with a supported Node version completes
    Garura initialization in under 3 minutes — from running the npm install to a valid project
    profile written to disk — with zero partial-install broken states.
  constraints:
    - "The greenfield wizard completes in under 3 minutes from first prompt to project profile write."
    - "The npm install completes in under 2 minutes on a 10 megabits-per-second connection."
    - "OWASP ASVS Level 1 baseline — install surface has no auth; npm package integrity verified via npm audit on every continuous-integration build; TLS 1.3 for npm registry connections."
    - "WCAG 2.1 AA — applies to any user-interface rendering of the onboarding surface."
    - "The wizard asks no more than 3 questions — more questions trigger abandonment; this is a knowledge-base-validated tradeoff."
    - "Install is atomic — either complete success or clean failure with no partial state; partial installs are a blocking defect."
    - "Preflight check verifies Node version, Claude Code version, and git configuration before any file writes."
    - "The one-command Claude Code bootstrap produces an installed state equivalent to the sync play running from source."
  failure_scenario:
    - "The wizard grows beyond 3 questions due to scope creep during implementation — solo founders evaluating Garura abandon the wizard before completing initialization."
    - "The npm install proceeds past the preflight check when a prerequisite is missing — install partially completes and leaves Garura in a broken state."
    - "The upgrade flow runs the sync play without conflict detection — user-customized components in the global Claude folder are silently overwritten."
    - "The npm install includes optional modules in the core bundle — install time exceeds 5 minutes on slow networks and the first impression fails."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "solo founder with a new project directory and no prior Garura configuration on a supported Node version"
      given: "they run the npm install followed by the Garura init command"
      then: "they complete a 3-question wizard and a valid project profile is written to the project directory in under 3 minutes."
      measure: "Wizard completion time under 3 minutes measured from first prompt to project profile write completion; project profile validates against the profile schema (required fields present, no null mandatory values); measured in continuous integration on a clean macOS or Linux environment."
    - id: S2
      persona: "developer on a supported Node version who has not installed Garura previously"
      given: "they run the npm install"
      then: "the installation completes with exit code 0, all prerequisites are verified by the preflight check, and no partial-install state is left on failure."
      measure: "npm install exits 0 on all supported Node versions in continuous integration; preflight check produces a pass-or-fail status per prerequisite before install proceeds; failed installs leave zero modified files (atomic rollback verified by file-system diff before and after a failed install)."
  recovery:
    - id: REC1
      for_failure_scenario: "The wizard grows beyond 3 questions due to scope creep during implementation — solo founders evaluating Garura abandon the wizard before completing initialization."
      trigger: "Wizard question count exceeds 3 in any code path; the continuous-integration test for question count fails; or user feedback reports abandonment at question 4."
      direction: "The 3-question maximum is enforced as a hard constraint in the wizard implementation; a question-count gate in the wizard flow emits a test failure if question count exceeds 3 in any wizard variant; any additional profile data collected via an optional configure command after onboarding."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_scenario: "The npm install proceeds past the preflight check when a prerequisite is missing — install partially completes and leaves Garura in a broken state."
      trigger: "Garura commands fail with missing dependency errors after install; or install completes but the Garura init command cannot run due to missing Node, Claude Code, or git prerequisites."
      direction: "The preflight check runs before any file writes; install is atomic — all files written or none; a failed preflight emits a clear error listing the missing prerequisite and the remediation command; partial installs trigger atomic rollback."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC3
      for_failure_scenario: "The upgrade flow runs the sync play without conflict detection — user-customized components in the global Claude folder are silently overwritten."
      trigger: "The developer notices behavior change after upgrade; git diff shows components in the global Claude folder modified differently from the expected source state."
      direction: "Conflict detection before sync: the sync play checksums local components against source before overwrite; any local modification triggers a Tether approval gate; the upgrade flow never silently overwrites customized files; if already overwritten, restore from source and re-apply customizations."
      handoff: human
      derivable_at_l4: false
    - id: REC4
      for_failure_scenario: "The npm install includes optional modules in the core bundle — install time exceeds 5 minutes on slow networks and the first impression fails."
      trigger: "The continuous-integration package size check exceeds the budget threshold; or a developer reports install time over 5 minutes on standard connections."
      direction: "Optional modules are excluded from the core npm package; package size is monitored in continuous integration with a budget threshold that fails the step if exceeded; only required dependencies live in the core bundle; when triggered, the offending optional modules move to optional or peer dependencies."
      handoff: autonomous
      derivable_at_l4: true

connections:
  before_chain:
    intents:
      - "EPIC-agentic-methodology-component-arch-001"
      - "EPIC-engineering-experience-cli-slash-commands-001"
  after:
    intents:
      - "EPIC-ai-governance-audit-attribution-001"
  peers:
    intents: []
  dependency_check: "All before_chain epics carry expectations.vetted.status: approved and post_implementation.status: delivered before this epic begins."

provenance:
  source:
    kind: brief_explicit
    quote: "engineering-experience / first-run-onboarding (net-new build — wizard + unified installer) — Stage-3 user input"
    confidence: high
  appetite: "3 weeks"
  business_rules:
    - "Mandatory for the version-1 solo-founder target — the greenfield wizard is the version-1 minimum viable onboarding; the 3-question maximum is non-negotiable."
    - "Mandatory for public distribution — npm install must succeed on all supported Node versions and the one-command Claude Code bootstrap must produce an installed state equivalent to the sync play running from source."
    - "Three-question minimum for the greenfield wizard — more questions trigger abandonment; this is a knowledge-base-validated tradeoff."
    - "Install is atomic — either complete success or clean failure with no partial state; partial installs are a blocking defect."
    - "The npm registry account and publish credentials must be set up before the first release."
    - "The Claude Code bootstrap registers slash commands via the Claude Code slash-command registration interface."
  kb_source:
    capability: "EE-F010"
    rules_applied:
      - "EE-F010 mandatory-default — 3-question minimum wizard for the version-1 solo-founder target."
      - "EE-F011 mandatory-default — unified installer covering npm publish and Claude Code end-user bootstrap (absorbs retired EE-F012)."
      - "Atomic install — complete success or clean failure; no partial state."
      - "3-question maximum — knowledge-base-validated tradeoff against richer profile capture."
    experiential_warnings:
      - "Missing brownfield scanner for repositories with existing structure (version 1 is greenfield only)."
      - "npm install size growing when optional modules are bundled with core."
      - "Editing components in the global Claude folder directly instead of going through the sync play."
  uses_mocks: false
  demock_epic_ref: null
  foundation_investment: false
