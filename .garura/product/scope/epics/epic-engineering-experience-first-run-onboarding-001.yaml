id: "EPIC-engineering-experience-first-run-onboarding-001"
domain: "engineering-experience"
capability: "EE-F010"

provenance:
  source: brief_explicit
  source_quote: "engineering-experience / first-run-onboarding (net-new build — wizard + unified installer) — Stage-3 user input"
  confidence: high

problem_statement: >
  Solo founders evaluating a new DX methodology platform face an install-then-abandon cliff:
  if the first-run experience takes more than a few minutes of configuration, the evaluation
  moment is permanently lost. Market brief gap 5 confirms that no AI dev tool serves the
  solo-founder-to-enterprise progression — the greenfield wizard is the entry gate for the
  entire Garura adoption funnel. The KB failure scenario is explicit with a quantified
  impact: a wizard that asks more than 3 questions causes abandonment at Step 1.
  Compound failure: if npm install garura partially succeeds or leaves a broken state,
  Garura is unusable without debug skills and the abandonment rate spikes at the install
  step — before the developer ever reaches the wizard.

intents:
  - >
    Enable a solo founder to complete Garura initialization in < 3 minutes from npm install
    to a valid project_profile.yaml, with 0 partial-install broken states on supported
    Node versions.

intent_lock:
  locked_at: "2026-04-18T05:00:00Z"
  intent_hash: "sha256:2d6f31f68f33e333f330109818370639e792089c041e115712ea625da0abca7d"
  locked_by: "specify-product-stage-5-validate"
  immutability_note: >
    Intent content is immutable after lock. Post-v1 drift requiring a scope change must
    be handled via a Product-Drift successor epic, not by editing this intent block. The
    features[] ledger and epic_status rollup below may evolve as capabilities move through
    PLANNED → PARTIAL → LIVE; the intent itself is sealed.

appetite: "3 weeks"

in_scope:
  - "EE-F010 Greenfield Wizard at Standard depth: three-question minimum wizard that completes in < 3 minutes and produces a valid project_profile.yaml"
  - "EE-F011 Unified Installer at Standard depth: npm install garura succeeds on all supported Node versions; preflight check detects missing prerequisites before install completes; one-command Claude Code bootstrap from npm; sync-claude runs idempotently as part of onboarding; upgrade flow preserves user data (absorbs retired EE-F012 Claude Code Installer)"
  - "Atomic install guarantee: either all required components are installed successfully or the install fails cleanly with no partial state"
  - "Preflight prerequisite detection: missing Node version, Claude Code version, or git configuration surfaced before install completes"

anti_goals:
  - "Brownfield project scanner — v1 is greenfield-only; brownfield migration tooling is the May 2026 milestone scope"
  - "Advanced managed installer with update notifications — EE-F011 Advanced depth; v1 scope is the one-command bootstrap only"
  - "More than 3 questions in the wizard — KB tradeoff: three-question minimum; additional questions trigger abandonment; any expansion is post-v1"
  - "SSO or organizational authentication at install time — Enterprise depth; post-v1 enterprise milestone (Jul 2026)"
  - "Windows installer — v1 targets macOS/Linux; Windows support is post-v1"

must_not_break:
  - "EPIC-agentic-methodology-component-arch-001 — the bootstrap installs the three-layer hierarchy substrate; the installed state must be identical to the state produced by sync-claude from source"
  - "EPIC-engineering-experience-cli-slash-commands-001 — the one-command bootstrap must produce a Claude Code environment where /help lists all available Garura plays immediately after install"

foundation_investment: false

