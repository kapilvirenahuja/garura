    - "npm install sizes growing when optional modules are bundled with core"
    - "Editing ~/.claude/ components directly instead of going through sync-claude"

expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "solo founder with a new project directory and no prior Garura configuration on a supported Node version"
      given: "they run npm install garura followed by garura init"
      then: "they complete a 3-question wizard and a valid project_profile.yaml is written to the project directory in < 3 minutes"
      measure: "garura init wizard completion time < 3 minutes measured from first prompt to project_profile.yaml write completion; project_profile.yaml validates against the profile schema (required fields present, no null mandatory values); measured in CI on a clean macOS/Linux environment"
    - id: S2
      persona: "developer on a supported Node version who has not installed Garura previously"
      given: "they run npm install garura"
      then: "the installation completes with exit code 0, all prerequisites are verified by the preflight check, and no partial-install state is left on failure"
      measure: "npm install garura exits 0 on all supported Node versions in CI; preflight check produces a PASS/FAIL status per prerequisite before install proceeds; failed installs leave zero modified files in node_modules (atomic rollback verified by file-system diff before and after failed install)"
  recovery:
    - id: REC1
      for_failure_condition: "The wizard grows beyond 3 questions due to scope creep during implementation, causing solo founders evaluating Garura to abandon the wizard before completing initialization"
      trigger: "wizard question count exceeds 3 in any code path; CI test for question count fails; or user feedback reports abandonment at question 4"
      direction: "3-question maximum enforced as a hard constraint in the wizard implementation; question count gate in the wizard flow emits a test failure if question count exceeds 3 in any wizard variant; any additional profile data collected via optional /configure command after onboarding"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_condition: "npm install garura proceeds past the preflight check when a prerequisite is missing, partially completing and leaving Garura in a broken state"
      trigger: "Garura commands fail with missing dependency errors after install; or install completes but garura init cannot run due to missing Node/Claude Code/git prerequisites"
      direction: "Preflight check runs before any file writes; install is atomic — all files written or none; failed preflight emits a clear error listing the missing prerequisite and the remediation command; partial installs trigger atomic rollback"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC3
      for_failure_condition: "The upgrade flow runs sync-claude without conflict detection, silently overwriting user-customized components in ~/.claude/"
      trigger: "developer notices behavior change after upgrade; git diff shows ~/.claude/ components modified differently from expected source state"
      direction: "Conflict detection before sync: sync-claude checksums local components against source before overwrite; any local modification triggers a Tether/Vanish gate; upgrade flow never silently overwrites customized files; if already overwritten, restore from source and re-apply customizations"
      handoff: human
      derivable_at_l4: false
    - id: REC4
      for_failure_condition: "npm install includes optional modules in the core bundle, causing install time to exceed 5 minutes on slow networks and triggering first-impression failure"
      trigger: "CI package size check exceeds the budget threshold; or developer reports install time > 5 minutes on standard connections"
      direction: "Optional modules excluded from the core npm package; package size monitored in CI with a budget threshold that fails the CI step if exceeded; only required dependencies in the core bundle; when triggered, identify and move the offending optional modules to optional/peer dependencies"
      handoff: autonomous
      derivable_at_l4: true
