failure_conditions:
  - "The wizard grows beyond 3 questions due to scope creep during implementation, causing solo founders evaluating Garura to abandon the wizard before completing initialization"
  - "npm install garura proceeds past the preflight check when a prerequisite is missing, partially completing and leaving Garura in a broken state"
  - "The upgrade flow runs sync-claude without conflict detection, silently overwriting user-customized components in ~/.claude/"
  - "npm install includes optional modules in the core bundle, causing install time to exceed 5 minutes on slow networks and triggering first-impression failure"

constraints:
  performance:
    value: "Greenfield wizard completes in < 3 minutes from first prompt to project_profile.yaml write; npm install garura completes in < 2 minutes on a 10 Mbps connection"
    source_for_quantification:
      source: kb_default
      source_reference: "kb.engineering-experience.EE-F010.success_criteria[0]; npm install time target derived from solo-dev usability threshold"
      user_grounded: true
      user_grounding_basis: "batch-accepted as KB-default via Stage 4 review"
  security:
    value: "OWASP ASVS Level 1 — install surface has no auth; npm package integrity verified via npm audit on every CI build; TLS 1.3 for npm registry connections"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.security_level=elevated maps to OWASP ASVS Level 1 for install-time surfaces; npm audit is standard practice"
  accessibility:
    value: "WCAG 2.1 AA — wizard prompts are CLI text; AA constraint inherited for any UI-rendered onboarding surface"
    source_for_quantification:
      source: profile_nfr
      source_reference: "profile.audience includes designers and PMs; WCAG 2.1 AA is the org-wide baseline"
  compliance: []

business_rules:
  - "Mandatory when v1 solo-founder target — greenfield wizard is the v1 minimum viable onboarding (EE-F010); 3-question maximum is non-negotiable"
  - "Mandatory for public distribution — npm install garura must succeed on all supported Node versions (EE-F011) AND the one-command Claude Code bootstrap must produce an installed state equivalent to sync-claude from source"
  - "Three-question minimum for the greenfield wizard — more questions trigger abandonment; this is a KB-validated tradeoff"
  - "Install is atomic — either complete success or clean failure with no partial state; partial installs are a blocking defect"

hypothesis: >
  We believe that delivering a greenfield wizard that completes in < 3 minutes with a 3-question
  maximum for solo founders evaluating Garura will result in a first-run experience that converts
  evaluators to active users without documentation lookup. We will know this is true when
  garura init completes in < 3 minutes producing a valid project_profile.yaml on 100% of
  clean-install CI runs on supported Node versions.

assumptions_requiring_validation:
  - "3 questions are sufficient to generate a valid project_profile.yaml with enough information to drive configure-capabilities in Stage 3 — if the profile schema requires more fields, the wizard cannot complete the profile in 3 questions"
  - "npm install garura will fit within a reasonable package size on all supported Node LTS versions — the size budget has not been measured for the full capability set"
  - "Solo founders prefer a wizard-based setup over a configuration-file-first setup — this is a UX assumption; if the target audience prefers config files, the wizard approach misses the mark"

dependencies:
  - "npm registry account and publish credentials — EE-F011 requires a public npm package; publish credentials must be set up before the first release"
  - "Claude Code MCP slash-command registration protocol — EE-F011 Claude Code bootstrap must register slash commands in the Claude Code environment; this requires a stable slash-command registration API"

