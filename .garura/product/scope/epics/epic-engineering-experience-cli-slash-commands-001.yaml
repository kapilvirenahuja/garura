expectation:
  vetted:
    status: approved
    approved_by: "human-review-migration-#390"
    approved_at: "2026-05-27"
  success_scenarios:
    - id: S1
      persona: "new Garura adopter who has never read the documentation"
      given: "they type /help in Claude Code"
      then: "they see a complete listing of all available Garura slash commands with one-line descriptions, and the listing loads within 1s"
      measure: "/help output contains one entry per shipped Garura play; verified by counting /help entries against the plays directory listing; latency measured by timing the /help response from invocation to full output display"
    - id: S2
      persona: "developer running /sync-claude twice consecutively on an unchanged source directory"
      given: "the second sync run starts"
      then: "it completes in < 10s with zero file-system changes and a status output showing no drift detected"
      measure: "second sync-claude run produces 0 file modifications in ~/.claude/; runtime < 10s measured from invocation to completion; status output contains 'no drift detected' or equivalent zero-change signal"
  recovery:
    - id: REC1
      for_failure_condition: "A new play ships without its command registry entry being updated, causing it to be missing from the /help listing"
      trigger: "/help listing count is lower than the plays directory count; a developer reports a play not found via /help"
      direction: "/help registry is generated from the plays directory listing at sync time; a CI check verifies /help entry count equals play count on every play addition; registry is never hand-maintained — missing entries are fixed by running /sync-claude"
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_condition: "A developer mid-play needs to check the play's current status but status.json is missing for the running play"
      trigger: "developer cannot find status.json at the expected path; CI automation receives no signal from the play"
      direction: "status.json write is mandatory in every play-step contract; the play blocks if the status write fails; if missing mid-run, check the evidence substrate (AM-F009) commit log for the last successfully committed status before the session was interrupted"
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_condition: "A developer with customized components in ~/.claude/ runs /sync-claude without conflict detection, causing customized components to be silently overwritten"
      trigger: "developer notices behavior change in Claude Code after sync; git diff shows components modified in ~/.claude/ that differ from expected source state"
      direction: "Conflict detection before sync: /sync-claude compares checksums of local components against the source; any local modification triggers a Tether/Vanish gate before overwrite; if already overwritten, check git history for the source state and re-apply customizations"
      handoff: human
      derivable_at_l4: false
    - id: REC4
      for_failure_condition: "A PR merges without distill running, causing learnings from the closed issue to be unavailable in LTM"
      trigger: "next issue starts with no LTM entries from the previous closed issue's work; or developer notices the distill reminder was skipped in the merge-pr session"
      direction: "Distill reminder step in the merge-pr play emits a Tether/Vanish gate if distill has not been run within the same session; when triggered retroactively, run distill on the closed issue's STM artifacts manually before starting the next issue"
      handoff: human
      derivable_at_l4: false
