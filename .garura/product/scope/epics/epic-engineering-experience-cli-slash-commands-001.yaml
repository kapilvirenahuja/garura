appetite: "1 week"

in_scope:
  - "EE-F015 Play Invocation at Standard depth: every play has a slash command; /help lists all available commands with one-line descriptions; invocation latency < 1s"
  - "EE-F016 Status at Standard depth: every play produces a status.json artifact with consistent schema; status survives session end and is readable by CI"
  - "EE-F017 Sync at Standard depth: /sync-claude idempotent; drift detected and surfaced; sync completes in < 10s; second run on unchanged source produces zero file-system changes"
  - "EE-F018 Distill at Standard depth: distill runs post-merge; learnings produce LTM proposals; proposals are reviewable by the developer before promotion"
  - "/help discoverability audit: all 42+ shipped plays appear in /help listing; no commands missing from the registry"

anti_goals:
  - "Tab-complete with arg hints — Advanced depth enhancement for EE-F015; post-v1 DX enhancement"
  - "Governance-gated play invocation — Enterprise depth; requires security_level=high or critical; post-v1 enterprise milestone (Jul 2026)"
  - "Multi-harness /help unification (Factory, Codex CLI) — each harness has its own command surface; this epic covers Claude Code CLI only"
  - "Automated distill without review — distill proposals must be reviewable before LTM promotion; auto-promote is a post-v1 enhancement"

must_not_break:
  - "EPIC-agentic-methodology-component-arch-001 — slash commands invoke plays; the Play→Agent→Skill hierarchy must remain intact for every command invocation; a broken slash command is a broken play"
  - "Existing ~/.claude/ component layout — /sync-claude must not overwrite or corrupt user-customized components; conflict detection is required before any overwrite"

