# epic-engineering-experience-cli-slash-commands-001.yaml
# Garura Platform — Intent Epic (ICE shape per #397)
# Migrated 2026-05-28 from the post-#390 single-file shape to the four-section ICE shape.

id: "EPIC-engineering-experience-cli-slash-commands-001"
domain: "engineering-experience"
capability: "EE-F015"

intent:
  goal: >
    A new Garura adopter who has never read the documentation can reach every Garura play via
    a slash command listed in /help with under 1 second invocation latency, and post-merge
    distill runs automatically on 100% of merged pull requests.
  constraints:
    - "Slash command invocation latency stays under 1 second from invocation to first output."
    - "The sync play completes in under 10 seconds on unchanged source."
    - "OWASP ASVS Level 1 baseline — slash commands invoke internal plays; no external network calls; TLS 1.3 for any remote sync."
    - "WCAG 2.1 AA — applies to any user-interface rendering of command listings or status output."
    - "Every play has a slash command and an entry in /help — slash commands are the primary user contract."
    - "Every play produces a status file — required for any multi-step play so continuous-integration automation can read the outcome."
    - "Sync is idempotent — a second run on unchanged source produces zero file-system changes."
    - "Distill runs post-merge on every merged pull request — every closed issue's learnings reach long-term memory."
  failure_scenario:
    - "A new play ships without its command registry entry being updated — it is missing from the /help listing and is not discoverable."
    - "A developer mid-play needs to check status but the status file is missing for the running play — continuous-integration automation receives no signal and the developer cannot resume."
    - "A developer with customized components in their global Claude folder runs the sync play without conflict detection — customized components are silently overwritten."
    - "A pull request merges without distill running — learnings from the closed issue never reach long-term memory."

expectations:
  vetted:
    status: approved
    approved_by: "human-review-migration-#397"
    approved_at: "2026-05-28"
  success_scenario:
    - id: S1
      persona: "new Garura adopter who has never read the documentation"
      given: "they type /help in Claude Code"
      then: "they see a complete listing of all available Garura slash commands with one-line descriptions, and the listing loads within 1 second."
      measure: "/help output contains one entry per shipped Garura play; verified by counting /help entries against the plays directory listing; latency timed from invocation to full output display."
    - id: S2
      persona: "developer running the sync play twice consecutively on an unchanged source directory"
      given: "the second sync run starts"
      then: "it completes in under 10 seconds with zero file-system changes and a status output reporting no drift detected."
      measure: "Second sync run produces 0 file modifications in the global Claude folder; runtime under 10 seconds measured from invocation to completion; status output contains 'no drift detected' or an equivalent zero-change signal."
  recovery:
    - id: REC1
      for_failure_scenario: "A new play ships without its command registry entry being updated — it is missing from the /help listing and is not discoverable."
      trigger: "/help listing count is lower than the plays directory count; or a developer reports a play not found via /help."
      direction: "The /help registry is generated from the plays directory listing at sync time; a continuous-integration check verifies /help entry count equals play count on every play addition; the registry is never hand-maintained — missing entries are fixed by re-running the sync play."
      handoff: autonomous
      derivable_at_l4: true
    - id: REC2
      for_failure_scenario: "A developer mid-play needs to check status but the status file is missing for the running play — continuous-integration automation receives no signal and the developer cannot resume."
      trigger: "The developer cannot find the status file at the expected path; or continuous-integration automation receives no signal from the play."
      direction: "Status file write is mandatory in every play step contract; the play blocks if the status write fails; if missing mid-run, check the evidence substrate commit log for the last successfully committed status before the session was interrupted."
      handoff: human
      derivable_at_l4: false
    - id: REC3
      for_failure_scenario: "A developer with customized components in their global Claude folder runs the sync play without conflict detection — customized components are silently overwritten."
      trigger: "The developer notices a behavior change in Claude Code after sync; git diff shows components modified in the global Claude folder that differ from expected source state."
      direction: "Conflict detection before sync: the sync play compares checksums of local components against the source; any local modification triggers a Tether approval gate before overwrite; if already overwritten, git history holds the source state and the developer re-applies customizations."
      handoff: human
      derivable_at_l4: false
    - id: REC4
      for_failure_scenario: "A pull request merges without distill running — learnings from the closed issue never reach long-term memory."
      trigger: "The next issue starts with no long-term memory entries from the previous closed issue's work; or the developer notices the distill reminder was skipped in the merge-pr session."
      direction: "The distill reminder step in the merge-pr play emits a Tether approval gate when distill has not been run within the same session; when triggered retroactively, the developer runs distill on the closed issue's short-term memory before starting the next issue."
      handoff: human
      derivable_at_l4: false

connections:
  before_chain:
    intents:
      - "EPIC-agentic-methodology-component-arch-001"
  after:
    intents:
      - "EPIC-engineering-experience-first-run-onboarding-001"
  peers:
    intents: []
  dependency_check: "All before_chain epics carry expectations.vetted.status: approved and post_implementation.status: delivered before this epic begins."

