id: "EPIC-engineering-experience-cli-slash-commands-001"
domain: "engineering-experience"
capability: "EE-F015"

provenance:
  source: brief_explicit
  source_quote: "engineering-experience / cli-slash-commands (LIVE) — Stage-3 user input"
  confidence: high

problem_statement: >
  Developer tools with non-discoverable command surfaces have adoption rates that never
  recover from the first-session experience. A solo founder evaluating Garura who cannot
  find a command without reading documentation will abandon the tool at the first interaction.
  The KB failure scenario is precise: a command not discoverable in the first session
  represents a permanently missed adoption moment. Compound failure: post-merge learnings
  are lost when distill (EE-F018) is not invoked — with no distill reminder in the merge-pr
  play, every closed issue's learnings evaporate before reaching LTM, silently degrading
  the quality of future KBs.

intent: >
  Ensure every Garura play is reachable via a slash command listed in /help with < 1s
  invocation latency, with 0 plays requiring documentation lookup to invoke, and post-merge
  distill running automatically on 100% of merged PRs.

