  - "A developer mid-play needs to check the play's current status but status.json is missing for the running play"
  - "A developer with customized components in ~/.claude/ runs /sync-claude without conflict detection, causing customized components to be silently overwritten"
  - "A PR merges without distill running, causing learnings from the closed issue to be unavailable in LTM"

