success_scenarios:
  - scenario: >
      Given a new Garura adopter who has never read the documentation, when they type
      /help in Claude Code, then they see a complete listing of all available Garura slash
      commands with one-line descriptions, and the listing loads within 1s.
    evidence: >
      /help output contains one entry per shipped Garura play. Verified by counting
      /help entries against the plays directory listing. Latency measured by timing the
      /help response from invocation to full output display.
  - scenario: >
      Given a developer who runs /sync-claude twice consecutively on an unchanged source
      directory, when the second sync run starts, then it completes in < 10s with zero
      file-system changes and a status output showing "no drift detected."
    evidence: >
      Second sync-claude run produces 0 file modifications in ~/.claude/. Runtime < 10s
      measured from invocation to completion. Status output contains "no drift detected"
      or equivalent zero-change signal.

failure_scenarios:
  - scenario: >
      Given a new Garura adopter opening the tool for the first time, when they type
      /help, then one or more plays are missing from the listing because the command
      registry was not updated after a new play shipped.
    impact: >
      Hidden capability — the adopter cannot find the command without reading full
      documentation. Solo-dev impact: first-impression failure leads to permanent
      abandonment; there is no second interaction opportunity once the evaluator leaves.
    mitigation: >
      /help registry is generated from the plays directory listing at sync time; a
      CI check verifies /help entry count equals play count on every play addition;
      registry is never hand-maintained.
  - scenario: >
      Given a developer mid-play who needs to check the play's current status, when
      status.json is missing for the running play, then the developer cannot determine
      whether the play succeeded, failed, or is still running.
    impact: >
      Developer cannot parse play outcome; CI automation that depends on status.json
      for pass/fail decisions receives no signal.
    mitigation: >
      status.json write is mandatory in every play-step contract; the play blocks
      if the status write fails; evidence substrate (AM-F009) ensures the write
      is committed before the step is considered complete.
  - scenario: >
      Given a developer who has customized components in ~/.claude/, when /sync-claude
      runs without conflict detection, then customized components are silently overwritten
      by the sync.
    impact: >
      Lost customization — solo-dev has no backup contributor and no automatic recovery
      for the overwritten files.
    mitigation: >
      Conflict detection before sync: /sync-claude compares checksums of local components
      against the source; any local modification triggers a Tether/Vanish gate before
      overwrite.
  - scenario: >
      Given a PR merged without distill running, when the next issue starts, then the
      learnings from the closed issue are unavailable in LTM and the quality of
      subsequent KB-driven decisions degrades silently.
    impact: >
      Learning loss: every merged PR without distill is a missed capture opportunity.
      On a solo project, the developer is both the executor and the reviewer — there
      is no peer to notice the missing distill step.
    mitigation: >
      Distill reminder step added to the merge-pr play post-merge sequence; the reminder
      emits a Tether/Vanish gate if distill has not been run within the same session.

