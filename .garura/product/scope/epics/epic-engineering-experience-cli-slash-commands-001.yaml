business_rules:
  - "Mandatory for all Garura products — slash commands are the primary user UX contract (EE-F015); every play must have an entry point"
  - "Every play must produce a status.json artifact — mandatory for any multi-step play (EE-F016); CI automation depends on this signal"
  - "Sync must be idempotent — mandatory for multi-harness deployment (EE-F017); second run on unchanged source must produce zero changes"
  - "distill runs post-merge — mandatory for any L3+ project (EE-F018); every closed issue's learnings must reach LTM"

hypothesis: >
  We believe that ensuring every Garura play is reachable via a discoverable slash command
  with < 1s latency for solo founders and software engineers will result in 0 plays requiring
  documentation lookup to invoke, and 100% of merged PRs triggering distill for LTM capture.
  We will know this is true when /help lists all plays, invocation latency is < 1s on all
  runs, and distill executes within the merge-pr session for every closed issue in a
  30-day window.

assumptions_requiring_validation:
  - "New adopters discover Garura capabilities primarily through /help rather than through documentation — if adopters prefer written docs, the /help discoverability investment is less critical than assumed"
  - "The < 1s invocation latency is achievable on all Claude Code host configurations — this assumes no environment-specific delays in the slash-command dispatch layer"
  - "Distill adding a reminder gate in merge-pr is sufficient to drive 100% distill execution — if developers consistently skip the gate, the reminder approach needs to be replaced with a blocking requirement"

