# ─────────────────────────────────────────────────────────────────────────────
# CROSS-TREE CONSTRAINT TRACE
# ─────────────────────────────────────────────────────────────────────────────
# All 10 constraints walked; none fire for this product profile.

constraint_trace:

  applied: []
  # No cross-tree constraints fired. All 10 are not_applicable — see below.

  not_applicable:

    - id: CTC-001
      description: "High-security profiles require multi-factor authentication"
      condition_evaluated: "project_profile.security_level in ['high', 'critical']"
      why_not_applicable: >
        Profile declares security_level: elevated, not 'high' or 'critical'. The
        CTC condition uses a string match against a specific allowed-values set;
        'elevated' is not in that set. MFA (UM-F004) is in the user-management
        domain, which was rejected in Stage 2. CTC does not fire.
      source: ltm
      feature_refs_checked: [UM-F004]
      feature_ref_resolution: "UM-F004 in rejected domain user-management (Stage 2)"
      kb_coverage_note: >
        'elevated' is semantically closer to 'high' than 'standard'. CTC-001's
        allowed-value set (['high','critical']) does not include 'elevated', which
        means a project with elevated security profile escapes this constraint.
        The CTC allowed-value set may warrant extension to include 'elevated' in
        a future KB update — this is a KB authoring gap, not a product scope gap.

    - id: CTC-002
      description: "Healthcare compliance (HIPAA) requires audit logging"
      condition_evaluated: "'HIPAA' in project_profile.compliance"
      why_not_applicable: >
        Profile declares compliance.categories without 'HIPAA'; external_regulations_in_scope_v1
        is explicitly empty ([]) and healthcare is not the industry. Condition does not fire.
      source: ltm
      feature_refs_checked: [UM-F008]
      feature_ref_resolution: "UM-F008 in rejected domain user-management (Stage 2)"

    - id: CTC-003
      description: "Regulated industries require multi-factor authentication"
      condition_evaluated: "project_profile.industry in ['BFSI', 'healthcare', 'government']"
      why_not_applicable: >
        Profile declares industry: developer-tools. Not in the CTC's regulated-industry
        set ['BFSI', 'healthcare', 'government']. Condition does not fire.
      source: ltm
      feature_refs_checked: [UM-F004]
      feature_ref_resolution: "UM-F004 in rejected domain user-management (Stage 2)"

    - id: CTC-004
      description: "Consumer products imply social login for conversion"
      condition_evaluated: "project_profile.audience == 'B2C' and project_profile.delivery_ambition >= 3"
      why_not_applicable: >
        Profile audience is a structured object with primary_roles and adopter_segments,
        not a scalar 'B2C' string. The product targets developer-tools professionals
        (B2D/B2B), not B2C consumers. Condition does not fire.
      source: ltm
      feature_refs_checked: [UM-F007]
      feature_ref_resolution: "UM-F007 in rejected domain user-management (Stage 2)"

    - id: CTC-005
      description: "Tight timeline excludes advanced-depth custom integrations"
      condition_evaluated: "project_profile.timeline == 'tight'"
      why_not_applicable: >
        Profile timeline is a structured object with horizon_months and milestones,
        not a scalar 'tight' string. The condition expects a scalar string value.
        Profile does not declare a 'tight' timeline scalar. Condition does not fire.
      source: ltm
      feature_refs_checked: []
      feature_ref_resolution: "no specific feature references — depth modifier only"

    - id: CTC-006
      description: "GDPR compliance requires profile data export and deletion"
      condition_evaluated: "'GDPR' in project_profile.compliance or project_profile.geographic_scope contains 'EU'"
      why_not_applicable: >
        Profile external_regulations_in_scope_v1: [] — GDPR is on the roadmap
        (external_regulations_roadmap: [GDPR]) but not in v1 scope. Profile does
        not declare geographic_scope. Condition does not fire.
      source: ltm
      feature_refs_checked: [UM-F005]
      feature_ref_resolution: "UM-F005 in rejected domain user-management (Stage 2)"

    - id: CTC-007
      description: "Physical goods commerce requires inventory management"
      condition_evaluated: "project_profile.business_model in ['ecommerce', 'marketplace', 'retail'] and project_profile.product_type == 'physical_goods'"
      why_not_applicable: >
        Garura is a developer-tools DX platform. No business_model or product_type
        fields are declared in the profile. Commerce and retail are not applicable.
        Condition does not fire.
      source: ltm
      feature_refs_checked: [CM-F004]
      feature_ref_resolution: "CM-F004 references commerce domain — rejected domain (not selected in Stage 2)"

    - id: CTC-008
      description: "Marketplace platforms require multi-seller order handling"
      condition_evaluated: "project_profile.persona_complexity == 5 and project_profile.business_model == 'marketplace'"
      why_not_applicable: >
        No persona_complexity or business_model fields declared in profile.
        Garura is not a marketplace platform. Condition does not fire.
      source: ltm
      feature_refs_checked: [CM-F003]
      feature_ref_resolution: "CM-F003 references commerce domain — rejected domain (not selected in Stage 2)"

    - id: CTC-009
      description: "Enterprise SSO-only auth excludes password recovery and social login"
      condition_evaluated: "project_profile.auth_methods == ['sso_only']"
      why_not_applicable: >
        Profile does not declare auth_methods. Garura v1 targets solo-dev / small-squads
        without an enterprise SSO surface. User-management domain rejected in Stage 2.
        Condition does not fire.
      source: ltm
      feature_refs_checked: [UM-F003, UM-F007]
      feature_ref_resolution: "UM-F003, UM-F007 in rejected domain user-management (Stage 2)"

    - id: CTC-010
      description: "POC / MVP delivery ambition skips advanced onboarding and personalization"
      condition_evaluated: "project_profile.delivery_ambition <= 2"
      why_not_applicable: >
        Profile delivery_ambition is a structured object (current_level: L2-spec-driven,
        roadmap_horizon: L3-intent-driven), not a scalar integer <= 2. The CTC condition
        expects a scalar numeric comparison. Profile schema diverges from CTC expectation.
        Condition does not fire.
      source: ltm
      feature_refs_checked: []
      feature_ref_resolution: "no specific feature references — depth modifier only"

