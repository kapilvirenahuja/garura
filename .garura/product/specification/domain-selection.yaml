# Domain Selection — Garura (specify-product Stage 2)
#
# Provenance
# play: specify-product
# stage: 2-domain-selection
# agent: product-keeper
# created_at: 2026-04-18T00:00:00Z
# updated_at: 2026-04-18T00:30:00Z
# update_note: |
#   Restructured from flat 19-feature catalog to 3-tier Domain → Capability → Feature
#   model: 5 domains / 21 capabilities / 81 features. First domain renamed from
#   "ai-methodology-platform" to "agentic-methodology" — the plays/agents/skills/memory
#   substrate is part of the methodology itself (Component Architecture capability),
#   not separate infrastructure. All other domain slugs preserved. Engineering
#   Experience remains elevated as a standalone 5th domain per the prior revision.
# inputs:
#   - .garura/product/specification/market-brief.md
#   - .garura/product/specification/project-profile.yaml
#   - .garura/product/scope/features.yaml (moved from specification/implementation-inventory.yaml on 2026-04-18)
#   - core/components/memory/knowledge/domain/*.md
#
# Method
# 1. 3-tier model: Domain → Capability → Feature enforced across all 5 research files.
# 2. Only Agentic Methodology / Component Architecture carries evidence pointing to
#    plays/agents/skills/memory paths — these ARE the methodology.
# 3. All other capabilities are OUTCOME capabilities mapped to ADRs, philosophy docs,
#    or narrow skills that deliver that outcome.
# 4. Feature ID allocation follows inventory as the source of truth.

selected_domains:
  - slug: agentic-methodology
    origin: stm_research
    rationale: >
      Codifies Garura's Agentic Methodology pillar — the component substrate
      (plays, agents, skills, memory) AND the maturity ladder L1-L5. Core
      differentiator identified by market brief Gap #1 (no competitor codifies
      engineering methodology across sessions). Includes the three-layer hierarchy,
      three memory layers, Tether/Vanish protocol, and evidence & checkpoint
      substrate as LIVE features — these ARE the methodology, not separate
      infrastructure.
    source_path: .garura/product/research/agentic-methodology.md
    capability_count: 5
    feature_count: 23
    feature_ids:
      [AM-F001, AM-F002, AM-F003, AM-F004, AM-F005, AM-F006, AM-F007, AM-F008, AM-F009,
       AM-F010, AM-F011, AM-F012,
       AM-F013, AM-F014, AM-F015,
       AM-F016, AM-F017, AM-F018, AM-F019,
       AM-F020, AM-F021, AM-F022, AM-F023]
