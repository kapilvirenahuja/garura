rejected_domains:
  - slug: commerce
    origin: kb
    source_path: core/components/memory/knowledge/domain/commerce.md
    reason: >
      Covers e-commerce cart, checkout, order, catalog, and promotions — B2C retail
      surface with zero overlap with AI-assisted engineering tooling.

  - slug: payments
    origin: kb
    source_path: core/components/memory/knowledge/domain/payments.md
    reason: >
      Covers payment acceptance, PCI scope, refunds, disputes — merchant payments
      surface. Garura has no payment acceptance surface in v1.

  - slug: personalization
    origin: kb
    source_path: core/components/memory/knowledge/domain/personalization.md
    reason: >
      Covers recommendation engines, collaborative filtering, personalized ranking
      for consumer catalogs. Garura's "personalization" is role-based UI adaptation,
      covered by the engineering-experience domain (EE-F006, EE-F008).

  - slug: search
    origin: kb
    source_path: core/components/memory/knowledge/domain/search.md
    reason: >
      Covers product catalog search, faceted navigation, e-commerce search-relevance
      tuning. Garura's search surfaces (memory retrieval, portal search) are
      substantively different patterns covered by Agentic Methodology (AM-F004/F005/F006).

  - slug: user-management
    origin: kb
    source_path: core/components/memory/knowledge/domain/user-management.md
    reason: >
      Covers consumer/enterprise user auth, registration, profile, session. Garura's
      v1 solo-dev profile defers multi-user auth; post-v1 concern.

