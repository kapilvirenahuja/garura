gaps_for_human_followup:
  - area: cross-tree-constraints
    description: >
      All authored features declare Cross-Tree Refs as (none). Before these research
      domains are promoted to the canonical KB, CTC entries should be authored —
      candidates noted in research files include: "compliance.categories includes
      'token-consumption-tracking' IMPLIES AG-F001"; "'designer' in audience.primary_roles
      IMPLIES EE-F019"; "len(audience.primary_roles) > 2 IMPLIES EE-F006";
      "delivery_ambition.current_level >= 'L3' IMPLIES AM-F013 + AG-F005 + EO-F008";
      "compliance.categories includes 'ai-usage-traceability' IMPLIES AG-F004".
    severity: medium
    unblocks: promotion of research domains to core/components/memory/knowledge/domain/

  - area: research-domain-context-skill-mismatch
    description: >
      The research-domain-context skill writes a domain-context.md in a
      prose-with-sources format, not the 3-tier Domain → Capability → Feature schema
      authored here. Skill should be updated or play Stage 2 instructions should
      call direct authoring as the expected pattern.
    severity: medium
    unblocks: future automation of Stage 2 via the skill

  - area: old-file-cleanup
    description: >
      .garura/product/research/ai-methodology-platform.md (previous version) is now
      superseded by agentic-methodology.md. The old file should be deleted or
      archived as part of next hygiene pass.
    severity: low
    unblocks: clean research folder
