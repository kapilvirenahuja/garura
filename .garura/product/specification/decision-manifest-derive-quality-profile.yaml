        1. ai-usage-traceability — 100% of play-produced commits carry AI-authorship commit
           trailer (RATCHETED by AG-F004; sourced from EPIC-ai-governance-audit-attribution-001)
        2. audit-trail — every inferred decision in a decision manifest before primary artifact
           write; zero silent resolutions (AG-F005; sourced from EPIC-ai-governance-audit-
           attribution-001 + EPIC-agentic-methodology-l3-intent-driven-001 +
           EPIC-work-intelligence-intent-driven-verification-001)
        3. memory-governance — all STM→LTM promotions follow documented canonicalization workflow
           (sourced from EPIC-agentic-methodology-l2-spec-driven-001)
      The floor-setting epic is EPIC-ai-governance-audit-attribution-001 (AG-F004), which carries
      a RATCHET NOTE explicitly in its file header and the strictest compliance posture of any
      epic in the set. All 9 epics align on OWASP ASVS Level 1 as the base; none downgrade below
      this floor.
    alternatives_considered:
      - alt: >
          Treat security characteristic as baseline OWASP ASVS Level 1 without ratchet — each
          epic independently satisfies its own security constraint without product-level uplift
        why_not: >
          Profile.compliance.categories carries 3 mandates (ai-usage-traceability, audit-trail,
          memory-governance) that fire ratchet per AG-F004 enrich logic. A flat ASVS Level 1
          without compliance-mandate ratchet would be incomplete — the compliance_mandates
          list in the security_profile must record all three categories regardless of ASVS level.
      - alt: "Escalate to OWASP ASVS Level 2 given elevated security_level in profile"
        why_not: >
          Profile declares security_level=elevated, not 'high' or 'critical'. No external
          regulations are in scope for v1 (external_regulations_in_scope_v1=[]). ASVS Level 2
          is appropriate for publicly facing applications with authentication; Garura v1 is
          developer tooling with no external auth surface in v1. Escalating to Level 2 would
          impose controls (server-side auth, session tokens) that do not apply to the current
          product surface. Level 2 is the post-v1 target if SOC2 enters scope.
    agent_reasoning_summary: >
      The security ratchet in this quality profile is compliance-mandate-driven, not
      authentication-strength-driven. The floor-setting epic is audit-attribution (AG-F004),
      which carries an explicit RATCHET NOTE declaring commit-trailer enforcement as mandatory
