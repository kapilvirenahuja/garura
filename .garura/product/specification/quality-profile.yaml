iso_25010_profile:

  functional_suitability:
    relevance: high
    targets:
      - "≥ 95% of engineering actions invoked via plays with full KB traceability over a 30-day window (source: EPIC-agentic-methodology-component-arch-001)"
      - "100% of intent epics pass validate-intent-epics schema validation before spec-lock gate with 0 blocking violations on first run (source: EPIC-agentic-methodology-l2-spec-driven-001)"
      - "100% of specify-product runs produce epics passing validate-intent-epics with zero blocking violations on first run (source: EPIC-agentic-methodology-l3-intent-driven-001)"
      - "100% of play-produced commits carry AI-authorship commit trailer in a 30-day window (source: EPIC-ai-governance-audit-attribution-001)"
      - "Every play reachable via a slash command in /help with 0 plays requiring documentation lookup (source: EPIC-engineering-experience-cli-slash-commands-001)"
      - "Solo founder completes Garura initialization < 3 minutes from npm install to valid project_profile.yaml (source: EPIC-engineering-experience-first-run-onboarding-001)"
      - "Every component update reflected in every adapter harness (Claude Code, Codex CLI, Factory Droid) within 30s of the corresponding /sync-claude, /sync-codex, or /sync-droid invocation with zero drift (source: EPIC-engineering-experience-ide-integrations-001)"
      - "Every PR receives quality-check report (coverage delta, lint, security scan) within 3 minutes on ≥ 95% of supported stacks (source: EPIC-engineering-observability-quality-signals-001)"
      - "fix-it closes ≥ 95% of filed defects without reopening within the same milestone window (source: EPIC-work-intelligence-intent-driven-verification-001)"
    rationale: >
      Functional suitability targets are derived from the measurable success criteria embedded
      in each epic's hypothesis and success_scenarios. These represent the product's core
      functional contract — every target is traceable to a specific epic's intent statement.

  performance_efficiency:
    relevance: high
    targets:
      - "Slash command invocation latency < 1s from invocation to first output (source: EPIC-engineering-experience-cli-slash-commands-001)"
      - "/sync-claude, /sync-codex, /sync-droid each complete in < 10s on unchanged source; sync reflects modified components in harness within 30s (source: EPIC-engineering-experience-ide-integrations-001)"
      - "Play invocation success rate ≥ 90% over rolling 30 days (source: EPIC-agentic-methodology-component-arch-001)"
      - "Play evidence artifact committed within 30s of step completion (source: EPIC-agentic-methodology-component-arch-001)"
      - "check-drift surfaces findings within 5 minutes of post-merge run (source: EPIC-agentic-methodology-l2-spec-driven-001)"
      - "Level-up transitions complete with zero schema-breaking changes in ≥ 95% of transitions (source: EPIC-agentic-methodology-l2-spec-driven-001)"
      - "Commit hook overhead adds < 200ms to commit time (source: EPIC-ai-governance-audit-attribution-001)"
      - "Audit bundle generation completes in < 30s for a typical 30-day evidence set (source: EPIC-ai-governance-audit-attribution-001)"
      - "Greenfield wizard: npm install garura completes in < 2 minutes on 10 Mbps connection (source: EPIC-engineering-experience-first-run-onboarding-001)"
      - "sync-droids parity tests complete in < 2 minutes (source: EPIC-engineering-experience-ide-integrations-001)"
      - "quality-check completes in < 3 minutes per PR; security scanner run in < 5 minutes; posture dashboard loads within 5 minutes of scan completion (source: EPIC-engineering-observability-quality-signals-001)"
      - "evals-creator completes eval generation for a full play in < 2 minutes; synthesized test suite runs in < 5 minutes for a single capability (source: EPIC-work-intelligence-intent-driven-verification-001)"
    per_play_timing_baselines:
      note: >
        Per-play wall-clock timing must be baselined against the current implementation.
        Values are intentionally left BLANK — first instrumented run of each play records
        p50/p95/p99 wall-clock time; acceptable thresholds are set from that baseline in
        the next quality-profile revision. Do NOT fill with guesses; missing measurement
        is the signal that instrumentation is not yet wired.
      fields_per_play: [p50_seconds, p95_seconds, p99_seconds, target_p95_seconds, measured_at]
      plays:
        specify-product: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
        prepare-epic: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
        implement-epic: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
        validate-epic: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
        generate-intent-epics: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
        validate-intent-epics: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
        configure-capabilities: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
        enrich-capabilities: { p50_seconds: null, p95_seconds: null, p99_seconds: null, target_p95_seconds: null, measured_at: null }
