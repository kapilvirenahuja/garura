        label: posture.yaml

  - id: context-loading
    capability_id: session-bootstrap
    name: Context loading path
    description: Load relevant STM and LTM context at session start.
    status: partial
    evidence:
      - kind: manually-curated
        label: posture.yaml

  - id: atomic-plays
    capability_id: play-execution
    name: Atomic play execution
    description: Run small, deterministic plays with constrained delegation.
    status: live
    evidence:
      - kind: manually-curated
        label: posture.yaml

  - id: approval-checkpoints
    capability_id: play-execution
    name: Approval checkpoints
    description: Pause plays at the right moments and wait for explicit Tether/Vanish decisions.
    status: partial
    evidence:
      - kind: manually-curated
        label: posture.yaml

  - id: headless-discover-product
    capability_id: play-execution
    name: Headless discover-product execution
