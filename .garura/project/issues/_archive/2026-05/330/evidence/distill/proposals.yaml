    artifact: "lint-components structural rule — play frontmatter requirements"
    artifact_path: "core/tools/lint-components/lib/rules/structural.js"
    section: "checkPlay required fields"
    finding: >
      Plays must NOT declare model: in their frontmatter. Plays inherit the model
      from the user's harness session at runtime. The linter's checkPlay function
      should only require name, description, and user-invocable (or user-invokable).
      Skills and agents DO require model because they run in isolated subagent
      contexts with a fixed model binding.
    evidence: >
      PR #331 removed model from checkPlay's requiredFields list. Before the fix,
      16 plays were emitting false-positive missing-frontmatter-field errors for
      model. The comment at line 189-191 of structural.js now documents the
      rationale: "model is intentionally NOT required — plays inherit the model
      from the user's harness session".
    proposed_enrichment: >
      Add to linting standards documentation: play frontmatter requires name,
      description, and user-invocable only. Model is absent by design — plays
      are session-model-agnostic. Skill and agent frontmatter still require model
      as a fixed binding. This distinction should be documented in any
      component-authoring guide or lint rule reference to prevent recurrence.
    approval_status: "pending"

