step_evals:
  # ============ Failure Condition Evals ============

  - id: SE-1
    source_type: failure_condition
    failure_condition_id: F1
    constraint_id: null
    skill: run-generated-tests-isolated
    check: For every commit on the produced history, the test suite is green
    artifact_pattern: "{stm}/{issue}/evidence/refactor/test-run-reports/post-commit-{n}.yaml"
    pass_criteria: Every post-commit test-run-report.yaml shows status passed and zero failed tests
    fail_criteria: Any post-commit test-run-report shows status failed or any failed test count > 0

  - id: SE-2
    source_type: failure_condition
    failure_condition_id: F2
    constraint_id: null
    skill: quality-check-scoped
    check: Public API surface matches baseline; differences appear only when the user has explicitly authorised them
    artifact_pattern: "{stm}/{issue}/evidence/refactor/api-diff.yaml"
    pass_criteria: api-diff.yaml shows empty diff OR every diff entry references an authorisation entry from the input scope
    fail_criteria: api-diff.yaml shows differences not covered by an authorisation entry

  - id: SE-3
    source_type: failure_condition
    failure_condition_id: F3
    constraint_id: null
    skill: map-test-surface
    check: No test that was green at baseline is missing, skipped, or weakened in the final state
    artifact_pattern: "{stm}/{issue}/evidence/refactor/test-surface-final.yaml"
    pass_criteria: Final test-surface.yaml contains every test_id present in the baseline test-surface.yaml with status not skipped and assertion_count not lower
    fail_criteria: Any baseline test_id missing, skipped, or with assertion_count lower than baseline

  - id: SE-4
    source_type: failure_condition
    failure_condition_id: F4
    constraint_id: null
    skill: create-commit
    check: No commit mixes a behaviour change (feature, bug fix, dependency change) with refactor work
    artifact_pattern: "{stm}/{issue}/evidence/refactor/commits/commit-{n}.yaml"
    pass_criteria: Every commit-{n}.yaml with prefix refactor: shows diff containing only restructuring changes; behaviour changes appear only in commits prefixed fix:
    fail_criteria: Any commit prefixed refactor: contains a behaviour change in its diff per the commit metadata

  - id: SE-5
    source_type: failure_condition
    failure_condition_id: F5
    constraint_id: null
    skill: run-generated-tests-isolated
    check: Final test count is not lower than the baseline test count
    artifact_pattern: "{stm}/{issue}/evidence/refactor/test-run-reports/final.yaml"
    pass_criteria: Final test-run-report.yaml total_tests value is greater than or equal to baseline test-run-report.yaml total_tests value
    fail_criteria: Final test-run-report total_tests value is less than baseline total_tests value

  - id: SE-6
    source_type: failure_condition
    failure_condition_id: F6
    constraint_id: null
    skill: create-commit
    check: Each commit is an atomic single refactor move with prefix refactor:, test:, or fix: as appropriate
    artifact_pattern: "{stm}/{issue}/evidence/refactor/commits/commit-{n}.yaml"
    pass_criteria: Every commit-{n}.yaml shows exactly one refactor move and message prefix is one of refactor:, test:, fix:
    fail_criteria: Any commit-{n}.yaml shows more than one move OR message prefix is not in the allowed set

  - id: SE-7
    source_type: failure_condition
    failure_condition_id: F7
    constraint_id: null
    skill: author-regression-test
    check: When the target scope had thin coverage at start, characterization tests were committed before the first refactor commit
    artifact_pattern: "{stm}/{issue}/evidence/refactor/regression-tests/regression-test.yaml"
    pass_criteria: When map-test-surface flagged thin coverage, regression-test.yaml exists with status written and red_verified true, and the corresponding commit prefix is test: with timestamp earlier than the first refactor: commit
    fail_criteria: Thin coverage was flagged but no regression-test.yaml exists OR no test: commit precedes the first refactor: commit

  - id: SE-8
    source_type: failure_condition
    failure_condition_id: F8
    constraint_id: null
    skill: quality-check-scoped
    check: No new dependency, framework, or pattern was introduced without explicit user authorisation
    artifact_pattern: "{stm}/{issue}/evidence/refactor/findings-final.yaml"
    pass_criteria: findings-final.yaml shows zero findings of standard_id dependency-introduced OR all such findings reference an authorisation entry
    fail_criteria: findings-final.yaml shows any dependency-introduced finding without an authorisation reference

  - id: SE-9
    source_type: failure_condition
    failure_condition_id: F9
    constraint_id: null
    skill: quality-check-scoped
    check: Out-of-scope edits do not appear in the diff; deferred items appear in FOLLOWUPS.md
    artifact_pattern: "{stm}/{issue}/evidence/refactor/findings-final.yaml"
    pass_criteria: findings-final.yaml shows zero findings of standard_id out-of-scope-edit AND FOLLOWUPS.md exists when deferrals were noted during execution
    fail_criteria: findings-final.yaml shows any out-of-scope-edit finding OR deferrals were noted but FOLLOWUPS.md is absent

  - id: SE-10
    source_type: failure_condition
    failure_condition_id: F10
    constraint_id: null
    skill: draft-technical-approach
    check: Baseline test result, blast-radius map, and a 3-to-7-step plan (or Mikado graph) were reported before any refactor commit
    artifact_pattern: "{stm}/{issue}/evidence/refactor/plan.yaml"
    pass_criteria: baseline test-run-report.yaml, blast-radius.yaml, and plan.yaml all exist with timestamps earlier than the first refactor: commit
    fail_criteria: Any of baseline test-run-report.yaml, blast-radius.yaml, or plan.yaml is missing OR any has timestamp later than the first refactor: commit

  - id: SE-11
    source_type: failure_condition
    failure_condition_id: F11
    constraint_id: null
    skill: run-generated-tests-isolated
    check: Refactor commits were not executed despite a red baseline test suite or an unclean working tree at start
    artifact_pattern: "{stm}/{issue}/evidence/refactor/test-run-reports/baseline.yaml"
    pass_criteria: Baseline test-run-report.yaml shows status passed AND pre-flight working-tree-snapshot.txt is empty before any refactor: commit exists
    fail_criteria: Baseline test-run-report shows status failed OR working-tree-snapshot is non-empty AND any refactor: commit exists

  - id: SE-12
    source_type: failure_condition
    failure_condition_id: F12
    constraint_id: null
    skill: draft-technical-approach
    check: Final report contains baseline metrics, executed plan with commit references, before/after structural summary, an explicit statement of what did not change, deferred follow-ups, and self-check results
    artifact_pattern: "{stm}/{issue}/evidence/refactor/final-report.md"
    pass_criteria: final-report.md contains all six required sections — baseline-metrics, executed-plan, structural-summary, what-did-not-change, deferred-followups, self-check
    fail_criteria: final-report.md is missing any of the six required sections

  # ============ Constraint Evals (artifact-verifiable only) ============

  - id: SE-13
    source_type: constraint
    failure_condition_id: null
    constraint_id: C4
    skill: author-regression-test
    check: Where the target scope has thin test coverage, characterization tests pinning current behaviour (including edge cases and error paths) are authored and committed before any refactor commit, in a commit prefixed test:
    artifact_pattern: "{stm}/{issue}/evidence/refactor/regression-tests/regression-test.yaml"
    pass_criteria: When test-surface.yaml shows coverage_status thin for the target, regression-test.yaml exists with status written, red_verified true, and a commit prefixed test: precedes the first refactor: commit
    fail_criteria: Coverage was thin but regression-test.yaml absent OR no test: commit precedes the first refactor: commit

  - id: SE-14
    source_type: constraint
    failure_condition_id: null
    constraint_id: C5
    skill: create-commit
    check: Each refactor commit contains exactly one refactor move, is prefixed refactor:, and leaves the test suite green on its own
    artifact_pattern: "{stm}/{issue}/evidence/refactor/commits/commit-{n}.yaml"
    pass_criteria: Every commit-{n}.yaml with prefix refactor: shows exactly one move AND its post-commit test-run-report.yaml shows status passed
    fail_criteria: Any refactor: commit shows more than one move OR its post-commit test-run-report shows status failed

  - id: SE-15
    source_type: constraint
    failure_condition_id: null
    constraint_id: C6
    skill: create-commit
    check: Behaviour changes are never mixed into a refactor commit; discovered bugs are recorded and proposed as separate fix: commits only after explicit user confirmation
    artifact_pattern: "{stm}/{issue}/evidence/refactor/commits/commit-{n}.yaml"
    pass_criteria: Every refactor: commit shows zero behaviour-change diff hunks; every fix: commit shows a user_confirmation field set to true
    fail_criteria: Any refactor: commit contains a behaviour-change hunk OR any fix: commit lacks user_confirmation true

  - id: SE-16
    source_type: constraint
    failure_condition_id: null
    constraint_id: C7
    skill: quality-check-scoped
    check: The public API surface — exported names, signatures, return shapes, error types, HTTP routes, CLI flags, DB columns, and wire/serialization contracts — remains unchanged unless the out-of-scope authorisation explicitly permits a named change
    artifact_pattern: "{stm}/{issue}/evidence/refactor/api-diff.yaml"
    pass_criteria: api-diff.yaml shows empty diff OR every diff entry references an explicit authorisation entry from the input scope
    fail_criteria: api-diff.yaml shows any change to exported names, signatures, return shapes, error types, HTTP routes, CLI flags, DB columns, or wire contracts not referenced by an authorisation entry

  - id: SE-17
    source_type: constraint
    failure_condition_id: null
    constraint_id: C8
    skill: map-test-surface
    check: Tests are not deleted, skipped, or weakened to make a commit pass; if a previously green test goes red, the refactor commit is reverted
    artifact_pattern: "{stm}/{issue}/evidence/refactor/test-surface-final.yaml"
    pass_criteria: Every baseline test_id is present in test-surface-final.yaml with status not skipped AND assertion_count not lower than baseline AND no commit-revert log entry shows an unreverted red test
    fail_criteria: Any baseline test_id missing, skipped, weakened (assertion_count lower) OR a red test was observed without a corresponding revert

  - id: SE-18
    source_type: constraint
    failure_condition_id: null
    constraint_id: C9
    skill: quality-check-scoped
    check: No new dependency, framework, or architectural pattern is introduced unless the user explicitly asked for it; extract, rename, inline, and move are preferred over new abstractions; shared abstractions follow the rule of three
    artifact_pattern: "{stm}/{issue}/evidence/refactor/findings-final.yaml"
    pass_criteria: findings-final.yaml shows zero findings of standard_id dependency-introduced or pattern-introduced unless each references an authorisation entry; every shared abstraction has at least three call sites
    fail_criteria: findings-final.yaml shows a dependency-introduced or pattern-introduced finding without an authorisation reference OR a shared abstraction with fewer than three call sites

  - id: SE-19
    source_type: constraint
    failure_condition_id: null
    constraint_id: C10
    skill: quality-check-scoped
    check: Out-of-scope cleanups, opportunistic edits, and "while I'm here" changes are not included in the diff; they are recorded in FOLLOWUPS.md instead
    artifact_pattern: "{stm}/{issue}/evidence/refactor/findings-final.yaml"
    pass_criteria: findings-final.yaml shows zero findings of standard_id out-of-scope-edit AND FOLLOWUPS.md exists in the repo when any deferral was logged
    fail_criteria: findings-final.yaml shows any out-of-scope-edit finding OR a deferral was logged but FOLLOWUPS.md is absent

  - id: SE-20
    source_type: constraint
    failure_condition_id: null
    constraint_id: C11
    skill: run-generated-tests-isolated
    check: After every commit, the test count equals or exceeds the baseline count, the suite is green, the type-checker/compiler is clean, lint shows no new violations, and total test runtime remains within approximately 10% of the baseline
    artifact_pattern: "{stm}/{issue}/evidence/refactor/test-run-reports/post-commit-{n}.yaml"
    pass_criteria: For every post-commit test-run-report.yaml — total_tests is greater than or equal to baseline total_tests, status is passed, type_check_status is clean, lint_status shows no new violations relative to baseline, and runtime_seconds is within approximately 10% of baseline runtime_seconds
    fail_criteria: Any post-commit test-run-report fails any of the five checks

  - id: SE-21
    source_type: constraint
    failure_condition_id: null
    constraint_id: C12
    skill: draft-technical-approach
    check: The execution plan presented before editing consists of 3 to 7 numbered, independently shippable steps; if more steps are required, a Mikado-style prerequisite graph is reported and execution does not begin until the user has seen it
    artifact_pattern: "{stm}/{issue}/evidence/refactor/plan.yaml"
    pass_criteria: plan.yaml contains a steps array with length between 3 and 7 inclusive AND each step has independently_shippable true; OR plan.yaml contains a mikado_graph entry AND a user_acknowledgement timestamp earlier than the first refactor: commit
    fail_criteria: plan.yaml steps array length is outside 3-7 without a mikado_graph entry OR a mikado_graph exists without a user_acknowledgement timestamp before the first refactor: commit

  - id: SE-22
    source_type: constraint
    failure_condition_id: null
    constraint_id: C13
    skill: compute-blast-radius
    check: Blast radius — every caller of the public surface in scope and every wire, serialization, or DB contract that touches it — is mapped and reported before any edit
    artifact_pattern: "{stm}/{issue}/evidence/refactor/blast-radius.yaml"
    pass_criteria: blast-radius.yaml exists with direct_count and transitive_count fields populated AND its timestamp is earlier than the first refactor: commit AND it includes a contracts section enumerating wire, serialization, or DB contracts touching the target
    fail_criteria: blast-radius.yaml is missing OR its timestamp is later than the first refactor: commit OR the contracts section is absent

scenario_evals:
  - id: SCE-1
    scenario_id: S1
    persona: Developer
    artifact_pattern: "{stm}/{issue}/evidence/refactor/commits/*.yaml + git log"
    check: Can review a sequence of small refactor: (and possibly test:) commits, each of which can be checked out independently and runs green, and can confidently revert any single commit without breaking the build
    pass_criteria: For every commit on the branch, checking out that commit and running the test suite shows status passed AND reverting any single commit and re-running tests shows status passed
    fail_criteria: Any single commit checkout shows test status failed OR reverting any single commit shows test status failed

  - id: SCE-2
    scenario_id: S2
    persona: Tech Lead
    artifact_pattern: "{stm}/{issue}/evidence/refactor/final-report.md"
    check: Can verify behaviour preservation at a glance — baseline vs final test counts and runtime, a public-API diff that is empty or matches the authorised list, and an explicit list of what did NOT change — without having to re-derive any of it from the diff
    pass_criteria: final-report.md contains a baseline-vs-final table with test counts and runtime, an api-diff section that is empty or maps each entry to an authorisation entry, and a what-did-not-change section
    fail_criteria: Any of the three sections is missing from final-report.md

  - id: SCE-3
    scenario_id: S3
    persona: Reviewer of the resulting pull request
    artifact_pattern: "git log + diff + FOLLOWUPS.md"
    check: Can confirm that every commit is a single refactor move with a conventional prefix, no test was deleted or weakened, no new dependency was added, and any deferred work appears in FOLLOWUPS.md rather than being smuggled into the diff
    pass_criteria: Every commit on the branch has prefix refactor:, test:, or fix: AND test-surface-final.yaml shows no deleted/weakened tests vs baseline AND findings-final.yaml shows no dependency-introduced or out-of-scope-edit findings AND FOLLOWUPS.md exists when deferrals were logged
    fail_criteria: Any commit has a non-conventional prefix OR test-surface-final.yaml shows missing/weakened tests OR findings-final.yaml shows uncovered dependency or out-of-scope findings OR FOLLOWUPS.md is absent when deferrals were logged

  - id: SCE-4
    scenario_id: S4
    persona: Developer
    artifact_pattern: "{stm}/{issue}/evidence/refactor/test-run-reports/baseline.yaml + git log"
    check: Receives an immediate halt with a clear report that refactoring on red is forbidden, and no commits have been made to the branch
    pass_criteria: When baseline.yaml shows status failed, the play wrote a halt-report.md naming the red baseline as the cause AND no refactor: or test: commit exists on the branch after the halt
    fail_criteria: baseline.yaml shows status failed AND any refactor: or test: commit exists after the halt timestamp OR halt-report.md is absent

  - id: SCE-5
    scenario_id: S5
    persona: Developer
    artifact_pattern: "{stm}/{issue}/evidence/refactor/regression-tests/regression-test.yaml + git log"
    check: Receives, before any structural change, a test: commit (or commits) introducing characterization tests that pin the current behaviour, so the subsequent refactor commits are protected by an explicit safety net
    pass_criteria: When test-surface.yaml shows thin coverage on the target, regression-test.yaml exists with red_verified true AND at least one commit prefixed test: has a timestamp earlier than the first refactor: commit
    fail_criteria: Coverage was thin but regression-test.yaml is absent OR no test: commit precedes the first refactor: commit

  - id: SCE-6
    scenario_id: S6
    persona: Product Owner
    artifact_pattern: "{stm}/{issue}/evidence/refactor/api-diff.yaml + final-report.md"
    check: Observes no change in features, no change in API contracts, no change in user-facing behaviour, and no change in upstream/downstream integrations
    pass_criteria: api-diff.yaml shows empty diff (or only authorised entries) AND final-report.md what-did-not-change section explicitly lists features, API contracts, user-facing behaviour, and upstream/downstream integrations
    fail_criteria: api-diff.yaml shows unauthorised changes OR final-report.md does not explicitly list features, API contracts, user-facing behaviour, and integrations as unchanged
