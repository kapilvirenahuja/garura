      into .claude/skills/decode-temp-{name}/ for Skill tool dispatch and cleaned
      up on final Tether. Missing playbook for a detected stack is a hard halt —
      there is no generic fallback. Pattern implication: any play with
      stack-varying extraction work should follow this playbook-at-runtime model
      rather than embedding stack names in compiled play artifacts.
