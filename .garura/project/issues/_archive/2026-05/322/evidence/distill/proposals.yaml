    proposed_enrichment: >
      /decode establishes a hard gate: generated tests MUST pass green against
      the current unmodified codebase before a spec is marked "captured" in
      proposals.yaml (C23–C25). The test-runner agent operates in strict context
      isolation — it sees only generated test files plus the codebase; no
      extraction context, spec content, or agent reasoning leaks in (C15, F12).
      A red baseline never ships; the spec is revised, the test dropped, or the
      unit deferred. This makes the generated test suite the migration contract:
      specs without passing tests are opinions without proof. Test tiers are
      portability-stratified (A=contract, B=flow E2E, C=pure-logic unit,
      D=stack-coupled cited-only). Stack-coupled units never receive generated
      tests (F11) — they die with the old stack and must not contaminate the
      migration contract. Pattern implication: any play that generates
      artifacts that will be executed on a new stack should adopt the
      same generated-verification-before-capture discipline.
