input_type: "title"
value: "Domain Memory: Module-Feature Taxonomy, Project Profiling Dimensions, and Epic Management Rules"
parent: null
description: |
  Build a domain memory system for Meridian with three core concepts:

  ## Part 1: Domain → Module → Feature Taxonomy
  Structure domain knowledge as modules (micro-service-like boundaries) with features beneath them.
  Examples:
  - User Management: login, forgot password, change password, MFA, profile (primary, extended, preferences), analytics
  - Payments: fraud detection, one-click payments, multi-phase payments, regional compliance, UX architecture
  - Commerce, Personalization, Search, etc.

  Each module defines its feature catalog — the set of capabilities it can offer.

  ## Part 2: Project Profiling Dimensions
  Define dimensions to rank/profile a project:
  - Risk: Level 1 (low) to 5 (high) — influences feature selection
  - Security: ranges from basic consumer (co-op login) to BFSI-grade (mandatory MFA, encryption)
  - Performance: latency/throughput requirements
  - Availability: uptime/redundancy requirements

  A project profile is established during product discovery (discover-product). The profile determines which features
  become mandatory vs optional. Example: high-risk + high-security → MFA mandatory in user management.

  ## Part 3: Epic Management Rules (Agent Lifecycle Domain)
  Domain knowledge for how epics should be structured:
  - Epics must be vertical slices — completing an epic delivers testable user value
  - Epics must not span multiple modules — scoped to one domain (user mgmt OR payments, not both)
  - Dependencies across modules are allowed, but the epic lives in one module
  - Mocks are acceptable for phased delivery, but full integration should be the target
  - Epics can be broken into smaller features for phased delivery (mocks → integration)
  - Delivering an epic = delivering value to the user, or the epic is poorly scoped
