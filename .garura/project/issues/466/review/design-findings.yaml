# Design-grounding findings — harness category, PR #477 (issue #466, Batch D)
#
# Grounding sources (all committed on main, none from this branch's own new content):
#   - docs/adr/025-level-3-redefined-skeleton-and-loop.md (merged to main via #461,
#     prior to this branch's base) — the Level 3 skeleton/goal-loop model itself:
#     determinism lives at the skeleton, each box gets 4 walls (stop condition,
#     checker, budget, evidence schema), interior choreography is retired.
#   - core/components/memory/standards/rules/play-close.md — the Standard Play Close
#     mechanism: Step C0 stop-condition gate runs BEFORE evidence/self-clean, binds
#     COMPLETED vs HALTED; the session identity stamp (#463); the canonical
#     check_stop_condition.py / session_stamp.py copies plays must stamp verbatim.
#   - core/components/memory/standards/rules/gate-config.md — checkpoints are config
#     switches classed docs-only/standard/one-way-door; a play with no checkpoint has
#     nothing to class.
#   - CLAUDE.md "Play Pipeline Rules" (committed, root of repo, predates branch) —
#     intent change must trace to reference/ice.md and recompile; non-intent change
#     is a direct SKILL.md edit carrying a "Direct-edit deviation note" footer.
#   - Existing on-disk structure of install-garura/ and uninstall-garura/ (no
#     reference/ice.md, no intent.yaml, no stop-condition.yaml in either folder,
#     verified by directory listing) — the base fact the exemption notes describe.
#   - core/components/plays/grill/scripts/validate_epics.py's own argparse definition
#     (`--slice-ref`, not `--slice-file`) — the base fact the grill fix corrects.

category: harness
grounding_note: >
  All principles below trace to committed sources that exist independently of this
  branch (ADR 025 landed via PR #461 before this branch's base commit; play-close.md
  and gate-config.md are on main; CLAUDE.md's play-pipeline rule and the install/
  uninstall folder shapes are pre-existing repo facts). None were reconstructed from
  next/SKILL.md's, next/reference/ice.md's, or the exemption notes' own new prose.
findings:
  - file: core/components/plays/next/stop-condition.yaml
    principle: >
      A play's "Done means" (ICE expectation) is baked verbatim into a
      stop-condition.yaml manifest with id/says/check clauses of a closed clause-type
      set (artifact_exists, field_equals, gate_outcomes_pass), evaluated by the
      canonical check_stop_condition.py before close.
    committed_source: >
      docs/adr/025-level-3-redefined-skeleton-and-loop.md — "Stop condition | A 'done
      means' statement the loop can evaluate itself — machine-checkable, not prose |
      Ending because the step list ran out"; core/components/memory/standards/rules/
      play-close.md — "Stop-condition gate (#464) ... When the compiled play carries a
      baked stop-condition.yaml (generated by play-creator from the ICE's 'Done means'
      section), Step C0 evaluates it via scripts/check_stop_condition.py".
    conformance: confirmed
    detail: >
      D1/D2/D3 in stop-condition.yaml match ice.md's "### Done means" section 1:1
      (candidates.json, recommendations.yaml, recommendations.md), and next/scripts/
      check_stop_condition.py is byte-for-byte the canonical script at
      core/components/plays/play-creator/references/check_stop_condition.py — verified
      by diff. No deviation from the committed design.
    severity: null

  - file: core/components/plays/next/SKILL.md
    principle: >
      Step C0 (the stop-condition gate) must run BEFORE the self-clean step that
      deletes the working folder that holds the artifacts the gate checks — the gate
      is the close's authoritative input, and self-clean must never run ahead of it.
    committed_source: >
      core/components/memory/standards/rules/play-close.md — "Stop-condition gate
      (#464) ... Step C0 evaluates it ... The verdict binds the close: held ⇒
      status: COMPLETED is permitted; unmet ⇒ the run closes HALTED"; the Standard
      Play Close block in the same file places the stop-condition check inside the
      close bash block, ahead of the rm -rf self-clean shown for /next's own C10 in
      this play.
    conformance: confirmed
    detail: >
      The diff places check_stop_condition.py's invocation inside the Step 8 close
      block, and Step 9 (self-clean, rm -rf "${working}") runs after it and after the
      evidence write — matching the committed ordering rule. SE-8/F9/REC9 correctly
      wire the new failure condition to this gate.
    severity: null

  - file: core/components/plays/next/SKILL.md
    principle: >
      Every human checkpoint is a config-classed gate switch (docs-only / standard /
      one-way-door); a play with no checkpoint has nothing to class under
      gate-config.md, and should say so rather than silently omitting it.
    committed_source: >
      core/components/memory/standards/rules/gate-config.md — "Every checkpoint in a
      compiled play declares its risk class inline ... A checkpoint with no declared
      class resolves as standard." (By omission: a play with zero checkpoints has zero
      rows to classify.)
    conformance: confirmed
    detail: >
      /next has always been checkpoint-free (readiness/advisory only). The diff adds
      the explicit line "this play has no checkpoint, so there are no gates to class
      under gate-config.md" and updates workflow_structure metadata to the same
      effect — an accurate, non-circular statement of an existing structural fact, not
      a new design claim invented by the branch.
    severity: null

  - file: core/components/plays/next/SKILL.md
    principle: >
      Every run stamps session identity via scripts/session_stamp.py at pre-flight
      (start) and close, using the canonical copy from play-creator/references/, with
      soft-fail semantics (null fields, never a blocked close) when the ledger is
      unresolved.
    committed_source: >
      core/components/memory/standards/rules/play-close.md — "Session identity stamp
      (#463) ... Start phase runs at pre-flight ... close phase reads the marker ...
      Soft-fail: an unresolved ledger yields null fields, never a blocked close."
    conformance: confirmed
    detail: >
      next/scripts/session_stamp.py is an exact copy of the canonical script (diff
      shows identical docstring/behavior to the copy already committed at
      play-creator/references/session_stamp.py). /next has no issue-scoped pre-flight,
      so the start-phase call is placed right after the working folder's first git log
      capture with the marker living in <working>/ rather than a status/ dir — a
      reasonable adaptation to /next's product-scoped, issue-less shape, and the
      SKILL.md says so explicitly rather than silently deviating.
    severity: null

  - file: core/components/plays/next/SKILL.md
    principle: >
      An intent change (new constraint, failure condition, scenario, or "Done means")
      must trace to reference/ice.md and be recompiled — never hand-authored directly
      into the compiled SKILL.md.
    committed_source: >
      CLAUDE.md "Play Pipeline Rules" (repo root, committed) — "Intent change —
      anything touching what the play decides or guarantees: the intent statement,
      constraints (C-), failure conditions (F-), scenarios (S-), the agent/skill flow,
      or evals. This MUST go through the play's ICE source (reference/ice.md) →
      recompile ... Never hand-edit a compiled SKILL.md for an intent change."
    conformance: confirmed
    detail: >
      C12, F9, REC9, and the "### Done means" (D1-D3) block all appear first in
      next/reference/ice.md in this same diff, and the SKILL.md's "Compiled From"
      section states it was "recompiled by play-editor" with an updated fingerprint
      (sha256:8688af6... of reference/ice.md) — the intent-change discipline holds;
      nothing was hand-added to SKILL.md that isn't backed by an ice.md change.
    severity: null

  - file: core/components/plays/install-garura/SKILL.md
    principle: >
      A play's exemption from ICE-source/recompile discipline is only truthful if the
      play genuinely has no intent.yaml/reference/ice.md — i.e., it is a bootstrap
      meta-play outside the compiled-play model, the same status already recorded for
      play-creator.
    committed_source: >
      Directory listing of core/components/plays/install-garura/ (pre-existing repo
      state, not part of this diff) — contains only scripts/ and SKILL.md, no
      reference/ directory, no intent.yaml, no stop-condition.yaml; matches
      play-creator/'s pre-existing "Direct-edit deviation note (#434)" already on disk
      in install-garura/SKILL.md ("this bootstrap meta-play is hand-authored (no
      intent.yaml)").
    conformance: confirmed
    detail: >
      The added "Level 3 note (#466)" — "bootstrap meta-play — exempt from the
      goal-loop recompile (no ICE source, like play-creator)" — is verified true by
      directory inspection, and is consistent with the play's own pre-existing #434
      deviation note. Same finding applies identically to
      core/components/plays/uninstall-garura/SKILL.md (also verified to lack
      reference/ice.md and stop-condition.yaml).
    severity: null

  - file: core/components/plays/uninstall-garura/SKILL.md
    principle: >
      Same as install-garura — exemption note must match the play's actual structure.
    committed_source: >
      Directory listing of core/components/plays/uninstall-garura/ — scripts/ and
      SKILL.md only, no reference/ice.md, no stop-condition.yaml.
    conformance: confirmed
    detail: >
      Verified directly; note text is identical in substance to install-garura's and
      is accurate.
    severity: null

  - file: core/components/plays/grill/SKILL.md
    principle: >
      A change to a compiled play's SKILL.md is non-intent (and therefore a direct
      edit, not a play-editor recompile) only if it touches no constraint, failure
      condition, scenario, or eval — output-format/scaffolding/mechanism-matching fixes
      qualify; decision or guarantee changes do not.
    committed_source: >
      CLAUDE.md "Play Pipeline Rules" — "Non-intent change — output format,
      close/report scaffolding, template wiring, surface prose: nothing that alters a
      guarantee, decision, or eval. This is a direct edit ... Record the edit with a
      Direct-edit deviation note ({issue}) footer."; corroborated by
      core/components/plays/grill/scripts/validate_epics.py's own argparse definition,
      which defines --slice-ref (not --slice-file) as the required flag.
    conformance: confirmed
    detail: >
      The diff only corrects two SKILL.md invocation examples of validate_epics.py
      from a nonexistent --slice-file flag to the script's real --slice-ref flag — no
      constraint/failure/scenario/eval text changed, and reference/ice.md and the
      fingerprint are untouched (per the SKILL.md's own adjacent existing deviation
      note for the prior #the-434-era mechanism rename, left intact). The new footer
      is correctly labeled "Direct-edit deviation note (#466)" and correctly states
      "no constraint, failure, scenario, or eval changed" — a true claim given the
      script's actual interface. This is a genuine non-intent fix, not a hand-edit of
      a decision/guarantee.
    severity: null

overall: >
  No violations found. Every changed harness file in this PR conforms to the
  committed Level 3 design (ADR 025), the Standard Play Close / stop-condition /
  session-stamp mechanism (play-close.md), the gate-config classing rule
  (gate-config.md), and the ICE intent-vs-direct-edit boundary (CLAUDE.md Play
  Pipeline Rules). The install-garura/uninstall-garura exemption notes are verified
  true against those plays' actual on-disk structure, not asserted from the branch's
  own prose. The grill/SKILL.md fix is a genuine non-intent correction, properly
  marked as a direct-edit deviation note, and does not violate the hand-edit
  prohibition on compiled plays.
