# scenarios.yaml
# Task: 3-scenarios (C28 — three-tier verification scenarios)
# Issue: 183 — prepare-implementation should not hard-block on product.yaml and roadmap.yaml
# Generated: 2026-03-31 (simulation)
# Sources: baseline-tests.yaml (17 BTs), change-surface.yaml (5 features), blast-radius.yaml
#
# Structure: C28 requires three tiers — baseline, new, regression.
# Compartmentalization: C9 — no implementation details. Scenarios describe WHAT, not HOW.

status: "DRAFT"
issue: 183

# =============================================================================
# TIER 1: BASELINE SCENARIOS
# Tests for EXISTING behavior that must pass on the current (already-modified) codebase.
# Derived from baseline-tests.yaml BT-PRE-*, BT-CA-*, BT-INT-*, BT-AGT-*, BT-PCR-*, BT-SKL-*.
# =============================================================================

baseline_scenarios:

  # --- Pre-flight behavior (from BT-PRE-01..05) ---

  - id: BS-001
    source: "BT-PRE-01"
    target: "prepare-implementation pre-flight"
    current_behavior: >
      When product.yaml is absent, the play continues without halting.
      Step 0 records product status as 'absent' in context-assembly.yaml.
    expected_behavior: >
      Play proceeds past pre-flight. context-assembly.yaml contains
      upstream_context.product.status == 'absent' and source describes
      the path that was checked.
    pass_criteria: >
      No HALT message emitted for missing product.yaml. Step 0 completes.
      context-assembly.yaml upstream_context.product.status == 'absent'.
    automation: automated

  - id: BS-002
    source: "BT-PRE-02"
    target: "prepare-implementation pre-flight"
    current_behavior: >
      When roadmap.yaml is absent and no --epic flag provided, the play
      continues. Epic dependency enforcement is skipped.
    expected_behavior: >
      Play proceeds. context-assembly.yaml contains
      upstream_context.roadmap.status == 'absent'. No epic-dependency-check
      artifact is produced.
    pass_criteria: >
      No HALT for missing roadmap.yaml. roadmap.status == 'absent'.
      Epic dependency step is a no-op.
    automation: automated

  - id: BS-003
    source: "BT-PRE-03"
    target: "prepare-implementation pre-flight"
    current_behavior: >
      When invoked with no issue resolvable from branch AND no --epic flag,
      the play halts with F19.
    expected_behavior: >
      Play emits HALT referencing F19. No STM artifacts created.
    pass_criteria: >
      HALT message contains reference to 'no issue' and 'no epic'.
      No evidence directory created in STM.
    automation: automated

  - id: BS-004
    source: "BT-PRE-04"
    target: "prepare-implementation pre-flight + Step 2"
    current_behavior: >
      When architecture.yaml is absent, the play enters discovery mode
      rather than halting. Architecture understanding is derived from
      codebase analysis and user interview.
    expected_behavior: >
      No halt for missing architecture.yaml. Step 2 operates in discovery
      mode. After completion, context-assembly.yaml contains
      upstream_context.architecture.status == 'derived' and
      discovery_mode == true.
    pass_criteria: >
      No HALT for missing architecture.yaml. architecture.status == 'derived'.
      discovery_mode == true. F25 is not triggered.
    automation: hybrid
    hybrid_element: "Discovery mode involves user interview — human judgment required to verify interview quality"

  - id: BS-005
    source: "BT-PRE-05"
    target: "prepare-implementation pre-flight"
    current_behavior: >
      When quality-standards.yaml is absent, the play enters discovery
      mode. Quality context derived from toolchain detection.
    expected_behavior: >
      No halt for missing quality-standards.yaml.
      upstream_context.quality.status == 'derived', discovery_mode == true.
    pass_criteria: >
      No HALT. quality.status == 'derived'. quality.discovery_mode == true.
    automation: hybrid
    hybrid_element: "Toolchain detection results vary by project — human verifies completeness"

  # --- Context assembly schema (from BT-CA-01..02) ---

  - id: BS-006
    source: "BT-CA-01"
    target: "context-assembly.yaml schema"
    current_behavior: >
      context-assembly.yaml produced by Step 0 and Step 7 contains all
      required top-level fields: upstream_context (with per-artifact status,
      source, discovery_mode), phase1_summary, authority_map,
      confidence_assessment.
    expected_behavior: >
      All required fields present. Status values are one of: absent, locked,
      derived. Confidence values are one of: n/a, high, medium-high, medium, low.
    pass_criteria: >
      Parse context-assembly.yaml. All 18 required fields present (per
      BT-CA-01 schema). No invalid enum values.
    automation: automated

  - id: BS-007
    source: "BT-CA-02"
    target: "context-assembly.yaml authority traceability"
    current_behavior: >
      Each upstream_context entry with status != 'absent' has a source
      field referencing a specific file, scan type, or interview. Entries
      with status == 'absent' reference the expected path that was checked.
    expected_behavior: >
      Source fields are specific and traceable, not generic descriptions.
    pass_criteria: >
      Every upstream_context[*].source names a specific artifact path,
      scan type, or interview topic. No vague descriptions like 'from
      analysis' or 'derived from context'.
    automation: automated

  # --- Intent constraint consistency (from BT-INT-01..05) ---

  - id: BS-008
    source: "BT-INT-01"
    target: "intent.yaml C1 constraint text"
    current_behavior: >
      C1 expresses soft-dependency behavior for product.yaml and roadmap.yaml.
      Text contains 'nice-to-have', 'never halts', and 'absent'.
    expected_behavior: >
      C1 does not contain 'required', 'halt', 'must be locked', or
      'upstream discovery must be complete' in reference to product.yaml
      or roadmap.yaml.
    pass_criteria: >
      C1 text passes must_contain and must_not_contain checks per BT-INT-01.
    automation: automated

  - id: BS-009
    source: "BT-INT-02"
    target: "intent.yaml C14 constraint text"
    current_behavior: >
      C14 narrows the halt condition to 'no issue AND no epic'.
    expected_behavior: >
      C14 contains 'halts only when neither an issue nor an epic can be resolved'.
      Does not contain '--epic is required' or '--epic flag is required'.
    pass_criteria: >
      C14 text matches expected phrasing. No legacy '--epic required' language.
    automation: automated

  - id: BS-010
    source: "BT-INT-03"
    target: "intent.yaml C21 and C22 constraints"
    current_behavior: >
      C21 describes discovery mode for architecture. C22 describes discovery
      mode for quality standards. Both exist with correct content.
    expected_behavior: >
      C21 contains 'discovery mode', 'absent', 'codebase'. C22 contains
      'discovery mode', 'absent', 'toolchain'.
    pass_criteria: >
      Both constraints exist by ID and contain required keywords.
    automation: automated

  - id: BS-011
    source: "BT-INT-04"
    target: "intent.yaml F19 failure condition"
    current_behavior: >
      F19 exists and references the no-issue-no-epic halt condition.
    expected_behavior: >
      F19 contains 'no issue' and 'no epic'.
    pass_criteria: >
      F19 exists by ID with correct content keywords.
    automation: automated

  - id: BS-012
    source: "BT-INT-05"
    target: "intent.yaml F25 failure condition"
    current_behavior: >
      F25 distinguishes between 'absent and handled via discovery mode' vs
      'absent and skipped'. Only the skip case is a failure.
    expected_behavior: >
      F25 contains 'discovery mode' and 'skipped'.
    pass_criteria: >
      F25 exists by ID. Text references both discovery mode and skipped.
    automation: automated

  # --- Pipeline play baselines (from BT-PCR-01..03) ---

  - id: BS-013
    source: "BT-PCR-01"
    target: "discover-product pre-flight"
    current_behavior: >
      discover-product has its own pre-flight hard-halt conditions appropriate
      for the first play in the pipeline.
    expected_behavior: >
      Pre-flight conditions documented. discover-product may legitimately
      hard-halt on inputs since it is the upstream-most play.
    pass_criteria: >
      Pre-flight table in discover-product/SKILL.md is readable and lists
      its halt conditions. No conflict with #183 soft-dependency philosophy
      (discover-product is upstream, so harder gates are valid).
    automation: automated

  - id: BS-014
    source: "BT-PCR-02"
    target: "plan-roadmap pre-flight"
    current_behavior: >
      plan-roadmap has its own pre-flight conditions as a mid-pipeline play.
    expected_behavior: >
      Pre-flight conditions documented and consistent with its pipeline position.
    pass_criteria: >
      Pre-flight table readable. Conditions are appropriate for a play
      downstream of discover-product and upstream of prepare-implementation.
    automation: automated

  - id: BS-015
    source: "BT-PCR-03"
    target: "prepare-architecture pre-flight"
    current_behavior: >
      prepare-architecture produces architecture.yaml and quality-standards.yaml.
      Its pre-flight should not hard-block on product.yaml or roadmap.yaml
      since it is itself an upstream producer.
    expected_behavior: >
      Pre-flight documented. The play that PRODUCES architecture.yaml
      does not circularly depend on prepare-implementation's inputs.
    pass_criteria: >
      Pre-flight table readable. No circular dependency with
      prepare-implementation's soft-dependency model.
    automation: automated

  # --- Skill input baselines (from BT-SKL-01..02) ---

  - id: BS-016
    source: "BT-SKL-01"
    target: "draft-lld input requirements"
    current_behavior: >
      draft-lld documents its input requirements for architecture context.
      Current state recorded as baseline before any discovery-mode changes.
    expected_behavior: >
      Input schema section exists and states whether architecture_path is
      required or optional.
    pass_criteria: >
      draft-lld/SKILL.md has a readable input contract. Architecture
      input requirement is explicitly stated.
    automation: automated

  - id: BS-017
    source: "BT-SKL-02"
    target: "draft-product-spec input requirements"
    current_behavior: >
      draft-product-spec documents its input requirements for product context.
      Current state recorded as baseline before no-product.yaml path changes.
    expected_behavior: >
      Input schema section exists and states whether product_path is
      required or optional.
    pass_criteria: >
      draft-product-spec/SKILL.md has a readable input contract. Product
      input requirement is explicitly stated.
    automation: automated

# =============================================================================
# TIER 2: NEW SCENARIOS
# Tests for NEW behavior introduced by issue #183.
# Derived from the 5 features: F1 (soft dependencies), F2 (issue-only entry),
# F3 (discovery mode), F4 (context assembly), F5 (pipeline consistency).
# =============================================================================

new_scenarios:

  # --- F1: Soft dependency model for product.yaml and roadmap.yaml ---

  - id: NS-001
    feature_ref: "F1"
    behavior_ref: "B1.1"
    description: "Play completes full artifact generation with zero upstream locked artifacts"
    expected_behavior: >
      When invoked with only an issue (no product.yaml, no roadmap.yaml,
      no architecture.yaml, no quality-standards.yaml), the play completes
      all phases: context assembly, blast radius, and artifact generation.
      All four design artifacts are produced.
    pass_criteria: >
      features.yaml, scenarios.yaml, tech.yaml, and plan.yaml all exist
      in STM after play completion. No HALT was emitted for any missing
      upstream artifact.
    automation: hybrid
    hybrid_element: "Full play run requires human checkpoints at each stage"

  - id: NS-002
    feature_ref: "F1"
    behavior_ref: "B1.2"
    description: "Locked upstream artifacts are authoritative when present"
    expected_behavior: >
      When product.yaml and roadmap.yaml exist and are locked, they are
      used as authoritative inputs. context-assembly.yaml shows status ==
      'locked' for both. Features.yaml draws from locked product.yaml
      content, not from codebase inference.
    pass_criteria: >
      upstream_context.product.status == 'locked'.
      upstream_context.roadmap.status == 'locked'. Features.yaml content
      aligns with locked product.yaml, not with codebase-derived content.
    automation: hybrid
    hybrid_element: "Content alignment check between features.yaml and product.yaml requires judgment"

  - id: NS-003
    feature_ref: "F1"
    behavior_ref: "B1.3"
    description: "Mixed presence — some upstream artifacts present, some absent"
    expected_behavior: >
      When product.yaml is locked but roadmap.yaml is absent, the play
      uses product.yaml authoritatively and proceeds without roadmap
      context. context-assembly.yaml shows product.status == 'locked' and
      roadmap.status == 'absent'. Epic dependency enforcement is disabled.
    pass_criteria: >
      Correct mixed status in context-assembly.yaml. Product context used
      authoritatively. Roadmap-dependent features (epic ordering) gracefully
      omitted from plan.yaml phasing.
    automation: hybrid
    hybrid_element: "Verifying graceful omission of roadmap-dependent phasing requires judgment"

  # --- F2: Issue-only entry path ---

  - id: NS-004
    feature_ref: "F2"
    behavior_ref: "B2.1"
    description: "Play resolves work context from branch name without --epic"
    expected_behavior: >
      When invoked on a feat/183-... branch with no --epic flag, the play
      resolves issue 183 from the branch name. Work is scoped against the
      issue. No epic dependency enforcement runs.
    pass_criteria: >
      Issue number resolved correctly. All artifacts are issue-mapped to
      {stm_base}/183/. No reference to epic dependencies in output.
    automation: automated

  - id: NS-005
    feature_ref: "F2"
    behavior_ref: "B2.2"
    description: "Epic entry still works when roadmap exists"
    expected_behavior: >
      When --epic is provided and a locked roadmap.yaml exists, the play
      resolves the epic from the roadmap. Epic dependency enforcement runs.
      All artifacts are still issue-mapped (C19).
    pass_criteria: >
      Epic resolved from roadmap. Dependencies checked. Artifacts stored
      under {stm_base}/{issue}/ (not under epic path). C15 enforcement
      runs and either passes or halts correctly.
    automation: hybrid
    hybrid_element: "Requires a project with locked roadmap to test"

  # --- F3: Discovery mode for architecture and quality ---

  - id: NS-006
    feature_ref: "F3"
    behavior_ref: "B3.1"
    description: "Architecture discovery mode produces equivalent understanding"
    expected_behavior: >
      When architecture.yaml is absent, the play derives architecture
      understanding from codebase scan (design patterns, framework
      conventions, logical architecture), LTM, and user interview. The
      resulting understanding is recorded in context-assembly.yaml with
      status == 'derived' and authority sources documented.
    pass_criteria: >
      architecture.status == 'derived'. Authority map shows codebase scan
      and/or LTM and/or user interview as sources. tech.yaml produced
      by subsequent steps does not contradict derived architecture.
    automation: hybrid
    hybrid_element: "Equivalence of derived understanding vs locked artifact requires expert judgment"

  - id: NS-007
    feature_ref: "F3"
    behavior_ref: "B3.2"
    description: "Quality discovery mode detects toolchain and establishes gates"
    expected_behavior: >
      When quality-standards.yaml is absent, the play detects quality
      toolchain (test config, linting, CI, coverage) from the codebase
      and establishes quality gates via LTM and user interview.
    pass_criteria: >
      quality.status == 'derived'. quality.discovery_mode == true.
      Detected toolchain elements are documented in context-assembly.yaml.
      Scenarios.yaml quality-related scenarios reference derived standards.
    automation: hybrid
    hybrid_element: "Completeness of toolchain detection varies by project"

  - id: NS-008
    feature_ref: "F3"
    behavior_ref: "B3.3"
    description: "Context resolution hierarchy is applied and documented"
    expected_behavior: >
      For each upstream artifact, the resolution hierarchy (C23) is
      applied: locked YAML -> project LTM -> codebase scan -> user
      interview. context-assembly.yaml documents which source provided
      each piece of context with its authority level.
    pass_criteria: >
      Every upstream_context entry has a source field that maps to one
      of the four hierarchy levels. Authority map section lists all
      sources used with their levels. No context without a documented source.
    automation: automated

  # --- F4: Context assembly artifact ---

  - id: NS-009
    feature_ref: "F4"
    behavior_ref: "B4.1"
    description: "Context assembly checkpoint presents complete codebase understanding"
    expected_behavior: >
      Checkpoint 0 presents the context assembly results to the user:
      upstream artifact statuses, phase 1 summary (architecture inference,
      test surface, dependency graph, git history, LTM findings),
      authority map, and confidence assessment. User must Tether to proceed.
    pass_criteria: >
      Checkpoint 0 output contains all phase1_summary entries.
      Confidence assessment is present. User approval gate is enforced
      (play does not proceed without Tether).
    automation: hybrid
    hybrid_element: "Checkpoint approval is human-gated"

  - id: NS-010
    feature_ref: "F4"
    behavior_ref: "B4.2"
    description: "Phase 1 parallel codebase scans all produce artifacts in STM"
    expected_behavior: >
      Architecture inference, test surface mapping, dependency graph,
      git history analysis, and LTM consultation all produce artifacts
      stored in STM at {stm_base}/{issue}/evidence/prepare-implementation/.
      No intermediate data is passed through conversation memory (C30).
    pass_criteria: >
      Five evidence artifacts exist on disk after Phase 1:
      architecture-inference.yaml, test-surface.yaml, dependency-graph.yaml,
      commit-history-analysis.yaml, ltm-findings.yaml. All are non-empty.
    automation: automated

  # --- F5: Pipeline play consistency ---

  - id: NS-011
    feature_ref: "F5"
    behavior_ref: "B5.1"
    description: "Pipeline plays maintain appropriate pre-flight strictness"
    expected_behavior: >
      After #183 changes, the pipeline play pre-flight conditions form
      a consistent gradient: discover-product (strictest, fewest
      dependencies), plan-roadmap (mid, depends on product), prepare-
      architecture (depends on product+roadmap), prepare-implementation
      (most lenient, soft-depends on all four).
    pass_criteria: >
      Each pipeline play's pre-flight conditions are documented and
      do not contradict each other. No circular dependencies exist.
      Upstream plays do not soft-depend on artifacts they produce.
    automation: automated

  - id: NS-012
    feature_ref: "F5"
    behavior_ref: "B5.2"
    description: "Downstream skills handle absent upstream context"
    expected_behavior: >
      draft-lld, draft-implementation-plan, draft-product-spec, and
      draft-verification-scenarios all handle the case where their
      respective upstream locked artifact is absent. They accept a
      discovery_mode flag and produce valid output from derived context.
    pass_criteria: >
      Each skill's input contract documents optional/required status
      for upstream artifact paths. Each skill has a documented behavior
      for the absent-artifact case. No skill halts when discovery_mode
      is true and the locked artifact is absent.
    automation: automated

# =============================================================================
# TIER 3: REGRESSION SCENARIOS
# Tests for behavior that must NOT break after #183 changes.
# Derived from blast-radius.yaml and the existing play contract.
# =============================================================================

regression_scenarios:

  - id: RS-001
    source: "S1 — Product Owner traceability"
    description: "Feature-to-scenario traceability is maintained"
    pass_criteria: >
      Every product behavior in features.yaml has at least one verification
      scenario in scenarios.yaml with matching feature_ref and behavior_ref.
      feature_gates maps every feature to its scenarios. No orphan scenarios.
    automation: automated

  - id: RS-002
    source: "S3 — Engineering Lead task assignment"
    description: "plan.yaml tasks remain self-contained for implementers"
    pass_criteria: >
      Each plan.yaml task contains file paths, change types, exit gates,
      and depends_on chains. A task can be assigned to an implementer
      without requiring access to other tasks or features.yaml.
    automation: automated

  - id: RS-003
    source: "S4 — Quality Lead compartmentalization"
    description: "Scenario compartmentalization is preserved"
    pass_criteria: >
      plan.yaml contains no scenario descriptions or scenario content.
      plan.yaml scenario_gate fields reference scenario IDs and counts
      only. scenarios.yaml is a separate artifact from plan.yaml.
    automation: automated

  - id: RS-004
    source: "S8 — Implementation Agent self-sufficiency"
    description: "Locked artifacts contain everything needed for implementation"
    pass_criteria: >
      Implementation agent can execute any task using only the four locked
      artifacts and established architecture context. No references to
      'see codebase', 'follow established patterns', or other implicit
      knowledge. All values are explicit.
    automation: hybrid
    hybrid_element: "Verifying self-sufficiency of artifacts requires expert review"

  - id: RS-005
    source: "S11 — Task DAG executability"
    description: "Task DAG in plan.yaml has valid dependency chains"
    pass_criteria: >
      Every task in plan.yaml has depends_on referencing valid task IDs.
      No circular dependencies. Dependency order is executable (topological
      sort produces a valid sequence). Every task has an exit_gate.
    automation: automated

  - id: RS-006
    source: "S12 — Three-tier scenario structure"
    description: "scenarios.yaml maintains three-tier structure"
    pass_criteria: >
      scenarios.yaml contains baseline_scenarios, new_scenarios, and
      regression_scenarios sections. feature_gates maps features to
      scenarios from all three tiers. No tier is empty.
    automation: automated

  - id: RS-007
    source: "C19 — Issue-mapped artifacts"
    description: "All artifacts remain issue-mapped under STM"
    pass_criteria: >
      All produced artifacts (features.yaml, scenarios.yaml, tech.yaml,
      plan.yaml, context-assembly.yaml, evidence/*) are stored under
      {stm_base}/{issue}/. No artifacts stored under epic paths or
      global paths.
    automation: automated

  - id: RS-008
    source: "C10 — Staged checkpoint model"
    description: "Five-checkpoint approval model is preserved"
    pass_criteria: >
      Play enforces five checkpoints: (0) context assembly, (1) blast
      radius, (2) features, (3) tech design, (4) scenarios+plan. Each
      requires explicit Tether before proceeding. No checkpoint is skipped.
    automation: hybrid
    hybrid_element: "Checkpoint enforcement requires running the full play with human interaction"

  - id: RS-009
    source: "C20 — Pre-lock resolution"
    description: "Open questions and high-severity risks still block locking"
    pass_criteria: >
      If any of the four design artifacts contain open_questions[] or
      high-severity risks, the play presents a resolution interview.
      Artifacts are not locked until all items are resolved and recorded
      in pre-lock-resolutions.yaml.
    automation: hybrid
    hybrid_element: "Requires artifacts with open questions to verify the gate"

  - id: RS-010
    source: "Epic path — existing behavior"
    description: "Epic-driven entry path with full upstream artifacts still works"
    pass_criteria: >
      When --epic is provided with locked product.yaml, locked roadmap.yaml,
      locked architecture.yaml, and locked quality-standards.yaml, the
      play behaves identically to pre-#183: all artifacts used
      authoritatively, epic dependencies enforced, no discovery mode
      triggered. context-assembly.yaml shows all statuses as 'locked'.
    automation: hybrid
    hybrid_element: "Requires a fully-populated project with locked upstream artifacts"

