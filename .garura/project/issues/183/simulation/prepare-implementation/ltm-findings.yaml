  gaps:

    - category: "soft dependency patterns"
      description: "No LTM knowledge about how plays should handle optional upstream artifacts. The resolution protocol defines knowledge hierarchy for agents, but there is no equivalent play-level standard for 'graceful degradation when locked artifacts are absent.' Each play must invent its own approach."
      impact: "The fix for #183 will establish a pattern that other plays may need. Without a standard, each play could handle missing inputs differently — inconsistent UX and unpredictable behavior."

    - category: "codebase inference patterns"
      description: "No LTM knowledge about how to infer product context, architecture decisions, or project profiles from codebase analysis alone. The profiling model assumes a BRD/PRD exists. When product.yaml is absent, agents have no standard method for deriving equivalent context from code."
      impact: "tech-architect and product-strategist must fall back to LLM reasoning for ALL product context when product.yaml is absent. This is the R4 scenario at scale — potentially dozens of resolution trace entries marked 'resolved_from: llm' with no core LTM guidance on codebase-to-profile inference."

    - category: "testing patterns"
      description: "No LTM knowledge about testing standards, frameworks, or TDD practices. The quality-profile.md defines QP-1 (Testing Depth) dimensions but there are no knowledge files about specific testing approaches, framework selection, or baseline test patterns."
      impact: "test-engineer agent must derive all testing context from codebase analysis. For #183 specifically, the test surface mapping already found zero tests in meridian-os — this gap is not blocking but would matter for target projects."

    - category: "play dependency hierarchy"
      description: "No LTM standard defining which play outputs are hard prerequisites vs soft inputs for other plays. The prepare-implementation play hardcodes its dependency on product.yaml and roadmap.yaml in pre-flight, but there is no cross-play dependency map."
      impact: "The fix for #183 changes prepare-implementation's dependency posture, but without a play dependency standard, the decision is local rather than systematic. Future plays may face the same question."

    - category: "degraded-mode UX patterns"
      description: "No LTM knowledge about how to communicate degraded-mode operation to users. When prepare-implementation proceeds without product.yaml, the user should understand what context is missing and what inferences are being made — but there is no standard for this communication."
      impact: "Without a UX pattern, the brief checkpoints may not clearly signal which sections are inferred vs. derived from locked artifacts. Users could approve briefs without understanding confidence levels."

    - category: "change surface analysis"
      description: "No LTM knowledge about how to compute blast radius, change surface, or affected-file analysis. These are domain tasks delegated to tech-architect and test-engineer, but there are no core knowledge files to guide the approach."
      impact: "Agents rely entirely on LLM reasoning for blast radius computation. For the meridian-os project specifically (markdown/YAML framework, no compiled code), blast radius analysis must be adapted — no core LTM guidance exists for non-traditional codebases."

    - category: "implementation plan patterns"
      description: "No LTM knowledge about how to sequence implementation steps, define exit gates, or structure vertical slice delivery at the implementation level (as opposed to the epic level, which is covered by epic-management-rules.md)."
      impact: "plan.yaml generation relies on agent reasoning without core LTM support. For #183, this gap is relevant because without roadmap.yaml, the agent must construct implementation sequencing from scratch."
