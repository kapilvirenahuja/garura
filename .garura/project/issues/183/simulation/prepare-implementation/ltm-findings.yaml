      summary: "Phoenix Design System v2.0, HTML brief structure, inline feedback system, hub page, per-brief tab mapping for all 7 artifact types (product, roadmap, features, architecture, tech, scenarios, plan). Defines context sections for multi-stage reviews."
      applies_to: "prepare-implementation generates briefs at checkpoints. The brief principles define what the doc-builder agent produces. For #183, relevant because the brief system must gracefully handle the case where product/roadmap context sections are empty (artifact absent)."
