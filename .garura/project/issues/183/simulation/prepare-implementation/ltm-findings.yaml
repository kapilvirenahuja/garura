    # === KNOWLEDGE REFERENCE (ARCHITECTURE) ===

    - path: "~/.meridian/core/memory/knowledge/arch/_index.md"
      summary: "Index of 35+ architecture knowledge files across 6 categories: patterns (6), agentic (5), stacks (11), platforms (6), data (6), operations (5). Each file has search patterns for agent discovery. Defines the architecture file template with required sections."
      applies_to: "tech-architect agent consults architecture knowledge during LTM resolution (R3) when designing tech.yaml. For #183, these files are the 'core LTM fallback' when project-scoped architecture.yaml is absent — the resolution protocol descends to these files for technology selection guidance."
