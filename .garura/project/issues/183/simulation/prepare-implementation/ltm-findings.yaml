    # === DIRECTLY APPLICABLE TO ISSUE #183 ===

    - path: "~/.meridian/core/memory/standards/agent-contract.md"
      summary: "Universal play-to-agent JSON contract schema. Defines input/output contracts, STM path conventions, wiring rules, and the optional ltm_context field. Specifies that ltm_context is OPTIONAL — agents without it operate identically to pre-protocol behavior."
      applies_to: "All agent dispatches in prepare-implementation. The contract schema governs how tech-architect, test-engineer, product-strategist, doc-builder, and repo-orchestrator receive work. Critical for #183 because the contract's ltm_context.locked_artifacts field is the mechanism for signaling which upstream artifacts exist — making 'soft dependency' expressible at the contract level."
      relevance: high

    - path: "~/.meridian/core/memory/standards/rules/resolution.md"
      summary: "R1-R4 four-step resolution protocol. Defines 3-layer knowledge hierarchy: project LTM (LOCKED > DRAFT) -> core LTM (advisory) -> LLM fallback. Agents query ltm_context.project_base for project-scoped knowledge, then core_base for organizational knowledge, then fall back to LLM reasoning. LOCKED artifacts are authoritative and stop descent. DRAFT artifacts are advisory."
      applies_to: "Directly relevant to #183's core problem — the resolution protocol already defines a graceful degradation model (R2 miss -> R3 -> R4). The prepare-implementation play should mirror this: when product.yaml or roadmap.yaml are absent, agents should descend to codebase inference and LLM reasoning rather than hard-halting. The resolution protocol's authority semantics (LOCKED = authoritative, DRAFT = advisory, absent = no opinion) provide the exact vocabulary for expressing soft dependencies."
      relevance: critical

    - path: "~/.meridian/core/memory/standards/agent-lifecycle/epic-management-rules.md"
      summary: "Seven rules governing epic structure: vertical slice delivery, single module scope, mocks as phased delivery, scope boundaries (in_scope/out_of_scope/must_not_break), success verifiability (given/when/then), dependency discipline (F-IDs, no circular deps), foundation investments. References domain-taxonomy for module boundaries."
      applies_to: "Applies when prepare-implementation is invoked with an --epic flag and roadmap.yaml exists. Rules constrain how the play interprets epic scope, dependencies, and success criteria. For #183, the epic management rules still apply when roadmap.yaml IS present — the change is only about what happens when it is NOT present."
      relevance: medium

    - path: "~/.meridian/core/memory/standards/templates/intent-schema.yaml"
      summary: "Canonical 4-field intent schema: intent, constraints, failure_conditions, scenarios. Constraints are falsifiable boundaries, failure conditions are observable artifact states, scenarios are persona-driven acceptance tests with given/then."
      applies_to: "The prepare-implementation play's own intent.yaml follows this schema. Relevant for understanding which constraints (C1, C14, C21-C23) govern the soft-dependency behavior being modified in #183."
      relevance: medium

    - path: "~/.meridian/core/memory/standards/templates/epic-schema.md"
      summary: "Canonical epic schema with 10 scoping fields + 4 IDD fields. Defines F-ID naming, bucket/priority/effort enums, intent (3 paragraphs), constraints (in_scope/out_of_scope/must_not_break), success_scenarios (given/when/then), failure_conditions. Includes prohibited fields list and validation checklist."
      applies_to: "When prepare-implementation operates on an epic from roadmap.yaml, this schema defines the expected structure. For #183, this is context for the 'with roadmap' path — the schema remains unchanged. The issue is about what happens on the 'without roadmap' path."
      relevance: low

