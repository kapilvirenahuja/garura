      applies_to: "prepare-implementation reads profiles from product.yaml to inform architecture and quality decisions. For #183, when product.yaml is absent, profiling information is unavailable — agents must infer project characteristics from codebase analysis instead. This is a key knowledge gap that the 'without product.yaml' path must address."
