    - path: "~/.meridian/core/memory/workflows/readiness-brief-generation.yaml"
      summary: "Structure A workflow template — the six-phase flow (pre-flight, preparation, checkpoint, execution, scenario-validation, evidence) that prepare-implementation follows. Pre-flight resolves stm_base. Checkpoint is skippable."
      applies_to: "prepare-implementation uses Structure A. The pre-flight phase is where #183's changes primarily live — the hard-halt logic for missing product.yaml and roadmap.yaml is in pre-flight. The fix must modify pre-flight behavior without breaking the downstream phase contract."
