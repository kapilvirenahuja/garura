issue: 266

plan: |
  Rename the play folder from report-issue → garura-capture via git mv, then
  rewrite reference/intent.yaml to encode all four new behaviors (type inference,
  crisp confirmation, background dispatch, new name). Run /create-play --build to
  regenerate SKILL.md. Create a thin shim at the old report-issue path that
  forwards to garura:capture with a deprecation notice. Update docs and product
  scope references. For background dispatch: validate + write STM synchronously,
  dispatch the gh filing step as a background task (run_in_background), return a
  "dispatched" confirmation immediately. The issue number cannot be known until the
  background task completes — so the confirmation is "capture dispatched, tracking
  at {stm_base}/capture-report/evidence/garura-capture/issue-result.yaml" rather
  than a live #N. This resolves the foreground-blocking problem without requiring
  the caller to wait for a GH round-trip.

  The type→label mapping reuses the existing github-issue.md template table
  (feature→enhancement, fix/bug→bug, defect→defect, epic→epic,
  enhancement→enhancement) rather than inventing a parallel mapping in intent.yaml.
  Type inference follows: caller-provided type wins; if absent, the play infers
  from problem text keywords (bug/error/broken → defect, feature/add/support →
  feature, epic/initiative → epic, improvement/enhance → enhancement).

affected_files:
  "core/components/plays/report-issue/reference/intent.yaml":
    role: Intent source of truth — constraints, failure conditions, scenarios
    change: >
      Full rewrite. New intent: "Accept a structured issue capture request from
      any caller (human or agent), infer or accept explicit issue type (feature /
      bug / defect / epic / enhancement), file as a labeled GitHub Issue on the
      Garura repository asynchronously, and return a crisp dispatched confirmation.
      If GitHub is unreachable, produce a portable local fallback." Remove C1
      (all-fields required — relax to: title/problem required, others optional
      per type), C2 (severity required — make optional, applicable only to
      defect type), C8 ([DEF] prefix — replace with type-driven prefix table),
      C9 (label "defect" — replace with type-driven label table). Add new
      constraints: Ctype (type must be one of feature/bug/defect/epic/enhancement,
      inferred if not provided), Cbg (gh filing MUST be dispatched asynchronously;
      caller receives dispatched confirmation before GH round-trip completes),
      Cconf (confirmation MUST be a single line: "capture dispatched →
      {stm_tracking_path}"), Cseverity-opt (severity is optional unless type is
      defect). Update S1-S5 to cover multi-type and background flows.

  "core/components/plays/garura-capture/SKILL.md":
    role: Compiled play artifact — generated by /create-play --build
    change: >
      Do not hand-edit. Regenerated after intent.yaml rewrite. Will reflect
      new name (garura:capture), type-dispatch title/label logic, async Step 2,
      and crisp Step 4 confirmation.

  "core/components/plays/report-issue/SKILL.md":
    role: Deprecated alias shim (post git mv, this folder is recreated as shim)
    change: >
      Create thin SKILL.md with frontmatter name: "meridian:report-issue",
      description: "DEPRECATED — use garura:capture. Forwarding play.",
      user-invokable: true. Body: single instruction to the model — invoke
      garura:capture with the same arguments, then append a deprecation notice
      to the confirmation. No intent.yaml needed for this shim.

  "core/components/memory/standards/templates/github-issue.md":
    role: Canonical type→label mapping
    change: >
      Verify coverage. Add "epic → epic" row if absent (current table has
      feature, fix, hotfix, docs, refactor, chore — missing defect and epic).
      Add: defect→defect, epic→epic, enhancement→enhancement rows.
      Also add title prefix column: feature→[FEAT], bug/fix→[BUG],
      defect→[DEF], epic→[EPIC], enhancement→[ENH].

  "docs/components/plays.md":
    role: Play documentation
    change: >
      Replace "report-issue" entry with "garura:capture (/garura-capture)".
      Add note: "/report-issue is a deprecated alias, available until next
      major release."

  "docs/components/skills.md":
    role: Skills/plays reference documentation
    change: >
      Replace any "report-issue" text with "garura:capture".

  ".garura/product/scope/features.yaml":
    role: Product scope play list and evidence paths
    change: >
      Line 152: report-issue → garura-capture
      Line 1209: core/components/plays/report-issue/ → core/components/plays/garura-capture/
      Line 1398: update slash command list text

  ".garura/product/scope/epics/epic-work-intelligence-intent-driven-verification-001.yaml":
    role: Epic scenario text
    change: >
      Line 143: "report-issue workflow" → "garura:capture workflow"

alternatives_considered:
  - option: Extend report-issue in-place (no rename)
    rejection_reason: >
      Fixing behavior while keeping the "report-issue" name leaves the narrow-scope
      signal intact. New callers will still interpret the play as defect-only. The
      rename is the only way to reset the semantic framing. Reversibility: low cost
      (git mv), so the burden of proof for keeping the old name is high.

  - option: Symlink old report-issue → garura-capture
    rejection_reason: >
      Symlinks are brittle across filesystems (Windows, some CI environments) and
      are invisible to grep/glob-based tooling that scans component folders. A thin
      shim SKILL.md is explicit, readable, and doesn't depend on filesystem symlink
      support.

  - option: Block until issue number is returned (foreground dispatch)
    rejection_reason: >
      The issue explicitly says "always run in background" because foreground
      blocking interrupts caller flow. Blocking until GH returns the ID would
      solve the confirmation clarity (real #N) but violates the stated requirement.
      The tradeoff: callers get a tracking path rather than a live #N — acceptable
      because agents can poll the STM path, and humans can check the path after
      the fact.

  - option: Two separate plays (report-defect + capture-feature + etc.)
    rejection_reason: >
      Violates Occam's Razor. Type-dispatch within a single play with inferred
      or explicit type is simpler than maintaining N plays with overlapping
      gh-filing logic. The type→label table in github-issue.md already encodes
      the dispatch logic — reusing it keeps the moving parts minimal.

risks:
  - description: >
      Background dispatch means the caller cannot get a live GitHub issue number
      at invocation time. Callers that depend on the issue # for immediate
      cross-referencing (e.g., branch naming) will need to poll the STM result.
    mitigation: >
      Document the tracking path convention clearly in the new SKILL.md.
      The STM path {stm_base}/capture-report/evidence/garura-capture/issue-result.yaml
      is deterministic and pollable. Add a helper note in confirmation output.
    severity: medium

  - description: >
      Deprecated alias shim (report-issue/SKILL.md) must be created manually
      since it is not rebuilt from an intent. If /create-play --build ever
      rescans the plays folder and tries to rebuild it, it will fail with no
      intent.yaml.
    mitigation: >
      Add a comment in the shim SKILL.md frontmatter: "alias: true — do not
      rebuild with create-play". Document in the shim that it is intentionally
      maintained without an intent.yaml.
    severity: low

  - description: >
      Product scope (features.yaml) and epic YAML contain hardcoded paths and
      names. If not updated, product briefs will reference stale component paths
      leading to drift reports.
    mitigation: >
      Include features.yaml and epic YAML updates as explicit steps in the
      execution plan (not deferred).
    severity: medium

  - description: >
      Type inference from problem text is heuristic and may misclassify.
      An ambiguous problem description could produce the wrong prefix/label.
    mitigation: >
      Require explicit type when classification confidence is low. Add a
      fallback: if inference is ambiguous, prompt the caller (human) or
      default to "bug" (agent context) rather than silently misclassifying.
      Document this in the intent constraint.
    severity: low

  - description: >
      github-issue.md template update (adding defect, epic, enhancement rows
      and a prefix column) could break other plays that depend on the template
      if they match strictly on the existing rows.
    mitigation: >
      Additive-only change: add new rows, do not remove or rename existing ones.
      Check manage-issue skill and start-feature play for template dependencies
      before modifying.
    severity: low

execution_plan:
  - step: 1
    action: >
      git mv the play folder from report-issue to garura-capture.
    files:
      - core/components/plays/report-issue/ → core/components/plays/garura-capture/
    notes: >
      Run: git mv core/components/plays/report-issue core/components/plays/garura-capture
      This moves both SKILL.md and reference/intent.yaml to the new path.
      Do not delete the old path yet — the alias shim is created in Step 4.

  - step: 2
    action: >
      Rewrite core/components/plays/garura-capture/reference/intent.yaml with
      new intent, updated constraints, and updated scenarios.
    files:
      - core/components/plays/garura-capture/reference/intent.yaml
    notes: >
      New intent statement: "Accept a structured capture request from any caller
      (human or agent), infer or accept explicit issue type (feature / bug /
      defect / epic / enhancement), format the GitHub Issue title and body per
      type, dispatch the gh filing step asynchronously, and return a crisp
      single-line dispatched confirmation. If GitHub is unreachable, produce a
      portable local fallback."

      Constraints to KEEP (updated):
        C4 (auto-date), C5 (structured markdown body), C6 (optional fields),
        C7 (fallback on gh failure with error + sharing instructions).

      Constraints to REPLACE:
        C1 → new C1: Required fields are title/problem. Severity required only
          when type is "defect". All other fields optional.
        C2 → new C2: Type MUST be one of: feature, bug, defect, epic, enhancement.
          If not provided by caller, infer from problem text. If inference is
          ambiguous (no clear keyword match), default to "bug" for agent callers,
          prompt human callers.
        C8 → new C8: Title prefix is type-driven:
          feature→[FEAT], bug→[BUG], defect→[DEF][Severity],
          epic→[EPIC], enhancement→[ENH]. Use github-issue.md template table.
        C9 → new C9: Label is type-driven per github-issue.md template table.
          If the label does not exist, create it.

      New constraints to ADD:
        Cbg: The gh filing step MUST be dispatched as a background task
          (run_in_background). Control returns to caller before GH round-trip.
        Cconf: Confirmation MUST be a single line:
          "garura:capture dispatched → {stm_tracking_path}"

      Update scenarios S1-S5 to cover: feature filing, defect filing, epic filing,
      background dispatch verification (caller receives confirmation before gh
      completes), and fallback path. Remove scenarios that test only defect-type
      behavior and replace with multi-type coverage.

  - step: 3
    action: >
      Run /create-play --build (or /create-play with rebuild flag) targeting
      core/components/plays/garura-capture/reference/intent.yaml.
      This regenerates garura-capture/SKILL.md.
    files:
      - core/components/plays/garura-capture/SKILL.md (regenerated)
    notes: >
      Do NOT edit SKILL.md manually. The compiled artifact must be built from
      intent.yaml. Verify the generated SKILL.md frontmatter shows
      name: "garura:capture" and the workflow encodes type-dispatch in Step 1,
      background dispatch in Step 2, and single-line confirmation in the
      approval step.

  - step: 4
    action: >
      Create the deprecated alias shim at core/components/plays/report-issue/SKILL.md.
      Create the folder and write the SKILL.md manually (no intent.yaml needed).
    files:
      - core/components/plays/report-issue/SKILL.md (new, manual)
    notes: >
      Shim content:
        ---
        name: "meridian:report-issue"
        description: >
          DEPRECATED — use garura:capture (/garura-capture). This alias will be
          removed in the next major release. Forwarding play.
        user-invokable: true
        alias: true
        ---
        # meridian:report-issue (deprecated)
        This play is a deprecated alias for garura:capture.
        Forward all arguments to garura:capture and return its confirmation,
        appended with: "[DEPRECATED] /report-issue is deprecated — use /garura-capture."
      No reference/intent.yaml is created in this folder. The shim is intentionally
      maintained without a compiled intent.

  - step: 5
    action: >
      Update core/components/memory/standards/templates/github-issue.md.
      Add missing type rows: defect→defect, epic→epic, enhancement→enhancement.
      Add title prefix column to the Labels table.
    files:
      - core/components/memory/standards/templates/github-issue.md
    notes: >
      Additive-only. Do not remove or rename existing rows (feature, fix,
      hotfix, docs, refactor, chore). Updated table should have columns:
      Type | Title Prefix | Labels.
      Verify manage-issue skill and start-feature play do not break on the
      added column before committing.

  - step: 6
    action: >
      Update docs to reflect rename and deprecation.
    files:
      - docs/components/plays.md
      - docs/components/skills.md
    notes: >
      docs/components/plays.md: Replace report-issue entry. Add garura:capture
      entry with description. Note /report-issue as deprecated alias.
      docs/components/skills.md: Replace any "report-issue" text with
      "garura:capture".

  - step: 7
    action: >
      Update product scope references.
    files:
      - .garura/product/scope/features.yaml
      - .garura/product/scope/epics/epic-work-intelligence-intent-driven-verification-001.yaml
    notes: >
      features.yaml line 152: "report-issue" → "garura-capture"
      features.yaml line 1209: "core/components/plays/report-issue/" →
        "core/components/plays/garura-capture/"
      features.yaml line ~1398: update slash command list text
      epic-work-intelligence-intent-driven-verification-001.yaml line 143:
        "report-issue workflow" → "garura:capture workflow"

  - step: 8
    action: >
      Run /sync-claude (global mode) to deploy updated components.
    files: []
    notes: >
      Deploys garura-capture play + report-issue shim to ~/.claude/skills/.
      Both slash commands (/garura-capture and /report-issue) should appear
      after sync. Verify with: ls ~/.claude/skills/ | grep -E "garura-capture|report-issue"

  - step: 9
    action: >
      Manual smoke test: invoke /garura-capture with a feature-type problem
      and verify (a) dispatched confirmation returned immediately, (b) gh
      filing runs in background, (c) title shows [FEAT] prefix, (d) label
      is "enhancement". Then invoke /report-issue and verify it forwards with
      deprecation notice.
    files: []
    notes: >
      This is a verification step — no code changes. If dispatched confirmation
      is not immediate, background dispatch in SKILL.md is not working.
      Expected confirmation: "garura:capture dispatched → .garura/project/..."

confidence: 0.88
confidence_notes: >
  High confidence on root cause tracing — directly verified in SKILL.md and
  intent.yaml. Slight uncertainty on the background dispatch mechanism: Claude
  Code's run_in_background semantics for subagent delegation need to be verified
  against how project-orchestrator handles async JSON contracts. If run_in_background
  isn't supported for Task delegation, the implementation will need to use a
  subshell approach (nohup/&) and track results via the STM file. This should be
  resolved during Step 3 (/create-play --build) evals.
