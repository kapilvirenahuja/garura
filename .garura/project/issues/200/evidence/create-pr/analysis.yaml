summary: >
  Introduces the quality-check skill — an LTM-driven quality assessment framework
  that launches 11 parallel explore subagents across code, testing, security,
  architecture, documentation, operations, frontend, backend, data, performance,
  and tech-debt dimensions. Ships 33 KB knowledge files organized under
  core/components/memory/knowledge/quality/ across 11 domain subdirectories,
  a fully-specified SKILL.md with 5-step workflow, subagent prompts, a
  requirements index, HTML/JSON report templates, and an updated knowledge
  _index.md registering the new quality/ category.

