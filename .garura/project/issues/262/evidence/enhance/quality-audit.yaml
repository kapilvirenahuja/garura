    root_cause: >
      The string "Action: comment" is double-quoted inside a YAML block sequence item. The YAML parser
      interprets the colon following "Action" as a mapping key-value separator, producing a parse error
      because the resulting implicit mapping is malformed. The fix is to either escape the colon
      (single-quote the inner string) or restructure the list item to avoid embedding quoted colons
      without proper escaping.
    detail: "build-report.yaml at line 40 is invalid YAML. File is an STM evidence artifact (untracked) — not a compiled play file, but it is part of the declared change set for this branch."

