alternatives_considered:
  - option: >
      Update all four calling plays (define, specify, design, arch) to explicitly remind
      product-keeper to call TaskUpdate, rather than fixing the agent definition itself.
    rejection_reason: >
      Distributes the fix across four files instead of one, violates the principle that
      agent definitions are the single source of truth for agent behaviour. Future callers
      would also need the same reminder, making the fix non-durable. The root cause is in
      the agent definition — the fix belongs there.

  - option: >
      Create a new shared agent-contract mixin or base template that all agents inherit,
      adding TaskUpdate boilerplate via a code-generation step rather than editing each
      agent file individually.
    rejection_reason: >
      Over-engineered for a two-line addition to one file. The framework has no mixin or
      inheritance mechanism for agent .md files; introducing one would be an architectural
      change requiring a new ADR and broader discussion. Occam's Razor — direct edit wins.

  - option: >
      Mark the P7 gap as documented with a note "research-domain-context is invoked
      conditionally and therefore intentionally omitted from the inventory" rather than
      adding the row.
    rejection_reason: >
      The audit-checklist P7 rule has no carve-out for conditional invocations. The skill
      is used at runtime — any runtime usage must appear in the inventory. A documentation
      note that contradicts the audit rule would not make the audit pass and would
      introduce a silent exception not backed by any framework standard.

