risks:
  - id: R1
    type: architectural
    description: >
      The adapter becomes a god-skill if additional verbs accrete beyond the
      locked inventory. Once an abstraction layer exists, every new operation
      is a tempting candidate for addition.
    mitigation: >
      Verb inventory is locked to the 16 listed in this PR. Any growth request
      triggers a new issue — not an ad-hoc addition. Evals E1/E2 enforce the
      current surface; reviewer explicitly rejects verb additions in this PR's
      review checklist.
    action: approval-required
    ltm_reference: null
    generated_evals: [E1, E2]

  - id: R2
    type: technical
    description: >
      GitLab project numeric ID resolution. The `update-comment` verb
      (and any `glab api projects/{id}/...` call) requires a numeric project ID,
      not the `owner/repo` slug used by GitHub. If the adapter does not
      consistently resolve and cache this ID, callers will hit 404s.
    mitigation: >
      reference/gitlab/verbs.md documents the resolution procedure:
      `glab api projects/{url_encoded_owner%2Fname} | jq '.id'`.
      The adapter caches the result in a local variable for the duration of
      a single invocation. Not persisted across calls — resolved fresh each time
      (acceptable for current call volumes; re-evaluate if latency matters).
    action: eval-driven
    ltm_reference: null
    generated_evals: [E6]

  - id: R3
    type: technical
    description: >
      Comment update-in-place semantics diverge between hosts. GitHub addresses
      by global `comment_id` in `issues/comments/{id}`; GitLab requires
      `projects/{project_id}/notes/{note_id}`. Callers must pass the right ID
      type per platform, or the adapter must abstract this.
    mitigation: >
      Adapter reference docs (both github/verbs.md and gitlab/verbs.md) encode
      the exact API path and required ID type. The `update-comment` verb
      accepts a single `comment_id` argument; on GitHub it maps to the issues
      endpoint; on GitLab it maps to notes endpoint with project_id resolution
      as per R2. Callers pass one identifier — the adapter handles the mapping.
      Documented in memory/tools/{platform}/adapter.md for agent awareness.
    action: eval-driven
    ltm_reference: null
    generated_evals: [E2]

  - id: R4
    type: business
    description: >
      GitHub regression risk. Existing GitHub workflows must produce byte-identical
      comment-record.yaml output after conversion. Routing through the adapter
      adds one indirection layer — any argument ordering mistake or field-name
      change in the GitHub reference doc will silently break GitHub users.
    mitigation: >
      Eval E3 (grep for direct gh calls) ensures the adapter is the only path.
      Eval E8/E9 confirm play-level conversion. For functional validation, run
      /review-pr on a live GitHub PR before and after and diff comment-record.yaml.
      The adapter's GitHub branch must produce commands identical to the former
      direct calls — reviewable in github/verbs.md during PR review.
    action: eval-driven
    ltm_reference: null
    generated_evals: [E3, E8, E9]

  - id: R5
    type: architectural
    description: >
      Deleting submit-pr/merge-pr reference/{platform}/ subdirs removes existing
      platform docs (including the already-working gitlab/pr.md and
      gitlab/merge.md) that contributors may rely on or reference.
    mitigation: >
      User approved this in Q&A (discovery.md line 68: "Retire their
      reference/{platform}/ subdirs into the adapter's reference"). The content
      moves to platform-adapter/reference/{platform}/verbs.md — it is not lost,
      only relocated. The adapter's reference files are richer (all verbs in one
      place) than the per-skill references were. Monitor-only post-merge.
    action: monitor-only
    ltm_reference: "discovery.md line 68"
    generated_evals: [E10]

alternatives_considered:
  - id: A1
    approach: >
      Implement the adapter as an extension inside repo-orchestrator agent rather
      than as a new skill.
    rejection_reason: >
      User-locked in Q&A Q1 (discovery.md): "New skill. Agents call this skill;
      the skill owns gh/glab routing." Beyond the explicit lock, the architecture
      is wrong: agents own context engineering; skills own artifact production and
      CLI dispatch. Mixing platform routing into the agent violates the
      agent-vs-skill separation that the framework enforces (CLAUDE.md Rule 4:
      "Agents hold the role of Context Crafting... the actual work is supposed to
      be done by skills"). Razor 1 — Occam's Razor also favours the skill: fewer
      changes to the agent, cleaner single-responsibility.

  - id: A2
    approach: >
      Keep two dispatch patterns: verb adapter for review-pr operations, keep
      reference/{platform}/ dispatch for submit-pr and merge-pr.
    rejection_reason: >
      User-locked in Q&A Q2 (discovery.md line 68): "CONVERT to the new
      verb-adapter. Retire their reference/{platform}/ subdirs. One dispatch
      pattern across the codebase." Two patterns mean two places to add a new
      platform in future, two mental models for contributors, and a partial
      migration that leaves the codebase in an inconsistent state. Razor 1 —
      Occam's Razor: one pattern is fewer moving parts.

  - id: A3
    approach: >
      Detect platform from `git remote -v` at runtime rather than reading
      `platform:` from config.yaml.
    rejection_reason: >
      User-locked in Q&A Q1 (discovery.md line 67): "Read platform: from
      .garura/core/config.yaml (NOT git remote -v). Config is authoritative."
      Runtime remote parsing is fragile — SSH vs HTTPS format differences,
      custom remote names, self-hosted GitLab URLs. Config is explicit and
      operator-controlled. Razor 3 — Evidence over opinion: the submit-pr and
      merge-pr skills already establish this pattern (understanding.md section 4,
      lines 135–141) — follow the existing evidence.

  - id: A4
    approach: >
      Convert submit-pr and merge-pr in a follow-on PR after this one.
    rejection_reason: >
      User-locked in Q&A Q2 (discovery.md line 34): "All. Else we leave a gap."
      A partial conversion means two code paths coexist, the grep eval (E3) fails
      by design, and any GitLab user using the ship flow gets a silent regression
      on submit-pr. Razor 2 — Reversibility bias: shipping a complete conversion
      in one PR is no harder to undo than a partial one, and it prevents a
      permanent inconsistency in the codebase.
