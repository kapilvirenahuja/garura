connections:
  call_chain: |
    Play (review-pr / enhance / ship)
      → repo-orchestrator (utility agent, exempt from domain budget)
          → platform-adapter skill
              → gh (when platform=github)
              → glab (when platform=gitlab)

    Play (review-pr)
      → repo-orchestrator
          → analyze-pr skill (PR-scoped mode)
              → platform-adapter skill (diff-pr, view-pr)
                  → gh / glab

    Play (ship / enhance / fix-it)
      → repo-orchestrator
          → manage-issue skill
              → platform-adapter skill (all issue verbs)
                  → gh / glab

    Play (ship / enhance)
      → repo-orchestrator
          → archive-issue-stm skill
              → platform-adapter skill (view-issue)
                  → gh / glab

    Play (ship / enhance)
      → repo-orchestrator
          → submit-pr skill
              → platform-adapter skill (create-pr, view-pr)
                  → gh / glab

    Play (ship / enhance / merge-pr)
      → repo-orchestrator
          → merge-pr skill
              → platform-adapter skill (merge-pr verb, view-pr)
                  → gh / glab

  platform_resolution: >
    The adapter reads `platform:` from `.garura/core/config.yaml` using the same
    bash snippet already established in submit-pr/SKILL.md lines 36–39 and
    merge-pr/SKILL.md lines 30–35:
      platform=$(grep '^platform:' .garura/core/config.yaml | awk '{print $2}')
      platform=${platform:-github}
    Config is authoritative. `git remote -v` is NOT used.

  verb_interface: >
    Callers pass a verb name and a map of named arguments.
    The adapter resolves the platform, looks up the command translation in
    reference/{platform}/verbs.md, substitutes arguments, and executes.
    Return value is the raw CLI output (stdout) plus an exit code.
    The caller is responsible for parsing the output — the adapter does not
    transform field names across platforms (field-name mapping notes live in
    the reference docs for callers to consult).

  reference_vs_kb_split: >
    Two file types, two roles:
    - platform-adapter/reference/{platform}/verbs.md — normative execution
      reference that the skill reads to produce CLI commands. One section per
      verb; authoritative command with parameter tokens.
    - memory/tools/{platform}/adapter.md — KB narrative for agents and
      contributors. Explains verb semantics, caveats, and gap behaviours
      (request-changes draft+note; sub-issue related-link fallback).
      Descriptive, not executed.

