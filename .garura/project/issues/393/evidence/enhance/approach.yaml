problem_statement: >
  Every code-host operation in Garura's plays, agents, and skills is hard-wired to the
  GitHub CLI (`gh`). Running /review-pr against a GitLab MR halts at the very first
  command (`gh pr view`). The same limitation affects issue management, PR creation, and
  merge operations. The fix is a single verb-adapter skill that centralises all
  code-host dispatch behind a stable verb interface, and converts every current `gh`
  caller to route through it — so adding a new host in future touches one file.

solution_summary: >
  Introduce `platform-adapter` as a new skill. It exposes a stable verb set
  (view-pr, diff-pr, comment-pr, request-changes, add-reviewer, view-issue,
  create-issue, list-issues, close-issue, comment-issue, add-label, attach-sub-issue,
  create-pr, merge-pr, view-user, update-comment). Each verb maps to the correct CLI
  command for the active platform, resolved from `platform:` in
  `.garura/core/config.yaml`. Agents call the skill; plays never call the adapter
  directly. All 22 source files across core/components/ that currently call `gh`
  directly are converted in this PR — no follow-on chore PRs. The `reference/{platform}/`
  subdirs inside submit-pr and merge-pr skills are retired into the adapter's own
  reference layer; a single dispatch pattern replaces the two-pattern world.

files_to_create:
  - path: core/components/skills/platform-adapter/SKILL.md
    purpose: >
      The adapter skill. Defines the verb interface, platform resolution logic (reads
      `platform:` from `.garura/core/config.yaml`; defaults to `github`), pre-flight
      checks (`which glab` when platform=gitlab; halt with install hint on failure),
      and the dispatch table that routes each verb to the correct CLI command.
      Authoritative for what the adapter CAN do — callers pass `{verb, args}`.

  - path: core/components/skills/platform-adapter/reference/github/verbs.md
    purpose: >
      Executable command translations for every adapter verb on GitHub. This is the
      normative reference the adapter reads when platform=github. One section per verb;
      each section contains the exact `gh` command with parameter substitution tokens.

  - path: core/components/skills/platform-adapter/reference/gitlab/verbs.md
    purpose: >
      Executable command translations for every adapter verb on GitLab. Same structure
      as github/verbs.md. Covers the two behavioural gaps:
      (1) request-changes: `glab mr update {mr_number} --draft` (sets WIP state) PLUS
          `glab mr note {mr_number} --message "{structured_comment}"` (posts comment).
      (2) attach-sub-issue: GitLab has no parent/child sub-issue concept. Verb falls
          back to `glab api projects/{encoded_project}/issues/{n}/links` (related-issues
          link). Reference doc documents the fallback and its limits.
      (3) update-comment: uses `glab api projects/{id}/notes/{note_id} -X PUT`.
          Project numeric ID must be resolved via
          `glab api projects/{encoded_owner%2Fname} | jq '.id'` and cached.

  - path: core/components/memory/tools/github/adapter.md
    purpose: >
      KB narrative describing the adapter verb surface for GitHub — intended for agents
      and contributors reading the KB, not for the adapter's own execution. Explains
      what each verb does conceptually, which `gh` command backs it, and any caveats.
      Role is descriptive (human/agent reading), not normative (not the command the
      adapter executes; that lives in reference/github/verbs.md).

  - path: core/components/memory/tools/gitlab/adapter.md
    purpose: >
      Same KB narrative role as github/adapter.md but for GitLab. Documents the two
      behavioural gaps (request-changes draft + note; sub-issue related-link fallback)
      so agents can set correct expectations when routing to GitLab.

