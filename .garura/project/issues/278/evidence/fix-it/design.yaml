plan: >
  Rename the play source directory from `core/components/plays/garura-capture/`
  to `core/components/plays/capture/` using `git mv`. Update all internal
  references to the old name across documentation, product scope, quality profile,
  the deprecated alias play, and the intent.yaml build target. The SKILL.md
  frontmatter `name: "garura:capture"` is correct and must not change.
  After the rename, re-run `/create-play --build capture` to regenerate SKILL.md
  with correct paths, then run `/sync-claude` to deploy the renamed play.

confidence: high

affected_files:
  - path: core/components/plays/garura-capture/ → core/components/plays/capture/
    action: rename (git mv)
    change: >
      git mv core/components/plays/garura-capture core/components/plays/capture
      This renames the directory and all contents atomically with git history preserved.

  - path: core/components/plays/capture/reference/intent.yaml
    action: modify
    change: >
      Line 1: `name: garura-capture` → `name: capture`
      This is the build target identifier used by `/create-play --build <name>`.
      All other fields (description, version, intent, constraints, etc.) are unchanged.

  - path: core/components/plays/capture/SKILL.md
    action: modify (or regenerate via /create-play --build capture)
    change: >
      After intent.yaml is updated and SKILL.md is regenerated by /create-play --build capture,
      all occurrences of `garura-capture` within SKILL.md will be replaced with `capture`:
        - Line 15: `--build garura-capture` → `--build capture`
        - All STM paths `evidence/garura-capture/` → `evidence/capture/`
        - Status file path `status/garura-capture.json` → `status/capture.json`
        - Agent contract intent_path updated to reference `core/components/plays/capture/reference/intent.yaml`
      SKILL.md frontmatter `name: "garura:capture"` must remain unchanged — it is the namespace
      identifier and not the invocation directory name.
      NOTE: The intent hash guard line will change since intent.yaml changes. The recompile
      updates the hash automatically.

  - path: core/components/plays/report-issue/SKILL.md
    action: modify
    change: >
      Line 4: replace `/garura-capture` with `/capture` in the deprecation description.
      Line 16: replace `/garura-capture` with `/capture` in the deprecation warning block.
      The `alias: true` frontmatter and all other content remain unchanged.

  - path: docs/components/plays.md
    action: modify
    change: >
      Line 336: Replace entry name `garura-capture` → `capture` in the play roster table.
      Line 337 (report-issue row): Replace `Use /garura-capture instead` → `Use /capture instead`.

  - path: docs/components/skills.md
    action: modify
    change: >
      Line 99: Replace entry name `garura-capture` → `capture` in the skills table.
      Line 100 (report-issue row): Replace `Use /garura-capture instead` → `Use /capture instead`.

  - path: .garura/product/scope/features.yaml
    action: modify
    change: >
      Line 152: `- garura-capture` → `- capture` in play list.
      Line 1209: `core/components/plays/garura-capture/` → `core/components/plays/capture/` in evidence list.
      Line 1398: `/garura-capture` → `/capture` in notes string.

  - path: .garura/product/specification/quality-profile.yaml
    action: modify
    change: >
      Line 99: rename key `garura-capture` → `capture` in play performance metrics map.
      All metric values (nulls) are preserved unchanged.

alternatives_considered:
  - option: Keep directory named garura-capture, add a capture/ symlink
    rejection_reason: >
      Symlinks create two invocable names for the same play, which the issue
      explicitly says is wrong — the invocation should be `/capture` only.
      Symlinks also add filesystem complexity, are fragile across platforms, and
      require special sync handling that does not exist today. Occam's Razor:
      a simple rename achieves the goal without adding moving parts.

  - option: Keep directory named garura-capture, update only SKILL.md frontmatter
    rejection_reason: >
      The SKILL.md `name:` frontmatter is already correct (`garura:capture`) and
      controls the namespace identifier, not the invocation path. The invocation
      name is determined by the directory name, not the frontmatter. This option
      would change nothing functional and would leave the bug in place.

  - option: Rename directory to capture and manually edit SKILL.md without recompiling
    rejection_reason: >
      SKILL.md is a compiled artifact — the CLAUDE.md framework rule states
      "NEVER edit this file manually." Manual edits would create drift between
      intent.yaml and SKILL.md content. Regenerating via /create-play --build capture
      is the correct path and is lower risk because it updates the intent hash guard
      automatically.

risks:
  - risk: >
      Old deployed directory `~/.claude/skills/garura-capture/` persists after sync
      if /sync-claude does not clean up stale entries. Two invocations `/garura-capture`
      and `/capture` may both be active temporarily.
    severity: medium
    mitigation: >
      After /sync-claude, verify that `~/.claude/skills/garura-capture/` no longer exists.
      If it does, manually delete it: `rm -rf ~/.claude/skills/garura-capture/`.
      The sync script behavior should be checked — if it does not prune removed entries,
      this manual cleanup step must be explicit in the execution plan.

  - risk: >
      Callers who have bookmarked or scripted `/garura-capture` will get a "skill not found"
      error after the rename.
    severity: low
    mitigation: >
      The `report-issue` deprecation alias already demonstrates this pattern — `/report-issue`
      still works by forwarding. A temporary `/garura-capture` forwarding shim could be added
      if needed, but the issue does not request backward compatibility. Given this is an
      internal dev tool (solo-dev repo) and the issue explicitly asks for the rename, the
      risk is acceptable. The report-issue SKILL.md update (pointing to `/capture`) serves
      as the forwarding path for any existing callers.

  - risk: >
      /create-play --build capture fails because the build target name must match the
      directory name, and if the tool reads the intent.yaml `name:` field before the file
      is updated, the build may target the wrong directory.
    severity: low
    mitigation: >
      Update intent.yaml `name: capture` first, then rename the directory, then run
      `/create-play --build capture`. The order in the execution plan enforces this.

  - risk: >
      Historical STM evidence paths under `.garura/` that reference
      `evidence/garura-capture/` (from the capture play's own prior runs) will not match
      the new `evidence/capture/` path. This could confuse resume logic.
    severity: low
    mitigation: >
      The capture play uses `capture-report` as its synthetic issue identifier. Any prior
      evidence was written under `capture-report/evidence/garura-capture/`. After the rename,
      new runs will write to `capture-report/evidence/capture/`. There is no resume continuity
      between old and new paths — this is acceptable since the play is stateless across
      invocations (resume applies within a single invocation session, not across deploys).
      No migration of existing evidence directories is required.

  - risk: >
      quality-profile.yaml key rename (`garura-capture` → `capture`) may conflict with
      a locked artifact constraint if the file is marked LOCKED in LTM.
    severity: low
    mitigation: >
      quality-profile.yaml is a product artifact under `.garura/product/specification/` —
      it is not a locked LTM artifact. The rename is a cosmetic key change matching
      the new directory name. No approval gate required.

