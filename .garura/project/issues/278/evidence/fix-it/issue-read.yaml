number: 278
title: "[DEF] garura-capture play invocation name should be 'capture' not 'garura-capture'"
state: open
url: https://github.com/kapilvirenahuja/garura/issues/278
labels:
  - defect
body: |
  ## Problem

  The play located at `core/components/plays/garura-capture/` is invoked as `/garura-capture`. The intended invocation name is simply `/capture` (the `garura:` prefix belongs in the `name` frontmatter field only, not in the directory/skill name).

  ## Current State
  - Directory: `core/components/plays/garura-capture/`
  - Deployed at: `~/.claude/skills/garura-capture/`
  - Invocation: `/garura-capture`
  - SKILL.md frontmatter `name`: `garura:capture` âś“ (correct)

  ## Expected State
  - Directory: `core/components/plays/capture/`
  - Deployed at: `~/.claude/skills/capture/`
  - Invocation: `/capture`
  - SKILL.md frontmatter `name`: `garura:capture` (unchanged)

  ## Fix
  Rename the play directory from `garura-capture` to `capture`. Update any internal references to the old name (e.g., `--build garura-capture` â†’ `--build capture`). Re-sync to deploy.
type_hint: fix
