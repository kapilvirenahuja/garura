resolution_trace:
  issue: 278
  play: fix-it
  step: rca-and-design
  resolved_at: "2026-04-19"

  entries:
    - domain: play_invocation_naming_convention
      question: >
        What determines the slash-command invocation name of a Meridian play —
        the directory name or the SKILL.md `name:` frontmatter field?
      resolution: >
        The directory name under `core/components/plays/` determines the invocation name.
        After /sync-claude, the directory is copied to `~/.claude/skills/<dirname>/`, and
        Claude Code exposes it as `/<dirname>`. The SKILL.md `name:` frontmatter is a
        display/namespace identifier only — it does not affect the slash-command path.
      resolved_from: project
      evidence:
        - file: CLAUDE.md
          note: >
            Documents that plays deploy from core/components/plays/ → ~/.claude/skills/
            via /sync-claude. The deployed directory name is the invocation name.
        - file: core/components/plays/garura-capture/SKILL.md
          note: >
            Frontmatter has `name: "garura:capture"` (namespace identifier) while the
            directory is `garura-capture` — demonstrates these are independent fields.

    - domain: intent_yaml_name_field_purpose
      question: >
        What is the `name:` field in `reference/intent.yaml` used for?
      resolution: >
        The `name:` field in intent.yaml is the build target identifier passed to
        `/create-play --build <name>`. It should match the directory name so the
        build command targets the correct play. It is distinct from the SKILL.md
        frontmatter `name:` field which carries the full namespace identifier.
      resolved_from: project
      evidence:
        - file: core/components/plays/garura-capture/reference/intent.yaml
          line: 1
          note: "`name: garura-capture` — used as the --build target"
        - file: core/components/plays/garura-capture/SKILL.md
          line: 15
          note: "`/create-play --build garura-capture` — confirms name field maps to build target"

    - domain: skill_md_edit_policy
      question: >
        Can SKILL.md be edited directly to fix the internal `evidence/garura-capture/` paths,
        or must it be regenerated via /create-play --build?
      resolution: >
        SKILL.md is a compiled artifact. Per CLAUDE.md: "Do NOT edit this file manually —
        it is a compiled artifact." The correct approach is to update intent.yaml, then
        run /create-play --build capture to regenerate SKILL.md with all correct paths
        and the updated intent hash guard.
      resolved_from: project
      evidence:
        - file: CLAUDE.md
          note: "Play Pipeline Rules: NEVER edit SKILL.md directly."
        - file: core/components/plays/garura-capture/SKILL.md
          line: 14
          note: "Do NOT edit this file manually — it is a compiled artifact."

    - domain: sync_stale_directory_cleanup
      question: >
        Will /sync-claude automatically remove `~/.claude/skills/garura-capture/`
        after the source directory is renamed to `capture`?
      resolution: >
        Uncertain from code inspection alone — sync script behavior for stale entries
        was not verified against source. Treated as a risk in design.yaml with a manual
        cleanup fallback step included in the execution plan.
      resolved_from: llm
      confidence: medium
      flag: requires_verification_at_execution_time

    - domain: blast_radius_historical_evidence
      question: >
        Should historical evidence files in `.garura/project/issues/266/` and `274/`
        that reference `garura-capture` be updated?
      resolution: >
        No. These are read-only historical archives of prior play runs. They are not
        live configuration or documentation — they record what happened at the time of
        their creation. Updating them would be misleading and serves no functional purpose.
      resolved_from: llm
      confidence: high
