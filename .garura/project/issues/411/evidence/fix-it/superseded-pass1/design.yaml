strategy: >
  Extend constraint C3 in core/components/plays/implement/reference/intent.yaml to specify a
  3-branch depends_on resolution rule: (1) if a depends_on entry matches a milestone_id in
  plan-milestone-summary.yaml, check that milestone's COMPLETE status (existing behavior preserved);
  (2) if the entry matches the id of a terminal .GATE task inside a kind: prerequisites phase that
  has no milestone_id, treat the dependency as satisfied by prepending that phase's task list to
  the current milestone's scope execution — the prerequisites tasks run as scaffolding-only steps
  (no eval generation, no judge, no scenario gate) before the feature milestone's scope_items begin;
  (3) if the entry matches neither, halt with a structured error naming the unresolved reference
  (new failure condition F27 or extended F24 subtype). Also update F24 to scope it to the
  milestone-not-COMPLETE case only, and add F27 for the unrecognized-reference case to give
  operators a clear diagnostic. After intent.yaml is updated, regenerate SKILL.md by running
  /create-play --build implement — SKILL.md must NOT be hand-edited for this change. Separately,
  fix the prepare/SKILL.md canonical example (a non-intent direct edit) to show T-001's phase-level
  depends_on as [T-000.GATE] rather than [] so that the documented format matches actual /prepare
  output.

alternatives_considered:
  - option: "Fix in /prepare — forbid kind: prerequisites phases, require all phases to be feature_milestone"
    rejection_reason: >
      This alternative shifts the burden to plan authors and forces scenario surface onto
      tooling-only work. A greenfield T-000 equivalent milestone would need success_scenarios
      and failure_conditions (C2 requires them before implementation), producing eval coverage
      for "npm install succeeds" and "tsconfig compiles" — scenarios with no product value.
      It also breaks backward compatibility with all existing plan.yaml files that already use
      kind: prerequisites, requiring a migration across all STM contexts. The issue body explicitly
      identifies this as the inferior option for this reason. Rejected: imposes product-surface
      cost on scaffolding phases and requires plan migration.

  - option: "Hand-edit SKILL.md pre-flight pseudocode directly without updating intent.yaml"
    rejection_reason: >
      SKILL.md is a compiled artifact generated from reference/intent.yaml by /create-play --build.
      The garura Play Pipeline Rules (CLAUDE.md) state that intent changes must go through
      intent.yaml — direct SKILL.md edits for intent-level changes are clobbered on the next
      /create-play --build run, creating a silent divergence between the source of truth and the
      runtime artifact. The lint-components validator checks hash guards against intent.yaml; a
      hand-edited SKILL.md would fail that guard. Rejected: violates the play pipeline invariant
      and creates an undocumented drift that breaks on any future rebuild.

