          a 3-branch lookup:
          (1) Milestone reference: if the entry matches a milestone_id in plan-milestone-summary.yaml,
              check that milestone's status. If not COMPLETE, halt with F24.
          (2) Prerequisites gate reference: if the entry matches the id of a task whose id ends in
              '.GATE' (or '-GATE') within a phase that has no milestone_id and kind: prerequisites
