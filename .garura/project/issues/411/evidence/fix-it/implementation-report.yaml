intent_yaml_changes:
  intent_statement: >
    Rewritten: /implement described as an agentic, self-locating, continuous DAG executor.
    Reads plan DAG + branch state to determine next runnable node. Halts ONLY at gates
    (readiness/tooling stop, resumes when condition clears) or milestones (human-acceptance
    stop, resumes after validate ACCEPTED). No milestone_id required at invocation.
  C3: >
    Replaced milestone-only resolver with general DAG-edge resolution by node type:
    milestone_id edges require ACCEPTED status; gate task ID edges require exit_gate met;
    task ID edges require task marked done. Pre-flight validates all edges before dispatching.
  C28: >
    Replaced milestone-first invocation model (milestone_id required) with agentic invocation
    model: optional issue reference only; reads plan.yaml + branch state; self-locates by
    finding topologically earliest unsatisfied node; runs DAG continuously until gate or
    milestone boundary; resumes after boundary condition clears.
  F24: >
    Updated from milestone-COMPLETE check to DAG-walker failure: fires when a depends_on edge
    target cannot be resolved (node ID not in plan.yaml), when a gate's exit_gate condition is
    not satisfied, or when a milestone target does not have status ACCEPTED.
  C34: >
    New constraint added after C33: encodes the two-boundary halt model. Gate nodes (.GATE
    suffix or kind: gate) are readiness/tooling stops — pause, check condition, resume
    automatically. Milestone nodes (milestone_id field) are human-acceptance stops — pause,
    run evals + scenario gates, invoke validate, resume only after ACCEPTED. All intermediate
    task nodes execute without pausing. Orchestrator MUST NOT pause mid-stream at a plain task.

