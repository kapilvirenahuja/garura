resolution_trace:
  - decision: >
      What execution model should an agentic play orchestrator use to traverse a task DAG,
      self-locate within the graph, and determine the next runnable node?
    resolved_from: "core"
    source: "knowledge/arch/agentic/agent-orchestration.md"
    section: "Reference Architecture — Agent Loop: Think / Act / Observe"
    authority: "draft"
    value: >
      Core knowledge confirms the standard agentic loop: the agent reasons about what to do
      next (Think), executes a step (Act), and observes the result (Observe) — repeating until
      done or a bounded stop is reached. For a DAG-structured task graph this maps to:
      inspect the graph + current state to find the next runnable node (Think), execute that
      node (Act), record the result and update graph state (Observe), repeat. The "always set
      max step limits" and "human-in-the-loop for high-stakes actions" guidance directly maps
      to the two-boundary halt model (gate = tooling stop, milestone = human-acceptance stop).

  - decision: >
      What rules govern constraint authoring in a play's intent.yaml — specifically, how
      should new execution-model constraints be structured and what makes them valid?
    resolved_from: "core"
    source: "standards/rules/architecture.md"
    section: "Rule 1: Every Architectural Decision Has a Driver"
    authority: "draft"
    value: >
      Architecture rules require every constraint to trace back to a product need and cite
      its driver. Applied to play intent constraints: new DAG-walk, self-location, and
      two-boundary-halt constraints must each cite the execution model requirement (the
      corrected model from corrected-model.md) as their driver. Constraints without a
      traceable driver are architecture smells. This validates that the fix strategy
      (intent change + recompile) is the correct path — not patching the compiled SKILL.md.

