symptom: |
  Six core pipeline plays use verbose compound invocation names (specify-product, design-exp,
  build-arch, prepare-epic, implement-epic, validate-epic) while utility plays use short single-word
  names (ship, fix-it, enhance). The compound names are inconsistent with the rest of the framework
  and harder to type as CLI commands. The proposed rename gives each pipeline stage a clean
  single-word name: specify, design, architect, prepare, implement, validate.

diagnosis: |
  This is a coordinated rename across the framework: 6 play directories must be renamed, the
  name: field in 12 frontmatter files (6 SKILL.md + 6 intent.yaml) must change, and all string
  occurrences of the old names across ~65 source files must be updated. The old names appear as:
  (a) play invocation slugs in SKILL.md frontmatter, intent.yaml metadata, and evidence/status
  path templates; (b) narrative references in cross-play SKILL.md descriptions, agent definitions,
  skill descriptions, memory standards, schema comments, docs, and ADRs; (c) hardcoded path
  strings embedded in JSON contract intent_path fields within SKILL.md orchestration steps;
  (d) internal self-references within each play's own SKILL.md (e.g., "run /specify-product first",
  evidence path templates using the play name as a directory segment).

  Historical STM artifacts under .garura/product/ and .garura/project/issues/*/evidence/ contain
  the old names frozen in completed-run records. These are historical logs — updating them would
  falsify the record of past runs. They are OUT OF SCOPE for this rename.

  The .claude/specs/ directory is developer scratch space (gitignored-equivalent) — similarly
  out of scope.

root_cause: |
  The six plays were named during early framework design using descriptive compound names that
  encode both the domain and the artifact type (e.g., "specify-product" = specify + product,
  "build-arch" = build + arch). As the framework matured, utility plays settled on short names
  (ship, enhance, fix-it), creating an inconsistency. The compound names are not wrong — they
  are simply inconsistent with the rest of the framework's naming conventions and verbose for
  daily CLI use. There is no bug; the rename is a deliberate breaking change to establish
  consistent, short invocation names across all plays.

