      - core/components/plays/design-exp/
      - core/components/plays/build-arch/
      - core/components/plays/prepare-epic/
      - core/components/plays/implement-epic/
      - core/components/plays/validate-epic/
    command_hint: |
      git mv core/components/plays/specify-product core/components/plays/specify
      git mv core/components/plays/design-exp core/components/plays/design
      git mv core/components/plays/build-arch core/components/plays/architect
      git mv core/components/plays/prepare-epic core/components/plays/prepare
      git mv core/components/plays/implement-epic core/components/plays/implement
