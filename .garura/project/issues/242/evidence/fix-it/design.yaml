confidence: high

plan: |
  The rename is a three-phase operation: (1) rename the six play directories using git mv so
  git history is preserved; (2) update all name: fields in SKILL.md and intent.yaml frontmatter
  inside the renamed directories; (3) do a global string replacement of old play names in all
  cross-reference files (other plays, skills, agents, memory, docs, grounding). Phase 3 is
  ordered within itself: update files that reference the old names as strings only — not file paths
  — so there is no dependency on phase 1 completing first (strings are just text). However,
  phase 2 depends on phase 1 because the files must be in their new locations before editing.

  IMPORTANT: The SKILL.md files embed the play name in multiple structural locations beyond the
  name: frontmatter field: intent_path strings (e.g., "core/components/plays/implement-epic/reference/intent.yaml"),
  evidence path templates ("evidence/implement-epic/{milestone_id}/"), status file path templates
  ("status/implement-epic-{milestone_id}.json"), _pending path templates ("_pending/prepare-epic/*"),
  invocation examples ("/implement-epic --milestone"), and rebuild instructions
  ("/create-play --build implement-epic"). All of these must be updated in Phase 2.

  After all file changes are complete, create an ADR documenting the rename decision as required
  by the acceptance criteria.

alternatives_considered:
  - option: Alias approach — keep old names, add short aliases
    description: |
      Keep all 6 plays at their current directory names and SKILL.md name: values.
      Add alias entries in the Claude slash command dispatch layer so /specify routes to
      specify-product, /design routes to design-exp, etc.
    rejection_reason: |
      Aliases don't eliminate the cross-reference inconsistency — all narrative text, schema
      comments, agent descriptions, docs, and ADRs would still say the old names. The grep
      acceptance criterion ("grep for old names returns zero hits") would fail by definition.
      Aliases also require a dispatch mechanism that doesn't exist in the current framework
      (plays are identified by their SKILL.md name: field, not by aliases). Occam's Razor:
      renaming is simpler than aliasing.

  - option: Incremental rename — one play per PR
    description: |
      Rename the plays in six separate PRs to reduce per-PR blast radius. Each PR renames
      one directory and updates all references to that one play.
    rejection_reason: |
      Intermediate states are broken: between PR 1 (specify → specify) and PR 2 (design-exp →
      design), build-arch still says "run /specify-product first" in its pre-flight but the
      play is now named "specify". Cross-reference inconsistencies accumulate until all 6 PRs
      land. A single atomic PR is safer and simpler. The blast radius is wide but the change
      type is mechanical — find/replace strings and git mv. Reversibility: a single revert is
      cleaner than reverting 6 coordinated PRs.

  - option: Automated script — write a shell script to do all replacements
    description: |
      Write a bash script that runs git mv for the 6 directories and then runs sed -i across
      all affected files.
    rejection_reason: |
      A script would be appropriate if this were a recurring operation or if there were hundreds
      of unique substitution patterns. Here, each file has a small, finite set of substitutions
      and the files need human review anyway (to ensure narrative quality, not just mechanical
      substitution). code-builder can execute each replacement directly using the Edit tool
      with full context. Script approach creates a file that must itself be tracked, tested,
      and removed — overhead not justified by the one-time nature of this change.

risks:
  - risk: |
      SKILL.md files contain the play name embedded in multiple structural locations beyond the
      name: frontmatter field — intent_path strings, evidence path templates, status path templates,
      and invocation examples. A partial update (only updating the name: field) leaves broken
      path references that will fail at runtime.
    mitigation: |
      The execution plan explicitly calls out each structural location in every SKILL.md.
      code-builder must grep within each SKILL.md for the old play name before marking that
      file done, to confirm zero residual hits.
    severity: high

  - risk: |
      The six play directories contain SKILL.md files compiled from intent.yaml by /create-play
      --build. If intent.yaml is updated but SKILL.md is NOT regenerated via /create-play --rebuild,
      the SKILL.md checksum validation will fail on future rebuilds.
    mitigation: |
      This rename is NOT a rebuild — we are editing the name: field and cross-references only,
      not the intent logic. The SKILL.md is being updated as a source file, matching the intent.yaml
      changes. No rebuild invocation is required for a name-only change. The checksum embedded in
      SKILL.md (if any) should be updated to match. Check each SKILL.md for a checksum field
      and update it if present. If unsure, omit the checksum update and note it as a follow-up.
    severity: medium

  - risk: |
      Evidence path templates inside SKILL.md (e.g., "evidence/implement-epic/{milestone_id}/")
      are used at runtime to create and read evidence files. After the rename, new runs of /implement
      will write to "evidence/implement/{milestone_id}/". Existing STM evidence directories for
      in-flight issues will still be at "evidence/implement-epic/{milestone_id}/". This creates
      a lookup failure for resume operations on any epic that was started before the rename.
    mitigation: |
      Any in-flight epic (issue with a started but not closed implement-epic run) must be completed
      BEFORE the rename is deployed via /sync-claude. Check the .garura/project/issues/ directory
      for open issues with evidence/implement-epic/ or evidence/validate-epic/ directories that
      contain incomplete runs. Document them. If none exist, risk does not apply. This is a
      one-time migration boundary.
    severity: medium

  - risk: |
      The glossary.md contains definitions that use the old play names as primary identifiers in
      the definition structure itself (e.g., "Intent Epic | ... Generated from Capability by
      specify-product"). A mechanical replacement risks producing grammatically awkward text
      (e.g., "run /specify first" where "first" is no longer the end of the sentence).
    mitigation: |
      For docs, glossary, and ADRs, code-builder should update with awareness of context — not
      just mechanical substitution. Each occurrence must be read in context to ensure the resulting
      sentence reads naturally with the new name. The changes are few enough (<100 occurrences
      per file, most files have <10) that contextual review is feasible per file.
    severity: low

  - risk: |
      The capture-learning play's SKILL.md contains a bash pre-flight check:
      'test -d "${stm_base}/${issue}/context/" || halt "No context baseline — prepare-epic was
      never run for this issue"'. The halt message will refer to the old name after a naive
      substitution of just the directory reference.
    mitigation: |
      Update the user-facing message string as well as the bash command. The halt message
      "prepare-epic was never run" → "prepare was never run". code-builder must update
      user-facing strings, not just code-level path references.
    severity: low

execution_steps:
  - step: 1
    action: |
      Verify no in-flight epic runs exist that would be broken by the evidence path rename.
      Check .garura/project/issues/ for any open issues with started but incomplete
      implement-epic or validate-epic evidence directories.
    files: []
    command_hint: |
      ls /Users/kapilahuja/cto/builder/garura/.garura/project/issues/
      # For each issue dir, check: ls {issue}/evidence/ | grep -E "implement-epic|validate-epic"
      # If any exist AND the issue is still open, complete those runs first.

  - step: 2
    action: |
      Rename the six play directories using git mv to preserve history.
      Execute in this order (no dependency between them — all can be done sequentially):
      specify-product → garura:specify
      design-exp → garura:design
      build-arch → garura:arch
      prepare-epic → garura:prepare
      implement-epic → garura:implement
      validate-epic → garura:validate
    files:
