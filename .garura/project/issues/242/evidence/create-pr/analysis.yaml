    ## Summary

    Renames 6 core pipeline plays from verbose compound names to short canonical invocation names.

    | Old Name | New Name | New Directory |
    |----------|----------|---------------|
    | `specify-product` | `specify` | `plays/specify/` |
    | `design-exp` | `design` | `plays/design/` |
    | `build-arch` | `arch` | `plays/arch/` |
    | `prepare-epic` | `prepare` | `plays/prepare/` |
    | `implement-epic` | `implement` | `plays/implement/` |
    | `validate-epic` | `validate` | `plays/validate/` |

    - 88 files updated across plays, skills, agents, memory standards/schemas/templates, and docs
    - ADR 018 added documenting the rename rationale and decision
    - All cross-references in agents, skills, and memory updated to use short names
    - Zero breaking changes to output contracts

    ## Post-merge

    Run `/sync-claude` to deploy renamed components to `~/.claude/`.

    ## Test plan

    - [ ] Verify `/specify`, `/design`, `/arch`, `/prepare`, `/implement`, `/validate` invoke correctly after sync
    - [ ] Confirm old invocation names (`/specify-product` etc.) no longer resolve
    - [ ] Run `/sync-claude` and verify deployment
