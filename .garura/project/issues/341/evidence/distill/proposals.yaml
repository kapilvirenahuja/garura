      reasoning: >
        This is an architectural pattern governing how plays are structured — specifically,
        how a play handles multi-commit output sequences. It does not fit canonical
        sub-categories (which cover individual component types: agents, skills, evals)
        because it spans the entire play execution model. "play-patterns" is proposed
        as a new sub-category of "arch" to capture cross-play structural decisions.
    artifact: "research/arch.md"
    artifact_path: ".garura/product/research/arch.md"
    section: "Experiential"
    finding: >
      garura:refactor is the first play in the framework that produces a multi-commit
      output sequence. All prior plays (algorithm, prepare, implement, etc.) produce
      at most one commit per run. The refactor play enforces a per-commit green gate:
      after each `refactor:` commit lands, the full test suite (plus type-check and
      lint) must pass before the next step starts. This gate is encoded in C5 and C11
      of intent.yaml and verified by 22 step-level evals. The commit-prefix sequencing
      (`test:` before `refactor:`) is itself a constraint (C4 / F7) when baseline
      coverage is thin.
    proposed_enrichment: >
      When a play must produce N independent commits (rather than one), use a
      per-commit green gate: after each commit, run the full test suite (plus
      type-check and lint) and fail the step — not the play — if any check is red.
      The refactor play (garura:refactor, issue #341) established this pattern.
      Each commit is one atomic move; the gate between commits prevents compounding
      failures and makes each commit independently revertable. Characterization test
      commits (`test:` prefix) precede refactor commits (`refactor:` prefix) when
      baseline coverage is thin — this ordering is enforced as a constraint, not a
      convention.
    evidence: >
      core/components/plays/refactor/SKILL.md — Step 2 SE-11 eval, C5 and C11;
      core/components/plays/refactor/reference/intent.yaml — constraints C4, C5, C11,
      failure conditions F7, F11.
