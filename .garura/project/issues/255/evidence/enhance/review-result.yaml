findings:
  - id: F1
    severity: blocking
    title: "skip_commits_yaml signal from create-commit is never consumed by commit-code"
    description: >
      create-commit Step 4 outputs skip_commits_yaml: true when evidence.record is false.
      This is intended to signal the caller (repo-orchestrator) to skip writing commits.yaml.
      However, the commit-code play Step 5 STM contract unconditionally declares commits.yaml
      as stm.output.commit_record with no guard. The play never reads skip_commits_yaml from
      the create-commit response. When evidence.record is false, commits.yaml suppression
      as documented in evidence.md and described in the PR body will NOT actually work —
      the artifact will still be written by repo-orchestrator following the STM contract.
    files_affected:
      - core/components/plays/commit-code/SKILL.md
      - core/components/skills/create-commit/SKILL.md
      - core/components/skills/create-commit/templates/commit-output.md
    recommendation: >
      Either (a) add a conditional guard in commit-code Step 5 that reads the
      create-commit response and skips the commits.yaml STM output write when
      skip_commits_yaml is true, or (b) move the suppression logic entirely into
      Step 8 of commit-code (where the other two skippable artifacts are already
      handled) and remove the skip_commits_yaml signal from create-commit entirely —
      simpler and consistent with how delivery-record and status-file are handled.

  - id: F2
    severity: informational
    title: "Pause/Resume is silently disabled when evidence.record: false"
    description: >
      evidence.md correctly documents that Pause/Resume is implicitly disabled when
      evidence.record is false because the status file is not written. However, the
      commit-code SKILL.md Pause/Resume section does not mention this — a user reading
      only the play would not know that pause/resume does not function when the flag is off.
    files_affected:
      - core/components/plays/commit-code/SKILL.md
    recommendation: >
      Add a note to the Pause/Resume section of commit-code SKILL.md: "When
      evidence.record is false (C10), the status file is not written and Pause/Resume
      is implicitly disabled for that run."

  - id: F3
    severity: informational
    title: "Sync to ~/.claude/ not confirmed in PR"
    description: >
      core/components/ was modified (6 files). There is no evidence in the PR that
      /sync-claude was run. This is standard workflow for this repo — sync is a
      post-merge manual step — but should be confirmed.
    files_affected:
      - core/components/plays/commit-code/SKILL.md
      - core/components/plays/commit-code/reference/intent.yaml
      - core/components/skills/create-commit/SKILL.md
      - core/components/skills/create-commit/templates/commit-output.md
    recommendation: >
      Run /sync-claude after merge to deploy updated components to ~/.claude/.

overall_assessment:
  ready: false
  blocking_count: 1
  review_count: 2
  informational_count: 2
  summary: >
    The intent is well-designed — a configurable flag to suppress non-essential STM
    artifacts is a clean, backward-compatible enhancement. The config key, documentation
    (evidence.md), intent constraint (C10), and Step 8 conditional guard are all
    consistent with each other. However, one blocking issue exists: the skip_commits_yaml
    signal introduced in create-commit is a dead signal — commit-code never reads it,
    so commits.yaml suppression when evidence.record is false will not work as documented.
    This must be fixed before merge.

