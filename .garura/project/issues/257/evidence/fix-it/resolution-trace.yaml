      source: null
      section: null
      authority: none
      value: |
        A scope-directory path is a bare filesystem path (e.g., tests/unit/scope_item/) used as
        a procedural run directive — it does not expose test source code, assertion text, or eval
        content. The prohibition in C5/C29 was aimed at content exposure; a directory path conveys
        only WHERE to run, not WHAT the tests assert. The distinction can be enforced by checking
        for file extensions (.ts, .py, .js, .spec.) and content keywords (expect, assert, mock)
        rather than any path string starting with 'test'.
      knowledge_gap: "No KB rule codifying the content vs. path distinction for isolation checks."
