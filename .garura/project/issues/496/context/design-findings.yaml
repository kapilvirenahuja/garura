findings:
  - id: harness-wiring-gap-1
    file: core/components/plays/review-change/SKILL.md
    category: harness
    severity: P2
    principle: >
      Harness rubric (review/harness.md): "does the change keep the play → agent → skill
      wiring intact" — a play's compiled Step contract and the agent it dispatches to must
      agree on their JSON contract; the agent is part of the same wiring the play depends on.
    committed_source: core/components/agents/change-reviewer.md (base ref d156b426, and
      unchanged on this branch — not diff-added content)
    finding: >
      SKILL.md's new Step 3 dispatches `change-reviewer` once per design-bearing category
      with a scoped input field `"category": "<cat>"` and expects a per-category output
      `design-findings-<cat>.yaml`. But `core/components/agents/change-reviewer.md` — the
      actual agent definition this play delegates to — was NOT touched by this PR. Its Job 2
      / Input Contract still describes grounding "the design-bearing categories" (plural, no
      per-category scoping input) and its Output Contract still names a single fixed path,
      `design-findings.yaml` (no `<category>` variant). The play's new fan-out contract and
      the agent's stated contract have drifted apart: nothing tells the agent to (a) restrict
      Job 2 to only the one category named in its input, or (b) write its output to the
      category-suffixed path Step 3/Step 4 now require.
    why_it_matters: >
      This is exactly the "keep the wiring intact" failure the harness playbook exists to
      catch. Left as-is, each fan-out dispatch would either re-ground every design-bearing
      category redundantly (defeating the fan-out and risking write collisions on a shared
      `design-findings.yaml`, breaking the "distinct output paths" safety condition) or the
      agent would simply ignore the unrecognized `category` field. Either way Step 4's
      per-category read (`design-findings-<category>.yaml`) would find files that were never
      written the way the play now expects.
    recommendation: >
      Update `core/components/agents/change-reviewer.md` in the same change: add a
      category-scoped input to its Input Contract (limit Job 2 to the one named category)
      and change its Output Contract to write `design-findings-<category>.yaml`. This is an
      agent-definition edit, not a play-ICE edit, so it does not require another play-editor
      recompile — but it must land before this PR's fan-out contract can actually run.
