problem_statement: >
  The play at core/components/plays/scope/ is named "scope" and exposed as /scope,
  which misleads users into thinking it is for new feature scoping only. The play
  equally handles re-scoping and extending existing FEAT-IDs via 5-bucket classification.
  Renaming it to /define makes the doorway name-neutral for both new and WIP features.
  This is a hard rename: no alias shim, no backward compatibility layer.

solution_summary: >
  Rename core/components/plays/scope/ to core/components/plays/define/ via git mv,
  update reference/intent.yaml name field from garura:scope to garura:define, run
  /create-play --rebuild define to regenerate SKILL.md with the correct frontmatter
  and intent_hash, edit docs/design/playbook-catalog.md to replace the five /scope
  slash-command occurrences with /define, add define to AM-F001 plays_inventory in
  .garura/product/scope/features.yaml, and finally run /sync-claude to wipe and
  redeploy so ~/.claude/skills/scope/ is gone and ~/.claude/skills/define/ is live.

files_to_create: []

files_to_modify:
  - path: core/components/plays/scope/
    note: >
      Entire directory renamed to core/components/plays/define/ via
      `git mv core/components/plays/scope core/components/plays/define`.
      Git tracks this as a rename, preserving history. After the mv the
      directory no longer exists at the old path.
    new_path: core/components/plays/define/

  - path: core/components/plays/define/reference/intent.yaml
    note: >
      Change `name: garura:scope` to `name: garura:define` on the name field.
      This is the ONLY manual edit to this file — all other content (intent,
      constraints, failure_conditions, scenarios) is unchanged.
      Must be done AFTER the git mv so git sees the file at its new path.
      After this edit, run /create-play --rebuild define to regenerate SKILL.md.

  - path: core/components/plays/define/SKILL.md
    note: >
      Compiled artifact — DO NOT edit directly.
      Regenerated by /create-play --rebuild define after intent.yaml is updated.
      Post-rebuild the file will contain:
        frontmatter: name: garura:define
        intent_path references: core/components/plays/define/reference/intent.yaml
        compiled_by: /create-play --build define
        intent_hash: SHA-256 of the updated intent.yaml

  - path: docs/design/playbook-catalog.md
    note: >
      Replace /scope (slash-command form) with /define on these five lines:
        Line 3:   "...into a scope/domain via `/scope`."  → "...via `/define`."
        Line 24:  "...into `/scope` when..."             → "...into `/define` when..."
        Line 340: "When `/scope` picks this up..."       → "When `/define` picks this up..."
        Line 361: "Not a replacement for `/scope`."      → "Not a replacement for `/define`."
        Line 370: "4. Run `/scope` with this..."         → "4. Run `/define` with this..."
      Direct edit permitted — free-form documentation, no rebuild cycle required.

  - path: .garura/product/scope/features.yaml
    note: >
      Add `define` to the plays_inventory list under AM-F001 (Plays).
      Current list ends at line 176 (validate-epic). Insert `define` in
      alphabetical position (between `decode` and `design-exp`, or at the
      end — alphabetical preferred for consistency with existing entries).
      Note: `scope` does not appear in this list so no removal is needed.

connections:
  - from: core/components/plays/define/reference/intent.yaml
    to: core/components/plays/define/SKILL.md
    type: compiles-to
    note: >
      intent.yaml is the source of truth. /create-play --rebuild define
      reads intent.yaml and regenerates SKILL.md. The intent_hash embedded
      in SKILL.md must match sha256 of the current intent.yaml byte-for-byte.

  - from: core/components/plays/define/SKILL.md
    to: ~/.claude/skills/define/SKILL.md
    type: deploys-to
    note: >
      /sync-claude copies core/components/plays/define/ into ~/.claude/skills/define/.
      The sync script does rm -rf ~/.claude/skills/* before copying, so the stale
      ~/.claude/skills/scope/ is automatically removed — no manual deletion needed.

  - from: docs/design/playbook-catalog.md
    to: core/components/plays/define/
    type: references
    note: >
      Five occurrences of `/scope` in playbook-catalog.md reference the play
      by its slash-command form. Free-form documentation — direct edit only.

  - from: .garura/product/scope/features.yaml
    to: core/components/plays/define/
    type: catalogs
    note: >
      AM-F001 plays_inventory is a hand-maintained dogfooded catalog of deployed
      plays. Adding `define` reflects the renamed play in the product feature record.

  - from: core/components/plays/arch/SKILL.md
    to: core/components/plays/define/
    type: no-change-needed
    note: >
      arch/SKILL.md contains "scope-stage" which refers to the /specify pipeline's
      scope artifact stage (product/scope/), NOT the /scope play. Verified: neither
      arch/reference/intent.yaml nor arch/SKILL.md names garura:scope or /scope as
      a play invocation. Leave completely untouched.

tasks:
  - id: T1
    title: "Rename directory via git mv"
    description: >
      Run: git mv core/components/plays/scope core/components/plays/define
      This must be the FIRST operation so git tracks the rename in history
      (not as delete+add). Verify with `git status` that the rename is staged.
    files:
      - core/components/plays/scope/ → core/components/plays/define/
    exit_gate: >
      `git status` shows `renamed: core/components/plays/scope -> core/components/plays/define`
      and core/components/plays/scope/ no longer exists on disk.

  - id: T2
    title: "Update intent.yaml name field"
    description: >
      Edit core/components/plays/define/reference/intent.yaml.
      Change the name field from `name: garura:scope` to `name: garura:define`.
      No other content in the file changes.
    depends_on: [T1]
    files:
      - core/components/plays/define/reference/intent.yaml
    exit_gate: >
      `grep "^name:" core/components/plays/define/reference/intent.yaml`
      returns exactly `name: garura:define`.

  - id: T3
    title: "Rebuild SKILL.md via /create-play --rebuild define"
    description: >
      Run: /create-play --rebuild define
      This regenerates core/components/plays/define/SKILL.md with updated
      frontmatter (name: garura:define), refreshed intent_path references
      pointing to core/components/plays/define/reference/intent.yaml,
      compiled_by: /create-play --build define, and a fresh intent_hash.
      Do NOT manually edit SKILL.md.
    depends_on: [T2]
    files:
      - core/components/plays/define/SKILL.md
    exit_gate: >
      `grep "^name:" core/components/plays/define/SKILL.md` returns `name: garura:define`.
      `grep "garura:scope" core/components/plays/define/SKILL.md` returns 0 lines.
      `grep "intent_path" core/components/plays/define/SKILL.md` shows paths containing `define/`.

  - id: T4
    title: "Run lint-components on the renamed play"
    description: >
      Run lint-components skill against core/components/plays/define/ to verify
      structural integrity after rebuild. The current scope play lints with 0 errors
      and 0 warnings — the renamed play must achieve the same baseline.
    depends_on: [T3]
    files: []
    exit_gate: >
      lint-components reports 0 errors and 0 warnings for core/components/plays/define/.

  - id: T5
    title: "Update docs/design/playbook-catalog.md"
    description: >
      Replace the five occurrences of `/scope` (slash-command form) with `/define`:
        Line 3:   "...into a scope/domain via `/scope`."  → "...via `/define`."
        Line 24:  "...into `/scope` when..."             → "...into `/define` when..."
        Line 340: "When `/scope` picks this up..."       → "When `/define` picks this up..."
        Line 361: "Not a replacement for `/scope`."      → "Not a replacement for `/define`."
        Line 370: "4. Run `/scope` with this..."         → "4. Run `/define` with this..."
      Direct edit — no rebuild required.
    depends_on: [T1]
    files:
      - docs/design/playbook-catalog.md
    exit_gate: >
      `grep -n '/scope' docs/design/playbook-catalog.md` returns 0 lines.
      `grep -n '/define' docs/design/playbook-catalog.md` returns exactly 5 lines.

  - id: T6
    title: "Add define to AM-F001 plays_inventory in features.yaml"
    description: >
      Edit .garura/product/scope/features.yaml.
      Locate AM-F001 plays_inventory (currently at line 155).
      Add `- define` in alphabetical order within the list
      (between `decode` if present, or after `distill` — insert before `design-exp`
      since d-e-f comes before d-e-s; verify surrounding entries at insertion time).
      No entry for `scope` exists in this list — this is an addition only.
    depends_on: [T1]
    files:
      - .garura/product/scope/features.yaml
    exit_gate: >
      `grep 'define' .garura/product/scope/features.yaml` returns a line
      matching `- define` within the plays_inventory block under AM-F001.

  - id: T7
    title: "Run /sync-claude to deploy renamed play globally"
    description: >
      Run: /sync-claude
      The sync script does rm -rf ~/.claude/skills/* before copying, which automatically
      removes the stale ~/.claude/skills/scope/. It then copies core/components/plays/define/
      into ~/.claude/skills/define/. This is the LAST step — all source edits and
      the rebuild must be complete before sync runs.
    depends_on: [T3, T4, T5, T6]
    files:
      - ~/.claude/skills/define/SKILL.md (created by sync)
    exit_gate: >
      ~/.claude/skills/scope/ does not exist.
      ~/.claude/skills/define/SKILL.md exists with `name: garura:define` in frontmatter.

evals:
  - id: E1
    description: >
      After implementation, the directory core/components/plays/scope/ does not exist.
    check: >
      test ! -d core/components/plays/scope/ && echo PASS || echo FAIL
    expected: PASS

  - id: E2
    description: >
      After implementation, the directory core/components/plays/define/ exists.
    check: >
      test -d core/components/plays/define/ && echo PASS || echo FAIL
    expected: PASS

  - id: E3
    description: >
      After implementation, core/components/plays/define/reference/intent.yaml
      exists and its name field equals garura:define.
    check: >
      grep -q "^name: garura:define" core/components/plays/define/reference/intent.yaml && echo PASS || echo FAIL
    expected: PASS

  - id: E4
    description: >
      After implementation, core/components/plays/define/SKILL.md exists and
      its frontmatter name field equals garura:define.
    check: >
      grep -q "^name: garura:define" core/components/plays/define/SKILL.md && echo PASS || echo FAIL
    expected: PASS

  - id: E5
    description: >
      After implementation, garura:scope does not appear anywhere in
      core/components/plays/define/ (no stale skill ID).
    check: >
      grep -r "garura:scope" core/components/plays/define/ | wc -l | grep -q "^0$" && echo PASS || echo FAIL
    expected: PASS

  - id: E6
    description: >
      After implementation, garura:scope does not appear anywhere in
      core/components/ (no stale references in any play or skill source).
    check: >
      grep -r "garura:scope" core/components/ | wc -l | grep -q "^0$" && echo PASS || echo FAIL
    expected: PASS

  - id: E7
    description: >
      After implementation, core/components/plays/define/SKILL.md contains no
      intent_path references pointing to the old scope/ path.
    check: >
      grep "plays/scope/" core/components/plays/define/SKILL.md | wc -l | grep -q "^0$" && echo PASS || echo FAIL
    expected: PASS

  - id: E8
    description: >
      After implementation, grep for /scope as a slash command in
      docs/design/playbook-catalog.md returns 0 lines.
    check: >
      grep -n '`/scope`' docs/design/playbook-catalog.md | wc -l | grep -q "^0$" && echo PASS || echo FAIL
    expected: PASS

  - id: E9
    description: >
      After implementation, /define appears exactly 5 times as a slash command
      in docs/design/playbook-catalog.md (replacing the 5 former /scope occurrences).
    check: >
      count=$(grep -c '`/define`' docs/design/playbook-catalog.md); [ "$count" -eq 5 ] && echo PASS || echo "FAIL (found $count)"
    expected: PASS

  - id: E10
    description: >
      After implementation, .garura/product/scope/features.yaml AM-F001
      plays_inventory contains an entry equal to define.
    check: >
      grep -A 30 "plays_inventory:" .garura/product/scope/features.yaml | grep -q "^\s*- define$" && echo PASS || echo FAIL
    expected: PASS

  - id: E11
    description: >
      After implementation and /sync-claude, ~/.claude/skills/scope/ does not exist.
    check: >
      test ! -d ~/.claude/skills/scope/ && echo PASS || echo FAIL
    expected: PASS
    note: Requires /sync-claude to have run (T7). Tester may invoke /sync-claude before this check.

  - id: E12
    description: >
      After implementation and /sync-claude, ~/.claude/skills/define/SKILL.md
      exists with name: garura:define in frontmatter.
    check: >
      grep -q "^name: garura:define" ~/.claude/skills/define/SKILL.md && echo PASS || echo FAIL
    expected: PASS
    note: Requires /sync-claude to have run (T7). Tester may invoke /sync-claude before this check.

  - id: E13
    description: >
      After implementation, lint-components on core/components/plays/define/
      reports 0 errors and 0 warnings.
    check: >
      Run the lint-components skill against core/components/plays/define/ and
      confirm the output shows zero errors and zero warnings.
    expected: 0 errors, 0 warnings

  - id: E14
    description: >
      After implementation, git log shows the scope → define rename as a
      tracked rename (not a delete+add), preserving history.
    check: >
      git log --follow --oneline core/components/plays/define/reference/intent.yaml | wc -l | grep -vq "^0$" && echo PASS || echo FAIL
    expected: PASS

risks:
  - id: R1
    description: >
      SKILL.md intent_hash drift: if /create-play --rebuild define is skipped,
      or intent.yaml is edited AFTER the rebuild, the compiled intent_hash in
      SKILL.md will not match the sha256 of the current intent.yaml. The G9
      gap check in /create-play --review will detect this, but if the reviewer
      is not run, the drift is invisible until the play misbehaves.
    type: technical
    action: eval-driven
    mitigation: >
      Task ordering enforces intent.yaml edit (T2) before rebuild (T3).
      E5, E6, E7 evals catch stale garura:scope occurrences in SKILL.md.
      Post-rebuild lint (T4, E13) catches structural violations.
      Implementer must not edit SKILL.md directly after T3.
    ltm_reference: ~/.garura/core/memory/standards/rules/
    generated_evals: [E5, E6, E7, E13]

  - id: R2
    description: >
      Stale deployed skill: if /sync-claude is run before the rename completes
      in core/components/plays/ (e.g., if only intent.yaml is edited but the
      git mv has not yet happened), the sync copies a scope/ directory with
      a garura:define frontmatter — creating an inconsistency between
      directory name and skill ID at ~/.claude/skills/.
    type: technical
    action: eval-driven
    mitigation: >
      Task ordering requires T1 (git mv) to complete before T3 (rebuild) and
      T7 (sync). /sync-claude is constrained to T7 as the final step,
      blocked on T3, T4, T5, T6. E11 and E12 verify the deployed state.
    ltm_reference: null
    generated_evals: [E11, E12]

  - id: R3
    description: >
      Stale documentation reference: docs/design/playbook-catalog.md is
      free-form prose with no lint or automated drift detection. If T5 is
      omitted or incomplete, /scope references persist as broken documentation.
      There is no compilation step to catch this.
    type: technical
    action: eval-driven
    mitigation: >
      E8 and E9 verify exact count: 0 occurrences of `/scope` and exactly 5
      occurrences of `/define`. These are black-box grep checks runnable by
      tester without implementation context.
    ltm_reference: null
    generated_evals: [E8, E9]

  - id: R4
    description: >
      AM-F001 plays_inventory omission: features.yaml is hand-maintained.
      If T6 is skipped, the dogfooded catalog does not reflect the renamed play.
      No automated check outside this eval spec will catch the omission.
    type: business
    action: eval-driven
    mitigation: >
      E10 checks for the presence of `- define` within the plays_inventory
      block. The grep anchors to the plays_inventory: header and scans 30 lines.
    ltm_reference: null
    generated_evals: [E10]

  - id: R5
    description: >
      Incorrect "scope-stage" modification: arch/SKILL.md contains "scope-stage"
      which refers to the /specify pipeline's scope artifact stage, not the /scope
      play. An implementer who pattern-matches on "scope" could incorrectly modify
      this line, breaking arch/SKILL.md's prose description.
    type: technical
    action: monitor-only
    mitigation: >
      understanding.md explicitly documents this finding (Section 2.3, Section 2.4).
      Task descriptions do not mention arch/ — only the three specific file targets.
      The approach explicitly labels this connection as no-change-needed.
      No grep eval is added for arch/SKILL.md to avoid false positives.
    ltm_reference: null
    generated_evals: []

  - id: R6
    description: >
      git mv sequencing: if the implementer edits intent.yaml before running
      git mv, git will see the file deleted at scope/ and created at define/
      (as two separate operations), losing history traceability via --follow.
      E14 checks that --follow shows history, but git's rename detection is
      heuristic and may fail if file content changes significantly alongside
      the rename.
    type: architectural
    action: eval-driven
    mitigation: >
      T1 (git mv) is explicitly ordered first and its exit_gate requires
      `git status` to show `renamed:` — not `deleted:` + `new file:`.
      T2 (intent.yaml edit) is blocked on T1 completing. E14 verifies
      --follow history traversal works post-commit.
    ltm_reference: null
    generated_evals: [E14]

alternatives_considered:
  - id: A1
    title: "Soft rename with /scope alias shim"
    description: >
      Keep core/components/plays/scope/ in place and create a new
      core/components/plays/define/ that wraps or forwards to scope.
      Users invoking /scope continue to work; /define is the new canonical name.
    rejection_reason: >
      Explicitly rejected by user in discovery Q1/A1: "Hard rename. Skill name
      should be garura:define (not garura:scope)." An alias shim adds a
      maintenance surface (two plays to keep in sync), confuses the plays
      inventory catalog, and contradicts the stated goal of eliminating the
      misleading /scope doorway entirely.

  - id: A2
    title: "Rename and also update other plays' SKILL.md referencing scope"
    description: >
      In addition to the files identified, proactively edit all SKILL.md files
      in other plays (prepare, arch, decode, specify) to replace any "scope"
      occurrences, then rebuild all affected plays.
    rejection_reason: >
      The grep survey in understanding.md (Section 2.3) confirmed that no other
      play's SKILL.md or intent.yaml references garura:scope or /scope as a play
      invocation. All "scope" occurrences in other plays are product-directory
      path literals (product/scope/...) that refer to capability scope, not the
      play name — and these are explicitly locked untouched per decision A5.
      Rebuilding other plays is unnecessary churn and risks introducing
      unintended changes through the compiler.
