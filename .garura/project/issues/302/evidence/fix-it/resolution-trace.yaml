    value: >
      ARCH-04: Business logic should not be embedded in route handlers or controllers.
      ARCH-05: A service layer should mediate between API and data layers. By analogy,
      agent orchestration logic (context gathering) should not embed artifact production
      (the domain of skills). This provides a supporting principle for the fix — the
      violation is structurally equivalent to a fat controller (agent doing skill's work).
      The analogy is non-exact; this entry remains advisory.

