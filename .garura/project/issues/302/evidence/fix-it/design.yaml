based_on_rca: ".garura/project/issues/302/evidence/fix-it/rca.yaml"

strategy: >
  Two targeted prose edits — no structural changes, no rebuild required.
  (1) tech-designer.md line 70: replace the ambiguous step-5 text with two mode-aware
  sentences that explicitly split JSON-contract mode (always use the skill pool) from
  direct-invocation mode (perform analysis directly). This eliminates the escape hatch
  without changing behavior for non-play invocations.
  (2) fix-it SKILL.md lines 197-205: insert a "Skill delegation" paragraph immediately
  after the opening agent-instruction sentence, naming all three skills by their exact
  identifiers (draft-rca, draft-fix-design, author-regression-test) and mapping each
  to its output artifact. The existing numbered list of tasks is preserved unchanged —
  this is an additive insertion, not a rewrite.
  Both edits are confined to agent-instruction prose; neither touches constraints,
  failure conditions, scenarios, or schema definitions. No re-compile is needed.

alternatives_considered:
  - option: >
      Full re-compile of fix-it via `/create-play --build fix-it` after updating intent.yaml
    rejection_reason: >
      intent.yaml does not define which skills tech-designer should invoke — that is an
      agent-level concern, not an intent concern. A re-compile would rebuild all prose from
      intent.yaml, potentially overwriting unrelated improvements made since the last compile
      (compiled_at: 2026-04-19T14:42:48Z). Scope exceeds the minimal fix. The CLAUDE.md rule
      "Play Pipeline Rules" explicitly states: "else we can edit the files directly" when
      changes are outside intent.yaml.
  - option: >
      Add a mandatory skill-dispatch guard in the Skill Pool section of tech-designer.md
      (lines 267-283) instead of fixing line 70
    rejection_reason: >
      The Skill Pool section already has the anti-inline guard at line 283. The problem is
      that step 5 (line 70) is read BEFORE the agent reaches the Skill Pool section — the
      escape hatch fires early in Intent Recognition. Patching only the Skill Pool section
      leaves the contradiction in place; a model can still satisfy step 5's escape hatch and
      never reach line 283. The fix must be at the point of contradiction (line 70).
  - option: >
      Delete the "direct invocation" branch from tech-designer.md entirely, making all
      invocations skill-delegated
    rejection_reason: >
      Direct invocations (without a JSON contract) are a legitimate and documented use case
      — tech-designer is used interactively for quick analyses. Deleting the direct path
      would break non-play workflows. The minimal fix is to add a mode guard (contract vs.
      no-contract), not to remove the direct path.

affected_files:
  - path: core/components/agents/tech-designer.md
    role: Agent definition governing tech-designer behavior across all plays
    action: modify
    change: >
      Line 70 — replace:
        "**Call skills** from your available skill pool. For RCA or feature analysis
        (direct invocation), perform analysis directly using your tools."
      with:
        "**Call skills** from your available skill pool. When invoked via JSON contract,
        ALWAYS delegate artifact production to the matching skill — do NOT perform analysis
        directly or author artifacts inline. When invoked directly (no JSON contract),
        perform analysis directly using your tools."
    risk: low
    risk_rationale: >
      Prose-only change in a single numbered list item. No schema, no contract format,
      no other section affected. Behavior for non-contract invocations is unchanged.

  - path: core/components/plays/fix-it/SKILL.md
    role: Compiled play artifact governing fix-it Step 3 agent instruction
    action: modify
    change: >
      After line 197 (the opening "Agent reads intent.yaml — applies constraints..." sentence),
      insert a new paragraph:
        "**Skill delegation (mandatory):** Invoke the three fix-it skills in order via the
        Skill tool — do NOT author these artifacts inline:
        1. `draft-rca` → produces `rca.yaml` + `resolution-trace.yaml` (when ltm_context present)
        2. `draft-fix-design` → produces `design.yaml`
        3. `author-regression-test` → produces `regression-test.yaml` (red-verified)"
      The existing numbered list (lines 199-203) and remaining prose are preserved as-is.
    risk: low
    risk_rationale: >
      Additive insertion in the agent-instruction prose block. No constraints, failure
      conditions, scenarios, or eval criteria are modified. The SKILL.md header states
      "Do NOT edit this file manually" but this refers to structural/workflow changes;
      a prose clarification to the agent instruction for a post-compile skill addition
      is explicitly covered by the CLAUDE.md play pipeline rule ("else we can edit the
      files directly").

