resolution_trace:
  - domain: "template_directory_structure"
    question: "Does formats/ still exist or was it migrated?"
    resolved_from: "codebase"
    finding: |
      formats/ directory does not exist anywhere. It was fully replaced by
      standards/templates/ during issue #208 cleanup. Confirmed via:
      find core/components/memory/ — no formats/ directory found.

  - domain: "existing_templates"
    question: "What template files already exist in standards/templates/?"
    resolved_from: "codebase"
    finding: |
      Six files exist: approval-prompt.md, checkpoint.md, evidence-file.md,
      github-issue.md, issue-comment-rca-approved.md, knowledge-file.md.
      All deployed to ~/.garura/core/memory/standards/templates/ matching source.

  - domain: "missing_templates"
    question: "Which of the nine proposed surfaces from issue #209 are still missing?"
    resolved_from: "codebase"
    finding: |
      Four confirmed missing and creatable: commit-message.md, pr-body.md,
      pr-review-comment.md, delivery-report.md.
      One deferred (no consumer): issue-list.md.
      One re-routed to schemas/: pr-findings.yaml (YAML schema contract).

  - domain: "inline_format_locations"
    question: "Where are the missing format shapes currently inlined?"
    resolved_from: "codebase"
    finding: |
      - PR body shape: skills/submit-pr/SKILL.md lines 79-109 (## Summary through footer)
      - PR review comment shape: plays/review-pr/SKILL.md lines 330-356
      - Commit message shape: standards/rules/commits.md Part 2
      - Delivery report: referenced by name in approval-prompt.md and evidence-file.md
        but no authoritative inline; each play emits its own ad-hoc shape

  - domain: "pr_findings_categorization"
    question: "Does pr-findings.yaml belong in templates/ or schemas/?"
    resolved_from: "core"
    finding: |
      templates/_index.md rule: "A file does NOT belong here if it is a YAML schema
      contract (that's schemas/)." pr-findings.yaml is a typed schema with field
      constraints and rejection rules. Routes to standards/schemas/, consistent with
      intent.yaml, intent-epic.yaml, mvp-recommendation.yaml already there.
      Source: core/components/memory/standards/templates/_index.md

  - domain: "issue_list_consumer"
    question: "Does any play render a user-facing issue list that would consume issue-list.md?"
    resolved_from: "codebase"
    finding: |
      Exhaustive grep across all plays and skills for 'issue list', 'render.*issue',
      'gh issue list' for rendering purposes found no consumer. gh issue list is used
      only for existence checks (commit-code pre-flight line 51). templates/_index.md
      rule requires templates to be "instantiated by at least one skill or play."
      issue-list.md deferred with documented rationale.

  - domain: "caller_update_strategy"
    question: "Should SKILL.md files be direct-edited or rebaked via intent.yaml?"
    resolved_from: "core"
    finding: |
      MEMORY.md rule: never edit SKILL.md directly without rebake via intent.yaml.
      However, ship/#274 and enhance/#240 precedents establish direct-edit-with-deviation-note
      as acceptable for minor corrections when Skill tool is unavailable or change is
      strictly a pointer substitution. This change is format pointer only — no logic,
      constraint, or scenario change. Direct-edit chosen; deviation notes required.
      Source: MEMORY.md (feedback_recipe_changes_via_rebake.md pattern and known deviations)

  - domain: "stale_path_reference"
    question: "Are there any remaining references to the retired formats/ path?"
    resolved_from: "codebase"
    finding: |
      One stale reference found: core/components/memory/standards/templates/checkpoint.md
      line 74 reads `formats/approval-prompt.md`. The formats/ directory no longer exists.
      Must be updated to `templates/approval-prompt.md`.
