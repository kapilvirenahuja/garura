# Fix Design — Issue #236
# capture-learning play is architecturally disconnected from the epic trinity data flow
# Authored by: tech-designer (fix-it play, design step)
# Date: 2026-04-16

design:
  type: "feature_analysis"
  issue: 236
  summary: >
    Rewrite capture-learning's extraction layer to consume trinity-produced evidence
    (status-reports, milestone-verdicts, e2e-results, judge-reports, arbiter-verdicts,
    fix-reports, rca/design artifacts from fix-it) and enrich existing product artifacts
    in-place rather than creating standalone knowledge files. Three enrichment dimensions:
    domain (→ product/research/ Experiential sections), technology (→ product/architecture/
    implementation_feedback), and PM retrospective (→ product/scope/epics/ post_implementation).
    Archival phase is correct and retained unchanged.

  approach:
    strategy: >
      Enrichment-in-place model: the capture-learning play extracts learned signals from trinity
      evidence and writes back into existing product artifacts using three dedicated sections.
      No new standalone files are created in global LTM. The knowledge-extractor agent is
      fundamentally rewritten around the trinity evidence format. The intent.yaml is rewritten
      to define the new constraints. The compiled SKILL.md is rebuilt from the updated intent.
      Two schema additions (intent-epic.yaml post_implementation, architecture implementation_feedback)
      provide the write targets that do not yet exist.
    
    alternatives_considered:
      - approach: >
          Keep creating standalone knowledge files but redirect write target to product LTM
          (.meridian/product/knowledge/)
        reason_rejected: >
          Product LTM is stage-organized per ADR 017 (research/, scope/, architecture/) — there
          is no knowledge/ subdirectory, and adding one would violate the folder whitelist. More
          importantly, standalone files cannot enrich the KB Experiential sections that kb-extension.md
          defines as the designated write target for capture-learning. The problem is not just the
          path — it is the entire write model (create vs enrich).

      - approach: >
          Create a separate capture-learning-trinity play and preserve the existing play for
          legacy signal sources (resolution traces from design plays)
        reason_rejected: >
          Two plays for the same workflow (archive + extract + enrich) creates split maintenance
          burden and user confusion about which to invoke. The existing play's extraction logic
          is architecturally broken (not just misconfigured) — it cannot be patched to handle
          trinity signals without effectively rewriting the same components. A single unified
          play that handles all signal sources (trinity evidence + resolution traces when they
          exist) is cleaner. Legacy resolution-trace support can be retained as a secondary
          signal path in the rewritten play.

      - approach: >
          Fix the trinity plays (implement-epic, validate-epic) to produce resolution traces
          by removing their LTM access prohibition
        reason_rejected: >
          The LTM isolation model in implement-epic (C27) and validate-epic (C15) is a
          deliberate architectural invariant that prevents context contamination during the
          TDD cycle — it is not a bug. Removing it would break the eval-generator/judge
          isolation model that makes the trinity's quality guarantees possible. The correct
          fix is on the capture-learning side: read what the trinity actually produces.

  analysis:
    affected_files:
      - path: "core/components/plays/capture-learning/reference/intent.yaml"
        role: "Defines constraints, failure conditions, and scenarios for the compiled play"
        change_needed: >
          Full rewrite. Replace C12 (resolution-trace as primary signal) with three
          extraction dimensions. Add new constraints for trinity evidence sources, enrichment
          model, and in-place write targets. Update failure conditions to match new model.
          Update scenarios to reflect enrichment outcomes rather than standalone file creation.

      - path: "core/components/plays/capture-learning/SKILL.md"
        role: "Compiled play — Step 3 artifact scan logic and Step 4 knowledge-extractor contract"
        change_needed: >
          Rebuild from updated intent.yaml via /create-play --build. Do NOT edit directly —
          this is a compiled artifact per its own header. The Step 3 artifact scan must be
          updated to locate trinity evidence (status-report.yaml, milestone-verdict.yaml,
          e2e-results.yaml, judge-report*.yaml, arbiter-verdict*.yaml) and the knowledge-extractor
          contract must switch to enrichment mode.

      - path: "core/components/agents/knowledge-extractor.md"
        role: "Domain agent: extraction heuristics, synthesis, deduplication, write logic"
        change_needed: >
          Fundamental rewrite of EXTRACT mode and WRITE mode. EXTRACT: add trinity artifact
          heuristics (status-report, milestone-verdict, e2e-results, arbiter-verdict) with
          three-dimensional extraction. WRITE: replace file-creation logic with in-place
          enrichment logic targeting three write targets (research/Experiential, architecture/
          implementation_feedback, scope/epics/post_implementation). Deduplication: update
          to check existing product artifact sections, not a non-existent knowledge/ directory.

      - path: "core/components/memory/standards/schemas/intent-epic.yaml"
        role: "Canonical schema for intent epics — defines all required and optional fields"
        change_needed: >
          Add optional post_implementation section after kb_source block. This section
          captures outcomes after implement-epic and validate-epic complete. The validate-intent-epics
          skill must recognize post_implementation as an optional field (no violation if absent,
          no violation if present). No existing validation rules are relaxed.

      - path: "core/components/memory/standards/schemas/architecture-feedback.md"
        role: "NEW — defines the implementation_feedback section schema for architecture artifacts"
        change_needed: >
          Create new schema document defining the structure of the implementation_feedback
          section added to product/architecture/ YAML artifacts. This schema is referenced
          by knowledge-extractor WRITE mode when enriching architecture artifacts.

    dependencies:
      - from: "capture-learning/SKILL.md"
        to: "capture-learning/reference/intent.yaml"
        type: "compiled-from"
        note: "SKILL.md must be rebuilt after intent.yaml is updated"

      - from: "knowledge-extractor.md WRITE mode"
        to: "intent-epic.yaml schema"
        type: "writes-to"
        note: "WRITE mode must know post_implementation field structure before writing"

      - from: "knowledge-extractor.md WRITE mode"
        to: "architecture-feedback.md schema"
        type: "writes-to"
        note: "WRITE mode must know implementation_feedback structure before writing to architecture artifacts"

      - from: "capture-learning/SKILL.md Step 3"
        to: "implement-epic/validate-epic evidence structure"
        type: "reads-from"
        note: "Step 3 artifact scan must match actual trinity output paths"

    risks:
      - risk: >
          SKILL.md rebuild may introduce regressions in the archival phase (Steps 1-2) which
          is correct and should be preserved verbatim
        mitigation: >
          Explicitly mark archival constraints (C1-C4) as unchanged in intent.yaml. During
          /create-play --build, verify archival steps match current compiled output before
          accepting the new SKILL.md.
        severity: "medium"

      - risk: >
          In-place enrichment of existing product artifacts (.meridian/product/scope/epics/*.yaml)
          may fail if the epic file was not generated by the current pipeline (grandfathered format)
        mitigation: >
          Add a format check to knowledge-extractor WRITE mode: if the target epic file lacks
          the post_implementation key, append it with a bootstrap value rather than failing.
          Mirror the grandfathering approach defined in knowledge-file.md.
        severity: "medium"

      - risk: >
          If validate-intent-epics skill is not updated to recognize post_implementation as
          optional, any epic file that receives enrichment will fail validation on the next
          specify-product run
        mitigation: >
          Add post_implementation to the validation rules section of intent-epic.yaml as an
          explicitly optional field. Document in the validate-intent-epics skill that this
          field is write-only (written by capture-learning, never by specify-product).
        severity: "high"

      - risk: >
          knowledge-extractor WRITE mode reading from .meridian/product/architecture/ may fail
          if a product has not run build-arch and has no architecture artifacts
        mitigation: >
          Add pre-write existence check: if product/architecture/ is empty or missing, skip
          the architecture enrichment dimension and log in evidence. Enrichment is always
          best-effort — missing target artifacts are a warning, not a hard failure.
        severity: "low"

      - risk: >
          Trinity evidence paths are milestone-centric ({stm_base}/{issue}/milestones/{milestone_id}/)
          while capture-learning scans a flat evidence/ directory. Step 3 may miss milestone-level artifacts
        mitigation: >
          Update Step 3 artifact scan to traverse both evidence/ and milestones/**/ within the
          archived issue directory. The scan is already done inline in the play (not delegated to
          knowledge-extractor) so this is a change to the bash find command in SKILL.md.
        severity: "medium"

    patterns_found:
      - pattern: "Enrichment-in-place vs standalone file creation"
        location: "core/components/memory/standards/templates/knowledge-file.md — Pattern Template vs Generic Template"
        reuse: >
          kb-extension.md's Experiential section is the model for in-place enrichment.
          It defines a structured append-only section that grows over time. Apply the same
          model for post_implementation in intent-epic and implementation_feedback in architecture.

      - pattern: "Optional field with bootstrap default"
        location: "core/components/memory/standards/rules/kb-extension.md lines 89-105"
        reuse: >
          Experiential section starts at bootstrap values (Usage count: 0, Last promoted: never).
          Apply the same pattern to post_implementation and implementation_feedback — new fields
          are optional in schema, bootstrap-initialized on first write, append-only thereafter.

      - pattern: "Artifact scan breadth"
        location: "capture-learning/SKILL.md Step 3 bash find command"
        reuse: >
          Current pattern searches for specific filenames in evidence/. Extend to also search
          milestones/**/ for trinity-produced artifacts. Use the same bash find with -o (OR)
          to add new filename patterns.

  steps:
    - step: 1
      description: "Add post_implementation optional section to intent-epic.yaml schema"
      files:
        - path: "core/components/memory/standards/schemas/intent-epic.yaml"
          action: "modify"
          details: >
            After the kb_source block, add:
            
            post_implementation:                   # OPTIONAL. Written by capture-learning after
              verdict: <enum>                      #   implement-epic + validate-epic complete.
                                                   #   ACCEPTED | REJECTED | PARTIAL | not_run
              milestones_completed: <integer>      # Count of milestones that reached ACCEPT
              milestones_total: <integer>          # Total milestones planned
              scenarios_passed: <integer>          # Count of scenarios that passed validation
              scenarios_total: <integer>           # Total scenarios in scenario_gate
              architectural_decisions_validated:   # Which architecture choices proved correct
                - decision: <string>
                  outcome: validated | invalidated | inconclusive
                  note: <string>
              failure_patterns:                    # Recurring failure types across milestones
                - pattern: <string>
                  frequency: <integer>
                  mitigation_applied: <string>
              learnings:                           # Free-form lessons for future epic planning
                - <string>
              captured_at: <ISO-8601>              # When capture-learning wrote this section
            
            Add to validation rules comment: post_implementation is OPTIONAL and NEVER
            validated as mandatory. validate-intent-epics must not flag its absence.
            Write-only by capture-learning — never written by specify-product pipeline.
      expected_outcome: "Schema accepts post_implementation without validation errors"
      self_test: "Grep intent-epic.yaml for post_implementation — section present and documented as optional"

    - step: 2
      description: "Create architecture-feedback.md schema document"
      files:
        - path: "core/components/memory/standards/schemas/architecture-feedback.md"
          action: "create"
          details: >
            New schema document defining implementation_feedback section structure for
            product/architecture/ YAML artifacts. Fields:
            - decisions_validated: list of {decision_id, decision_summary, verdict: validated|invalidated|inconclusive, evidence_ref}
            - performance_observations: list of {aspect, observed, threshold, met: true|false}
            - unexpected_complexity: list of {component, description, impact: low|medium|high}
            - recommended_revisions: list of {section, current_value, recommended_value, rationale}
            - captured_at: ISO-8601
            - source_issue: issue number that produced this feedback
      expected_outcome: "Schema document exists and is referenceable by knowledge-extractor"
      self_test: "Read file — all fields present with types and descriptions"

    - step: 3
      description: "Rewrite capture-learning/reference/intent.yaml"
      files:
        - path: "core/components/plays/capture-learning/reference/intent.yaml"
          action: "modify"
          details: >
            Archival constraints C1-C4 and failure conditions F1-F5 are UNCHANGED.
            
            Replace extraction constraints C5-C15 with:
            
            C5 (retain): STM artifacts are read-only during extraction.
            
            C6 (replace): Three extraction dimensions:
              - Domain: extract capability outcomes → enrich Experiential section in
                .meridian/product/research/{domain-file}.md KB copy
              - Technology: extract architectural decision validation → append
                implementation_feedback section to .meridian/product/architecture/ artifacts
              - PM retrospective: extract epic-level outcomes → write post_implementation
                section to .meridian/product/scope/epics/{epic-id}.yaml
            
            C7 (replace): Signal sources in descending priority:
              - milestone-verdict.yaml (at {stm_base}/{issue}/milestones/{id}/milestone-verdict.yaml)
                → ACCEPT/REJECT verdict, which scenarios passed/failed
              - status-report.yaml (at {stm_base}/{issue}/milestones/{id}/status-report.yaml)
                → behavioral test failures mapped to contract IDs
              - e2e-results.yaml (in evidence/) → system-level verification outcomes
              - judge-report*.yaml (from validate-epic or arbiter) → eval failure patterns
              - arbiter-verdict*.yaml → fault attribution (impl_wrong/spec_ambiguous/test_wrong)
              - rca.yaml + design.yaml (from fix-it) → bug patterns, fix strategies
              - resolution-trace.yaml (legacy) → LLM-fallback decisions (rare, from design plays)
            
            C8 (new): Enrichment is in-place — write to existing artifacts only. No new
            standalone files created in global ~/.meridian/core/memory/.
            
            C9 (new): Enrichment targets are derived from the epic's kb_source.capability field
            in the intent-epic. knowledge-extractor reads the epic to find which domain
            capability this issue implemented, then updates the corresponding KB copy.
            
            C10 (retain modified): Human approval gate retained. Candidates staged in STM
            as enrichment proposals (not file creation proposals) before any write.
            
            C11 (new): If product/architecture/ artifacts are absent (build-arch not run),
            architecture dimension enrichment is skipped with warning — not a hard failure.
            
            C12 (new): If product/scope/epics/ is absent, PM dimension is skipped — not fatal.
            
            Archival constraints remain: archival proceeds first, extraction reads from archive.
      expected_outcome: "intent.yaml captures all three extraction dimensions with correct signal sources"
      self_test: "Grep intent.yaml for milestone-verdict and post_implementation — both present in constraints"

    - step: 4
      description: "Rewrite knowledge-extractor agent"
      files:
        - path: "core/components/agents/knowledge-extractor.md"
          action: "modify"
          details: >
            EXTRACT mode — replace single-dimension extraction with three-dimensional extraction:
            
            Dimension 1 (Domain):
              Read milestone-verdict.yaml files. Extract: which scenarios passed/failed, overall
              verdict, milestone count. Map to the epic's kb_source.capability. Produce enrichment
              for the Experiential section (usage count increment, scenarios observed entries,
              common mistakes from failure patterns).
            
            Dimension 2 (Technology):
              Read status-report.yaml and arbiter-verdict artifacts. Extract: which contract IDs
              failed repeatedly, fault attribution decisions. Map to architecture decisions in
              product/architecture/. Produce implementation_feedback proposals.
            
            Dimension 3 (PM Retrospective):
              Aggregate across all milestones: total scenarios, pass rate, failure patterns.
              Produce post_implementation section values.
            
            Secondary (legacy): retain resolution-trace.yaml extraction as a fourth input —
            when present, resolution traces produce pattern candidates as before. They are NOT
            the primary signal, but should not be discarded when they exist.
            
            WRITE mode — replace file-creation with in-place enrichment:
              - Dimension 1: locate .meridian/product/research/{domain}.md, find the feature's
                Experiential section, append/update it using the Experiential format from
                kb-extension.md lines 89-105. If file absent, skip with warning.
              - Dimension 2: locate .meridian/product/architecture/ YAML artifacts, append
                implementation_feedback section per architecture-feedback.md schema.
                If absent, skip with warning.
              - Dimension 3: locate .meridian/product/scope/epics/{epic-id}.yaml, write
                post_implementation block per updated intent-epic.yaml schema. If absent, skip.
            
            Deduplication: check existing sections in target artifacts, not a knowledge/ directory.
            If Experiential section already has entries from a prior capture-learning run, merge
            (increment usage count, append new scenario observations) rather than duplicate.
      expected_outcome: "Agent can locate trinity evidence and produce three-dimensional enrichment proposals"
      self_test: "Agent documentation references milestone-verdict.yaml, status-report.yaml, and e2e-results.yaml as recognized artifact types"

    - step: 5
      description: "Rebuild SKILL.md from updated intent.yaml"
      files:
        - path: "core/components/plays/capture-learning/SKILL.md"
          action: "modify (via /create-play --build capture-learning)"
          details: >
            Do NOT edit SKILL.md directly — it is a compiled artifact.
            After intent.yaml rewrite is complete, run /create-play --build capture-learning.
            The rebuilt SKILL.md must:
            - Retain Steps 1-2 (archival) verbatim
            - Update Step 3 (artifact scan) to search milestones/**/ in addition to evidence/
              and add new filename patterns: milestone-verdict.yaml, status-report.yaml,
              e2e-results.yaml, arbiter-verdict*.yaml
            - Update Step 4 knowledge-extractor contract to pass three-dimensional extraction mode
            - Update Step 5 (human review) to show enrichment proposals instead of file-creation proposals
            - Update Step 6 knowledge-extractor WRITE contract to pass enrichment mode
            Verify archival steps (Steps 1-2) are unchanged by comparing to current SKILL.md.
      expected_outcome: "SKILL.md compiled from new intent, archival steps unchanged, extraction steps updated"
      self_test: "Diff new vs old SKILL.md — Steps 1-2 are byte-identical, Steps 3-6 show new artifact types and enrichment language"

  estimated_scope:
    files_touched: 5
    complexity: "high"
    notes:
      - "Archival phase (4 constraints, 5 failure conditions, 2 scenarios) is correct — zero changes needed there"
      - "SKILL.md rebuild is the highest-risk step — verify archival phase preservation explicitly"
      - "Schema additions (intent-epic.yaml, architecture-feedback.md) are purely additive — no breaking changes"
      - "validate-intent-epics skill does NOT need code changes — post_implementation is optional by declaration"

  implementation_sequence:
    - "Step 1: intent-epic.yaml schema addition (no dependencies)"
    - "Step 2: architecture-feedback.md creation (no dependencies)"
    - "Step 3: intent.yaml rewrite (depends on knowing new constraints from Steps 1-2)"
    - "Step 4: knowledge-extractor rewrite (depends on Step 3 for new dimensions, Steps 1-2 for write targets)"
    - "Step 5: SKILL.md rebuild via /create-play --build (depends on Steps 3-4 complete)"
