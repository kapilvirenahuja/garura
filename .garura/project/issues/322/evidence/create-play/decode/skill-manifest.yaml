skills:
  # ============ EXISTING — reused as-is ============

  - name: scan-codebase
    path: core/components/skills/scan-codebase/SKILL.md
    status: existing
    usage: >
      Initial deterministic scan when features.yaml resolution hits option (b)
      (from codify STM). When features.yaml comes from product LTM, scan
      output from the prior /codify run is consumed.

  - name: map-test-surface
    path: core/components/skills/map-test-surface/SKILL.md
    status: existing
    usage: >
      Invoked per-unit by test-engineer to produce feature-, flow-, or
      aspect-scoped test-surface. Existing skill is whole-repo; play passes
      scope filter post-hoc via file_surface intersection (no skill
      modification needed).

  - name: validate-abstraction-layer
    path: core/components/skills/validate-abstraction-layer/SKILL.md
    status: existing
    usage: >
      Validates prose fields across behaviors/, flows/, aspects/ (C6).
      Architecture artifacts exempt per same rule /codify uses.

  # ============ NEW ============

  - name: detect-tech-stacks-from-physical-architecture
    path: core/components/skills/detect-tech-stacks-from-physical-architecture/SKILL.md
    status: new
    tier: domain
    usage: >
      Reads physical-architecture.yaml, extracts stack inventory (runtime,
      framework, frontend framework, ORM, template engine, etc.) with
      versions, produces stacks-detected.yaml for /decode to drive tech-skill
      synthesis. Consumes ~1 constraint (C29 detection phase).

  - name: synthesize-tech-skill-from-playbook
    path: core/components/skills/synthesize-tech-skill-from-playbook/SKILL.md
    status: new
    tier: domain
    usage: >
      Reads KB playbook at core/components/memory/knowledge/tech/{stack}.md
      plus the detected stack version, writes a temporary SKILL.md to
      {stm_base}/{issue}/evidence/decode/temp-skills/extract-from-{stack}.md
      with the playbook's patterns embedded as extraction instructions.
      Deterministic (templated substitution), not LLM-reasoned. Covers C29,
      C30, C31. Halts if playbook missing (F15).

  - name: cleanup-temp-skills
    path: core/components/skills/cleanup-temp-skills/SKILL.md
    status: new
    tier: infrastructure
    usage: >
      Removes {stm_base}/{issue}/evidence/decode/temp-skills/ + any
      .claude/skills/decode-temp-*/ symlinks or copies. Invoked on final
      Tether. Covers C32, F17.

  - name: detect-test-harness
    path: core/components/skills/detect-test-harness/SKILL.md
    status: new
    tier: domain
    usage: >
      Per C26: inspects scan-index manifests, existing CI config, and
      detected test framework to produce TEST_HARNESS record (framework,
      runner command, working dir, dep install command, env vars, stdout
      parse format). Consumed by test-runner agent. Halts with structured
      error if no runnable harness detected (F18).

  - name: extract-feature-behavior-spec
    path: core/components/skills/extract-feature-behavior-spec/SKILL.md
    status: new
    tier: domain
    usage: >
      Per-feature spec extraction. Reads feature's file_surface, dispatches
      the appropriate temp tech skill based on file extension/path pattern
      (C33), produces behaviors/{feature-id}.yaml conforming to C4a shape
      with all cited_locations populated. Tests-first reading order (C7).
      Test/code drift surfaced as ambiguities (C9).

  - name: extract-flow-spec
    path: core/components/skills/extract-flow-spec/SKILL.md
    status: new
    tier: domain
    usage: >
      Per-user-journey spec extraction crossing multiple features. Reads
      flow-scoped file surface (union of participating features' files),
      produces flows/{flow-id}.yaml per C4b shape. Populates
      participating_features[] in order and traversing_aspects[].

  - name: extract-aspect-spec
    path: core/components/skills/extract-aspect-spec/SKILL.md
    status: new
    tier: domain
    usage: >
      Per-cross-cutting-aspect spec extraction. Aspect kinds: auth,
      authorization, rate_limit, validation, error_envelope, logging,
      observability, idempotency, i18n, feature_flag. Produces
      aspects/{aspect-id}.yaml per C4c shape with applies_to.{routes,
      components, features} populated from scan of decorator/middleware
      registration sites.

  - name: generate-contract-tests
    path: core/components/skills/generate-contract-tests/SKILL.md
    status: new
    tier: domain
    usage: >
      Tier A (C24). Generates HTTP-boundary tests for every exposed API
      endpoint and every outbound integration_behavior. Test framework
      matches detected TEST_HARNESS (Supertest for Express, MockMvc for
      Spring, Requests for Flask/FastAPI, etc.). Fully portable across
      backend stacks.

  - name: generate-flow-tests
    path: core/components/skills/generate-flow-tests/SKILL.md
    status: new
    tier: domain
    usage: >
      Tier B (C24). Generates E2E tests for every flow-spec using detected
      E2E framework (Playwright, Cypress, Selenium). Mostly portable across
      frontend E2E frameworks. One test per flow-spec covering full
      success journey plus each documented failure_paths[] entry.

  - name: generate-unit-pure-tests
    path: core/components/skills/generate-unit-pure-tests/SKILL.md
    status: new
    tier: domain
    usage: >
      Tier C (C24). Generates unit tests for business rules that are
      free of framework/stack coupling. Selective: only non-trivial logic
      (multi-branch guards, state transitions, computational rules). NOT
      invoked for Tier D (stack-coupled) — those are cited_existing only
      (F11).

  - name: run-generated-tests-isolated
    path: core/components/skills/run-generated-tests-isolated/SKILL.md
    status: new
    tier: domain
    usage: >
      test-runner agent's sole skill. Executes generated tests against the
      current codebase using the TEST_HARNESS invocation. Reports pass/fail
      per test plus stderr. Context-isolated per C15 — receives no
      extraction context, no spec content. Baseline-green verification gate
      (C25).

  - name: verify-citation-integrity
    path: core/components/skills/verify-citation-integrity/SKILL.md
    status: new
    tier: domain
    usage: >
      Static citation verification (C8). For every cited_locations entry in
      every spec: (a) file exists, (b) line range exists, (c) excerpt
      matches current source byte-for-byte after normalization. Integrity
      failure halts the unit (F7).

  - name: aggregate-decode-proposals
    path: core/components/skills/aggregate-decode-proposals/SKILL.md
    status: new
    tier: infrastructure
    usage: >
      Pattern matches aggregate-codify-proposals. Walks
      proposals/scope/{behaviors,flows,aspects}/ + generated-tests/, reads
      every spec's meta block, classifies into Tier 2/3 per C20, writes
      master proposals.yaml (C20, F23).

# ============ SKILL AUTHORING STRATEGY ============
# The recipe says "For new or modified skills, invoke /skill-creator."
# /skill-creator is an interview-driven skill — 11 invocations would span
# many user-turns. Proposed efficient path (user-decision at compile Step 3):
#
# Option A — Full /skill-creator per skill: strict recipe compliance, ~11
#   interview rounds. High fidelity, slow.
#
# Option B — Inline skill stubs authored now by compiler, each as a valid
#   SKILL.md with frontmatter + description + input + output + process
#   outline + failure modes. Status tagged `stub: true` in frontmatter.
#   Compile proceeds. First real /decode invocation surfaces stubs for
#   deeper authoring (via /skill-creator --rebuild at that time, triggered
#   by actual use cases rather than abstract interview).
#
# Option C — Hybrid: stub the 4 infrastructure/templated skills inline
#   (cleanup-temp-skills, detect-tech-stacks-from-physical-architecture,
#   detect-test-harness, aggregate-decode-proposals — mostly mechanical),
#   invoke /skill-creator for the 7 domain skills that involve genuine LLM
#   reasoning design (extract-* × 3, generate-* × 3, verify-citation-integrity,
#   run-generated-tests-isolated, synthesize-tech-skill-from-playbook).
