play: "meridian:report-issue"
skills:
  - name: "manage-issue"
    path: "core/components/skills/manage-issue/SKILL.md"
    status: existing
    usage: >
      action: create — file the defect as a GitHub Issue on
      kapilvirenahuja/meridian-os with defect label, structured body,
      and [DEF][Severity] title pattern. The play constructs the
      title and body before passing to this skill.
    note: >
      Fallback file creation (C7) is play-level orchestration, not
      a skill invocation. If manage-issue fails, the play writes a
      local markdown file directly.
