quality_flags:
  - id: QF1
    severity: low
    description: "self-eval.yaml committed as STM evidence despite SKILL.md explicitly stating 'No self-eval.yaml is produced' and C13 removing all self-eval references."
    detail: |
      The chore(stm) commit includes .garura/project/issues/258/evidence/enhance/self-eval.yaml
      as a new file (+43 lines). This is the artifact the PR specifically replaces with
      verification-report.yaml. The file contains the builder's own PASS verdicts — which
      is exactly the self-report pattern C13/F14 is designed to eliminate.
      In practice this is historical STM evidence from the pre-tester run; it does not
      affect the compiled SKILL.md or intent.yaml. But it is conceptually inconsistent
      and could confuse readers of the evidence trail.
    recommendation: "Document in PR body or commit message that self-eval.yaml is pre-tester legacy evidence, or omit it from the evidence commit."

  - id: QF2
    severity: informational
    description: "verification-report.yaml is absent from the STM evidence commit."
    detail: |
      The chore(stm) commit records all STM artifacts — but verification-report.yaml
      (the artifact that was supposed to replace self-eval.yaml per C13) is not included.
      This suggests the tester agent was not dispatched during this run, or its output
      was not committed. The SKILL.md was compiled and the judge/quality passes were recorded,
      implying the play ran with the old self-eval pattern rather than the new tester dispatch.
    recommendation: "Verify whether verification-report.yaml was produced during the enhancement run. If the tester was not dispatched, note this as a gap in the evidence trail."

  - id: QF3
    severity: informational
    description: "impl-context.md and test-context.md are absent from the STM evidence commit."
    detail: |
      Step 7b (C22) requires the orchestrator to derive these two artifacts before any
      agent dispatch. Neither appears in the chore(stm) commit. The files may exist on disk
      but were not committed, or the derivation step was not executed in this run.
    recommendation: "Confirm whether impl-context.md and test-context.md were produced. If Step 7b ran, include the artifacts in the evidence commit for auditability."

