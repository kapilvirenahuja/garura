      should-language scan: read from expectation.success_scenarios[].then.
    files:
      - core/components/skills/validate-intent-epics/SKILL.md
    exit_gate: SKILL.md contains no reference to singular `intent` field check. intents[] loop is explicit. expectation.success_scenarios path is used. expectation_not_vetted violation category is present.
    blocked_by: [T1]

  - id: T7
    title: Migrate all 9 epic YAML files to new shape
    description: >
      For each of the 9 epics under .garura/product/scope/epics/: rewrite to new
