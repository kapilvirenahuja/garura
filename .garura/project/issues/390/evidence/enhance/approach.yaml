schema_version: "1.0"
issue: 390
slug: align-product-epics-ice

# ──────────────────────────────────────────────────────────────────────────
# 1. PROBLEM STATEMENT
# ──────────────────────────────────────────────────────────────────────────
problem_statement: >
  The framework's play layer was migrated to the ICE model (clean Intent triple +
  generated Expectation + human Tether), but the product layer was left behind.
  Every intent epic produced by /specify still bundles intent, success scenarios,
  failure scenarios, mitigations, and NFR quality bars into one undifferentiated
  YAML blob — the same shape that ICE was invented to escape. Additionally, each
  epic has a singular `intent` string even when a vertical slice legitimately
  carries two or three closely related observable outcomes. Downstream consumers
  like validate-intent-epics, map-user-flows, and derive-quality-profile-from-epics
  all hardcode field names that will break silently after the reshape, which makes
  the migration high-risk without an audit step.

# ──────────────────────────────────────────────────────────────────────────
# 2. SOLUTION SUMMARY
# ──────────────────────────────────────────────────────────────────────────
solution_summary: >
  Restructure the intent-epic schema to a single-file, dual-block layout: an
  intent triple at root level (intents[], constraints, failure_conditions) plus
  a nested expectation block (success_scenarios, recovery, vetted) generated
  by a new draft-epic-expectation skill and dispatched by a new
  epic-expectation-crafter agent. generate-intent-epics writes the intent
  triple plus a stub expectation block; the crafter agent fills the stub; a
  single Tether covers both. validate-intent-epics is updated to read the
  new shape. All 9 existing epics on disk are rewritten to the new shape in
  the same PR. The singular `intent` field is removed entirely and replaced
  by intents[]. Every downstream consumer that reads failure_scenarios or
  the singular intent field is updated in the same change. quality bars
  (performance/security/accessibility/compliance) remain in constraints —
  no new derivation mechanism, renaming only.

# ──────────────────────────────────────────────────────────────────────────
# 3. FILES TO CREATE
# ──────────────────────────────────────────────────────────────────────────
files_to_create:
  - path: core/components/agents/epic-expectation-crafter.md
    purpose: >
      New agent that mirrors expectation-crafter.md. Drives the single
      Tether covering intent + expectation for an epic. Always invokes
      draft-epic-expectation (no play-vs-feature case split needed — it
      exclusively handles epics). Skill pool: [draft-epic-expectation].
      Output contract: expectation_crafted.{path, success_scenario_count,
      recovery_count, vetted_status, status}. NEVER sets vetted.status
      to approved — that is the human Tether's job.

  - path: core/components/skills/draft-epic-expectation/SKILL.md
    purpose: >
      New skill that mirrors draft-play-expectation/SKILL.md. Reads the
      intent block from an existing epic file (intents[], failure_conditions),
      generates success_scenarios (one per distinct outcome) and recovery
      (one entry per failure_condition, autonomous-vs-human test applied),
      stamps vetted.status: pending, and writes the expectation block back
      into the same epic file (read + merge + atomic write — no partial state).
      Emits decision-manifest-draft-epic-expectation.yaml.

  - path: core/components/skills/draft-epic-expectation/reference/
    purpose: >
      Reference directory for the new skill. Holds any reference
      templates or examples, following the convention of other skills
      that have a reference/ folder.

# ──────────────────────────────────────────────────────────────────────────
# 4. FILES TO MODIFY
# ──────────────────────────────────────────────────────────────────────────
files_to_modify:
  # Schema — the root contract
  - path: core/components/memory/standards/schemas/intent-epic.yaml
    change_summary: >
      Restructure to dual-block layout. At root level: remove singular `intent`
      field entirely; replace with `intents: [...]` (list of measurable
      end-state strings). Rename top-level `failure_scenarios` to
      `failure_conditions` (list of strings, matching play-layer ICE naming).
      Remove `success_scenarios` and `failure_scenarios` from root level.
      Add nested `expectation` block with sub-fields: `success_scenarios[]`
      (each with id, persona, given, then, measure), `recovery[]` (each with
      id, for_failure_condition, trigger, direction, handoff, derivable_at_l4),
      and `vetted` (status, approved_by, approved_at). Update the validation
      rules comment block (lines 212–322) to reflect all renamed fields and
      new structure, so validate-intent-epics stays in sync.

  # generate-intent-epics — intent-only emission
  - path: core/components/skills/generate-intent-epics/SKILL.md
    change_summary: >
      Step 3 OUTCOMES block: stop generating success_scenarios and
      failure_scenarios in the epic file. Instead write stub expectation
      block: `expectation: {vetted: {status: not_generated},
      success_scenarios: [], recovery: []}`. Rename `failure_scenarios`
      generation to `failure_conditions` in the intent block (list of
      strings, not objects). Update Step 2b merge logic: component's
      failure_scenarios are merged as strings into parent's
      failure_conditions list. Remove D-gie-004 (success-scenario-phrasing)
      from this skill's decision manifest — it moves to draft-epic-expectation.
      Output contract: add `expectation_stub_written: true` field.

  # validate-intent-epics — new shape support
  - path: core/components/skills/validate-intent-epics/SKILL.md
    change_summary: >
      Step 3 mandatory fields: replace `intent` (singular string) with
      `intents` (list, length >= 1, every entry length >= 20 and contains
      a measurable word or number). Replace `failure_scenarios` (list of
      objects) with `failure_conditions` (list of strings, length >= 2).
      Replace top-level `success_scenarios` check with
      `expectation.success_scenarios` check (length >= 2, every entry has
      id, persona, given, then, measure). Add `expectation.vetted.status`
      check (must equal `approved` — if `pending` or `not_generated`, emit
      `expectation_not_vetted` violation). Step 4 vertical-slice check:
      loop over every entry in intents[] and run the actor test and
      outcome test per-intent (not just first entry). Violation tagging
      uses `intents[N].subsystem_actor` or `intents[N].non_observable_outcome`.
      should-language scan: read from `expectation.success_scenarios[].then`.
      Schema comment block in intent-epic.yaml is the authoritative field list
      — update it first (in the schema task) and this skill stays in sync.

  # /specify play — wire the new crafter
  - path: core/components/plays/specify/SKILL.md
    change_summary: >
      After Step 9 (generate-intent-epics via product-keeper), add Step 9a:
      invoke epic-expectation-crafter agent (via product-keeper sub-task)
      to populate the expectation block. Step 9a input: epics_output_dir,
      ltm_rules_scenarios_path, expectation-generation rules path. Step 9a
      output: expectation_crafted count per epic.
      Add Step 9b: surface decision-manifest-draft-epic-expectation.yaml
      alongside the existing Step 9a decision manifest surface (rename
      current 9a to 9c if needed for sequencing).
      Update SCE-1 and SCE-4 scenario evals (lines 645, 651) to assert
      `expectation.recovery` instead of `failure_scenarios`. This is a
      non-intent change — direct SKILL.md edit only, no /create-play run.

  # epics.md rules — per-intent application
  - path: core/components/memory/standards/rules/epics.md
    change_summary: >
      Rule 1 actor test and outcome test: restate to apply to EVERY entry
      in intents[], not singular `intent`. Add a note: "Each entry in
      intents[] is independently validated — one failing entry fails the
      whole epic." Rule 5 note: success_scenarios language rules now apply
      to the expectation block's success_scenarios[].then. Update the
      schema-fields table at lines 161–173: rename `intent` → `intents[]`,
      `failure_scenarios` → `failure_conditions`.

  # 9 existing epics — migrated to new shape
  - path: .garura/product/scope/epics/epic-agentic-methodology-component-arch-001.yaml
    change_summary: >
      Migrate to new shape: singular intent → intents list, top-level
      failure_scenarios → failure_conditions (strings only, drop impact/mitigation
      fields — they move to expectation.recovery), top-level success_scenarios
      removed and moved into expectation block with full id/persona/given/then/measure
      structure, add vetted block with status: pending. Preserve any non-schema
      fields (intent_lock, features[]) at top level unchanged.

  - path: .garura/product/scope/epics/epic-agentic-methodology-l2-spec-driven-001.yaml
    change_summary: Same migration as above — intents[], failure_conditions, expectation block, vetted: pending. Preserve non-schema fields.

  - path: .garura/product/scope/epics/epic-agentic-methodology-l3-intent-driven-001.yaml
    change_summary: Same migration. This epic is confirmed to carry intent_lock and features[] — both preserved at top level.

  - path: .garura/product/scope/epics/epic-ai-governance-audit-attribution-001.yaml
    change_summary: Same migration — intents[], failure_conditions, expectation block, vetted: pending.

  - path: .garura/product/scope/epics/epic-engineering-experience-cli-slash-commands-001.yaml
    change_summary: Same migration.

  - path: .garura/product/scope/epics/epic-engineering-experience-first-run-onboarding-001.yaml
    change_summary: Same migration.

  - path: .garura/product/scope/epics/epic-engineering-experience-ide-integrations-001.yaml
    change_summary: Same migration.

  - path: .garura/product/scope/epics/epic-engineering-observability-quality-signals-001.yaml
    change_summary: Same migration.

  - path: .garura/product/scope/epics/epic-work-intelligence-intent-driven-verification-001.yaml
    change_summary: Same migration.

  # Downstream consumers — field-name update
  - path: core/components/skills/derive-quality-profile-from-epics/SKILL.md
    change_summary: >
      Reads `failure_scenarios[].mitigation` (SKILL.md line 69). After reshape,
      mitigation content lives in `expectation.recovery[].direction`. Update the
      field path from `failure_scenarios[].mitigation` to `expectation.recovery[].direction`.
      This is a path change, not just a rename — the data structure changed.

  - path: core/components/skills/map-user-flows/SKILL.md
    change_summary: >
      Reads `success_scenarios` and `failure_scenarios` by name (lines 37, 49,
      141, 180–183). Update all references: `success_scenarios` → `expectation.success_scenarios`,
      `failure_scenarios` → `failure_conditions` (for intent-layer data) or
      `expectation.recovery` (for recovery flow data). Verify which usage is which
      in context before updating.

  - path: core/components/skills/generate-screen-inventory/SKILL.md
    change_summary: >
      Reads `success_scenarios`, `failure_scenarios`, `business_rules` (line 40).
      Update: `success_scenarios` → `expectation.success_scenarios`,
      `failure_scenarios` → `failure_conditions` (or `expectation.recovery`
      depending on usage context).

  - path: core/components/skills/infer-epics-from-code/SKILL.md
    change_summary: >
      Output template (line 154) references `success_scenarios` and `failure_scenarios`.
      Update template to emit new shape: `intents[]`, `failure_conditions`,
      and `expectation` stub block. This ensures inferred epics from /codify
      also match the new schema.

# ──────────────────────────────────────────────────────────────────────────
# 5. CONNECTIONS
# ──────────────────────────────────────────────────────────────────────────
connections:
  flow: >
    /specify Stage 5 → product-keeper dispatches generate-intent-epics →
    skill writes intent triple (intents[], constraints, failure_conditions)
    plus empty expectation stub to each epic file →
    product-keeper dispatches epic-expectation-crafter agent →
    agent calls draft-epic-expectation skill →
    skill reads intent block from the file, generates expectation block,
    writes back to same file (atomic read-merge-write), sets vetted.status: pending →
    agent surfaces single Tether (intent + expectation together) →
    human approves → agent sets vetted.status: approved →
    product-keeper dispatches validate-intent-epics →
    validator reads both intent block and expectation block, enforces new shape →
    /specify continues.

  decision_manifest_flow: >
    generate-intent-epics emits decision-manifest-generate-intent-epics.yaml (D-gie-001 to D-gie-005; D-gie-006 removed, D-gie-004 moves to expectation skill).
    draft-epic-expectation emits decision-manifest-draft-epic-expectation.yaml (new D-dee- prefix).
    /specify Step 9b surfaces both manifests at the decision surfacing checkpoint.

  validator_coupling: >
    validate-intent-epics loads intent-epic.yaml schema as the mandatory-field
    source of truth. Because the schema's validation-rules comment block is
    updated in T1, the validator reads the new field list automatically when
    schema path is passed. The validator's per-epic checks also update explicitly
    (in T6) to iterate intents[] and read expectation.success_scenarios.

  single_tether: >
    epic-expectation-crafter presents intent block + expectation block together
    at one checkpoint. No separate vetting of intent vs expectation. Single
    human response gates both to approved.

# ──────────────────────────────────────────────────────────────────────────
# 6. TASKS
# ──────────────────────────────────────────────────────────────────────────
tasks:
  - id: T1
    title: Restructure schema + update epics.md rules
    description: >
      Rewrite intent-epic.yaml: remove singular `intent`, add `intents: [...]`,
      rename `failure_scenarios` to `failure_conditions` (list of strings),
      remove top-level success_scenarios and failure_scenarios, add `expectation`
      nested block with sub-shape and vetted. Rewrite the validation-rules comment
      block (lines 212–322) to reflect all new field names — this is the source of
      truth for validate-intent-epics. Update epics.md rules (Rule 1 per-intent
      application, Rule 5 note, schema-fields table).
    files:
      - core/components/memory/standards/schemas/intent-epic.yaml
      - core/components/memory/standards/rules/epics.md
    exit_gate: Schema file parses as valid YAML. Both intent fields (intents[]) and expectation block with vetted sub-field are present. Validation-rules comment matches new field list. epics.md Rule 1 references intents[] not singular intent.
    blocked_by: []

  - id: T2
    title: Rewrite generate-intent-epics to emit intent-only
    description: >
      Update SKILL.md: Step 3 OUTCOMES block stops generating success_scenarios;
      instead writes stub expectation block. failure_scenarios generation becomes
      failure_conditions (strings). Step 2b merge logic updated for new field name.
      Remove D-gie-004 from decision manifest. Add expectation_stub_written field
      to output contract.
    files:
      - core/components/skills/generate-intent-epics/SKILL.md
    exit_gate: SKILL.md contains no reference to writing success_scenarios at the top level. failure_conditions appears. Stub expectation block is in the write step.
    blocked_by: [T1]

  - id: T3
    title: Create draft-epic-expectation skill
    description: >
      Create core/components/skills/draft-epic-expectation/SKILL.md mirroring
      draft-play-expectation structure. Input: epic_file_path (the single epic file),
      rules paths. Process: read intent block (intents[], failure_conditions),
      generate success_scenarios (one per distinct outcome, binary-testable measure),
      generate recovery (one per failure_condition, apply autonomous-vs-human test),
      set vetted.status: pending, read full existing file, merge expectation block
      in, write back atomically. Emit decision-manifest-draft-epic-expectation.yaml.
      Create reference/ directory as placeholder.
    files:
      - core/components/skills/draft-epic-expectation/SKILL.md
      - core/components/skills/draft-epic-expectation/reference/
    exit_gate: SKILL.md exists, parses, has correct frontmatter (user-invocable: false). Output shape matches: expectation.success_scenarios[], expectation.recovery[], expectation.vetted.status: pending. Read-merge-write pattern is explicit in the process steps.
    blocked_by: [T1]

  - id: T4
    title: Create epic-expectation-crafter agent
    description: >
      Create core/components/agents/epic-expectation-crafter.md mirroring
      expectation-crafter.md. Frontmatter: domain: epic-expectation,
      role: crafter. No play-vs-feature case split. Skill pool:
      [draft-epic-expectation]. NEVER sets vetted.status: approved.
      Output contract: expectation_crafted.{path, success_scenario_count,
      recovery_count, vetted_status, status}. Single Tether pattern for
      presenting intent + expectation together.
    files:
      - core/components/agents/epic-expectation-crafter.md
    exit_gate: Agent file exists. Skill pool lists only draft-epic-expectation. Output contract has the four fields. NEVER approved invariant is stated.
    blocked_by: [T3]

  - id: T5
    title: Wire epic-expectation-crafter into /specify
    description: >
      In specify/SKILL.md Stage 5: add Step 9a invoking epic-expectation-crafter
      after generate-intent-epics completes. Add Step 9b surfacing the new
      decision-manifest-draft-epic-expectation.yaml. Update SCE-1 and SCE-4
      scenario evals to assert expectation.recovery instead of failure_scenarios.
      This is a non-intent change — direct SKILL.md edit, no /create-play run.
      Note "Direct-edit deviation note (#390):" footer.
    files:
      - core/components/plays/specify/SKILL.md
    exit_gate: specify SKILL.md has Step 9a referencing epic-expectation-crafter. SCE-1 and SCE-4 reference expectation.recovery. Direct-edit footer present.
    blocked_by: [T4]

  - id: T6
    title: Update validate-intent-epics for new shape
    description: >
      Update SKILL.md Step 3 mandatory-field checks: intents[] (list >= 1,
      each entry length >= 20 with measurable word/number), failure_conditions
      (list of strings >= 2), expectation.success_scenarios (list >= 2 with
      id/persona/given/then/measure), expectation.vetted.status (must be `approved`;
      `pending` or `not_generated` → emit `expectation_not_vetted` violation).
      Step 4 vertical-slice check: loop intents[], tag violations as
