    exit_gate: All 9 files parse as valid YAML. All 9 contain intents[] (not intent:). All 9 contain failure_conditions. All 9 contain expectation.vetted.status: approved. Non-schema fields are present if they existed before. Validate-intent-epics passes green on all 9.
    blocked_by: [T6]

  - id: T8
