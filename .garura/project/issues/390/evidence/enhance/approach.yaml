      - .garura/product/scope/epics/epic-agentic-methodology-l2-spec-driven-001.yaml
      - .garura/product/scope/epics/epic-agentic-methodology-l3-intent-driven-001.yaml
      - .garura/product/scope/epics/epic-ai-governance-audit-attribution-001.yaml
      - .garura/product/scope/epics/epic-engineering-experience-cli-slash-commands-001.yaml
      - .garura/product/scope/epics/epic-engineering-experience-first-run-onboarding-001.yaml
      - .garura/product/scope/epics/epic-engineering-experience-ide-integrations-001.yaml
      - .garura/product/scope/epics/epic-engineering-observability-quality-signals-001.yaml
