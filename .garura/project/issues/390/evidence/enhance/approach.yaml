# ──────────────────────────────────────────────────────────────────────────
# 7. EVALS
# ──────────────────────────────────────────────────────────────────────────
evals:

  # Core structural evals
  - id: EVAL-01
    description: Schema file parses and contains dual-block structure
    assertion: >
      intent-epic.yaml parses as valid YAML. Top-level `intents` key is a list.
      Top-level `failure_conditions` key is a list. `expectation` key is a nested map
      with `success_scenarios`, `recovery`, and `vetted` sub-keys. Top-level
      `intent` (singular) key is ABSENT. Top-level `failure_scenarios` key is ABSENT.
    pass_when: All assertions hold.
    fail_when: Any singular `intent` key, any top-level `failure_scenarios`, or missing `expectation` block.

  - id: EVAL-02
    description: generate-intent-epics writes only intent block (no success_scenarios, no recovery at root)
    assertion: >
      After running generate-intent-epics, each output epic file contains:
      `intents:` key (list), `failure_conditions:` key (list of strings),
      `expectation.vetted.status: not_generated`.
      Files do NOT contain top-level `success_scenarios:` or `failure_scenarios:` keys.
    pass_when: All conditions hold for all generated epics.
    fail_when: Any epic has top-level `success_scenarios` or `failure_scenarios` or missing `intents`.

  - id: EVAL-03
    description: draft-epic-expectation produces expectation block with correct structure
    assertion: >
      After draft-epic-expectation runs on an epic file: `expectation.success_scenarios`
      is a list with length >= 2, each entry has `id`, `persona`, `given`, `then`, `measure`.
      `expectation.recovery` is a list with one entry per `failure_conditions` entry.
      Each recovery entry has `id`, `for_failure_condition`, `trigger`, `direction`,
      `handoff` (value in [autonomous, human]), `derivable_at_l4`.
      `expectation.vetted.status` equals `pending`.
    pass_when: All structure assertions hold.
    fail_when: Missing sub-fields, recovery count != failure_conditions count, or status != pending.

  - id: EVAL-04
    description: epic-expectation-crafter dispatches single Tether covering both blocks
    assertion: >
      Agent invocation results in one Tether checkpoint presented to the user.
      The checkpoint display includes content from both the intents[] block and
      the expectation block. After approval, vetted.status in the epic file is `approved`.
      Agent does NOT present two separate checkpoints.
    pass_when: One checkpoint, both blocks visible, status approved after.
    fail_when: Two checkpoints, or vetted.status remains pending after user approval.

  - id: EVAL-05
    description: validate-intent-epics passes against new shape and rejects old shape
    assertion: >
      Running validate-intent-epics against a new-shape epic (intents[], expectation block,
      vetted: approved) returns status: passed with zero violations.
      Running validate-intent-epics against an old-shape epic (singular `intent`, top-level
      `success_scenarios`, `failure_scenarios`) returns status: failed with violations
      including missing_field for intents and expectation_not_vetted.
    pass_when: New shape passes, old shape fails with correct violation categories.
    fail_when: Old shape passes validation, or new shape fails for structural reasons.

  - id: EVAL-06
    description: All 9 migrated epics validate green
    assertion: >
      Running validate-intent-epics with epics_dir pointing at
      .garura/product/scope/epics/ returns status: passed, total_epics: 9,
      failed_epics: 0, total_violations: 0.
    pass_when: status: passed, failed_epics: 0.
    fail_when: Any violation in any of the 9 epics.

  - id: EVAL-07
    description: /specify play wires new flow end-to-end
    assertion: >
      specify/SKILL.md Stage 5 contains a Step 9a that references epic-expectation-crafter.
      specify/SKILL.md scenario evals SCE-1 and SCE-4 reference expectation.recovery
      (not failure_scenarios). Step 9b surfaces decision-manifest-draft-epic-expectation.yaml.
    pass_when: All three conditions hold via grep.
    fail_when: epic-expectation-crafter absent from Stage 5, or SCE evals still reference failure_scenarios.

  # Downstream consumer evals (from eval-driven risk R1)
  - id: EVAL-08
    description: No failure_scenarios references remain in component source files
    assertion: >
      grep -r "failure_scenarios" core/components/skills/ core/components/agents/ core/components/plays/
      returns zero matches (excluding STM evidence files, approach.yaml, discovery.md, understanding.md).
    pass_when: Zero grep hits in component source.
    fail_when: Any hit found in a SKILL.md, agent .md, or play SKILL.md.

  - id: EVAL-09
    description: No singular intent field references remain in component source files
    assertion: >
      grep -rn "^intent:" core/components/skills/ core/components/agents/ core/components/plays/
      and grep -rn "  intent:" with indented-field context returns zero hits in component source
      files (excluding schema examples, problem_statement/intent-driven strings in prose).
    pass_when: Zero hits for bare `intent:` as a schema field in skills/agents/plays.
    fail_when: Any skill/agent/play still reads or writes `intent:` as singular field.

  - id: EVAL-10
    description: derive-quality-profile-from-epics reads correct path after rename
    assertion: >
      derive-quality-profile-from-epics/SKILL.md contains reference to
      `expectation.recovery[].direction` (or equivalent recovery path) and does NOT
      contain `failure_scenarios[].mitigation`.
    pass_when: Correct path present, old path absent.
    fail_when: Old path still referenced.

  - id: EVAL-11
    description: map-user-flows and generate-screen-inventory read expectation.success_scenarios
    assertion: >
      map-user-flows/SKILL.md and generate-screen-inventory/SKILL.md both reference
      `expectation.success_scenarios` and do NOT reference top-level `success_scenarios`
      as an epic field.
    pass_when: Both skills use correct path.
    fail_when: Either skill still references top-level `success_scenarios`.

# ──────────────────────────────────────────────────────────────────────────
# 8. RISKS
# ──────────────────────────────────────────────────────────────────────────
risks:
  - id: R1
    description: >
      Downstream consumers silently break after failure_scenarios rename. Six or more
      skills hardcode `failure_scenarios` by exact name. If any consumer is missed, it
      will find an empty list, not crash, and pass silently — the data loss is invisible.
    type: architectural
    action: eval-driven
    mitigation: >
      T8 includes a mandatory post-update grep across core/components/ for `failure_scenarios`.
      Zero hits required before T8 can be marked done. EVAL-08 is the blocking gate.
      T8 is blocked only on T1 (schema) not on T7 (epic migration) — run consumer updates
      in parallel with epic rewrite to reduce total time.
    ltm_reference: null
    generated_evals: [EVAL-08, EVAL-10, EVAL-11]

  - id: R2
    description: >
      Single-file write conflict: generate-intent-epics writes the file first,
      draft-epic-expectation must read and write back the same file with expectation block.
      Partial writes or race conditions produce corrupt epic files.
    type: technical
    action: eval-driven
    mitigation: >
      generate-intent-epics writes the full file including a typed stub expectation block
      (status: not_generated, empty lists). draft-epic-expectation reads the full file,
      populates the expectation block, then writes the complete merged file atomically
      (not append). validate-intent-epics catches status: not_generated as expectation_not_vetted
      violation, giving a clear failure mode if the crafter step is skipped. EVAL-03 verifies
      the correct structure post-write.
    ltm_reference: null
    generated_evals: [EVAL-03, EVAL-05]

  - id: R3
    description: >
      9 epic migrations could drop content during rewrite. The existing epics carry
      scenario text, failure scenario details (scenario/impact/mitigation), and
      non-schema fields (intent_lock, features[]). Any of these could be silently
      omitted during manual rewrite.
    type: technical
    action: eval-driven
    mitigation: >
      For each of the 9 epics, diff the migrated file against the original before
      marking T7 done: every success scenario's scenario text must appear in the new
      expectation.success_scenarios[].then or .given, every failure scenario's scenario
      text must appear in failure_conditions or expectation.recovery[].trigger/direction,
      and any non-schema field must be present verbatim. EVAL-06 runs the validator
      on all 9 as a post-migration gate.
    ltm_reference: null
    generated_evals: [EVAL-06]

  - id: R4
    description: >
      Naming collision: singular `intent` field vs `intents` list. The validator,
      generate-intent-epics, and all epic files currently use the singular `intent`
      field. Mixing old and new consumers during the migration window creates a state
      where one skill writes `intent:` and another reads `intents:` — both succeed
      with no data, no error.
    type: technical
    action: eval-driven
    mitigation: >
      T1 (schema) defines the new shape. T2 (generate skill), T6 (validator), and T7
      (epic files) all change in the same PR — no intermediate state is committed to
      main where both field names coexist in live components. EVAL-09 greps for the
      old singular `intent:` field reference across all components as a post-T8 gate.
    ltm_reference: null
    generated_evals: [EVAL-09]

  - id: R5
    description: >
      Removing the singular `intent` field entirely is the only irreversible structural
      decision in this change. If the field is kept alongside `intents[]` as a deprecated
      alias, consumers that read the old field name continue working, deferring the
      cleanup. If removed, any consumer not updated in T8 breaks immediately.
    type: architectural
    action: approval-required
    mitigation: >
      Design decision: remove singular `intent` entirely (no alias). Justification: keeping
      both names is a Razor 4 (Abstraction later) violation — two ways to express the same
      data means every consumer and rule must handle both, and the ambiguity will persist
      indefinitely. The T8 grep (EVAL-09) is the safety net. This decision is noted here
      for the code-builder to confirm at the single Tether checkpoint before executing T2.
    ltm_reference: null
    generated_evals: [EVAL-09]

# ──────────────────────────────────────────────────────────────────────────
# 9. ALTERNATIVES CONSIDERED
# ──────────────────────────────────────────────────────────────────────────
alternatives_considered:
  - alternative: Split into two files per epic (intent-epic.yaml + epic-expectation.yaml)
    description: >
      The original issue body proposed producing two files per capability: one for the
      intent triple and one for the expectation. This mirrors the play layer literally,
      where intent.yaml and expectation.yaml are separate files per play.
    rejection_reason: >
      User override (Q1a in discovery.md): the epic is the unit of product delivery,
      not a play instance. Splitting the file separates intent from expectation in the
      filesystem, making the epic harder to review, harder to version-control as a unit,
      and requiring consumers to join two files to get a full picture. The single-file
      shape applies the ICE *structure* (intent block + expectation block side by side)
      without fractioning the unit. This is a deliberate departure from the play-layer
      analogy in favour of product-layer ergonomics.

  - alternative: Keep failure_scenarios field name, only restructure position
    description: >
      Preserve `failure_scenarios` as the field name in the intent block (just move it
      there and change from objects to strings) to avoid touching 6 downstream consumers.
    rejection_reason: >
      Preserving the name is deceptive: the shape changes regardless (objects →
      strings in intent block, plus a new recovery[] in expectation block), so downstream
      consumers reading failure_scenarios[].mitigation or failure_scenarios[].impact still
      break. The name preservation saves nothing and creates ambiguity with the play-layer
      naming convention (failure_conditions). Renaming is honest and the eval gate (EVAL-08)
      catches any consumer missed.

  - alternative: Two-phase migration (new shape in code first, migrate 9 epics in a follow-on PR)
    description: >
      Ship the schema, skills, and validator in this PR; migrate the 9 on-disk epics
      in a separate follow-on PR to reduce PR size.
    rejection_reason: >
      The Q4 decision in discovery.md is explicit: all 9 migrate in this same change.
      A follow-on PR would leave the codebase in a split state where the validator
      enforces the new shape but the 9 epics on disk are in the old shape — validate-intent-epics
      would fail on every run until the follow-on lands. The 9 migrations are mechanical
      (follow a defined transform) and bounded in effort.
