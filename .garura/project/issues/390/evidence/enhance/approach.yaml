      (2) map-user-flows: update success_scenarios → expectation.success_scenarios,
      failure_scenarios → failure_conditions (intent data) or expectation.recovery
      (recovery flow data) depending on usage context — read each usage before updating.
      (3) generate-screen-inventory: same pattern as map-user-flows.
      (4) infer-epics-from-code: update output template to emit new shape.
