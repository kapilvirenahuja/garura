design:
  issue: 310
  rca_ref: ".garura/project/issues/310/evidence/fix-it/rca.yaml"

  problem_statement: >
    Plays and skills compiled during the Meridian era still carry `meridian:` as their
    frontmatter `name:` prefix. The framework is now Garura. The stale prefix appears in
    SKILL.md name fields, H1 headers, status file `play:` fields, and inter-play skill
    invocation references. The fix must address two distinct source-of-truth patterns:
    (1) plays compiled from intent.yaml via /create-play --build, and (2) skills whose
    SKILL.md is the direct source of truth with no intent.yaml compilation pipeline.

  strategy:
    chosen: drop_prefix
    convention: "bare name (no prefix)"
    rationale: >
      Bare names are already the plurality convention: 10 of 22 plays use bare names
      (briefs, capture-learning, commit-code, create-play, create-pr, enhance, merge-pr,
      ship, start-feature, start-feature-planning). The compiled-example.md canonical
      reference uses `name: commit-code` — bare. Garura-prefix plays (8 total: arch,
      capture, design, implement, prepare, scope, specify, validate) are fewer than the
      bare-name plurality.

      Dropping the prefix entirely is also simpler: it removes namespace coupling,
      avoids the question of which prefix is authoritative, and matches the direction
      the newer/smaller plays (commit-code, create-pr, merge-pr, ship, enhance) already
      took. The consistent pattern for a solo-dev repo without plugin isolation needs
      is the bare name.

      The four already-garura plays (arch, design, scope, specify, etc.) and `capture`
      will remain as-is; this fix does NOT retroactively strip `garura:` from plays that
      already use it, since that would be a separate churn pass with higher blast radius
      and is outside this issue's scope.

  compiled_play_edit_exception:
    applies_to: ["fix-it/SKILL.md", "distill/SKILL.md", "review-pr/SKILL.md"]
    rationale: >
      CLAUDE.md's "never edit SKILL.md directly" rule exists to prevent drift between
      intent.yaml and SKILL.md. This fix updates BOTH in the same commit: intent.yaml
      gets `name: {bare}` added AND SKILL.md gets the matching name field, H1, and
      reference updates applied. No drift is introduced — the next natural rebuild via
      /create-play --build will produce the same result. The exception is documented
      here and in the commit message. The alternative (deferring SKILL.md updates to an
      orchestrator-run /create-play --build) would place SKILL.md changes outside the
      code-builder→quality-auditor verification loop, leaving regression assertions
      permanently unverifiable by the play's TDD invariant (C14-C16).
    exception_approved: true

  alternatives_considered:
    - approach: "Use `garura:` prefix consistently across all affected plays and skills"
      rejection_reason: >
        Would require touching all 10 bare-name plays in addition to the 4 meridian plays,
        expanding scope significantly. The bare-name plurality (10 plays) is the actual
        dominant pattern — forcing garura: universally would invert the current dominant
        convention. Occam's Razor: the simpler change (fix 4 broken things, don't retag 10
        working things) wins. Additionally, the garura: prefix adds no functional value in
        a single-framework repo with no namespace collision risk.

    - approach: "Leave meridian: as-is and introduce a backward-compatibility shim"
      rejection_reason: >
        There is no invocation lookup system that routes by name — the name field is consumed
        by Claude Code's skill/play registry and by human readers. A shim would require
        infrastructure that doesn't exist (no router, no alias table). The only effect of
        leaving the prefix is ongoing confusion about the framework name for contributors and
        LLM context readers. Cost of fixing is low; cost of shim is high and adds complexity.
        Reversibility bias: the fix is fully reversible (just rebuild with a different name);
        the shim is harder to remove.

    - approach: "Fix intent.yaml only; defer compiled play SKILL.md updates to orchestrator via /create-play --build"
      rejection_reason: >
        Places E5 outside the code-builder→quality-auditor verification chain. Regression
        assertions A4-A8 and A10 test SKILL.md state — quality-auditor would always see RED
        on those assertions even if code-builder did everything correctly, triggering spurious
        retries and exhaustion. The TDD invariant (C14-C16) requires regression tests to be
        satisfiable by what code-builder produces. Deferred rebuild fails this requirement.
        The synchronized intent.yaml+SKILL.md edit achieves the same no-drift outcome without
        breaking the verification loop.

  confidence: high

  affected_files:
    # === INTENT.YAML SOURCE FILES (add name: field + fix scenario text) ===
    - file: "core/components/plays/fix-it/reference/intent.yaml"
      role: "Source of truth for fix-it play"
      required_changes:
        - "Add `name: fix-it` as first line (no prefix)"
        - "Change S1 given: text from `meridian:fix-it` to `fix-it` (line 161)"
      action: modify

    - file: "core/components/plays/distill/reference/intent.yaml"
      role: "Source of truth for distill play"
      required_changes:
        - "Add `name: distill` as first line (no prefix)"
      action: modify

    - file: "core/components/plays/review-pr/reference/intent.yaml"
      role: "Source of truth for review-pr play"
      required_changes:
        - "Add `name: review-pr` as first line (no prefix)"
      action: modify

    # === COMPILED PLAY SKILL.MD (direct edit — exception documented above) ===
    - file: "core/components/plays/fix-it/SKILL.md"
      role: "Compiled play artifact — direct edit permitted under exception (synchronized with intent.yaml update)"
      required_changes:
        - "Line 2: change `name: \"meridian:fix-it\"` to `name: fix-it`"
        - "Line 7: change `# meridian:fix-it` to `# fix-it`"
        - "Line 526: change `\"play\": \"meridian:fix-it\"` to `\"play\": \"fix-it\"`"
      action: modify

    - file: "core/components/plays/distill/SKILL.md"
      role: "Compiled play artifact — direct edit permitted under exception"
      required_changes:
        - "Line 2: change `name: meridian:distill` to `name: distill`"
        - "Update H1 header from `# meridian:distill` to `# distill`"
      action: modify

    - file: "core/components/plays/review-pr/SKILL.md"
      role: "Compiled play artifact — direct edit permitted under exception; also contains skill cross-references"
      required_changes:
        - "Line 2: change `name: meridian:review-pr` to `name: review-pr`"
        - "Update H1 header from `# meridian:review-pr` to `# review-pr`"
        - "Line 161: change `meridian:quality-check-scoped` to `quality-check-scoped`"
        - "Line 165: change `meridian:quality-check-scoped` to `quality-check-scoped`"
        - "Line 452: change `meridian:quality-check-scoped` to `quality-check-scoped`"
      action: modify

    # === DEPRECATED PLAY (no intent.yaml — direct edit is the only path) ===
    - file: "core/components/plays/report-issue/SKILL.md"
      role: "Deprecated alias play — no intent.yaml exists, SKILL.md is the direct source"
      required_changes:
        - "Line 2: change `name: \"meridian:report-issue\"` to `name: report-issue`"
        - "Line 9: change `# meridian:report-issue (DEPRECATED)` to `# report-issue (DEPRECATED)`"
      action: modify

    # === SKILLS (no intent.yaml — direct edit is always the path for skills) ===
    - file: "core/components/skills/quality-check-scoped/SKILL.md"
      role: "Skill invoked by review-pr — must be renamed BEFORE review-pr SKILL.md is updated"
      required_changes:
        - "Line 2: change `name: meridian:quality-check-scoped` to `name: quality-check-scoped`"
      action: modify
      ordering_constraint: "E1 — must precede review-pr SKILL.md edits (E5)"

    - file: "core/components/skills/quality-check/SKILL.md"
      role: "Quality check skill"
      required_changes:
        - "Line 2: change `name: meridian:quality-check` to `name: quality-check`"
      action: modify

    - file: "core/components/skills/distill/SKILL.md"
      role: "Distill skill (separate from distill play)"
      required_changes:
        - "Line 2: change `name: meridian:distill` to `name: distill`"
      action: modify

    - file: "core/components/skills/sync-claude/SKILL.md"
      role: "Sync skill"
      required_changes:
        - "Line 2: change `name: meridian:sync-claude` to `name: sync-claude`"
        - "Line 3: change description `Sync Meridian components` to `Sync Garura components`"
      action: modify

    # === LOW SEVERITY COSMETIC ===
    - file: "core/components/skills/author-intent-yaml/SKILL.md"
      role: "Skill with docstring example referencing `meridian:fix-it`"
      required_changes:
        - "Line 25: change example `meridian:fix-it` to `fix-it` in the description table"
      action: modify
      severity: low

  out_of_scope:
    - file: "core/components/skills/setup-branch/SKILL.md"
      line: 64
      reason: >
        `meridian: pre-branch stash for {branch_name}` is a git stash message string —
        not a namespace prefix. Different semantic context. Intentionally out of scope.

    - description: "Retroactively stripping `garura:` from the 8 plays already using it"
      reason: >
        Out of scope for this issue. Those plays are consistent within themselves.
        Uniform convention enforcement across all 22 plays is a separate decision.

  execution_plan:
    ordering_constraint: >
      E1 (quality-check-scoped skill rename) MUST precede E5 (review-pr SKILL.md updates)
      because review-pr references the skill by name. All other steps can run independently.

    steps:
      - id: E1
        description: >
          Update core/components/skills/quality-check-scoped/SKILL.md: change
          `name: meridian:quality-check-scoped` to `name: quality-check-scoped` on line 2.
          Must be first because review-pr SKILL.md references this name on lines 161, 165, 452.
        files:
          - path: "core/components/skills/quality-check-scoped/SKILL.md"
            action: modify
            details: "Line 2: meridian:quality-check-scoped → quality-check-scoped"
        expected_outcome: "name field reads `quality-check-scoped` with no prefix"
        self_test: "grep '^name:' core/components/skills/quality-check-scoped/SKILL.md outputs `name: quality-check-scoped`"

      - id: E2
        description: >
          Update remaining skills SKILL.md files: quality-check, skills/distill, sync-claude.
          Also update author-intent-yaml/SKILL.md docstring example (low severity).
          All independent of each other and independent of E1 (no cross-references between these).
        files:
          - path: "core/components/skills/quality-check/SKILL.md"
            action: modify
            details: "Line 2: meridian:quality-check → quality-check"
          - path: "core/components/skills/distill/SKILL.md"
            action: modify
            details: "Line 2: meridian:distill → distill"
          - path: "core/components/skills/sync-claude/SKILL.md"
            action: modify
            details: "Line 2: meridian:sync-claude → sync-claude; Line 3: `Sync Meridian components` → `Sync Garura components`"
          - path: "core/components/skills/author-intent-yaml/SKILL.md"
            action: modify
            details: "Line 25: example `meridian:fix-it` → `fix-it` in the description table"
        expected_outcome: "All four skills have bare names; sync-claude description references Garura"
        self_test: "grep -rn '^name:.*meridian:' core/components/skills/ returns no matches"

      - id: E3
        description: >
          Update report-issue/SKILL.md. Deprecated play, no intent.yaml — direct edit is
          the only path. Change name field and H1 header.
        files:
          - path: "core/components/plays/report-issue/SKILL.md"
            action: modify
            details: "Line 2: `name: \"meridian:report-issue\"` → `name: report-issue`; Line 9: H1 `# meridian:report-issue (DEPRECATED)` → `# report-issue (DEPRECATED)`"
        expected_outcome: "report-issue SKILL.md uses bare name"
        self_test: "grep '^name:' core/components/plays/report-issue/SKILL.md outputs `name: report-issue`"

      - id: E4
        description: >
          Add `name:` field to intent.yaml for fix-it, distill, review-pr. Fix the S1 scenario
          text in fix-it/reference/intent.yaml (line 161). These are source edits only — SKILL.md
          is handled separately in E5. Both E4 and E5 update the same logical unit (play
          definition) in the same commit, ensuring no drift.
        files:
          - path: "core/components/plays/fix-it/reference/intent.yaml"
            action: modify
            details: "Add `name: fix-it` as first line of file; change line 161 from `meridian:fix-it` to `fix-it` in S1 given text"
          - path: "core/components/plays/distill/reference/intent.yaml"
            action: modify
            details: "Add `name: distill` as first line of file"
          - path: "core/components/plays/review-pr/reference/intent.yaml"
            action: modify
            details: "Add `name: review-pr` as first line of file"
        expected_outcome: "Three intent.yaml files have correct name field; fix-it S1 scenario text corrected"
        self_test: "grep '^name:' core/components/plays/fix-it/reference/intent.yaml outputs `name: fix-it`"

      - id: E5
        description: >
          Update compiled SKILL.md files for fix-it, distill, review-pr — direct edit under
          documented exception (intent.yaml updated synchronously in E4, no drift introduced).
          fix-it has three locations: name field (line 2), H1 (line 7), status play field (line 526).
          distill: name field and H1. review-pr: name field, H1, and three quality-check-scoped
          references (lines 161, 165, 452 — must use new bare name from E1).
          Verify exact line numbers in SKILL.md before editing (lines cited from sweep at 2026-04-20).
        files:
          - path: "core/components/plays/fix-it/SKILL.md"
            action: modify
            details: "Line 2: `name: \"meridian:fix-it\"` → `name: fix-it`; Line 7: `# meridian:fix-it` → `# fix-it`; Line 526: `\"play\": \"meridian:fix-it\"` → `\"play\": \"fix-it\"`"
          - path: "core/components/plays/distill/SKILL.md"
            action: modify
            details: "Line 2: `name: meridian:distill` → `name: distill`; Update H1 header"
          - path: "core/components/plays/review-pr/SKILL.md"
            action: modify
            details: "Line 2: `name: meridian:review-pr` → `name: review-pr`; Update H1; Lines 161, 165, 452: `meridian:quality-check-scoped` → `quality-check-scoped`"
        depends_on: [E1, E4]
        expected_outcome: >
          All three compiled SKILL.md files use bare names; review-pr references
          quality-check-scoped without any prefix; fix-it status file play field updated.
        self_test: >
          grep -rn 'meridian:' core/components/plays/fix-it/SKILL.md core/components/plays/distill/SKILL.md
          core/components/plays/review-pr/SKILL.md returns no matches.

  task_list_init:
    - id: T1
      description: "Update quality-check-scoped/SKILL.md name field (E1) — must run first"
      status: pending
      retry_count: 0
      regression_test_path: ".garura/project/issues/310/evidence/fix-it/regression-test.yaml"

    - id: T2
      description: "Update remaining skills SKILL.md files — quality-check, distill, sync-claude, author-intent-yaml (E2)"
      status: pending
      retry_count: 0
      regression_test_path: ".garura/project/issues/310/evidence/fix-it/regression-test.yaml"

    - id: T3
      description: "Update report-issue/SKILL.md — deprecated play, direct edit (E3)"
      status: pending
      retry_count: 0
      regression_test_path: ".garura/project/issues/310/evidence/fix-it/regression-test.yaml"

    - id: T4
      description: "Add name: field to fix-it/distill/review-pr intent.yaml + fix S1 scenario text (E4)"
      status: pending
      retry_count: 0
      regression_test_path: ".garura/project/issues/310/evidence/fix-it/regression-test.yaml"

    - id: T5
      description: "Update compiled SKILL.md for fix-it/distill/review-pr — direct edit under exception (E5)"
      status: pending
      retry_count: 0
      regression_test_path: ".garura/project/issues/310/evidence/fix-it/regression-test.yaml"
      depends_on: [T1, T4]
