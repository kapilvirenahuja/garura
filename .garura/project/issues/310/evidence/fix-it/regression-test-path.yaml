regression_test_path: ".garura/project/issues/310/evidence/fix-it/regression-test.yaml"

summary:
  affected_file_count: 12
  breakdown:
    plays_intent_yaml: 3          # fix-it, distill, review-pr (add name: field)
    plays_skill_md_rebuild: 3     # fix-it, distill, review-pr (regenerated by /create-play --build)
    plays_skill_md_direct: 2      # report-issue (deprecated, no intent.yaml); fix-it (scenario text in intent.yaml)
    skills_skill_md_direct: 4     # quality-check-scoped, quality-check, distill, sync-claude
    cosmetic_low_severity: 1      # author-intent-yaml docstring example

  chosen_convention: drop_prefix
  convention_rationale: >
    Bare names are the plurality (10 of 22 plays). Compiled-example.md canonical reference
    uses bare name. Drop-prefix is simpler and removes namespace coupling in a single-framework
    repo with no collision risk.

  ordering_constraint: >
    quality-check-scoped skill rename (E1) must precede review-pr rebuild (E5) because
    review-pr references the skill by qualified name on lines 161, 165, 452 of SKILL.md.

  orchestrator_note: >
    E5 (/create-play --build for fix-it, distill, review-pr) is NOT a code-builder task.
    It is an orchestrator-run interactive step after E1-E4 are committed to the branch.
