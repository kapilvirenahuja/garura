skill: submit-pr
eval_type: step
intent_path: core/components/plays/create-pr/reference/intent.yaml
evals:
  - id: SE-SP-1
    name: "PR links originating issue"
    failure_condition: F1
    check: >
      Verify the created PR references the originating issue. The PR body or
      metadata must contain a link or reference (e.g., "Closes #N", "Fixes #N",
      or an explicit issue URL) that ties the PR back to the issue it addresses.
    pass_criteria: >
      The PR output (body text or platform metadata) contains at least one
      machine-parseable issue reference (closes/fixes/resolves keyword + issue
      number, or a full issue URL). A PR with zero issue references fails.

  - id: SE-SP-2
    name: "Eval results present in PR body when evals pass"
    failure_condition: F4
    check: >
      When eval_results input is provided and all evals passed, verify the
      formatted PR body contains an "Eval Results" section with a summary table
      showing pass/fail counts.
    pass_criteria: >
      The PR body includes a clearly labeled "Eval Results" section containing
      a summary table with pass counts. The section must not be empty or omitted
      when eval_results were provided. If eval_results input is absent, this
      eval is skipped (not applicable).

  - id: SE-SP-3
    name: "Eval failure details in PR body when evals have failures"
    failure_condition: F4
    check: >
      When eval_results input is provided and contains failures, verify the
      formatted PR body includes both the summary table and failure detail
      information so reviewers can see what failed.
    pass_criteria: >
      The PR body "Eval Results" section includes failure details (not just
      pass/fail counts) when any eval failed. Omitting failure specifics while
      including only a summary count fails this eval.

  - id: SE-SP-4
    name: "Low-confidence target branch requires user confirmation"
    failure_condition: F5
    check: >
      Verify the skill does not auto-submit a PR targeting a branch that was
      selected with less than high confidence. If the base branch decision
      confidence is below high, the play must have obtained user confirmation
      before the skill executes the create command.
    pass_criteria: >
      One of: (a) the base branch was selected with high confidence and the PR
      was created without additional confirmation, or (b) the base branch was
      selected with less than high confidence and evidence exists that the user
      confirmed the target branch before PR creation. A PR created against a
      low-confidence branch with no confirmation record fails.

  - id: SE-SP-5
    name: "Platform read from config, not hardcoded"
    constraint: C1
    check: >
      Verify the skill reads the git platform from project configuration
      (core/config.yaml) and loads the corresponding platform reference file
      rather than hardcoding a specific CLI tool (gh, glab, bb).
    pass_criteria: >
      The skill execution reads platform from core/config.yaml, loads the
      matching reference/{platform}/pr.md file, and uses commands from that
      reference. No hardcoded platform-specific CLI invocations appear outside
      the reference files. If the reference file for the configured platform
      does not exist, the skill halts with a structured failure rather than
      falling back silently.

  - id: SE-SP-6
    name: "Eval results section omitted when no evals provided"
    constraint: C6
    check: >
      When eval_results input is not provided (null or absent), verify the PR
      body does not contain a spurious or empty "Eval Results" section.
    pass_criteria: >
      The PR body has no "Eval Results" heading or section when eval_results
      was not provided as input. An empty section or placeholder text fails
      this eval.
