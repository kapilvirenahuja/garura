problem_statement: |
  Seven documentation files (agents.md, plays.md, skills.md, architecture.md,
  play-structure.md, memory.md, idsd.md) are stale relative to the current
  codebase after the Four Crafts / task-driven play refactor. Three cross-cutting
  defect categories affect all files: (1) all .meridian/ paths should be .garura/,
  (2) JSON contract examples show the old flat stm.* shape instead of the nested
  stm.input / stm.output shape mandated by ADR 016, (3) STM subfolder names
  spec/ / design/ / delivery/ are wrong — the whitelist is specs/ / evidence/ /
  checkpoint/ / context/ / review/. Beyond the cross-cutting issues, agents.md
  lists 7 of 19 agents; skills.md lists 8 of 46 skills and 16 of 22 plays;
  architecture.md carries two phantom agents (quality-validator, workflow-guardian)
  that do not exist; memory.md is missing the templates/ subdirectory and shows
  stale LTM org structure; play-structure.md and plays.md contain stale .meridian/
  path examples; idsd.md uses .meridian/ paths throughout its memory architecture
  diagrams.

solution_summary: |
  In-place defect patching across all seven target files. Step 1 sweeps all
  .meridian/ → .garura/ path replacements in a single pass per file so mechanical
  fixes land first. Steps 2-7 apply file-specific content corrections (roster
  expansions, JSON contract shape fix, phantom agent removal, LTM org structure,
  STM folder names). No file rewrites from scratch — each file is approximately
  90% correct and full rewrites risk regressing working content. Eight ADR files
  contain .meridian/ references and are in-scope for path fixes per Q2 resolution
  (fix any contradictions encountered). Markdown linting runs on all modified files
  after all edits are complete. Final grep verification confirms zero .meridian/
  hits, correct roster counts, correct contract shape, correct STM folder names.

files_to_create: []

