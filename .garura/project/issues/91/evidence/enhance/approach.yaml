risks:
  - description: |
      .meridian/ path occurrences inside code-block comments where the
      surrounding context is explaining the .meridian/ naming convention (e.g.,
      ADR 017, memory.md Folder whitelist section) — blindly replacing all
      occurrences would corrupt authoritative explanations.
    mitigation: |
      Surgical per-file edits rather than sed-based mass replace. For ADR 017,
      explicitly skip the file. For memory.md Folder whitelist (ADR 017) section,
      verify the diagram block is intentional .garura/ already — the discovery
      confirmed it is already correct and should not be touched.
    type: technical
    action: eval-driven
    ltm_reference: null
    generated_evals:
      - E1

  - description: |
      Expanding agents.md skill pool section (task 1c) may introduce inaccurate
      skill lists for agents whose SKILL.md files were not read. An invented skill
      pool is worse than an absent one.
    mitigation: |
      For each new agent added, read its definition file at
      core/components/agents/{agent-name}.md before adding its skill pool rows.
      If the definition is missing or the skill pool is undocumented, add the
      agent row with a "See agent definition" note rather than guessing.
    type: technical
    action: eval-driven
    ltm_reference: null
    generated_evals:
      - E2

  - description: |
      Removing quality-validator and workflow-guardian from architecture.md may
      leave the "Planned agents" section header orphaned or create a confusing gap
      in the Agents table (the table has a Status column implying future agents
      exist). Deleting rows without context may confuse readers about why no
      planned agents are listed.
    mitigation: |
      Delete the "Planned" status rows entirely. Remove the Status column from
      the table or replace it with a note: "All 19 agents implemented — see
      agents.md for full roster." This is the cleanest resolution; the "Planned"
      status is meaningless once the agents it referenced no longer exist.
    type: architectural
    action: approval-required
    ltm_reference: null
    generated_evals:
      - E7

  - description: |
      ADRs are historical records. Modifying path strings in ADR bodies risks
      making the ADR narrative inconsistent — for example ADR 008 may use
      .meridian/ as part of explaining the decision (not just as a path example),
      and changing it alters the historical context of the decision.
    mitigation: |
      Only replace .meridian/ in runtime path examples (code blocks, file paths,
      artifact location strings). Do NOT alter ADR prose that references the
      historical name .meridian/ when explaining why the decision was made. Read
      each affected ADR section before editing.
    type: architectural
    action: eval-driven
    ltm_reference: null
    generated_evals:
      - E1
      - E11

  - description: |
      skills.md removal of Available Plays section (task 3b) removes content
      that currently provides a cross-reference for users browsing skills. If
      plays.md is not prominently linked, users lose discoverability.
    mitigation: |
      Replace the Available Plays section with a redirect sentence and a link:
      "For the complete play roster, see [Plays Component Guide](./plays.md)."
      The Related Documentation section already links plays.md — the redirect
      keeps navigation intact.
    type: business
    action: eval-driven
    ltm_reference: null
    generated_evals:
      - E3

alternatives_considered:
  - description: |
      Full rewrite of each file from scratch using the canonical structure
      (H1 title, H2 sections, H3 subsections, tables, code blocks) rather than
      in-place defect patching.
    rejection_reason: |
      Each file is approximately 90% correct — the structure, philosophy,
      invocation model, and constraint documentation are all current. Full
      rewrites would risk regressing working content (e.g., the Four Crafts
      section in architecture.md, the JSON contract flow explanation in plays.md,
      the Silent Validation section in skills.md). In-place patching targets only
      the specific defect categories identified in understanding.md and minimizes
      blast radius.

  - description: |
      Sed-based mass replace of .meridian/ → .garura/ across all docs/ in a
      single shell command, combined with targeted manual fixes for content
      defects.
    rejection_reason: |
      .meridian/ appears in code-block contexts where the surrounding text is
      explaining the naming convention (ADR 017, memory.md Folder whitelist
      section). A mass replace would corrupt ADR 017's historical record of the
      folder naming decision. Surgical per-file edits with explicit skip of
      ADR 017 is required.

  - description: |
      Scope cap — treat ADRs as immutable historical records and exclude all 8
      ADR files from the PR, fixing only the 7 primary target files.
    rejection_reason: |
      Q2 resolution explicitly authorizes fixing any docs encountered that
      contradict current state. ADR files 008, 009, 010, 011, 015, 016, and 002
      contain .meridian/ runtime path examples that contradict the current
      .garura/ path convention — the same defect as the primary targets. Leaving
      ADRs stale while fixing all component docs creates an inconsistent
      documentation set where ADRs and components disagree on path conventions.
      ADR 017 is the only ADR that should be left unchanged.
