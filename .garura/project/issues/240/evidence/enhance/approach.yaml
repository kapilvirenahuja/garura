problem_statement: |
  capture-learning (Mode 2) requires manual invocation after epic completion and
  depends on prepare-epic's context/ directory. Quick learnings from individual
  commits, bug fixes, and routine PR merges are systematically missed because no
  one remembers to run a separate play after every merge. Mode 1 closes this gap
  by inserting a lightweight, non-blocking learning extraction step into the ship
  play immediately after merge. Trivial PRs produce no output; non-trivial PRs
  stage 1-2 learning proposals to STM for optional later review. Failure never
  blocks ship.

solution_summary: |
  Add a new non-blocking Step 4 to ship that invokes a new `capture-learning-fast`
  sub-play after merge-pr. The sub-play delegates to knowledge-extractor (new FAST
  mode) which reads the merged PR diff and any available issue STM evidence to
  decide whether learnings exist. If yes, it writes a lightweight proposals.yaml to
  {stm_base}/{issue}/evidence/capture-learning-fast/. If no, it returns a no-op.
  Ship continues to scenario validation regardless of Mode 1 outcome. Proposals are
  never written directly to product LTM — they are staged only, awaiting optional
  human review via a future /capture-learning --review command. The knowledge-extractor
  agent is extended with a FAST mode (no context/ prerequisite), keeping all LTM
  reconciliation logic in one place for future Mode 2 alignment.

files_to_create:
  - path: core/components/plays/capture-learning-fast/SKILL.md
    purpose: |
      The sub-play that ship chains (non-blocking). Minimal orchestrator that
      reads config, fetches the merged PR diff via gh, invokes knowledge-extractor
      in FAST mode via a JSON contract, writes proposals to STM, and returns
      gracefully on any failure. user-invokable: false (fire-and-forget, not
      meant for standalone use outside ship).

  - path: core/components/plays/capture-learning-fast/reference/intent.yaml
    purpose: |
      Intent definition for the capture-learning-fast play. Defines constraints
      (C1: no context/ required, C2: non-blocking always, C3: stage-only no product
      LTM writes) and failure conditions (F1: failure must not halt ship, F2: no
      direct product LTM writes).

  - path: core/components/skills/capture-learning-fast/SKILL.md
    purpose: |
      The analysis skill invoked by knowledge-extractor in FAST mode. Receives
      PR diff content, issue body, and STM evidence path. Applies lightweight
      learning signal detection (diff topology, STM evidence presence, domain
      signals). Produces a minimal proposals.yaml or a no-op marker. user-invocable:
      false, model: sonnet.

  - path: core/components/skills/capture-learning-fast/templates/proposals-output.md
    purpose: |
      Output template for proposals.yaml produced by the capture-learning-fast skill.
      Defines the lightweight proposal schema: issue, pr_number, analyzed_at,
      no_learnings flag, and proposals array (target, section, proposed_content,
      evidence_diff_reference). Forward-compatible with Mode 2 reconciliation-proposals.yaml
      top-level keys.

files_to_modify:
  - path: core/components/agents/knowledge-extractor.md
    changes: |
      Add a new FAST operating mode section alongside ANALYZE and ENRICH. FAST mode
      input contract: { "mode": "fast", "pr_diff": "<diff content>",
      "stm_base": "<path>", "product_base": "<path>", "issue_body": "<text>" }.
      Steps: (1) read diff header (git show --stat), (2) assess diff topology for
      trivial signals (docs-only, version bumps, formatting), (3) read any STM
      evidence from {stm_base}/{issue}/evidence/ (enhance/, fix-it/) if present,
      (4) invoke capture-learning-fast skill for proposal generation if non-trivial,
      (5) write proposals.yaml or return no-op. No context/ required. Max 1-2
      proposals. Output path: {stm_base}/{issue}/evidence/capture-learning-fast/proposals.yaml.

  - path: core/components/plays/ship/reference/intent.yaml
    changes: |
      Add constraint C8: "After merge-pr, ship MUST invoke capture-learning-fast as
      a non-blocking step. Failure of capture-learning-fast MUST NOT halt ship or
      prevent scenario validation. The step is fire-and-forget." Add scenario S4:
      persona Developer, given "The ship pipeline completes on a non-trivial PR with
      STM evidence from enhance/fix-it", then "learning proposals are staged at
      {stm_base}/{issue}/evidence/capture-learning-fast/proposals.yaml; ship
      evidence file records Mode 1 outcome; product LTM is unchanged."

  - path: core/components/plays/ship/SKILL.md
    changes: |
      DIRECT EDIT (compiled artifact exception for this enhance play — see risk R1).
      (1) Add Step 4 "Post-merge Learning Capture" block after the Merge & Cleanup
      phase and before current Step 4 Scenario Validation. Step 4 invokes
      capture-learning-fast with explicit non-blocking wrapper: on success OR failure,
      log outcome and continue. (2) Renumber current Step 4 (Scenario Validation)
      to Step 5, and current Step 5 (Evidence & Close) to Step 6. (3) Update the
      Phase: Evidence & Close section to include Mode 1 outcome in the evidence file.
      (4) Add "capture-learning-fast": { "status": "pending" } to the status file
      JSON schema in Pause and Resume section. (5) Update Compilation Metadata
      sub_plays count from 4 to 5.

connections:
  - Ship's sub-play chain gains a new non-blocking entry point after merge-pr; the
    existing step numbering (4→5, 5→6) is the only structural change to ship's flow.
  - knowledge-extractor's operating modes expand from two (ANALYZE/ENRICH) to three
    (ANALYZE/ENRICH/FAST), with FAST sharing no inputs with the existing modes (no
    context/ required) — forward-compatible via the mode discriminant field already
    present in the input contract.
  - PR number needed by Mode 1 is read from {stm_base}/{issue}/evidence/create-pr/
    — the same STM path that create-pr already writes in ship's Step 2.
  - proposals.yaml schema uses the same top-level keys as Mode 2's
    reconciliation-proposals.yaml (issue, analyzed_at, total_proposals, proposals[])
    to enable future mode alignment without a migration.
  - Ship's evidence file (Step 6) already collects per-step outcomes; Mode 1 adds
    a "capture-learning-fast" block to the existing evidence template.
  - Ship's status file already tracks per-task status; Mode 1 adds one entry
    ("capture-learning-fast") to the existing tasks map — resume logic unchanged.

tasks:
  - id: 1
    name: Extend knowledge-extractor with FAST mode
    description: |
      Edit core/components/agents/knowledge-extractor.md. Add a "### FAST Mode"
      section after the ENRICH Mode section. Document: input contract (mode: fast,
      pr_diff, stm_base, product_base, issue_body), steps (diff topology check →
      STM evidence scan → invoke capture-learning-fast skill → write proposals.yaml
      or return no-op), output contract (proposals_path or no_learnings: true),
      failure protocol (same as existing modes). Update the "Operating Modes" table
      at the top to include FAST. Update the Input Contract and Output Contract
      sections to add FAST mode variants.
    depends_on: []

  - id: 2
    name: Create capture-learning-fast skill SKILL.md
    description: |
      Create core/components/skills/capture-learning-fast/SKILL.md. Follow the
      frontmatter pattern from analyze-changes (user-invocable: false, model: sonnet,
      allowed-tools: Bash, Read, Write, Grep, Glob). Write sections: Purpose
      (lightweight diff-to-proposal analysis; explicit decision boundary), Input
      (pr_diff content, stm_base, product_base, issue_body, any available STM
      evidence paths), Process (numbered steps: assess diff, scan STM, classify
      learnings, write proposals.yaml via template), Output (references
      templates/proposals-output.md), Constraints (1-2 proposals max, never write
      to product LTM, always write proposals to stm_base path, trivial diff → no
      output file), Version table.
    depends_on: [1]

  - id: 3
    name: Create proposals-output.md template
    description: |
      Create core/components/skills/capture-learning-fast/templates/proposals-output.md.
      Define the proposals.yaml schema as a Markdown template with YAML code block.
      Schema fields: issue (string), pr_number (string), analyzed_at (ISO-8601),
      no_learnings (bool), proposals (array of: target_path, section, proposed_content,
      evidence_diff_reference, confidence: low|medium|high), total_proposals (int).
      Include comments showing how each field maps to Mode 2's reconciliation-proposals.yaml
      for future alignment.
    depends_on: [2]

  - id: 4
    name: Create capture-learning-fast play intent.yaml
    description: |
      Create core/components/plays/capture-learning-fast/reference/intent.yaml.
      Define: intent (one-line purpose), constraints C1 (no context/ prerequisite
      — works with PR diff and whatever STM is available), C2 (non-blocking — any
      failure must be caught and logged, never propagated to ship), C3 (stage-only
      — proposals.yaml written to STM only, never to product LTM), failure conditions
      F1 (failure halts ship — forbidden) and F2 (direct product LTM write — forbidden),
      scenarios S1 (non-trivial PR with STM evidence → proposals staged) and
      S2 (trivial PR → no-op, no file written).
    depends_on: [1]

  - id: 5
    name: Create capture-learning-fast play SKILL.md
    description: |
      Create core/components/plays/capture-learning-fast/SKILL.md. Frontmatter:
      name: capture-learning-fast, user-invokable: false, description (one-liner).
      Sections: Role (minimal orchestrator, delegates to knowledge-extractor),
      Pre-flight (read config for stm_base + product_base; read PR number from
      {stm_base}/{issue}/evidence/create-pr/ STM output; get PR diff via
      "gh pr diff {pr_number}"; fail gracefully if any of these fail),
      Workflow (single step: invoke knowledge-extractor FAST mode via JSON contract,
      write outcome to evidence), Failure Handling (explicit try/catch — any failure
      returns {status: "skipped", reason: <error>} rather than propagating),
      Output (returns outcome struct: {status: completed|skipped, proposals_path:
      <path>|null, no_learnings: bool}).
    depends_on: [1, 2, 3, 4]

  - id: 6
    name: Update ship reference/intent.yaml
    description: |
      Edit core/components/plays/ship/reference/intent.yaml. Add constraint C8
      (non-blocking post-merge learning capture — failure must not halt ship).
      Add scenario S4 (persona: Developer; given: ship completes on a non-trivial
      PR with enhance/fix-it STM evidence; then: proposals.yaml staged at correct
      STM path, ship evidence records Mode 1 outcome, product LTM unchanged).
      No changes to existing C1-C7 or F1-F7 or S1-S3.
    depends_on: [5]

  - id: 7
    name: Update ship SKILL.md (direct edit — compiled artifact exception)
    description: |
      Directly edit core/components/plays/ship/SKILL.md. (1) After the "Phase:
      Merge & Cleanup" section (Step 3), insert new "Phase: Post-merge Learning
      Capture" section with Step 4 invoking capture-learning-fast. Wrap invocation
      in explicit non-blocking handler. On failure: log "{Step 4: capture-learning-fast
      skipped — <error>}" and continue. (2) Rename current "Phase: Scenario
      Validation" heading from Step 4 to Step 5, and current "Phase: Evidence &
      Close" from Step 5 to Step 6. (3) In Step 6 evidence template, add
      "capture-learning-fast outcome" field. (4) In Pause and Resume status JSON,
      add "capture-learning-fast": {"status": "pending"} entry between merge-pr
      and scenario-evals. (5) In Compilation Metadata, update sub_plays count from
      4 to 5 and add a note "Step 4 (capture-learning-fast) added by enhance/#240
      — intent.yaml updated in sync but SKILL.md compiled hash will not match until
      next /create-play --build ship run."
    depends_on: [5, 6]

evals:
  - id: E1
    description: capture-learning-fast play exists with correct structure
    pass_criteria: |
      core/components/plays/capture-learning-fast/SKILL.md exists with name:
      capture-learning-fast, user-invokable: false, and a Workflow section that
      includes a JSON contract invocation of knowledge-extractor with mode: "fast".
      reference/intent.yaml exists with C1, C2, C3, F1, F2, S1, S2 defined.
    fail_criteria: |
      SKILL.md missing OR knowledge-extractor not invoked in FAST mode OR
      intent.yaml missing any of C1, C2, C3.

  - id: E2
    description: Ship SKILL.md has non-blocking Step 4 for capture-learning-fast
    pass_criteria: |
      Ship SKILL.md contains "Step 4" that invokes capture-learning-fast. The step
      has explicit failure handling: "On failure: log warning and continue to Step 5."
      Old Step 4 (Scenario Validation) is now labeled Step 5. Old Step 5 (Evidence
      & Close) is now labeled Step 6. Status file JSON includes
      "capture-learning-fast" task entry.
    fail_criteria: |
      Step 4 missing OR old steps not renumbered OR failure handling causes halt
      ("On failure: halt") OR status file schema not updated.

  - id: E3
    description: knowledge-extractor has FAST mode with correct input contract
    pass_criteria: |
      knowledge-extractor.md contains a "### FAST Mode" section. Input contract
      includes mode: "fast", pr_diff, stm_base, product_base, issue_body. No
      context_base field in FAST mode input. Output contract includes proposals_path
      and no_learnings fields. Operating modes table includes FAST.
    fail_criteria: |
      FAST mode section missing OR input contract includes context_base requirement
      OR output contract missing no_learnings field.

  - id: E4
    description: Proposals are staged to STM, never written to product LTM
    pass_criteria: |
      capture-learning-fast skill SKILL.md Constraints section explicitly prohibits
      writing to product_base. Proposals output path is always under {stm_base},
      not {product_base}. knowledge-extractor FAST mode output path spec uses
      {stm_base}/{issue}/evidence/capture-learning-fast/proposals.yaml.
    fail_criteria: |
      proposals output path references product_base OR Constraints section does
      not explicitly prohibit product LTM writes.

  - id: E5
    description: Trivial detection is content-based, not hardcoded
    pass_criteria: |
      knowledge-extractor FAST mode steps describe agent-driven trivial decision
      (analyze diff topology, check file types, assess STM evidence presence).
      No hardcoded file extension lists or regex patterns in SKILL.md. The decision
      is explicitly delegated to the agent's judgment.
    fail_criteria: |
      Trivial detection uses hardcoded patterns (e.g., "if diff only contains .md
      files") rather than agent judgment. OR trivial detection is absent entirely
      (always produces proposals).

  - id: E6
    description: Ship intent.yaml updated with C8 and S4
    pass_criteria: |
      core/components/plays/ship/reference/intent.yaml contains constraint C8
      (non-blocking learning capture rule) and scenario S4 (post-merge learning
      scenario with persona, given, then). Existing C1-C7 and S1-S3 unchanged.
    fail_criteria: |
      C8 or S4 missing. OR existing constraints or scenarios modified.

  - id: E7
    description: Ship SKILL.md Compilation Metadata notes the direct-edit deviation
    pass_criteria: |
      Compilation Metadata section includes a note about the enhance/#240 direct edit
      and states that the intent_hash will not match until next /create-play run.
      sub_plays count updated to 5.
    fail_criteria: |
      No deviation note in Compilation Metadata OR sub_plays count not updated.

risks:
  - description: |
      Direct edit to ship SKILL.md (a compiled artifact) creates version drift —
      the intent_hash guard will detect mismatch on next /create-play --build ship
      run, potentially confusing future maintainers about why the hash doesn't match.
    mitigation: |
      (1) Update intent.yaml in sync with SKILL.md changes. (2) Add a clear note to
      Compilation Metadata explaining the enhance/#240 direct-edit exception and
      that the next /create-play run will reconcile the hash. (3) Document in the
      approach that this is an intentional exception per enhance play design.

  - description: |
      knowledge-extractor FAST mode may produce low-signal proposals when STM
      evidence is absent (ship was run without a preceding enhance/fix-it play) —
      the diff alone may not provide enough context for high-confidence learning
      extraction.
    mitigation: |
      FAST mode steps include an explicit low-context path: when no STM evidence
      is found in {stm_base}/{issue}/evidence/, the agent runs diff-only analysis
      with maximum 1 proposal and confidence: "low". The proposals.yaml carries a
      confidence field so the reviewer can filter accordingly.

  - description: |
      Large PR diffs (>500 lines changed) may cause slow or token-heavy analysis,
      delaying ship's completion even though Mode 1 is supposed to be "fast".
    mitigation: |
      knowledge-extractor FAST mode reads git show HEAD --stat first (file-level
      summary only). If total changed lines exceeds 500, it analyzes the stat
      summary rather than the full diff, limiting token usage while preserving
      the ability to detect learning signals from file names and change volume.

  - description: |
      capture-learning-fast status in ship.json marked as "failed" (instead of
      "skipped") on error could cause confusing resume behavior — ship resumes
      from Step 4 on next run and re-attempts Mode 1 unnecessarily.
    mitigation: |
      Non-blocking design uses "skipped" (not "failed") as the status on any
      capture-learning-fast error. This matches how ship handles the review-pr
      bypass skip. Resume logic skips "completed" AND "skipped" entries.

alternatives_considered:
  - description: |
      Embed Mode 1 analysis inline in ship's workflow without creating a sub-play —
      ship directly reads the diff and calls knowledge-extractor without any
      capture-learning-fast wrapper.
    rejection_reason: |
      Violates ship's Structure C architectural constraint: "Forbidden: Direct agent
      invocations for domain work. All domain work is delegated to sub-plays."
      Embedding analysis directly in ship's orchestrator would require relaxing this
      core constraint and coupling ship to LTM reconciliation logic, making ship
      harder to reason about and test independently.

  - description: |
      Create a new standalone agent (fast-knowledge-extractor) instead of adding a
      FAST mode to the existing knowledge-extractor agent.
    rejection_reason: |
      Creates duplicate LTM reconciliation logic that must be maintained separately
      from Mode 2's ANALYZE/ENRICH modes. Risks the two implementations diverging
      over time and making Mode 2 alignment (planned for future) harder.
      understanding.md explicitly recommends extending knowledge-extractor to keep
      all LTM reconciliation in one place.

  - description: |
      Auto-write proposals directly to product LTM after ship completes, with a
      "dry-run" flag to preview what would be written.
    rejection_reason: |
      Violates acceptance criteria for issue #240: "Learning proposals staged to STM,
      not auto-written to product LTM." Product LTM is a durable, human-reviewed
      artifact. Auto-writes from a fast/lightweight analysis (without the full
      context baseline of Mode 2) would introduce low-confidence content into
      the product's knowledge base without a review gate.

  - description: |
      Add Mode 1 as a new --fast parameter to the existing capture-learning play
      instead of creating a separate capture-learning-fast play.
    rejection_reason: |
      capture-learning's pre-flight enforces hard requirements incompatible with
      ship context: issue must be CLOSED (ship runs before close), context/ from
      prepare-epic must exist (not present for enhance/fix-it flows), and the
      play requires explicit user invocation. Mode 1's fire-and-forget, non-blocking
      nature requires a separate execution surface with different pre-conditions
      and failure handling.
