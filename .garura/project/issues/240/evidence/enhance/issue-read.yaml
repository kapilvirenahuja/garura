number: 240
title: "capture-learning Mode 1: lightweight post-merge learning extraction in ship"
state: open
labels:
  - enhancement
body: |
  ## Problem

  capture-learning currently requires manual invocation after epic completion (Mode 2). Quick learnings from individual commits, bug fixes, and PR merges are systematically missed because no one remembers to run a separate play after every merge.

  ## Context

  From the capture-learning overhaul discussion (#236), three modes were identified:

  1. **Mode 1 (this issue)** — Fast. Runs on a single issue/commit/PR. Extracts surgical learnings: why did this bug come? What in our tech or domain knowledge needs adjustment? Writes 1-2 product LTM artifacts at most.
  2. **Mode 2 (#236)** — Middle. Runs on the full prepare→implement→validate trinity. Full product reconciliation.
  3. **Mode 3 (separate issue)** — Full codebase bootstrap. Derives product LTM from scratch.

  ## Proposed Approach

  Implement Mode 1 as a **post-merge step in the ship play**, not a standalone play:

  - After ship completes the merge, run Mode 1 as a non-blocking final step
  - Reads the issue's STM (RCA, design artifacts, implementation report) + the PR diff
  - Compares against existing product LTM to identify what was learned
  - If learnings detected: stages proposals to STM, prints summary: `N learning candidates staged — run capture-learning --review to approve`
  - If nothing learned (typo fix, dep bump): prints `no learnings detected` — zero friction
  - **No human gate inline** — review happens async to keep ship fast
  - Extraction failures do NOT block the merge (fire-and-forget)

  ## Enrichment Targets (surgical, 1-2 per run)

  - `research/{domain}.md` — Experiential section updates (bug patterns, failure modes)
  - `architecture/*.yaml` — Decision validation annotations
  - `scope/epics/{epic-id}.yaml` — Delivery status updates

  ## Acceptance Criteria

  - [ ] Mode 1 skill exists and is invocable from ship
  - [ ] Ship play updated with post-merge Mode 1 step (non-blocking)
  - [ ] Trivial PRs (no RCA, no design artifacts) produce no output
  - [ ] Learning proposals staged to STM, not auto-written to product LTM
  - [ ] Extraction failure does not block or fail the ship play

  ## Relationships

  - Depends on: #236 (Mode 2 — defines the enrichment target inventory and formats)
  - Related: Mode 3 (bootstrap-product — separate issue)
