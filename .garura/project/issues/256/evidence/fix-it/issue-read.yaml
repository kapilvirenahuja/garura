issue:
  number: 256
  title: "[TECH-DEBT] Remove .factory/ tree from repo"
  state: OPEN
  labels:
    - refactor
  url: https://github.com/kapilvirenahuja/garura/issues/256
  body: |
    ## Problem

    The `.factory/` tree (Factory Droids deployment artifacts — droids, skills, research, validation fixtures) is currently committed at the repo root. It duplicates content that lives canonically under `core/components/` and is regenerated by the `sync-droids` skill on demand. Keeping it in-repo:

    - Inflates the sweep surface during renames (the Meridian → Garura rebrand had to reason about `.factory/**` every pass; it was excluded from commit-level sweeps because it's regenerated, but the on-disk tree still contains stale Meridian references).
    - Duplicates source-of-truth content, inviting drift between `core/components/` and `.factory/skills/`.
    - Adds noise to clones and to grep-based investigations.

    ## Expected behavior

    `.factory/` should stay gitignored (already is — `.gitignore:18`) and be removed from the working tree. Contributors who need the Factory Droids deployment run `/sync-droids --project` on demand.

    ## Impact

    - Smaller clones.
    - Single source of truth for components (`core/components/`).
    - Future renames / sweeps only touch living content.

    ## Root cause (hypothesis)

    `.factory/` was checked in before the gitignore entry was added, or force-added at some point. The `/sync-droids` skill was introduced later.

    ## Specific issues

    - [ ] Remove `.factory/` from the working tree (`git rm -r .factory/` — gitignore already in place).
    - [ ] Verify `/sync-droids --project` reproduces a correct `.factory/` locally after removal.
    - [ ] Confirm no other component references the on-disk `.factory/` path (they should all read `core/components/`).

    ## Evidence

    - `.gitignore:18` — `.factory/` already listed.
    - `sync-droids` skill deploys components to `.factory/` on demand.
    - Surfaced during the Meridian → Garura rebrand (`feat/mdb-engine` branch, April 2026): `.factory/` was skipped from the rename sweep because it's ephemeral; the stale Meridian-named content still sits in the working tree.
  type_hint: refactor
