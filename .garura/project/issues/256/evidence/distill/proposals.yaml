    content: |
      # Git Tracking Audit Pattern

      <!-- knowledge-file: tier=1 scope=project -->

      **When this applies:** When an issue or defect report claims that a directory
      or file is "committed to the repo" and needs `git rm` to remove it.

      **When this does NOT apply:** When git status or git ls-files already confirm
      the file is tracked — proceed directly to the fix.

      **Search patterns:** git rm, untracked, gitignored, factory tree, committed
      directory, git ls-files, verify tracked, issue hypothesis, false premise

      **Provenance:** Issue #256 — [TECH-DEBT] Remove .factory/ tree from repo

      **Created:** 2026-04-19

      ## Content

      Before running `git rm` on a directory claimed to be tracked in an issue,
      run the 4-step git tracking audit to verify the actual state:

      ### Audit Steps

      ```bash
      # Step 1: Check if any files are tracked
      git ls-files <path>/

      # Step 2: Check gitignore effectiveness
      git check-ignore -v <path>/

      # Step 3: Check git history on all branches
      git log --oneline --all -- <path>/**

      # Step 4: Check on-disk state
      ls -la <path>/
      ```

      ### Interpretation

      | git ls-files | check-ignore | Correct action |
      |-------------|--------------|----------------|
      | Empty output | Shows ignore rule | Use `rm -rf` (NOT `git rm`) |
      | Lists files | No ignore rule | Use `git rm -r` |
      | Empty output | No ignore rule | Untracked but not ignored — use `rm -rf` |

      ### Why this matters

      Issue descriptions often contain hypotheses about git state that were correct
      at authoring time but are no longer true (e.g., gitignore was added later).
      Running `git rm -r` on an untracked path errors with "pathspec did not match
      any file(s) known to git" — an unhelpful failure that does not advance the fix.

      Verifying actual tracked state before choosing the removal command eliminates
      this class of false-premise errors and produces the correct operation (`rm -rf`
      vs `git rm -r`) on the first attempt.

      ### Example

      Issue #256 claimed `.factory/` was committed before gitignore. Audit revealed:
      - `git ls-files .factory/` → empty (no tracked files)
      - `git check-ignore -v .factory/` → `.gitignore:18:.factory/` (rule in effect)
      - `git log --all -- .factory/**` → no commits on any branch
      - `ls .factory/` → directory exists on disk with stale content

      Correct operation: `rm -rf .factory/` (not `git rm -r .factory/`).
