               - **R1** — Identify decision domains from task intent and `query_domains`
               - **R2** — Query `project_base` (LOCKED artifacts are authoritative; stop
                 descending for that domain. DRAFT artifacts are advisory; continue to R3.)
               - **R3** — Query `core_base` via `_index.md` and search_patterns headers
               - **R4** — Flag unresolved domains as `resolved_from: "llm"` in trace

               Write resolution trace to `{stm_base}/{issue}/evidence/{play}/resolution-trace.yaml`.
               Add `resolution_trace_path` to output contract's `stm.output` block.

               **When `ltm_context` is absent:** Search `~/.meridian/core/memory/` for
               domain-relevant content as before. Standards and templates referenced by
               intent constraints. Schemas needed by skills. Domain knowledge relevant
               to the product vertical. Pass discovered LTM paths to skills as input.
