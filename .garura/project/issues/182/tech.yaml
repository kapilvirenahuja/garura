          content: |
            "ltm_context": {
              "project_base": "<root path for project-scoped knowledge — optional field>",
              "core_base": "~/.meridian/core/memory/",
              "query_domains": ["<domain categories to consult>"],
              "locked_artifacts": ["<filenames with LOCKED authority>"]
            }
          note: "Entire ltm_context block is optional — omit entirely when not needed"

        - section: "Input Contract field definitions table"
          what: "Add row for ltm_context field"
          add_after: "| `task_id` | Yes | Compiled step ID | Unique within the play. Also used as key in the status file for pause/resume. |"
          content: |
            | `ltm_context` | No | Play populates when agent should consult organizational knowledge | Optional context block. When present, agent follows R1-R4 from `resolution-protocol.md`. When absent, agent operates exactly as before. Sub-fields: `project_base` (path), `core_base` (path, default `~/.meridian/core/memory/`), `query_domains` (string[]), `locked_artifacts` (string[], filenames only). |

        - section: "Output Contract JSON block"
          what: "Add resolution_trace_path optional field to stm.output in the JSON example"
          add_after: '"<named_key>": "<actual path written>"'
          content: |
            "resolution_trace_path": "<path to resolution-trace.yaml in STM, present when ltm_context was provided>"
          note: "resolution_trace is written to file, not embedded inline (DD10)"

        - section: "Output Contract field definitions table"
          what: "Add row for resolution_trace_path field"
          add_after: "| `error` | `null` on success. Structured failure object on failure (per `structured-failure-protocol.md`) |"
          content: |
            | `resolution_trace_path` | Written when `ltm_context` was provided in input. Path to resolution-trace.yaml artifact in STM. Null when no ltm_context was present. |

        - section: "End of file — new section"
          what: "Add Knowledge Context section explaining when to use ltm_context"
          add_at_end: true
          content: |
            ## Knowledge Context

            The `ltm_context` input field is how workflows tell agents where to find
            organizational knowledge. When present, agents follow the R1-R4 protocol
            defined in `resolution-protocol.md`.

            **When to populate:**
            - Any workflow dispatching a participating domain agent (tech-designer,
              product-strategist, repo-orchestrator, code-builder, quality-auditor)
            - Populate with paths and domains appropriate to the workflow's knowledge needs

            **When NOT to populate (unconditional exemptions):**
            - eval-generator — context-isolated by design (INV4)
            - judge — context-isolated by design (INV4)

            **Standard population pattern:**
            ```json
            "ltm_context": {
              "project_base": "{product_base or equivalent project knowledge path}",
              "core_base": "~/.meridian/core/memory/",
              "query_domains": ["{relevant domain categories}"],
              "locked_artifacts": ["{filenames of LOCKED project artifacts if any}"]
            }
            ```

            **locked_artifacts semantics:** Filenames (not paths) in this list are
            treated as authoritative within the project layer. When both a locked and
            a draft artifact answer the same domain question, the locked artifact wins
            (DD6). Empty or absent means all project knowledge is advisory (DRAFT).

    - path: "core/components/agents/tech-designer.md"
      component: "agent-updates"
      feature: "F1"
      file_changes:
        - section: "Context Loading — between Step 2 and Step 3"
          what: "Add Step 2b — LTM Context Resolution (conditional on ltm_context presence)"
          insert_between:
            after_text: "### Step 2: Identify Technical Domain"
            before_text: "### Step 3: Selective LTM Search"
          content: |
            ### Step 2b: LTM Context Resolution (when ltm_context is present)

            If the input contract contains `ltm_context`, follow the R1-R4 protocol
            from `resolution-protocol.md` BEFORE the selective LTM search in Step 3.

            **R1** — Identify decision domains from the task intent and
            `ltm_context.query_domains`.

            **R2** — For each domain, glob `ltm_context.project_base` for relevant
            files. Match against `search_patterns` metadata (keyword comparison only
            — no LLM calls per INV1). If a file is listed in
            `ltm_context.locked_artifacts`, it is LOCKED (authoritative) — use it,
            stop descending for that domain. If DRAFT, use as advisory input and
            continue to R3 for confirmation.

            **R3** — For domains not resolved (or only DRAFT-resolved) in R2, search
            `ltm_context.core_base` via `_index.md` and `search_patterns` headers.
            All core-scoped findings are advisory (`authority: draft`).

            **R4** — Domains with no answer from R2 or R3 are flagged as
            `resolved_from: "llm"`. Proceed with general reasoning for these domains.
            These entries are learning candidates for the `learn` play.

            Write resolution trace to:
            `{stm_base}/{issue}/evidence/{play}/resolution-trace.yaml`

            Add `resolution_trace_path` to the output contract's `stm.output` block.

            **When ltm_context is absent:** Skip this step entirely. Proceed directly
            to Step 3. Agent behavior is identical to pre-protocol operation (INV3).

        - section: "Context Loading — Step 3 modification"
          what: "Clarify that Step 3 (Selective LTM Search) runs when ltm_context is absent OR supplements Step 2b"
          note: >
            Step 3 remains the fallback behavior when ltm_context is absent.
            When ltm_context IS present, Step 2b has already loaded the relevant
            LTM; Step 3 may still run to catch anything not covered by query_domains.
            No text change to Step 3 required — Step 2b's instruction to skip is
            sufficient for backward compatibility.

        - section: "Output Contract"
          what: "Add resolution_trace_path to the example return JSON"
          add_to_stm_output: |
            "resolution_trace_path": null
          note: "null when ltm_context was absent; path string when written"

