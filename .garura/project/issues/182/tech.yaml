# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# Logical groupings of files with clear ownership and boundaries.
# ─────────────────────────────────────────────────────────────────────────────

components:

  contract-schema:
    description: >
      The universal play→agent communication protocol. This component owns
      the ltm_context and resolution_trace field additions. It is the foundation
      all other components depend on — no agent or play update is valid without
      the schema being authoritative first.
    files:
      - "core/components/memory/standards/agent-contract.md"
    feature: "F1"
    phase: 1

  resolution-protocol:
    description: >
      The normative R1-R4 protocol document and the ADR that records the
      architectural decision. Together these form the authoritative specification
      that agent updates must conform to.
    files:
      - "core/components/memory/standards/rules/resolution.md"
      - "docs/adr/015-ltm-resolution-protocol.md"
    feature: "F1"
    phase: 1

  agent-updates:
    description: >
      Five agent definition files updated to follow the R1-R4 protocol when
      ltm_context is present. tech-designer, product-strategist, and repo-
      orchestrator receive full R1-R4 with resolution_trace. code-builder and
      quality-auditor receive optional ltm_context awareness only (advisory,
      no resolution_trace required). eval-generator and judge are explicitly
      exempt — not in this component.
    files:
      - "core/components/agents/tech-designer.md"
      - "core/components/agents/product-strategist.md"
      - "core/components/agents/repo-orchestrator.md"
      - "core/components/agents/code-builder.md"
      - "core/components/agents/quality-auditor.md"
    feature: "F1"
    phase: 2

  play-updates:
    description: >
      Seven play SKILL.md files updated to populate ltm_context in agent
      dispatch contracts. Two of these (prepare-architecture, prepare-implementation)
      additionally remove ad-hoc LTM references and replace with the standard field.
      Changes are additive — one optional field added per relevant agent contract.
    files:
      - "core/components/plays/discover-product/SKILL.md"
      - "core/components/plays/plan-roadmap/SKILL.md"
      - "core/components/plays/prepare-architecture/SKILL.md"
      - "core/components/plays/prepare-implementation/SKILL.md"
      - "core/components/plays/implement-epic/SKILL.md"
      - "core/components/plays/commit-code/SKILL.md"
      - "core/components/plays/create-pr/SKILL.md"
    feature: "F2"
    phase: 3

  learning-play:
    description: >
      The learn play and the knowledge-extractor agent that powers it. Provides
      the feedback loop from completed work back to persistent knowledge layers.
      Reads resolution traces (read-only), extracts LLM-fallback candidates,
      deduplicates, presents human approval gate, writes approved candidates
      to knowledge layers in canonical format. Resolves PENDING C5-C10 from
      capture-learning.
    files:
      - "core/components/agents/knowledge-extractor.md"
      - "core/components/plays/learn/reference/intent.yaml"
      - "core/components/plays/learn/SKILL.md"
      - "core/components/plays/capture-learning/reference/intent.yaml"  # modify only
    feature: "F3"
    phase: 4

  knowledge-standard:
    description: >
      The canonical knowledge file template. Required for all new files written
      by the learning play. Existing files are grandfathered. Defines Tier 1
      and Tier 2 metadata, search pattern conventions, index registration rules,
      and staleness tracking.
    files:
      - "core/components/memory/standards/templates/knowledge-file.md"
    feature: "F4"
    phase: 1

# ─────────────────────────────────────────────────────────────────────────────
# FEATURE MAPPING
# Which component delivers which feature.
# ─────────────────────────────────────────────────────────────────────────────

feature_mapping:

  F1:
    name: "Context Resolution Protocol"
    delivered_by:
      - "contract-schema"       # ltm_context + resolution_trace fields
      - "resolution-protocol"   # normative R1-R4 spec + ADR
      - "agent-updates"         # agents that follow R1-R4
    depends_on: []

  F2:
    name: "Knowledge Hierarchy Enforcement"
    delivered_by:
      - "play-updates"        # workflows that populate ltm_context
    depends_on: ["F1"]          # plays wire to agents that already understand R1-R4

  F3:
    name: "Learning Play"
    delivered_by:
      - "learning-play"       # knowledge-extractor + learn play
    depends_on: ["F1", "F2"]   # needs resolution traces (F1) from populated workflows (F2)

  F4:
    name: "Knowledge File Standard"
    delivered_by:
      - "knowledge-standard"    # knowledge-file-template.md
    depends_on: []              # independent — consumed by F3 at write time

# ─────────────────────────────────────────────────────────────────────────────
# DATA MODELS
# Exact schemas for every new data structure. These are the authoritative
# definitions — agent files and play files reference these schemas.
# ─────────────────────────────────────────────────────────────────────────────

data_models:

  ltm_context:
    description: >
      New optional field added to agent input contracts. When present, the agent
      follows R1-R4 from resolution-protocol.md. When absent, agent operates
      exactly as before (INV3).
    schema:
      project_base:
        type: string
        description: "Root path for project-level LTM artifacts"
        example: ".meridian/product/"
        resolved_from: "core/config.yaml product.base-path"
      core_base:
        type: string
        description: "Root path for core LTM"
        value: "~/.meridian/core/memory/"
        resolved_from: "core/config.yaml ltm.global-target"
      query_domains:
        type: "string[]"
        description: "Knowledge domains the agent should consult (directory names or category strings)"
        examples: ["architecture", "patterns", "standards", "coding-standards", "standards/git"]
      locked_artifacts:
        type: "string[]"
        description: "Filenames at project_base with LOCKED status — authoritative. Filenames only, not full paths."
        examples: ["product.yaml", "architecture.yaml", "quality-standards.yaml"]
    json_example: |
      {
        "ltm_context": {
          "project_base": ".meridian/product/",
          "core_base": "~/.meridian/core/memory/",
          "query_domains": ["architecture", "patterns", "standards"],
          "locked_artifacts": ["product.yaml", "architecture.yaml"]
        }
      }

  resolution_trace:
    description: >
      New optional field in agent output. Path to resolution trace YAML file
      written to STM. Written when ltm_context was provided in input. Per DD10,
      the trace is a FILE in STM — not embedded inline in the output contract.
      The output contract carries only the path.
    entry_schema:
      decision:
        type: string
        description: "What domain question was resolved (e.g., 'Which branching strategy applies?')"
      resolved_from:
        type: enum
        values: ["project", "core", "llm", "web_research"]
        description: "Which layer provided the answer"
      source:
        type: "string | null"
        description: "File path that provided the answer, null for LLM fallback"
      section:
        type: "string | null"
        description: "Section within the source file, null for LLM fallback"
      authority:
        type: enum
        values: ["locked", "draft", "none"]
        description: "'locked' if filename is in ltm_context.locked_artifacts; 'draft' for all other knowledge files; 'none' for LLM fallback"
      value:
        type: string
        description: "Brief (1-2 sentence) summary of the resolved decision value"
      stale:
        type: "boolean | null"
        description: "true if the source file's last_validated exceeds its staleness_window; null otherwise"
    json_example: |
      {
        "resolution_trace": [
          {
            "decision": "Deployment platform",
            "resolved_from": "project",
            "source": ".meridian/product/architecture/architecture.yaml",
            "section": "deployment",
            "authority": "locked",
            "value": "Cloud Run — locked in architecture.yaml",
            "stale": null
          },
          {
            "decision": "CSS utility approach",
            "resolved_from": "llm",
            "source": null,
            "section": null,
            "authority": "none",
            "value": "Tailwind flex layout — no project or core knowledge found",
            "stale": null
          }
        ]
      }
    output_contract_field: |
      "resolution_trace_path": "{stm_base}/{issue}/evidence/{play}/resolution-trace.yaml"

  knowledge_candidate:
    description: "Output schema for knowledge-extractor agent EXTRACT mode. Intermediate artifact in candidates.yaml."
    schema:
      id:
        type: string
        format: "KC-{NNN}"
        description: "Unique identifier within this extraction run"
      source_issue:
        type: string
        description: "Issue number or work context where the decision occurred"
      source_trace_path:
        type: string
        description: "Path to the resolution trace file this entry came from"
      domain_question:
        type: string
        description: "The decision field from the resolution trace entry"
      llm_answer_summary:
        type: string
        description: "The value field from the resolution trace entry — what the agent decided via general reasoning"
      proposed_scope:
        type: enum
        values: ["project", "core"]
        description: "'project' if decision is specific to this project; 'core' if generally applicable across projects"
      proposed_scope_rationale:
        type: string
        description: "One sentence explaining the scope classification"
      dedup_status:
        type: enum
        values: ["unique", "near-duplicate", "duplicate"]
        description: "'unique' — no existing coverage; 'near-duplicate' — partial overlap; 'duplicate' — exact match (excluded from approval queue)"
      merge_target:
        type: "string | null"
        description: "Path to existing file for near-duplicate or duplicate cases"
      approval_status:
        type: enum
        values: ["pending", "approved", "rejected"]
        description: "Set to 'pending' by extractor. Operator edits to 'approved' or 'rejected'."
    candidates_yaml_example: |
      extraction_run:
        issue: "182"
        run_date: "2026-03-26"
        traces_scanned: 3
        total_candidates: 4
        unique_candidates: 3
        duplicate_candidates: 1
      candidates:
        - id: "KC-001"
          source_issue: "182"
          source_trace_path: ".meridian/project/issues/182/evidence/implement-epic/resolution-trace.yaml"
          domain_question: "Which CSS utility framework aligns with the project profile?"
          llm_answer_summary: "Tailwind CSS selected — no project or core knowledge found"
          proposed_scope: "project"
          proposed_scope_rationale: "Technology choice specific to this project's frontend stack"
          dedup_status: "unique"
          merge_target: null
          approval_status: "pending"

  knowledge_file:
    description: "Canonical knowledge file structure per knowledge-file-template.md"
    tier_1_required:
      - "# {Title}"
      - "<!-- knowledge-file: tier=1 scope=project|core -->"
      - "**When this applies:** {trigger condition}"
      - "**When this does NOT apply:** {exclusion condition}"
      - "**Search patterns:** {comma-separated keywords}"
      - "**Provenance:** {issue or work context}"
      - "**Created:** {YYYY-MM-DD}"
      - "## Content"
      - "## Why It Matters"
    tier_2_required_for_core:
      - "## Applicability Boundaries"
      - "  **In scope:** {conditions}"
      - "  **Out of scope:** {conditions}"
      - "## Rationale"
      - "## Decay Tracking"
      - "  **Last validated:** {YYYY-MM-DD}"
      - "  **Confidence:** high | medium | low"
      - "  **Staleness window:** {e.g., 180 days}"
      - "  **Supersedes:** {path or null}"
    decay_rules:
      stale_threshold: "configurable per file via staleness_window field"
      stale_behavior: "flag in resolution traces — file remains usable, not auto-rejected (DD7)"
      confidence_levels: ["high", "medium", "low"]
      supersession: "new file sets Supersedes to old file path; old file moves to _superseded/"

# ─────────────────────────────────────────────────────────────────────────────
# RESOLUTION PROTOCOL — Full Definition
# Embedded here for implementer reference. Canonical text goes in
# core/components/memory/standards/rules/resolution.md.
# ─────────────────────────────────────────────────────────────────────────────

resolution_protocol:
  name: "R1-R4 Agent Resolution Protocol"
  standard_path: "core/components/memory/standards/rules/resolution.md"
  steps:
    R1:
      name: "Identify decision domains"
      description: "From task intent and ltm_context.query_domains, determine the relevant knowledge categories for this invocation"
      inputs: ["task intent", "ltm_context.query_domains"]
      output: "list of domain topics to check in R2 and R3"

    R2:
      name: "Query project LTM"
      description: "For each domain, search project_base for relevant knowledge files. Match search_patterns metadata against domain topic."
      inputs: ["domain topic list from R1", "ltm_context.project_base", "ltm_context.locked_artifacts"]
      resolution_semantics:
        locked: "Authoritative — use this, stop descending for this domain"
        draft: "Advisory — use as input, flag authority as draft, continue to R3 for confirmation"
        not_found: "Layer has no opinion on this topic — descend to R3"
      locked_determination: "A file is LOCKED when its filename (not path) appears in ltm_context.locked_artifacts"
      conflict_rule: "When both LOCKED and DRAFT artifacts answer the same domain question, LOCKED wins. Record in trace."

    R3:
      name: "Query core LTM"
      description: "For domains not resolved or only DRAFT-resolved in R2, search core_base. Check _index.md then search_patterns headers."
      inputs: ["unresolved domain topics from R2", "ltm_context.core_base"]
      resolution_semantics:
        found: "Advisory — record resolved_from: 'core', authority: 'draft'"
        not_found: "Layer has no opinion — descend to R4"
      project_over_core: "When both R2 (DRAFT) and R3 both have an answer, project-scoped (R2) wins (INV5). Record in trace."

    R4:
      name: "Flag LLM fallback"
      description: "Domains with no answer from R2 or R3 proceed with general reasoning. Record resolved_from: 'llm', authority: 'none'."
      learning_signal: "LLM fallback entries are primary candidates for the learn play. Each represents a knowledge gap."

  not_found_semantics:
    - condition: "File does not exist at the path"
      meaning: "Layer has no opinion"
      behavior: "Descend to next layer"
    - condition: "File exists, search_patterns do not match domain topic"
      meaning: "Layer has no opinion on this specific topic"
      behavior: "Descend to next layer"
    - condition: "File exists, section exists, filename NOT in locked_artifacts"
      meaning: "Advisory opinion (DRAFT)"
      behavior: "Use as input, flag authority: draft, descend for confirmation"
    - condition: "File exists, section exists, filename IS in locked_artifacts"
      meaning: "Authoritative opinion (LOCKED)"
      behavior: "Use this. Stop descending for this domain."

  conflict_resolution:
    project_over_core: "Project always wins over core when both answer the same question (INV5)"
    locked_over_draft: "LOCKED always wins over DRAFT within the project layer (DD6)"
    trace_requirement: "All conflicts are logged in resolution trace with both layers noted"

  invariants:
    INV1: "Resolution is file reads + keyword matching only. No LLM calls during resolution."
    INV3: "When ltm_context is absent, skip R1-R4 entirely. Agent operates exactly as before."
    INV4: "eval-generator and judge never receive ltm_context from any play. Hard exemption."
    INV5: "Project-scoped knowledge overrides core-scoped knowledge on conflict."

