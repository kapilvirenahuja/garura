    - path: "core/components/memory/standards/rules/resolution.md"
      component: "resolution-protocol"
      feature: "F1"
      description: >
        Canonical definition of the R1-R4 protocol steps all participating agents
        must follow. Defines resolution ordering (project → core → llm-fallback),
        locked-vs-draft authority semantics, resolution trace output structure,
        context-isolation exemption rules, and backward-compatibility guarantees.
      full_content: |
        # Resolution Protocol

        The standard that all participating agents follow when `ltm_context` is
        present in their input contract. Defines the four-step resolution order,
        authority semantics, trace output requirements, and exemptions.

        Referenced by: tech-designer, product-strategist, repo-orchestrator

        ## Overview

        When an agent receives a contract containing `ltm_context`, it resolves
        domain questions against a three-layer hierarchy before falling back to
        general reasoning. The four steps are:

        - **R1** — Identify decision domains
        - **R2** — Query project-scoped knowledge (project_base)
        - **R3** — Query core-scoped knowledge (core_base)
        - **R4** — Flag LLM fallback

        If `ltm_context` is absent, the agent skips this entire section and
        operates exactly as it did before this protocol existed (INV3).

        ## R1 — Identify Decision Domains

        From the task intent and `ltm_context.query_domains`, determine the
        relevant knowledge categories for this invocation.

        - Use `query_domains` as the primary domain list
        - Supplement with domain categories implied by the task intent
        - Produce a list of domain topics that will be checked in R2 and R3

        ## R2 — Query Project-Scoped Knowledge

        For each domain topic from R1, search `ltm_context.project_base` for
        matching knowledge files.

        **Discovery method:** Read `search_patterns` metadata from candidate files.
        Match patterns against the domain topic. This is a keyword/string comparison
        only — no LLM calls, no semantic similarity (INV1).

        **Authority semantics:**

        | Condition | Meaning | Behavior |
        |-----------|---------|----------|
        | File does not exist | Layer has no opinion | Descend to next layer |
        | File exists, no matching section | Layer has no opinion on this topic | Descend to next layer |
        | File exists, matching section, DRAFT | Advisory opinion | Use as input, flag `authority: draft`, descend for confirmation |
        | File exists, matching section, LOCKED | Authoritative opinion | Use this. Record `authority: locked`. Do NOT descend further. |

        **LOCKED determination:** A file is LOCKED when its filename appears in
        `ltm_context.locked_artifacts`. All other project-scoped files are DRAFT.

        **Conflict:** When a LOCKED and a DRAFT artifact both answer the same domain
        question, the LOCKED artifact wins unconditionally. Record override in trace.

        ## R3 — Query Core-Scoped Knowledge

        For domain topics not resolved (or only DRAFT-resolved) in R2, search
        `ltm_context.core_base` for matching knowledge files.

        **Discovery method:** Check `{core_base}/_index.md` for category listings.
        Read `search_patterns` headers from candidate files in matching categories.
        Same keyword/string comparison as R2 (INV1).

        **Authority semantics:** All core-scoped files are advisory. Record
        `resolved_from: "core"`, `authority: "draft"`.

        **Project-over-core:** When both R2 (DRAFT) and R3 both answer the same
        domain question, the project-scoped (R2) answer is used (INV5).

        ## R4 — Flag LLM Fallback

        For domain topics that produced no answer from R2 or R3, the agent proceeds
        with general reasoning and records `resolved_from: "llm"` in the trace.

        LLM fallback entries are primary candidates for the `learn` play. Each
        fallback is a knowledge gap: the organization lacks persistent knowledge for
        this domain question and relies on general reasoning instead.

        ## Resolution Trace Output

        After completing R1-R4, write the resolution trace to STM:

        Path: `{stm_base}/{issue}/evidence/{play}/resolution-trace.yaml`

        ```yaml
        resolution_trace:
          - decision: "string — the domain question that was resolved"
            resolved_from: "project | core | llm"
            source: "relative file path, or null if llm"
            section: "section name within the source file, or null"
            authority: "locked | draft | none"
            value: "brief summary of the resolved decision value"
        ```

        Return the path to this file as `resolution_trace_path` in the output
        contract's `stm.output` block (per DD10 in tech.yaml).

        ## Context Isolation Exemptions

        The following agents NEVER receive `ltm_context` from any workflow. No
        play populates this field for them under any circumstances (INV4):

        - **eval-generator** — Must not see implementation code or prior outputs
        - **judge** — Receives only encrypted evals and the codebase

        Any play that attempts to pass `ltm_context` to either agent must be
        treated as a defect.

        ## Backward Compatibility

        When `ltm_context` is absent from the input contract:
        - Skip this entire section
        - No trace is produced
        - Agent behavior is identical to pre-protocol operation
        - No errors, no warnings, no degradation (INV3)

        ## Staleness Handling

        When a file used in R2 or R3 has a `last_validated` field that exceeds
        its `staleness_window`, add a `stale: true` flag to that resolution trace
        entry. Stale files remain usable — the flag is a signal, not a rejection.

    - path: "core/components/memory/standards/templates/knowledge-file.md"
      component: "knowledge-standard"
      feature: "F4"
      description: >
        Canonical knowledge file structure. Defines Tier 1 and Tier 2 metadata
        requirements, staleness flagging rules, and index registration conventions.
      full_content: |
        # Knowledge File Template

        This is the canonical template for all knowledge files written by the
        `learn` play. Existing files are grandfathered. New files must conform
        from day one.

        Two tiers of metadata exist:
        - **Tier 1** — Required for ALL knowledge files (project-scoped and core-scoped)
        - **Tier 2** — Additionally required for CORE-SCOPED files only

        ## Tier 1 Template (Required for All Files)

        ```markdown
        # {Title}
        <!-- knowledge-file: tier=1 scope=project|core -->

        **When this applies:** {one-line trigger condition — when should an agent use this?}
        **When this does NOT apply:** {one-line exclusion condition — when should this be ignored?}
        **Search patterns:** {comma-separated keywords agents match against domain topics}
        **Provenance:** {issue number or work context that produced this knowledge}
        **Created:** {YYYY-MM-DD}

        ## Content

        {The knowledge itself — decisions made, patterns, standards, conventions.
        Written at the level of a concise decision record, not a tutorial.}

        ## Why It Matters

        {The rationale — what goes wrong if an agent does not have this knowledge
        and relies on general reasoning instead?}
        ```

        ## Tier 2 Extension (Additionally Required for Core-Scoped Files)

        Append these sections after "Why It Matters" for core-scoped files:

        ```markdown
        ## Applicability Boundaries

        **In scope:** {conditions under which this knowledge applies}
        **Out of scope:** {conditions where this knowledge must NOT be used}

        ## Rationale

        {Why this is organizational knowledge rather than project-specific convention.
        What makes it reusable across projects?}

        ## Decay Tracking

        **Last validated:** {YYYY-MM-DD}
        **Confidence:** high | medium | low
        **Staleness window:** {e.g., 90 days, 180 days}
        **Supersedes:** {path to prior file, or null}
        ```

        ## Staleness Rule

        A core-scoped file is flagged stale when:
        `(current_date - last_validated) > staleness_window`

        Staleness appears as a warning in resolution traces when the file is used
        as a source. Stale files are NOT auto-rejected — they remain advisory.
        Operators see the staleness flag and can decide to re-validate or replace.

        ## Index Registration

        Every new knowledge file MUST have an entry in the appropriate category
        index. Index file location: `{scope_base}/{category}/_index.md`

        Index entry format:
        ```markdown
        - [{Title}]({filename}) — {one-line summary} | Patterns: {search patterns}
        ```

        ## Validation Checklist

        Before a file is considered complete:

        Tier 1 checks (all files):
        - [ ] Title is present and non-empty
        - [ ] scope annotation is set (project or core)
        - [ ] When this applies is present
        - [ ] When this does NOT apply is present
        - [ ] Search patterns field has at least 2 patterns
        - [ ] Provenance references an issue or work context
        - [ ] Created date is present
        - [ ] Content section is non-empty
        - [ ] Why It Matters section is present

        Tier 2 checks (core-scoped files only):
        - [ ] Applicability Boundaries section present with both In scope and Out of scope
        - [ ] Rationale section explains cross-project applicability
        - [ ] Decay Tracking section present with all four fields

        Index checks:
        - [ ] Entry added to appropriate _index.md

    - path: "core/components/agents/knowledge-extractor.md"
      component: "learning-play"
      feature: "F3"
      description: >
        New agent responsible for STM-to-LTM promotion. Two modes: EXTRACT (scan
        resolution traces, produce candidates.yaml) and WRITE (write approved
        candidates to knowledge layers in canonical format).
      full_content: |
        ---
        name: knowledge-extractor
        domain: knowledge
        role: extractor
        description: Extracts LLM-fallback decisions from resolution traces and promotes approved candidates to persistent knowledge layers. Two modes: EXTRACT (scan traces, produce candidates) and WRITE (write approved candidates to knowledge layers).
        model: sonnet
        tools:
          - Read
          - Write
          - Glob
          - Grep
        ---

        # knowledge-extractor

        ## Identity

        You are the knowledge-extractor — the agent that closes the feedback loop
        from completed work back to persistent organizational knowledge.

        **Domain:** Knowledge lifecycle (extraction, classification, deduplication, promotion)
        **Role:** Read resolution traces, extract LLM-fallback candidates, write approved
        candidates to knowledge layers in canonical format

        ## Core Principle

        You are READ-ONLY against your inputs. You NEVER modify resolution traces,
        evidence artifacts, or any STM artifact from prior work. You ONLY write to
        knowledge layers (and only when operating in WRITE mode with approved candidates).

        ## Operating Modes

        ### EXTRACT Mode

        **Input:** List of resolution trace file paths from STM.
        **Output:** `candidates.yaml` written to STM output path.

        Steps:
        1. Read each resolution trace file at the provided paths
        2. Extract all entries where `resolved_from == "llm"`
        3. For each extracted entry, produce a knowledge_candidate:
           - `id`: KC-{NNN} (sequential within this extraction run)
           - `source_issue`: extract from trace file path context
           - `source_trace_path`: the trace file this entry came from
           - `domain_question`: the `decision` field from the trace entry
           - `llm_answer_summary`: the `value` field from the trace entry
           - `proposed_scope`: "project" if the decision is specific to this
             project's conventions, technologies, or domain; "core" if the
             decision represents a general-purpose pattern applicable across projects
           - `proposed_scope_rationale`: one sentence explaining the classification
           - `dedup_status`: check against existing knowledge files in both layers;
             "unique" if no coverage found, "duplicate" if exact match found (exclude
             from approval queue), "near-duplicate" if partial overlap found (surface
             alongside existing entry)
           - `dedup_conflict_path`: path to conflicting existing file, or null
           - `approval_status`: "pending"
        4. Write `candidates.yaml` to `stm.output.candidates_path`
        5. Duplicates are NOT presented in the approval queue — set `dedup_status: duplicate`
           and exclude from the YAML candidates list surface for operator review

        ### WRITE Mode

        **Input:** Approved `candidates.yaml` (already reviewed and edited by operator).
        **Constraint (INV2):** Only write candidates where `approval_status == "approved"`.
        Skip all others — no partial writes, no inference.

        Steps:
        1. Read `candidates.yaml` from `stm.input.candidates_path`
        2. For each candidate with `approval_status: "approved"`:
           a. Determine target layer: project or core (from `proposed_scope`)
           b. Determine target path from `proposed_scope`:
              - project: `{ltm_context.project_base}/knowledge/{domain_slug}.md`
              - core: `{ltm_context.core_base}/knowledge/{domain_slug}.md`
           c. Write file in canonical knowledge-file-template.md format:
              - Tier 1 always (all files)
              - Tier 2 additionally for core-scoped files
           d. Update appropriate `_index.md` with new entry
        3. Return output contract with list of written file paths

        ## Input Contract

        ```json
        {
          "intent_path": "core/components/plays/learn/reference/intent.yaml",
          "stm_base": "{stm_base}",
          "task_id": "{task_id}",
          "mode": "extract | write",
          "ltm_context": {
            "project_base": "{project_base}",
            "core_base": "~/.meridian/core/memory/"
          },
          "stm": {
            "input": {
              "trace_paths": ["{stm_base}/{issue}/evidence/{play}/resolution-trace.yaml"],
              "candidates_path": null
            },
            "output": {
              "candidates_path": "{stm_base}/{issue}/evidence/learn/candidates.yaml"
            }
          }
        }
        ```

        In WRITE mode: `stm.input.candidates_path` is non-null (points to reviewed
        candidates.yaml). `stm.input.trace_paths` is not read in WRITE mode.

        ## Output Contract

        ```json
        {
          "status": "completed | failed",
          "task_id": "{echoed}",
          "stm": {
            "output": {
              "candidates_path": "{path to written candidates.yaml}",
              "written_files": ["{paths to knowledge files written, WRITE mode only}"]
            }
          },
          "summary": {
            "traces_scanned": 0,
            "total_llm_fallbacks": 0,
            "unique_candidates": 0,
            "duplicate_candidates": 0,
            "approved_written": 0
          },
          "step_failure": null
        }
        ```

        ## Boundaries

        ### NEVER
        - Modify resolution traces or evidence artifacts
        - Write knowledge files in EXTRACT mode
        - Write knowledge files without `approval_status: "approved"`
        - Write a candidate to the wrong scope layer (project-scoped → project layer, core → core layer)
        - Create new directories not specified in the output path

        ### ALWAYS
        - Check existing knowledge files for duplication before finalizing candidates
        - Use knowledge-file-template.md format for all written files
        - Register every written file in the appropriate _index.md
        - Return summary statistics in output contract

    - path: "core/components/plays/learn/reference/intent.yaml"
      component: "learning-play"
      feature: "F3"
      description: >
        Intent definition for the learn play. Uses the canonical 4-field schema.
        Resolves PENDING constraints C5-C10 from capture-learning/reference/intent.yaml.
      full_content: |
        intent: >
          Surface LLM-fallback decisions from resolution traces produced by F1/F2
          workflows. Extract each fallback as a classified knowledge candidate.
          Deduplicate against existing knowledge layers. Present candidates for
          human approval (Tether/Vanish). Write approved candidates to the correct
          knowledge layer in canonical knowledge-file-template.md format.

        constraints:
          - id: "C1"
            description: "Read-only against resolution traces and evidence — never modify input artifacts"
          - id: "C2"
            description: "INV2: No knowledge may be written without explicit human approval (approval_status: approved)"
          - id: "C3"
            description: "INV4: Do not feed promoted knowledge back to context-isolated agents (eval-generator, judge)"
          - id: "C4"
            description: "INV5: Scope classification respects project-over-core — project-specific decisions stay in project layer"
          - id: "C5"
            description: "Zero-candidate case is not an error — produce a clean summary and exit without showing empty approval queue"
          - id: "C6"
            description: "Duplicates are detected before the approval queue — exact duplicates are excluded, near-duplicates are surfaced with the existing entry"

        failure_conditions:
          - "Knowledge is written to any layer without explicit human approval"
          - "LLM-fallback entries in resolution traces are ignored and not surfaced as candidates"
          - "A candidate classified as project-scoped is written to the core-scoped layer, or vice versa"
          - "A duplicate candidate is presented without a dedup flag and the existing entry shown"
          - "The play modifies any resolution trace or evidence artifact (it must be read-only against its inputs)"
          - "The approval queue is shown when zero candidates exist"

        scenarios:
          - "S12: all llm-fallback trace entries produce candidates"
          - "S13: only approved candidates are written"
          - "S14: duplicate detection triggers merge proposal"
          - "S15: zero candidates → clean exit with evidence"
          - "S16: scope classification assigns project vs core correctly"
          - "S17: written candidate lands in the correct scope layer"

    - path: "core/components/plays/learn/SKILL.md"
      component: "learning-play"
      feature: "F3"
      description: >
        Compiled learn play. L1 (human-invocable). Two-step: Step 1 (extract
        candidates), Step 2 (human approval gate + write approved). Max 2 agent
        calls (L1 constraint). Read-only against resolution traces throughout.
      full_content: |
        ---
        name: learn
        description: Surface LLM-fallback decisions from resolution traces and promote approved candidates to persistent knowledge layers. Invoke after work completes to close the knowledge feedback loop.
        user-invocable: true
        ---

        # learn

        Scan resolution traces from completed work for LLM-fallback decisions.
        Extract each fallback as a classified knowledge candidate. Present for
        human approval. Write approved candidates to the correct knowledge layer
        in canonical format.

        ## Compiled From

        This play was compiled from `reference/intent.yaml` by `/create-play`.
        Intent defines constraints (C1-C6) and failure conditions.
        To modify this play, update `reference/intent.yaml` and re-run
        `/create-play --rebake learn`.
        Do NOT edit this file manually — it is a compiled artifact.

        ## Role

        You are the orchestrator. You own the task graph and checkpoints.
        Delegate domain work to knowledge-extractor. Never read or modify
        resolution traces or evidence artifacts directly.

        **Forbidden:** Direct reads of resolution traces. Direct writes to knowledge
        layers. Direct inspection of candidate content. All domain work goes through
        knowledge-extractor agent.

        **Agent boundaries:**

        | Agent | Domain | Steps |
        |-------|--------|-------|
        | `knowledge-extractor` | Candidate extraction, dedup check, knowledge writes | 1 (EXTRACT), 2 (WRITE) |

        ## Pre-flight

        | Check | Action on Failure |
        |-------|------------------|
        | Resolve `stm_base` from `core/config.yaml` | Hard halt |
        | Resolve `product_base` from `core/config.yaml` | Hard halt |
        | `--issue` argument provided | Hard halt — must specify which issue's traces to scan |
        | Resolution trace(s) exist at `{stm_base}/{issue}/evidence/*/resolution-trace.yaml` | Graceful exit — no traces means nothing to learn from |

        ```bash
        stm_base=$(grep 'base-path' core/config.yaml | ...)
        issue="$ISSUE_ARG"
        trace_paths=$(find {stm_base}/{issue}/evidence -name "resolution-trace.yaml")
        # if no trace_paths found: graceful exit with message "No resolution traces found for issue {issue}"
        ```

        ## Workflow

        ### Step 1 — Extract Knowledge Candidates

        Owner: `knowledge-extractor`
        Mode: EXTRACT

        ```json
        {
          "intent_path": "core/components/plays/learn/reference/intent.yaml",
          "stm_base": "{stm_base}",
          "task_id": "extract-candidates",
          "mode": "extract",
          "ltm_context": {
            "project_base": "{product_base}",
            "core_base": "~/.meridian/core/memory/"
          },
          "stm": {
            "input": {
              "trace_paths": ["{stm_base}/{issue}/evidence/{play}/resolution-trace.yaml"],
              "candidates_path": null
            },
            "output": {
              "candidates_path": "{stm_base}/{issue}/evidence/learn/candidates.yaml"
            }
          }
        }
        ```

        Agent scans all resolution traces, extracts llm-fallback entries, classifies
        scope, checks for duplicates, writes candidates.yaml.

        **Expected return:** Contract with `stm.output.candidates_path` populated.

        **If `summary.unique_candidates == 0`:** Write evidence confirming zero
        candidates found and exit cleanly. Do NOT show approval queue (C5).

        ---

        ### Checkpoint: Candidate Review

        Present the candidates.yaml content to the operator:

        ```
        ## Knowledge Candidates for Review

        {N} candidate(s) found from {traces_scanned} resolution trace(s).

        Review the candidates below. For each candidate, set approval_status to:
        - approved — write this to the knowledge layer
        - rejected — discard, do not write

        Candidates file: {stm.output.candidates_path}

        {display candidates table: id | domain_question | proposed_scope | dedup_status}

        ---

        Edit candidates.yaml to set approval_status per candidate, then type
        **Tether** to proceed or **Vanish** to cancel.
        ```

        On **Vanish**: abort. No writes. Record cancellation in evidence.
        On **Tether**: proceed to Step 2.

        ---

        ### Step 2 — Write Approved Candidates

        Owner: `knowledge-extractor`
        Mode: WRITE

        ```json
        {
          "intent_path": "core/components/plays/learn/reference/intent.yaml",
          "stm_base": "{stm_base}",
          "task_id": "write-candidates",
          "mode": "write",
          "ltm_context": {
            "project_base": "{product_base}",
            "core_base": "~/.meridian/core/memory/"
          },
          "stm": {
            "input": {
              "trace_paths": null,
              "candidates_path": "{stm.output.candidates_path from Step 1}"
            },
            "output": {
              "candidates_path": "{same path — for summary update}",
              "written_files": []
            }
          }
        }
        ```

        Agent reads candidates.yaml, writes ONLY `approval_status: approved` entries
        to correct knowledge layers in canonical knowledge-file-template.md format.
        Updates _index.md for each written file.

        **Expected return:** Contract with `stm.output.written_files` list.

        ## Evidence

        Write summary to `{stm_base}/{issue}/evidence/learn/summary.yaml`:
        ```yaml
        run_date: "{date}"
        issue: "{issue}"
        traces_scanned: {N}
        candidates_extracted: {N}
        candidates_approved: {N}
        candidates_rejected: {N}
        files_written:
          - path: "{knowledge file path}"
            scope: "project | core"
        ```

