# ─────────────────────────────────────────────────────────────────────────────
# LIBRARIES AND DEPENDENCIES
# ─────────────────────────────────────────────────────────────────────────────

libraries_and_dependencies:
  external: []
  note: >
    This is a pure framework enhancement — all artifacts are markdown and YAML.
    No new runtime libraries, packages, SDKs, or build tools are introduced.
    The only "dependencies" are within the Meridian framework itself:
    the contract schema (agent-contract.md) must be updated before agent
    definitions, which must be updated before play SKILL.md files.

  internal_dependencies:
    - from: "agent-updates"
      to: "contract-schema"
      type: "schema conformance"
      reason: "Agents reference ltm_context and resolution_trace fields defined in agent-contract.md"

    - from: "play-updates"
      to: "agent-updates"
      type: "behavioral dependency"
      reason: "Plays populate ltm_context only after agents are defined to handle it"

    - from: "play-updates"
      to: "contract-schema"
      type: "schema conformance"
      reason: "ltm_context field in play contracts conforms to the schema in agent-contract.md"

    - from: "learning-play"
      to: "resolution-protocol"
      type: "reads"
      reason: "knowledge-extractor reads resolution traces whose structure is defined by R1-R4"

    - from: "learning-play"
      to: "knowledge-standard"
      type: "writes to"
      reason: "Approved candidates are written as knowledge files conforming to knowledge-file-template.md"

    - from: "learning-play"
      to: "play-updates"
      type: "consumes output of"
      reason: "Resolution traces are only produced when workflows populate ltm_context (F2)"

# ─────────────────────────────────────────────────────────────────────────────
# DESIGN DECISIONS
# Key architectural choices from the spec. Captures the why behind each choice.
# ─────────────────────────────────────────────────────────────────────────────

design_decisions:

  DD1:
    title: "ltm_context is optional in the input contract"
    decision: >
      The ltm_context field is optional. Agents that do not receive it continue
      to function exactly as before. No agent throws an error or degrades when
      the field is absent.
    rationale: >
      Backward compatibility is unconditional (INV3). Making the field required
      would break every existing play that has not been updated. Phased rollout
      (F2 play updates) populates the field play-by-play without a flag day.
    alternative_rejected: >
      Making ltm_context required was considered and rejected specifically because
      it would break all existing plays before F2 work is complete.
    risk: >
      An agent that does not receive ltm_context falls back to its prior behavior
      (ad-hoc LTM loading or no LTM loading). This is the intended fallback,
      not a defect.

  DD2:
    title: "R1-R4 protocol is defined in a standards document, not embedded per agent"
    decision: >
      The resolution protocol is normative text in resolution-protocol.md. Agent
      definitions reference this standard rather than each embedding a copy of
      the protocol logic.
    rationale: >
      Five agents need this protocol. Embedding it per-agent creates five copies
      that diverge over time. A single standard document ensures all agents follow
      the same ordering, trace format, and authority semantics.
    alternative_rejected: >
      Inline per-agent definition was rejected specifically because of duplication
      and drift risk across five files.

  DD3:
    title: "eval-generator and judge are unconditionally exempt from ltm_context"
    decision: >
      eval-generator and judge do not receive ltm_context from any workflow, ever.
      No play populates the field for these agents.
    rationale: >
      Both agents are context-isolated by design (INV4). eval-generator must not
      see implementation code or prior outputs to avoid test-case optimization.
      judge receives only encrypted evals and the codebase. Providing organizational
      knowledge to either agent would contaminate the evaluation signal.
    risk: "None — this is a hard security invariant, not a performance tradeoff."

  DD4:
    title: "Resolution is bounded to file reads — no additional LLM calls"
    decision: >
      The R1-R4 protocol reads knowledge files and matches against search patterns.
      No LLM calls are introduced during resolution. Latency impact is bounded
      to file read operations.
    rationale: >
      INV1 requires this. Adding LLM calls during resolution would compound
      token cost, introduce latency variance, and create a resolution process
      that is itself nondeterministic — exactly the opposite of why the protocol
      exists.
    implementation_note: >
      "Match against search patterns" means the agent reads the search_patterns
      field in knowledge file metadata and checks whether any pattern matches
      the domain question topic. This is a string/keyword comparison — no
      semantic similarity computation, no embeddings.

  DD5:
    title: "project-scoped knowledge overrides core-scoped knowledge on conflict"
    decision: >
      When both project-scoped and core-scoped knowledge files answer the same
      domain question, the project-scoped answer is used. The override is
      unconditional and recorded in the resolution trace.
    rationale: >
      INV5. Project-specific conventions must be able to override general
      organizational defaults. A project using a non-standard branching model
      or a domain-specific naming convention must not be overridden by core
      knowledge that assumes different defaults.

  DD6:
    title: "LOCKED vs DRAFT authority within project-scoped knowledge"
    decision: >
      Within the project-scoped layer, some artifacts are LOCKED (authoritative)
      and others are DRAFT (advisory). Files listed in ltm_context.locked_artifacts
      are LOCKED. All others are DRAFT. When both a LOCKED and a DRAFT artifact
      cover the same domain question, the LOCKED artifact is used.
    rationale: >
      Not all project knowledge has the same authority level. A finalized
      architecture.yaml represents a committed decision. A draft notes file
      represents work in progress. Agents must be able to distinguish these
      without reading file content to determine authority.
    implementation_note: >
      locked_artifacts is a list of filenames, not paths. The agent checks
      whether the filename of the matched knowledge file appears in the list.

  DD7:
    title: "Staleness tracking does not auto-reject stale knowledge"
    decision: >
      Stale core-scoped knowledge files continue to be used as sources. The
      staleness flag appears in the resolution trace as a warning, not as a
      rejection. Automated remediation (archival, re-validation) is deferred.
    rationale: >
      Stale knowledge is better than no knowledge. Auto-rejection would force
      more LLM fallbacks, which are the exact gaps the learning play is
      designed to fill. Operators see the staleness flag and can decide to
      validate or replace the file through normal channels.
    deferred: >
      Automated staleness remediation is explicitly out of scope for this issue.
      It requires usage data that does not exist until the resolution protocol
      has been running for some time.

  DD8:
    title: "learn play is separate from capture-learning — archival vs. promotion are distinct concerns"
    decision: >
      The learn play is a new, independent play. It does not extend or modify
      capture-learning.
    rationale: >
      capture-learning is about archival — preserving completed work artifacts
      for historical reference. learn is about promotion — extracting valuable
      decisions from transient artifacts and elevating them to persistent knowledge.
      These are different operations with different triggers, different inputs,
      and different output destinations. Merging them would create a play with
      two unrelated responsibilities.
    note: >
      The PENDING constraints C5-C10 in capture-learning/reference/intent.yaml
      referenced an extraction capability that was never built. This spec builds
      that capability as a standalone play, not as an extension of capture-learning.
      The pending constraints in capture-learning can be updated to reference
      the learn play instead.

  DD9:
    title: "Existing knowledge files are grandfathered — no forced migration"
    decision: >
      The 42+ existing knowledge files under ~/.meridian/core/memory/knowledge/
      are not required to conform to the new knowledge-file-template.md standard.
      They continue to work as before. New files created by the learning play
      must conform from day one.
    rationale: >
      Forced migration of 42+ files would be a substantial, risky scope addition
      that blocks the protocol rollout. The existing files already work for the
      agents that use them. The template standard is forward-looking — it governs
      what the learning play produces, not what currently exists.

  DD10:
    title: "Resolution trace written to STM artifacts, not returned inline in output contract"
    decision: >
      The resolution_trace is written to a dedicated STM file (not embedded
      in the output contract JSON). The output contract contains a reference
      path to the trace file.
    rationale: >
      Resolution traces can grow large for agents handling many domain questions
      in a single invocation. Embedding them inline in the output contract would
      bloat the contract payload and make the agent's primary output harder to
      parse. Writing to STM follows the established pattern for agent-produced
      artifacts (stm.output paths).
    schema_note: >
      The output contract gains a stm.output.resolution_trace_path field pointing
      to the written trace file. The resolution_trace schema above describes the
      file's content, not the contract field itself.

# ─────────────────────────────────────────────────────────────────────────────
# IMPLEMENTATION PHASES
# Ordered phases for execution. Each phase is a prerequisite for the next.
# ─────────────────────────────────────────────────────────────────────────────

implementation_phases:

  phase_1:
    name: "Schema and Standards Foundation"
    description: >
      Establish the normative documents that all subsequent work conforms to.
      No agent or play changes yet — only the documents that define the shape.
    components:
      - "contract-schema"
      - "resolution-protocol"
      - "knowledge-standard"
    files:
      - "core/components/memory/standards/agent-contract.md"         # MODIFY
      - "core/components/memory/standards/rules/resolution.md"    # CREATE
      - "core/components/memory/standards/templates/knowledge-file.md"  # CREATE
    exit_gate: >
      agent-contract.md contains ltm_context and resolution_trace field definitions.
      resolution-protocol.md defines R1-R4 with authority semantics and exemptions.
      knowledge-file-template.md defines Tier 1 and Tier 2 metadata requirements.

  phase_2:
    name: "Agent Protocol Updates"
    description: >
      Update five agent definitions to follow R1-R4 when ltm_context is present.
      All changes are additive — agents without ltm_context continue unchanged.
    components:
      - "agent-updates"
    files:
      - "core/components/agents/tech-designer.md"
      - "core/components/agents/product-strategist.md"
      - "core/components/agents/repo-orchestrator.md"
      - "core/components/agents/code-builder.md"
      - "core/components/agents/quality-auditor.md"
    blocked_by: ["phase_1"]
    exit_gate: >
      Each agent definition references resolution-protocol.md. R1-R4 steps are
      present. Output contracts include resolution_trace_path (for tech-designer,
      product-strategist, repo-orchestrator). code-builder and quality-auditor
      have optional ltm_context awareness sections. All agents operate correctly
      without ltm_context.

  phase_3:
    name: "Play Contract Updates"
    description: >
      Add ltm_context to seven play SKILL.md files. Replace two existing
      ad-hoc references with the standard field.
    components:
      - "play-updates"
    files:
      - "core/components/plays/discover-product/SKILL.md"
      - "core/components/plays/plan-roadmap/SKILL.md"
      - "core/components/plays/prepare-architecture/SKILL.md"
      - "core/components/plays/prepare-implementation/SKILL.md"
      - "core/components/plays/implement-epic/SKILL.md"
      - "core/components/plays/commit-code/SKILL.md"
      - "core/components/plays/create-pr/SKILL.md"
    blocked_by: ["phase_2"]
    exit_gate: >
      All seven plays include ltm_context in dispatch contracts for participating
      agents. prepare-architecture and prepare-implementation no longer contain
      ad-hoc ltm_architecture_path or ltm_path fields. Context-isolated agents
      (eval-generator, judge) receive no ltm_context field in any play.

  phase_4:
    name: "Learning Play and Knowledge Extractor"
    description: >
      Build the feedback loop: knowledge-extractor agent + learn play.
      The learn play can only surface meaningful candidates once F1 and F2
      are in place and generating resolution traces.
    components:
      - "learning-play"
    files:
      - "core/components/agents/knowledge-extractor.md"
      - "core/components/plays/learn/reference/intent.yaml"
      - "core/components/plays/learn/SKILL.md"
      - "core/components/plays/capture-learning/reference/intent.yaml"  # modify
    blocked_by: ["phase_3"]
    exit_gate: >
      learn play runs end-to-end. knowledge-extractor produces candidates.yaml
      with LLM-fallback entries from resolution traces. Human approval gate (Tether/
      Vanish) operates correctly. Approved candidates are written to the correct
      scope layer in canonical knowledge-file-template.md format. Read-only
      against resolution traces and evidence.

  phase_5:
    name: "ADR and Documentation"
    description: >
      Record the architectural decisions. Can run in parallel with phase_4
      after phase_1 is complete.
    components:
      - "adr"
    files:
      - "docs/adr/015-ltm-resolution-protocol.md"
    blocked_by: ["phase_1"]
    can_parallelize_with: ["phase_4"]
    exit_gate: >
      ADR documents the decision to use an optional contract field (vs. required),
      the R1-R4 ordering rationale, context-isolation exemptions, and file-reads-
      only constraint. Follows ADR format of existing docs/adr/ entries.
