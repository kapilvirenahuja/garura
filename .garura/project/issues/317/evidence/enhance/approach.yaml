problem_statement: >
  The lint-components Node.js CLI tool (core/tools/lint-components/) and its
  companion skill (core/components/skills/lint-components/SKILL.md) shipped in
  #252 with no user-facing documentation. Two distinct audiences need docs: (1)
  contributors who invoke the CLI directly (install, flags, exit codes, rule
  tiers), and (2) play/skill authors who invoke lint-components via the skill
  JSON contract. Neither audience can currently learn what rules the linter
  enforces, how to install it, or how to read its output without reading source
  code.

solution_summary: >
  Create two new Markdown documentation files — one per audience. The tool-side
  doc lives under the new agentic-methodology pillar at
  docs/agentic-methodology/tools/lint-components.md and covers CLI install,
  flags, exit codes, rule tiers, and gap disclosures. The skill-side doc lives
  under docs/usage/skills/lint-components.md and covers the JSON contract,
  output artifact shape, severity/classification mapping, and a sample report
  excerpt. Both docs cross-link to each other. No source code changes; this is
  pure documentation work.

files_to_create:
  - path: docs/agentic-methodology/
    type: directory
    note: >
      New pillar directory. Other pillar directories (engineering-observability,
      ai-governance, work-intelligence, engineering-experience) are NOT created
      here — each comes into existence only when its first doc lands.
  - path: docs/agentic-methodology/tools/
    type: directory
    note: >
      Subdirectory for CLI/tool-level docs within the agentic-methodology pillar.
  - path: docs/agentic-methodology/tools/lint-components.md
    type: file
    audience: CLI and tooling consumers (contributors running the linter directly)
    must_contain:
      - npm install invocation (run from core/tools/lint-components/)
      - CLI invocation with node and with lint-components bin alias
      - Flags table (--target, --output, --validate-templates)
      - --validate-templates noted as accepted but not yet wired (Gap 1)
      - Node version note: unstated in package.json engines field (Gap 2)
      - Exit codes table (0/1/2)
      - Output format examples: json and text
      - Rule tiers section covering structural / semantic / cross-reference
      - All rule IDs enumerated per tier (see understanding.md section 1)
      - info severity noted as infrastructure-supported but unused by current rules (Gap 3)
      - Single-level scan constraint noted (Gap 6)
      - Cross-link to docs/usage/skills/lint-components.md in a Related section
  - path: docs/usage/skills/lint-components.md
    type: file
    audience: play/skill authors invoking lint-components via JSON contract
    must_contain:
      - Skill metadata block (name, user-invocable, model, allowed-tools)
      - JSON contract input fields table (project_root, output_path)
      - Example YAML STM contract block
      - Skill process summary (install check, run linter, parse, classify, write artifact)
      - Severity-to-classification mapping table (error→blocker, warning→info→informational)
      - quality-profile.yaml role explained (classification only; severities are hardcoded in source)
      - Exit code 1 is expected — skill must not treat it as failure
      - Output artifact shape with all fields (generated_at, quality_profile_status, summary, pass, violations)
      - Sample report.yaml excerpt showing a real violation entry
      - info classification noted as supported but no current rule emits it (Gap 3)
      - Cross-link to docs/agentic-methodology/tools/lint-components.md in a Related section

files_to_modify: []

connections:
  - from: docs/agentic-methodology/tools/lint-components.md
    to: core/tools/lint-components/index.js
    type: documents
    note: >
      CLI flags, exit codes, and output formats are sourced from index.js
      (parseArgs lines 11–33, exit-code logic lines 63/67). Doc must not invent
      behavior not present in the source.
  - from: docs/agentic-methodology/tools/lint-components.md
    to: core/tools/lint-components/lib/rules/structural.js
    type: documents
    note: >
      All structural rule IDs and severities sourced from this file. Rule IDs
      are hardcoded strings; doc must cite them verbatim (no paraphrasing that
      changes the ID).
  - from: docs/agentic-methodology/tools/lint-components.md
    to: core/tools/lint-components/lib/rules/semantic.js
    type: documents
    note: >
      Semantic rule IDs (semantic/skill-not-found, semantic/agent-not-found)
      and extraction patterns sourced from semantic.js.
  - from: docs/agentic-methodology/tools/lint-components.md
    to: core/tools/lint-components/lib/rules/cross-reference.js
    type: documents
    note: >
      Cross-reference rule IDs and the uncovered-scenario logic sourced from
      cross-reference.js.
  - from: docs/agentic-methodology/tools/lint-components.md
    to: core/tools/lint-components/package.json
    type: documents
    note: >
      npm install command and package name sourced from package.json. The
      absence of an engines field is a confirmed gap — doc must not fabricate
      a Node version requirement.
  - from: docs/usage/skills/lint-components.md
    to: core/components/skills/lint-components/SKILL.md
    type: documents
    note: >
      JSON contract shape, process steps, severity classification logic, and
      output artifact shape sourced from SKILL.md. All field names must match
      verbatim.
  - from: docs/usage/skills/lint-components.md
    to: docs/agentic-methodology/tools/lint-components.md
    type: cross-link
    note: >
      Skill doc links to tool doc for CLI-level detail (install, flags, rule
      tiers). Bidirectional — tool doc also links to skill doc.
  - from: docs/agentic-methodology/tools/lint-components.md
    to: docs/usage/skills/lint-components.md
    type: cross-link
    note: >
      Tool doc links to skill doc for JSON-contract invocation. Bidirectional.

tasks:
  - id: T1
    title: Create directory docs/agentic-methodology/tools/
    description: >
      Create the two new directories: docs/agentic-methodology/ and
      docs/agentic-methodology/tools/. These are new — confirmed not present in
      the repo. Do NOT create sibling pillar directories
      (engineering-observability/, ai-governance/, etc.). These come into
      existence only when their first doc lands.
    blocked_by: []
    expected_outcome: >
      ls docs/agentic-methodology/tools/ succeeds without error. No other new
      directories under docs/ are created.

  - id: T2
    title: "Author docs/agentic-methodology/tools/lint-components.md (CLI audience)"
    description: >
      Write the tool-side documentation following house-style from
      docs/usage/plays/create-pr.md (H1=component name, H2 for major sections,
      H3 for sub-sections, instructional direct tone, tables for flags/rules,
      fenced code blocks with language tags).

      Required sections and content:
      - H1: lint-components
      - One-line summary under H1
      - ## Overview: prose + purpose of the tool
      - ## Install: npm install command (run from core/tools/lint-components/),
        Node version gap disclosure ("No Node version declared in package.json;
        version requirement is unstated"), js-yaml as the only dependency
      - ## Usage: node invocation + lint-components bin alias; flags table
        (--target, --output, --validate-templates). --validate-templates must
        carry a "(not yet implemented)" note — the flag is parsed but no rule
        module reads it (Gap 1).
      - ## Output: json and text format examples; exit codes table (0/1/2)
      - ## Rule Tiers: subsections per tier (Structural, Semantic,
        Cross-Reference). Each subsection must enumerate every rule ID in source
        with its severity (see understanding.md section 1 for the full list).
        Note that info severity is infrastructure-supported but no current rule
        emits it (Gap 3). Note the single-level scan constraint (Gap 6).
      - ## Related: link to docs/usage/skills/lint-components.md with "For skill
        invocation (JSON contract), see..."

      Do NOT fabricate rule IDs not present in source. Do NOT describe behavior
      of --validate-templates as if it works.
    blocked_by: [T1]
    expected_outcome: >
      File exists at docs/agentic-methodology/tools/lint-components.md.
      Contains an npm install code block, CLI invocation code block,
      flags table including --validate-templates with not-yet-implemented note,
      all rule IDs from understanding.md section 1, and a Related section
      linking to the skill doc.

  - id: T3
    title: "Author docs/usage/skills/lint-components.md (skill-consumer audience)"
    description: >
      Write the skill-side documentation following house-style from
      docs/usage/plays/create-pr.md. The docs/usage/skills/ directory already
      exists (currently empty).

      Required sections and content:
      - H1: lint-components
      - One-line summary under H1
      - ## Overview: what the skill does (install check, run linter, classify,
        write YAML report)
      - ## Metadata: table of frontmatter fields (name, user-invocable, model,
        allowed-tools)
      - ## Invocation: JSON contract input fields table; example YAML STM
        contract block (copy shape from understanding.md section 3 — use
        verbatim field names project_root and output_path)
      - ## Process: numbered steps mirroring SKILL.md process summary
        (understanding.md section 3). Clarify that exit code 1 from the linter
        is expected and must NOT be treated as skill failure.
      - ## Severity and Classification: table mapping severity→classification
        (error→blocker, warning→informational, info→informational). Explain
        that severity values are hardcoded in the linter source — not in
        quality-profile.yaml. Explain what quality-profile.yaml contributes
        (status field, classification tier). Note info severity exists in
        infrastructure but no current rule emits it (Gap 3).
      - ## Output: full artifact shape YAML block (all fields from
        understanding.md section 3). Sample violations excerpt showing one
        error-level violation with all fields populated.
      - ## Related: link to docs/agentic-methodology/tools/lint-components.md
        with "For CLI install and rule tier reference, see..."

      Do NOT describe --validate-templates as a skill input; the skill hardcodes
      the linter invocation and does not expose that flag.
    blocked_by: [T1]
    expected_outcome: >
      File exists at docs/usage/skills/lint-components.md. Contains an example
      YAML STM contract block, severity/classification table, full output
      artifact shape, and a Related section linking to the tool doc.

  - id: T4
    title: Internal cross-link verification — each doc links to the other
    description: >
      Open both completed docs and confirm bidirectional cross-links are in
      place:
      - docs/agentic-methodology/tools/lint-components.md must contain a
        hyperlink to docs/usage/skills/lint-components.md
      - docs/usage/skills/lint-components.md must contain a hyperlink to
        docs/agentic-methodology/tools/lint-components.md
      If either link is missing or points to the wrong path, fix it in place.
      Links should be relative Markdown links, not absolute paths.
    blocked_by: [T2, T3]
    expected_outcome: >
      grep for "usage/skills/lint-components.md" in the tool doc returns a
      match. grep for "agentic-methodology/tools/lint-components.md" in the
      skill doc returns a match.

  - id: T5
    title: Visual verification of rendered Markdown
    description: >
      Read both completed docs and verify:
      1. Heading hierarchy is consistent (H1 → H2 → H3 only; no skipped levels)
      2. All fenced code blocks are closed (balanced triple-backtick pairs)
      3. All tables have a header row and consistent column counts
      4. No raw HTML (house-style is pure Markdown)
      5. Rule IDs in the tool doc (e.g., structural/missing-frontmatter-field)
         match the verbatim strings in source (cross-check understanding.md
         section 1 — these were sourced directly from lib/rules/*.js)
      6. No mention of --validate-templates as a working feature; either carries
         a "(not yet implemented)" note or is omitted from the skill doc
      Fix any issues found before marking this task complete.
    blocked_by: [T4]
    expected_outcome: >
      Both docs pass all six checks above. No broken fences, no heading jumps,
      no fabricated rule IDs, no misleading --validate-templates description.

evals:
  - id: E1
    description: File docs/agentic-methodology/tools/lint-components.md exists
    check: file_exists
    target: docs/agentic-methodology/tools/lint-components.md

  - id: E2
    description: File docs/usage/skills/lint-components.md exists
    check: file_exists
    target: docs/usage/skills/lint-components.md

  - id: E3
    description: Tool doc contains a code block with npm install invocation
    check: grep
    target: docs/agentic-methodology/tools/lint-components.md
    pattern: "npm install"
    note: Must appear inside a fenced code block.

  - id: E4
    description: Tool doc contains a code block with the CLI invocation
    check: grep
    target: docs/agentic-methodology/tools/lint-components.md
    pattern: "node core/tools/lint-components/index.js"
    note: Must appear inside a fenced code block.

  - id: E5
    description: Skill doc contains an example JSON/YAML contract block
    check: grep
    target: docs/usage/skills/lint-components.md
    pattern: "project_root"
    note: >
      The field name project_root must appear in a code block, confirming the
      JSON contract example is present.

  - id: E6
    description: Skill doc contains a sample report excerpt
    check: grep
    target: docs/usage/skills/lint-components.md
    pattern: "classification"
    note: >
      The output artifact includes a classification field; its presence confirms
      the sample report excerpt is included.

  - id: E7
    description: Tool doc enumerates all three rule tiers (structural, semantic, cross-reference)
    check: grep_all
    target: docs/agentic-methodology/tools/lint-components.md
    patterns:
      - "structural"
      - "semantic"
      - "cross-reference"
    note: All three tier names must appear as section headings or within the body.

  - id: E8
    description: Severity mapping (error/warning/info → blocker/informational) is described in at least one of the two docs
    check: grep
    target_any:
      - docs/usage/skills/lint-components.md
      - docs/agentic-methodology/tools/lint-components.md
    pattern: "blocker"
    note: >
      The word "blocker" must appear in at least one doc, confirming the
      severity-to-classification mapping is documented.

  - id: E9
    description: "--validate-templates is either omitted or noted as not-yet-implemented (Gap 1)"
    check: conditional_grep
    target: docs/agentic-methodology/tools/lint-components.md
    rule: >
      IF the string "--validate-templates" appears in the doc, THEN the string
      "not yet" or "no effect" or "no current" must also appear within 5 lines
      of it. If "--validate-templates" does not appear at all, eval passes.
    note: >
      Fabricating --validate-templates as a working feature is forbidden.
      Acceptable outcomes: (a) flag is omitted entirely, or (b) flag is listed
      with an explicit "(not yet implemented)" or equivalent note.

  - id: E10
    description: "Node version requirement is either cited from package.json engines field or noted as unstated (Gap 2)"
    check: conditional_grep
    target: docs/agentic-methodology/tools/lint-components.md
    rule: >
      IF the doc claims a specific Node version requirement (e.g. "Node 14+",
      "Node >= 12"), THEN a corresponding `engines` field must exist in
      core/tools/lint-components/package.json. If no such engines field exists
      (current state), the doc must either omit a Node version claim or contain
      the phrase "unstated" or "not declared" near any Node version mention.
    note: >
      Fabricating a Node version requirement is forbidden when package.json has
      no engines field.

  - id: E11
    description: The two docs reference each other (bidirectional cross-link)
    check: grep_pair
    checks:
      - target: docs/agentic-methodology/tools/lint-components.md
        pattern: "usage/skills/lint-components"
      - target: docs/usage/skills/lint-components.md
        pattern: "agentic-methodology/tools/lint-components"

  - id: E12
    description: No fabricated rule IDs — every rule ID mentioned in the docs must exist in source
    check: cross_reference
    doc_targets:
      - docs/agentic-methodology/tools/lint-components.md
      - docs/usage/skills/lint-components.md
    rule_id_pattern: "(structural|semantic|cross-ref)/[a-z-]+"
    source_dirs:
      - core/tools/lint-components/lib/rules/
    note: >
      Extract all strings matching the rule_id_pattern from both docs. For each
      extracted ID, verify it appears verbatim in at least one .js file under
      core/tools/lint-components/lib/rules/. Any ID in the docs not found in
      source is a fabrication failure.

  - id: E13
    description: Tool doc heading hierarchy matches house-style of docs/usage/plays/create-pr.md
    check: manual_read_assertion
    target: docs/agentic-methodology/tools/lint-components.md
    assertion: >
      H1 appears exactly once at the top. H2 used for major sections. H3 used
      for sub-sections within H2 sections. No H4 or deeper. No heading level
      skipped (H1 → H3 without H2 is a violation). Tester reads the heading
      structure and confirms compliance.

risks:
  - id: R1
    description: >
      Documentation drifts if the linter source changes after the docs are
      written. Rule IDs, severities, flags, and output schema are all hardcoded
      in source — any future change to lib/rules/*.js or index.js would
      silently invalidate the docs.
    type: documentation-staleness
    mitigation: >
      Static evals (E12) catch fabricated IDs at authoring time. Post-authoring
      drift is not detectable by static evals. A future "check-drift" play
      invocation against these docs would catch it.
    action: monitor-only
    ltm_reference: null
    generated_evals: [E12]

  - id: R2
    description: >
      Doc author fabricates a rule ID that does not exist in source (e.g.,
      invents "structural/missing-output-section" which is not in structural.js).
      understanding.md section 1 enumerates all 14 current rule IDs from source
      — deviation from that list is fabrication.
    type: content-accuracy
    mitigation: >
      E12 performs a regex scan of both completed docs for rule-ID-shaped
      strings and cross-checks each against the source files. Any ID in the
      docs not found in lib/rules/*.js will fail E12.
    action: eval-driven
    ltm_reference: null
    generated_evals: [E12]

  - id: R3
    description: >
      Severity mapping description becomes outdated if rules in lib/*.js are
      updated to change severities or add new rules with different severity
      levels. There is no external config file to check — severities are
      hardcoded strings.
    type: documentation-staleness
    mitigation: >
      At authoring time, understanding.md section 1 is the source of truth
      (derived directly from source). Post-authoring drift is monitor-only.
    action: monitor-only
    ltm_reference: null
    generated_evals: []

  - id: R4
    description: >
      Pillar directory naming inconsistency. The correct slug per features.yaml
      (line 130) is "agentic-methodology". A doc author using a shorthand like
      "methodology/" or "agentic/" would create the file at the wrong path,
      scattering pillar docs and violating the slug-matching convention.
    type: path-correctness
    mitigation: >
      E1 asserts the exact file path docs/agentic-methodology/tools/lint-components.md.
      If the file lands at any other path, E1 fails.
    action: eval-driven
    ltm_reference: ".garura/product/scope/features.yaml line 130"
    generated_evals: [E1]

  - id: R5
    description: >
      Gap handling — the six gaps documented in understanding.md section 8 each
      carry a risk of fabrication: (1) --validate-templates described as
      working, (2) Node version invented without an engines field, (3) info
      severity given a concrete example rule when none exists, (4) intent.yaml
      referenced as if it exists for the skill, (5) structural/spelling-inconsistency
      logic described from the confused comments rather than the actual code
      behavior, (6) nested scan implied when the tool only scans one level deep.
      Any of these would make the docs wrong.
    type: content-accuracy
    mitigation: >
      E9 catches gap 1 (--validate-templates). E10 catches gap 2 (Node version).
      Gaps 3, 5, and 6 require a tester read-through assertion against the
      understanding.md source-of-truth. Gap 4 (no intent.yaml) means the skill
      doc must source all contract details from SKILL.md only — T3 description
      explicitly calls this out.
    action: eval-driven
    ltm_reference: "understanding.md section 8"
    generated_evals: [E9, E10]

alternatives_considered:
  - id: A1
    description: >
      Single consolidated doc instead of two separate files — one file covering
      both CLI invocation and skill JSON contract, living at either the tool or
      usage path.
    rejection_reason: >
      Audiences differ. A contributor running the linter directly needs install
      steps, flags, exit codes, and rule tier detail. A play/skill author
      invoking lint-components via JSON contract needs the STM contract shape,
      classification mapping, and output artifact schema. These two readership
      contexts diverge enough that a single doc would either bury one audience's
      needs or bloat to the point of being harder to navigate than two focused
      files. Decision confirmed in discovery.md Q1.

  - id: A2
    description: >
      Shorter pillar directory slugs in the new docs structure. For example,
      using docs/methodology/ instead of docs/agentic-methodology/, or
      docs/observability/ instead of docs/engineering-observability/.
    rejection_reason: >
      Discovery.md Q1 decision explicitly requires pillar directory names to
      match features.yaml domain slugs exactly. The confirmed slug from
      features.yaml line 130 is "agentic-methodology". Using a shortened
      alternative would create a naming inconsistency the moment a second doc
      lands under a different pillar — future authors would need to look up the
      mapping between short slugs and feature domains rather than reading the
      directory name directly.
