issue:
  number: 241
  title: "codify: derive full product LTM from existing codebase (Learning Pipeline L3)"
  state: "open"
  labels:
    - "enhancement"
  url: "https://github.com/kapilvirenahuja/garura/issues/241"
  body: |
    ## Problem

    Garura's product LTM (`.garura/product/`) is currently only populated by running the full specify-product â†’ design-exp â†’ build-arch pipeline from a product idea. There is no way to onboard an existing codebase â€” you cannot point Garura at a repo and have it derive the product specification, architecture decisions, domain knowledge, and quality profile that the code already embodies.

    ## Context â€” Learning Pipeline Architecture (April 2026 redesign)

    The memory extraction pipeline is now four plays with a single LTM write boundary:

    | Play | Level | Persona | Reads | Writes to | Status |
    |------|-------|---------|-------|-----------|--------|
    | **distill** | L1 | Dev (auto in ship) | PR diff + STM | STM only | Built |
    | **reap** | L2 | Dev (post-epic) | build trinity (prepareâ†’implementâ†’validate) | STM only | Needs building |
    | **codify** | L3 | PM/PO (brownfield) | existing codebase | STM only | **This issue** |
    | **enrich** | â€” | Stakeholder-gated | STM proposals from L1/L2/L3 | LTM | Needs building |

    **Key design principle:** All three extraction plays (distill, reap, codify) write proposals to STM only. None write directly to LTM. **enrich** is the single promotion gate â€” it collects staged proposals from any of the three levels and applies them to LTM after stakeholder review.

    ### Previous naming (superseded)
    - "Mode 1" â†’ **distill** (L1)
    - "Mode 2" â†’ **reap** (L2)
    - "Mode 3" / "bootstrap-product" â†’ **codify** (L3, this issue)
    - capture-learning ENRICH half â†’ **enrich** (separate play)

    ## What codify does

    Reverse-engineers what specify â†’ design â†’ arch would have produced, but from code analysis instead of user intent. Run by PM/PO on brownfield codebases to bootstrap the Meridian artifact tree.

    **Critical constraint:** codify writes all output to STM as proposals â€” NOT to product LTM. The enrich play is the only path from STM proposals to LTM.

    ### Output: Proposal set (staged to STM)

    | Target Directory | Artifacts Derived |
    |-----------|------------------|
    | `user-provided/` | `project-profile.yaml` (inferred from code: language, framework, team patterns from git history) |
    | `specification/` | `domain-selection.yaml`, `quality-profile.yaml` (inferred from tooling, test coverage, lint config) |
    | `research/` | `{domain}.md` per detected domain (features, capabilities from code structure) |
    | `scope/` | `scope.yaml`, `epics/{epic-id}.yaml` (inferred from modules/features in codebase) |
    | `experience/` | `screens/`, `flows/`, `personas.md`, `design-spec.md` (if frontend exists) |
    | `architecture/` | `logical-architecture.yaml`, `physical-architecture.yaml`, `nfr-spec.yaml`, `quality-vision.yaml`, `design-patterns.yaml` |

    ### Key Design Principles

    - Produces the **same artifact structure** as the specifyâ†’designâ†’build pipeline â€” so reap and distill work identically against codified LTM (once promoted via enrich)
    - Every inferred decision marked with `source_type: inferred_from_code` (not `user_provided` or `kb_sourced`)
    - Human review checkpoint before any proposal is staged
    - Can be run incrementally: derive what's missing, skip what already exists
    - Does NOT require the full KB domain taxonomy â€” works on any codebase regardless of whether Garura KB covers that domain

    ### Agents

    | Agent | Role |
    |-------|------|
    | `tech-architect` | Architecture inference, dependency graph, pattern detection, technology identification |
    | `test-engineer` | Test surface mapping, quality profile inference |
    | `designer` | Screen/flow inference from frontend code (if applicable) |
    | `product-keeper` | Domain/capability inference, epic structure derivation |

    ## Acceptance Criteria

    - [ ] Separate play exists (`codify`)
    - [ ] Produces all proposals to STM matching the specifyâ†’designâ†’build output structure
    - [ ] Every inferred decision carries `source_type: inferred_from_code`
    - [ ] Human checkpoint before staging proposals
    - [ ] Incremental mode: skips artifacts that already exist and are locked
    - [ ] Proposals are consumable by the **enrich** play for LTM promotion
    - [ ] codify NEVER writes directly to product LTM

    ## Relationships

    - Depends on: enrich play (the promotion gate from STM â†’ LTM)
    - Related: **reap** (L2 â€” post-epic build-trinity extraction, separate issue)
    - Related: **distill** (L1 â€” post-merge extraction, built)
