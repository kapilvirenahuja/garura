      summary: >
        Every compiled play that produces STM evidence MUST have an Evidence & Close
        phase with a non-blocking self-commit step (ADR-012). Fire-and-forget plays
        (e.g., distill) that are invoked as sub-plays are not exempt — they must
        still attempt to self-commit their own evidence files.
