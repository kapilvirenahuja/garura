  # ── Key Decisions ────────────────────────────────────────────────────────────

  key_decisions:
    - decision: "Fix via ship-level sweep (Option B), not per-play reliability hardening (Option A or C)"
      confidence: "high"
      resolved_from: "ADR-012 + Occam's Razor"
      rationale: >
        ADR-012 Rule 2 preserves non-blocking self-commits. Ship's sweep is
        the authoritative backstop. One sweep commit is simpler and covers
        all cases including distill's absence of any self-commit.

    - decision: "Distill needs its own self-commit added to intent.yaml"
      confidence: "high"
      resolved_from: "direct read of distill/SKILL.md"
      rationale: >
        Distill has no Evidence & Close phase. Its intent_hash is a placeholder.
        This is an explicit gap — distill was never aligned with ADR-012.

    - decision: "enhance/#240 drift must be resolved before /create-play --build ship"
      confidence: "high"
      resolved_from: "ship/SKILL.md lines 301-305 direct-edit deviation note"
      rationale: >
        ship/SKILL.md's intent_hash is already stale. Running /create-play
        --build without first verifying intent.yaml covers enhance/#240 additions
        risks dropping distill step and SCE-4. This is the highest-severity risk.

    - decision: "Do NOT modify commit-code/create-pr/merge-pr SKILL.md files"
      confidence: "high"
      resolved_from: "blast radius analysis"
      rationale: >
        These sub-plays already prescribe self-commits. The sweep is a backstop
        for when those fail. Changing their behavior requires separate intent
        changes and /create-play --build runs — out of scope for this defect.
