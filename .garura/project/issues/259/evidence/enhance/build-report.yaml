  - task: T1
    description: >
      approach.yaml listed "Remove F4 (risks FC)". Actual F4 in intent v1.1.0 was a
      shipping-safety FC (partial-ship), not a risk FC.
    action_taken: F4 NOT removed (preserved shipping-safety guarantee).
    deviation_justification: >
      Primary-source evidence contradicted the approach's description. Removing F4 would
      regress an unrelated safety condition. E6 eval passes without any F4 change because
      the 'risks.*entries.*severity' string was never in F4.

  - task: T2
    description: >
      approach.yaml cited "current main baseline: 11 step evals". Rebake produced 14 from
      evals-creator.
    action_taken: Accepted 14 verbatim; no reformulation.
    deviation_justification: >
      Expected growth — 5 new constraints contribute additional SE entries. Per create-play
      rules, evals MUST be copied verbatim; compiler cannot drop or reformulate.

