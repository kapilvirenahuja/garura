    role: "Project installer — detects init vs. upgrade mode; the stale variable name is cosmetic
           but creates a brand inconsistency and a false positive for any meridian-reference scanner."
    change_needed: "Rename MERIDIAN_CONFIG → GARURA_CONFIG on lines 56 and 58."
  - path: "docs/philosophy/idsd.md"
    role: "Core philosophy document; the ASCII art box on line 907 labels the enterprise layer."
    change_needed: "Replace 'MERIDIAN INTERFACE' with 'GARURA INTERFACE' in the ASCII art label."
