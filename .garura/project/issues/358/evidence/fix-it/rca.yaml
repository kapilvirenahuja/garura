issue_number: 358
summary: >
  The project-wide rename from Meridian→Garura (issue #354) was performed via path-string
  find-and-replace passes that updated `.meridian/` path literals but missed three categories
  of stale reference: a shell variable named MERIDIAN_CONFIG in installer/install.sh (variable
  name, not a path string), an ASCII art label "MERIDIAN INTERFACE" in docs/philosophy/idsd.md,
  and 111 occurrences across 28 .claude/specs/ files which were scoped out of the rename pass.

root_cause:
  primary:
    file: "installer/install.sh"
    logic: >
      Line 56: `MERIDIAN_CONFIG="$TARGET_DIR/.garura/core/config.yaml"`. The rename script
      at commit 098849c updated the variable's *value* from `.meridian/` to `.garura/` but
      left the *variable name* itself as MERIDIAN_CONFIG. Commit b0bff41 (the root-files rename
      pass for #354) used a pattern that matched `.meridian` path strings, which did not match
      the all-caps variable identifier MERIDIAN_CONFIG. The variable is used on line 58 as
      the file-existence check controlling init vs. upgrade mode — a stale name that conveys
      wrong project identity to anyone reading or modifying the installer.
    why_wrong: >
      A shell variable named MERIDIAN_CONFIG implies the installer is for a project called
      Meridian. After renaming the project to Garura, any reader or automated tool scanning
      the installer for Meridian references will find this name as a false positive, and the
      semantic disconnect between the variable name and its value (which correctly points to
      `.garura/`) makes the installer harder to maintain. The rename was incomplete because
      the grep pattern used for the #354 pass targeted path-component strings (`.meridian`)
      rather than token-boundary identifiers (`MERIDIAN`).
    line_range: "56-59"
  secondary:
    - file: "docs/philosophy/idsd.md"
      logic: >
        Line 907 inside an ASCII art box: `│  MERIDIAN INTERFACE (Enterprise Layer)`. The
        rename pass for docs (#354, commit 964260c) replaced prose occurrences of "Meridian"
        but the all-caps label inside a code-fenced diagram was not matched by the pattern
        used for that pass.
      why_wrong: >
        The ASCII art box is the public-facing conceptual diagram for the framework's enterprise
        layer. Labelling it "MERIDIAN INTERFACE" after rebranding to Garura is a documentation
        correctness failure — any reader of the philosophy doc sees the old brand name.
      line_range: "907"
    - file: ".claude/specs/ (28 files)"
      logic: >
        111 occurrences of "meridian"/"Meridian"/"MERIDIAN" remain across 28 spec files
        (agent-idd, artifact-schemas, brief-rendering, discover-product-rebake, docs-four-crafts,
        epic-scoped-prep, fix-strategist, idsd, implement-epic-tdd, prepare-implementation-redesign,
        three-elements). The #354 rename passes targeted core/components/, docs/, memory/, and
        root files. The .claude/specs/ directory was not included in any of those passes — it
        was either treated as transient/gitignored working state or simply overlooked.
      why_wrong: >
        .claude/specs/ files contain spec documents and evaluation evidence that reference
        framework paths (e.g., `~/.meridian/core/memory/`) and brand names. Leaving these
        stale means spec documents contradict the renamed codebase, breaking anyone who follows
        the spec paths literally.

trace:
  - step: >
      Symptom: git status shows uncommitted modifications to installer/install.sh,
      docs/philosophy/idsd.md, and 28 .claude/specs/ files.
  - step: >
      git show HEAD:installer/install.sh | grep MERIDIAN_CONFIG confirms HEAD has
      MERIDIAN_CONFIG as a variable name on lines 56 and 58, while the value correctly
      references .garura/.
  - step: >
      git show 098849c -- installer/install.sh shows that commit updated the variable
      *value* (`.meridian/` → `.garura/`) but not the variable *name* (MERIDIAN_CONFIG stayed).
  - step: >
      git show b0bff41 --stat confirms that commit touched installer/install.sh as part of
      the root-files rename pass but its diff shows only path-string replacements, not the
      variable name — the all-caps token was not in scope of the grep pattern.
  - step: >
      git show HEAD:docs/philosophy/idsd.md | grep -n MERIDIAN confirms a single stale label
      on line 907 inside a code-fenced ASCII art block — not matched by prose-replacement
      patterns used in the docs rename pass (commit 964260c).
  - step: >
      git status --short .claude/specs/ shows 28 files modified in the working tree; grep
      on HEAD confirms all 111 occurrences of "meridian" are present in HEAD, absent from the
      working tree — the .claude/specs/ directory was never included in any #354 rename pass.
  - step: >
      Root cause confirmed: the rename was executed as a series of scoped passes (agents, skills,
      plays, memory, docs, root files, gitignore/ADR stragglers) but the scoping excluded
      (a) variable-name tokens that are not path strings, (b) content inside code-fenced ASCII
      art blocks, and (c) the .claude/specs/ working directory entirely.

