body: |
  # Build the Product Planning & Design Pipeline

  This is a HUGE, cross-cutting effort to stand up an AI-native product planning and design pipeline in Meridian OS. It introduces two new Level-2 plays, new agents, a Knowledge Base (KB) architecture, and a folder-structure reorganization. Three reference documents in `~/Downloads/` drive the design:

  1. `play-specifications.md` — canonical spec for `/plan-product` and `/design-product`
  2. `compass_artifact_wf-e8f39de6-*.md` — KB architecture research (FODA feature models, SAT constraint propagation, Domain → Capability → Intent Epic hierarchy, KB-as-layer-over-LTM)
  3. `compass_artifact_wf-ae59ec55-*.md` — pipeline design research (why most AI pipelines produce shallow output and how to fix it)

  ## Intent

  Transform a product idea + project profile into a fully scoped, enriched set of intent epics (Play 1 — `/plan-product`) and then into user flows, screen specifications, and wireframes (Play 2 — `/design-product`) — dense enough that `/prepare-architecture` can make real technology decisions. The pipeline must enforce depth at each step via mandatory fields (failure scenarios, anti-goals, quantified constraints) so shallow generic outputs become structurally impossible.

  ## Scope (from reference documents)

  ### A. KB Architecture
  - Knowledge hierarchy: KB (universal) → LTM (project-specific) → STM (session-specific)
  - Query resolution order during play execution: STM → LTM → KB
  - Feature model with CNF-compatible relationships: mandatory, optional, alternative (XOR), or
  - Cross-tree constraints driven by project profile (security, industry, compliance, scale, timeline)
  - Per-capability schema: business rules, architecture rationale, UX principles, success criteria, failure scenarios, experiential metadata
  - Three-layer artifact hierarchy: Domain → Capability → Intent Epic (no more)

  ### B. `/plan-product` — Play 1 (seven stages)
  1. Market Intelligence (Market Analyst Agent)
  2. Domain Selection (Product Keeper Agent)
  3. Capability Configuration — SAT-style profile-driven selection
  4. Capability Enrichment — pull KB rules, apply profile overrides, pull experiential data
  5. Intent Epic Generation — full template with problem, intent, appetite, in_scope, anti_goals, success/failure scenarios, constraints, business_rules, hypothesis, assumptions, dependencies, kb_source
  6. Risk & Quality Profile — aggregate QAs across capabilities, generate quality profile and risk register
  7. Prioritization (RICE / ICE)

  ### C. `/design-product` — Play 2 (six stages)
  1. Persona Synthesis — JTBD format: "When [situation], I want to [motivation], so I can [outcome]"
  2. Screen Inventory — state coverage mandatory: loading, empty, populated, error, edge
  3. User Flow Mapping — Mermaid syntax, happy + error recovery
  4. Wireframe Generation — via Figma MCP / Google Stitch MCP / structured text fallback
  5. Interaction Pattern Specification
  6. Design Specification Compilation

  ### D. New Agents
  - Product Keeper Agent (primary for plan-product)
  - Market Analyst Agent (market intel)
  - Domain Agent (domain selection/enrichment)
  - Designer Agent (primary for design-product)

  ### E. Folder Structure Reorganization (core principle — user-declared 2026-04-13)

  `.meridian/` is a strict whitelist. No other folders are permitted.

  ```
  .meridian/
  ├── core/                                   # existing — core memory/KB
  ├── product/
  │   ├── product/                            # product planning outputs
  │   ├── ux/                                 # ux/design outputs
  │   └── arch/                               # architecture outputs
  └── project/
      └── issues/
          └── {issue_no}/
              ├── specs/                       # plans
              ├── evidence/                    # test/eval evidence
              ├── checkpoint/                  # play status / approvals
              ├── context/                     # prepare-implementation context
              └── review/                      # review artifacts
  ```

  Existing `core/config.yaml` has different structure (current `product.directories` = discovery/roadmap/architecture/evidence/briefs/checkpoints/status; current `stm.structure` = spec/design/evidence/delivery/checkpoint). These need to be reconciled as part of this work.

  ### F. Existing-Play Reconciliation (MUST be addressed)
  Existing plays may overlap or conflict with the new pipeline:
  - `discover-product` — overlaps with plan-product stages 1-2
  - `plan-roadmap` — overlaps with plan-product stage 7 prioritization
  - `prepare-architecture` — downstream consumer; contract needs update
  - `discover-product-opportunity` — overlaps with plan-product stage 1

  The plan MUST explicitly decide: consolidate, replace, or coexist.

  ## Constraints
  - Folder structure whitelist is non-negotiable (core principle)
  - Each intent epic must contain ALL mandatory fields (problem_statement, intent, appetite, in_scope, anti_goals, success_scenarios, failure_scenarios, constraints, business_rules, hypothesis, assumptions_requiring_validation, dependencies, kb_source) — no empty sections allowed
  - Each screen must enumerate ≥3 states (default + at least 2 others)
  - Every success scenario needs a user flow; every failure scenario needs a recovery flow
  - Constraints must be quantified ("p95 < 500ms" not "fast")
  - KB must be a structured layer over LTM with bidirectional sync (Graphiti pattern)

  ## Failure Conditions
  - Plan produces "sounds good, means nothing" shallow outputs
  - Existing plays are silently ignored rather than explicitly reconciled
  - Folder structure deviates from the whitelist
  - Intent epic template allows empty mandatory fields
  - KB and LTM relationships are left ambiguous
  - Scope is treated as a single feature when it clearly needs phasing (sub-issues)

  ## Acceptance Scenarios
  1. A user runs `/plan-product "Build HealthSync scheduling platform"` with a healthcare+HIPAA+high-security profile, and receives enriched intent epics with every mandatory field filled, traced back to KB capabilities, with no generic content.
  2. A user runs `/design-product` after `/plan-product` completes and receives a screen inventory where every capability maps to ≥1 screen, every screen has ≥3 states, every success scenario has a flow, every failure scenario has a recovery flow.
  3. After `/design-product`, firing `/prepare-architecture` finds all seven mandatory handoff artifacts (quality profile, bounded contexts, epics w/ constraints, screen inventory, flows, risk register, security profile) in the expected STM/product locations per the new folder whitelist.
  4. The plan itself explicitly reconciles every existing play that overlaps — no silent deletion, no silent coexistence.
