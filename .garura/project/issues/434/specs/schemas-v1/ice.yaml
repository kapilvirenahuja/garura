# ICE Schema — v1
#
# Intent / Context / Expectations attached to a ProductOS node. The second of
# the three things ProductOS keeps forever: INTENT.
#
# ICE is the UNIT THAT GOES TO BUILD: functionality-level ICE is what /implement
# consumes. Light by design. Same shape at capability and functionality level.

schema:
  name: ice
  version: 1

ice:
  node_ref: string
  intent:
    goals: []
    constraints: []
    failures: []
  context:
    persona: []     # WHO this serves — refs to persona records in product-os.
                    # Actor types that can fork the build (e.g. SSO user vs
                    # password user vs kiosk user).
    systems: []     # the software the code talks to (auth service, user store,
                    # token/session service, email/SMS provider, secrets mgr)
    scope: []       # the rules and boundaries — what's in, what's out, how it
                    # behaves. e.g. for login: "password + Google only, no
                    # passwordless", "single tenant", "30-min sessions",
                    # "must support enterprise SSO", "no remember-me on kiosks".
  expectations:
    outcomes: []
  nfr_needs:               # CONCRETE NFR targets for THIS node (set by /understand) —
                           # the specifics that must sit UNDER the profile box.
                           # A target exceeding the box on any dimension is an
                           # out-of-box event: it halts for human approval, which
                           # moves the boundary and records a decision (ADR).
                           # Values are concrete, e.g. "auth API p99 < 150ms",
                           # checked against the box's level + gate.
    performance: string    # speed / latency
    security: string
    accessibility: string
    scalability: string
    reliability: string
    privacy: string
    observability: string
    maintainability: string
  compliance_needs: [string]   # regimes this node triggers (e.g. PCI-DSS); union'd into the profile
  metadata:
    created_by: string
    updated_by: string
    version: integer

# Where ICE lives in the tree
attaches_to: [capability, functionality]   # same shape at both levels;
                                           # functionality ICE is the build unit

# ---- Rules -----------------------------------------------------------------
# One node, one ICE, one context.
#   - intent.goals and expectations.outcomes may be many, and pair up (an outcome
#     per goal).
#   - intent.constraints and intent.failures are single node-level lists (NOT
#     per-goal); they collectively bound the node's intent.
#   - context is ONE, shared by every goal — it is the binder.
# Decomposition test: goals share an ICE only if they share the context (persona,
# systems, scope). A goal that needs its own context is a separate node with its
# own ICE — a child functionality (a behavior) or a sibling capability (a
# different concern).

# ---- Fill rules -------------------------------------------------------------
fill_rules:
  - play: "/vision"
    writes: "seed intent (goals only), at capability level"
  - play: "/understand"
    writes: "full intent, context (persona/systems/scope), expectations, and the
             capability's nfr_needs + compliance_needs — which roll up the product profile"
  - play: "/shape"
    writes: "functionality-level ICE when functionalities are created/reshaped;
             also creates the persona records that context.persona points to"
  - play: "/learn"
    writes: "updates to expectations/outcomes from real-world results"

# ---- Enhance rules ----------------------------------------------------------
enhance_rules:
  governed_by: "PARKED — see product-os.yaml (future schema-evolution play)"
