# Product Profile Schema — v1
#
# A SMART profile: the product's NFR posture is DERIVED bottom-up from what its
# capabilities need — not declared top-down. /understand records each
# capability's NFR needs (in its ICE); the product profile is the rollup, the
# MAX across capabilities — "the product is as demanding as its most-demanding
# capability." That rollup is the shape of the product.
#
# The profile has states, and it is the canonical vocabulary the KB matches
# conditions against.

schema:
  name: product-profile
  version: 1

profile:
  product_ref: string
  state: string              # directional | derived | locked
                             #   directional — rough, set by /vision from intent
                             #   derived     — rolled up from capability nfr_needs by /understand
                             #   locked      — finalized; /shape selects against it

  shape:                     # situational dimensions (directional from /vision)
    stage: string            # prototype | internal | public | monetized
    users: string            # one | small-team | public
    monetization: string     # none | lead-capture | paywall
    surfaces: [string]       # web | mobile | cli | api | desktop | embedded

  nfr:                       # DERIVED — the MAX across all capabilities' nfr_needs.
                             # Not hand-declared once state is `derived`.
    performance: string      # speed / latency
    security: string         # protection of data and access
    accessibility: string    # usable by everyone (e.g. WCAG)
    scalability: string      # load and growth headroom
    reliability: string      # availability / uptime
    privacy: string          # sensitivity of data handled
    observability: string    # ability to see what's happening in prod
    maintainability: string  # ease of change over time

  compliance: [string]       # union of capability compliance needs (GDPR, PCI-DSS, ...)

  quality_vision:            # derived from the rolled-up posture
    statement: string        # one line: what "good" means for this product
    gates: [string]          # the bars /validate enforces (the project-defined
                             # quality vision gates quality-auditor verifies)

  metadata:
    created_by: string       # /vision (directional) then /understand (derived rollup)
    version: integer

# ---- Level scale (ordinal) -------------------------------------------------
# none < low < medium < high < xhigh
# A capability needing `high`/`xhigh` on a dimension pushes the product profile
# up to that level. KB conditions compare against it, e.g. "include MFA when
# security >= high".

# ---- The rollup ------------------------------------------------------------
# product.nfr[d]     = max( capability.ice.nfr_needs[d] ) over all capabilities
# product.compliance = union( capability compliance needs )
# The source of truth is the per-capability nfr_needs in each capability's ICE;
# the product profile is the derived view. Re-rolls as capabilities change.

# ---- Example: a payments product, after rollup -----------------------------
# The product didn't declare security: xhigh — the payments capability needed it,
# so the profile rolled up to it.
#
# profile:
#   product_ref: phoenix
#   state: derived
#   shape: { stage: monetized, users: public, monetization: paywall, surfaces: [web, api] }
#   nfr:                       # rolled up from capabilities
#     performance: high        # checkout capability needs speed
#     security: xhigh          # payments capability needs it — pulls product up
#     accessibility: high      # public web surface
#     scalability: medium
#     reliability: high
#     privacy: high
#     observability: medium
#     maintainability: medium
#   compliance: [PCI-DSS, GDPR]   # union: payments -> PCI-DSS, accounts -> GDPR
#   quality_vision:
#     statement: "Trustworthy checkout — fast, accessible, provably secure."
#     gates:
#       - "no P1 or P2 security findings"
#       - "WCAG 2.1 AA on every user-facing screen"
#       - "p95 checkout latency < 300ms"
#       - "all PII encrypted at rest and in transit"

# Supersedes the old three-axis project profile (ADR 014: scale/complexity/risk).
