# Product Profile Schema — v1
#
# The NFR + shape posture of a product. Generated during /understand (or a
# profiling step) and attached to the product, with optional per-capability
# overrides. The KB matches its learnings' `conditions` against this profile to
# pick the best-fit capabilities, functionalities, and architecture.
#
# This is the canonical vocabulary the KB's conditions speak — KB learnings
# reference these dimension names so selection is principled, not ad-hoc.

schema:
  name: product-profile
  version: 1

profile:
  product_ref: string        # the ProductOS root this profiles

  shape:                     # situational dimensions (stage / scale / surfaces)
    stage: string            # prototype | internal | public | monetized
    users: string            # one | small-team | public
    monetization: string     # none | lead-capture | paywall
    surfaces: [string]       # which interface types the product exposes:
                             # web | mobile | cli | api | desktop | embedded
                             # (a product may have several; drives which KB
                             # learnings apply — e.g. the frontend shelf needs web)

  nfr:                       # quality posture — each on the level scale below
    performance: string
    security: string
    accessibility: string
    scalability: string
    reliability: string      # availability / uptime
    privacy: string          # data sensitivity
    observability: string
    maintainability: string

  compliance: [string]       # regimes in force, e.g. [GDPR, HIPAA, PCI-DSS, SOC2]; [] = none

  quality_vision:            # the NFR posture turned into checkable gates
    statement: string        # one line: what "good" means for this product
    gates: [string]          # the bars /validate enforces, e.g.
                             # "no P1 security findings", "WCAG 2.1 AA",
                             # "unit coverage >= 80%", "p95 latency < 200ms"
                             # (this is what quality-auditor verifies as the
                             #  project-defined quality vision gates)

  overrides:                 # optional per-capability NFR overrides
    - capability_ref: string
      nfr: {}                # same nfr keys; override the product default

  metadata:
    created_by: string       # /understand (or the profiling step)
    version: integer

# ---- Level scale (ordinal) -------------------------------------------------
# none < low < medium < high < critical
# KB conditions compare against these, e.g. "include MFA when security >= high".

# Supersedes the old three-axis project profile (ADR 014: scale/complexity/risk)
# — those collapse into this fuller NFR + shape profile.

# ---- Example: a monetized, public web product that handles payments --------
# Shows what the NFR levels look like filled in, and what quality_vision turns
# them into. (Illustrative — not part of the schema shape above.)
#
# profile:
#   product_ref: phoenix
#   shape:
#     stage: monetized
#     users: public
#     monetization: paywall
#     surfaces: [web, api]
#   nfr:
#     performance: high          # checkout must feel instant
#     security: critical         # handles payments + PII
#     accessibility: high        # public consumer product
#     scalability: medium        # growing, not hyperscale
#     reliability: high          # downtime = lost revenue
#     privacy: high              # stores personal + payment data
#     observability: medium
#     maintainability: medium
#   compliance: [PCI-DSS, GDPR]
#   quality_vision:
#     statement: "Trustworthy checkout — fast, accessible, and provably secure."
#     gates:
#       - "no P1 or P2 security findings"
#       - "WCAG 2.1 AA on every user-facing screen"
#       - "p95 checkout latency < 300ms"
#       - "unit coverage >= 80%, no untested payment paths"
#       - "all PII encrypted at rest and in transit"
#
# Read the two together: nfr says HOW MUCH each quality matters (security:
# critical); quality_vision says the CHECKABLE BAR that posture implies
# (no P1/P2 security findings). The KB matches nfr/shape; /validate enforces
# the gates.
