# design-findings.yaml — Layer 2 design-grounding for PR #482 (issue #467)
# Design-bearing categories checked: harness, memory (per categories.yaml)
# Grounding is read ONLY from committed sources on origin/main — never from this
# branch's own diff-added prose. Sources cited below all resolve via
# `git show origin/main:<path>`.

grounding_sources:
  - id: adr-025
    path: docs/adr/025-level-3-redefined-skeleton-and-loop.md
    principle: >
      "Determinism lives at the skeleton, never inside the boxes." Runtime execution
      inside a play stays deterministic; learning happens between runs (at close),
      never as inference inside the loop.
  - id: gate-config
    path: core/components/memory/standards/rules/gate-config.md
    principle: >
      Three gate kinds (pinned / conditional / off). Resolution order, first match
      wins: 0. pinned (always on, no config/policy/ledger can turn it off) → 1.
      gates.plays.<play> override → 2. conditional plays only: learned-policy lookup
      via classify_change.py's shape key, gated on auto/never_auto and a
      blocking-finding guard → 3. gates.classes.<declared class> → 4. gates.default →
      5. absent ⇒ on. Ruled pinned set: grill, launch, learn. Ruled conditional set
      (eleven document plays): vision, understand, shape, roadmap, ux, agentic,
      marketing, arch, quality, run, measure. Ledger append is mandatory on every
      crossing (auto-pass AND on-path). distill_gate_policy.py runs at close.
  - id: gate-learning-design
    path: .garura/project/issues/467/specs/gate-learning-design.md
    principle: >
      classify_change.py is deterministic, fixed-axis, no-inference shape
      classification (Part 1.1). Runtime application is three mechanical moves:
      classify → policy lookup → auto-pass or gate, with a blocking-finding safety
      rail (Part 1.4). distill_gate_policy.py runs "at each conditional play's
      close (cheap: read JSONL, write YAML)" — a soft/non-blocking refresh, not a
      gate itself (Part 1.3). Batch B scope is exactly "conditional wiring into the
      11 document plays (one ICE edit each)"; deploy stays untouched pending ruling;
      grill/launch/learn are untouched by design (Part 3).
  - id: play-pipeline-rule
    path: CLAUDE.md (Play Pipeline Rules section, committed on main)
    principle: >
      An intent change (constraints, failure conditions, scenarios, agent/skill flow)
      MUST go through the play's ICE source (reference/ice.md) and be recompiled —
      never a hand-edit of the compiled SKILL.md. The Compilation Metadata table's
      fingerprint must be a real sha256 of reference/ice.md, not a placeholder
      (enforced by play-creator/scripts/lint_play.py::check_fingerprint).
  - id: memory-relation
    path: core/components/memory/standards/templates/approval-prompt.md (Related section, prior committed version)
    principle: >
      approval-prompt.md is the checkpoint-rendering template that gate-config.md's
      switch gates; the two documents must describe one consistent resolution order
      and one consistent switch-state vocabulary (on / off, and now auto-pass).

checks:
  - id: check-1-ice-discipline
    category: harness
    description: >
      Each of the eleven conditional plays was changed via reference/ice.md +
      play-editor recompile, not a hand-edit of the compiled SKILL.md.
    principle: >
      play-pipeline-rule (CLAUDE.md); fingerprint mechanics from play-creator/scripts/lint_play.py::check_fingerprint (committed on main)
    method: >
      Mechanically recomputed `shasum -a 256 reference/ice.md` for all 11 touched
      plays (agentic, arch, marketing, measure, quality, roadmap, run, shape,
      understand, ux, vision) and diffed against each SKILL.md's declared
      Compilation Metadata fingerprint. Spot-verified 3 (vision, quality, run) by
      hand first, then ran the same check across all 11.
    verdict: conforms
    details: >
      All 11 fingerprints match exactly. Example: vision declares
      sha256:6483756816ee32b576e91421fca45de97682fe7da702dbd0a9bc827a47d1d96d,
      recomputed shasum of core/components/plays/vision/reference/ice.md is
      identical. Same for quality (fe14702689bf1ee...) and run (f88a93f2a079...),
      and for the remaining 8. Every SKILL.md's compiled_by field also credits
      play-editor for the #467 Batch B compile, consistent with the ICE-source
      discipline (no play shows a #467 change with a stale or missing compiled_by).

  - id: check-2-gate-config-conformance
    category: harness
    description: >
      The checkpoint step in each conditional play implements exactly the committed
      gate-config.md resolution order, appends the ledger on both the on-path and
      the auto-pass path, and refreshes the policy softly at close.
    principle: >
      gate-config (resolution order, ledger-on-every-crossing, pinned immutability) and gate-learning-design (distill is a close-time, non-blocking refresh)
    method: >
      Read the Checkpoint phase text in run/SKILL.md, quality/SKILL.md, and
      vision/reference/ice.md's C7, and confirmed the distill_gate_policy.py
      invocation is suffixed `|| true` in every touched play's close phase.
    verdict: conforms
    details: >
      Resolution order stated verbatim in each play matches gate-config.md: pinned
      (n/a for these 11) → gates.plays.<play> → learned policy (classify_change.py
      shape key, checked against auto:/never_auto:, blocking-finding guard) →
      gates.classes.<declared class> → gates.default. Every play's on-path and
      auto-pass path both call gate_eval.py append (verified in run/SKILL.md: one
      call under the auto-pass branch with --predicted auto --human auto_pass, one
      under the gate branch with --predicted gate --human
      approved_clean|approved_edited|rejected). distill_gate_policy.py is invoked at
      close with a trailing `|| true` in every touched play (vision, run, and
      confirmed present in the rest via the same close-phase pattern), matching the
      design doc's "cheap, between-runs, soft" description — a distill failure never
      blocks the close.

  - id: check-3-adr-025-determinism
    category: harness
    description: >
      In-loop gate resolution stays classify (pattern counts) + file lookup; no
      inference is introduced inside the loop.
    principle: >
      adr-025 ("Determinism lives at the skeleton, never inside the boxes") and gate-learning-design Part 1.1/1.4 ("No inference anywhere: every axis is countable")
    method: >
      Read core/components/plays/play-creator/references/classify_change.py in
      full for any model/LLM call, and diffed the canonical copy against the
      11 stamped copies under each play's scripts/.
    verdict: conforms
    details: >
      classify_change.py's own docstring states "No inference anywhere: every axis
      is countable" and the script body is pure regex/difflib counting against
      fixed axes (nodes_added, nodes_removed, status_changes, profile_bars_changed,
      decisions_added, sections_rewritten, prose_edits) — no import of any model
      client, no network call. All 11 stamped scripts/classify_change.py (and
      distill_gate_policy.py, gate_eval.py) are byte-identical to the canonical
      play-creator/references/ copies (diff empty for all three scripts across all
      11 plays) — the loop calls the same deterministic classifier and policy
      lookup everywhere, matching ADR 025's rule that learning happens between runs
      (the close-time distill) and runtime stays a file lookup.

  - id: check-4-467-ruling-conformance
    category: harness
    description: >
      The eleven conditional plays touched match the ruled list exactly; vision's
      wiring conforms to its ruling as conditional (not pinned); grill, launch,
      learn are untouched.
    principle: >
      gate-config ("the eleven document plays ... are conditional") and gate-learning-design's gate taxonomy table (ruled 2026-07-04)
    method: >
      Diffed changed play directories against the ruled conditional list; read
      origin/main's vision/reference/ice.md checkpoint clause (C7) to confirm
      vision was never pinned before this PR.
    verdict: conforms
    details: >
      Plays touched: agentic, arch, marketing, measure, quality, roadmap, run,
      shape, understand, ux, vision — exactly the eleven named in gate-config.md
      and the design doc's ruled table, no more, no fewer. grill, launch, learn,
      deploy, and the pipeline/execute plays show zero diff. On origin/main,
      vision's checkpoint (C7) was already a plain unconditional human checkpoint
      with no `pinned` declaration — so there was nothing to "unpin"; this PR wires
      it conditional for the first time, which is exactly what the ruling calls
      for (vision is in the ruled conditional set, not the pinned set).

  - id: check-5-wiring-intact
    category: harness
    description: >
      Play→agent→skill→script wiring stays intact; the checkpoint remains
      play-owned; no JSON contract collapses into inline work.
    principle: >
      gate-learning-design Part 1.4 (runtime application is "the conditional play's checkpoint step" — i.e. the play, not an agent) and the committed CLAUDE.md Agent-First rule (agents craft context, skills produce artifacts, plays orchestrate)
    method: >
      Read the "Owner:" tag on the Human review checkpoint step in run/SKILL.md and
      quality/SKILL.md.
    verdict: conforms
    details: >
      Both checkpoint steps read "Owner: play" — the checkpoint (classify → policy
      lookup → auto-pass/gate → ledger append) is play-orchestrated, calling the
      bundled scripts directly, not delegated to an agent. This matches the design:
      the learning mechanism is deterministic tooling the play itself runs, not a
      judgement call handed to an agent.

  - id: check-6-memory-template-conformance
    category: memory
    description: >
      approval-prompt.md's gate-switch section matches gate-config.md's rule with
      no contradiction.
    principle: >
      gate-config (three kinds, resolution order, auto-pass behaviour) — the template must describe the same switch the rule defines
    method: >
      Diffed approval-prompt.md between origin/main and this branch; compared the
      new text against gate-config.md (already-committed on main since PR #480).
    verdict: conforms
    details: >
      The added "Gate switch (#466, three kinds per #467)" section states the same
      5-step resolution order as gate-config.md (pinned → gates.plays → conditional
      policy lookup w/ blocking-finding guard → gates.classes → gates.default) and
      adds an "auto-pass" behaviour block whose wording (record a Checkpoint
      Decisions row, append the ledger with predicted:auto/human:auto_pass, never
      silent) matches gate-config.md's "Behaviour of the switch" section and the
      Runtime application text (Part 1.4) in the design doc. No contradiction
      found between template and rule.

summary:
  categories_checked: [harness, memory]
  total_checks: 6
  conforms: 6
  findings: 0
  note: >
    No P1-P4 findings raised. Every principle cited above traces to a source
    committed on origin/main before this branch (ADR 025, gate-config.md, the
    #467 design doc, and CLAUDE.md's play-pipeline rule) or to the prior
    (origin/main) version of approval-prompt.md — none was reconstructed from
    this branch's own diff-added prose. Grounding was reconstructable for both
    design-bearing categories; no "grounding unavailable" gap encountered.
