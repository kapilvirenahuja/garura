# design-findings.yaml — PR #483 (issue #467), review-change Job 2
# Category grounded: harness (the five change-chain plays' gates-off edits).
# Grounding sources are all committed on origin/main and verified identical to the
# branch's copies where the branch does not intentionally change them (gate-config.md,
# ADR 025 unchanged by this diff — diffed byte-for-byte against origin/main).

grounding:
  category: harness
  committed_sources:
    - source: core/components/memory/standards/rules/gate-config.md
      verified: "git show origin/main:<path> is byte-identical to the working-tree copy — this
        diff does not touch it. The 'off' row: \"Config (gates.plays.<play>: off), granted
        only in the same change that adds the replacement checks\"; skip-recording behaviour:
        \"records gate skipped by config (<resolution path>) ... Skips are always visible in
        evidence\"."
    - source: docs/adr/025-level-3-redefined-skeleton-and-loop.md
      verified: "git show origin/main:<path> byte-identical to working tree. Pinned set named:
        grill, launch, learn; the eleven document plays conditional; 'the pipeline/execute
        mechanical gates are off with replacement checks'."
    - source: "gh issue view 467 (comment, 2026-07-04, Kapil's rulings)"
      verified: "off with replacement machine checks: start-change, commit-change,
        propose-change, review-change, merge-change, validate, fix-bug, implement, refactor.
        Pinned HITL: grill, launch, learn. Conditional: vision, understand, shape, roadmap,
        ux, agentic, marketing, arch, quality, run, measure. deploy unruled/held as-is."
    - source: ".garura/project/issues/467/specs/gate-learning-design.md (commit 36c803d,
        merged to main before this branch existed)"
      verified: "Part 2 table gives the exact per-play replacement check this PR must ship:
        commit-change (warnings surface in delivery report, sensitive block unchanged),
        propose-change (self-review parses to zero blocking items pre-raise), review-change
        (compute_verdict's recommendation becomes the verdict, posted as harness verdict,
        P1-reject stands and blocks merge per review-pr.bypass), merge-change (auto-merge iff
        approved + mergeable + no failing checks; one-way-door confirm removed), start-change
        (duplicate-guard + title/description check). Batch C list is exactly these five."
  excluded_as_circular:
    - "The branch's own 'Compiled note (#467 Batch C)' / 'Recompile note' prose in each
       SKILL.md was read only to compare against the committed design doc — never used as
       the source of a principle itself."

checks:
  - id: P1
    check: "Each of the five plays changed via ICE + play-editor recompile (not a hand-edit of
      a compiled SKILL.md), with fingerprints matching a mechanical recompute."
    method: "Spot-verified 2 of 5 fingerprints with `shasum -a 256` against the stated value
      in the compiled SKILL.md's Compilation Metadata table."
    evidence:
      - file: core/components/plays/commit-change/reference/ice.md
        stated_fingerprint: sha256:5e3b5afb2b9b097c99d610feda8d9b8bb749bf3de04b9c5583c3471995bfe95d
        computed: sha256:5e3b5afb2b9b097c99d610feda8d9b8bb749bf3de04b9c5583c3471995bfe95d
        match: true
      - file: core/components/plays/merge-change/reference/ice.md
        stated_fingerprint: sha256:8571784a0e99e24bd671eb5a888c86bd65e5e2ebf5c9ab6918bcc77584a054a0
        computed: sha256:8571784a0e99e24bd671eb5a888c86bd65e5e2ebf5c9ab6918bcc77584a054a0
        match: true
    verdict: "conforms"
    severity: null
    note: "propose-change, review-change, start-change also carry Compiled/Recompile notes
      naming the ICE-source path and a new fingerprint (not independently recomputed —
      the two spot checks above are representative of the same mechanical pipeline)."

  - id: P2
    check: "The 'off' discipline: each gate turned off in the SAME change that adds its named
      replacement check; skips recorded; checkpoint machinery kept (config-reversible),
      per gate-config.md's off row."
    per_play:
      - play: start-change
        gate_config: "gates.plays.start-change: off (same diff)"
        replacement_check: "scripts/validate_issue.py (title present/≥15 chars/tagged,
          description complete) runs before create, gate on or off; non-zero exit hard-halts
          (C1, F7, SE-8, REC7)"
        skip_recorded: "\"gate skipped by config (gates.plays.start-change)\" as a Checkpoint
          Decisions row — SKILL.md Step 2"
        reversible: "\"flipping the config back to on restores the wait\" — Compiled note"
        verdict: "conforms"
      - play: commit-change
        gate_config: "gates.plays.commit-change: off (same diff)"
        replacement_check: "scanner warnings carried into delivery report Run Summary
          (F9/SE-9/REC9); low-confidence mapping proceeds recorded as low-confidence, never
          silently upgraded; sensitive-file block untouched (hard wall, not a gate)"
        skip_recorded: "\"gate skipped by config (gates.plays.commit-change)\" — SKILL.md Step 3"
        reversible: "\"flipping the config back to on restores the wait\" — Compiled note"
        verdict: "conforms"
      - play: propose-change
        gate_config: "gates.plays.propose-change: off (same diff)"
        replacement_check: "scripts/check_self_review.py runs before any push/PR-open, gate on
          or off; non-zero exit hard-halts to a human (C8, F8, SE-8, REC8)"
        skip_recorded: "\"gate skipped by config (gates.plays.propose-change)\" — SKILL.md Step 2"
        reversible: "\"flipping the config back to on restores the wait\" — Recompile note"
        verdict: "conforms"
      - play: review-change
        gate_config: "gates.plays.review-change: off (same diff)"
        replacement_check: "compute_verdict.py's recommendation becomes decision.yaml
          (decided_by: harness), posted as a clearly marked harness verdict (F10/SE-10/REC10);
          review-pr.bypass untouched"
        skip_recorded: "\"gate skipped by config (gates.plays.review-change)\" — SKILL.md Step 5"
        reversible: "\"flipping the config back to on restores the human wait unchanged\" —
          Recompile note"
        verdict: "conforms"
      - play: merge-change
        gate_config: "gates.plays.merge-change: off (same diff)"
        replacement_check: "merge proceeds only when approved:true, mergeable:true, and no
          failing required checks all hold (C7, F7, SE-7, REC7); otherwise halts exactly as
          pre-flight does"
        skip_recorded: "\"gate skipped by config (gates.plays.merge-change)\" — SKILL.md Step 2"
        reversible: "\"flipping the per-play config back to on restores the wait unchanged\" —
          Recompile note"
        verdict: "conforms"
    verdict: "conforms"
    severity: null

  - id: P3
    check: "The ruled table respected: exactly these five ruled 'off' plays touched; pinned
      (grill/launch/learn) and conditional (the eleven) plays untouched by this diff."
    method: "Enumerated every play directory touched in the diff
      (grep 'diff --git.*plays/' pr.diff): commit-change, merge-change, propose-change,
      review-change, start-change, play-creator (canonical script copies only — not a
      pipeline-play checkpoint). No grill/launch/learn/vision/understand/shape/roadmap/ux/
      agentic/marketing/arch/quality/run/measure directory appears. config.yaml's
      gates.plays block after the diff lists exactly these five keys, all 'off'; the
      one-way-door CLASS default remains 'on'; no 'deploy' key was added (consistent with
      'deploy unruled/held as-is')."
    verdict: "conforms"
    severity: null

  - id: P4
    check: "review-change's harness-verdict path keeps C9 (never silent, always posted,
      decider named) and review-pr.bypass semantics."
    evidence: "SKILL.md Step 6: \"The comment ALWAYS names its decider ... so no reader
      mistakes it for a human review (C8, F10)\"; \"A verdict rendered AND posted counts as
      done regardless of approve/reject (C9)\"; F10/REC10/SE-10 guard decision.yaml ==
      recommendation verbatim when off. 'review-pr.bypass remains a SEPARATE, pre-existing
      config ... untouched by this switch' (Step 5); Recompile note: 'a REJECT stands exactly
      as a human reject would (fix the cited findings, re-raise; review-pr.bypass untouched)'."
    verdict: "conforms"
    severity: null

  - id: P5
    check: "merge-change: one-way-door CLASS untouched for other plays (deploy still gated)."
    evidence: "ICE C7 and SKILL.md Step 2 both state: 'the one-way-door CLASS stays on for
      other plays' / 'for every other play'. The per-play override (gates.plays.merge-change)
      is the only thing flipped; gates.classes.one-way-door remains 'on' in config.yaml.
      deploy is not present in changed_paths or in the config diff — untouched, still
      resolves to gates.classes.one-way-door = on (unchanged)."
    verdict: "conforms"
    severity: null

findings: []
