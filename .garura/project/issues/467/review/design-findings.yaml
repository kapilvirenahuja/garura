        (Stage 4 design doc, ruled 2026-07-04, merged to main before this branch existed)"
      verified: "Gate taxonomy table places fix-bug and implement in the 'Off — machine
        checks carry it' row explicitly alongside validate and refactor. Part 2 per-play
        replacement-check table gives the exact machine wall this PR must ship: validate
