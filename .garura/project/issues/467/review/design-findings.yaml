findings:

  - id: DF-1
    file: core/components/plays/deploy/SKILL.md
    check: "fingerprint mechanical conformance (lint_play.py invariant)"
    principle: "A compiled play's fingerprint must equal sha256 of its own reference/ice.md;
      an intent change must trace to the ICE source, never a hand-edited compiled file."
    committed_source: "knowledge/review/harness.md (Layer-1 linter definition); the fingerprint
      mechanism itself is defined in the play-editor compiler, referenced from
      core/components/plays/deploy/SKILL.md's own 'Compiled From' section."
    verification: "shasum -a 256 core/components/plays/deploy/reference/ice.md (working tree)
      = 495ffe2a4d7fb55d8e4b598a24cba7f6586ef9204ed5b3b6f90cc917635cb431, matches the
      fingerprint recorded in SKILL.md's Compilation Record exactly."
    severity: pass
    status: conforms

  - id: DF-2
    file: core/components/memory/standards/rules/gate-config.md
    check: "pin mechanics match the committed 'pinned' definition (never resolves off,
      config cannot disable, changed only via ICE/play-editor)"
    principle: "'pinned' — Always fires. No config value, policy, or ledger can turn it
      off. Unpinning is an intent change to that play (play-editor), never a config edit."
    committed_source: "core/components/memory/standards/rules/gate-config.md @ base
      7ada772b (git show 7ada772b:core/components/memory/standards/rules/gate-config.md)
      — the pinned-kind row and 'Pinned gates' section, unchanged by this branch."
    finding: "The new deploy Step 1 text ('always requires a typed human approval... no
      config value, policy, or ledger can disable it; unpinning is an intent change via
      play-editor') restates the committed definition correctly. The mechanics of the
      pin itself conform."
    severity: pass
    status: conforms

  - id: DF-3
    file: core/components/plays/deploy/reference/ice.md
    check: "C10/F10/REC10/SE-11 form one coherent new constraint set with no orphans;
      old config-switch/off-path text for Step 1 fully removed"
    principle: "knowledge/review/harness.md Layer-1: lint_play.py invariant — every
      constraint/failure/scenario is covered by exactly one eval, exactly one recovery
      per failure, no orphan references."
    committed_source: "knowledge/review/harness.md (Layer 1, lint_play.py description)"
    verification: "C10 (ice.md) -> F10 (ice.md) -> REC10 (ice.md) -> SE-11 (SKILL.md,
      Evidence & Close) -> step_evals/recovery_entries counters incremented 10->11 and
      9->10 in the Compilation Record, consistently. The prior 'this checkpoint is a
      config switch... when resolved off, it does not wait: it records gate skipped by
      config' paragraph for Step 1 is removed in full — no dangling off-path text remains
      in the diff."
    severity: pass
    status: conforms

  - id: DF-4
    file:
      - core/components/plays/deploy/SKILL.md
      - core/components/plays/deploy/reference/ice.md
      - core/components/memory/standards/rules/gate-config.md
    check: "the branch's stated authority for pinning deploy ('per Kapil's ruling —
      deploy needs HITL') against the committed issue record"
    principle: "Every prior pinned-set entry (grill, launch, learn, merge-change's land)
      traces to an explicit ruling comment on issue #467, and gate-config.md's own text
      says the pinned set changes only by a ruled intent change. A pin claimed to be
      'per Kapil's ruling' must be traceable to an actual ruling comment, not asserted
      by the branch that implements it."
    committed_source: "gh issue view 467 --comments (3 committed comments as of base
      7ada772b): comment 2 (Stage 4 direction record) states explicitly '...deploy
      unruled (held as-is)'; comment 3 (the merge-change re-pin correction) states
      'Pinned set is now: grill, launch, learn, and merge-change's land' — deploy is
      named nowhere as pinned in any comment. gate-config.md @ base 7ada772b independently
      confirms the same pinned set with no deploy entry."
    finding: "GROUNDING GAP. Both new prose blocks — the SKILL.md '(#467) deploy Confirm
      checkpoint pinned per Kapil's ruling' note and the ICE C10 constraint text — assert
      an issue ruling that does not exist in the committed issue #467 record. The only
      committed disposition for deploy is 'unruled (held as-is).' This is exactly the
      circular-grounding failure mode this review guards against: the branch cites an
      authority for its own change that only the branch itself asserts, not a source
      that predates the branch. The pin mechanism (C10/F10/REC10/SE-11, the gate-config.md
      edit) is internally well-formed (see DF-1..DF-3), but its stated justification is
      unsupported by any committed source. Either (a) a real ruling comment exists on
      #467 that was not surfaced to this review, in which case cite the comment id/date
      precisely instead of 'per Kapil's ruling', or (b) no such ruling exists, in which
      case this PR is unilaterally pinning a gate the issue record explicitly left open,
      which needs a human decision before merge, not a retroactive citation."
    severity: P2
    status: violation
    recommendation: "Before merge: either produce the actual issue-467 comment that rules
      deploy pinned (and cite it precisely, replacing the vague 'per Kapil's ruling'), or
      route this through an explicit new ruling/decision record rather than asserting one
      inside the PR that implements it."

  - id: DF-5
    file: core/components/memory/standards/rules/gate-config.md
    check: "scope — only deploy + gate-config touched, no other play changed"
    principle: "knowledge/review/harness.md Layer 1 (lint_play.py / lint-components scope
      discipline) — a change should touch only the plays its stated intent covers."
    committed_source: "diff itself (changed_paths) cross-checked against issue #467"
    verification: "Only 4 files changed: deploy/SKILL.md, deploy/reference/ice.md,
      gate-config.md, and .garura/project/issues/467/context/branch.json (an STM record,
      not harness). No other play's SKILL.md/ice.md is touched."
    severity: pass
    status: conforms

summary:
  total_findings: 5
  violations: 1
  severity_breakdown:
    P2: 1
  headline: "The pin's mechanics (fingerprint, gate-config.md semantics, C10/F10/REC10/SE-11
    coherence, scope) all conform. The one violation is that the PR's stated justification
    — 'per Kapil's ruling' — is not backed by any committed issue-467 comment; the committed
    record instead says deploy was left 'unruled (held as-is).' Grounding this in the
    branch's own assertion rather than a committed ruling is the circular pattern this
    review exists to catch."
