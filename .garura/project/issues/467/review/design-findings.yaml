      verified: "git show <base_sha>:<path>, unchanged by this diff. 'Human gates become
        configuration. Checkpoints stay defaulted on; each becomes a per-risk-class switch,
        retired one class at a time only on recorded evidence that the runner catches what
        the human was catching (Stages 3-4).' Names Stage 4 (#467) as evidence-based gate
        reduction, staged after commit-change pilot (#465) and rollout (#466)."
