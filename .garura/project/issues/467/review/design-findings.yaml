        before this branch's base_sha commit)"
      verified: "\"off with replacement machine checks: start-change, commit-change,
        propose-change, review-change, merge-change, validate, fix-bug, implement,
        refactor; deploy unruled (held as-is)\". Pinned HITL: grill, launch, learn.
        Conditional: vision, understand, shape, roadmap, ux, agentic, marketing, arch,
        quality, run, measure."
