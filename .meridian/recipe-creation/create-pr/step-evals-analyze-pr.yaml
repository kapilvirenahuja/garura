skill: analyze-pr
eval_type: step
intent_path: core/components/recipes/create-pr/reference/intent.yaml
evals:
  - id: SE-AP-1
    name: "Checklist items trace to file patterns in the diff"
    failure_condition: F2
    check: >
      Every checklist item references at least one concrete file pattern or
      file path that appears in the actual git diff (e.g., "*.ts files changed",
      "migrations/ modified"). Items that cite no specific diff artifact are
      generic and must not appear.
    pass_criteria: >
      100% of checklist items contain an explicit reference to a file, file
      pattern, or directory present in `git diff --name-only main..HEAD`.
      Zero items use language like "ensure code quality" or "follow best
      practices" without tying it to a changed file.

  - id: SE-AP-2
    name: "No checklist items for unchanged file categories"
    failure_condition: F2
    check: >
      The checklist does not contain items triggered by file categories
      (API, security, database, UI, tests, docs) that have zero matching
      files in the diff.
    pass_criteria: >
      For every checklist item, the trigger category (from Section 2 of
      SKILL.md context analysis) has at least one matching file in the diff.
      Example: a "migration safety" item must not appear if no files under
      **/migrations/** or *.sql changed.

  - id: SE-AP-3
    name: "Trigger reason stated for every checklist item"
    failure_condition: F2
    check: >
      Each checklist item shows its trigger reason explaining why the item
      is relevant to this specific set of changes, as required by SKILL.md
      Section 6.
    pass_criteria: >
      Every checklist item includes a trigger field or inline explanation
      that names the specific rule matched and the file pattern or commit
      type that activated it. Items with no trigger reason fail.

  - id: SE-AP-4
    name: "Automated checks include evidence output"
    failure_condition: F3
    check: >
      Checklist items verified by automated commands (merge conflict check,
      secret scan, test run, build check) include the actual command output
      or a summary of the result as evidence.
    pass_criteria: >
      Every automated checklist item contains either the literal command
      output, a pass/fail result with the command that produced it, or a
      reference to CI status. Items marked as automated that show no
      evidence output fail.

  - id: SE-AP-5
    name: "Manual review items are marked REVIEW, not PASS"
    failure_condition: F3
    check: >
      Items that cannot be verified automatically (e.g., code readability,
      naming conventions, architectural alignment) are marked with REVIEW
      status, not falsely marked as PASS without evidence.
    pass_criteria: >
      Every item that lacks automated verification output is marked REVIEW.
      No item is marked PASS unless it has corresponding evidence from an
      automated check or explicit file-level analysis.

  - id: SE-AP-6
    name: "Evidence references actual diff content, not assumptions"
    failure_condition: F3
    check: >
      Evidence backing checklist items is derived from the actual diff,
      commit log, or file content — not from general assumptions about
      what the code should contain.
    pass_criteria: >
      Each piece of evidence cites a specific commit hash, file path, diff
      hunk, or command output from the analyzed branch. Evidence that uses
      phrases like "assumed to be correct" or "should have tests" without
      checking fails.

  - id: SE-AP-7
    name: "Blocking issues are substantiated"
    failure_condition: F3
    check: >
      Any item flagged as a blocking issue in the readiness assessment is
      backed by concrete evidence (failed command, detected secret pattern,
      merge conflict output).
    pass_criteria: >
      Every blocking item includes the evidence that caused it to block.
      A blocking flag with no supporting evidence fails. Non-blocking items
      are exempt from this check.
