step_evals:
  # --- From failure conditions ---

  - id: SE-1
    source: F1
    step: 1 (Analyze Changes)
    artifact: "{stm_base}/{issue}/evidence/commit-code/analysis.yaml"
    check: >
      Each change group contains only files sharing the same concern.
    pass_criteria: >
      No group mixes unrelated file sets. Every file in a group shares a
      common concern (same module, same feature, same config area).

  - id: SE-2
    source: F1
    step: 5 (Create Commits)
    artifact: "{stm_base}/{issue}/evidence/commit-code/commits.yaml"
    check: >
      Each commit stages only files from a single change group.
    pass_criteria: >
      No cross-group contamination. The set of files in each commit is a
      subset of exactly one change group from analysis.yaml.

  - id: SE-3
    source: F2
    step: 5 (Create Commits)
    artifact: "{stm_base}/{issue}/evidence/commit-code/commits.yaml"
    check: >
      Each commit message subject describes the specific change, not a
      generic issue reference.
    pass_criteria: >
      No commit message follows conventional format but fails to describe
      the actual change (e.g., "fix: resolve issue #42" with no description
      of what was fixed is a failure).

  - id: SE-4
    source: F3
    step: 1 (Analyze Changes)
    artifact: "{stm_base}/{issue}/evidence/commit-code/analysis.yaml"
    check: >
      Every file from git status appears in at least one change group.
    pass_criteria: >
      No file silently dropped. The union of all change group file lists
      equals the full set of changed files from git status.

  - id: SE-5
    source: F3
    step: 5 (Create Commits)
    artifact: "{stm_base}/{issue}/evidence/commit-code/commits.yaml"
    check: >
      After all commits, no previously changed files remain uncommitted
      without a stated exclusion reason.
    pass_criteria: >
      Every file that was changed before recipe execution is either
      committed or has an explicit exclusion reason recorded.

  - id: SE-6
    source: F4
    step: 2 (Resolve Issues)
    artifact: "{stm_base}/{issue}/evidence/commit-code/issue-mappings.yaml"
    check: >
      Each mapped issue is semantically related to its change group.
    pass_criteria: >
      Reasoning substantiates the connection between each change group
      and its mapped issue. No commit references the wrong issue.

  - id: SE-7
    source: F5
    step: 2 (Resolve Issues)
    artifact: "{stm_base}/{issue}/evidence/commit-code/issue-mappings.yaml"
    check: >
      Mapping conflicts (multiple competing issues for a group) are
      explicitly flagged, not silently resolved.
    pass_criteria: >
      When multiple issues compete for a single change group, the conflict
      is surfaced in the mapping artifact. No commit is created from a
      group with an unresolved conflict without the conflict being flagged.

  - id: SE-8
    source: F6
    step: 2 (Resolve Issues)
    artifact: "{stm_base}/{issue}/evidence/commit-code/issue-mappings.yaml"
    check: >
      Every mapping includes a confidence level. Mappings below high
      confidence are identifiable for approval gating.
    pass_criteria: >
      Each issue mapping has a confidence field. Mappings with less than
      high confidence are distinguishable so the checkpoint phase can
      require human approval for those mappings.

  # --- From artifact-verifiable constraints ---

  - id: SE-9
    source: C3
    step: 5 (Create Commits)
    artifact: "{stm_base}/{issue}/evidence/commit-code/commits.yaml"
    check: >
      Every commit references an existing issue.
    pass_criteria: >
      Each commit record contains an issue reference. If any changes
      cannot be mapped to an existing issue, the recipe halts and
      instructs the user to create the issue first.

  - id: SE-10
    source: C5
    step: 5 (Create Commits)
    artifact: "{stm_base}/{issue}/evidence/commit-code/commits.yaml"
    check: >
      Commit messages follow conventional commit format.
    pass_criteria: >
      Each commit message uses a conventional commit type sourced from
      LTM. Types are not hardcoded.

  - id: SE-11
    source: C6
    step: 5 (Create Commits)
    artifact: "{stm_base}/{issue}/evidence/commit-code/commits.yaml"
    check: >
      Commit messages include the linked issue number.
    pass_criteria: >
      Each commit message contains the issue number from its mapping.

  - id: SE-12
    source: C7
    step: 6 (Push Branch)
    artifact: git state (local vs remote HEAD)
    check: >
      After commits are created, the branch is pushed to the remote.
    pass_criteria: >
      Local HEAD matches remote HEAD after push. Push failure is
      non-blocking — commits are valid regardless of push outcome.
      The recipe logs the failure and continues.

scenario_evals:
  - id: SCE-1
    source: S1
    persona: Code reviewer
    check: >
      Each commit has a conventional type, meaningful scope, and
      descriptive subject.
    pass_criteria: >
      A code reviewer can understand the scope and nature of each change
      from the git log alone, without reading the diff.

  - id: SCE-2
    source: S1
    persona: Code reviewer
    check: >
      Every commit contains a traceable issue reference to an existing issue.
    pass_criteria: >
      Each commit can be traced to its originating issue.

  - id: SCE-3
    source: S1
    persona: Code reviewer
    check: >
      Each commit contains only files related to a single concern.
    pass_criteria: >
      One coherent unit of work per commit — no mixing of unrelated changes.

  - id: SCE-4
    source: S2
    persona: Team lead
    check: >
      Commits can be filtered by issue number for per-issue progress
      reporting.
    pass_criteria: >
      The team lead can report on progress per issue using commit history.

  - id: SCE-5
    source: S2
    persona: Team lead
    check: >
      All commits consistently follow conventional format.
    pass_criteria: >
      Commit history is suitable as a mentoring reference for conventional
      commit practices.

