step_evals:
  # --- Failure Condition Evals ---

  - id: SE-1
    source_type: "failure_condition"
    failure_condition_id: "F1"
    constraint_id: null
    skill: "draft-product-vision"
    check: "Vision artifact contains fewer than 3 strategic goals, or no target audience is identifiable from the artifact content"
    artifact_pattern: "{product_base}/{slug}/product.yaml"
    pass_criteria: "product.yaml contains 3 or more strategic_goals entries with non-empty title and description, AND at least 1 target_users entry is present with identifiable audience information"
    fail_criteria: "product.yaml has fewer than 3 strategic_goals, or target_users is empty or missing"

  - id: SE-2
    source_type: "failure_condition"
    failure_condition_id: "F1"
    constraint_id: null
    skill: "validate-product-vision"
    check: "Validation checklist reports strategic_goals_defined=true and target_users_identified=true"
    artifact_pattern: "validation_result (structured return)"
    pass_criteria: "checklist.strategic_goals_defined is true AND checklist.target_users_identified is true"
    fail_criteria: "Either checklist.strategic_goals_defined or checklist.target_users_identified is false"

  - id: SE-3
    source_type: "failure_condition"
    failure_condition_id: "F2"
    constraint_id: null
    skill: "discover-product-opportunity"
    check: "The product domain is unresolvable — the user rejected all proposed domain classifications and provided no alternative"
    artifact_pattern: "domain_clarification_needed (structured return from skill)"
    pass_criteria: "Skill returns market_context with a resolved domain, OR user confirms a domain after clarification prompt"
    fail_criteria: "Skill returned domain_clarification_needed AND user rejected all proposed domains AND provided no alternative — play halts"

  - id: SE-4
    source_type: "failure_condition"
    failure_condition_id: "F3"
    constraint_id: null
    skill: "draft-product-vision"
    check: "DRAFT phase completed but no vision artifact exists at the expected path in .meridian/project/product/{slug}/"
    artifact_pattern: "{product_base}/{slug}/product.yaml"
    pass_criteria: "product.yaml exists at {product_base}/{slug}/product.yaml with status: DRAFT after draft-product-vision completes"
    fail_criteria: "product.yaml does not exist at the expected path after DRAFT phase completion"

  - id: SE-5
    source_type: "failure_condition"
    failure_condition_id: "F5"
    constraint_id: null
    skill: "validate-product-vision"
    check: "VALIDATE phase completed with blocker-severity issues still present after 2 cycle-back iterations"
    artifact_pattern: "validation_result (structured return)"
    pass_criteria: "Validation returns no blocker-severity issues, OR iteration_count is less than 2 and cycle-back is still available"
    fail_criteria: "Blocker-severity issues remain in validation_result AND iteration_count has reached 2 — no more cycle-backs permitted"

  - id: SE-6
    source_type: "failure_condition"
    failure_condition_id: "F6"
    constraint_id: null
    skill: "validate-product-vision"
    check: "Artifact path provided for VALIDATE or LOCK does not exist or does not contain a valid vision artifact"
    artifact_pattern: "{artifact_path} (user-provided path)"
    pass_criteria: "Skill reads product.yaml at the provided artifact_path and returns a valid validation_result (no structured failure)"
    fail_criteria: "Skill returns structured failure indicating artifact not found or artifact is not a valid vision artifact"

  - id: SE-7
    source_type: "failure_condition"
    failure_condition_id: "F7"
    constraint_id: null
    skill: "draft-product-vision"
    check: "A LOCK or DRAFT operation was attempted on a vision artifact that is already in LOCKED status"
    artifact_pattern: "{product_base}/{slug}/product.yaml"
    pass_criteria: "If artifact status is LOCKED, skill returns structured failure and does not overwrite the artifact"
    fail_criteria: "Skill overwrites or modifies a LOCKED artifact instead of returning structured failure"

  - id: SE-8
    source_type: "failure_condition"
    failure_condition_id: "F7"
    constraint_id: null
    skill: "validate-product-vision"
    check: "A LOCK or DRAFT operation was attempted on a vision artifact that is already in LOCKED status"
    artifact_pattern: "{artifact_path} (user-provided path)"
    pass_criteria: "If artifact status is LOCKED, skill returns structured failure indicating no validation needed"
    fail_criteria: "Skill proceeds with validation on a LOCKED artifact instead of returning structured failure"

  - id: SE-9
    source_type: "failure_condition"
    failure_condition_id: "F9"
    constraint_id: null
    skill: "generate-product-brief"
    check: "No checkpoint artifact was written before presenting results to the user — the approval flow has no audit trail"
    artifact_pattern: "{product_base}/{slug}/product-brief.html"
    pass_criteria: "product-brief.html exists at output path before the checkpoint is presented to the user"
    fail_criteria: "Checkpoint is presented to user without product-brief.html existing — no audit trail for the approval flow"

  # --- Artifact-Verifiable Constraint Evals ---

  - id: SE-10
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: "C6"
    skill: "draft-product-vision"
    check: "All vision and product artifacts must be written to .meridian/project/product/{slug}/ relative to the project root"
    artifact_pattern: "{product_base}/{slug}/product.yaml"
    pass_criteria: "product.yaml is written to .meridian/project/product/{slug}/ relative to the project root — not per-issue and not in the global home directory"
    fail_criteria: "product.yaml is written outside of .meridian/project/product/{slug}/ or to a global home directory path"

  - id: SE-11
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: "C6"
    skill: "generate-product-brief"
    check: "All vision and product artifacts must be written to .meridian/project/product/{slug}/ relative to the project root"
    artifact_pattern: "{product_base}/{slug}/product-brief.html"
    pass_criteria: "product-brief.html is written to .meridian/project/product/{slug}/ relative to the project root"
    fail_criteria: "product-brief.html is written outside of .meridian/project/product/{slug}/"

  - id: SE-12
    source_type: "both"
    failure_condition_id: "F1"
    constraint_id: "C7"
    skill: "draft-product-vision"
    check: "The vision artifact uses Strategic Goals terminology. OKRs and OKR-specific terminology (Objectives, Key Results) are prohibited in all vision artifacts"
    artifact_pattern: "{product_base}/{slug}/product.yaml"
    pass_criteria: "product.yaml uses 'strategic_goals' field name and 'Strategic Goals' terminology throughout — no occurrences of 'OKR', 'Objectives', or 'Key Results'"
    fail_criteria: "product.yaml contains OKR, Objectives, or Key Results terminology in any field"

  - id: SE-13
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: "C8"
    skill: "generate-product-brief"
    check: "A checkpoint artifact must be written before presenting results to the user. The checkpoint status is PENDING_APPROVAL until the user responds"
    artifact_pattern: "{product_base}/checkpoint/discover-product/{timestamp}.md"
    pass_criteria: "Checkpoint artifact exists at the checkpoint path with status PENDING_APPROVAL before user is presented with results"
    fail_criteria: "No checkpoint artifact exists, or checkpoint status is not PENDING_APPROVAL when results are presented"

  - id: SE-14
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: "C10"
    skill: "generate-product-brief"
    check: "A human-reviewable brief artifact must be produced during the DRAFT phase and presented at the checkpoint"
    artifact_pattern: "{product_base}/{slug}/product-brief.html"
    pass_criteria: "product-brief.html exists with tabbed layout (Market Context, Vision, Scope, Comments) and inline comment system — produced during DRAFT phase before the checkpoint"
    fail_criteria: "product-brief.html does not exist or lacks the tabbed layout and inline comment system at checkpoint time"

scenario_evals:
  - id: SCE-1
    scenario_id: "S1"
    persona: "Founder / Product Manager"
    artifact_pattern: "{product_base}/{slug}/product-brief.html"
    check: "Can evaluate whether the market opportunity, target users, strategic goals, and competitive positioning accurately capture their product intent — and approve or reject with enough context to give specific feedback"
    pass_criteria: "product-brief.html contains Market Context tab (problem, target users, competitors, market size, differentiators, risks), Vision tab (value proposition, strategic goals, success metrics), Scope tab (assumptions, out-of-scope), and Comments tab with inline comment system (text selection, popup, persistent highlights, export JSON with action)"
    fail_criteria: "Any tab is missing, or tab content does not render the corresponding product.yaml fields, or inline comment system is non-functional"

  - id: SCE-2
    scenario_id: "S2"
    persona: "Engineering Lead"
    artifact_pattern: "{product_base}/{slug}/product.yaml (status: LOCKED)"
    check: "Can use the locked vision as authoritative input for roadmap planning — strategic goals, target users, success metrics, and competitive landscape are defined clearly enough to derive engineering milestones without ambiguity"
    pass_criteria: "Locked product.yaml has 3 or more strategic_goals with title/description/metric/target, 2 or more target_users with persona and role, quantifiable success_metrics with target values, and named competitors with strengths and weaknesses"
    fail_criteria: "strategic_goals fewer than 3, or target_users fewer than 2 without roles, or success_metrics lack quantifiable targets, or competitors are unnamed or missing strengths/weaknesses"

  - id: SCE-3
    scenario_id: "S3"
    persona: "Product Manager"
    artifact_pattern: "validation_result (structured return from validate-product-vision)"
    check: "Can determine whether the vision is ready to lock or identify exactly which sections need strengthening before the vision can serve as a planning foundation"
    pass_criteria: "Validation result contains completeness_score (0-100), ready_for_lock (boolean), 5-field checklist (strategic_goals_defined, target_users_identified, success_metrics_measurable, competitive_landscape_covered, assumptions_listed), and severity-classified issues (blocker/warning/suggestion)"
    fail_criteria: "Validation result missing completeness_score, ready_for_lock, checklist fields, or issues lack severity classification"
