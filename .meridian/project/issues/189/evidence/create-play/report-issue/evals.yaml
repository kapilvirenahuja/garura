step_evals:
  # --- Failure condition evals ---
  - id: SE-1
    source_type: "failure_condition"
    failure_condition_id: F1
    constraint_id: null
    skill: manage-issue
    check: >
      A defect filed with one or more required fields missing is rejected
      before any issue is created.
    artifact_pattern: "gh issue create output OR error output"
    pass_criteria: >
      No GitHub Issue is created when any required field (Severity, Affected
      component, Reported from, Problem, Expected behavior, Impact) is missing.
      The caller receives an error identifying the missing field.
    fail_criteria: >
      A GitHub Issue is created despite one or more required fields being absent.

  - id: SE-2
    source_type: "failure_condition"
    failure_condition_id: F2
    constraint_id: null
    skill: manage-issue
    check: >
      A defect filed with a severity value outside the allowed set is rejected
      before any issue is created.
    artifact_pattern: "gh issue create output OR error output"
    pass_criteria: >
      No GitHub Issue is created when severity is not one of Critical, High,
      Medium, Low. The caller receives an error identifying the invalid severity
      and the allowed values.
    fail_criteria: >
      A GitHub Issue is created with a severity value outside the allowed set.

  - id: SE-3
    source_type: "both"
    failure_condition_id: F3
    constraint_id: C7
    skill: manage-issue
    check: >
      When GitHub access fails, a local markdown defect file is created
      containing the full defect content, and the caller is told exactly
      what failed and how to share the file manually.
    artifact_pattern: "local markdown defect file (*.md)"
    pass_criteria: >
      If gh CLI access fails (auth, network, repo permissions), the play
      creates a local markdown defect file and tells the caller exactly what
      failed and how to share the file manually (email, Slack, paste into a
      GitHub issue). The play does not silently succeed.
    fail_criteria: >
      GitHub access fails and the play produces no output — neither an
      issue nor a local fallback file.

  - id: SE-4
    source_type: "failure_condition"
    failure_condition_id: F4
    constraint_id: null
    skill: manage-issue
    check: >
      When GitHub access fails, the caller is told what went wrong and how
      to share the fallback file.
    artifact_pattern: "play output message to caller"
    pass_criteria: >
      The caller receives a message identifying the specific failure (auth,
      network, permissions) and instructions to share the fallback file
      manually (email, paste into GitHub issue, Slack).
    fail_criteria: >
      GitHub access fails and the play does not tell the caller what went
      wrong and how to share the fallback file.

  - id: SE-5
    source_type: "failure_condition"
    failure_condition_id: F5
    constraint_id: null
    skill: manage-issue
    check: >
      The play confirms either the issue URL or the fallback file path
      to the caller upon completion.
    artifact_pattern: "play output message to caller"
    pass_criteria: >
      The caller receives confirmation containing either the created issue
      URL or the fallback file path. The play does not silently succeed
      without confirming one of these.
    fail_criteria: >
      The play silently succeeds without confirming the issue URL or the
      fallback file path to the caller.

  # --- Constraint evals (artifact-verifiable) ---
  - id: SE-6
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: C5
    skill: manage-issue
    check: >
      The GitHub Issue body uses a structured markdown format — severity and
      metadata as a front table, problem/evidence/expected/impact as labeled
      sections.
    artifact_pattern: "gh issue view --json body output"
    pass_criteria: >
      The GitHub Issue body contains severity and metadata as a front table,
      and problem/evidence/expected/impact as labeled sections in structured
      markdown format.
    fail_criteria: >
      The GitHub Issue body is unstructured, missing the front table, or
      missing labeled sections for problem/evidence/expected/impact.

  - id: SE-7
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: C6
    skill: manage-issue
    check: >
      Optional fields (Evidence, Root cause, Specific issues) are included
      only when the caller provides them. They do not appear as empty sections.
    artifact_pattern: "gh issue view --json body output"
    pass_criteria: >
      Optional fields (Evidence, Root cause, Specific issues) are included
      only when the caller provides them. They do not appear as empty sections.
    fail_criteria: >
      Optional fields appear as empty sections in the issue body when the
      caller did not provide them.

  - id: SE-8
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: C8
    skill: manage-issue
    check: >
      The GitHub Issue title follows the pattern:
      [DEF][Severity] Short problem description.
    artifact_pattern: "gh issue view --json title output"
    pass_criteria: >
      The GitHub Issue title follows the pattern [DEF][Severity] Short
      problem description, where Severity is one of Critical, High, Medium,
      Low.
    fail_criteria: >
      The GitHub Issue title does not match the pattern [DEF][Severity] Short
      problem description.

  - id: SE-9
    source_type: "constraint"
    failure_condition_id: null
    constraint_id: C9
    skill: manage-issue
    check: >
      The created GitHub Issue has the label "defect" applied. If the label
      did not exist, it was created.
    artifact_pattern: "gh issue view --json labels output"
    pass_criteria: >
      The play applies the label "defect" to the created GitHub Issue. If
      the label does not exist, it is created.
    fail_criteria: >
      The created GitHub Issue does not have the "defect" label, or the
      play fails because the label does not exist.

scenario_evals:
  - id: SCE-1
    scenario_id: S1
    persona: "Play consumer (agent in another project)"
    artifact_pattern: "gh issue view --json number,title,labels,body,url output"
    check: >
      A GitHub Issue is created on kapilvirenahuja/meridian-os with the defect
      label, structured body containing all provided fields (including optional
      Evidence and Root cause), and the issue URL is returned to the caller.
    pass_criteria: >
      The created issue exists on kapilvirenahuja/meridian-os, has the "defect"
      label, its body contains all required fields plus the provided Evidence
      and Root cause sections, and the issue URL is returned to the caller.
    fail_criteria: >
      The issue is missing the defect label, the body is missing provided
      fields, or the issue URL is not returned to the caller.

  - id: SCE-2
    scenario_id: S2
    persona: "Human developer"
    artifact_pattern: "gh issue view --json number,title,labels,body,url output"
    check: >
      A GitHub Issue is created with only the required field sections in the
      body. No empty optional sections appear. The issue URL is returned.
    pass_criteria: >
      The created issue body contains only required field sections. No empty
      optional sections (Evidence, Root cause, Specific issues) appear. The
      issue URL is returned to the caller.
    fail_criteria: >
      The issue body contains empty optional sections, or the issue URL is
      not returned.

  - id: SCE-3
    scenario_id: S3
    persona: "Play consumer (agent)"
    artifact_pattern: "error output to caller"
    check: >
      The play rejects the report with a clear error identifying the invalid
      severity value and the allowed values. No issue is created and no fallback
      file is produced.
    pass_criteria: >
      The caller receives an error message identifying "Urgent" as invalid and
      listing the allowed values (Critical, High, Medium, Low). No GitHub Issue
      is created. No fallback file is produced.
    fail_criteria: >
      The play creates an issue or fallback file despite the invalid severity,
      or the error does not identify the invalid value and allowed values.

  - id: SCE-4
    scenario_id: S4
    persona: "Play consumer (agent)"
    artifact_pattern: "error output to caller"
    check: >
      The play rejects the report with a clear error identifying the missing
      required field. No issue is created and no fallback file is produced.
    pass_criteria: >
      The caller receives an error message identifying "Expected behavior" as
      the missing required field. No GitHub Issue is created. No fallback file
      is produced.
    fail_criteria: >
      The play creates an issue or fallback file despite the missing field,
      or the error does not identify the missing field.

  - id: SCE-5
    scenario_id: S5
    persona: "Human developer"
    artifact_pattern: "local markdown defect file (*.md) and caller output message"
    check: >
      The play creates a local markdown file with the full defect content,
      tells the caller exactly what failed (auth/network), and provides the
      file path with instructions to share it manually.
    pass_criteria: >
      A local markdown file exists containing the full defect content. The
      caller receives a message identifying the specific failure (auth or
      network) and instructions to share the file manually (email, paste into
      GitHub issue, Slack). The file path is provided.
    fail_criteria: >
      No local file is created, or the caller is not told what failed, or no
      sharing instructions are provided.
