root_cause:
  file: "core/components/skills/analyze-pr/SKILL.md"
  logic: >
    The Process section (Step 1 — Read Branch State) unconditionally issues four
    git commands that read the current checkout state:
      git diff --stat main..HEAD
      git diff --name-only main..HEAD
      git log --oneline main..HEAD
      git branch --show-current
    The Input section defines no pr_number parameter. There is no alternate code
    path that calls `gh pr diff` or `gh pr view`. The skill is therefore coupled
    to the current git working tree state at invocation time.
  explanation: >
    When the enhance play's Step 13 (PR Review) runs, a PR has already been
    created by Step 12. The intent at that point is to analyze THAT PR — its
    diff, its commits, its metadata. But the skill only reads the current branch
    state via git. If the session was resumed (new commits may have been made),
    if the caller is a different developer (different branch checked out), or if
    the repo has multiple open PRs, the skill produces analysis of the wrong or
    ambiguous diff instead of the specific PR's content. The enhance play's Step
    13 prose says "Agent invokes analyze-pr skill with the PR number from
    pr-result.yaml" — but this is aspirational; the skill has no mechanism to
    accept or use a PR number, so the agent silently falls through to branch-diff
    regardless of the caller's intent.

contributing_causes:
  - summary: >
      The enhance play Step 13 JSON contract does not include pr_number in
      stm.input — it only passes pr_result as an input path — so even if the
      skill gained a pr_number parameter, the contract as written would not
      supply it. The prose instruction ("with the PR number from pr-result.yaml")
      is not backed by an actual contract field.
  - summary: >
      The skill was originally designed for pre-PR branch analysis (used by the
      create-pr play, where no PR exists yet), making branch-diff the only
      sensible mode. It was later reused by the enhance play for post-PR review
      without adding a PR-scoped mode, creating a context mismatch.

blast_radius:
  - file: "core/components/skills/analyze-pr/SKILL.md"
    role: "Primary skill that reads branch state and generates quality checklist"
    change: >
      Add optional pr_number to Input section. Add PR-scoped mode to Process
      section: when pr_number is provided, use `gh pr diff {pr_number}` and
      `gh pr view {pr_number} --json files,commits,title,body` as data sources
      instead of git diff/log. Keep existing branch-diff path as fallback when
      pr_number is absent.
  - file: "core/components/plays/enhance/SKILL.md"
    role: "Enhance play orchestrator — Step 13 delegates PR review to repo-orchestrator"
    change: >
      In Step 13 JSON contract stm.input, add a pr_number field with an
      instruction to extract it from pr-result.yaml (the field where submit-pr
      writes the created PR number). Add explicit prose instruction that the
      agent must read pr_number from pr-result.yaml and forward it to the
      analyze-pr skill invocation.
