issue:
  number: 148
  title: "Add prepare-architecture recipe, three-axis project profiling (PP+NFR+QP in discover-product), quality standards, refactor prepare-implementation"
  body: |
    ## Description

    This epic introduces a dedicated architecture planning recipe, extends the product discovery workflow to derive three complementary project profiles, and refactors downstream recipes to consume these profiles as locked upstream inputs.

    ### 1. New Recipe: prepare-architecture

    A new L2 recipe that derives NFR and quality profiles from the product profile, selects an architecture using LTM knowledge, and produces two output artifacts:
    - `architecture.yaml` — technology selections, NFRs, platforms, integrations, and agentic PCAM design
    - `quality-standards.yaml` — quality profile dimensions with measurable thresholds

    ### 2. Rebake discover-product

    Extend `discover-product` to derive all three profiles during the vision drafting phase:
    - **PP (Product Profile)** — market context, users, goals (existing)
    - **NFR (Non-Functional Requirements)** — performance, reliability, security, scalability requirements
    - **QP (Quality Profile)** — quality dimensions and standards expectations

    All three profiles are persisted to `product.yaml` under a new `profiles` section.

    ### 3. Rebake plan-roadmap

    Update `plan-roadmap` to consume all three profiles (PP + NFR + QP) for epic scoping decisions, ensuring roadmap epics are informed by quality and non-functional requirements from the outset.

    ### 4. Rebake prepare-implementation

    Refactor `prepare-implementation` to:
    - Remove its global architecture scoping responsibility
    - Require a locked `architecture.yaml` as an upstream input (produced by `prepare-architecture`)
    - Focus strictly on per-epic implementation planning

    ### 5. New LTM: quality-profile.md

    Add a new LTM knowledge file `quality-profile.md` defining the 7 QP dimensions used across the system (e.g. reliability, performance, security, usability, maintainability, observability, compliance).

    ### 6. Schema Updates

    - **product.yaml** — add a `profiles` section to store PP, NFR, and QP outputs
    - **quality-standards.yaml** — new schema for the quality profile artifact produced by `prepare-architecture`

    ## Acceptance Criteria

    - [ ] `prepare-architecture` recipe implemented and produces `architecture.yaml` and `quality-standards.yaml`
    - [ ] `discover-product` derives PP, NFR, and QP during vision drafting and persists all three to `product.yaml`
    - [ ] `plan-roadmap` consumes all three profiles for epic scoping
    - [ ] `prepare-implementation` refactored to require locked `architecture.yaml` as upstream input
    - [ ] `quality-profile.md` LTM file added with 7 QP dimensions
    - [ ] `product.yaml` schema updated with `profiles` section
    - [ ] `quality-standards.yaml` schema defined and documented

    ---

    *Created via Meridian `start-feature` workflow.*
