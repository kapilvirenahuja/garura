step_evals:
  - id: SE-1
    skill: quality-check-scoped
    step: 2
    covers: [F1, C2]
    check: >
      Every finding in findings.yaml carries a standard_id that matches a row
      in pr-severity-taxonomy.md. Findings with missing or unknown standard_id
      MUST be absent (rejected by skill).

  - id: SE-2
    skill: quality-check-scoped
    step: 2
    covers: [F2, C1]
    check: >
      The skill MUST NOT have read any file outside changed_paths and MUST
      NOT have invoked /quality-check. Verified by inspecting findings.yaml
      meta.diff_path and absence of full-repo scan markers.

  - id: SE-3
    skill: quality-check-scoped
    step: 2
    covers: [F7, C3]
    check: >
      Severity values in findings.yaml are sourced verbatim from
      pr-severity-taxonomy.md row for each standard_id. No severity is
      computed or inferred at runtime.

  - id: SE-4
    skill: tech-designer
    step: 1
    covers: [C4]
    check: >
      context.yaml lists the resolved standards_set paths and the resolved
      severity_taxonomy_path, all originating from core/config.yaml — no
      hardcoded paths in context.yaml.

  - id: SE-5
    skill: tech-designer
    step: 3
    covers: [F5, F6]
    check: >
      confidence.yaml routing decision is "block" iff findings.counts.P1 > 0.
      routing decision is "escalate" iff confidence < confidence_threshold.
      Otherwise "pass".

  - id: SE-6
    skill: repo-orchestrator
    step: 4
    covers: [C6, F4]
    check: >
      reviewers.yaml selected_reviewers list does NOT contain the PR author
      and uses git log bounded by activity_window_days from config.

  - id: SE-7
    skill: repo-orchestrator
    step: 4
    covers: [C7, F3]
    check: >
      When candidate count < reviewer_count, reviewers.yaml shows
      fallback_used: true and selected_reviewers is drawn from
      review-pr.fallback_reviewers. If fallback_reviewers is empty AND
      candidates short, play halts with structured failure F3.

  - id: SE-8
    skill: repo-orchestrator
    step: 5
    covers: [C8, F5, F6]
    check: >
      The PR comment posted to GitHub uses the structured template with
      P1/P2/P3 sections and the confidence score. If a prior review-pr
      comment exists, it is updated in place — comment_id matches the
      previous one. On P1 finding the PR is set to request-changes; on
      block or escalate the reviewers are added via gh pr edit
      --add-reviewer.

  - id: SE-9
    skill: pre-flight
    step: 0
    covers: [F8, C4]
    check: >
      Pre-flight HALTs if pr-severity-taxonomy.md is missing OR any of the
      6 review-pr.* config keys are missing.

scenario_evals:
  - id: SCE-1
    scenario: S1
    persona: Reviewer
    check: >
      After review-pr completes, gh pr view shows exactly one review-pr
      comment with sections P1/P2/P3, a confidence score, and a Reviewers
      block listing the selected names.

  - id: SCE-2
    scenario: S2
    persona: PR Author
    check: >
      Every finding line in the PR comment links to a standard_id that
      maps to a real KB rule and a specific file:line in the diff.

  - id: SCE-3
    scenario: S3
    persona: Ship Pipeline
    check: >
      When ship runs with review-pr.bypass=false and review-pr returns
      block or escalate, ship halts before merge-pr and surfaces the
      routing decision.

  - id: SCE-4
    scenario: S4
    persona: QA / Determinism Auditor
    check: >
      Two back-to-back review-pr runs on the same PR produce
      byte-identical findings.yaml (modulo meta.generated_at) and
      identical P1..P4 counts.
