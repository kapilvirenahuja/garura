intent_summary: >
  Add the review-pr L2 recipe (diff-scoped, deterministic PR quality gate with P1–P4 severity
  taxonomy, weighted confidence formula, and git-history reviewer selection) and the
  quality-check-scoped skill it depends on. Also refactor standards/templates/ by moving
  HTML/CSS/JS templates to their owning components, promote agent-contract.md to ADR 016,
  and wire a bypass-conditional review-pr gate into the ship recipe between create-pr and
  merge-pr.

