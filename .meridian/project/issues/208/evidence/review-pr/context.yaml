standards_paths_resolved:
  # Standards resolution follows standards_order: [kb, ltm, stm]
  # KB = deployed global knowledge; resolved via taxonomy taxonomy_path above
  kb_resolved: true
  ltm_resolved: false    # no project-local LTM quality/ directory detected
  stm_resolved: false    # no per-issue spec/quality/ directory detected
  resolution_note: >
    Only the KB layer is populated for this repository at this time. LTM and STM
    standards_set paths are provided in the contract for completeness but will return
    no files on directory walk. quality-check-scoped will load KB-only standards.

config_source: core/config.yaml
config_keys_present:
