recipe: "meridian:fix-it"
skills:
  - name: "manage-issue"
    path: "core/components/skills/manage-issue/SKILL.md"
    status: existing
    usage: >
      action: read — validate issue exists and is open during preparation.
      Invoked by project-orchestrator.
  - name: "setup-branch"
    path: "core/components/skills/setup-branch/SKILL.md"
    status: existing
    usage: >
      Create fix/{issue}-{slug} branch from main and push to origin.
      Invoked by repo-orchestrator.
  - name: "ship"
    path: "core/components/recipes/ship/SKILL.md"
    status: existing
    usage: >
      Sub-recipe invoked via Skill tool with approval_override: auto-proceed.
      Handles commit-code → create-pr → merge-pr chain after implementation.
note: >
  tech-designer produces RCA + design artifacts directly (no skill needed —
  it's the agent's core capability with Bash/Read/Grep/Glob/Write tools).
  code-builder implements from the design artifacts directly.
  doc-builder generates HTML brief from STM artifacts for checkpoint.
