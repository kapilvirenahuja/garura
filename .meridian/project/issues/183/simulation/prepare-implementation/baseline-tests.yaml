      - "BT-INT-01, BT-INT-02, BT-INT-03, BT-INT-04, BT-INT-05 — verify intent.yaml consistency first"
    phase_1_schema_checks:
      - "BT-CA-01, BT-CA-02 — verify context-assembly.yaml schema"
      - "BT-AGT-01, BT-AGT-02 — verify agent frontmatter"
