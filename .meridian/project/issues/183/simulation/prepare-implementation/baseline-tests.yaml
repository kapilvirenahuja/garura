    ids: ["BT-PRE-01", "BT-PRE-02", "BT-PRE-04", "BT-PRE-05", "BT-INT-01"]
    note: >
      These 5 tests would FAIL on the old pre-#183 SKILL.md because the old play
      would halt where the new play continues. This confirms the change surface
      is correctly characterized — the fix is a behavioral inversion, not an additive change.

  recommended_execution_order:
