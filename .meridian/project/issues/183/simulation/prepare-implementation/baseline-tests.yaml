      - "BT-PRE-01 through BT-PRE-05 — verify pre-flight behavior (require play invocation)"
      - "BT-AGT-03 — verify test-engineer handles zero-tests case"
    phase_3_baseline_inventory:
      - "BT-PCR-01, BT-PCR-02, BT-PCR-03 — record pipeline play pre-flight baselines"
      - "BT-SKL-01, BT-SKL-02 — record skill input requirement baselines"
