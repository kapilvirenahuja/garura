# --- Module Structure ---
# Top-level physical boundaries observed from codebase scan

module_structure:
  - path: "core/components/agents/"
    role: "Agent definitions — domain-expert AI agents, each with a bounded domain and JSON contract interface"
    boundaries: "Owns: agent identity, intent recognition, skill invocation, output contracts. Does NOT own: workflow orchestration (recipes), artifact storage (STM), deployment (sync-claude)."
    file_count: 15
    key_files:
      - "tech-architect.md"
      - "tech-designer.md"
      - "product-strategist.md"
      - "code-builder.md"
      - "repo-orchestrator.md"
      - "quality-auditor.md"
      - "test-engineer.md"
      - "knowledge-extractor.md"

  - path: "core/components/recipes/"
    role: "Compiled workflow definitions — L1 (atomic) and L2 (chained) recipes. Each recipe is a SKILL.md file, compiled from reference/intent.yaml."
    boundaries: "Owns: workflow steps, agent dispatch contracts, pre-flight checks, checkpoint logic, eval criteria. Does NOT own: domain work (delegated to agents), artifact creation (delegated to skills)."
    file_count: 15
    key_recipes:
      - "prepare-implementation"
      - "commit-code"
      - "create-pr"
      - "implement-epic"
      - "start-feature"
      - "ship"
      - "capture-learning"
      - "discover-product"
      - "plan-roadmap"
      - "prepare-architecture"

  - path: "core/components/skills/"
    role: "Model-invocable capabilities — atomic, bounded actions that agents invoke to produce artifacts. Each skill has a SKILL.md and schemas/ directory."
    boundaries: "Owns: artifact production logic, schema definitions. Does NOT own: workflow coordination (recipes), agent cognition (agent definitions)."
    file_count: 34
    key_skills:
      - "draft-lld"
      - "draft-implementation-plan"
      - "draft-technical-approach"
      - "assess-feasibility"
      - "draft-product-spec"
      - "draft-verification-scenarios"
      - "scope-roadmap-epics"
      - "validate-implementation-design"
      - "research-domain-context"
      - "create-commit"

  - path: "core/components/memory/"
    role: "Long-Term Memory (LTM) — persistent organizational knowledge. Two sub-categories: standards (rules agents must follow) and knowledge (reference material for technology/architecture decisions)."
    boundaries: "Owns: standards, architectural knowledge, domain taxonomy, project profiling templates. Does NOT own: issue-specific state (STM), agent definitions."
    subdirectories:
      - path: "memory/standards/"
        role: "Rules and conventions: agent-contract schema, git/commit standards, resolution protocol (R1-R4), epic management rules, knowledge file template"
      - path: "memory/knowledge/architecture/"
        role: "Architecture reference: patterns (modular-monolith, microservices, event-driven, CQRS, serverless, evolutionary-scaling), stacks (React/Next.js, Python/FastAPI, Node.js, Go, Java/Spring, .NET, Vue, Angular, Flutter, React Native), platforms (AWS, GCP, Azure, Vercel, Railway, self-hosted), data (relational, NoSQL, vector, messaging, search), operations (CI/CD, containers, observability, IaC, security), agentic (RAG-vector, RAG-graph, RAG-hybrid, agent-orchestration, LLM-infrastructure)"
      - path: "memory/knowledge/domain-taxonomy/"
        role: "Domain module taxonomy (commerce, payments, search, user-management, personalization)"
      - path: "memory/knowledge/project-profiling/"
        role: "Three-axis profiling templates (PP, NFR, QP)"
      - path: "memory/formats/"
        role: "Output format references (GitHub issue format, brief principles)"

  - path: "core/"
    role: "Framework root — config.yaml is the single source of truth for all path resolutions"
    key_files:
      - "config.yaml"

  - path: "docs/"
    role: "Framework documentation — ADRs (15 decisions), component docs, philosophy docs, usage guides"
    boundaries: "Read-only reference. Not consumed programmatically by agents."
    subdirectories:
      - "docs/adr/   — 15 architecture decision records"
      - "docs/components/ — agent, recipe, skill, memory documentation"
      - "docs/philosophy/ — IDSD, IDD, architecture philosophy"

  - path: ".meridian/"
    role: "Short-Term Memory (STM) — runtime state, issue artifacts, product artifacts"
    boundaries: "Issue-centric (ADR-008). All work associated with an issue number. Gitignored for ephemeral project-mode deployments."
    subdirectories:
      - ".meridian/project/issues/{issue}/ — per-issue STM: spec/, design/, evidence/, checkpoint/, status/"
      - ".meridian/project/issues/_pending/ — pre-issue bootstrap staging"
      - ".meridian/project/issues/_archive/ — closed issue STM (ADR-010)"
      - ".meridian/product/ — product-level artifacts: discovery/, roadmap/, architecture/, evidence/, briefs/, checkpoints/, status/"
      - ".meridian/core/memory/ — project-mode LTM deployment target"

  - path: ".claude/"
    role: "Claude Code deployment target — agents/, skills/ deployed here via /sync-claude. Gitignored."

  - path: ".factory/"
    role: "Factory Droid deployment target — skills/, droids/ for alternative execution environment. Gitignored."

  - path: "installer/"
    role: "Framework installation tooling"

# --- Design Patterns ---

design_patterns:
  - pattern: "Three-Layer Hierarchy (Recipe → Agent → Skill)"
    location: "core/components/ entire structure"
    evidence: "ADR-001, ADR-013. Recipes are L1/L2 compiled workflows. Agents are domain experts. Skills are model-invocable capabilities. Strict invocability rules: L2 human-only (≤5 agents), L1 human+model (≤2 agents), Skills model-only."
    authority: "ADR-001"

  - pattern: "Compiled Intent Pattern (intent.yaml → SKILL.md)"
    location: "core/components/recipes/*/reference/intent.yaml → SKILL.md"
    evidence: "Every recipe has a reference/intent.yaml (constraints C1-Cn, failure_conditions F1-Fn, scenarios S1-Sn) that is compiled by /create-recipe into a static SKILL.md. SKILL.md is the runtime artifact; intent.yaml is the source. Hash-locked in frontmatter. ADR-013 Level 2 maturity."
    authority: "ADR-013"

  - pattern: "STM as Inter-Agent Data Transport (Phoenix Architecture)"
    location: "All recipe→agent→skill flows"
    evidence: "ADR-011. Skills write artifacts to STM (.meridian/project/issues/{issue}/evidence/{recipe}/). Output contracts carry file PATHS, not data blobs. Downstream agents issue explicit Read tool calls to these paths. Prevents context window data loss in multi-step flows."
    authority: "ADR-011"

  - pattern: "JSON Contract Communication (Recipe→Agent boundary)"
    location: "core/components/memory/standards/agent-contract.md"
    evidence: "Universal protocol: input contract (intent_path, stm_base, stm.input, stm.output, task_id, ltm_context?) → domain work → output contract (status, stm.input echoed, stm.output updated, task_id echoed, error). No prose-based handoffs. Strict schema."
    authority: "agent-contract.md standard"

  - pattern: "DRAFT → VALIDATE → LOCKED Artifact Lifecycle"
    location: "All design artifacts (features.yaml, tech.yaml, plan.yaml, architecture.yaml, roadmap.yaml)"
    evidence: "Artifacts progress through explicit states. LOCKED artifacts are authoritative inputs to downstream work. DRAFT artifacts are advisory. Schema files in skills/*/schemas/ define lifecycle fields (status: DRAFT|VALIDATED|LOCKED). Human approval (Tether/Vanish) gates state transitions."
    authority: "Multiple ADRs, product-strategist, tech-designer"

  - pattern: "LTM Resolution Protocol (R1-R4 Hierarchy)"
    location: "core/components/memory/standards/resolution-protocol.md; participating agents: tech-designer, product-strategist, repo-orchestrator, tech-architect"
    evidence: "ADR-015. When ltm_context is in input contract, agents resolve domain decisions through 3 layers: Layer 1 = project LTM (.meridian/product/ LOCKED artifacts), Layer 2 = core LTM (~/.meridian/core/memory/), Layer 3 = LLM reasoning (flagged). Every resolved decision written to resolution-trace.yaml in STM. Backward compatible: absent ltm_context = skip entirely."
    authority: "ADR-015, resolution-protocol.md"

  - pattern: "Issue-Centric STM (NWWI Principle)"
    location: ".meridian/project/issues/{issue}/"
    evidence: "ADR-008. All recipe artifacts organized under issue number. No Work Without an Issue (NWWI): work can start without issue, but cannot commit/ship without one. Two-phase write for bootstrap: _pending/ → {issue}/ after issue creation. Evidence, checkpoint, status — all issue-scoped."
    authority: "ADR-008"

  - pattern: "Agent-First Delegation"
    location: "All recipe SKILL.md files"
    evidence: "CLAUDE.md rule: 'Never use tools directly when an agent covers that domain.' Recipes are orchestrators; agents own domain work. Forbidden patterns explicitly called out in each recipe (e.g., 'Forbidden: Direct git commands for analysis or commits')."
    authority: "CLAUDE.md, ADR-001"

  - pattern: "Parallel Phase Dispatch"
    location: "core/components/recipes/prepare-implementation/SKILL.md Steps 2-6"
    evidence: "Independent data collection steps (architecture inference, test surface mapping, dependency graph, git history analysis, LTM consultation) dispatched in parallel. Step 7 (context assembly) depends on all five completing. Pattern enables concurrent agent invocations for throughput."
    authority: "prepare-implementation SKILL.md"

  - pattern: "Dual Format Output (YAML + MD)"
    location: "Architecture-inference, dependency-graph, commit-history, tech, plan outputs"
    evidence: "C31 constraint in prepare-implementation intent.yaml: 'Artifacts that benefit from diagrams and narrative use dual format (YAML contract + MD rich content).' YAML for machine consumption by downstream agents, MD with mermaid/ASCII diagrams for human review at checkpoints."
    authority: "prepare-implementation/reference/intent.yaml C31"

  - pattern: "Scenario Compartmentalization"
    location: "plan.yaml (implementer artifact) vs scenarios.yaml (validator artifact)"
    evidence: "C9 in prepare-implementation intent.yaml. plan.yaml references only scenario IDs and counts — never scenario descriptions. scenarios.yaml is exclusively for the quality validator. Prevents implementers from optimizing for test cases instead of building correct software."
    authority: "prepare-implementation/reference/intent.yaml C9"

  - pattern: "Evidence Self-Commit (ADR-012)"
    location: "All L2 recipes — Evidence phase"
    evidence: "Recipes commit their own evidence artifacts to git via repo-orchestrator at the end of each run. Creates a permanent audit trail of recipe execution. Every SKILL.md has an 'Evidence & Close' final step."
    authority: "ADR-012"

# --- Framework Conventions ---

framework_conventions:
  - framework: "Claude Code (claude.ai/code)"
    conventions:
      - "Agents are deployed as .md files in ~/.claude/agents/ or .claude/agents/"
      - "Skills/Recipes are deployed as .md files in ~/.claude/skills/ or .claude/skills/"
      - "Agent tool access is declared in YAML frontmatter (tools: [Bash, Read, Write, etc.])"
      - "Models are specified in frontmatter (model: opus|sonnet)"
      - "User-invocable flag in frontmatter: user-invocable: true|false"
      - "Skills are invoked by name via the Skill tool"
      - "Agents are dispatched via the Task tool (subagent_type: '{agent-name}')"

  - framework: "Meridian Recipe Compilation (/create-recipe)"
    conventions:
      - "Intent source: reference/intent.yaml with canonical 4 fields (intent, constraints, failure_conditions, scenarios)"
      - "Compiled artifact: SKILL.md — the runtime binary"
      - "Intent hash stored in SKILL.md frontmatter for drift detection"
      - "Never edit SKILL.md manually — always re-bake from intent.yaml"
      - "Rebake command: /create-recipe --rebake {recipe-name}"

  - framework: "Meridian Memory System"
    conventions:
      - "LTM at ~/.meridian/core/memory/ (global) or .meridian/core/memory/ (project mode)"
      - "STM at .meridian/project/issues/{issue}/ (issue-scoped)"
      - "Product artifacts at .meridian/product/ (product-scoped)"
      - "All paths resolved from core/config.yaml — never hardcoded"
      - "Knowledge files follow canonical template with Tier 1 (required) and Tier 2 (core-required) metadata"

  - framework: "Meridian Deployment Model"
    conventions:
      - "Source of truth: core/components/ (always edit here)"
      - "Global deployment: /sync-claude → ~/.claude/ (default)"
      - "Project deployment: /sync-claude --project → .claude/ (ephemeral, gitignored)"
      - "Memory deployment: core/components/memory/ → ~/.meridian/core/memory/ (global)"

  - framework: "Human Approval Model (Tether/Vanish/Orbit)"
    conventions:
      - "Tether: proceed with the action"
      - "Vanish: cancel the action"
      - "Orbit: defer/explore further"
      - "Never use AskUserQuestion tool — output summary and wait for typed response"
      - "Checkpoint format: '## Proposed {Action}' block with Tether/Vanish prompt"
      - "AskUserQuestion is explicitly forbidden in all agent and recipe definitions"

# --- Logical Architecture ---

logical_architecture: |
  Meridian is an agentic meta-framework for Intent-Driven Software Development (IDSD).

  Conceptually, it has five layers:

  1. INTENT LAYER — Human expresses goals as structured YAML intents (constraints, failure conditions, scenarios).
     Human produces: intent.yaml files. Compiler (/create-recipe) translates intent into recipes.

  2. ORCHESTRATION LAYER — Recipes coordinate work. L2 recipes chain L1 recipes or dispatch multiple domain agents.
     L1 recipes are atomic workflow units (≤2 agent calls). L2 recipes are higher-order (≤5 agent calls).
     Recipes run in Claude Code as the execution environment. Recipes never do domain work directly.

  3. AGENT LAYER — Domain experts execute within their bounded scope.
     Each agent: reads from STM, performs domain analysis or artifact production, writes to STM, returns JSON contract.
     Agents invoke skills for structured artifact production. Agents do not invoke other agents.

  4. SKILL LAYER — Bounded capabilities produce specific artifacts.
     Skills are invoked by agents via the Skill tool. Each skill has a defined input → output contract and produces
     artifacts written to STM. Skills are model-invocable only (not human-invocable).

  5. MEMORY LAYER — Knowledge persists across sessions.
     LTM (Long-Term): standards and knowledge in ~/.meridian/core/memory/ and .meridian/product/ — survives sessions.
     STM (Short-Term): per-issue evidence, checkpoints, status in .meridian/project/issues/{issue}/ — issue-scoped.

  DATA FLOW: User invokes recipe → Recipe dispatches agents via JSON contracts → Agents invoke skills →
  Skills produce artifacts to STM → Agents return updated contracts with STM paths → Recipe passes paths
  to next agent → Next agent reads from STM paths explicitly (Phoenix Architecture).

  COMPILATION FLOW: Human writes intent.yaml → /create-recipe reads intent → produces SKILL.md →
  SKILL.md is deployed to ~/.claude/skills/ → Human invokes recipe name → Claude Code executes.

# --- LLD Patterns ---

lld_patterns:
  dependency_injection: |
    No DI container. Dependencies are resolved through the STM path threading pattern:
    Each step's output paths become the next step's input paths via the JSON contract.
    The recipe orchestrator acts as the dependency injector — it wires outputs to inputs
    explicitly in the compiled workflow. Agents receive all their dependencies via the contract,
    not through discovery or global state.

  error_handling: |
    Structured failure protocol (docs/framework/structured-failure-protocol.md).
    All failures return structured YAML with: what_failed, why, domain_assessment
    (within_my_domain, responsible_domain, suggested_agent), context (intent_received,
    self_recovery_attempted, self_recovery_details), suggested_fix.
    Agents may self-recover up to 2 times before escalating. Escalation signals
    contain enough context for the recipe to decide (retry, escalate, halt).
    Recipes handle failure routing; agents never swallow failures silently.

  logging: |
    Evidence-based logging via STM artifacts. Every recipe run produces evidence files
    at {stm_base}/{issue}/evidence/{recipe}/. Evidence is committed to git (ADR-012).
    No stdout logging infrastructure — the git history IS the audit log.
    Resolution traces written to STM for every ltm_context-bearing agent dispatch.
    Status files at {stm_base}/{issue}/status/{recipe-name}.json for crash recovery.

  state_management: |
    Stateless agents (no in-memory persistence between invocations). All state
    persisted to STM (files on disk). Crash recovery via status files: recipes
    read {stm_base}/{issue}/status/{recipe}.json on startup, skip completed steps,
    reset in_progress steps to pending, continue from first incomplete.
    Two-phase write pattern for bootstrap (start-feature: _pending/ → {issue}/).

  artifact_lifecycle: |
    DRAFT → VALIDATED → LOCKED. Status field on all design artifacts.
    LOCKED artifacts are authoritative and block downstream agents from using
    lesser sources. The R1-R4 resolution protocol enforces this: LOCKED project
    artifacts override DRAFT artifacts and core LTM. Lock requires human approval
    (Tether). Auto-lock executes only after open_questions and high-severity risks
    are explicitly resolved and written to pre-lock-resolutions.yaml.

  context_isolation: |
    Scenario compartmentalization: scenarios.yaml content never flows to code-builder.
    Context isolation exemptions: eval-generator and judge never receive ltm_context.
    Audience separation enforced at artifact level: features.yaml (PM audience),
    scenarios.yaml (validator audience), tech.yaml (implementer audience),
    plan.yaml (implementer + quality lead — IDs only, not scenario content).

# --- Services ---

services:
  - name: "Claude Code (claude.ai/code)"
    type: "execution_environment"
    role: "Hosts recipes, deploys agents and skills, provides tool access (Bash, Read, Write, Edit, Grep, Glob, Task, Skill, WebSearch, WebFetch)"
    entry_points:
      - "~/.claude/skills/ (deployed recipes, user-invocable)"
      - "~/.claude/agents/ (deployed agents, model-invocable)"
    note: "Not a service Meridian builds — it is the platform Meridian runs on"

  - name: "GitHub"
    type: "external_platform"
    role: "Issue tracking (repo-orchestrator uses gh CLI), PR management, version control (git)"
    config_ref: "core/config.yaml → platform: github, github.repo"
    tools_used: "gh CLI (via Bash), git CLI (via Bash)"

  - name: "Meridian Framework (meridian-os)"
    type: "framework"
    role: "Source repository for all Meridian components. Not deployed as a service — components deployed to ~/.claude/ via /sync-claude"
    entry_points:
      - "core/config.yaml (path configuration)"
      - "core/components/ (source of truth for all components)"
    no_runtime_server: true
    no_ports: true
    no_http_api: true

# --- External Dependencies ---

external_dependencies:
  - name: "GitHub CLI (gh)"
    type: "cli_tool"
    purpose: "Issue management, PR creation, repository operations via repo-orchestrator and project-orchestrator"
    used_by: ["repo-orchestrator", "project-orchestrator"]
    invocation: "Bash tool calls in agents/recipes"

  - name: "git"
    type: "cli_tool"
    purpose: "Version control — commit, branch, push, log, blame, diff, show"
    used_by: ["repo-orchestrator", "all recipes (read-only git commands in pre-flight)"]
    invocation: "Bash tool calls"

  - name: "Anthropic Claude API"
    type: "llm_platform"
    purpose: "Model inference for all agent and skill execution (Opus for complex reasoning, Sonnet for implementation)"
    models_used:
      - "claude-opus: tech-architect, product-strategist, tech-designer, knowledge-extractor, intent-crafter, intent-resolver"
      - "claude-sonnet: code-builder, repo-orchestrator, quality-auditor, doc-builder, eval-generator, judge, test-engineer"
    invocation: "Claude Code runtime handles model dispatch; agents declare 'model:' in frontmatter"

  - name: "Web (WebSearch/WebFetch)"
    type: "external_data_source"
    purpose: "Domain research when LTM is insufficient (research-domain-context skill), product opportunity discovery"
    used_by: ["product-strategist", "tech-designer", "tech-architect"]
    invocation: "WebSearch and WebFetch tools in agents"

  - name: "YAML (file format)"
    type: "data_format"
    purpose: "All structured artifact schemas — intent.yaml, config.yaml, all skill schemas, STM artifacts"
    no_library_dependency: "Parsed/written as plain text by agents"

  - name: "Markdown (file format)"
    type: "data_format"
    purpose: "Agent definitions, recipe SKILL.md files, narrative documentation, checkpoint files, rich architecture artifacts (.md dual-format)"
    no_library_dependency: "Native Claude Code format"
