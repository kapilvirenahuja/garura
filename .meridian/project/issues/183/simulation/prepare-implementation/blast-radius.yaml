# blast-radius.yaml
# Task: 2B-blast-radius (Step 9)
# Issue: 183 — prepare-implementation should not hard-block on product.yaml and roadmap.yaml
# Generated: 2026-03-31 (simulation)
# Sources: test-surface.yaml, change-surface.yaml, dependency-graph.yaml
#
# REINTERPRETATION NOTE:
# meridian-os has zero conventional tests (zero test files, zero test frameworks, zero CI).
# Blast radius in a markdown/YAML specification framework = which play behaviors, contract
# behaviors, agent compliance checks, and eval criteria are affected by the change.
# "Tests" here = play evals (SE-*, SCE-*) and agent audit checks (P-series).

blast_radius:
  issue: 183

  # === CONVENTIONAL TEST IMPACT ===
  # (empty by design — zero test files exist)

  directly_impacted_tests: []
  transitively_impacted_tests: []
  regression_surface: []

  reason_empty: >
    test-surface.yaml found zero test files across the entire meridian-os codebase.
    No jest.config, no pytest.ini, no .mocharc, no playwright.config, no vitest.config.
    No test runner infrastructure exists. Conventional blast radius analysis does not apply.

  # === REINTERPRETED BLAST RADIUS (eval-based) ===
  # For meridian-os, the blast radius is measured by:
  # (A) Play evals (SE-* step evals, SCE-* scenario evals) in intent.yaml
  # (B) Agent audit checks (if any agent definition has compliance checks)
  # (C) LTM standards that govern the changed behavior

  reinterpreted_blast_radius:

    # --- Evals directly affected by removing hard-blocks ---

    affected_evals:

      - eval_id: "SE-PRE-01 (inferred)"
        eval_type: "step eval"
        eval_location: "prepare-implementation pre-flight"
        old_behavior: >
          Hard halt when product.yaml absent (C1 in old intent). Eval checked: play stopped
          and emitted HALT message when product.yaml not found at {product_base}/discovery/product.yaml.
        new_behavior: >
          Play continues when product.yaml absent. Records status: absent in Step 0.
          Routes to discovery mode for product context.
        verdict: >
          This eval's PASS condition has inverted. The old eval would PASS when play halted
          for missing product.yaml. The new eval must PASS when play CONTINUES and records
          absent status in context-assembly.yaml.
        severity: critical
        file_path: "core/components/plays/prepare-implementation/reference/intent.yaml (C1 constraint)"

      - eval_id: "SE-PRE-02 (inferred)"
        eval_type: "step eval"
        eval_location: "prepare-implementation pre-flight"
        old_behavior: >
          Hard halt when roadmap.yaml absent. Required locked roadmap as pre-condition.
        new_behavior: >
          Play continues when roadmap.yaml absent. Epic dependency enforcement disabled (C15).
          Issue-only entry path enabled.
        verdict: >
          Same inversion as SE-PRE-01. Old eval checked for halt; new eval must check for continuation.
        severity: critical
        file_path: "core/components/plays/prepare-implementation/reference/intent.yaml (C1, C15 constraints)"

      - eval_id: "SE-PRE-03 (inferred)"
        eval_type: "step eval"
        eval_location: "prepare-implementation pre-flight"
        old_behavior: >
          Hard halt when architecture.yaml absent. Required /prepare-architecture to run first.
        new_behavior: >
          Play enters discovery mode (C21). Architecture inferred from codebase scan + LTM
          + targeted user interview. Eval must check: discovery mode activated, not halt.
        verdict: >
          Behavior inverted. New eval adds a positive requirement: when architecture absent,
          context-assembly.yaml.upstream_context.architecture.status must be 'derived'.
        severity: high
        file_path: "core/components/plays/prepare-implementation/reference/intent.yaml (C21, F25 constraints)"

      - eval_id: "SE-PRE-04 (inferred)"
        eval_type: "step eval"
        eval_location: "prepare-implementation pre-flight"
        old_behavior: >
          Hard halt when quality-standards.yaml absent.
        new_behavior: >
          Play enters discovery mode (C22). Quality context derived from toolchain detection.
        verdict: >
          Same inversion as SE-PRE-03.
        severity: high
        file_path: "core/components/plays/prepare-implementation/reference/intent.yaml (C22 constraint)"

      - eval_id: "SE-STEP0-01 (inferred)"
        eval_type: "step eval"
        eval_location: "prepare-implementation Step 0 (new step)"
        old_behavior: "Step 0 did not exist. Pre-flight directly proceeded to epic resolution."
        new_behavior: >
          Step 0 now exists. It checks for all 4 upstream artifacts, records status (absent/locked),
          and sets discovery_mode flags. Eval must check: all 4 status fields present in
          context-assembly.yaml.upstream_context, correct status values, correct discovery_mode flags.
        verdict: >
          New eval required. Step 0 is entirely new behavior — no prior eval existed.
        severity: critical
        file_path: "core/components/plays/prepare-implementation/SKILL.md (Step 0)"

      - eval_id: "SE-STEP2-01 (impacted)"
        eval_type: "step eval"
        eval_location: "prepare-implementation Step 2 (architecture inference)"
        old_behavior: "Architecture inference always had locked architecture.yaml as input."
        new_behavior: >
          Architecture inference may run in discovery mode (no locked artifact).
          Eval must check: when discovery_mode=true in Step 2 contract,
          context-assembly.yaml.upstream_context.architecture.status == 'derived' (F25).
        verdict: >
          Existing eval condition extended. The F25 failure condition ('Architecture context is
          missing and play did not enter discovery mode') requires a new eval branch.
        severity: high
        file_path: "core/components/plays/prepare-implementation/reference/intent.yaml (F25)"

      - eval_id: "SCE-S2-01 (impacted)"
        eval_type: "scenario eval"
        eval_location: "S2 — Technical Architect persona"
        old_behavior: >
          S2: 'Given locked features.yaml and locked architecture.yaml...' — architecture.yaml
          was always present by the time S2 executed.
        new_behavior: >
          S2 must handle: 'Given locked features.yaml and established architecture context
          (locked artifact OR discovery-derived).' The 'or discovery-derived' path is new.
        verdict: >
          Scenario eval must add a branch for discovery-derived architecture context.
        severity: medium
        file_path: "core/components/plays/prepare-implementation/reference/intent.yaml (S2)"

      - eval_id: "SCE-S7-01 (impacted)"
        eval_type: "scenario eval"
        eval_location: "S7 — Engineering Lead persona (context assembly approval)"
        old_behavior: "Context assembly approval was for dependency resolution report, not codebase scan."
        new_behavior: >
          S7 now covers the full codebase understanding: architecture, test coverage, change
          surface, blast radius. The Engineering Lead must verify all of these — including
          the case where architecture is discovery-derived and product/roadmap are absent.
        verdict: >
          S7 scenario eval scope has expanded significantly. Existing eval may be insufficient.
        severity: medium
        file_path: "core/components/plays/prepare-implementation/reference/intent.yaml (S7)"

    # --- LTM standards that need new evals ---

    affected_standards:
      - standard: "core/components/memory/standards/agent-contract.md"
        impact: >
          The ltm_context.locked_artifacts field is the mechanism for communicating which
          upstream artifacts exist to each agent. The blast radius includes any agent that
          reads ltm_context — specifically tech-architect (Steps 2, 5) and product-strategist.
          If the contract schema changes to add 'discovery_mode' as a first-class field,
          all agents governed by this standard are affected.
        severity: medium
        eval_needed: false  # contract is backward compatible — ltm_context is optional

      - standard: "core/components/memory/standards/resolution-protocol.md"
        impact: >
          The R1-R4 protocol governs agent-level knowledge resolution. C23 establishes
          a parallel play-level hierarchy. If the resolution-protocol.md is updated to
          document this relationship, the knowledge-extractor agent (which uses this standard
          during capture-learning) would need to recognize both hierarchies.
        severity: low
        eval_needed: false

  # === COVERAGE GAPS ===
  # Every file in the change surface is a coverage gap — no tests characterize any of them

  coverage_gaps:
    total: 11  # matches change-surface.yaml total_affected count

    by_category:
      already_changed_uncovered:
        - path: "core/components/plays/prepare-implementation/SKILL.md"
          gap: >
            Pre-flight behavior inversion (hard-halt → soft-degrade) is not covered by any
            existing eval. The play's own evals (SE-*, SCE-*) were designed for the old
            hard-halt model. No eval verifies that the play continues when product.yaml is absent.
          baseline_tests_needed: true

        - path: "core/components/plays/prepare-implementation/reference/intent.yaml"
          gap: >
            C1 constraint change not validated by any eval. No eval checks that the constraint
            is correctly expressed or that the SKILL.md compiled behavior matches C1's new text.
          baseline_tests_needed: true

        - path: "core/components/agents/tech-architect.md"
          gap: >
            New agent definition. No baseline characterization of its behavior exists.
            All 8 tasks delegated to tech-architect in the play are uncharacterized.
          baseline_tests_needed: true

        - path: "core/components/agents/test-engineer.md"
          gap: >
            New agent definition. No baseline characterization. All 4 tasks delegated to
            test-engineer are uncharacterized — including blast radius with zero tests case.
          baseline_tests_needed: true

      not_yet_changed_uncovered:
        - path: "core/components/plays/discover-product/SKILL.md"
          gap: "Pre-flight behavior in this pipeline play is uncharacterized for soft-dependency consistency"
          baseline_tests_needed: true

        - path: "core/components/plays/plan-roadmap/SKILL.md"
          gap: "Pre-flight behavior in this pipeline play is uncharacterized"
          baseline_tests_needed: true

        - path: "core/components/plays/prepare-architecture/SKILL.md"
          gap: "Relationship with prepare-implementation's new soft-dependency model is uncharacterized"
          baseline_tests_needed: true

        - path: "core/components/skills/draft-lld/SKILL.md"
          gap: "Discovery mode handling (absent architecture.yaml input) is uncharacterized"
          baseline_tests_needed: true

        - path: "core/components/skills/draft-implementation-plan/SKILL.md"
          gap: "No-roadmap path is uncharacterized"
          baseline_tests_needed: true

        - path: "core/components/skills/draft-product-spec/SKILL.md"
          gap: "No-product.yaml path is uncharacterized"
          baseline_tests_needed: true

        - path: "core/components/skills/draft-verification-scenarios/SKILL.md"
          gap: "Zero-existing-tests blast radius reinterpretation is uncharacterized"
          baseline_tests_needed: true

  # === BLAST RADIUS SEVERITY ASSESSMENT ===

  severity_summary:
    critical:
      count: 3
      items:
        - "SE-PRE-01: product.yaml absence no longer halts — eval condition inverted"
        - "SE-PRE-02: roadmap.yaml absence no longer halts — eval condition inverted"
        - "SE-STEP0-01: Step 0 is entirely new — no evals exist for it at all"
    high:
      count: 2
      items:
        - "SE-PRE-03: architecture.yaml absence triggers discovery mode — eval condition inverted + new positive check required"
        - "SE-PRE-04: quality-standards.yaml absence triggers discovery mode — same"
    medium:
      count: 3
      items:
        - "SE-STEP2-01: discovery mode branch in architecture inference step (F25 failure condition)"
        - "SCE-S2-01: S2 scenario must handle discovery-derived architecture context"
        - "SCE-S7-01: S7 scenario eval scope expanded to full codebase understanding"
    low:
      count: 2
      items:
        - "agent-contract.md backward compat: ltm_context is already optional — no breaking change"
        - "resolution-protocol.md: documentation relationship note only"

  overall_blast_severity: high
  rationale: >
    Three critical evals have inverted pass/fail conditions — old evals would PASS on the
    very behavior the fix is correcting (halting on missing artifacts). If evals were running,
    they would now fail on the correct new behavior. This is the classic sign of a breaking
    behavioral change: existing quality gates would reject the fix. Since no evals currently
    run (zero test infrastructure), this risk is theoretical — but it must be addressed in
    baseline-tests.yaml before the implementation proceeds.
