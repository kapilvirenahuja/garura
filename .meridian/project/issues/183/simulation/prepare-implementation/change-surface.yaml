change_surface:
  issue: 183
  implementation_status: >
    The primary behavioral change (removing hard-blocks on product.yaml and roadmap.yaml) has
    already been applied to SKILL.md and reference/intent.yaml in this branch. The remaining
    surface covers: verifying the companion intent.yaml is consistent with current SKILL.md,
    ensuring the test-engineer agent file is accurate (it was added as a new agent in this rebake),
    and confirming no LTM standard needs to be created for the new soft-dependency pattern.

  files:
    # === PRIMARY CHANGE — already modified ===

    - path: "core/components/plays/prepare-implementation/SKILL.md"
      action: MODIFY
      what_changes: >
        Pre-flight table rewritten: removed 4 hard-halt entries for product.yaml, roadmap.yaml,
        architecture.yaml, quality-standards.yaml. Replaced with 2 entries: issue resolution
        (C14) and epic+roadmap combination check (C14, F19). Step 0 added to check for upstream
        artifacts WITHOUT halting — records status as absent/locked and routes to discovery mode.
        Agent boundary table updated: tech-designer replaced by tech-architect + test-engineer
        (new agents introduced in this rebake). Constraint reference updated from C1-C22 to C1-C32.
        Description updated from epic-only to issue-or-epic entry. Discovery mode language added
        for architecture and quality contexts.
      confidence: high
      source: "direct — git diff confirms this file already changed in this branch"
      change_type: "behavior-change + role-expansion"
      already_applied: true

    - path: "core/components/plays/prepare-implementation/reference/intent.yaml"
      action: MODIFY
      what_changes: >
        C1 rewritten: from 'product.yaml and roadmap.yaml are required locked upstream inputs'
        to 'product.yaml and roadmap.yaml are nice-to-have; play never halts for missing them.'
        C21/C22 added: architecture and quality are essential but not hard-halt — discovery mode
        governs their absence. C23 added: context resolution hierarchy (locked → project LTM →
        codebase scan → user interview). C14 updated: play halts ONLY when neither issue nor
        epic can be resolved. C15 updated: epic dependency enforcement only when roadmap exists.
        New constraints C16-C32 added covering codebase understanding, LTM consultation,
        blast radius, baseline tests, dual format, scenario compartmentalization, etc.
      confidence: high
      source: "direct — intent.yaml read and confirmed; git history shows co-change pattern (4x)"
      change_type: "constraint-expansion + behavior-change"
      already_applied: true

    # === COMPANION CHANGES — required by co-change pattern ===

    - path: "core/components/agents/tech-architect.md"
      action: MODIFY
      what_changes: >
        New agent introduced to replace tech-designer in prepare-implementation. Must be consistent
        with the roles declared in SKILL.md's agent boundary table: architecture inference,
        dependency graph, git history, LTM consultation, context assembly, change surface,
        tech.yaml + LLD, plan.yaml + DAG. Agent must handle discovery mode (absent architecture.yaml)
        without halting. The resolve-protocol.md R1-R4 behavior must be wired for ltm_context.
      confidence: high
      source: "direct — SKILL.md agent table references tech-architect, not tech-designer"
      change_type: "new agent definition"
      already_applied: true
      note: "tech-architect.md was confirmed present in core/components/agents/ (architecture-inference.yaml key_files)"

    - path: "core/components/agents/test-engineer.md"
      action: MODIFY
      what_changes: >
        New agent introduced for test surface mapping, blast radius computation, baseline test
        specification, and three-tier scenarios.yaml authoring. Must handle the 'zero tests found'
        case without halting. Blast radius reinterpretation for non-traditional codebases
        (markdown/YAML frameworks where conventional test impact analysis doesn't apply).
      confidence: high
      source: "direct — SKILL.md agent table references test-engineer; dependency-graph.yaml confirms it"
      change_type: "new agent definition"
      already_applied: true

    # === PROPAGATION CHANGES — required by co-change pattern (cross-cutting play updates) ===

    - path: "core/components/plays/discover-product/SKILL.md"
      action: MODIFY
      what_changes: >
        Co-change pattern: every cross-cutting update to prepare-implementation also updates
        discover-product, plan-roadmap, and prepare-architecture. If #183 introduces any
        new standard (e.g., soft-dependency pattern, discovery mode pattern) that is shared
        across pipeline plays, discover-product needs to be consistent with it.
        Minimum: check that its pre-flight hard-blocks are still appropriate given the new
        soft-dependency philosophy established by #183.
      confidence: medium
      source: "co-change — commit-history-analysis.yaml confirms 4 occurrences of all-4-plays updating together"
      change_type: "consistency check + possible modification"
      already_applied: false
      note: "May be a no-op if discover-product's pre-flight blocks are intentionally harder (it IS the upstream step)"

    - path: "core/components/plays/plan-roadmap/SKILL.md"
      action: MODIFY
      what_changes: >
        Same co-change pattern as discover-product. If plan-roadmap's pre-flight
        hard-blocks on architecture.yaml or quality-standards.yaml are appropriate,
        this may be a no-op. But the dependency chain semantics must be verified:
        plan-roadmap is downstream of discover-product and upstream of prepare-implementation.
      confidence: medium
      source: "co-change — commit-history-analysis.yaml"
      change_type: "consistency check"
      already_applied: false

    - path: "core/components/plays/prepare-architecture/SKILL.md"
      action: MODIFY
      what_changes: >
        Same co-change pattern. prepare-architecture is the play that produces architecture.yaml
        and quality-standards.yaml — the artifacts whose absence prepare-implementation now handles
        gracefully. The relationship should be documented in prepare-architecture's intent so users
        understand prepare-implementation can run without it.
      confidence: medium
      source: "co-change — commit-history-analysis.yaml"
      change_type: "documentation/relationship update"
      already_applied: false

    # === LTM CHANGES — new standards may be needed ===

    - path: "core/components/memory/standards/"
      action: CREATE
      what_changes: >
        LTM gap identified: no standard for 'play-level soft dependency patterns.'
        The fix for #183 establishes a new pattern (soft dependencies with discovery mode fallback)
        that other plays may need. A new standard file should be created to codify:
        (1) When to hard-halt vs. soft-degrade for missing upstream artifacts,
        (2) The authority hierarchy for context resolution (locked → project LTM → codebase → interview),
        (3) How to communicate degraded-mode operation in checkpoint briefs.
        Candidate filename: core/components/memory/standards/play-dependency-protocol.md
      confidence: medium
      source: "ltm-findings.yaml — gap category 'soft dependency patterns' and 'play dependency hierarchy'"
      change_type: "new LTM standard"
      already_applied: false
      note: "This is a recommended addition, not strictly required for #183 correctness. Reduces future inconsistency."

    - path: "core/components/memory/standards/resolution-protocol.md"
      action: MODIFY
      what_changes: >
        The resolution protocol defines R1-R4 hierarchy for AGENT-level knowledge resolution.
        The soft-dependency pattern in #183 extends this concept to PLAY-level artifact resolution.
        A note or section should be added clarifying that C23's context resolution hierarchy
        (locked YAML → project LTM → codebase scan → user interview) is the play-level
        equivalent of R1-R4, and that the two are intentionally parallel.
      confidence: low
      source: "ltm-findings.yaml — resolution-protocol marked 'critical' relevance to #183"
      change_type: "documentation extension"
      already_applied: false
      note: "Low confidence — this may belong in a new play-dependency-protocol.md rather than modifying resolution-protocol.md"

    # === SCHEMA CHANGES — context-assembly.yaml structure ===

    - path: "core/components/skills/draft-lld/SKILL.md"
      action: MODIFY
      what_changes: >
        draft-lld is invoked by tech-architect to produce tech.yaml. If tech-architect now operates
        in discovery mode (no architecture.yaml), the skill must accept a 'discovery_mode' flag
        and handle absent architecture context without halting. Must document which fields can be
        inferred from codebase scan vs. which require locked architecture.yaml.
      confidence: medium
      source: "dependency-graph.yaml — tech-architect → skill-draft-lld edge; co-change confirmed in commit-history"
      change_type: "discovery mode handling"
      already_applied: false

    - path: "core/components/skills/draft-implementation-plan/SKILL.md"
      action: MODIFY
      what_changes: >
        draft-implementation-plan produces plan.yaml. When roadmap.yaml is absent, the skill
        cannot draw from epic phasing guidance. It must handle the 'no roadmap' path:
        construct phase structure from issue description + codebase analysis rather than
        roadmap epic ordering.
      confidence: medium
      source: "dependency-graph.yaml — tech-architect → skill invocation; ltm-findings.yaml gap on implementation plan patterns"
      change_type: "discovery mode handling"
      already_applied: false

    - path: "core/components/skills/draft-product-spec/SKILL.md"
      action: MODIFY
      what_changes: >
        draft-product-spec produces features.yaml. When product.yaml is absent, the skill
        must derive product identity, invariants, and scope from issue description + codebase
        analysis + LLM reasoning (R4). Must not halt or produce empty features.yaml.
      confidence: medium
      source: "dependency-graph.yaml — product-strategist → skill-draft-product-spec"
      change_type: "discovery mode handling"
      already_applied: false

    - path: "core/components/skills/draft-verification-scenarios/SKILL.md"
      action: MODIFY
      what_changes: >
        When zero tests exist (as in meridian-os), blast radius is reinterpreted as play/agent
        eval coverage gaps. The skill must handle the 'no existing tests' input path for
        baseline scenarios — producing eval-based scenario specifications rather than conventional
        unit/integration test specs.
      confidence: medium
      source: "dependency-graph.yaml; test-surface.yaml finding of zero tests"
      change_type: "non-traditional test surface handling"
      already_applied: false

interfaces_changed:
  - interface: "prepare-implementation pre-flight contract"
    description: "Pre-flight no longer requires product.yaml, roadmap.yaml, architecture.yaml, quality-standards.yaml. Entry condition changed from '--epic required' to 'issue OR epic required'."
    consumers: ["all users invoking /prepare-implementation", "start-feature play (if it chains to prepare-implementation)"]

  - interface: "prepare-implementation agent dispatch contract for tech-architect"
    description: "New agent (tech-architect, not tech-designer). JSON contract now includes discovery_mode flag and ltm_context with locked_artifacts list showing what's absent."
    consumers: ["tech-architect agent"]

  - interface: "context-assembly.yaml schema"
    description: "New intermediate artifact. Schema: upstream_context (status/confidence/source per artifact), phase1_summary, authority_map, confidence_assessment, checkpoint_0_items."
    consumers: ["tech-architect (change surface, tech.yaml, plan.yaml)", "product-strategist (features.yaml, validation)"]

data_models_changed:
  - model: "prepare-implementation pre-flight state"
    old: "4 hard-block checks: product.yaml required, roadmap.yaml required, architecture.yaml required, quality-standards.yaml required"
    new: "2 soft checks: product.yaml/roadmap.yaml optional (C1), architecture.yaml/quality.yaml trigger discovery mode (C21/C22)"

  - model: "context-assembly.yaml (new artifact)"
    old: "did not exist in old play"
    new: "upstream_context (per-artifact status/authority/source), phase1_summary (5 entries), authority_map, confidence_assessment, checkpoint_0_items"

  - model: "prepare-implementation agent table"
    old: "2 domain agents: tech-designer + product-strategist"
    new: "3 domain agents: tech-architect + test-engineer + product-strategist"

