# ─── Open Questions ───────────────────────────────────────────────────────────

open_questions:
  - id: OQ-1
    question: >
      Should discover-product's pre-flight still hard-halt on absent upstream market research?
      Or should it also adopt the soft-dependency philosophy?
    owner: user
    affects: core/components/plays/discover-product/SKILL.md
    blocking: false

  - id: OQ-2
    question: >
      Should play-dependency-protocol.md be a new file, or should its content be
      added as a section to the existing resolution-protocol.md?
    owner: user
    affects: core/components/memory/standards/rules/resolution.md
    blocking: false
    recommendation: >
      New file. resolution-protocol.md is scoped to agent-level R1-R4 behavior.
      Play-level soft-dependency is a distinct concept — mixing them would blur
      the boundary. A cross-reference is appropriate, not a merge.

  - id: OQ-3
    question: >
      The four downstream skills (draft-lld, draft-implementation-plan, draft-product-spec,
      draft-verification-scenarios) each need discovery mode handling. Should this be done
      in a single batch or sequentially one skill at a time?
    owner: user
    affects: "4 skill files"
    blocking: false
    recommendation: >
      Batch. All four follow the same pattern (add null-path handling + discovery_mode flag).
      Doing them together reduces context switching and keeps the skill set consistent.
