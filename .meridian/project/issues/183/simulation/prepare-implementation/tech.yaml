# ─── Project Structure ────────────────────────────────────────────────────────
# Scope limited to the prepare-implementation play neighborhood affected by #183

project_structure:
  relevant_directories:
    - path: core/components/plays/prepare-implementation/
      role: >
        Primary change target. SKILL.md is the compiled runtime artifact.
        reference/intent.yaml is the source of truth. Always co-change.
      files:
        - SKILL.md
        - reference/intent.yaml

    - path: core/components/agents/
      role: >
        Agent definitions. tech-architect.md and test-engineer.md are new agents
        introduced by this rebake — replacing tech-designer as the play's
        architecture domain agent.
      files:
        - tech-architect.md   # new — already created
        - test-engineer.md    # new — already created
        - tech-designer.md    # retained — still referenced by other plays

    - path: core/components/plays/discover-product/
      role: >
        Pipeline co-change target. Must be reviewed for pre-flight consistency
        with the new soft-dependency philosophy.
      files:
        - SKILL.md

    - path: core/components/plays/plan-roadmap/
      role: >
        Pipeline co-change target. Same consistency review required.
      files:
        - SKILL.md

    - path: core/components/plays/prepare-architecture/
      role: >
        Pipeline co-change target. Produces the architecture.yaml and
        quality-standards.yaml that prepare-implementation now handles gracefully
        when absent. Relationship must be documented.
      files:
        - SKILL.md

    - path: core/components/skills/draft-lld/
      role: >
        Invoked by tech-architect (task 3-tech). Must accept discovery_mode flag
        and operate without locked architecture.yaml as input.
      files:
        - SKILL.md

    - path: core/components/skills/draft-implementation-plan/
      role: >
        Invoked by tech-architect (task 3-plan). Must handle absent roadmap.yaml
        and construct phase structure from issue description + codebase analysis.
      files:
        - SKILL.md

    - path: core/components/skills/draft-product-spec/
      role: >
        Invoked by product-strategist (task 3-features). Must derive product context
        from issue description + codebase when product.yaml is absent (R4 fallback).
      files:
        - SKILL.md

    - path: core/components/skills/draft-verification-scenarios/
      role: >
        Invoked by test-engineer (task 3-scenarios). Must handle zero-test codebase —
        reinterpret blast radius as eval coverage gaps rather than test file impact.
      files:
        - SKILL.md

    - path: core/components/memory/standards/
      role: >
        LTM standards. A new play-dependency-protocol.md should be created to
        codify the soft-dependency pattern established by #183.
        resolution-protocol.md may need a note linking R1-R4 to C23.
      files:
        - resolution-protocol.md
        - play-dependency-protocol.md   # new — does not yet exist


