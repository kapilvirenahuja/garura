  - path: core/components/plays/prepare-implementation/reference/intent.yaml
    action: MODIFY
    change_status: already_applied
    location: "constraints section — C1, C14, C15 modified; C16-C32 added"
    change_type: "constraint-expansion + behavior-change"

    before:
      C1: >
        product.yaml and roadmap.yaml are required locked upstream inputs.
        The play halts when these are absent — they are not optional.
      C14: >
        The play uses --epic flag as its entry point. An epic ID must be
        provided. The play resolves the epic from roadmap.yaml.
      C15: >
        All epic dependencies (from roadmap depends_on) must be either prepared
        or built before this epic's prepare-implementation run.
      note: "C16-C32 did not exist. Constraint set ended at C22 (prior numbering)."

    after:
      C1: >
        Product.yaml and roadmap.yaml are nice-to-have upstream inputs. When
        present and locked, they are authoritative. When absent, the play
        proceeds with issue context and codebase-derived understanding. The
        play never halts for missing product.yaml or roadmap.yaml.
      C14: >
        The play auto-resolves work context from the current branch name or
        STM directory. An --epic flag is optional for roadmap-driven entry.
        When --epic is provided and a locked roadmap exists, the epic ID must
        exist in the roadmap. The play halts only when neither an issue nor
        an epic can be resolved — nothing to scope the work against.
      C15: >
        Epic dependency enforcement applies only when a locked roadmap exists
        and --epic is provided. All epic dependencies (from roadmap depends_on)
        must be either prepared or built. When working from an issue without a
        roadmap, epic dependency enforcement does not apply.
      C21: >
        Architecture context is essential but not a hard-halt. When a locked
        architecture.yaml exists at {product_base}/architecture/architecture.yaml,
        it is used as the authoritative source. When absent, the play enters
        discovery mode — deriving architecture understanding from the codebase
        scan (design patterns, framework conventions, logical architecture) and
        LTM, then working with the user via targeted interview to fill gaps.
        The goal is equivalent understanding, not a shortcut.
      C22: >
        Quality standards context is essential but not a hard-halt. When a locked
        quality-standards.yaml exists, it is used as the authoritative source.
        When absent, the play derives quality context from toolchain detection
        (test config, linting, CI files, coverage config) and LTM, then works
        with the user via targeted interview to establish quality gates.
      C23: >
        Context resolution follows a hierarchy for each upstream artifact:
        locked YAML artifact (authoritative) → project LTM (advisory) →
        codebase scan (derived) → user interview (collected). Each source has
        an authority level. The play documents which source provided each
        piece of context in context-assembly.yaml.
      note: "C16-C32 added (see intent.yaml on branch for complete text)."

