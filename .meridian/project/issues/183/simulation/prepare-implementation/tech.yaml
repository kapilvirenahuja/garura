      input_handling: |
        Reads blast-radius.yaml for reason_empty field. When reason_empty is populated and
        directly_impacted/transitively_impacted are empty, switches to eval-based scenario mode.
        Produces scenarios with eval_based: true flag on baseline and regression tiers.
        Documents the reinterpretation in scenarios.yaml preamble.

  - path: core/components/memory/standards/play-dependency-protocol.md
    action: CREATE
    change_status: not_yet_applied
    description: >
      New LTM standard codifying the soft-dependency pattern established by #183.
      Content outline:
        1. Hard-halt vs. soft-degrade decision criteria
           - Hard-halt: config required, issue/epic required (F19), epic not found in roadmap
           - Soft-degrade: upstream YAML artifacts (product.yaml, roadmap.yaml,
             architecture.yaml, quality-standards.yaml) — never halt, always derive
        2. Context resolution hierarchy (play-level equivalent of R1-R4)
           - Level 1: locked YAML artifact (authoritative)
           - Level 2: project LTM (advisory)
           - Level 3: codebase scan (derived)
           - Level 4: user interview (collected)
        3. How to communicate degraded mode at checkpoints
           - context-assembly.yaml structure (status, confidence, source per artifact)
           - authority_map table at Checkpoint 0
           - Flag all inferred content (authority: "inferred (R4)")
        4. Discovery mode specification
           - When to enter: architecture absent (C21), quality absent (C22)
           - What it produces: derived understanding, not "skip architecture"
           - Exit: context-assembly.yaml.upstream_context.architecture.status == "derived"
        5. Pipeline topology documentation requirements
           - Each play producing upstream artifacts must document what downstream
             plays do when those artifacts are absent


# ─── Interface Changes ────────────────────────────────────────────────────────

interface_changes:

  - interface: "prepare-implementation pre-flight contract"
    change_status: already_applied
    before:
      summary: "4 hard-halt checks for upstream YAML artifacts + issue/epic check"
      entry_point: "--epic required"
      halts_on: "missing product.yaml, roadmap.yaml, architecture.yaml, quality-standards.yaml"
    after:
      summary: "0 hard-halts for upstream YAML artifacts. 2 remaining: config resolution + issue-or-epic requirement"
      entry_point: "issue (auto-resolved from branch) OR --epic flag"
      halts_on: "config.yaml missing | neither issue nor epic (F19) | epic not found in roadmap when roadmap exists"
    consumers:
      - "all users invoking /prepare-implementation"
      - "start-feature play (if it chains to prepare-implementation)"

  - interface: "prepare-implementation agent dispatch contract — tech-architect"
    change_status: already_applied
    before:
      agent: tech-designer
      tasks: ["architecture inference", "tech.yaml", "plan.yaml"]
      discovery_mode: "not supported"
    after:
      agent: tech-architect
      tasks:
        - "1A-architecture-inference"
        - "1C-dependency-graph"
        - "1D-git-history"
        - "1E-ltm-consultation"
        - "context-assembly"
        - "2A-change-surface"
        - "3-tech"
        - "3-plan"
      discovery_mode: "supported — set by Step 0, read in Step 2 contract"
      ltm_context: "locked_artifacts list now reflects what is actually absent"
    consumers:
      - tech-architect agent

  - interface: "prepare-implementation agent dispatch contract — test-engineer (new)"
    change_status: already_applied
    before:
      exists: false
    after:
      agent: test-engineer
      tasks:
        - "1B-test-surface-mapping"
        - "2B-blast-radius"
        - "2C-baseline-tests"
        - "3-scenarios"
    consumers:
      - test-engineer agent

  - interface: "context-assembly.yaml schema (new artifact)"
    change_status: already_applied
    before: "did not exist in prior play version"
    after:
      schema: |
        upstream_context:
          product:
            status: locked | absent
            confidence: authoritative | n/a
            source: "{path or 'absent'}"
            authority: locked | none
          roadmap: { same shape }
          architecture:
            status: locked | derived    # never "absent" after discovery mode (F25)
            confidence: authoritative | derived
            source: "{path or 'codebase-scan'}"
            discovery_mode: true | false
          quality: { same shape as architecture }
        phase1_summary:
          architecture_inference: { file, status, summary, key_risks, discovery_mode }
          test_surface: { file, status, summary, key_insight }
          dependency_graph: { file, status, summary, issue_relevance }
          git_history: { file, status, summary, issue_relevance }
          ltm_findings: { file, status, gap_count, summary }
        authority_map:
          { per-artifact: source, authority, confidence, fallback, flag_in_artifacts }
        confidence_assessment:
          overall: high | medium | low
          rationale: "{text}"
        checkpoint_0_items:
          - { item, owner, blocking }
    consumers:
      - "tech-architect (change surface, tech.yaml, plan.yaml)"
      - "product-strategist (features.yaml, validation)"

  - interface: "draft-lld skill input contract"
