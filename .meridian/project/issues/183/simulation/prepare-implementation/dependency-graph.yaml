---
# Dependency Graph — prepare-implementation recipe neighborhood
# Task: 1C-dependency-graph (SIMULATION)
# Issue: 183
# Scope: recipe → agents → skills → standards
# Generated: 2026-03-31

meta:
  recipe: prepare-implementation
  version: compiled from reference/intent.yaml
  scope: recipe neighborhood (dispatch chain + standard dependencies)
  node_count: 30
  edge_count: 52

nodes:
  # --- RECIPE ---
  - id: prepare-implementation
    type: recipe
    level: L2
    path: core/components/recipes/prepare-implementation/SKILL.md
    description: "Orchestrator — produces locked features.yaml, tech.yaml, scenarios.yaml, plan.yaml"
    fan_in: 0
    fan_out: 5   # dispatches 5 distinct agents (4 domain + 1 utility repeated)

  # --- AGENTS (domain) ---
  - id: tech-architect
    type: agent
    domain: architecture
    model: opus
    path: core/components/agents/tech-architect.md
    description: "Architecture inference, dependency graph, git history, LTM consultation, change surface, tech.yaml, plan.yaml"
    tasks_in_recipe:
      - 1A-architecture-inference
      - 1C-dependency-graph
      - 1D-git-history
      - 1E-ltm-consultation
      - context-assembly
      - 2A-change-surface
      - 3-tech
      - 3-plan

  - id: test-engineer
    type: agent
    domain: testing
    model: opus
    path: core/components/agents/test-engineer.md
    description: "Test surface mapping, blast radius computation, baseline test specification, scenario authoring"
    tasks_in_recipe:
      - 1B-test-surface-mapping
      - 2B-blast-radius
      - 2C-baseline-tests
      - 3-scenarios

  - id: product-strategist
    type: agent
    domain: product
    model: opus
    path: core/components/agents/product-strategist.md
    description: "Features specification (draft-product-spec) and cross-validation (validate-implementation-design)"
    tasks_in_recipe:
      - 3-features
      - validate

  # --- AGENTS (utility) ---
  - id: doc-builder
    type: agent
    domain: documentation
    model: sonnet
    path: core/components/agents/doc-builder.md
    description: "HTML briefs generator — owns briefs/ directory and hub.html lifecycle"
    tasks_in_recipe:
      - brief-features
      - brief-tech
      - brief-scenarios-plan

  - id: repo-orchestrator
    type: agent
    domain: repo
    model: sonnet
    path: core/components/agents/repo-orchestrator.md
    description: "Evidence self-commit at recipe close"
    tasks_in_recipe:
      - evidence-commit

  # --- SKILLS (invoked via tech-architect) ---
  - id: skill-draft-lld
    type: skill
    path: core/components/skills/draft-lld
    description: "Create tech.yaml with project structure, libraries, data model, components, design decisions, feature-level changes"
    invoked_by: tech-architect

  # --- SKILLS (invoked via test-engineer) ---
  - id: skill-draft-verification-scenarios
    type: skill
    path: core/components/skills/draft-verification-scenarios
    description: "Create scenarios.yaml with grouped scenarios, feature back-links, feature gates, and coverage summary"
    invoked_by: test-engineer

  # --- SKILLS (invoked via product-strategist) ---
  - id: skill-draft-product-spec
    type: skill
    path: core/components/skills/draft-product-spec
    description: "Create features.yaml defining product behaviors, invariants, scope, acceptance criteria (implementation-agnostic)"
    invoked_by: product-strategist

  - id: skill-validate-implementation-design
    type: skill
    path: core/components/skills/validate-implementation-design
    description: "Cross-validate features.yaml, tech.yaml, scenarios.yaml, plan.yaml for coverage, compartmentalization, audience separation"
    invoked_by: product-strategist

  - id: skill-research-domain-context
    type: skill
    path: core/components/skills/research-domain-context
    description: "Web research for domain context when LTM is insufficient — conditional invocation"
    invoked_by: product-strategist

  # --- SKILLS (invoked via doc-builder) ---
  - id: skill-briefs
    type: skill
    path: core/components/recipes/briefs/SKILL.md
    description: "Scan product YAML artifacts, regenerate changed briefs via YAML→JSON + static HTML templates"
    invoked_by: doc-builder

  # --- SKILLS (invoked via repo-orchestrator) ---
  - id: skill-create-commit
    type: skill
    path: core/components/skills/create-commit
    description: "Stage files and create a commit — evidence self-commit at recipe close"
    invoked_by: repo-orchestrator

  # --- STM ARTIFACTS (intermediate evidence) ---
  - id: stm-architecture-inference
    type: stm_artifact
    paths:
      yaml: "{evidence_base}/architecture-inference.yaml"
      md: "{evidence_base}/architecture-inference.md"
    produced_by: tech-architect
    task: 1A-architecture-inference
    consumed_by:
      - tech-architect    # context-assembly, 2A-change-surface, 3-tech, 3-plan
      - doc-builder       # brief-tech

  - id: stm-test-surface
    type: stm_artifact
    path: "{evidence_base}/test-surface.yaml"
    produced_by: test-engineer
    task: 1B-test-surface-mapping
    consumed_by:
      - tech-architect    # context-assembly
      - test-engineer     # 2B-blast-radius, 2C-baseline-tests

  - id: stm-dependency-graph
    type: stm_artifact
    paths:
      yaml: "{evidence_base}/dependency-graph.yaml"
      md: "{evidence_base}/dependency-graph.md"
    produced_by: tech-architect
    task: 1C-dependency-graph
    consumed_by:
      - tech-architect    # context-assembly, 2A-change-surface
      - test-engineer     # 2B-blast-radius

  - id: stm-commit-history
    type: stm_artifact
    paths:
      yaml: "{evidence_base}/commit-history-analysis.yaml"
      md: "{evidence_base}/commit-history-analysis.md"
    produced_by: tech-architect
    task: 1D-git-history
    consumed_by:
      - tech-architect    # context-assembly, 2A-change-surface

  - id: stm-ltm-findings
    type: stm_artifact
    path: "{evidence_base}/ltm-findings.yaml"
    produced_by: tech-architect
    task: 1E-ltm-consultation
    consumed_by:
      - tech-architect    # context-assembly, 2A-change-surface, 3-tech

  - id: stm-context-assembly
    type: stm_artifact
    path: "{evidence_base}/context-assembly.yaml"
    produced_by: tech-architect
    task: context-assembly
    consumed_by:
      - tech-architect    # 2A-change-surface, 3-tech, 3-plan
      - product-strategist  # 3-features
      - product-strategist  # validate

  - id: stm-change-surface
    type: stm_artifact
    path: "{evidence_base}/change-surface.yaml"
    produced_by: tech-architect
    task: 2A-change-surface
    consumed_by:
      - test-engineer     # 2B-blast-radius
      - tech-architect    # 3-tech

  - id: stm-blast-radius
    type: stm_artifact
    path: "{evidence_base}/blast-radius.yaml"
    produced_by: test-engineer
    task: 2B-blast-radius
    consumed_by:
      - test-engineer     # 2C-baseline-tests, 3-scenarios
      - product-strategist  # 3-features
      - tech-architect    # 3-tech, 3-plan

  - id: stm-baseline-tests
    type: stm_artifact
    path: "{evidence_base}/baseline-tests.yaml"
    produced_by: test-engineer
    task: 2C-baseline-tests
    consumed_by:
      - test-engineer     # 3-scenarios
      - tech-architect    # 3-plan

  - id: stm-features
    type: stm_artifact
    path: "{stm_base}/{issue}/features.yaml"
    produced_by: product-strategist
    task: 3-features
    consumed_by:
      - tech-architect    # 3-tech
      - test-engineer     # 3-scenarios
      - tech-architect    # 3-plan
      - product-strategist  # validate

  - id: stm-tech
    type: stm_artifact
    paths:
      yaml: "{stm_base}/{issue}/tech.yaml"
      md: "{stm_base}/{issue}/tech.md"
    produced_by: tech-architect
    task: 3-tech
    consumed_by:
      - doc-builder       # brief-tech
      - tech-architect    # 3-plan
      - product-strategist  # validate

  - id: stm-scenarios
    type: stm_artifact
    path: "{stm_base}/{issue}/scenarios.yaml"
    produced_by: test-engineer
    task: 3-scenarios
    consumed_by:
      - tech-architect    # 3-plan (IDs only — compartmentalized)
      - doc-builder       # brief-scenarios-plan
      - product-strategist  # validate

  - id: stm-plan
    type: stm_artifact
    paths:
      yaml: "{stm_base}/{issue}/plan.yaml"
      md: "{stm_base}/{issue}/plan.md"
    produced_by: tech-architect
    task: 3-plan
    consumed_by:
      - doc-builder       # brief-scenarios-plan
      - product-strategist  # validate

  # --- LTM STANDARDS ---
  - id: std-agent-contract
    type: standard
    path: core/components/memory/standards/agent-contract.md
    description: "Universal recipe→agent JSON contract schema. Every recipe sends this. Every agent receives this."
    referenced_by:
      - prepare-implementation
      - tech-architect
      - test-engineer
      - product-strategist
      - doc-builder
      - repo-orchestrator

  - id: std-resolution-protocol
    type: standard
    path: core/components/memory/standards/resolution-protocol.md
    description: "R1-R4 LTM resolution protocol — hierarchy enforcement, authority semantics (LOCKED/DRAFT), resolution trace schema"
    referenced_by:
      - tech-architect     # carries ltm_context in Steps 1A, 1E
      - product-strategist
      - repo-orchestrator  # listed in resolution-protocol.md consumers

  - id: std-epic-management-rules
    type: standard
    path: core/components/memory/standards/agent-lifecycle/epic-management-rules.md
    description: "Vertical slice delivery, single module scope, mocks as phased delivery, foundation investment rules"
    referenced_by:
      - prepare-implementation   # C6, F3 (end-to-end feature phases)
      - product-strategist       # features.yaml authoring
      - tech-architect           # plan.yaml phase structure

  - id: std-brief-principles
    type: standard
    path: core/components/memory/standards/brief-principles.md
    description: "HTML brief presentation principles — Phoenix Design System, tabbed layout, inline feedback, hub.html lifecycle"
    referenced_by:
      - doc-builder
      - prepare-implementation   # checkpoint review steps

  - id: std-knowledge-file-template
    type: standard
    path: core/components/memory/standards/knowledge-file-template.md
    description: "Canonical knowledge file template for LTM entries — Tier 1/2 metadata, staleness rules, index registration"
    referenced_by:
      - tech-architect     # 1E-ltm-consultation reads LTM using this schema

  - id: std-templates-epic-schema
    type: standard
    path: core/components/memory/standards/templates/epic-schema.md
    description: "Epic YAML schema definition — passed to product-strategist as LTM schema input"
    referenced_by:
      - product-strategist

  # --- LTM / CONFIG ---
  - id: ltm-core-memory
    type: ltm_store
    path: "~/.meridian/core/memory/"
    description: "Global persistent memory store — architecture, implementation-patterns, quality-standards, testing-patterns"
    consumed_by:
      - tech-architect     # 1E-ltm-consultation
      - product-strategist # schema lookup

  - id: config-yaml
    type: config
    path: core/config.yaml
    description: "Project configuration — stm.base-path, product.base-path, platform settings"
    consumed_by:
      - prepare-implementation   # pre-flight path resolution

  - id: intent-yaml
    type: intent
    path: core/components/recipes/prepare-implementation/reference/intent.yaml
    description: "Recipe intent — C1-C32 constraints, F1-F26 failure conditions, S1-S13 scenarios"
    consumed_by:
      - prepare-implementation
      - tech-architect
      - test-engineer
      - product-strategist
      - doc-builder


edges:
  # --- recipe → agents (dispatch) ---
  - from: prepare-implementation
    to: tech-architect
    type: dispatches
    via: json_contract
    tasks: [1A-architecture-inference, 1C-dependency-graph, 1D-git-history, 1E-ltm-consultation, context-assembly, 2A-change-surface, 3-tech, 3-plan]
    note: "Most-dispatched agent — 8 tasks across all phases"

  - from: prepare-implementation
    to: test-engineer
    type: dispatches
    via: json_contract
    tasks: [1B-test-surface-mapping, 2B-blast-radius, 2C-baseline-tests, 3-scenarios]

  - from: prepare-implementation
    to: product-strategist
    type: dispatches
    via: json_contract
    tasks: [3-features, validate]

  - from: prepare-implementation
    to: doc-builder
    type: dispatches
    via: json_contract
    tasks: [brief-features, brief-tech, brief-scenarios-plan]
    agent_type: utility
    note: "Exempt from L2 agent budget per feedback_agent_budget_scope.md"

  - from: prepare-implementation
    to: repo-orchestrator
    type: dispatches
    via: json_contract
    tasks: [evidence-commit]
    agent_type: utility
    note: "Exempt from L2 agent budget"

  # --- agents → skills ---
  - from: tech-architect
    to: skill-draft-lld
    type: invokes
    note: "Produces tech.yaml + tech.md (task 3-tech)"

  - from: test-engineer
    to: skill-draft-verification-scenarios
    type: invokes
    note: "Produces scenarios.yaml (task 3-scenarios)"

  - from: product-strategist
    to: skill-draft-product-spec
    type: invokes
    note: "Produces features.yaml (task 3-features)"

  - from: product-strategist
    to: skill-validate-implementation-design
    type: invokes
    note: "Cross-validates all 4 final artifacts (task validate)"

  - from: product-strategist
    to: skill-research-domain-context
    type: invokes
    conditional: true
    condition: "LTM insufficient for product domain context"

  - from: doc-builder
    to: skill-briefs
    type: invokes
    note: "Generates HTML briefs from YAML artifacts"

  - from: repo-orchestrator
    to: skill-create-commit
    type: invokes
    note: "Evidence self-commit at recipe close"

  # --- recipe → config/intent (reads) ---
  - from: prepare-implementation
    to: config-yaml
    type: reads
    note: "Pre-flight: resolves stm_base and product_base paths"

  - from: prepare-implementation
    to: intent-yaml
    type: reads
    note: "All agents receive intent_path — constraints, failure conditions, scenarios"

  # --- agents → LTM ---
  - from: tech-architect
    to: ltm-core-memory
    type: queries
    note: "1E-ltm-consultation: architecture, implementation-patterns, quality-standards, testing-patterns"

  - from: product-strategist
    to: ltm-core-memory
    type: queries
    note: "Schema lookup for epic-schema.md and product domain standards"

  # --- agents → standards ---
  - from: prepare-implementation
    to: std-agent-contract
    type: governed_by
    note: "All agent dispatch follows this JSON contract schema"

  - from: tech-architect
    to: std-agent-contract
    type: governed_by

  - from: test-engineer
    to: std-agent-contract
    type: governed_by

  - from: product-strategist
    to: std-agent-contract
    type: governed_by

  - from: doc-builder
    to: std-agent-contract
    type: governed_by

  - from: repo-orchestrator
    to: std-agent-contract
    type: governed_by

  - from: tech-architect
    to: std-resolution-protocol
    type: governed_by
    note: "Applies R1-R4 when ltm_context present in contract (steps 1A, 1E)"

  - from: product-strategist
    to: std-resolution-protocol
    type: governed_by

  - from: repo-orchestrator
    to: std-resolution-protocol
    type: governed_by

  - from: prepare-implementation
    to: std-epic-management-rules
    type: governed_by
    note: "C6, F3: feature phases must be vertical slices, not horizontal layers"

  - from: product-strategist
    to: std-epic-management-rules
    type: governed_by
    note: "features.yaml authoring — vertical slice and scope constraints"

  - from: tech-architect
    to: std-epic-management-rules
    type: governed_by
    note: "plan.yaml phase structure — end-to-end delivery per phase"

  - from: doc-builder
    to: std-brief-principles
    type: governed_by

  - from: prepare-implementation
    to: std-brief-principles
    type: governed_by
    note: "Checkpoint review steps link to briefs/ directory"

  - from: tech-architect
    to: std-knowledge-file-template
    type: governed_by
    note: "1E-ltm-consultation reads LTM files conforming to this schema"

  - from: product-strategist
    to: std-templates-epic-schema
    type: governed_by
    note: "features.yaml conforms to epic schema template"

  # --- STM artifact flow edges (data dependencies) ---
  - from: tech-architect
    to: stm-architecture-inference
    type: produces
    task: 1A-architecture-inference

  - from: test-engineer
    to: stm-test-surface
    type: produces
    task: 1B-test-surface-mapping

  - from: tech-architect
    to: stm-dependency-graph
    type: produces
    task: 1C-dependency-graph

  - from: tech-architect
    to: stm-commit-history
    type: produces
    task: 1D-git-history

  - from: tech-architect
    to: stm-ltm-findings
    type: produces
    task: 1E-ltm-consultation

  - from: tech-architect
    to: stm-context-assembly
    type: produces
    task: context-assembly
    inputs: [stm-architecture-inference, stm-test-surface, stm-dependency-graph, stm-commit-history, stm-ltm-findings]

  - from: tech-architect
    to: stm-change-surface
    type: produces
    task: 2A-change-surface
    inputs: [stm-context-assembly, stm-dependency-graph, stm-commit-history, stm-ltm-findings]

  - from: test-engineer
    to: stm-blast-radius
    type: produces
    task: 2B-blast-radius
    inputs: [stm-test-surface, stm-change-surface, stm-dependency-graph]

  - from: test-engineer
    to: stm-baseline-tests
    type: produces
    task: 2C-baseline-tests
    inputs: [stm-blast-radius, stm-test-surface]

  - from: product-strategist
    to: stm-features
    type: produces
    task: 3-features
    inputs: [stm-context-assembly, stm-blast-radius]

  - from: tech-architect
    to: stm-tech
    type: produces
    task: 3-tech
    inputs: [stm-features, stm-change-surface, stm-architecture-inference, stm-dependency-graph, stm-context-assembly, stm-ltm-findings, stm-blast-radius]

  - from: test-engineer
    to: stm-scenarios
    type: produces
    task: 3-scenarios
    inputs: [stm-blast-radius, stm-baseline-tests, stm-features]

  - from: tech-architect
    to: stm-plan
    type: produces
    task: 3-plan
    inputs: [stm-tech, stm-features, stm-baseline-tests, stm-blast-radius, stm-scenarios]
    note: "Reads scenarios.yaml for IDs only — compartmentalized (C9)"

# --- coupling analysis ---
coupling_clusters:
  - cluster: "Phase 1 parallel (no coupling)"
    members: [1A-architecture-inference, 1B-test-surface-mapping, 1C-dependency-graph, 1D-git-history, 1E-ltm-consultation]
    description: "All five steps run independently. No data dependency between them. Fan-out from pre-flight."

  - cluster: "Context assembly convergence point"
    members: [context-assembly]
    description: "High fan-in node. Depends on all 5 Phase 1 outputs. Blocks all Phase 2 work via Checkpoint 0."
    risk: high
    note: "Any Phase 1 failure propagates here and blocks the entire pipeline"

  - cluster: "Blast radius gate"
    members: [stm-change-surface, stm-blast-radius, stm-baseline-tests]
    description: "Sequential chain within test-engineer + tech-architect. 2A → 2B → 2C. Blocks all Phase 3 via Checkpoint 1."
    risk: medium

  - cluster: "Phase 3 parallel (features + tech)"
    members: [3-features, 3-tech]
    description: "3-features (product-strategist) and the data it produces feeds into 3-tech (tech-architect). Actually sequential."
    risk: low

  - cluster: "Phase 3 parallel (scenarios + plan)"
    members: [3-scenarios, 3-plan]
    description: "Dispatched simultaneously after Checkpoint 3. 3-plan reads scenarios.yaml for IDs only — compartmentalization constraint."
    risk: medium
    note: "Compartmentalization is a coupling constraint: plan must not read scenario descriptions"

fan_in_hotspots:
  - node: stm-context-assembly
    imported_by_count: 3
    description: "Most-read intermediate artifact — consumed by change-surface, features, tech, plan"

  - node: stm-blast-radius
    imported_by_count: 3
    description: "Consumed by baseline-tests, features, tech, plan, scenarios — central to Phase 2+3"

  - node: stm-features
    imported_by_count: 3
    description: "Consumed by tech, scenarios, plan, validate — feeds all three Stage 3 and validation"

  - node: tech-architect
    task_count: 8
    description: "Dispatched most frequently — owns 8 of 13 total recipe tasks"
    risk: "Single agent bottleneck for architecture, dependency, tech, and plan artifacts"

  - node: std-agent-contract
    referenced_by_count: 6
    description: "Universal standard — governs every agent in the recipe"
