step_evals:
  - id: SE-1
    failure_condition_id: F1
    skill: analyze-changes
    check: Each change group produced by analyze-changes contains only files that share the same concern (same issue and compatible commit type).
    artifact_pattern: "analyze-changes output -> change_groups[].files"
    pass_criteria: Every file in a change group relates to the same issue and the same logical concern; no group mixes unrelated file sets.
    fail_criteria: A change group contains files that belong to different issues or address unrelated concerns (e.g., a bug fix file grouped with an unrelated feature file).

  - id: SE-2
    failure_condition_id: F1
    skill: create-commit
    check: Each commit created by create-commit stages only the files from a single change group.
    artifact_pattern: "git log --name-only for each commit hash"
    pass_criteria: The set of files in each commit exactly matches the file list of one change group; no commit contains files from multiple groups.
    fail_criteria: A commit includes files from more than one change group or files not present in any group.

  - id: SE-3
    failure_condition_id: F2
    skill: create-commit
    check: The commit message subject line describes the specific change made, not just a generic reference to the issue.
    artifact_pattern: "create-commit output -> commit.message"
    pass_criteria: The subject line after the conventional prefix contains a concrete description of what was changed (e.g., "feat(auth): add token refresh on session expiry (#42)") that distinguishes this commit from other commits on the same issue.
    fail_criteria: The subject line is generic or issue-reference-only (e.g., "fix: resolve issue #42" or "chore: update for #42") with no indication of what specifically changed.

  - id: SE-4
    failure_condition_id: F3
    skill: analyze-changes
    check: Every file reported by git status (staged, unstaged, untracked) appears in at least one change group in the analysis output.
    artifact_pattern: "analyze-changes output -> change_groups[].files vs. git status --porcelain"
    pass_criteria: The union of all files across all change groups equals the full set of changed files from git status; no file is missing.
    fail_criteria: One or more files from git status do not appear in any change group and no exclusion reason is stated.

  - id: SE-5
    failure_condition_id: F3
    skill: create-commit
    check: After all commits are created, no previously changed files remain uncommitted unless an explicit exclusion reason was provided.
    artifact_pattern: "git status --porcelain after final commit"
    pass_criteria: git status shows no remaining modified, staged, or untracked files that were present before the recipe ran, OR any remaining files have a documented exclusion reason.
    fail_criteria: git status shows files that were in the original changeset still uncommitted with no stated reason for exclusion.

  - id: SE-6
    failure_condition_id: F4
    skill: resolve-issues
    check: Each change group is mapped to the issue whose scope matches the files and description in that group.
    artifact_pattern: "resolve-issues output -> mappings[].issue_number and mappings[].reasoning"
    pass_criteria: The mapped issue's title, labels, or body semantically match the change group's scope, type, and file paths; the reasoning field explains the connection with at least two corroborating signals.
    fail_criteria: The mapped issue has no semantic overlap with the change group's content, or the reasoning does not substantiate the mapping.

  - id: SE-7
    failure_condition_id: F5
    skill: resolve-issues
    check: When multiple issues compete for the same change group with equal-strength signals, the conflict is explicitly flagged in the output.
    artifact_pattern: "resolve-issues output -> mappings[].conflicts"
    pass_criteria: Any group with two or more candidate issues of similar signal strength has a conflicts entry listing the competing issues and the reason for ambiguity.
    fail_criteria: A group with multiple competing issue matches is silently assigned to one issue without a conflict flag.

  - id: SE-8
    failure_condition_id: F6
    skill: resolve-issues
    check: Every mapping with confidence below high is flagged so that human approval can be obtained before a commit is created from that group.
    artifact_pattern: "resolve-issues output -> mappings[].confidence"
    pass_criteria: Each mapping with confidence of medium, low, or none has confidence explicitly set to a value below high, enabling the calling agent to gate on approval before proceeding.
    fail_criteria: A mapping with less than high confidence is marked as high, or confidence is omitted, preventing the approval gate from triggering.

scenario_evals:
  - id: SCE-1
    scenario_id: S1
    persona: Code reviewer
    artifact_pattern: "git log --oneline --no-walk for all commits created by the recipe"
    check: Each commit message conveys the scope and nature of the change without requiring the reviewer to read the diff, and includes a traceable issue reference.
    pass_criteria: Every commit in the log has a conventional commit subject with type, scope, and descriptive subject, plus an issue number reference (e.g., "(#42)" or "Issue: #42"); reading only the log is sufficient to understand what each commit does and which issue it belongs to.
    fail_criteria: Any commit lacks a type or scope, has a non-descriptive subject, or is missing an issue reference, requiring the reviewer to read the diff to understand the change.

  - id: SCE-2
    scenario_id: S2
    persona: Team lead
    artifact_pattern: "git log --oneline --no-walk for all commits created by the recipe, filtered by issue number"
    check: Commits can be grouped by issue number to report per-issue progress, and commit messages demonstrate consistent conventional commit format suitable as a mentoring reference.
    pass_criteria: Filtering the git log by issue number produces a coherent per-issue changelog; all commits use the same conventional commit structure (type(scope): subject) consistently, making the log usable as an example of good commit practices.
    fail_criteria: Commits for the same issue use inconsistent formats, or issue references are missing or wrong, making per-issue progress reporting impossible or the log unsuitable as a mentoring reference.
