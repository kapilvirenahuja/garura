step_evals:
  - id: SE-1
    failure_condition_id: F1
    skill: draft-product-vision
    check: >
      Vision artifact contains at least 3 strategic goals in the Strategic Goals
      section and at least 1 identifiable target audience in the Target Users section.
    artifact_pattern: ".meridian/project/product/{slug}/vision.md"
    pass_criteria: >
      The Strategic Goals section contains 3 or more distinct goal entries AND the
      Target Users section contains at least 1 persona with a role/title field.
    fail_criteria: >
      The Strategic Goals section contains fewer than 3 goal entries OR the Target
      Users section is empty or contains no persona with a role/title field.

  - id: SE-2
    failure_condition_id: F1
    skill: validate-product-vision
    check: >
      Validation checklist reports strategic_goals_defined as true and
      target_users_identified as true.
    artifact_pattern: "validation_result output from validate-product-vision"
    pass_criteria: >
      validation_result.checklist.strategic_goals_defined is true AND
      validation_result.checklist.target_users_identified is true.
    fail_criteria: >
      validation_result.checklist.strategic_goals_defined is false OR
      validation_result.checklist.target_users_identified is false.

  - id: SE-3
    failure_condition_id: F2
    skill: discover-product-opportunity
    check: >
      Market context output contains a non-null problem field and at least 2
      target user personas, confirming the product domain was resolvable.
    artifact_pattern: "market_context output from discover-product-opportunity"
    pass_criteria: >
      market_context.problem is a non-empty string AND
      market_context.target_users contains 2 or more entries.
    fail_criteria: >
      market_context.problem is null or empty OR market_context.target_users
      contains fewer than 2 entries OR skill returned a structured failure
      indicating the problem statement was too vague.

  - id: SE-4
    failure_condition_id: F3
    skill: draft-product-vision
    check: >
      After draft-product-vision completes, a vision.md file exists at the
      expected path in project-scoped product STM.
    artifact_pattern: ".meridian/project/product/{slug}/vision.md"
    pass_criteria: >
      The file at .meridian/project/product/{slug}/vision.md exists AND contains
      a non-empty document with Status: DRAFT in the header.
    fail_criteria: >
      No file exists at .meridian/project/product/{slug}/vision.md OR the file
      is empty.

  - id: SE-6
    failure_condition_id: F5
    skill: validate-product-vision
    check: >
      After validation, no blocker-severity issues remain in the validation
      result, or the iteration count has not exceeded 2.
    artifact_pattern: "validation_result output from validate-product-vision"
    pass_criteria: >
      validation_result.issues contains zero entries with severity "blocker"
      OR the current cycle-back iteration count is less than or equal to 2.
    fail_criteria: >
      validation_result.issues contains one or more entries with severity
      "blocker" AND the current cycle-back iteration count is greater than 2.

  - id: SE-7
    failure_condition_id: F6
    skill: validate-product-vision
    check: >
      The artifact path provided to validate-product-vision resolves to an
      existing file containing a valid vision document.
    artifact_pattern: ".meridian/project/product/{slug}/vision.md"
    pass_criteria: >
      The file at the provided vision_path exists AND contains a document with
      recognizable vision artifact structure (has Strategic Goals, Target Users,
      and Status fields).
    fail_criteria: >
      The file at the provided vision_path does not exist OR the skill returned
      a structured failure indicating the artifact was not found.

  - id: SE-8
    failure_condition_id: F7
    skill: draft-product-vision
    check: >
      draft-product-vision rejects overwriting a LOCKED vision and returns
      a structured failure instead of modifying the artifact.
    artifact_pattern: ".meridian/project/product/{slug}/vision.md"
    pass_criteria: >
      When vision.md has Status: LOCKED, the skill returns a structured failure
      containing "Vision is LOCKED" and does not modify the file.
    fail_criteria: >
      When vision.md has Status: LOCKED, the skill overwrites or modifies the
      file content instead of returning a structured failure.

  - id: SE-9
    failure_condition_id: F7
    skill: validate-product-vision
    check: >
      validate-product-vision rejects validating a LOCKED vision and returns
      a structured failure indicating no validation is needed.
    artifact_pattern: "validation_result output from validate-product-vision"
    pass_criteria: >
      When vision.md has Status: LOCKED, the skill returns a structured failure
      containing "Vision is already LOCKED" and does not produce a validation result.
    fail_criteria: >
      When vision.md has Status: LOCKED, the skill produces a normal validation
      result instead of returning a structured failure.

  - id: SE-11
    failure_condition_id: F9
    skill: generate-product-brief
    check: >
      A checkpoint artifact (HTML brief) exists at the expected output path
      before results are presented to the user.
    artifact_pattern: ".meridian/project/product/{slug}/*-brief.html"
    pass_criteria: >
      An HTML brief file exists at the output_path AND contains the feedback
      panel with section toggles for market_opportunity, product_vision, and
      business_analysis.
    fail_criteria: >
      No HTML brief file exists at the output_path OR the file exists but does
      not contain a feedback panel with section toggles.

scenario_evals:
  - id: SCE-1
    scenario_id: S1
    persona: "Founder / Product Manager"
    artifact_pattern: ".meridian/project/product/{slug}/*-brief.html"
    check: >
      The HTML brief presented at the checkpoint contains market opportunity
      data, target user personas, strategic goals, competitive positioning,
      and per-section approve/revise toggles enabling the Founder/PM to
      evaluate and provide structured feedback.
    pass_criteria: >
      The HTML brief contains all of: a market opportunity section with problem
      statement and competitor data, a product vision section with strategic
      goals, a business analysis section with plain-language summary, AND a
      feedback panel with toggles for each section and a freeform textarea.
    fail_criteria: >
      The HTML brief is missing any of: market opportunity section, product
      vision section, business analysis section, or the feedback panel with
      per-section toggles and freeform textarea.

  - id: SCE-2
    scenario_id: S2
    persona: "Engineering Lead"
    artifact_pattern: ".meridian/project/product/{slug}/vision.md"
    check: >
      The LOCKED vision artifact contains clearly defined strategic goals,
      target users with roles and goals, measurable success metrics, and
      competitive landscape — sufficient for deriving engineering milestones
      without ambiguity.
    pass_criteria: >
      The vision.md has Status: LOCKED AND contains: 3 or more strategic goals
      each with a clear statement, 2 or more target user personas with role
      and goal fields, success metrics with quantifiable indicators, AND a
      competitive landscape section with named competitors.
    fail_criteria: >
      The vision.md does not have Status: LOCKED OR is missing any of: 3
      strategic goals, 2 target user personas, quantifiable success metrics,
      or named competitors in the competitive landscape.

  - id: SCE-3
    scenario_id: S3
    persona: "Product Manager"
    artifact_pattern: "validation_result output from validate-product-vision"
    check: >
      The validation result contains a completeness score, a checklist with
      pass/fail status for each section, and issues classified by severity —
      enabling the PM to determine lock-readiness or identify specific
      sections needing improvement.
    pass_criteria: >
      The validation_result contains: completeness_score as a number 0-100,
      ready_for_lock as a boolean, checklist with all 5 fields
      (strategic_goals_defined, target_users_identified,
      success_metrics_measurable, competitive_landscape_covered,
      assumptions_listed) each as boolean, AND issues as a list where each
      entry has message, field, and severity fields.
    fail_criteria: >
      The validation_result is missing any of: completeness_score,
      ready_for_lock, any of the 5 checklist fields, OR the issues list
      does not classify entries by severity (blocker/warning/suggestion).
