eval_type: scenario
recipe: merge-pr
intent_path: core/components/recipes/merge-pr/reference/intent.yaml

evals:
  - id: scenario-1
    scenario_id: S1
    persona: Developer
    name: ready-for-next-feature
    check: >
      After merge-pr completes, verify the developer's terminal state:
      1. git branch --show-current returns the base branch (e.g., main)
      2. git status shows branch is up to date with remote
      3. git branch --list {feature-branch} returns empty
      4. git branch -r --list origin/{feature-branch} returns empty (or was auto-deleted)
    pass_criteria: >
      All four conditions are true. The developer can immediately run
      git checkout -b feature/next without any cleanup.

  - id: scenario-2
    scenario_id: S2
    persona: Code Reviewer
    name: merged-pr-visible
    check: >
      After merge-pr completes, verify the platform state:
      1. gh pr view {pr_number} --json state shows "MERGED"
      2. git log main contains the merge commit
    pass_criteria: >
      PR state is MERGED on the platform and the merge commit is
      reachable from the base branch history.
