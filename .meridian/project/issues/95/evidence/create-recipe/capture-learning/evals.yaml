# capture-learning recipe evals
# Generated from: core/components/recipes/capture-learning/reference/intent.yaml
# Scope: ACTIVE constraints (C1-C4), failure conditions (F1-F5), scenarios (S1-S2) only
# PENDING items (C5-C10, F6-F9, S3-S4) are excluded — extraction skills do not exist yet

step_evals:

  - id: SE-1
    failure_condition_id: F1
    skill: archive-issue-stm
    check: >
      After archive-issue-stm completes, verify the archive directory exists
      at _archive/{YYYY-MM}/{issue}/ and contains at least one file.
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue_number}/"
    pass_criteria: >
      The directory _archive/{YYYY-MM}/{issue_number}/ exists and contains
      one or more files or subdirectories.
    fail_criteria: >
      The directory _archive/{YYYY-MM}/{issue_number}/ does not exist, or
      exists but is empty (zero files and zero subdirectories).

  - id: SE-2
    failure_condition_id: F2
    skill: archive-issue-stm
    check: >
      After archive-issue-stm completes, verify the original STM directory
      at {stm_base}/{issue_number}/ no longer exists.
    artifact_pattern: "{stm_base}/{issue_number}/"
    pass_criteria: >
      The directory {stm_base}/{issue_number}/ does not exist — the path
      returns "not found" when listed.
    fail_criteria: >
      The directory {stm_base}/{issue_number}/ still exists at the active
      workspace location (even if empty).

  - id: SE-3
    failure_condition_id: F3
    skill: archive-issue-stm
    check: >
      After archive-issue-stm completes, compare the file count and
      directory structure of the archive against the original STM directory
      contents. Every file and subdirectory that existed in the source must
      exist in the archive.
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue_number}/"
    pass_criteria: >
      The archive directory contains the same number of files and the same
      directory structure as the original STM directory. No files or
      subdirectories are missing.
    fail_criteria: >
      The archive directory has fewer files than the original, or one or
      more subdirectories present in the original are absent from the
      archive.

  - id: SE-4
    failure_condition_id: F4
    skill: archive-issue-stm
    check: >
      After archive-issue-stm completes, verify the {YYYY-MM} segment in
      the archive path matches the issue's closedAt date from GitHub.
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue_number}/"
    pass_criteria: >
      The {YYYY-MM} directory name matches the year and month extracted
      from the issue's closedAt timestamp returned by the GitHub API.
    fail_criteria: >
      The {YYYY-MM} directory name does not match the issue's closedAt
      date — e.g., uses current date, creation date, or an arbitrary value.

  - id: SE-5
    failure_condition_id: F5
    skill: manage-issue
    check: >
      Before archival proceeds, verify the issue's state is "closed" by
      reading the issue via manage-issue. If the state is not "closed",
      the recipe must not invoke archive-issue-stm.
    artifact_pattern: "manage-issue output for issue {issue_number}"
    pass_criteria: >
      The manage-issue read output shows state as "CLOSED" and the recipe
      only proceeds to archival after confirming this state.
    fail_criteria: >
      The recipe invokes archive-issue-stm for an issue whose state is
      "OPEN" or "IN_PROGRESS" as reported by manage-issue.

scenario_evals:

  - id: SCE-1
    scenario_id: S1
    persona: "Engineering lead reviewing agent-produced work"
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue_number}/"
    check: >
      Given the archived STM directory, verify the engineering lead can
      review the complete history of how the issue was worked — evidences,
      checkpoints, analysis, and delivery artifacts are all present — and
      confirm nothing was lost during archival.
    pass_criteria: >
      The archived directory is browsable, preserves the original directory
      structure, contains all files that existed in the source STM directory
      (evidence, checkpoint, planning, spec, design, delivery subdirectories
      and their contents), and no files were renamed or modified during the
      move.
    fail_criteria: >
      The archived directory is missing files or subdirectories that existed
      in the original STM, or files were renamed, modified, or restructured
      during the move, preventing a complete audit of the issue's history.

  - id: SCE-2
    scenario_id: S2
    persona: "Developer starting the next feature"
    artifact_pattern: "{stm_base}/"
    check: >
      After capture-learning completes, verify the completed issue's
      directory is no longer present in the active STM workspace, reducing
      noise when navigating current work.
    pass_criteria: >
      The active STM workspace at {stm_base}/ does not contain a directory
      for the archived issue number. Listing the workspace shows only
      directories for currently active issues.
    fail_criteria: >
      The active STM workspace at {stm_base}/ still contains a directory
      for the archived issue number, cluttering the workspace alongside
      active issues.
