# capture-learning recipe evals
# Generated from: core/components/recipes/capture-learning/reference/intent.yaml
# Note: extraction skills (extract-knowledge, promote-knowledge) do not exist yet.
#       Extraction step evals are placeholders — they will be skipped until skills are built.
#       Archival step evals are active — archive-issue-stm skill exists and works.

step_evals:

  # --- Extraction (placeholder — skills not yet built) ---

  - id: step-eval-1
    skill: extract-knowledge
    stage: 2
    status: placeholder
    validates: [F1, F4, C4]
    check: >
      After extract-knowledge runs, verify each draft knowledge artifact contains:
      (a) identity metadata (tier 1) — at minimum the fields that uniquely identify
      the knowledge pattern (e.g., name, domain, type);
      (b) profile metadata (tier 2) — structured schema fields providing richer
      context (e.g., applicability criteria, trade-offs, related patterns);
      (c) at least one search pattern or applicability criterion that would allow
      an agent or human to discover this artifact via taxonomy search.
      Artifacts missing any of (a), (b), or (c) are failed output per F1 and F4.

  - id: step-eval-2
    skill: promote-knowledge
    stage: 3
    status: placeholder
    validates: [C3, F2]
    check: >
      After promote-knowledge runs, verify:
      (a) No new knowledge artifact was created for a pattern already covered by
      an existing artifact in the knowledge base — search the knowledge base for
      overlapping names, domains, and search patterns before accepting a new file;
      (b) Where an existing artifact covers the same pattern, confirm it was updated
      in-place rather than duplicated — diff the artifact before and after to verify
      the update merged new content into the existing structure;
      (c) If consolidation removed redundant content, confirm the resulting artifact
      still satisfies step-eval-1 checks (identity, profile, search patterns intact).

  # --- Archival (active — archive-issue-stm skill exists) ---

  - id: step-eval-3
    skill: archive-issue-stm
    stage: 4
    status: active
    validates: [C7]
    check: >
      After archive-issue-stm runs, verify:
      (a) The archived directory exists at _archive/{YYYY-MM}/{issue}/ where YYYY-MM
      is derived from the issue close date (not the current date, not the creation
      date — the close date);
      (b) The archived directory contains the complete contents of the original STM
      directory — file count and structure match;
      (c) The original STM directory at the active workspace path has been removed
      (not just emptied — the directory itself must not exist);
      (d) No files were modified, renamed, or filtered during the move — the archive
      is a faithful copy of what existed in the active STM directory.

scenario_evals:

  - id: scenario-eval-1
    scenario: S1
    persona: "Agent (tech-designer or code-builder) in a future project"
    validates: [C4, C6, F1]
    check: >
      Given the long-term memory knowledge base containing promoted artifacts,
      an agent must be able to discover relevant knowledge by:
      (a) Searching for patterns using taxonomy fields (domain, type, search patterns)
      and receiving matching artifacts;
      (b) Matching project context (e.g., "building an intent-driven recipe system")
      against applicability criteria in artifacts and finding relevant prior patterns;
      (c) Applying discovered patterns to accelerate decisions without re-discovering
      known solutions — the artifact content must be actionable, not just descriptive.
      Passing criteria: at least one artifact is discoverable via taxonomy search for
      a context that matches the source issue's domain, and the artifact contains
      enough detail to inform a design decision.

  - id: scenario-eval-2
    scenario: S2
    persona: "Developer starting a new project"
    validates: [C5, C6]
    check: >
      Given the long-term memory knowledge base searchable via tools, a developer
      must be able to:
      (a) Find holistic patterns organized by interconnected decisions — not siloed
      by individual technology, language, or framework;
      (b) Understand not just what was built but why — the artifact must capture
      rationale, trade-offs, and the decision context that led to the pattern;
      (c) Navigate from one pattern to related patterns through taxonomy and metadata
      without needing to know the source issue or STM artifacts.
      Passing criteria: knowledge artifacts reference cross-cutting concerns (e.g.,
      a pattern that spans architecture + implementation + testing), and the "why"
      is explicitly documented alongside the "what." No traceability links to source
      issues exist (C5).

  - id: scenario-eval-3
    scenario: S3
    persona: "Engineering lead reviewing agent-produced work"
    validates: [C7]
    check: >
      Given the archived STM directory at _archive/{YYYY-MM}/{issue}/, an
      engineering lead must be able to:
      (a) Review the complete history of how the issue was worked — evidences,
      checkpoints, analysis artifacts, and delivery outputs are all present;
      (b) Reconstruct the sequence of work from the archived artifacts — the archive
      preserves directory structure and file timestamps;
      (c) Build trust in agent-produced outcomes by verifying that each stage of work
      (design, implementation, testing, delivery) produced observable evidence.
      Passing criteria: the archived directory is browsable, contains all original
      STM artifacts with preserved structure, and an auditor can identify what was
      done at each stage without external context.
