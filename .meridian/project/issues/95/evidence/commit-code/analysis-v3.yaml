branch:
  name: feature/95-intent-driven-recipe-architecture
  issue: 95
  is_hotfix: false

change_summary:
  total_files: 13
  staged: 0
  unstaged: 6
  untracked: 7

groups:
  - id: G1
    issue: 95
    type: refactor
    scope: create-pr
    subject: "refactor create-pr recipe and submit-pr skill to JSON contract + multi-platform architecture"
    confidence: high
    rationale: >
      All modified and deleted files belong to the create-pr recipe and submit-pr skill refactor.
      The branch signal (feature/95-intent-driven-recipe-architecture) confirms issue #95.
      The dominant change type is refactoring: existing recipe and skill are restructured to use
      JSON contracts, multi-platform dispatch, intent-resolver agent, and STM data flow.
      No new capability is introduced — the pattern of how create-pr operates is redesigned.
      Deleted template files (approval-prompt.md, checkpoint.md, final-report.md) are removed
      as part of the refactor. New platform reference files (bitbucket/pr.md, gitlab/pr.md) are
      feature additions but are part of the same refactor effort for the same issue.
      Type is refactor (dominant) with embedded feat signals (multi-platform support) —
      kept as one group per issue-first grouping rules.
    files:
      - path: "core/components/recipes/create-pr/SKILL.md"
        status: modified
        description: >
          Refactored recipe to use JSON contract dispatch pattern, fixed stages (0-7),
          intent-resolver agent, STM data flow rules, two eval levels, DAG caching/resumption.
          Removed in-memory prose-based agent invocation in favour of structured JSON contracts.
      - path: "core/components/recipes/create-pr/reference/intent.yaml"
        status: modified
        description: >
          Replaced pre_flight/behavioral split with flat constraint list (C1-C7) and
          structured failure_conditions (F1-F5) with IDs. Added acceptance scenarios (S1-S2).
      - path: "core/components/recipes/create-pr/templates/approval-prompt.md"
        status: deleted
        description: Template removed as part of refactor — approval now handled inline via STM confidence gate.
      - path: "core/components/recipes/create-pr/templates/checkpoint.md"
        status: deleted
        description: Template removed — checkpoint artifacts written directly to STM paths.
      - path: "core/components/recipes/create-pr/templates/final-report.md"
        status: deleted
        description: Template removed — reporting handled inline post-generation.
      - path: "core/components/skills/submit-pr/SKILL.md"
        status: modified
        description: >
          Added multi-platform dispatch (read platform from config, load reference/{platform}/pr.md).
          Added eval_results input field. Removed hardcoded gh commands. Updated version to 2.0.0.
          Removed model/allowed-tools from frontmatter.
      - path: "core/components/skills/submit-pr/reference/bitbucket/pr.md"
        status: untracked
        description: New platform reference file — Bitbucket CLI (bb) commands for PR operations.
      - path: "core/components/skills/submit-pr/reference/gitlab/pr.md"
        status: untracked
        description: New platform reference file — GitLab CLI (glab) commands for PR operations.

  - id: G2
    issue: 95
    type: chore
    scope: stm
    subject: "record STM evidence and working artifacts for issue #95"
    confidence: high
    rationale: >
      STM files under .meridian/95/ and .meridian/recipe-creation/create-pr/ are operational
      artifacts — evidence, DAG, evals, and design files — not part of the feature code itself.
      Per issue-first grouping rules, STM artifacts that are operational (not part of the feature)
      are the one valid exception case to split within a single issue. These are chore(stm) commits.
    files:
      - path: ".meridian/95/evidence/commit-code/"
        status: untracked
        description: Prior commit-code evidence files (analysis.yaml, commits.yaml, open-issues.yaml + v2 variants, one .md checkpoint).
      - path: ".meridian/95/evidence/start-feature/"
        status: untracked
        description: start-feature evidence file (20260305-220000.md).
      - path: ".meridian/95/checkpoint/"
        status: untracked
        description: Checkpoint artifacts directory for issue #95.
      - path: ".meridian/95/dag/"
        status: untracked
        description: DAG artifacts directory for issue #95.
      - path: ".meridian/95/design/"
        status: untracked
        description: Design artifacts directory for issue #95.
      - path: ".meridian/95/spec/"
        status: untracked
        description: Spec artifacts directory for issue #95.
      - path: ".meridian/95/delivery/"
        status: untracked
        description: Delivery artifacts directory for issue #95.
      - path: ".meridian/recipe-creation/create-pr/"
        status: untracked
        description: >
          Recipe creation working files: agent-audit-project-orchestrator.md,
          agent-audit-repo-orchestrator.md, dag.json, scenario-evals.yaml,
          skill-manifest.yaml, step-evals-analyze-pr.yaml, step-evals-submit-pr.yaml.

risks:
  sensitive_files: []
  breaking_changes:
    - description: >
        submit-pr SKILL.md: removed `model: haiku` and `allowed-tools: Bash, Read` from frontmatter.
        Callers that relied on these fields for model routing may need to update.
      files:
        - "core/components/skills/submit-pr/SKILL.md"
      severity: low
      note: These are skill-level metadata fields, not exported APIs. Impact is limited to the framework deployer.
    - description: >
        create-pr intent.yaml: constraint IDs changed (pre_flight.C1-C4 + behavioral.C5-C9 → flat C1-C7).
        Any external tooling or agent that references constraint IDs by the old scheme will need updating.
      files:
        - "core/components/recipes/create-pr/reference/intent.yaml"
      severity: low
      note: ID scheme is internal to the recipe. No external callers known.
    - description: >
        Three template files deleted: approval-prompt.md, checkpoint.md, final-report.md.
        Any reference to these paths from external tooling or documentation will be broken.
      files:
        - "core/components/recipes/create-pr/templates/approval-prompt.md"
        - "core/components/recipes/create-pr/templates/checkpoint.md"
        - "core/components/recipes/create-pr/templates/final-report.md"
      severity: medium
      note: Internal to the recipe. No evidence of external references detected.
  ambiguous_types: []
  hotfix_branch: false

