type: rca

summary: >
  The check-drift skill was authored before the epic trinity plays (prepare-epic → implement-epic
  → validate-epic) and before ADR 017 replaced the flat product LTM structure. All 5 of its spec
  source paths (discovery/product.yaml, architecture/architecture.yaml,
  architecture/quality-standards.yaml, roadmap/epics.yaml, roadmap/features.yaml) point to files
  that no longer exist after ADR 017. Compounding this, the play was never compiled — intent.yaml
  exists with 12 constraints but no SKILL.md was ever produced from it, so those constraints are
  never enforced at runtime. The skill's "Does not modify any files" invariant, stated as a
  feature, is the third compounding failure: it explicitly prevents the spec write-back that is
  check-drift's primary post-epic-trinity value.

root_cause: >
  The skill was written in an early product pipeline era when specs lived at flat paths relative
  to .meridian/product/ (discovery/product.yaml, architecture/architecture.yaml,
  roadmap/epics.yaml). ADR 017 completely replaced this with a stage-based layout
  (.meridian/product/specification/, scope/, architecture/, experience/, research/). Every single
  spec source path check-drift uses resolves to a file that no longer exists. This is not a
  documentation gap or a minor path correction — the skill's ENTIRE "what was specified" input
  chain is broken. Even if the code ran perfectly, it would have nothing to compare against
  because every spec file it tries to read is absent. The root cause is architectural
  abandonment: the skill was not updated when the product pipeline architecture changed.
  Specifically, in core/components/skills/check-drift/SKILL.md, the "### From .meridian/product/
  (specs)" section under "## Inputs" lists exactly 5 paths that all resolve to non-existent files
  post-ADR 017.

contributing_causes:
  - id: CC1
    cause: No play compilation — intent.yaml authored but SKILL.md never produced
    detail: >
      core/components/plays/check-drift/reference/intent.yaml exists with 12 constraints (C1-C12)
      and 10 failure conditions (F1-F10) defining the correct post-trinity behavior. However,
      core/components/plays/check-drift/SKILL.md does not exist — the play was never compiled
      from the intent. The model invokes skills/check-drift/SKILL.md directly, bypassing all
      play-level constraints and evals. The guard rails were designed but never activated.
      Every other mature play in the system (prepare-epic, implement-epic, validate-epic,
      fix-it) has both reference/intent.yaml AND a compiled SKILL.md. check-drift is the
      only play with the intent artifact but not the compiled artifact.

  - id: CC2
    cause: Read-only design stated as a feature, making write-back architecturally forbidden
    detail: >
      skills/check-drift/SKILL.md, in "## What This Skill Does NOT Do", explicitly states:
      "Does not modify any files (read-only analysis)". This was a reasonable design before
      the epic trinity existed — check-drift was a standalone analysis tool producing reports
      for a human to act on. Post-trinity, the primary value of check-drift is the feedback
      loop: consuming what was actually built (epic trinity evidence) and writing spec
      corrections, new ADRs, and learnings back to product LTM. The invariant became a
      structural blocker because it was treated as a design principle rather than a
      situational constraint that should evolve with the system.

  - id: CC3
    cause: No awareness of epic trinity locked design artifacts as the primary spec source
    detail: >
      The skill reads CONTEXT.md and evidence/implement-epic/ from STM, but has no awareness
      of the locked design artifacts that are the authoritative "what was specified" source
      post-trinity: {stm_base}/{issue}/context/design/tech.yaml (locked LLD with all interface
      contracts), scenarios.yaml (locked 3-tier scenarios), plan.yaml (locked task DAG),
      epic-spec.yaml (scoped epic spec), architecture-context.yaml (scoped architecture),
      nor the arbiter verdicts from implement-epic (spec_ambiguous verdicts are direct signals
      of spec gaps), nor the milestone-verdict.yaml files from validate-epic. The tech.yaml
      alone contains more authoritative "what was specified" information than all 5 broken
      product spec paths combined — and it's completely absent from the skill's input list.

  - id: CC4
    cause: Memory item LTM path targets component source instead of deployed memory
    detail: >
      In templates.md, the MEM template specifies:
        LTM path: core/components/memory/knowledge/[category]/[filename].md
      This is the source path in the repository, not the deployed LTM path that agents read
      from. The deployed global LTM lives at ~/.meridian/core/memory/ and project LTM at
      .meridian/core/memory/. Memory items promoted to "core/components/memory/" would need
      to be re-synced via /sync-droids or /sync-claude before agents could read them.
      The template directs writers to the wrong path, so memory items from check-drift would
      never be visible to downstream agents without a manual sync step.

  - id: CC5
    cause: Drift categories too coarse — missing design-drift and evidence-drift
    detail: >
      The skill defines 3 drift types: context-drift, spec-drift, technology-drift. These
      were sufficient when the only "spec" inputs were the product LTM files. With the epic
      trinity, two new drift categories are needed: (1) design-drift — where what was locked
      in tech.yaml/scenarios.yaml/plan.yaml diverges from what was built (this is different
      from spec-drift, which targets the upstream product spec — design-drift targets the
      issue-scoped locked design artifacts); (2) evidence-drift — where arbiter returns
      spec_ambiguous or milestone-verdict shows REJECT for reasons traceable to spec
      ambiguity. Without these categories, check-drift cannot surface the most actionable
      feedback: that the locked design itself needs updating.

analysis:
  affected_files:
    - path: core/components/skills/check-drift/SKILL.md
      role: Model-invocable skill that runs the actual drift analysis
      change_needed: >
        Fix all 5 broken spec source paths to ADR 017 paths. Add epic trinity artifact inputs
        (tech.yaml, scenarios.yaml, plan.yaml, epic-spec.yaml, arbiter-verdicts,
        milestone-verdicts) as primary spec sources. Remove read-only constraint. Add write-back
        step for spec corrections (spec-correction-manifest.yaml) and new ADRs. Add 5th step
        for spec_ambiguous arbiter verdict consumption. Update drift categories to 5 types.

    - path: core/components/skills/check-drift/references/templates.md
      role: Output templates for all drift analysis artifacts
      change_needed: >
        Fix MEM template LTM path from "core/components/memory/knowledge/" to
        "~/.meridian/core/memory/knowledge/". Add design-drift template. Add evidence-drift
        template. Add spec-correction-manifest template.

    - path: core/components/plays/check-drift/reference/intent.yaml
      role: Play intent definition — constraints, failure conditions, scenarios
      change_needed: >
        Update C2 (read-only) to allow additive write-back. Add constraints for epic trinity
        artifact awareness (when locked design artifacts exist, they are the primary spec
        source), arbiter spec_ambiguous consumption, product LTM write-back (additive only —
        never overwrite locked files), and 5-category drift classification. Add failure
        conditions for: skipping locked design artifacts when they exist, omitting
        spec-correction-manifest, and wrong LTM path in memory items. Update scenarios.

    - path: core/components/plays/check-drift/SKILL.md
      role: Compiled play executable — DOES NOT EXIST, must be created
      change_needed: >
        Create by compiling from reference/intent.yaml via /create-play --build check-drift.
        This is the canonical play entry point. Without it, the play's constraints and evals
        from intent.yaml are never enforced. This file should follow the same compiled-from
        metadata pattern as prepare-epic, implement-epic, and validate-epic.

  dependencies:
    - from: core/components/plays/check-drift/SKILL.md
      to: core/components/plays/check-drift/reference/intent.yaml
      type: compiled-from
      note: SKILL.md is the compiled artifact of intent.yaml — must be produced via /create-play --build

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/product/specification/quality-profile.yaml
      type: reads
      note: ADR 017 replacement for architecture/quality-standards.yaml

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/product/scope/epics/{epic_id}.yaml
      type: reads
      note: ADR 017 replacement for roadmap/epics.yaml

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/product/architecture/logical-architecture.yaml
      type: reads
      note: ADR 017 replacement for architecture/architecture.yaml (split into 5 files)

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/project/issues/{issue}/context/design/tech.yaml
      type: reads-MISSING
      note: Locked LLD from prepare-epic — currently absent from inputs, is the primary spec source

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/project/issues/{issue}/context/design/scenarios.yaml
      type: reads-MISSING
      note: Locked 3-tier scenarios from prepare-epic — currently absent

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/project/issues/{issue}/context/design/plan.yaml
      type: reads-MISSING
      note: Locked task DAG from prepare-epic — currently absent

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/project/issues/{issue}/evidence/implement-epic/{milestone}/arbiter-verdict-*.yaml
      type: reads-MISSING
      note: spec_ambiguous verdicts are direct spec gap signals — currently absent

    - from: core/components/skills/check-drift/SKILL.md
      to: .meridian/project/issues/{issue}/milestones/{milestone}/milestone-verdict.yaml
      type: reads-MISSING
      note: QA verdicts from validate-epic — currently absent

  risks:
    - risk: >
        Fixing SKILL.md without recompiling the play leaves constraints from intent.yaml
        still unenforced — two diverged artifacts describing the same skill
      mitigation: >
        Update intent.yaml first, then compile via /create-play --build check-drift. The
        compiled SKILL.md becomes the canonical play entry point. Skills/check-drift/SKILL.md
        is retained as the model-invocable version for direct invocation.
      severity: high

    - risk: >
        Write-back to product LTM — if spec-correction-manifest is applied incorrectly,
        it could corrupt locked architecture artifacts
      mitigation: >
        Write-back is strictly additive: (1) spec-correction-manifest.yaml is a new evidence
        file listing proposed corrections — human applies them manually; (2) new ADRs are
        written to {product_base}architecture/ as new adr-{ID}.md files, never overwriting
        existing locked files; (3) debt items are written to {product_base}_evidence/ as
        new files. No locked file is ever modified in-place.
      severity: high

    - risk: >
        Adding 2 new drift categories (design-drift, evidence-drift) changes the output
        schema — downstream aggregation tooling that parses drift reports could break
      mitigation: >
        New categories are additive — they extend the existing 3 types, not replace them.
        Existing DRIFT-xxx IDs retain their categorization. Aggregation tooling uses
        category as a filter field. Adding new valid values to the category enum is backward
        compatible with any tooling that filters by known categories.
      severity: medium

    - risk: >
        Compiling check-drift play via /create-play --build may not correctly handle
        the new constraints if create-play itself has limitations
      mitigation: >
        The other 4 compiled plays (prepare-epic, implement-epic, validate-epic, fix-it)
        demonstrate the pattern works. The code-builder can author SKILL.md directly from
        intent.yaml following the same compiled-from metadata pattern if /create-play is
        not available during the fix.
      severity: low

  patterns_found:
    - pattern: intent.yaml → /create-play --build workflow
      location: >
        core/components/plays/prepare-epic/SKILL.md (## Compiled From section),
        core/components/plays/implement-epic/SKILL.md,
        core/components/plays/validate-epic/SKILL.md,
        core/components/plays/fix-it/SKILL.md
      reuse: >
        Update intent.yaml with new constraints, compile via /create-play --build check-drift.
        Never edit the compiled SKILL.md directly. Post-fix, any future changes go through
        the intent.yaml → compile pipeline.

    - pattern: ADR 017 path resolution from config.yaml
      location: core/components/plays/prepare-epic/SKILL.md (pre-flight section)
      reuse: >
        Resolve product_base and stm_base using grep on .meridian/core/config.yaml.
        Use product.base-path for product LTM. Use stm.base-path for issue STM.
        Never hardcode .meridian/product/ or .meridian/project/issues/.

    - pattern: Additive write-back via manifest file (not direct modification)
      location: >
        Not yet in codebase — this is the new pattern check-drift needs to establish.
        The closest analog is how implement-epic produces spec-referenced status reports
        (information flows through structured artifacts, never direct modification).
      reuse: >
        Produce spec-correction-manifest.yaml as a structured list of proposed corrections.
        Human reviews and applies. Ensures no locked artifact is modified autonomously.

estimated_scope:
  files_touched: 4
  complexity: medium
  note: >
    The complexity is medium, not high, because the core analysis structure (scope resolution,
    gather inputs, 7-step process, 5 output files) is correct and preserved. The changes are:
    path corrections (mechanical), new input section (additive), new step 7 (additive),
    2 new drift categories (additive), and 1 new compiled artifact (creation, not modification).
    No existing logic is inverted or replaced — only extended and corrected.
