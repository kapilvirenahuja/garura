type: fix_design

summary: >
  Fix check-drift in 4 sequential steps: (1) update intent.yaml with new constraints for epic
  trinity awareness, spec_ambiguous consumption, additive write-back, and 5 drift categories;
  (2) compile SKILL.md for the play (currently missing) from the updated intent; (3) update
  skills/check-drift/SKILL.md to fix all 5 broken paths, add epic trinity inputs, add write-back
  step, and update drift categories; (4) update templates.md with correct LTM path and 2 new
  drift type templates. The 7-step analysis process, 5 core output files, and summary
  presentation are preserved — changes are additive and corrective, not structural inversions.

approach:
  strategy: >
    Fix-in-place via the intent.yaml → /create-play --build pipeline. Four changes in dependency
    order: intent first (constraints define the target), then compile play SKILL.md (enforces
    constraints), then update skill SKILL.md (the runtime artifact), then update templates
    (the output schema). This order ensures intent precedes implementation — the same principle
    the epic trinity itself follows (prepare-epic produces locked design artifacts before
    implement-epic runs). The fix does not change the workflow structure (steps, agents,
    output artifact names) — it corrects the broken inputs and adds the missing write-back.

  alternatives_considered:
    - approach: Create check-drift-v2 as a new skill/play and deprecate the existing one
      reason_rejected: >
        The skill has the right discovery triggers, the right name, and a well-structured
        intent.yaml. Creating a new skill would require updating all caller references, adding
        a deprecation redirect, and creating parallel discovery trigger confusion. The only
        valid reason to create a new skill is when the interface contract changes incompatibly
        — here all changes are additive (new inputs, new step, new categories) or corrective
        (path fixes). Fix-in-place respects the existing compiled-from chain and avoids
        introducing a naming discontinuity.

    - approach: Minimal patch — fix only the 5 broken spec source paths in SKILL.md
      reason_rejected: >
        A path-only fix would restore the ability to read product specs, but check-drift would
        still: (1) miss the epic trinity locked design artifacts that are the most authoritative
        "what was specified" source; (2) produce no write-back to product LTM, making every run
        a dead-end analysis; (3) remain uncompiled as a play, so intent.yaml constraints are
        still unenforced; (4) use the wrong LTM path in templates, so memory items from any
        run would target a path agents don't read from. The minimal patch fixes one symptom
        (broken paths) while leaving the three structural problems intact.

steps:
  - id: S1
    description: >
      Update core/components/plays/check-drift/reference/intent.yaml with new constraints
      for epic trinity artifact awareness, write-back, arbiter verdict consumption, and 5
      drift categories
    files:
      - path: core/components/plays/check-drift/reference/intent.yaml
        action: modify
        details: |
          CONSTRAINTS TO ADD:

          - id: C13
            rule: >
              When locked design artifacts from prepare-epic exist at
              {stm_base}/{issue}/context/design/ (tech.yaml, scenarios.yaml, plan.yaml,
              epic-spec.yaml, architecture-context.yaml), they are the PRIMARY "what was
              specified" source. Product-level specs (specification/, scope/, architecture/)
              are the SECONDARY source. Analysis that ignores locked design artifacts when
              they exist is a failure (F11).

          - id: C14
            rule: >
              All arbiter verdicts at {stm_base}/{issue}/evidence/implement-epic/
              {milestone}/arbiter-verdict-*.yaml must be consumed. Every verdict with
              verdict: spec_ambiguous maps to an evidence-drift item — the spec contract
              was too ambiguous to determine if the implementation was correct or not.
              This is a direct spec gap signal.

          - id: C15
            rule: >
              Analysis must produce spec-correction-manifest.yaml at the output path.
              The manifest contains proposed corrections to locked design artifacts and
              product-level specs as structured entries (artifact path, section, proposed
              change). No locked artifact is modified in-place — the manifest is a
              human-reviewed proposal. New ADR files for design-drift items representing
              deliberate decisions are written additively to {product_base}architecture/
              as new files, never overwriting existing ADRs.

          - id: C16
            rule: >
              Drift items must use exactly 5 categories: context-drift, spec-drift,
              technology-drift, design-drift (tech.yaml/scenarios.yaml/plan.yaml vs
              implementation), evidence-drift (arbiter spec_ambiguous, milestone REJECT
              tracing to spec gap). No other categories are valid. Any item that cannot
              be classified under these 5 types must be escalated as an uncategorized
              item requiring product decision.

          FAILURE CONDITIONS TO ADD:

          - id: F11
            condition: >
              Analysis was performed without reading locked design artifacts when they
              exist at {stm_base}/{issue}/context/design/. The "what was specified"
              column of drift items references only product-level specs when issue-scoped
              locked design artifacts (tech.yaml, scenarios.yaml, plan.yaml) were
              available and not consulted.

          - id: F12
            condition: >
              spec-correction-manifest.yaml is absent from the output directory after
              analysis completes, regardless of whether any spec corrections were
              identified. Even when no corrections are needed, the manifest must exist
              with an empty items list and documented justification.

          - id: F13
            condition: >
              Arbiter verdict files exist at the implement-epic evidence path but were
              not consumed during analysis. spec_ambiguous verdicts that were not
              translated into evidence-drift items represent missed spec gap signals.

          UPDATE C2: Change "The process writes only analysis artifacts and briefs.
          No source code, design specifications, or files outside the analysis output
          area are modified." TO:
          "The process writes analysis artifacts, briefs, and a spec-correction-manifest
          to the output area. New ADR files for deliberate design-drift decisions are
          written additively to {product_base}architecture/ — never overwriting or
          modifying existing locked files. Source code is never modified."

          UPDATE C12: Change "context-drift, spec-drift, technology-drift" to
          "context-drift, spec-drift, technology-drift, design-drift, evidence-drift"

    expected_outcome: >
      intent.yaml has new constraints C13-C16, new failure conditions F11-F13, updated C2
      allowing additive write-back, and updated C12 with 5 drift categories.
    self_test: >
      Read intent.yaml and verify: (1) constraints C13, C14, C15, C16 exist with non-empty
      rule text; (2) failure conditions F11, F12, F13 exist; (3) C2 no longer says
      "no files outside analysis output area are modified"; (4) C12 lists 5 categories.

  - id: S2
    description: >
      Create core/components/plays/check-drift/SKILL.md by compiling from updated intent.yaml
    files:
      - path: core/components/plays/check-drift/SKILL.md
        action: create
        details: |
          Compile via: /create-play --build check-drift

          If /create-play is unavailable, author SKILL.md manually following this structure:
          1. YAML front-matter: name, description, user-invocable: true, model: opus
          2. # check-drift header with 1-paragraph intent summary
          3. ## Compiled From — points to reference/intent.yaml, lists all constraints C1-C16
             and failure conditions F1-F13 as coverage records
          4. ## Role — orchestrator, delegates to agents, forbidden direct operations
          5. ## Pre-flight — resolve stm_base and product_base from config.yaml, resolve
             scope (branch, --issue, or ask), validate locked design artifacts path exists
             (advisory — not hard halt, but note if absent for advisory-only analysis mode)
          6. ## Workflow — mirrors skills/check-drift/SKILL.md steps but with agent delegation
             pattern and JSON contracts for each step (following prepare-epic/implement-epic
             compiled play structure)
          7. ## Compilation Metadata — intent_hash, compiled_by, compiled_at,
             constraints_covered, failure_conditions_covered

          The compiled SKILL.md does NOT replace skills/check-drift/SKILL.md — they serve
          different invocation paths. plays/check-drift/SKILL.md is the human-invocable play
          with agent delegation. skills/check-drift/SKILL.md is the model-invocable skill
          for direct invocation.
    expected_outcome: >
      core/components/plays/check-drift/SKILL.md exists, contains compiled-from metadata
      pointing to reference/intent.yaml, references constraints C1-C16 and failure conditions
      F1-F13, and follows the same play structure as other compiled plays.
    self_test: >
      Read SKILL.md and verify: (1) file exists and is non-empty; (2) ## Compiled From section
      references reference/intent.yaml; (3) constraints C1-C16 are referenced in workflow
      steps; (4) file contains ## Pre-flight, ## Workflow, and ## Compilation Metadata sections.

  - id: S3
    description: >
      Update core/components/skills/check-drift/SKILL.md — fix all 5 broken spec source paths,
      add epic trinity artifact inputs, add write-back Step 7, update drift categories
    files:
      - path: core/components/skills/check-drift/SKILL.md
        action: modify
        details: |
          CHANGE 1 — Fix broken spec source paths in "### From `.meridian/product/` (specs)":

          REMOVE (all 5 paths do not exist post-ADR 017):
          - `discovery/product.yaml`
          - `architecture/architecture.yaml`
          - `architecture/quality-standards.yaml`
          - `roadmap/epics.yaml`
          - `roadmap/features.yaml`

          REPLACE WITH (ADR 017 paths, resolved relative to product_base from config.yaml):
          - `specification/quality-profile.yaml` — quality standards, NFR targets
          - `specification/market-brief.md` — problem statement, users, strategic goals
          - `scope/scope.yaml` — capability scope and feature inventory
          - `scope/epics/{epic_id}.yaml` — epic definition with behaviors and failure conditions
          - `architecture/logical-architecture.yaml` — bounded contexts, component responsibilities
          - `architecture/physical-architecture.yaml` — technology stack, deployment topology
          - `architecture/nfr-spec.yaml` — NFR contracts with verification methods
          - `architecture/quality-vision.yaml` — quality vision per ISO 25010 characteristic
          - `architecture/design-patterns.yaml` — pattern catalog applied to this product

          CHANGE 2 — Add new section after "### From `.meridian/product/` (specs)":

          ### From locked design artifacts (prepare-epic STM) — PRIMARY spec source
          When these exist, they take precedence over product-level specs for this issue's scope.
          Resolved from stm_base (config.yaml stm.base-path) + issue number:
          - `{stm_base}/{issue}/context/design/tech.yaml` — locked LLD: all API contracts,
            internal interfaces, service contracts, frontend/backend/data specs (STATUS: LOCKED)
          - `{stm_base}/{issue}/context/design/scenarios.yaml` — locked 3-tier scenarios:
            baseline (current behavior), new (target behavior), regression (preserved behavior)
          - `{stm_base}/{issue}/context/design/plan.yaml` — locked task DAG: milestones,
            scope items, exit gates, spec_refs to tech.yaml
          - `{stm_base}/{issue}/context/design/epic-spec.yaml` — scoped epic specification
            with all behaviors, constraints, success scenarios, failure conditions
          - `{stm_base}/{issue}/context/design/architecture-context.yaml` — scoped
            architecture context: relevant patterns, components, technology stack for this issue

          ### From implement-epic evidence
          - `{stm_base}/{issue}/evidence/implement-epic/{milestone_id}/arbiter-verdict-*.yaml`
            — judge-as-arbiter verdicts; spec_ambiguous = direct spec gap signal
          - `{stm_base}/{issue}/evidence/implement-epic/{milestone_id}/quality-report-*.yaml`
            — quality gate results vs quality-gates.yaml thresholds
          - `{stm_base}/{issue}/milestones/{milestone_id}/status-report.yaml`
            — implement-epic milestone completion status

          ### From validate-epic evidence
          - `{stm_base}/{issue}/milestones/{milestone_id}/milestone-verdict.yaml`
            — per-milestone QA verdict (ACCEPT/REJECT) with e2e results summary
          - `{stm_base}/{issue}/evidence/validate-epic/{milestone_id}/e2e-results.yaml`
            — E2E test results by tier (baseline, new, regression)
          - `{stm_base}/{issue}/evidence/validate-epic/{milestone_id}/judge-report.yaml`
            — system-level judge evaluation results

          CHANGE 3 — Update "### Step 2: Identify Drifts" drift categories:

          ADD AFTER technology-drift:
          - **design-drift**: locked design artifact (tech.yaml, scenarios.yaml, plan.yaml)
            says X, implementation does Y. This is not a product spec vs implementation
            divergence — it is a locked LLD vs implementation divergence. Example: tech.yaml
            specifies API-001 with response schema {id, name, email}, implementation returns
            {id, name}. The spec (product level) may say "user registration endpoint" without
            specifying the field list — the LLD locked those fields, and that's what drifted.
          - **evidence-drift**: arbiter verdict is spec_ambiguous, OR milestone-verdict is
            REJECT with root cause traceable to spec ambiguity rather than implementation error.
            These items are NOT implementation failures — they are signals that the spec
            (either product-level or locked design) did not clearly specify the behavior.

          CHANGE 4 — Add Step 7 write-back after Step 6 (Recommendations):

          ### Step 7: Write-back to product LTM

          After generating recommendations, produce write-back artifacts. This step is
          additive-only — no existing locked files are ever modified.

          **Write-back artifact 1: spec-correction-manifest.yaml**
          Path: {stm_base}/{issue}/evidence/check-drift/spec-correction-manifest.yaml
          Content: structured list of proposed spec corrections. For each REC-SPEC item:
          ```yaml
          spec_corrections:
            - id: SC-{N}
              source_drift: DRIFT-{ID}
              target_artifact: {exact file path in product_base or stm/context/design}
              target_section: {section name}
              current_text: {verbatim current text if small, or section reference}
              proposed_change: {specific change to make}
              priority: P0 | P1 | P2
              human_review_required: true
          ```
          This manifest is NEVER auto-applied. Human reviews and applies corrections.

          **Write-back artifact 2: New ADR files (for design-drift with accepted decisions)**
          For each design-drift item where the divergence represents a deliberate decision
          (classification: accepted), write a new ADR file:
          Path: {product_base}architecture/adr-{YYMMDD}-{slug}.md
          Content: standard ADR format (Status: accepted, Context, Decision, Rationale,
          Alternatives, Consequences). NEVER overwrite existing ADR files.

          **Write-back artifact 3: Debt items (for forced-debt design-drift)**
          For each design-drift item where the divergence represents forced technical debt,
          append to or create: {product_base}_evidence/debt-catalog-{issue}.md
          This is a new file in the _evidence/ directory, never modifying existing debt files.

          CHANGE 5 — Update "## What This Skill Does NOT Do":

          REMOVE: "Does not modify any files (read-only analysis)"
          REPLACE WITH:
          "Does not overwrite or modify existing locked artifacts. Spec corrections go to
           spec-correction-manifest.yaml for human review before application. New ADR files
           for accepted design decisions are written additively as new files (never overwriting
           existing ADRs). All source code and existing locked spec files are strictly read-only."

    expected_outcome: >
      SKILL.md: (1) no references to discovery/, roadmap/, architecture/architecture.yaml,
      architecture/quality-standards.yaml; (2) 9 ADR 017-correct product spec paths present;
      (3) epic trinity inputs section present with 10 artifact paths; (4) 5 drift categories
      listed in Step 2; (5) Step 7 write-back present with 3 artifact types; (6) read-only
      statement updated to allow additive write-back.
    self_test: >
      Read SKILL.md and grep for: (1) "discovery/product.yaml" — must NOT appear; (2)
      "roadmap/epics.yaml" — must NOT appear; (3) "tech.yaml" — must appear in inputs;
      (4) "design-drift" — must appear in Step 2; (5) "spec-correction-manifest" — must
      appear in Step 7; (6) "Does not modify any files" — must NOT appear.

  - id: S4
    description: >
      Update core/components/skills/check-drift/references/templates.md — fix LTM path,
      add design-drift template, add evidence-drift template, add spec-correction-manifest
      template
    files:
      - path: core/components/skills/check-drift/references/templates.md
        action: modify
        details: |
          CHANGE 1 — Fix MEM template LTM path:
          FIND:
            LTM path: core/components/memory/knowledge/[category]/[filename].md
          REPLACE WITH:
            LTM path: ~/.meridian/core/memory/knowledge/[category]/[filename].md
            (project mode: .meridian/core/memory/knowledge/[category]/[filename].md)
            Note: this is the DEPLOYED memory path, not the source path in the repository.
            Source path for authoring is: core/components/memory/knowledge/[category]/[filename].md
            Deployed path is synced from source via /sync-droids or /sync-claude.

          CHANGE 2 — Add design-drift template section (add after technology-drift, before ADR):

          ## Design-Drift Item Template

          Design-drift captures divergence between locked design artifacts (tech.yaml,
          scenarios.yaml, plan.yaml from prepare-epic) and the actual implementation.

          ```markdown
          DESIGN-DRIFT-[ID]: [Title]

          Type: design-drift
          Severity: critical | high | medium | low
          Locked artifact: tech.yaml | scenarios.yaml | plan.yaml
          Artifact section: [e.g., interfaces.api_contracts.API-001]
          Linked DRIFT: DRIFT-[ID]

          Description:
          [What was locked in the design artifact vs what was built. Be specific — cite
          artifact, section, field name. e.g., "tech.yaml API-001 specifies response schema
          {id, name, email} but implementation returns {id, name} — email field missing."]

          RCA:
          [Why the implementation diverged from the locked design. Options:
          - Locked design was infeasible as specified (design was wrong)
          - Implementation missed the locked contract (implementation error)
          - Constraint discovered during implementation forced a different approach
          - Locked design was ambiguous at this level of detail]

          Classification: accepted | forced
          [accepted = deliberate divergence with known rationale; forced = unexpected constraint]

          Recommendation:
          update-locked-design — locked design was wrong, update tech.yaml/scenarios.yaml/plan.yaml
          update-implementation — implementation missed contract, fix code
          spec-correction-needed — product-level spec (upstream) needs updating
          no-action — drift is acceptable and documented
          ```

          CHANGE 3 — Add evidence-drift template section (add after design-drift):

          ## Evidence-Drift Item Template

          Evidence-drift captures spec gaps revealed by implement-epic and validate-epic
          evidence artifacts, particularly arbiter spec_ambiguous verdicts.

          ```markdown
          EVIDENCE-DRIFT-[ID]: [Title]

          Type: evidence-drift
          Severity: critical | high | medium | low
          Source: arbiter_verdict | milestone_reject | quality_threshold_miss
          Evidence artifact: [path to arbiter-verdict-*.yaml or milestone-verdict.yaml]
          Linked contract: [tech.yaml contract ID if from arbiter verdict, e.g., API-001]

          Description:
          [What the evidence artifact shows. For spec_ambiguous: what the contract says,
          what two (or more) valid interpretations exist, and what the implementation chose.
          For milestone REJECT: what scenario failed and what the spec says vs actual behavior.]

          RCA:
          [What created the ambiguity or gap. Was the spec contract underspecified?
          Were edge cases not defined? Was a failure condition not described?
          Is this a product-level gap or a locked-design gap?]

          Recommendation:
          update-spec — product-level spec needs clarification or extension
          update-locked-design — tech.yaml/scenarios.yaml contract needs clarification
          update-tests — test interpretation was wrong, spec is clear
          no-action — ambiguity resolved by implementation choice, document the decision
          ```

          CHANGE 4 — Add spec-correction-manifest template section:

          ## Spec-Correction-Manifest Template

          The spec-correction-manifest.yaml produced in Step 7 follows this schema:

          ```yaml
          spec_correction_manifest:
            generated_at: "[ISO-8601 timestamp]"
            issue: "[issue number]"
            scope: "[branch or epic ID]"
            corrections: []
            # When corrections exist, each entry follows:
            # - id: SC-[N]
            #   source_drift: "DRIFT-[ID] or DESIGN-DRIFT-[ID] or EVIDENCE-DRIFT-[ID]"
            #   target_artifact: "[exact file path]"
            #   target_section: "[section name or field path]"
            #   current_text: "[verbatim or reference]"
            #   proposed_change: "[specific proposed correction]"
            #   priority: P0 | P1 | P2
            #   human_review_required: true
            summary:
              total_corrections: 0
              by_artifact: {}
              note: "[justification if no corrections — what was examined, why none found]"
          ```

    expected_outcome: >
      templates.md: (1) MEM LTM path contains "~/.meridian/core/memory/knowledge/"; (2)
      design-drift template exists with Type, Locked artifact, Artifact section, RCA,
      Classification, and Recommendation fields; (3) evidence-drift template exists with
      Source, Evidence artifact, Linked contract, and RCA fields; (4) spec-correction-manifest
      template exists.
    self_test: >
      Read templates.md and verify: (1) "core/components/memory/knowledge" replaced by
      "~/.meridian/core/memory/knowledge"; (2) "design-drift" section exists; (3)
      "evidence-drift" section exists; (4) "spec_correction_manifest" section exists.

risk_assessment:
  - risk: >
      Stale paths in SKILL.md may exist in other skill or agent files that reference
      check-drift's output — fixing check-drift's inputs without auditing callers could
      leave broken references downstream
    mitigation: >
      check-drift's output artifacts are written to {stm_base}/{issue}/evidence/check-drift/
      which is a per-issue path and not referenced by name in other plays. The fix doesn't
      change output paths. The spec-correction-manifest is a new artifact at a new path — no
      existing callers reference it. Downstream aggregation (S6 in scenarios) parses
      DRIFT-xxx IDs which remain stable. Risk is low.
    severity: low

  - risk: >
      After S1 (intent.yaml update) but before S3 (SKILL.md update), there is a window
      where intent.yaml and SKILL.md are out of sync — constraints in intent.yaml reference
      capabilities (epic trinity inputs, write-back) that SKILL.md hasn't implemented yet
    mitigation: >
      Execute all 4 steps in a single implementation session. Never commit after S1 or S2
      alone — commit only after all 4 steps are complete and verified. The STM shows the
      work as a single coherent change.
    severity: low

  - risk: >
      The /create-play tool in S2 may not be accessible or functional in all environments
    mitigation: >
      If /create-play is unavailable, author plays/check-drift/SKILL.md manually following
      the intent.yaml structure and the reference pattern from prepare-epic/SKILL.md.
      The "## Compiled From" section should note "manually compiled from reference/intent.yaml"
      with the date. This is acceptable per the CLAUDE.md pattern for initial play creation.
    severity: low

verification_criteria:
  - After S1: Read intent.yaml — C13, C14, C15, C16, F11, F12, F13 all present
  - After S2: Read plays/check-drift/SKILL.md — file exists, non-empty, compiled-from section present
  - After S3: Read skills/check-drift/SKILL.md — no forbidden paths, epic trinity section present,
      5 drift categories, Step 7 present, read-only statement updated
  - After S4: Read templates.md — correct LTM path, 3 new template sections present
  - Full verification: grep for "discovery/product.yaml" in SKILL.md — must return 0 matches
  - Full verification: grep for "design-drift" in SKILL.md and templates.md — must return matches

estimated_scope:
  files_touched: 4
  files_created: 1
  files_modified: 3
  complexity: medium
  implementation_effort: M
  note: >
    The largest single change is S3 (skills/check-drift/SKILL.md) which requires replacing
    5 broken path lines, adding ~40 lines for the epic trinity inputs section, updating
    ~5 lines for drift categories, adding ~30 lines for Step 7 write-back, and updating
    ~2 lines in the "Does Not Do" section. Total additions to SKILL.md: approximately 80
    lines. All other files are smaller changes. No logic is being inverted — only extended
    and corrected.
