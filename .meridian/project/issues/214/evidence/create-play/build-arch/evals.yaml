# build-arch evals
# Generated by /create-play --rebuild build-arch (5-artifact rebuild)
# Source intent: core/components/plays/build-arch/reference/intent.yaml
# Maps to constraints C1-C19, failure conditions F1-F19, scenarios S1-S7

step_evals:
  # === F1: artifact existence & non-emptiness ===
  - id: SE-1
    source_type: failure_condition
    failure_condition_id: F1
    constraint_id: null
    skill: validate-architecture-spec
    check: "All five canonical artifacts exist and the primary section of each carries at least one entry."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V1].status == pass AND checks[id=V2].status == pass — logical components_count>=1, physical at least one stack, nfrs>=1, quality-vision characteristics>=1, design-patterns system_level>=1."
    fail_criteria: "checks[id=V1].status == fail OR checks[id=V2].status == fail."

  # === F2 / C3-physical: every physical pick names a specific product ===
  - id: SE-2
    source_type: both
    failure_condition_id: F2
    constraint_id: C3
    skill: validate-architecture-spec
    check: "Every technology choice in physical-architecture.yaml names a specific product or library — never a category term."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V5].status == pass."
    fail_criteria: "checks[id=V5].status == fail (one or more category-phrase matches in stack_choice fields)."

  # === F3 / C3-logical: logical purity (no implementation tokens) ===
  - id: SE-3
    source_type: both
    failure_condition_id: F3
    constraint_id: C3
    skill: derive-logical-architecture
    check: "logical-architecture.yaml contains no product name, protocol, wire format, schema column type, or programming language identifier in structural fields."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V3].status == pass."
    fail_criteria: "checks[id=V3].status == fail."

  # === F4 / C4: driver traceability ===
  - id: SE-4
    source_type: both
    failure_condition_id: F4
    constraint_id: C4
    skill: validate-architecture-spec
    check: "Every architectural decision across all five artifacts carries a driver citing a specific upstream artifact (epic constraint, quality-profile target, design-exp signal, compliance flag, or design-patterns rationale)."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V19].status == pass."
    fail_criteria: "checks[id=V19].status == fail (one or more driver citations missing or unresolvable)."

  # === F5 / C5: capability coverage ===
  - id: SE-5
    source_type: both
    failure_condition_id: F5
    constraint_id: C5
    skill: derive-logical-architecture
    check: "Every capability from scope.selected_capabilities maps to at least one component in logical-architecture.component_capability_map."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V4].status == pass."
    fail_criteria: "checks[id=V4].status == fail (one or more orphan capabilities)."

  # === F6 / C6: NFR delivery mechanism ===
  - id: SE-6
    source_type: both
    failure_condition_id: F6
    constraint_id: C6
    skill: derive-nfr-spec
    check: "Every NFR in nfr-spec.yaml names a specific delivery mechanism in physical-architecture.yaml or design-patterns.yaml; every epic performance constraint appears as an NFR entry."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V9].status == pass AND checks[id=V20].status == pass."
    fail_criteria: "checks[id=V9].status == fail OR checks[id=V20].status == fail."

  # === F7 / C7: ISO 25010 coverage in quality-vision ===
  - id: SE-7
    source_type: both
    failure_condition_id: F7
    constraint_id: C7
    skill: derive-quality-vision
    check: "Every ISO 25010 characteristic with relevance != not_applicable in quality-profile.yaml has a corresponding entry in quality-vision.yaml with vision, design_linkage, tooling, thresholds, and lifecycle_gates."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V10].status == pass AND checks[id=V11].status == pass."
    fail_criteria: "checks[id=V10].status == fail OR checks[id=V11].status == fail."

  # === F8 / C8: concrete tooling in quality-vision ===
  - id: SE-8
    source_type: both
    failure_condition_id: F8
    constraint_id: C8
    skill: derive-quality-vision
    check: "Every quality-vision entry uses concrete named tooling and quantified thresholds — no vague language."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V12].status == pass."
    fail_criteria: "checks[id=V12].status == fail."

  # === F9 / C9: design-patterns layer coverage ===
  - id: SE-9
    source_type: both
    failure_condition_id: F9
    constraint_id: C9
    skill: derive-design-patterns
    check: "design-patterns.yaml has system_level >=1, layer_level >=1 when has_backend, component_level entry per declared runtime tier, and cross_cutting >=1 when any NFR names resilience/idempotency/consistency."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V13].status == pass."
    fail_criteria: "checks[id=V13].status == fail."

  # === F10 / C10: ADR completeness ===
  - id: SE-10
    source_type: both
    failure_condition_id: F10
    constraint_id: C10
    skill: validate-architecture-spec
    check: "Every non-obvious decision (>=2 viable alternatives + narrows future path) ships with an ADR in logical-architecture.adr_log carrying decision, alternatives, chosen_option, and drivers."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V17].status == pass AND checks[id=V18].status == pass."
    fail_criteria: "checks[id=V17].status == fail OR checks[id=V18].status == fail."

  # === F11: five checkpoint artifacts present ===
  - id: SE-11
    source_type: failure_condition
    failure_condition_id: F11
    constraint_id: null
    skill: scriber
    check: "Five human review checkpoint artifacts exist under {product_base}_checkpoints/build-arch/ — one for each of logical, physical, nfr, quality-vision, design-patterns."
    artifact_pattern: "{product_base}_checkpoints/build-arch/*.md"
    pass_criteria: "Five distinct checkpoint files exist matching stage-{1..5}-{logical|physical|nfr|quality-vision|design-patterns}-*.md, each carrying a Status header."
    fail_criteria: "Fewer than five checkpoint files exist OR any of the five expected stages is missing."

  # === F12: ADR 017 whitelist + scriber-only writes ===
  - id: SE-12
    source_type: failure_condition
    failure_condition_id: F12
    constraint_id: null
    skill: scriber
    check: "All artifact, evidence, checkpoint, and manifest writes land within the ADR 017 whitelist and every evidence/checkpoint/status write was issued through the scriber agent."
    artifact_pattern: "{product_base}_evidence/build-arch/*.md"
    pass_criteria: "Every produced file resides under one of the whitelisted directories AND no evidence/checkpoint/status file was written without a corresponding scriber task_id record."
    fail_criteria: "Any file lands outside the whitelist OR any evidence/checkpoint/status file lacks a scriber task_id provenance entry."

  # === F13: no code/test suites/implementation work products ===
  - id: SE-13
    source_type: failure_condition
    failure_condition_id: F13
    constraint_id: null
    skill: build-arch-orchestrator
    check: "build-arch produces no code, no test suites, and no implementation-level work products."
    artifact_pattern: "{product_base}architecture/"
    pass_criteria: "Output set is exactly the five canonical YAMLs + five decision manifests + validation-result.yaml + checkpoints/evidence — zero source files, zero test files."
    fail_criteria: "Any source file, test file, or implementation work product appears under {product_base}architecture/."

  # === F14: silent multi-candidate selection ===
  - id: SE-14
    source_type: failure_condition
    failure_condition_id: F14
    constraint_id: null
    skill: derive-physical-architecture
    check: "No decision is committed to a single product/pattern when the KB catalog offered multiple legitimate candidates AND grounded_tools did not pin AND the user was not asked via grounding-questions.md or a checkpoint."
    artifact_pattern: "{product_base}architecture/decision-manifest-derive-physical-architecture.yaml"
    pass_criteria: "Every decision tagged kb_catalog_multi_candidate_user_approved cites a Q-arch-NNN id; no multi-candidate slot is silently resolved."
    fail_criteria: "Any decision tagged kb_catalog_multi_candidate_user_approved lacks a Q-arch citation OR any multi-candidate slot has no question/checkpoint trail."

  # === F15 / C16: source_type discipline (no agent_default_unilateral) ===
  - id: SE-15
    source_type: both
    failure_condition_id: F15
    constraint_id: C16
    skill: validate-architecture-spec
    check: "Every decision-carrying entry in physical-architecture.yaml and design-patterns.yaml carries a source_type field from the permitted enum, and no entry uses agent_default_unilateral."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V6].status == pass AND checks[id=V14].status == pass."
    fail_criteria: "checks[id=V6].status == fail OR checks[id=V14].status == fail."

  # === F16 / C17: grounded_tools honouring ===
  - id: SE-16
    source_type: both
    failure_condition_id: F16
    constraint_id: C17
    skill: validate-architecture-spec
    check: "Every project-profile.grounded_tools pin is honoured in physical-architecture.yaml or design-patterns.yaml with exact value, source_type=grounded_tools_pin, and a citation back to the slot."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V7].status == pass."
    fail_criteria: "checks[id=V7].status == fail."

  # === F17: kb_catalog_single_candidate mis-tagging ===
  - id: SE-17
    source_type: failure_condition
    failure_condition_id: F17
    constraint_id: null
    skill: validate-architecture-spec
    check: "Every decision tagged kb_catalog_single_candidate corresponds to a KB file that genuinely lists only one legitimate candidate for the slot given the project-profile dimensions cited."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V8].status == pass."
    fail_criteria: "checks[id=V8].status == fail."

  # === F18 / C18: Decision Surfacing Discipline — every inferred decision surfaced ===
  - id: SE-18
    source_type: both
    failure_condition_id: F18
    constraint_id: C18
    skill: validate-architecture-spec
    check: "Every entry in every of the five decision manifests has a non-null user_response (accept | override | orbit) — no inferred decision was committed without surfacing through the tier-appropriate flow."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "checks[id=V15].status == pass AND checks[id=V16].status == pass (no null user_response across all five manifests; no tier=high decision with grounding_source.kind != kb_path)."
    fail_criteria: "checks[id=V15].status == fail OR checks[id=V16].status == fail."

  # === F19 / C19: decision-manifest emission and schema completeness ===
  - id: SE-19
    source_type: both
    failure_condition_id: F19
    constraint_id: C19
    skill: validate-architecture-spec
    check: "Each derive skill emitted a decision-manifest-{skill}.yaml at the contract path, and every entry carries decision_id, decision_type, tier, grounding_source, recommendation, alternatives_considered (>=1 entry), and agent_reasoning_summary."
    artifact_pattern: "{product_base}architecture/validation-result.yaml"
    pass_criteria: "All five decision-manifest-derive-*.yaml files exist; checks[id=V15].status == pass; alternatives_considered list is non-empty for every entry."
    fail_criteria: "Any of the five manifests is missing OR checks[id=V15].status == fail."

scenario_evals:
  - id: SCE-1
    scenario_id: S1
    persona: "Technical Architect"
    artifact_pattern: "{product_base}architecture/{logical-architecture,physical-architecture,nfr-spec,quality-vision,design-patterns}.yaml"
    check: "Architect can present the architectural direction with every decision traced to a business driver and walk through design-patterns.yaml to show governing discipline."
    pass_criteria: "Every component, stack pick, NFR, quality-vision entry, and pattern carries a non-empty driver/source citation; design-patterns.yaml has populated system_level + layer_level + component_level entries with rationale."
    fail_criteria: "One or more decisions has an empty driver field OR design-patterns.yaml is missing a populated layer."

  - id: SCE-2
    scenario_id: S2
    persona: "Engineering Manager"
    artifact_pattern: "{product_base}architecture/quality-vision.yaml"
    check: "EM can set up CI/CD gates and code-review standards from quality-vision.yaml without re-deriving thresholds, and explain the why of each gate from the vision section."
    pass_criteria: "Every characteristic entry has non-empty vision, target_level, design_linkage, named tooling (>=1 with a name field), quantified thresholds (>=1), and lifecycle_gates (>=1 with gate + tool fields)."
    fail_criteria: "One or more characteristic entries lack vision, named tooling, thresholds, or lifecycle gates."

  - id: SCE-3
    scenario_id: S3
    persona: "Implementation Lead"
    artifact_pattern: "{product_base}architecture/{logical-architecture,physical-architecture,design-patterns}.yaml"
    check: "Implementation lead can scope a per-feature plan knowing which components are touched, which products implement them, and which patterns govern the code."
    pass_criteria: "Every logical component has capabilities_served, depends_on, and a bounded_context; every component is referenced (by ID) at least once in physical-architecture.yaml runtime tiers or stack picks; design-patterns.component_level covers the runtime tier of every component."
    fail_criteria: "Any component lacks capabilities_served or depends_on OR any runtime tier in physical-architecture lacks a component_level pattern."

  - id: SCE-4
    scenario_id: S4
    persona: "Security Architect"
    artifact_pattern: "{product_base}architecture/{nfr-spec,physical-architecture,logical-architecture}.yaml"
    check: "Every security constraint from upstream epics has a named delivery mechanism in physical-architecture.auth_infra (or a security pattern in design-patterns.cross_cutting) plus a verification method in nfr-spec.yaml."
    pass_criteria: "For every epic constraint tagged security, there is at least one nfr-spec.yaml entry whose source cites the epic and whose delivery_mechanism names a specific component/product or pattern AND a verification_method is populated."
    fail_criteria: "Any epic security constraint has no corresponding NFR entry OR any security NFR has a null delivery_mechanism or verification_method."

  - id: SCE-5
    scenario_id: S5
    persona: "Product Manager"
    artifact_pattern: "{product_base}_checkpoints/build-arch/*.md"
    check: "PM can read the checkpoint summaries in plain English, assess fit-to-appetite, and push back at the design-patterns checkpoint."
    pass_criteria: "Each of the five checkpoint artifacts contains a summary section readable without engineering background — named choices, counts, and a single-paragraph rationale; the design-patterns checkpoint includes the appetite/over-engineering review prompt."
    fail_criteria: "Any of the five checkpoint artifacts is missing the summary section OR the design-patterns checkpoint lacks the appetite review prompt."

  - id: SCE-6
    scenario_id: S6
    persona: "DevOps / Platform Engineer"
    artifact_pattern: "{product_base}architecture/{physical-architecture,quality-vision,design-patterns}.yaml"
    check: "DevOps can plan IaC, observability, on-call, and resilience patterns without architect clarification."
    pass_criteria: "physical-architecture.deployment_topology has hosts, environments, and networks populated; physical-architecture.observability is populated with named tooling; quality-vision has an operational/reliability characteristic with lifecycle_gates; design-patterns.cross_cutting has at least one resilience pattern when any NFR triggers it."
    fail_criteria: "Any of the above sections is missing or empty."

  - id: SCE-7
    scenario_id: S7
    persona: "Senior Developer (onboarding)"
    artifact_pattern: "{product_base}architecture/design-patterns.yaml"
    check: "A senior developer can understand the codebase's structural rules from design-patterns.yaml alone — system-level shape, layer-level discipline, and component-level patterns per runtime tier — with rationale."
    pass_criteria: "design-patterns.yaml has populated system_level, layer_level (when has_backend), and component_level (one per runtime tier) entries; every entry carries pattern name, applicability_scope, driver, alternatives_considered, and source_type."
    fail_criteria: "Any required layer is empty OR any pattern entry lacks pattern name, applicability_scope, driver, or source_type."

coverage:
  failure_conditions_covered: [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12, F13, F14, F15, F16, F17, F18, F19]
  failure_conditions_uncovered: []
  constraints_covered: [C3, C4, C5, C6, C7, C8, C9, C10, C16, C17, C18, C19]
  constraints_uncovered: []
  constraints_excluded_preflight: [C1, C2]
  constraints_excluded_structural: [C11, C12, C13, C14, C15]
  scenarios_covered: [S1, S2, S3, S4, S5, S6, S7]
  scenarios_uncovered: []
  step_eval_count: 19
  scenario_eval_count: 7
