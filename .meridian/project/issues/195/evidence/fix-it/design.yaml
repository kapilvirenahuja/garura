design:
  issue: 195
  designed_at: "2026-04-12"

  affected_files:
    - path: "core/components/plays/capture-learning/reference/intent.yaml"
      role: "Canonical source of truth for capture-learning constraints"
      change_needed: >
        Update C12 to explicitly name additional evidence artifact types as secondary
        extraction sources (judge reports, RCA artifacts, remediation records, design
        artifacts). Update C15 to clarify the zero-candidate exit applies only when
        no extractable evidence of any recognized type exists.
    - path: "core/components/plays/capture-learning/SKILL.md"
      role: "Compiled play orchestrating the extraction workflow"
      change_needed: >
        Step 3 scan must be replaced: instead of find -name 'resolution-trace.yaml',
        scan for all recognized evidence artifact types (resolution-trace.yaml,
        judge-report*.yaml, rca.yaml, design.yaml, remediation-*.md, drift-report.md,
        quality-report.yaml). Step 4 contract must pass the collected file paths as
        'evidence_paths' not 'trace_paths'. NOTE: this file is a compiled artifact —
        changes must go through intent.yaml → /create-play --rebake, not direct edit.
    - path: "core/components/agents/knowledge-extractor.md"
      role: "Agent implementing knowledge extraction logic in EXTRACT mode"
      change_needed: >
        EXTRACT mode must be extended beyond resolved_from: 'llm' parsing. Agent
        must recognize multiple evidence formats: resolution traces (existing logic),
        judge reports (extract patterns from failure/success conditions and remediation
        strategies), RCA artifacts (extract root cause patterns), remediation records
        (extract fix patterns), design artifacts (extract architectural decisions).
        Each format requires its own extraction heuristic. The synthesis step is
        already well-designed and should be preserved.

  chosen_strategy:
    name: "Broaden scan + extend extraction to multiple evidence types"
    description: >
      Fix at both layers simultaneously: (1) update intent.yaml C12 to name
      additional evidence types as extraction sources, (2) rebake play so Step 3
      scans for all recognized evidence artifact types rather than only
      resolution-trace.yaml, (3) extend knowledge-extractor EXTRACT mode to
      understand diverse artifact formats and extract knowledge signals from each.
      The synthesis and deduplication logic is preserved unchanged — only the
      input acquisition and signal extraction change.
    why_chosen: >
      Addresses both the primary bottleneck (play scan) and the contributing cause
      (extraction logic) in one coherent change. Starting at intent.yaml ensures the
      fix goes through the correct compilation pipeline (rebake) rather than violating
      the "do not edit SKILL.md manually" constraint. The synthesis and LTM write
      pipeline is sound and reused unchanged.

  alternatives_considered:
    - approach: "Broaden Step 3 scan only, keep resolved_from: llm signal"
      description: >
        Update SKILL.md Step 3 to scan for more file types, but leave the
        knowledge-extractor extraction logic unchanged (still only extracts
        resolved_from: 'llm' entries).
      reason_rejected: >
        Does not solve the problem. The other evidence types (judge reports,
        remediation files, RCA artifacts) do not contain resolved_from: 'llm' fields.
        Broadening the scan would pass more files to knowledge-extractor, but the
        extractor would still find zero qualifying entries and still produce zero
        candidates. Fixes the symptom of file discovery while leaving the actual
        extraction gap intact.

    - approach: "Enforce resolution-trace.yaml production from all plays"
      description: >
        Require every play (start-feature, implement-epic, fix-it, commit-code) to
        produce a resolution-trace.yaml with resolved_from entries. Adapter logic
        transforms existing evidence into resolution-trace format before capture-learning
        runs.
      reason_rejected: >
        High blast radius requiring changes to 5+ independent plays, each with their
        own intent.yaml and rebake requirements. Creates artificial data transformation
        between plays. Produces a synthetic artifact (resolution-trace.yaml) that
        doesn't naturally emerge from the work — it would be generated post-hoc,
        reducing its quality as a knowledge signal. The chosen approach is lower risk
        and more natural because it teaches capture-learning to understand evidence as
        it actually exists, rather than forcing all evidence into one format.

    - approach: "Post-process archived issues via LLM summarization only"
      description: >
        Replace structured extraction entirely with a single LLM prompt reading all
        evidence files and free-form extracting knowledge candidates without per-format
        heuristics.
      reason_rejected: >
        Less deterministic and less auditable. Structured extraction per artifact type
        produces traceable provenance (which file, which section, which signal) that
        feeds into deduplication and classification. Free-form LLM summarization loses
        the source_trace_path traceability and makes SE-7, SE-10, SE-11 evals harder
        to verify. Also conflicts with C9 (holistic organization) which requires
        deliberate synthesis, not arbitrary extraction.

  risks:
    - risk: >
        SKILL.md is a compiled artifact — direct edits violate the stated constraint
        ("Do NOT edit this file manually"). If the fix edits SKILL.md directly instead
        of going through rebake, the intent_hash in compilation metadata will become
        stale, creating drift between intent.yaml and the compiled play.
      severity: high
      mitigation: >
        Fix MUST follow the intent.yaml → /create-play --rebake path. The execution
        plan explicitly gates on this. Reviewer must verify intent_hash is updated in
        the rebaked SKILL.md.

    - risk: >
        knowledge-extractor EXTRACT mode changes could alter synthesis behavior for
        resolution-trace.yaml (the existing working case). Regression risk on issues
        that do produce resolution traces.
      severity: medium
      mitigation: >
        Preserve the existing resolved_from: 'llm' extraction branch unchanged as a
        first-class path. New artifact type parsers are additive code paths, not
        replacements. Test the agent against a known resolution-trace.yaml containing
        resolved_from: 'llm' entries to verify existing behavior is unaffected.

    - risk: >
        Different evidence artifact schemas (judge reports, RCA files, remediation
        records) are not formally specified — their field names and structure may
        vary across plays and evolve over time. Hardcoding field names in the
        extractor creates brittleness.
      severity: medium
      mitigation: >
        Use pattern-matching heuristics that degrade gracefully (if expected field
        absent, skip that artifact rather than fail). Document the extraction heuristics
        per artifact type in the agent definition. Consider a fallback: if a recognized
        artifact type has an unexpected schema, log it in the candidates.yaml summary
        rather than erroring.

    - risk: >
        Broader scan surface may produce too many candidates per issue (violating
        C13's 3-5 synthesized patterns target and F11's 7-candidate ceiling). Rich
        evidence directories could generate 20+ raw signals before synthesis.
      severity: low
      mitigation: >
        The synthesis step in knowledge-extractor already groups and consolidates
        raw decisions. Preserve the 3-5 target guidance and the 7-candidate ceiling
        from C13/F11. The synthesis step is the natural throttle — it is already
        designed to compress many raw signals into few patterns.

    - risk: >
        C15 zero-candidate exit currently triggers when no resolved_from: 'llm'
        entries exist. After the fix, this condition must be interpreted as "no
        extractable signals from any recognized artifact type." If C15 is not
        updated in intent.yaml, the play may incorrectly exit clean when only
        the narrow trace check fails but other evidence exists.
      severity: low
      mitigation: >
        Update C15 in intent.yaml explicitly to state "when no extractable evidence
        signals exist across all recognized artifact types." Include this in the
        rebake so the compiled play's Step 4 zero-candidate logic reflects the
        updated condition.

  execution_plan:
    - step: 1
      title: "Update intent.yaml — expand extraction scope and clarify C12/C15"
      owner: code-builder
      file: "core/components/plays/capture-learning/reference/intent.yaml"
      action: modify
      details: >
        Modify constraint C12: change wording from "Resolution traces with
        resolved_from='llm' are the primary promotion signal" to explicitly name
        additional evidence artifact types as secondary extraction sources. Add
        a list of recognized artifact types: resolution-trace.yaml (primary),
        judge-report*.yaml, rca.yaml, design.yaml, remediation-*.md,
        quality-report.yaml, drift-report.md. Keep the note that LLM fallbacks
        from resolution traces are the highest-signal source.
        Modify constraint C15: change "no resolution traces with resolved_from='llm'
        entries exist" to "no extractable signals exist across all recognized
        artifact types."
      expected_outcome: >
        intent.yaml C12 enumerates recognized evidence types; C15 uses broader
        zero-candidate condition. The intent is now the authoritative spec for
        what capture-learning scans.
      self_test: >
        Read the file and verify C12 lists at least 3 artifact types beyond
        resolution-trace.yaml, and C15 references "all recognized artifact types"
        rather than "resolution traces."

    - step: 2
      title: "Update knowledge-extractor agent — add multi-format extraction in EXTRACT mode"
      owner: code-builder
      file: "core/components/agents/knowledge-extractor.md"
      action: modify
      details: >
        Extend EXTRACT mode Steps section:
        - Rename current "Input" from "trace_paths" to "evidence_paths" (list of
          any recognized artifact file paths — not just resolution traces).
        - Add per-format extraction heuristics after the existing resolved_from: 'llm'
          branch:
            * judge-report*.yaml: extract from failure_conditions_triggered,
              remediation_strategy, and pass/fail patterns as raw decision records
            * rca.yaml: extract root_cause and approach fields as raw decision records
            * remediation-*.md / .yaml: extract the fix approach and risk mitigation
              as raw decision records
            * design.yaml: extract chosen_strategy and alternatives_considered entries
              as raw decision records
            * quality-report.yaml / drift-report.md: extract recurring issues and
              patterns as raw decision records
        - Each new branch: if expected field absent in artifact, skip silently and
          log in extraction summary (graceful degradation).
        - Preserve existing resolved_from: 'llm' branch unchanged as first path.
        - The synthesis step (group → consolidate → 3-5 patterns) is UNCHANGED.
        Update input contract: rename stm.input.trace_paths to stm.input.evidence_paths
        with updated description noting it accepts any recognized artifact type.
        Update output contract summary field: rename traces_scanned to artifacts_scanned.
      expected_outcome: >
        knowledge-extractor can process judge reports, RCA files, remediation records,
        and design artifacts alongside resolution traces. Raw signals feed into the
        existing synthesis pipeline. Resolution trace extraction is unchanged.
      self_test: >
        Read the file and verify: (1) EXTRACT mode input is evidence_paths not
        trace_paths, (2) at least 3 per-format extraction branches exist beyond
        resolved_from: 'llm', (3) each branch has a graceful-skip on missing fields,
        (4) synthesis step is unmodified, (5) no reference to trace_paths in the
        input contract schema.

    - step: 3
      title: "Rebake capture-learning play from updated intent.yaml"
      owner: code-builder
      command: "/create-play --rebake capture-learning"
      details: >
        Run /create-play --rebake to recompile SKILL.md from the updated intent.yaml.
        The rebake must produce a new Step 3 that scans for all recognized artifact
        types (not just resolution-trace.yaml) and a new Step 4 contract that passes
        evidence_paths (not trace_paths) to the knowledge-extractor agent.
        Verify that the compilation metadata in SKILL.md shows an updated intent_hash
        reflecting the new C12/C15 content.
      expected_outcome: >
        SKILL.md is updated via the correct compilation path. Step 3 scan covers
        multiple artifact types. Step 4 contract passes evidence_paths. Intent hash
        matches the new intent.yaml content.
      self_test: >
        Grep SKILL.md for "resolution-trace.yaml" — it should appear only as ONE of
        multiple file types in the Step 3 find command, not as the sole target.
        Grep for "evidence_paths" — it should appear in the Step 4 contract.
        Verify intent_hash in compilation metadata has changed from the prior value
        (sha256:e1699de3f527be9d1b2d67ddb7a811370391ac6ed35a5e3424f86b2a047d3fa4).

    - step: 4
      title: "Sync updated components to global deployment"
      owner: code-builder
      command: "/sync-claude"
      details: >
        After SKILL.md is rebaked and knowledge-extractor.md is updated, run
        /sync-claude to deploy the updated components from core/components/ to
        ~/.claude/ (global). This ensures the running environment uses the fixed
        versions of both the play and the agent.
      expected_outcome: >
        ~/.claude/skills/capture-learning/SKILL.md and ~/.claude/agents/knowledge-extractor.md
        reflect the updated logic.
      self_test: >
        Read ~/.claude/agents/knowledge-extractor.md and verify evidence_paths is
        present in the input contract section. Read ~/.claude/skills/capture-learning/SKILL.md
        and verify Step 3 scans multiple artifact types.
