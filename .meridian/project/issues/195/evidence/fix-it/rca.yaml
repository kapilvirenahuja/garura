rca:
  issue: 195
  title: "fix: capture-learning extracts zero knowledge — only scans resolution-trace.yaml"
  analyzed_at: "2026-04-12"

  symptom: >
    Running capture-learning against 8 closed Phoenix issues produces zero knowledge
    candidates every time. The extraction phase exits cleanly with "zero candidates"
    despite those issues containing rich evidence (judge reports, remediation files,
    quality reports, RCA artifacts, implementation plans).

  root_cause:
    summary: >
      Step 3 of core/components/recipes/capture-learning/SKILL.md uses a hardcoded
      find command that matches ONLY files named 'resolution-trace.yaml'. In real
      project issues (Phoenix issues 1–22), resolution-trace.yaml is produced
      exclusively by the prepare-implementation skill's LTM resolution protocol.
      Issues resolved through start-feature, implement-epic, commit-code, check-drift,
      or fix-it produce NO resolution-trace.yaml files. Step 3 therefore returns an
      empty list for essentially every real issue, and knowledge-extractor is invoked
      with zero trace paths — guaranteed zero candidates.
    file: "core/components/recipes/capture-learning/SKILL.md"
    location: "Step 3 — Locate Resolution Traces (lines 136-139)"
    specific_logic: |
      find {stm_archive}/{YYYY-MM}/{issue}/evidence/ -name "resolution-trace.yaml" -type f
    why_it_is_wrong: >
      The find pattern is an over-specific literal filename match. The intent (C12)
      says resolution traces are the "primary" promotion signal — not the only signal.
      The recipe implemented "primary" as "exclusive", ignoring all other evidence
      artifacts (judge reports, RCA files, design artifacts, remediation records) that
      carry substantial learnable knowledge. The scan produces an empty list for any
      issue that did not run prepare-implementation, which is the majority.

  contributing_cause:
    summary: >
      Even if Step 3 were broadened to collect other evidence files, the
      knowledge-extractor agent (core/components/agents/knowledge-extractor.md,
      EXTRACT mode lines 58-62) would still produce zero candidates — it only
      extracts entries where resolved_from == "llm". Judge reports, remediation
      files, and RCA artifacts do not contain this field. Broadening the file scan
      without updating the extraction logic would still yield zero candidates from
      the richer evidence.
    file: "core/components/agents/knowledge-extractor.md"
    location: "EXTRACT Mode, Step 2 (line 61)"
    specific_logic: |
      Extract all entries where resolved_from == "llm"
    why_it_is_wrong: >
      The extraction signal is hardcoded to a single YAML field that only exists
      in resolution-trace.yaml files. The agent has no capability to extract
      knowledge from the diverse artifact types that real issues produce.

  intent_misalignment:
    file: "core/components/recipes/capture-learning/reference/intent.yaml"
    location: "Constraint C12"
    text: >
      "Resolution traces with resolved_from='llm' are the primary promotion signal
      — decisions where the system lacked stored knowledge."
    analysis: >
      The word "primary" in C12 implies other signals may exist, but neither the
      recipe nor the agent implements any secondary extraction path. The intent also
      describes the goal as extracting "reusable patterns from resolution traces" —
      this phrase was interpreted as "only resolution-trace.yaml files" rather than
      "traces of resolution activity" (evidence showing how decisions were made).

  evidence:
    phoenix_archive_proof: >
      Phoenix issue #1 archived to .meridian/stm/_archive/2026-04/1/ contains 34
      files including judge reports, remediation files, quality reports, test
      checksums, drift reports — zero resolution-trace.yaml files. capture-learning
      ran and produced zero candidates, confirmed by archive-result.yaml showing
      source_file_count: 34 with no resolution traces found.
    meridian_archive_proof: >
      Only one resolution-trace.yaml found across all meridian-os issues:
      .meridian/project/issues/182/evidence/prepare-implementation/resolution-trace.yaml
      — produced by prepare-implementation's LTM resolution step. All other issues
      have no such file.

  blast_radius:
    - file: "core/components/recipes/capture-learning/SKILL.md"
      role: "Recipe orchestrator — defines Step 3 scan and Step 4 contract shape"
      impact: "Step 3 scan must be broadened; Step 4 contract must pass richer input"
    - file: "core/components/agents/knowledge-extractor.md"
      role: "Knowledge extraction agent — defines what to extract from evidence"
      impact: "EXTRACT mode must be extended to recognize and process non-trace evidence types"
    - file: "core/components/recipes/capture-learning/reference/intent.yaml"
      role: "Intent contract defining constraints C12 and C15"
      impact: >
        C12 may need clarification to explicitly name additional evidence types as
        extraction sources; C15 zero-candidate exit condition needs to remain valid
        but only trigger when truly no extractable evidence exists. A rebake will be
        required after intent changes since SKILL.md is a compiled artifact.
