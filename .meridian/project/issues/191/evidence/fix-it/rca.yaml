rca:
  type: "rca"
  summary: >
    implement-epic hardcodes artifact paths to the product epics directory
    (.meridian/product/roadmap/epics/{epic_id}/) while prepare-implementation writes all
    design artifacts to the issue STM context directory ({stm_base}/{issue}/context/design/).
    These are entirely separate directory trees with no bridging step, so implement-epic
    always starts from the wrong base and can never find the artifacts that prepare-implementation produced.

  root_cause:
    primary:
      file: "core/components/plays/implement-epic/SKILL.md"
      lines: "94-107"
      logic: >
        The pre-flight block hardcodes artifact_base = "{product_base}/roadmap/epics/{epic_id}"
        and derives all four artifact paths (plan_yaml_path, features_yaml_path,
        scenarios_yaml_path, tech_yaml_path) from this base. This makes implement-epic
        always look in the product epics directory tree for its input artifacts.
      why: >
        prepare-implementation was redesigned (TDD-first, issue #183) to write artifacts
        into {stm_base}/{issue}/context/design/ — the issue STM — but implement-epic's
        path resolution was never updated to match. The two plays evolved independently
        and now point to different base directories.

    secondary:
      file: "core/components/plays/prepare-implementation/SKILL.md"
      lines: "42-65 (pre-flight)"
      logic: >
        prepare-implementation parses issue from branch name and resolves stm_base but
        never creates a GitHub issue, feature branch, or STM directory. It assumes
        start-feature already ran. There is no issue/branch/STM setup in prepare-implementation's
        own workflow.
      why: >
        The play was designed as a pure artifact-production step (planning phase) that
        assumed upstream setup was complete. This made it dependent on start-feature or
        start-feature-planning being invoked separately — but the issue expected it to be
        self-contained, covering the full "ultra god mode" of planning context setup.

    tertiary:
      file: "core/components/plays/prepare-implementation/SKILL.md"
      lines: "1207-1217 (Step 20 — Lock All Artifacts)"
      logic: >
        The lock step iterates artifacts at path ${stm_base}/${issue}/${artifact} (flat),
        but the actual DRAFT artifacts are written to {stm_base}/{issue}/context/design/${artifact}.
        This means the lock step silently finds nothing (files absent at flat path) and
        exits without locking anything or raising an error.
      why: >
        The path template in the lock step was not updated when the prepare-implementation
        TDD redesign (issue #183) introduced the context/design/ subdirectory structure.
        This compounds the primary disconnect — even if implement-epic's paths were corrected,
        the artifacts may never actually reach LOCKED status due to this secondary bug.

  symptom_trace:
    - symptom: >
        implement-epic halts at pre-flight with "LOCKED plan.yaml not found" or finds
        artifacts with status DRAFT rather than LOCKED.
      traced_to: >
        implement-epic pre-flight reads plan_yaml_path from
        {product_base}/roadmap/epics/{epic_id}/plan.yaml — a path that either
        does not exist or contains only older workflow artifacts (not the ones
        prepare-implementation produced for this issue).

    - symptom: >
        Implementation context (scope items, design decisions, exit gates) is missing or
        incomplete when code-builder runs, leading to implementations that pass evals
        but fail at integration time.
      traced_to: >
        When implement-epic does find artifacts (from old epic-scoped paths), they are
        not the issue-specific design artifacts from prepare-implementation. The issue-level
        context (blast radius, baseline tests, codebase-specific change surface) produced
        by prepare-implementation sits unused in {stm_base}/{issue}/context/design/.

    - symptom: >
        plan.yaml artifacts never reach status LOCKED despite prepare-implementation
        completing all draft and checkpoint steps.
      traced_to: >
        The lock step in prepare-implementation (Step 20, line 1210) reads from
        ${stm_base}/${issue}/${artifact} — no context/design/ subdirectory — so
        the for-loop finds no files and silently completes without locking.

  blast_radius:
    affected_files:
      - path: "core/components/plays/implement-epic/SKILL.md"
        role: "Compiled play — defines implement-epic orchestration and all artifact path resolution"
        change_needed: >
          Update artifact_base and all derived paths in pre-flight to read from
          {stm_base}/{issue}/context/design/ instead of {product_base}/roadmap/epics/{epic_id}/.
          Also update Step 1 (Build Context) JSON contract artifact paths passed to tech-designer.

      - path: "core/components/plays/implement-epic/reference/intent.yaml"
        role: "Intent source — defines constraints, failure conditions, and scenarios for implement-epic"
        change_needed: >
          Update artifact path constraints (C1, C3) and any scenario given/then blocks that
          reference the product epics path. Add constraint: all input artifacts must reside
          in issue STM ({stm_base}/{issue}/context/design/).

      - path: "core/components/plays/prepare-implementation/SKILL.md"
        role: "Compiled play — defines prepare-implementation orchestration and all output paths"
        change_needed: >
          (1) Add issue/branch/STM setup phase before Context Resolution — resolve/create issue,
          create branch, initialize STM — mirroring start-feature. (2) Fix Step 20 lock path
          from ${stm_base}/${issue}/${artifact} to ${stm_base}/${issue}/context/design/${artifact}.

      - path: "core/components/plays/prepare-implementation/reference/intent.yaml"
        role: "Intent source — defines constraints, failure conditions, and scenarios for prepare-implementation"
        change_needed: >
          Add constraints and failure conditions covering issue resolution, branch creation,
          and STM initialization (mirroring start-feature C1-C8). Update artifact path
          constraints to reflect context/design/ subdirectory. Update scenarios to include
          the setup phase as a first-class outcome.

    affected_components:
      - name: "prepare-implementation → implement-epic handoff"
        impact: >
          Primary data flow is broken. Every invocation of implement-epic after
          prepare-implementation will fail or operate on wrong/missing context.

      - name: "Plan.yaml LOCKED state"
        impact: >
          Due to the tertiary bug, plan.yaml never reaches LOCKED status. implement-epic
          pre-flight (C1) requires plan.yaml status == LOCKED — so even if path resolution
          were fixed, the workflow would still halt unless the lock step is also corrected.

      - name: "start-feature / start-feature-planning prerequisites"
        impact: >
          Currently users must run start-feature before prepare-implementation to get
          issue+branch+STM. After the fix, prepare-implementation becomes self-contained.
          Invoking start-feature first should remain harmless (idempotent setup), but
          it should no longer be required.

      - name: "implement-epic Step 1 — Build Context (tech-designer contract)"
        impact: >
          The JSON contract passed to tech-designer in Step 1 also references artifact paths.
          These must be updated in lockstep with the pre-flight path change — otherwise
          the tech-designer context builder will also look in the wrong directory.

  confidence: "high"
