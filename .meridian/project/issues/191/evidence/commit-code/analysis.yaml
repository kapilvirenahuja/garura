analysis:
  branch: fix/191-prepare-impl-stm-setup
  issue: 191
  issue_confidence: high

  groups:
    - id: G1
      type: fix
      scope: prepare-implementation
      subject: "add setup phase with issue/branch/STM init and fix artifact lock path"
      issue: 191
      issue_confidence: high
      files:
        - core/components/plays/prepare-implementation/SKILL.md
        - core/components/plays/prepare-implementation/reference/intent.yaml
      summary: >
        Adds Phase 0 (Setup) to prepare-implementation with three new steps:
        Step 0a resolves or creates a GitHub issue via project-orchestrator,
        Step 0b creates a feature branch via repo-orchestrator (idempotent),
        Step 0c initializes the STM directory structure with mkdir -p.
        Also fixes the artifact lock step to use the correct path
        {stm_base}/{issue}/context/design/{artifact} instead of
        {stm_base}/{issue}/{artifact}.
        Adds constraints C33-C36, failure conditions F27-F29, and scenario S14.
        Updates intent_hash to sha256:94a0d47c582b30f661d77d6e4ee1746c7f8bdabb2fb8620a1e94d170ade29bdc.

    - id: G2
      type: fix
      scope: implement-epic
      subject: "source design artifacts from issue STM instead of product base (C24)"
      issue: 191
      issue_confidence: high
      files:
        - core/components/plays/implement-epic/SKILL.md
        - core/components/plays/implement-epic/reference/intent.yaml
      summary: >
        Adds constraint C24: all input design artifacts (plan.yaml, features.yaml,
        tech.yaml, scenarios.yaml) must be sourced from the issue STM at
        {stm_base}/{issue}/context/design/, where prepare-implementation writes them.
        Architecture.yaml and quality-standards.yaml remain product-level.
        Updates artifact_base derivation in SKILL.md to use issue STM path.
        Updates constraint count (C1-C24) and intent_hash in compiled artifact.

    - id: G3
      type: chore
      scope: stm
      subject: "commit fix-it play evidence for issue #191"
      issue: 191
      issue_confidence: high
      files:
        - .meridian/project/issues/191/evidence/fix-it/branch-result.yaml
        - .meridian/project/issues/191/evidence/fix-it/rca.yaml
        - .meridian/project/issues/191/evidence/fix-it/implementation-report.yaml
        - .meridian/project/issues/191/evidence/fix-it/design.yaml
        - .meridian/project/issues/191/evidence/fix-it/briefs/hub.html
        - .meridian/project/issues/191/evidence/fix-it/briefs/rca-design-brief.html
        - .meridian/project/issues/191/status/fix-it.json
        - .meridian/project/issues/191/status/ship.json
      summary: >
        STM evidence directory for issue #191 produced by the fix-it play.
        Contains RCA, design decisions, implementation report, branch result,
        HTML briefs, and play status checkpoints. These are issue-scoped
        artifacts, not source code changes.

  risks:
    sensitive_files: []
    breaking_changes:
      - >
          G2 changes artifact_base in implement-epic from {product_base}/roadmap/epics/{epic_id}
          to {stm_base}/{issue}/context/design. Any existing in-flight epics that stored
          artifacts at the old product_base path will not be found. This is intentional
          (the fix aligns with where prepare-implementation writes them) but callers
          must re-run prepare-implementation to populate the new path.
    ambiguous_types: []
    hotfix_branch: false
    notes:
      - G1 and G2 are coupled changes — prepare-implementation now writes to context/design/
        and implement-epic now reads from the same path. They should be committed separately
        by concern but represent a coordinated fix.
      - G3 (STM evidence) is unrelated to source changes and must be committed as chore(stm).
