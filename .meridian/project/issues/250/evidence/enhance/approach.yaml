problem_statement: |
  The enhance play's approach.yaml risk schema captures description and mitigation
  only — no classification of risk type (technical, business, or architectural)
  and no specification of how the play should respond to each risk. All risks are
  treated identically: displayed at checkpoints as passive documentation with no
  behavioral consequence. Issue #250 requires: (1) a typed risk schema with
  LTM/KB-grounded classification carried in every risk entry, and (2) action-driven
  handling where approval-required risks auto-trigger a focused checkpoint before
  implementation regardless of the --approve-plan flag.

solution_summary: |
  Add 5 targeted changes to core/components/plays/enhance/reference/intent.yaml
  only — no SKILL.md edit; recompilation via /create-play --build enhance is a
  separate follow-up step. The changes are:
  (1) Extend C7 to enumerate all required risk fields including type and action.
  (2) Add C19: Risk Classification Constraint — every risk in approach.yaml must
      carry type (technical|business|architectural), action (eval-driven|approval-
      required|monitor-only), ltm_reference (path or null), mitigation, and
      generated_evals (populated for eval-driven risks). Tech-designer consults
      LTM/KB when classifying. Default fallback: type:technical, action:monitor-only.
  (3) Add C20: Auto-triggered Risk Checkpoint — when any risk has action:
      approval-required, a focused checkpoint fires before implementation showing
      ONLY those risks. Non-configurable; orthogonal to --approve-plan (C9).
  (4) Add F11: Failure condition for missing the approval-required checkpoint.
  (5) Add S8: Scenario illustrating the approval-required risk flow end-to-end.

files_to_create: []

files_to_modify:
  - path: core/components/plays/enhance/reference/intent.yaml
    changes: |
      (1) Extend C7 rule text: append a sub-list under "risks" naming the full
      required schema — description, mitigation, type (technical|business|
      architectural), action (eval-driven|approval-required|monitor-only),
      ltm_reference (string path or null), generated_evals (list, populated when
      action is eval-driven). Keep all existing C7 field enumerations intact.
      (2) Add C19 after C8 in the Approach Design section. C19 covers: risk schema
      requirements, type taxonomy, action taxonomy, LTM/KB grounding rule (tech-
      designer MUST search LTM before assigning type; if standard found, set
      ltm_reference to path), eval-driven propagation rule (generated_evals entries
      from eval-driven risks appended to top-level evals list at approach design
      time), backward compatibility default (type:technical, action:monitor-only),
      and override allowance with justification.
      (3) Add C20 after C10 in the Mid-Checkpoint section. C20 covers: unconditional
      checkpoint trigger when approval-required risks present, display scope (only
      approval-required risks and their context), user Tether/Vanish semantics, and
      explicit orthogonality with C9 (both can fire on the same run).
      (4) Add F11 after F10 in the failure_conditions section. F11 condition: one or
      more risks have action:approval-required but the focused risk checkpoint (C20)
      was skipped before implementation. Non-configurable — fires regardless of
      --approve-plan, unlike F8.
      (5) Add S8 after S7 in the scenarios section. S8: persona "Developer with an
      architectural risk flagged approval-required"; given approach.yaml contains a
      risk with type:architectural and action:approval-required and --approve-plan is
      NOT set; then focused checkpoint fires automatically showing only that risk;
      user Tethers to proceed or Vanishes to halt and redesign.

connections:
  - C20 (auto-triggered risk checkpoint) and C9 (configurable mid-checkpoint) are
    orthogonal gates — both can fire on the same run if --approve-plan is set AND
    an approval-required risk exists; C9 shows the full plan, C20 shows only
    the approval-required risks.
  - F11 (missing risk checkpoint) mirrors F8 (mid-checkpoint skipped when ON) but
    targets the unconditional C20 path rather than the configurable C9 path;
    F11 can fire independently of F8.
  - C19's eval-driven propagation rule feeds into C13 (self-eval) — generated_evals
    from eval-driven risks are appended to the approach.yaml evals list at approach
    design time so C13's self-eval runner captures them automatically.
  - S8 (approval-required risk scenario) complements S5 (--approve-plan scenario) —
    S5 is user-requested full plan review; S8 is play-auto-triggered risk-only review;
    together they cover all mid-implementation human review paths.
  - C19's backward compatibility default (type:technical, action:monitor-only) ensures
    existing approach.yaml files from prior enhance runs remain valid without migration.

tasks:
  - id: 1
    name: Extend C7 with full risk schema field enumeration
    description: |
      Edit the C7 rule text to add type, action, ltm_reference, and generated_evals
      to the required fields in the risks section of approach.yaml. Append a sub-list
      under the risks entry: description (string), mitigation (string), type
      (technical|business|architectural), action (eval-driven|approval-required|
      monitor-only), ltm_reference (string path or null), generated_evals (list,
      populated when action is eval-driven). Keep all existing C7 field enumerations
      intact — this is an additive change only.
    depends_on: []

  - id: 2
    name: Add C19 (Risk Classification Constraint) to intent.yaml
    description: |
      Insert C19 after C8 in the Approach Design constraints section. C19 rule text
      must define:
      (a) Every risk MUST carry: type, action, ltm_reference, mitigation, description,
          and generated_evals fields.
      (b) type taxonomy: technical (code/system-level), business (process/outcome-
          level), architectural (component boundary/design-decision-level).
      (c) action taxonomy: eval-driven (risk covered by evals — generated_evals
          populated), approval-required (risk blocks implementation without human
          approval via focused C20 checkpoint), monitor-only (documented, no blocking
          gate).
      (d) LTM/KB grounding rule: tech-designer MUST search LTM before assigning type;
          if a relevant standard is found, set ltm_reference to the path; if not, set
          ltm_reference to null.
      (e) eval-driven propagation: for each risk with action:eval-driven, all entries
          in generated_evals MUST be appended to the top-level evals list in
          approach.yaml at approach design time so C13 self-eval captures them.
      (f) Backward compatibility: risks without explicit type/action in existing
          approach.yaml files default to type:technical, action:monitor-only at runtime.
      (g) Override: type and action may differ from defaults with justification
          documented in mitigation or ltm_reference.
    depends_on: [1]

  - id: 3
    name: Add C20 (Auto-triggered Risk Checkpoint) to intent.yaml
    description: |
      Insert C20 after C10 in the Mid-Checkpoint constraints section. C20 rule text
      must define:
      (a) When approach.yaml contains any risk with action:approval-required, a
          focused risk checkpoint MUST fire before implementation begins.
      (b) Non-configurable — fires regardless of --approve-plan (C9) flag.
      (c) The checkpoint displays ONLY the approval-required risks and their fields
          (type, description, mitigation, ltm_reference) — not the full approach plan.
      (d) User Tethers to proceed to implementation or Vanishes to halt.
      (e) Explicit orthogonality statement: C9 and C20 are independent gates; both
          can fire on the same run when --approve-plan is set and approval-required
          risks are present.
    depends_on: [2]

  - id: 4
    name: Add F11 (Missing Approval-required Checkpoint) to intent.yaml
    description: |
      Insert F11 after F10 in the failure_conditions section. F11 condition text:
      "One or more risks in approach.yaml have action:approval-required but the
      focused risk checkpoint (C20) was skipped and implementation proceeded." This
      is non-configurable — F11 fires regardless of --approve-plan flag, unlike F8
      which only applies when --approve-plan is set. Document explicitly that F8 and
      F11 are distinct and can both be violated on the same run.
    depends_on: [3]

  - id: 5
    name: Add S8 (Approval-required Risk Scenario) to intent.yaml
    description: |
      Insert S8 after S7 in the scenarios section. S8 must contain:
      persona: "Developer with an architectural risk flagged approval-required"
      given: "approach.yaml contains a risk with type:architectural and
              action:approval-required, and --approve-plan is NOT set."
      then: "A focused risk checkpoint fires automatically before implementation.
             The checkpoint displays only the approval-required risk(s) — showing
             type, description, mitigation, and ltm_reference. User Tethers to
             proceed to implementation or Vanishes to halt and redesign the approach."
      S8 must be distinct from S5: S5 tests the user-requested full plan review
      (--approve-plan ON); S8 tests the play-auto-triggered risk-only review.
    depends_on: [4]

evals:
  - id: E1
    description: C7 enumerates all required risk schema fields
    pass_criteria: |
      C7 rule text references type, action, ltm_reference, and generated_evals as
      required fields in the risks section of approach.yaml. All existing C7 field
      enumerations (problem_statement, solution_summary, files_to_create, etc.)
      are still present and unchanged.
    fail_criteria: |
      C7 does not mention type or action fields. OR any existing C7 fields were
      removed or altered.

  - id: E2
    description: C19 present with complete taxonomy, grounding rule, and propagation
    pass_criteria: |
      C19 rule text defines: type taxonomy (technical|business|architectural), action
      taxonomy (eval-driven|approval-required|monitor-only), LTM/KB consultation
      requirement with ltm_reference field, eval-driven propagation rule (generated_evals
      appended to evals list at approach design time), and backward compatibility
      default (type:technical, action:monitor-only).
    fail_criteria: |
      C19 missing any of: type taxonomy, action taxonomy, LTM/KB grounding rule,
      generated_evals propagation rule, OR backward compatibility default.

  - id: E3
    description: C20 present with correct unconditional checkpoint behavior
    pass_criteria: |
      C20 rule text specifies: fires when approval-required risks present (regardless
      of --approve-plan), shows ONLY approval-required risks, user Tethers or
      Vanishes, explicitly states orthogonality with C9.
    fail_criteria: |
      C20 makes checkpoint conditional on --approve-plan. OR C20 does not restrict
      display to approval-required risks only. OR C20 does not state orthogonality
      with C9.

  - id: E4
    description: F11 is a distinct, non-configurable failure condition
    pass_criteria: |
      F11 states that approval-required risks present but focused risk checkpoint
      skipped before implementation. F11 is listed separately from F8. F11 text
      does not reference --approve-plan as a required condition (it fires
      unconditionally, unlike F8).
    fail_criteria: |
      F11 merged with F8. OR F11 makes the checkpoint conditional on --approve-plan.
      OR F11 references the full mid-checkpoint rather than the focused risk
      checkpoint.

  - id: E5
    description: S8 scenario covers the approval-required risk flow end-to-end
    pass_criteria: |
      S8 has persona, given (type:architectural, action:approval-required, no
      --approve-plan flag), and then (focused checkpoint fires, shows only that
      risk, Tether to proceed or Vanish to redesign). S8 is distinct from S5.
    fail_criteria: |
      S8 missing persona, given, or then. OR S8 describes the full plan review
      instead of the focused risk-only checkpoint. OR S8 overlaps with S5's
      --approve-plan scenario.

  - id: E6
    description: eval-driven propagation rule is explicit and mandatory in C19
    pass_criteria: |
      C19 states the propagation rule as a mandatory step: for each risk with
      action:eval-driven, all generated_evals entries MUST be appended to the
      top-level evals list in approach.yaml at approach design time so C13
      self-eval captures them.
    fail_criteria: |
      C19 mentions generated_evals field but does not state the propagation rule
      to the top-level evals list. OR propagation timing is unspecified (design-
      time vs. runtime is ambiguous).

risks:
  - description: |
      C20 and C9 can both fire on the same run when --approve-plan is set AND an
      approval-required risk is present — two sequential checkpoint prompts may
      confuse the developer about which review they are approving and what each
      approval covers.
    type: technical
    action: eval-driven
    ltm_reference: null
    mitigation: |
      C20 rule text must explicitly state orthogonality with C9 and describe the
      distinction. The C20 checkpoint prompt heading must differentiate itself from
      the C9 full plan review: e.g., "Risk Checkpoint — approval-required risks
      only" vs. "Plan Review." S8 scenario must NOT set --approve-plan so the two
      checkpoints are exercised separately in their respective scenarios (S5 for
      C9, S8 for C20).
    generated_evals:
      - "E3 verifies C20 explicitly states orthogonality with C9 in the rule text"
      - "E5 verifies S8 scenario does not set --approve-plan (isolates C20 path from C9)"

  - description: |
      The backward compatibility default (type:technical, action:monitor-only)
      silently suppresses legitimate approval-required risks in existing approach.yaml
      files written before #250 — architectural risks that were not classified may
      default to monitor-only instead of being flagged for required approval review.
    type: business
    action: monitor-only
    ltm_reference: null
    mitigation: |
      C19 backward compatibility applies only to existing files at runtime; any new
      approach.yaml produced after #250 is merged MUST carry explicit type and action
      per C19. The default is a safe fallback for historical files, not a license to
      omit classification in new runs. C19 must make this distinction explicit.

  - description: |
      The generated_evals propagation rule is a behavioral contract in intent.yaml
      but must be followed by the tech-designer agent at approach design time. If
      the agent omits the propagation step, generated_evals remain orphaned in the
      risks section and C13 self-eval never fires the risk-linked eval criteria.
    type: technical
    action: eval-driven
    ltm_reference: null
    mitigation: |
      C19 must phrase the propagation rule as a MUST (mandatory), not a SHOULD.
      Eval E6 verifies the propagation rule is stated explicitly and mandatorily in
      C19. A follow-up SKILL.md recompilation (out of scope for #250) will enforce
      the rule mechanically in the compiled tech-designer invocation step.
    generated_evals:
      - "E6 verifies C19 states propagation as MUST (mandatory step, not optional)"
      - "Post-recompile eval: verify SKILL.md tech-designer step includes generated_evals merge into evals list"

alternatives_considered:
  - description: |
      Extend C9 (configurable mid-checkpoint) with a sub-condition for
      approval-required risks instead of adding a separate C20 constraint.
    rejection_reason: |
      Discovery Q&A (Q2) explicitly requires the approval-required checkpoint to be
      focused and lighter — showing only approval-required risks, not the full
      approach. Extending C9 conflates two orthogonal behaviors: user-requested full
      plan review vs. play-auto-triggered risk gate. Keeping them as C9 and C20
      makes each constraint independently readable, testable, and independently
      ignorable (C9 is off by default; C20 always fires when warranted).

  - description: |
      Define the risk type/action taxonomy in a new LTM standards file rather than
      encoding it in intent.yaml.
    rejection_reason: |
      The type/action taxonomy is specific to the enhance play's approach.yaml — not
      a global quality standard applicable across all plays. Encoding it in intent.yaml
      keeps the contract self-contained and avoids adding an enhance-specific schema
      to global LTM standards. If the taxonomy proves useful for other plays, it can
      be promoted to LTM at that point.

  - description: |
      Edit SKILL.md directly alongside intent.yaml to propagate risk classification
      into the compiled play in a single issue.
    rejection_reason: |
      Discovery.md Q&A (Q1) explicitly prohibits direct SKILL.md edits for this
      issue — SKILL.md is a compiled artifact; recompilation via /create-play --build
      enhance is a separate follow-up step. Mixing a direct SKILL.md edit here
      would violate the enhance play's own intent primacy principle: intent.yaml is
      the source of truth, SKILL.md is the compiled output. The risk of version
      drift from a direct edit is documented as Risk 1 in the #240 approach.
