  - id: "KC-004"
    title: "Context Isolation as a Security Invariant in Eval and Extraction Pipelines"
    type: "pattern"
    synthesized_from:
      - "eval-generator and judge agents NEVER receive ltm_context — any recipe passing it is a defect; isolation prevents specification gaming"
      - "Knowledge-extractor is read-only against its inputs — never modifies resolution traces or evidence artifacts to prevent feedback loops"
    source_issue: "182"
    source_trace_path: ".meridian/project/issues/182/evidence/prepare-implementation/resolution-trace.yaml"
    domain_question: "How should agent pipelines enforce information boundaries to prevent specification gaming and feedback loops?"
    llm_answer_summary: >
      Context isolation is a security invariant, not a preference. Two applications:
      (1) Eval agents (eval-generator, judge) NEVER receive ltm_context or
      implementation context — any recipe that passes this context is treated as a
      defect, because exposure enables specification gaming where evals are shaped to
      pass rather than to test. (2) Extraction agents are read-only against their
      inputs — the knowledge-extractor reads evidence but never modifies it, preventing
      feedback loops where extraction changes the data it extracted from. Both enforce
      the principle that agents which evaluate or extract from artifacts must not have
      write access to those artifacts.
    proposed_scope: "core"
    proposed_scope_rationale: "Context isolation for eval integrity and extraction purity is a general multi-agent security pattern — applicable wherever agents evaluate or extract from artifacts they could otherwise influence."
    dedup_status: "unique"
    dedup_conflict_path: null
    approval_status: "pending"
