    source_issue: "182"
    source_trace_path: ".meridian/project/issues/182/evidence/prepare-implementation/resolution-trace.yaml"
    domain_question: "How should work artifacts be converted into persistent organizational knowledge with appropriate quality gates, scope classification, and metadata standards?"
    llm_answer_summary: >
      A two-phase lifecycle: EXTRACT scans resolution traces for LLM-fallback
      decisions, synthesizes them into reusable patterns, and stages candidates in
      STM. PROMOTE requires mandatory human approval before writing to LTM.
      Classification uses heuristics (project-specific signals -> project scope,
      general patterns -> core scope, default to project when ambiguous) with required
      reasoning for every classification. Metadata is tiered — all files carry Tier 1
      (title, scope, search patterns, provenance); core files additionally carry
      Tier 2 (applicability boundaries, rationale, decay tracking with staleness
      window). Archival and extraction are co-located in the same recipe to share
      the issue-closure trigger.
