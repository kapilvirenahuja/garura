  - id: "KC-002"
    title: "Safe Protocol Extension via Optional Fields and Grandfathering"
    type: "pattern"
    synthesized_from:
      - "Optional contract fields with presence-gating — agent checks if field exists before activating new behavior, absence equals prior behavior"
      - "Grandfather existing artifacts — new files must conform, existing files not required to migrate, agents handle both formats"
      - "Conditional step gated on field presence for multi-agent protocol adoption — reference normative document, don't embed protocol logic"
    source_issue: "182"
    source_trace_path: ".meridian/project/issues/182/evidence/prepare-implementation/resolution-trace.yaml"
    domain_question: "How should new protocols, contract fields, and format standards be introduced across an existing multi-agent system without breaking callers or requiring flag-day migrations?"
    llm_answer_summary: >
      Three reinforcing strategies: (1) Add new contract fields as optional with
      presence-gating — agents check existence before activating new behavior, absence
      preserves prior behavior. (2) Grandfather existing artifacts — new files conform
      from day one, existing files are not required to migrate, agents read both formats.
      (3) Per-agent adoption via conditional steps that reference a single normative
      protocol document rather than embedding protocol logic in each agent definition.
    proposed_scope: "core"
    proposed_scope_rationale: "Backward-compatible protocol extension is a general software evolution pattern applicable to any multi-agent or multi-service system — not project-specific."
