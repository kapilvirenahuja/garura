# plan.yaml — Issue #182
# Sub-Agent Context Resolution Protocol, LTM Hierarchy Enforcement, and Learning Play
# Status: DRAFT
# Created: 2026-03-26
# Rewritten: 2026-03-26 — explicit task DAG with depends_on, parallel_with, per-task exit_gate

slug: "ltm-resolution"
status: "LOCKED"
created_at: "2026-03-26"
features_ref: ".meridian/project/issues/182/features.yaml"
tech_ref: ".meridian/project/issues/182/tech.yaml"

# ─────────────────────────────────────────────────────────────────────────────
# PREREQUISITES — Phase 0
# Directory structure that must exist before any file creation begins.
# ─────────────────────────────────────────────────────────────────────────────

prerequisites:
  - id: P0-S1
    description: "Create directory structure for new play"
    key_files:
      - path: "core/components/plays/learn/"
        action: create_directory
      - path: "core/components/plays/learn/reference/"
        action: create_directory
    exit_gate: "core/components/plays/learn/ and core/components/plays/learn/reference/ directories exist. All other target directories (core/components/memory/standards/, core/components/agents/, core/components/plays/, docs/adr/) confirmed present."

# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION ORDER — Explicit task DAG
# Each task has: id, feature_id, description, scope_items with key_files,
# depends_on, exit_gate, and (where applicable) parallel_with + scenario_gate.
# ─────────────────────────────────────────────────────────────────────────────

execution_order:

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 1 — Standards + Contract Schema
  # T1.1 and T1.1b are independent and run in parallel.
  # T1.2 depends on T1.1 (resolution-protocol.md must exist first).
  # T1.3 deploys all three outputs of T1.1, T1.1b, T1.2.
  # ─────────────────────────────────────────────────────────────────────────

  - id: T1.1
    feature_id: F1
    description: "Create resolution-protocol.md standard"
    scope_items:
      - description: "Define R1-R4 protocol, resolution trace schema, not-found semantics, conflict resolution, context-isolation exemptions, backward-compatibility guarantee"
        key_files:
          - path: "core/components/memory/standards/resolution-protocol.md"
            action: new
          - path: "core/components/memory/standards/_index.md"
            action: modify
    depends_on: []
    parallel_with: ["T1.1b"]
    exit_gate: "File defines R1-R4 steps, trace schema with 5 fields (resolved_from, authority, source_path, domain, flagged_stale), not-found semantics table, conflict resolution rules, context-isolation exemptions for eval-generator and judge, and backward-compatibility guarantee"
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T1.1b
    feature_id: F4
    description: "Create knowledge-file-template.md standard"
    scope_items:
      - description: "Define Tier 1/Tier 2 metadata, decay rules, naming convention, discoverability, index registration convention, grandfathering rule"
        key_files:
          - path: "core/components/memory/standards/knowledge-file-template.md"
            action: new
          - path: "core/components/memory/standards/_index.md"
            action: modify
    depends_on: []
    parallel_with: ["T1.1"]
    exit_gate: "File defines Tier 1 required fields (title, search_patterns, when_applies, when_not_applies, content, why_it_matters, provenance, created), Tier 2 core-required fields (applicability_boundaries, rationale, last_validated, confidence, staleness_window, supersedes), staleness threshold with flagging-not-rejection rule, naming convention, index registration requirement, and grandfathering rule for existing files"
    scenario_gate:
      scenario_ids: ["S18", "S19", "S20"]
      count: 3

  - id: T1.2
    feature_id: F1
    description: "Extend agent-contract.md with ltm_context and resolution_trace"
    scope_items:
      - description: "Add ltm_context to input contract (optional, 4 sub-fields: project_base, core_base, query_domains, locked_artifacts), add resolution_trace_path to output contract (optional, path to STM file), add Knowledge Context section explaining when to populate ltm_context, which agents receive it, and unconditional exemptions (eval-generator, judge)"
        key_files:
          - path: "core/components/memory/standards/agent-contract.md"
            action: modify
    depends_on: ["T1.1"]
    parallel_with: []
    exit_gate: "ltm_context field documented as optional input with sub-fields project_base, core_base, query_domains, locked_artifacts. resolution_trace_path documented as optional output path. Knowledge Context section references resolution-protocol.md. No existing fields modified."
    scenario_gate:
      scenario_ids: ["S1"]
      count: 1

  - id: T1.3
    feature_id: F1
    description: "Deploy updated standards via /sync-claude"
    scope_items:
      - description: "Run /sync-claude (global mode) to deploy resolution-protocol.md, knowledge-file-template.md, and updated agent-contract.md to ~/.meridian/core/memory/standards/"
        key_files: []
    depends_on: ["T1.1", "T1.1b", "T1.2"]
    parallel_with: []
    exit_gate: "Source and deployed copies of all 3 files are identical. ~/.meridian/core/memory/standards/ contains resolution-protocol.md and knowledge-file-template.md (new) and updated agent-contract.md."
    scenario_gate:
      scenario_ids: []
      count: 0

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 2 — Agent Protocol Updates
  # T2.1 through T2.5 are all independent — parallel execution permitted.
  # T2.6 deploys after all five agent files are updated.
  # ─────────────────────────────────────────────────────────────────────────

  - id: T2.1
    feature_id: F2
    description: "Update tech-designer with R1-R4 protocol"
    scope_items:
      - description: "Add Knowledge Resolution Protocol section referencing resolution-protocol.md. When ltm_context present: R1 (identify decision domains from query_domains), R2 (query project_base — LOCKED=authoritative, DRAFT=advisory), R3 (query core_base — advisory), R4 (flag LLM fallback). Replace ad-hoc LTM loading steps with standardized R1-R4. Add resolution_trace_path to output contract. Backward-compatible when ltm_context absent."
        key_files:
          - path: "core/components/agents/tech-designer.md"
            action: modify
    depends_on: ["T1.3"]
    parallel_with: ["T2.2", "T2.3", "T2.4", "T2.5"]
    exit_gate: "Agent references resolution-protocol.md, has R1-R4 in Context Loading section, output contract includes resolution_trace_path, no behavioral change when ltm_context absent"
    scenario_gate:
      scenario_ids: ["S2", "S3", "S4", "S5"]
      count: 4

  - id: T2.2
    feature_id: F2
    description: "Update product-strategist with R1-R4 protocol"
    scope_items:
      - description: "Same R1-R4 pattern as T2.1. Replace ad-hoc LTM loading Steps 1-8 with standardized protocol. Update skills wiring to use ltm_context paths from contract rather than autonomously discovered paths. Add resolution_trace_path to output contract. Flag web research in trace. Backward-compatible."
        key_files:
          - path: "core/components/agents/product-strategist.md"
            action: modify
    depends_on: ["T1.3"]
    parallel_with: ["T2.1", "T2.3", "T2.4", "T2.5"]
    exit_gate: "Agent references resolution-protocol.md, has R1-R4, output contract includes resolution_trace_path, no behavioral change when ltm_context absent"
    scenario_gate:
      scenario_ids: ["S2", "S3", "S4", "S5"]
      count: 4

  - id: T2.3
    feature_id: F2
    description: "Update code-builder with optional ltm_context awareness"
    scope_items:
      - description: "Lightest change. Add LTM Context (Optional) section. When ltm_context present, check standards path within core_base for coding conventions before generating code. Advisory only — no full R1-R4. No resolution_trace_path required."
        key_files:
          - path: "core/components/agents/code-builder.md"
            action: modify
    depends_on: ["T1.3"]
    parallel_with: ["T2.1", "T2.2", "T2.4", "T2.5"]
    exit_gate: "Agent has LTM Context (Optional) section, no behavioral change when ltm_context absent, no resolution_trace_path requirement"
    scenario_gate:
      scenario_ids: ["S6"]
      count: 1

  - id: T2.4
    feature_id: F2
    description: "Update quality-auditor with optional ltm_context awareness"
    scope_items:
      - description: "Minimal change. Add LTM Context (Optional) section. When ltm_context present, check standards path for quality conventions supplementing quality_gates_path. Advisory only. No R1-R4. No resolution_trace_path. Context isolation maintained."
        key_files:
          - path: "core/components/agents/quality-auditor.md"
            action: modify
    depends_on: ["T1.3"]
    parallel_with: ["T2.1", "T2.2", "T2.3", "T2.5"]
    exit_gate: "Agent has LTM Context (Optional) section, no behavioral change when ltm_context absent, context isolation boundary unchanged"
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T2.5
    feature_id: F2
    description: "Update repo-orchestrator with R1-R4 protocol"
    scope_items:
      - description: "Add Knowledge Resolution Protocol section referencing resolution-protocol.md. Focus domains: branching rules, PR conventions, commit message standards. Replace existing prose-level single-file reference to standards/git/branching.md with structured R1-R4 resolution against ltm_context.project_base (then core_base). Add resolution_trace_path to output contract. Backward-compatible."
        key_files:
          - path: "core/components/agents/repo-orchestrator.md"
            action: modify
    depends_on: ["T1.3"]
    parallel_with: ["T2.1", "T2.2", "T2.3", "T2.4"]
    exit_gate: "Agent references resolution-protocol.md, has R1-R4 reference, output contract includes resolution_trace_path, no behavioral change when ltm_context absent"
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T2.6
    feature_id: F2
    description: "Deploy updated agents via /sync-claude"
    scope_items:
      - description: "Run /sync-claude after all five agent files are updated to deploy to ~/.claude/agents/"
        key_files: []
    depends_on: ["T2.1", "T2.2", "T2.3", "T2.4", "T2.5"]
    parallel_with: []
    exit_gate: "All 5 agent files deployed to ~/.claude/agents/. tech-designer, product-strategist, repo-orchestrator have R1-R4 sections. code-builder, quality-auditor have optional ltm_context sections."
    scenario_gate:
      scenario_ids: []
      count: 0

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 3 — Play Contract Updates
  # T3.1 through T3.7 are all independent — parallel execution permitted.
  # T3.8 deploys after all seven play files are updated.
  # ─────────────────────────────────────────────────────────────────────────

  - id: T3.1
    feature_id: F2
    description: "Add ltm_context to discover-product contracts"
    scope_items:
      - description: "Add ltm_context field to product-strategist dispatch contract. project_base: .meridian/product/discovery/, core_base: ~/.meridian/core/memory/, query_domains: [domain-taxonomy, standards]. No locked_artifacts — all discovery-stage knowledge is advisory."
        key_files:
          - path: "core/components/plays/discover-product/SKILL.md"
            action: modify
    depends_on: ["T2.6"]
    parallel_with: ["T3.2", "T3.3", "T3.4", "T3.5", "T3.6", "T3.7"]
    exit_gate: "All product-strategist dispatch contracts in the play have ltm_context field"
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T3.2
    feature_id: F2
    description: "Add ltm_context to plan-roadmap contracts"
    scope_items:
      - description: "Add ltm_context to product-strategist and tech-designer dispatch contracts. project_base: .meridian/product/roadmap/, core_base: ~/.meridian/core/memory/, query_domains: [architecture, standards, domain-taxonomy]."
        key_files:
          - path: "core/components/plays/plan-roadmap/SKILL.md"
            action: modify
    depends_on: ["T2.6"]
    parallel_with: ["T3.1", "T3.3", "T3.4", "T3.5", "T3.6", "T3.7"]
    exit_gate: "product-strategist and tech-designer dispatch contracts both have ltm_context field"
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T3.3
    feature_id: F2
    description: "Replace ad-hoc paths in prepare-architecture"
    scope_items:
      - description: "Remove config.ltm_architecture_path field from Step 2 tech-designer dispatch contract. Replace with standard ltm_context: project_base: .meridian/product/architecture/, core_base: ~/.meridian/core/memory/, query_domains: [architecture, standards], locked_artifacts: any locked architecture decisions."
        key_files:
          - path: "core/components/plays/prepare-architecture/SKILL.md"
            action: modify
    depends_on: ["T2.6"]
    parallel_with: ["T3.1", "T3.2", "T3.4", "T3.5", "T3.6", "T3.7"]
    exit_gate: "Zero references to config.ltm_architecture_path remain in the file. Standard ltm_context field present in tech-designer dispatch contract."
    scenario_gate:
      scenario_ids: ["S9"]
      count: 1

  - id: T3.4
    feature_id: F2
    description: "Replace ad-hoc paths in prepare-implementation"
    scope_items:
      - description: "Remove context block containing ltm_path and scan_directories fields from Step 3 tech-designer dispatch contract. Replace with standard ltm_context: project_base: .meridian/product/architecture/, core_base: ~/.meridian/core/memory/, query_domains: [standards, knowledge, formats]."
        key_files:
          - path: "core/components/plays/prepare-implementation/SKILL.md"
            action: modify
    depends_on: ["T2.6"]
    parallel_with: ["T3.1", "T3.2", "T3.3", "T3.5", "T3.6", "T3.7"]
    exit_gate: "Zero references to context.ltm_path or scan_directories remain. Standard ltm_context field present in tech-designer dispatch contract."
    scenario_gate:
      scenario_ids: ["S9"]
      count: 1

  - id: T3.5
    feature_id: F2
    description: "Add ltm_context to implement-epic contracts"
    scope_items:
      - description: "Add ltm_context to tech-designer (Context Builder step), code-builder, and quality-auditor dispatch contracts. project_base: .meridian/product/architecture/, core_base: ~/.meridian/core/memory/. query_domains per agent: tech-designer [architecture, standards, knowledge], code-builder [standards], quality-auditor [standards]. IMPORTANT: do NOT add ltm_context to eval-generator or judge contracts — context isolation invariant."
        key_files:
          - path: "core/components/plays/implement-epic/SKILL.md"
            action: modify
    depends_on: ["T2.6"]
    parallel_with: ["T3.1", "T3.2", "T3.3", "T3.4", "T3.6", "T3.7"]
    exit_gate: "tech-designer, code-builder, quality-auditor dispatch contracts have ltm_context. eval-generator and judge dispatch contracts do NOT have ltm_context."
    scenario_gate:
      scenario_ids: ["S8", "S9", "S10", "S11"]
      count: 4

  - id: T3.6
    feature_id: F2
    description: "Add ltm_context to commit-code contracts"
    scope_items:
      - description: "Add ltm_context to repo-orchestrator dispatch contract. project_base: .meridian/product/architecture/, core_base: ~/.meridian/core/memory/, query_domains: [standards/git]."
        key_files:
          - path: "core/components/plays/commit-code/SKILL.md"
            action: modify
    depends_on: ["T2.6"]
    parallel_with: ["T3.1", "T3.2", "T3.3", "T3.4", "T3.5", "T3.7"]
    exit_gate: "repo-orchestrator dispatch contract has ltm_context field with query_domains: [standards/git]"
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T3.7
    feature_id: F2
    description: "Add ltm_context to create-pr contracts"
    scope_items:
      - description: "Add ltm_context to repo-orchestrator dispatch contract. Same structure as commit-code: project_base: .meridian/product/architecture/, core_base: ~/.meridian/core/memory/, query_domains: [standards/git]."
        key_files:
          - path: "core/components/plays/create-pr/SKILL.md"
            action: modify
    depends_on: ["T2.6"]
    parallel_with: ["T3.1", "T3.2", "T3.3", "T3.4", "T3.5", "T3.6"]
    exit_gate: "repo-orchestrator dispatch contract has ltm_context field with query_domains: [standards/git]"
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T3.8
    feature_id: F2
    description: "Deploy updated plays via /sync-claude"
    scope_items:
      - description: "Run /sync-claude after all seven play files are updated to deploy to ~/.claude/skills/. Verify no play dispatches eval-generator or judge with ltm_context."
        key_files: []
    depends_on: ["T3.1", "T3.2", "T3.3", "T3.4", "T3.5", "T3.6", "T3.7"]
    parallel_with: []
    exit_gate: "All 7 play SKILL.md files deployed to ~/.claude/skills/. Zero references to config.ltm_architecture_path or context.ltm_path in deployed copies. No play dispatches eval-generator or judge with ltm_context."
    scenario_gate:
      scenario_ids: []
      count: 0

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 4 — Learning Play
  # T4.1 depends on T1.1b (knowledge-file-template.md must exist).
  # T4.1 is independent of T3.8 — can run in parallel with Phase 3.
  # T4.2 → T4.3 → T4.4 → T4.5 are sequential.
  # ─────────────────────────────────────────────────────────────────────────

  - id: T4.1
    feature_id: F3
    description: "Create knowledge-extractor agent"
    scope_items:
      - description: "New agent with two operating modes. EXTRACT mode: accepts resolution trace file paths from STM, scans for resolved_from==llm entries, extracts each as knowledge_candidate, classifies proposed_scope (project vs core), deduplicates against project_base and core_base, sets dedup_status, writes candidates.yaml to STM. WRITE mode: accepts approved candidates.yaml (approval_status==approved only), writes each to correct knowledge layer in canonical knowledge-file-template.md format (Tier 1 always, Tier 2 for core-scoped), registers in appropriate index. INV2: never writes without explicit approval_status field set to approved. Read-only against resolution traces and evidence."
        key_files:
          - path: "core/components/agents/knowledge-extractor.md"
            action: new
    depends_on: ["T1.1b"]
    parallel_with: []
    exit_gate: "Agent file exists with EXTRACT and WRITE modes clearly defined. WRITE mode boundary explicitly states no writes without approval_status=approved. Agent never writes directly to LTM — only to STM staging."
    scenario_gate:
      scenario_ids: ["S12"]
      count: 1

  - id: T4.2
    feature_id: F3
    description: "Create learn play intent.yaml"
    scope_items:
      - description: "Intent definition following canonical 4-field schema (intent, constraints, failure_conditions, scenarios). Intent: surface LLM-fallback decisions from resolution traces and promote approved candidates to persistent LTM. Constraints: INV2 (no writes without human approval), INV4 (no context-isolated agent receives promoted knowledge), INV5 (scope classification respects project-over-core), read-only against resolution traces and evidence. Failure conditions: knowledge written without approval, llm-fallback entries not surfaced, project-scoped candidate written to core layer, duplicate presented without dedup flag, play modifies input artifacts. References PENDING constraints C5-C10 from capture-learning/reference/intent.yaml as the learn play's implementation mandate."
        key_files:
          - path: "core/components/plays/learn/reference/intent.yaml"
            action: new
    depends_on: ["T4.1"]
    parallel_with: []
    exit_gate: "intent.yaml exists with all 4 canonical fields. All constraint and failure condition IDs are present and falsifiable. C5-C10 from capture-learning referenced."
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T4.3
    feature_id: F3
    description: "Compile learn SKILL.md via /create-play"
    scope_items:
      - description: "Structure B atomic play (max 2 agent calls). Step 1 (Extract): dispatch knowledge-extractor in EXTRACT mode with resolution trace paths from STM — produces candidates.yaml. Step 2 (Promote): present candidates.yaml to operator for Tether/Vanish approval. Operator sets approval_status per candidate. On Tether: dispatch knowledge-extractor in WRITE mode with approved candidates only. On Vanish: abort, no writes. Play is read-only against resolution traces and evidence throughout."
        key_files:
          - path: "core/components/plays/learn/SKILL.md"
            action: new
    depends_on: ["T4.2"]
    parallel_with: []
    exit_gate: "SKILL.md exists, follows Structure B, has human checkpoint (Tether/Vanish) before any writes, dispatches knowledge-extractor exactly twice (EXTRACT + WRITE), never dispatches eval-generator or judge"
    scenario_gate:
      scenario_ids: ["S13", "S14", "S15", "S16", "S17"]
      count: 5

  - id: T4.4
    feature_id: F3
    description: "Update capture-learning to activate C5-C10"
    scope_items:
      - description: "Remove PENDING markers from C5-C10 in capture-learning intent.yaml. Change status from PENDING to RESOLVED. Add reference: Resolved by: core/components/plays/learn/ (Issue #182). No other changes."
        key_files:
          - path: "core/components/plays/capture-learning/reference/intent.yaml"
            action: modify
    depends_on: ["T4.3"]
    parallel_with: []
    exit_gate: "C5-C10 constraints in capture-learning/reference/intent.yaml have status RESOLVED with reference to learn play. No other content changed."
    scenario_gate:
      scenario_ids: []
      count: 0

  - id: T4.5
    feature_id: F3
    description: "Deploy learn play and knowledge-extractor via /sync-claude"
    scope_items:
      - description: "Run /sync-claude to deploy knowledge-extractor.md to ~/.claude/agents/ and learn/SKILL.md to ~/.claude/skills/."
        key_files: []
    depends_on: ["T4.3", "T4.4"]
    parallel_with: []
    exit_gate: "knowledge-extractor.md deployed to ~/.claude/agents/. learn/SKILL.md deployed to ~/.claude/skills/ and invocable as a skill."
    scenario_gate:
      scenario_ids: []
      count: 0

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 5 — Validation + ADR
  # T5.1 (end-to-end validation) depends on T3.8 and T4.5.
  # T5.2 (ADR) depends on T5.1 (documents decisions finalized across all phases).
  # ─────────────────────────────────────────────────────────────────────────

  - id: T5.1
    feature_id: F1
    description: "End-to-end validation"
    scope_items:
      - description: "Run verification steps from scenarios.yaml S1-S22. Test: backward compat (ltm_context absent), R1-R4 resolution ordering, locked vs draft authority, context isolation (eval-generator and judge never receive ltm_context), ad-hoc reference elimination, learn play full flow, knowledge file tier metadata."
        key_files: []
    depends_on: ["T3.8", "T4.5"]
    parallel_with: []
    exit_gate: "All 22 acceptance scenarios pass. No play dispatches eval-generator or judge with ltm_context. Resolution traces contain resolved_from values. learn play runs end-to-end without errors."
    scenario_gate:
      scenario_ids: ["S1", "S2", "S3", "S4", "S5", "S6", "S7", "S8", "S9", "S10", "S11", "S12", "S13", "S14", "S15", "S16", "S17", "S18", "S19", "S20", "S21", "S22"]
      count: 22

  - id: T5.2
    feature_id: F1
    description: "Write ADR 015 — LTM Resolution Protocol"
    scope_items:
      - description: "Architecture Decision Record documenting: DD1 (optional contract field vs required), DD3 (context-isolation exemptions for eval-generator and judge), DD4 (file-reads-only, no LLM calls during resolution), DD5 (R1-R4 ordering and authority semantics), DD6 (project-scoped overrides core-scoped), DD7 (staleness tracking without auto-rejection), DD8 (learn play as separate concern from capture-learning), DD9 (existing files grandfathered), DD10 (resolution trace written to STM artifact not inline). Status: ACCEPTED. Related ADRs: 009, 001."
        key_files:
          - path: "docs/adr/015-ltm-resolution-protocol.md"
            action: new
    depends_on: ["T5.1"]
    parallel_with: []
    exit_gate: "ADR exists, status ACCEPTED, covers DD1-DD10 decisions, references related ADRs 009 and 001"
    scenario_gate:
      scenario_ids: []
      count: 0

# ─────────────────────────────────────────────────────────────────────────────
# DAG VISUALIZATION
# ─────────────────────────────────────────────────────────────────────────────

dag: |
  T1.1 ──┐
  T1.1b ─┤→ T1.2 → T1.3 → T2.1 ──┐
         │                   T2.2 ──┤
         │                   T2.3 ──┤→ T2.6 → T3.1 ──┐
         │                   T2.4 ──┤          T3.2 ──┤
         │                   T2.5 ──┘          T3.3 ──┤
         │                                     T3.4 ──┤→ T3.8 ──┐
         │                                     T3.5 ──┤          │
         │                                     T3.6 ──┤          │
         │                                     T3.7 ──┘          │
         │                                                       │→ T5.1 → T5.2
         └→ T4.1 → T4.2 → T4.3 → T4.4 → T4.5 ─────────────────┘

# ─────────────────────────────────────────────────────────────────────────────
# SUMMARY
# ─────────────────────────────────────────────────────────────────────────────

summary:
  total_tasks: 18
  tasks_by_phase:
