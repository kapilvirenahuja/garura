feature_gates:
  F1: ["S1", "S2", "S3", "S4", "S5", "S6", "S7"]
  F2: ["S8", "S9", "S10", "S11"]
  F3: ["S12", "S13", "S14", "S15", "S16", "S17"]
  F4: ["S18", "S19", "S20", "S21", "S22"]
