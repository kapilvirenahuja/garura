step_evals:
  # --- Archival failure conditions ---
  - id: SE-1
    source_type: both
    failure_condition_id: F1
    constraint_id: C2
    skill: archive-issue-stm
    check: "Archive directory exists at {stm_archive}/{YYYY-MM}/{issue}/ and is non-empty"
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue}/"
    pass_criteria: "Directory exists, contains files and subdirectories matching original STM content"
    fail_criteria: "Directory does not exist or is empty after archival completes"

  - id: SE-2
    source_type: both
    failure_condition_id: F2
    constraint_id: C3
    skill: archive-issue-stm
    check: "Original STM directory at {stm_base}/{issue}/ no longer exists"
    artifact_pattern: "{stm_base}/{issue}/"
    pass_criteria: "Directory does not exist at active workspace location"
    fail_criteria: "Directory still exists at active workspace location after archival"

  - id: SE-3
    source_type: both
    failure_condition_id: F3
    constraint_id: C4
    skill: archive-issue-stm
    check: "Archive directory structure mirrors original — no files renamed, restructured, or modified during the move"
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue}/"
    pass_criteria: "Same file count and directory structure as original STM directory; no files renamed or restructured"
    fail_criteria: "Files or subdirectories present in original are missing from archive, or structure differs"

  - id: SE-4
    source_type: failure_condition
    failure_condition_id: F4
    constraint_id: null
    skill: archive-issue-stm
    check: "{YYYY-MM} in archive path matches the issue's actual close date"
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue}/"
    pass_criteria: "Archive path YYYY-MM segment matches closedAt date from issue state"
    fail_criteria: "Archive path uses incorrect date — YYYY-MM does not match issue's closedAt"

  - id: SE-5
    source_type: failure_condition
    failure_condition_id: F5
    constraint_id: null
    skill: manage-issue
    check: "Issue state is CLOSED before archival proceeds"
    artifact_pattern: "{stm_base}/{issue}/evidence/capture-learning/issue-state.yaml"
    pass_criteria: "Issue state field is 'CLOSED'"
    fail_criteria: "Issue state is not 'CLOSED' — recipe attempted to archive a non-closed issue"

  # --- Extraction failure conditions ---
  - id: SE-6
    source_type: failure_condition
    failure_condition_id: F6
    constraint_id: null
    skill: knowledge-extractor
    check: "No knowledge files written to LTM without human approval — only candidates with approval_status 'approved' are written"
    artifact_pattern: "{ltm_context.project_base}/knowledge/*.md AND {ltm_context.core_base}/knowledge/*.md"
    pass_criteria: "Every written knowledge file traces to a candidate with approval_status 'approved' in candidates.yaml"
    fail_criteria: "Knowledge written to LTM without corresponding approved candidate — candidates bypassed staging and review"

  - id: SE-7
    source_type: both
    failure_condition_id: F7
    constraint_id: C6
    skill: knowledge-extractor
    check: "Existing knowledge is updated rather than duplicated — de-duplication check precedes every proposed write"
    artifact_pattern: "{stm_base}/{issue}/evidence/capture-learning/candidates.yaml"
    pass_criteria: "Every candidate has dedup_status field set (unique, near-duplicate, or duplicate); duplicates excluded from approval queue"
    fail_criteria: "Duplicate knowledge file created when existing file covers same topic — deduplication skipped or failed"

  - id: SE-8
    source_type: both
    failure_condition_id: F8
    constraint_id: C7
    skill: knowledge-extractor
    check: "Every knowledge artifact passes the validation checklist defined in knowledge-file-template.md for its type"
    artifact_pattern: "{ltm_context.project_base}/knowledge/*.md AND {ltm_context.core_base}/knowledge/*.md"
    pass_criteria: "Each written file passes its type's validation checklist (Pattern Template for synthesized patterns, Generic Template otherwise)"
    fail_criteria: "Knowledge file fails validation checklist — required sections or metadata are absent"

  - id: SE-9
    source_type: both
    failure_condition_id: F9
    constraint_id: C14
    skill: knowledge-extractor
    check: "Every knowledge file written to LTM has a corresponding entry in _index.md in its target directory"
    artifact_pattern: "{ltm_context.project_base}/knowledge/_index.md AND {ltm_context.core_base}/knowledge/_index.md"
    pass_criteria: "Each written knowledge file has an entry in the appropriate _index.md"
    fail_criteria: "_index.md not updated after knowledge file written — file is undiscoverable"

  - id: SE-10
    source_type: both
    failure_condition_id: F10
    constraint_id: C10
    skill: knowledge-extractor
    check: "Classification (project vs core) is deliberate with stated reasoning for every candidate"
    artifact_pattern: "{stm_base}/{issue}/evidence/capture-learning/candidates.yaml"
    pass_criteria: "Every candidate has proposed_scope set AND proposed_scope_rationale is non-empty"
    fail_criteria: "Candidate marked project or core with no classification_reason (proposed_scope_rationale missing or empty)"

  - id: SE-11
    source_type: both
    failure_condition_id: F11
    constraint_id: C13
    skill: knowledge-extractor
    check: "Knowledge candidates are synthesized patterns, not individual decision records; target 3-5 per extraction, not 10-20"
    artifact_pattern: "{stm_base}/{issue}/evidence/capture-learning/candidates.yaml"
    pass_criteria: "Candidates are synthesized patterns with When to Choose, When to Avoid, Key Components, and Tradeoffs; no more than 7 candidates from a single issue; each consolidates multiple related decisions"
    fail_criteria: "Candidates are individual decision records documenting single choices without consolidation; output has more than 7 candidates from a single issue"

  # --- Artifact-verifiable constraint evals (not already covered above) ---
  - id: SE-12
    source_type: constraint
    failure_condition_id: null
    constraint_id: C15
    skill: knowledge-extractor
    check: "When no resolution traces with resolved_from='llm' entries exist, extraction exits cleanly with zero candidates and no LTM writes"
    artifact_pattern: "{stm_base}/{issue}/evidence/capture-learning/candidates.yaml"
    pass_criteria: "candidates.yaml contains empty candidate list; summary.unique_candidates is 0; no knowledge files written to LTM; evidence records the zero-candidate outcome"
    fail_criteria: "Extraction fails or produces spurious candidates when no resolved_from='llm' entries exist"

scenario_evals:
  - id: SCE-1
    scenario_id: S1
    persona: "Engineering lead reviewing agent-produced work"
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue}/"
    check: "Archived directory is browsable, preserves original structure, contains all files (evidence, checkpoint, planning, spec, design, delivery)"
    pass_criteria: "Complete history of issue work is reviewable at archive location — nothing lost during archival"
    fail_criteria: "Archive is missing files or subdirectories; history is incomplete or inaccessible"

  - id: SCE-2
    scenario_id: S2
    persona: "Developer starting the next feature"
    artifact_pattern: "{stm_base}/"
    check: "Active STM workspace does not contain a directory for the archived issue number"
    pass_criteria: "Workspace shows only active issues; archived issue directory is absent"
    fail_criteria: "Archived issue directory still present in active workspace"

  - id: SCE-3
    scenario_id: S3
    persona: "Tech Designer"
    artifact_pattern: "{stm_base}/{issue}/evidence/capture-learning/candidates.yaml"
    check: "Can review a staged list of synthesized knowledge candidates, each classified with scope reasoning; after approving, can find them in LTM via _index.md search with correct metadata"
    pass_criteria: "Candidates are staged in STM with classification and reasoning; approved candidates appear in LTM and are findable via _index.md"
    fail_criteria: "Candidates not staged for review, or approved candidates not findable in LTM after write"

  - id: SCE-4
    scenario_id: S4
    persona: "Developer"
    artifact_pattern: "{stm_base}/{issue}/evidence/capture-learning/candidates.yaml"
    check: "When a candidate matches an existing LTM file by search pattern overlap, it is marked as 'near-duplicate' or 'duplicate' with the existing file path; on approval, the existing file is updated — no duplicate created"
    pass_criteria: "Candidate has dedup_status 'near-duplicate' with dedup_conflict_path set; on approval, existing file is updated not duplicated"
    fail_criteria: "Overlapping candidate not detected; duplicate file created alongside existing one"

  - id: SCE-5
    scenario_id: S5
    persona: "Operator"
    artifact_pattern: "{stm_archive}/{YYYY-MM}/{issue}/evidence/capture-learning/"
    check: "Archival completes normally; extraction phase exits cleanly with 'no candidates extracted' evidence; no files written to LTM"
    pass_criteria: "Archive contains issue STM; evidence records zero-candidate outcome; LTM unchanged"
    fail_criteria: "Extraction fails or produces artifacts when no traces exist"

  - id: SCE-6
    scenario_id: S6
    persona: "Quality Lead"
    artifact_pattern: "{ltm_context.core_base}/knowledge/*.md"
    check: "Approved core-scoped knowledge file passes full validation checklist from knowledge-file-template.md (Pattern Template for patterns, Generic + Tier 2 for other core files); _index.md updated"
    pass_criteria: "File passes its type's validation checklist; _index.md contains new entry"
    fail_criteria: "File missing required sections or metadata; _index.md not updated"
