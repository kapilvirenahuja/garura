name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build package
        run: |
          chmod +x pack.sh
          ./pack.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: phoenix-os-*.tgz
          generate_release_notes: true
