intent: >
  Given a locked LLD phase and a defined epic with success scenarios and failure conditions,
  produce a working implementation that passes all independently-generated evaluations and
  meets project quality standards. The implementation is built by a code agent that has no
  access to evaluation criteria. Evaluations are generated by a separate agent that has no
  access to implementation details. A third independent agent judges the implementation
  against the evaluations. A fourth independent quality agent verifies linting, unit tests,
  type checking, and build pass against the project's quality vision gates. If the judge
  reports failures, the implementation is fixed and re-evaluated with freshly generated
  evaluations. The process produces: committed and deployed code that passes all evaluations
  and quality checks, a structured judge report, and manual test scenarios for human validation.

constraints:
  - id: C1
    rule: >
      The LLD phase referenced by the epic must be in LOCKED status.
      A phase in DRAFT status is not eligible for implementation.

  - id: C2
    rule: >
      The epic must have at least one success scenario and at least one failure condition
      defined before implementation begins.

  - id: C3
    rule: >
      All prerequisite phases (phases the target phase depends on) must be complete
      before implementation of the target phase begins.

  - id: C4
    rule: >
      The evaluation generator receives only: product-spec behaviors, product-spec
      verification scenarios, epic success/failure conditions, and LLD exit gate criteria.
      It does not receive: vision documents, design tokens, technical approach, implementation
      code, builder prompts, or prior evaluation results.

  - id: C5
    rule: >
      The code builder receives only: the LLD (scope items and file paths), technical
      approach (architecture and schema), and CLAUDE.md (conventions and codebase context).
      It does not receive: product spec, product-spec scenarios, evaluation criteria,
      evaluation IDs, judge reports, or pass/fail thresholds. The builder implements each
      scope item as a vertical story -- test first, then implementation, then verification --
      before moving to the next scope item.

  - id: C6
    rule: >
      The judge receives only: encrypted evaluations and implementation artifacts (deployed
      code and build output). It does not receive: builder prompts, builder reasoning,
      implementation rationale, evaluation-generator prompts, or quality agent results.

  - id: C7
    rule: >
      Evaluations are encrypted at rest. Plaintext evaluation content is deleted after encryption.
      Only the judge possesses the decryption capability.

  - id: C8
    rule: >
      Evaluation files are stored outside the project repository tree.
      No evaluation content (encrypted or plaintext) exists inside the repository at any point.

  - id: C9
    rule: >
      After a fix iteration, old evaluations are discarded entirely. A fresh evaluation agent
      with no knowledge of prior evaluations generates new evaluations from the original specs.

  - id: C10
    rule: >
      The builder receives only remediation instructions derived from judge failures.
      It does not receive evaluation IDs, evaluation text, pass criteria, or the raw judge report.

  - id: C11
    rule: >
      The fix loop runs a maximum of 3 iterations. If evaluations still fail after 3 rounds,
      the process halts with a structured failure report.

  - id: C12
    rule: >
      The project builds successfully after implementation.
      Type checking and production build both pass without errors.

  - id: C13
    rule: >
      The codebase context document (CLAUDE.md or equivalent) is generated or updated
      before implementation begins, reflecting the current tech stack, domain model,
      conventions, and constraints.

  - id: C14
    rule: >
      A quality agent independently verifies linting, unit tests, type checking, and build
      pass after implementation. The quality agent receives only: implemented code and project
      quality standards (vision gates). It does not receive: evaluations, builder prompts,
      judge reports, or evaluation-generator output. The builder does not control, configure,
      or observe the quality agent's checks.

  - id: C15
    rule: >
      Project quality standards (quality vision gates) are captured in STM before the quality
      agent runs. If quality vision gates do not exist in LTM, they must be created from the
      project's conventions and standards before implementation begins.

  - id: C16
    rule: >
      Each scope item is implemented as a vertical story: its tests exist and fail before its
      implementation code is written, and its tests pass after implementation. Scope items are
      not batched -- one scope item's test-implement-verify cycle completes before the next
      scope item begins.

failure_conditions:
  - id: F1
    condition: >
      The project build or type check produces errors after implementation is complete.

  - id: F2
    condition: >
      The judge report shows greater than 50% evaluation failure rate on the first judge run.

  - id: F3
    condition: >
      Three fix iterations have been exhausted and the judge report still contains
      at least one failing evaluation.

  - id: F4
    condition: >
      Plaintext evaluation files exist on disk after the encryption step, or evaluation
      content (encrypted or plaintext) exists inside the project repository tree.

  - id: F5
    condition: >
      The builder agent's input context contains any evaluation ID, evaluation text,
      evaluation pass criteria, or raw judge report content.

  - id: F6
    condition: >
      The judge agent's input context contains any builder prompt, builder reasoning,
      or implementation rationale.

  - id: F7
    condition: >
      The evaluation generator's input context contains any implementation code,
      builder output, or prior evaluation results.

  - id: F8
    condition: >
      The LLD phase referenced by the epic has a status other than LOCKED at the
      time implementation begins.

  - id: F9
    condition: >
      The epic has no exit gate defined, or the phase has no success scenarios
      or failure conditions to generate evaluations from.

  - id: F10
    condition: >
      After a fix iteration, the judge runs against the same evaluations that were
      used in the previous iteration rather than freshly generated ones.

  - id: F11
    condition: >
      No manual test scenarios are produced alongside the implementation.

  - id: F12
    condition: >
      Unit tests fail or are absent for any implemented scope item. A scope item
      without a corresponding test that exercises its behavior is incomplete.

  - id: F13
    condition: >
      Linting violations exist in the implemented code after implementation is complete.

  - id: F14
    condition: >
      Code quality standards defined in the project's quality vision gates are not met.
      Any metric falling below the threshold specified in the vision gates constitutes failure.

scenarios:
  - id: S1
    persona: "Engineer"
    given: >
      A locked LLD phase, a fully-defined epic, and a passing project build
    then: >
      Can trigger the implementation process and receive committed, deployed code
      that passes all evaluations on the first judge run with no fix loop required

  - id: S2
    persona: "Engineer"
    given: >
      A judge report showing evaluation failures after the first implementation attempt
    then: >
      Can observe the fix loop execute up to 3 iterations, with each iteration producing
      fresh evaluations and a fresh judge run, until all evaluations pass

  - id: S3
    persona: "QA Engineer"
    given: >
      The product-spec verification scenarios document and the deployed implementation
    then: >
      Can execute each verification scenario against the deployed environment and verify
      that expected user-facing behaviors match actual behavior, without reading the
      codebase or referencing encrypted evals

  - id: S4
    persona: "Security Auditor"
    given: >
      The input contexts of all agents (builder, evaluation generator, judge, quality agent)
      and the project's security quality vision gates
    then: >
      Can verify that no agent received information outside its designated scope --
      builder has zero evaluation content, judge has zero builder prompts, evaluation
      generator has zero implementation code, quality agent has zero eval content --
      and that security standards defined in the quality vision gates are met

  - id: S5
    persona: "Engineering Lead"
    given: >
      A structured failure report produced after 3 exhausted fix iterations
    then: >
      Can identify which evaluations persistently failed, what remediation was attempted
      in each iteration, and decide whether to restructure the epic scope or escalate

  - id: S6
    persona: "Engineer"
    given: >
      An epic with external dependencies that cannot be fully evaluated by automated checks
    then: >
      Can use the manual test scenarios to validate integration points that require
      a running deployed environment, covering what automated evaluations cannot reach

  - id: S7
    persona: "Performance Auditor"
    given: >
      The deployed preview environment and the project's quality vision gates defining
      performance thresholds (bundle size, lighthouse scores, runtime performance)
    then: >
      Can verify that bundle size, lighthouse scores, and runtime performance metrics
      meet or exceed the thresholds defined in the quality vision gates

  - id: S8
    persona: "Evals Engineer"
    given: >
      The judge report, eval execution results, and the product-spec behaviors list
    then: >
      Can verify that every eval was executed, every product-spec behavior has eval
      coverage, and the overall pass rate meets the defined threshold
