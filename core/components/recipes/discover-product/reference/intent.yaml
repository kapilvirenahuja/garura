intent: >
  Given a product idea or problem statement, discover the market opportunity,
  draft a product vision with strategic goals and market positioning, validate
  the vision for completeness, and lock it when ready. The recipe runs as a
  single invocation with inline checkpoints. It produces a vision artifact
  (product.yaml), an interactive HTML brief (product-brief.html) for human
  review, validates completeness, and locks the vision — all in one flow.
  All product artifacts are stored in project-scoped product STM.

constraints:
  - id: C1
    rule: >
      A product intent must be provided and must contain sufficient specificity
      (more than 5 meaningful words). Vague or empty input is rejected.
  - id: C4
    rule: >
      All product-domain work (market analysis, vision drafting, vision
      validation) is delegated to a domain agent. The orchestrator never
      performs product-domain work directly.
  - id: C5
    rule: >
      Maximum 5 domain agent dispatches per invocation (3 base plus up
      to 2 for cycle-back per C9). When opportunity discovery is skipped
      per C12, base is 2. Doc-builder and repo-orchestrator are utility
      agents exempt from the count.
  - id: C6
    rule: >
      All vision and product artifacts must be written to
      .meridian/project/product/{slug}/ relative to the project root.
      Product STM is project-scoped, not per-issue and not in the global
      home directory.
  - id: C7
    rule: >
      The vision artifact uses "Strategic Goals" terminology. OKRs and
      OKR-specific terminology (Objectives, Key Results) are prohibited
      in all vision artifacts.
  - id: C8
    rule: >
      A checkpoint artifact must be written before each user-facing pause.
      The recipe has up to two checkpoints: brief review after drafting,
      and validation review if blockers are found. Checkpoint status is
      PENDING_APPROVAL until the user responds.
  - id: C9
    rule: >
      When vision validation finds blockers and the user requests a
      cycle-back, a maximum of 1 re-draft iteration is permitted for
      product-type intents (to stay within C5 domain agent budget). For
      library-type intents where opportunity discovery is skipped, up to
      2 re-draft iterations are permitted. If the maximum is reached,
      the recipe halts and requires re-invocation.
  - id: C10
    rule: >
      A human-reviewable brief artifact must be produced after vision
      drafting and presented at the first checkpoint. This is the primary
      artifact the user evaluates before the recipe proceeds to validation.
  - id: C11
    rule: >
      If the product domain cannot be unambiguously determined from the
      intent, the user must be asked to confirm or provide the domain
      before product-domain work proceeds. The recipe must not proceed
      with an ambiguous domain classification.
  - id: C12
    rule: >
      Opportunity discovery is conditional. It is skipped when the intent
      explicitly describes an internal library, framework component, developer
      tool, or microservice with no external market. The assessment uses three
      signals: (1) the intent names specific consumers rather than market
      segments, (2) the intent describes a technical interface boundary rather
      than a user problem, (3) no market-facing end users are identifiable.
      When skipped, vision drafting receives the raw intent text directly.
  - id: C13
    rule: >
      The product artifact type is determined from the intent and recorded
      in product.yaml as an explicit type field. Products with external
      market-facing users are type "product". Internal libraries, components,
      SDKs, developer tools, and microservices are type "library". The type
      field governs which validation criteria apply and which brief sections
      render.
  - id: C14
    rule: >
      Pre-lock resolution gate — the recipe must not lock artifacts when
      blocker-severity issues, warning-severity issues with unresolved
      decisions, or placeholder field values (TBD, unclear, to be determined,
      trailing ?) remain in the product artifact. When such items are detected
      after validation, the recipe must present a structured resolution
      interview to collect user decisions for each item. Resolutions must be
      written to a pre-lock-resolutions.yaml audit artifact before lock
      executes.
  - id: C15
    rule: >
      No accept-risk bypass — the recipe must never offer a Tether path
      that allows locking past unresolved validation blockers. The only
      paths from blocker detection are: RESOLVED (user addresses each item
      inline via the resolution interview) or Vanish (cycle back to
      re-draft). No mechanism may allow the user to skip, defer, or
      accept-risk on unresolved blockers to reach lock.

  - id: C16
    rule: >
      The recipe must derive all three project profiles (Product Profile,
      NFR Profile, Quality Profile) during vision drafting and write them
      to the product.yaml profiles section. The cascade is sequential:
      PP is derived from BRD/intent, NFR defaults from PP via guidance
      tables, QP defaults from PP+NFR via guidance tables. The agent reads
      profile dimension definitions from LTM
      (~/.meridian/core/memory/knowledge/project-profiling/) before
      deriving. Profiles are knobs, not questions — the agent derives
      initial values and presents them for user validation.

  - id: C17
    rule: >
      After vision drafting, the recipe must present all three derived
      profiles to the user for validation before proceeding to brief
      generation. The user may adjust any dimension level. Adjusted
      profiles must be written back to product.yaml before the brief
      is generated. The brief must render the profiles.

failure_conditions:
  - id: F1
    condition: >
      The vision artifact contains fewer than 3 strategic goals, or no
      target audience is identifiable from the artifact content.
  - id: F2
    condition: >
      The product domain is unresolvable — the user rejected all proposed
      domain classifications and provided no alternative.
  - id: F3
    condition: >
      Vision drafting completed but no vision artifact exists at the
      expected path in .meridian/project/product/{slug}/.
  - id: F5
    condition: >
      Validation completed with blocker-severity issues still present
      after the maximum permitted cycle-back iterations (1 for product
      type, 2 for library type).
  - id: F7
    condition: >
      The recipe was invoked for a product slug whose product.yaml
      already has status LOCKED. Re-discovery of an already-locked
      product is not permitted.
  - id: F9
    condition: >
      No checkpoint artifact was written before presenting results to
      the user — the approval flow has no audit trail.
  - id: F8
    condition: >
      A type "library" product.yaml contains fabricated market data —
      invented competitors with no basis in the intent, synthetic
      TAM/SAM/SOM estimates, or persona descriptions that do not match
      the intent's stated consumers.
  - id: F10
    condition: >
      Opportunity discovery was skipped but the product.yaml has no
      strategic goals — the vision was drafted without sufficient
      structure for downstream planning.
  - id: F11
    condition: >
      The recipe locks an artifact (changes status to LOCKED) while
      validation issues of any severity (blocker or warning) remain
      unresolved, or while product.yaml contains placeholder field
      values (TBD, unclear, to be determined, trailing ?).
  - id: F12
    condition: >
      The recipe offers a bypass mechanism that allows the user to skip
      unresolved blockers via Tether — presenting an accept-risk or
      proceed-despite-blockers option that reaches lock without resolving
      each blocker individually.

  - id: F13
    condition: >
      The product.yaml is locked without a profiles section, or the
      profiles section is missing any of the three sub-sections
      (product_profile, nfr_profile, quality_profile), or any profile
      has fewer than 7 dimensions.

  - id: F14
    condition: >
      Profiles were derived without reading LTM dimension definitions —
      the agent invented dimensions or levels that don't match the
      canonical definitions in product-profile.md, nfr-profile.md, or
      quality-profile.md.

scenarios:
  - id: S1
    persona: Founder / Product Manager / Engineering Lead
    given: >
      The vision artifact and interactive HTML brief produced after
      vision drafting, presented at the first checkpoint
    then: >
      Can evaluate whether the strategic goals and positioning accurately
      capture their intent — including for internal libraries where market
      sections are absent and the brief renders technical context instead.
  - id: S2
    persona: Engineering Lead
    given: >
      A LOCKED vision artifact at
      .meridian/project/product/{slug}/product.yaml
    then: >
      Can use the locked vision as authoritative input for roadmap
      planning — strategic goals, success metrics, and scope boundaries
      are defined clearly enough to derive engineering milestones
      without ambiguity, regardless of product type.
  - id: S3
    persona: Product Manager
    given: >
      The validation results shown inline before lock, including
      completeness score, checklist status, and any issues by severity
    then: >
      Can determine whether the vision is ready to lock or identify
      exactly which sections need strengthening before the vision can
      serve as a planning foundation.
  - id: S4
    persona: Engineering Lead
    given: >
      A LOCKED vision artifact for an internal library at
      .meridian/project/product/{slug}/product.yaml with type "library"
    then: >
      Can use the locked vision as authoritative input for roadmap
      planning — strategic goals with IDs, value proposition, and
      assumptions are defined clearly enough to derive engineering
      milestones, even though market analysis sections are absent.
  - id: S5
    persona: Founder / Product Manager
    given: >
      Validation results containing blocker-severity issues, presented
      as a structured resolution interview with each blocker listed
      individually
    then: >
      Can provide a RESOLVED answer for each blocker inline, have those
      resolutions recorded in pre-lock-resolutions.yaml as an audit
      trail, and proceed to lock only after re-validation confirms all
      issues are resolved — without any option to bypass unresolved items.

  - id: S6
    persona: Technical Architect
    given: >
      A LOCKED product.yaml with the profiles section containing all
      three profiles (PP, NFR, QP) with levels and rationale
    then: >
      Can use the profiles as authoritative input for architecture
      planning — the three-axis profile characterizes the project
      sufficiently to select patterns, stacks, platforms, and quality
      standards without re-interviewing stakeholders.

  - id: S7
    persona: Engineering Lead
    given: >
      The derived profiles presented at the brief review checkpoint
    then: >
      Can validate that the profile levels accurately reflect the
      project's character, adjust any dimensions that are miscalibrated,
      and confirm that the cascade (PP → NFR → QP) produced sensible
      defaults.
