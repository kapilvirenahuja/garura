intent: "Promote patterns, decisions, and learnings from STM into LTM — and archive completed issue STM directories"

constraints:
  pre_flight:
    - id: C1
      check: issue number provided AND issue is closed on GitHub
      halt_message: "Issue must be closed before capturing learnings — active work should not be archived"
    - id: C2
      check: STM directory exists at .meridian/{issue}/
      halt_message: "No STM directory found for this issue — nothing to capture or archive"

  behavioral:
    - id: C3
      rule: "Orchestrator MUST delegate domain tasks to agents — never execute Bash/git/gh directly"
    - id: C4
      rule: "Archive uses close date for year-month bucketing, never creation date or current date"
    - id: C5
      rule: "All STM contents MUST be preserved during archive — no data loss"
    - id: C6
      rule: "Active issue paths (.meridian/{issue}/) are NEVER modified by this recipe for open issues"

failure_conditions:
  - "Issue is still open — cannot archive active work"
  - "STM directory does not exist — nothing to process"
  - "Archive target already exists — duplicate archive attempt"
  - "Move verification fails — source deleted but target not confirmed"
