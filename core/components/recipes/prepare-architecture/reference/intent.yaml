name: prepare-architecture
intent: >
  Given a locked product.yaml (with three-axis profiles: PP, NFR, QP) and a
  locked roadmap.yaml, design the project's technical architecture by reading
  LTM architecture knowledge, selecting patterns, stacks, platforms, data stores,
  and operations infrastructure informed by the project profiles. Produces a
  concrete architecture.yaml with named technologies and a quality-standards.yaml
  defining the project's quality baseline (linting, design patterns, documentation,
  testing strategy, CI/CD, observability). The quality standards artifact is the
  reference point for calculating technical debt. All artifacts are stored at the
  product level, not per-epic.

constraints:
  - id: C1
    rule: >
      The recipe requires a locked product.yaml with a profiles section containing
      all three profiles (product_profile, nfr_profile, quality_profile) and a
      locked roadmap.yaml as upstream inputs. Both must have status LOCKED.

  - id: C2
    rule: >
      The recipe reads LTM architecture knowledge from
      ~/.meridian/core/memory/knowledge/architecture/ before making any technology
      selections. Architecture files' "When to Choose" and "When to Avoid" prose
      is matched against the project's profile values for informed reasoning.

  - id: C3
    rule: >
      architecture.yaml must name concrete technologies for every architectural
      component — specific databases, frameworks, SDKs, hosting platforms, and
      libraries. Vague references such as "a relational database" or "a web
      framework" are not acceptable.

  - id: C4
    rule: >
      architecture.yaml NFR section requirements must be derived from the NFR
      Profile levels in product.yaml. Each NFR dimension level maps to concrete,
      measurable requirements (e.g., NFR-3 level 4 → "API response < 100ms at p95").

  - id: C5
    rule: >
      quality-standards.yaml must be derived from the Quality Profile levels in
      product.yaml. Each QP dimension level maps to concrete standards and tooling
      (e.g., QP-2 level 3 → "ESLint + Prettier + SonarQube, PR review with checklist").

  - id: C6
    rule: >
      All architecture and quality artifacts must be written to
      .meridian/product/ at the product level, not per-epic.
      These are product-scoped decisions.

  - id: C7
    rule: >
      architecture.yaml and quality-standards.yaml must receive explicit
      human approval at the recipe checkpoint before being locked. The
      review surface is the file paths of the two artifacts. Users may
      run /briefs separately to generate an HTML rendering if desired.

  - id: C8
    rule: >
      All domain work (architecture drafting, quality standards, codebase scanning)
      is delegated to domain agents. The orchestrator never performs domain work
      directly.

  - id: C9
    rule: >
      Maximum 5 domain agent dispatches per invocation. repo-orchestrator
      is a utility agent exempt from the count.

  - id: C10
    rule: >
      The recipe must scan the codebase for existing technology decisions before
      producing architecture.yaml. Existing ADRs, package manifests, framework
      choices, and infrastructure configurations inform — not override — the
      architecture selection.

  - id: C11
    rule: >
      The pre-lock resolution gate must block locking when architecture.yaml
      contains technical_risks with severity "high" or when quality-standards.yaml
      contains unresolved gaps. A structured resolution interview collects user
      decisions before lock.

  - id: C12
    rule: >
      architecture.yaml must include a decisions[] array where each entry captures
      a key architectural decision as a structured record with: question (the design
      question asked), answer (the chosen solution), drivers (array of driver tags
      from: budget, ltm, profile, user-decision), reasons (array of objects with
      driver and text fields providing tagged reasoning), picked (array of selected
      technologies or approaches), and rejected (array of objects with option and
      reason fields for alternatives not chosen).

  - id: C13
    rule: >
      Every decision in decisions[] must have at least one reason with driver
      traceability — each reason must tag its driver type (budget, ltm, profile,
      or user-decision) so the reasoning trail is filterable by driver category.

failure_conditions:
  - id: F1
    condition: >
      architecture.yaml contains vague technology references instead of naming
      specific technologies.

  - id: F2
    condition: >
      architecture.yaml NFR section requirements are not traceable to NFR Profile
      levels — requirements appear arbitrary rather than profile-derived.

  - id: F3
    condition: >
      quality-standards.yaml standards are not traceable to Quality Profile
      levels — standards appear arbitrary rather than profile-derived.

  - id: F4
    condition: >
      The recipe produced architecture artifacts without reading LTM architecture
      knowledge — technology selections lack reasoning from canonical architecture
      reference material.

  - id: F5
    condition: >
      The recipe locked artifacts while high-severity technical risks or
      unresolved quality gaps remain without user resolution.

  - id: F6
    condition: >
      product.yaml lacks a profiles section or any of the three sub-sections
      are missing — the recipe should halt in pre-flight.

  - id: F7
    condition: >
      Architecture decisions contradict the project profiles — e.g., selecting
      enterprise-grade infrastructure for a POC (PP-6 = 1) or basic security
      for a BFSI product (PP-7 = 5).

  - id: F8
    condition: >
      architecture.yaml decisions[] is absent, empty, or contains entries without
      driver traceability — decisions appear as assertions without reasoning trails
      linking them to budget constraints, LTM recommendations, profile dimensions,
      or user choices.

scenarios:
  - id: S1
    persona: Technical Architect
    given: The locked architecture.yaml with profiles_ref pointing to product.yaml
    then: >
      Can verify that every technology selection is justified by the project's
      profile values and LTM architecture knowledge, and can identify any
      architecture decisions that contradict the profiles.

  - id: S2
    persona: Engineering Lead
    given: The locked quality-standards.yaml
    then: >
      Can set up the project's quality tooling (linter, formatter, CI pipeline,
      testing framework, observability stack) using only the standards document
      as reference, and can measure technical debt as the gap between QP targets
      and actual implementation.

  - id: S3
    persona: Product Manager
    given: The architecture.yaml and quality-standards.yaml artifacts
    then: >
      Can read the profiles section and high-level technology decisions
      to understand their relationship to the product's character. May
      optionally run /briefs to generate an HTML rendering with Profiles
      Summary and Architecture Overview chapters for easier review.

  - id: S4
    persona: Implementation Agent
    given: The locked architecture.yaml and quality-standards.yaml
    then: >
      Can implement any feature using the architecture and quality standards
      as reference without making technology selection decisions or quality
      standard decisions.

  - id: S5
    persona: Quality Lead
    given: quality-standards.yaml with QP dimension targets and concrete tooling
    then: >
      Can construct a technical debt measurement framework where each QP
      dimension has a target level, concrete standards, and measurable gaps
      between target and actual implementation state.

  - id: S6
    persona: Decision Reviewer
    given: The decisions[] array in architecture.yaml
    then: >
      Can trace every architectural decision back to its driving factors (budget
      constraints, LTM knowledge recommendations, profile dimensions, or user
      choices during planning), filter decisions by driver type via the tagged
      reasons, and verify that rejected alternatives have stated rationale.
