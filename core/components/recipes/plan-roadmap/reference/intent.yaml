name: plan-roadmap
goal: "Prepare a roadmap"

constraints:
  - id: C-TEMPLATE
    rule: "Follow the roadmap brief template"
    template_ref: "standards/templates/roadmap-brief.html"
  - id: C-LOCKED
    rule: "Vision must be locked before roadmap planning"
  - id: C-BRIEF-REVIEW
    rule: "Brief must be reviewable in 30 minutes"
  - id: C-TECH-RELEVANCE
    rule: "Technical elements only if they change a roadmap decision"

failure_conditions:
  - "Fewer than 3 epics"
  - "Roadmap is not internally consistent (epics don't trace to strategic goals)"
  - "User rejects the brief"
  - "Brief includes technical detail that doesn't change a decision"

scenarios:
  - id: S1
    persona: "Product Manager"
    given: "Approved roadmap brief"
    then: "Can clearly describe each epic's intent, constraints, and success criteria"
  - id: S2
    persona: "Product Owner"
    given: "Approved roadmap"
    then: "Can break epics into backlog items with clear acceptance criteria"
  - id: S3
    persona: "Engineering Lead"
    given: "Engineering view"
    then: "Can identify technical dependencies and sequence work across teams"
  - id: S4
    persona: "Stakeholder"
    given: "Roadmap brief"
    then: "Can review and give meaningful feedback within 30 minutes"
