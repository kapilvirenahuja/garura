# evals.yaml — prepare-implementation recipe
# Generated from intent.yaml constraints (C1-C13), failure conditions (F1-F12), and scenarios (S1-S6)
# Cross-referenced against 5 skill contracts

# =============================================================================
# STEP EVALS (SE-*)
# Each eval checks a step's artifact against the intent constraints and failure
# conditions it is responsible for honoring.
# =============================================================================

step_evals:

  # ---------------------------------------------------------------------------
  # Step 1 — draft-product-spec → features.yaml
  # ---------------------------------------------------------------------------

  - id: SE-1
    step: 1
    name: "features.yaml is implementation-agnostic"
    validates: [C3, F1]
    check: >
      Scan features.yaml for technology names, SDK references, database product
      names (e.g., Postgres, MongoDB, Redis), hosting platform names (e.g., AWS,
      Vercel, Railway), library names (e.g., LangChain, Next.js), deployment
      patterns (e.g., serverless, containerized), or implementation details
      (e.g., REST endpoints, GraphQL schema, cron jobs).
    pass_criteria: >
      Zero technology references, library names, SDK mentions, database products,
      hosting platforms, or deployment patterns found anywhere in features.yaml.

  - id: SE-2
    step: 1
    name: "features.yaml defines required sections and behavioral fields"
    validates: [C3, C8]
    check: >
      Verify features.yaml contains all required top-level sections: identity,
      invariants, scope, and features. Verify each feature entry includes all
      IDD fields (intent, constraints, success_scenarios, failure_conditions),
      blast_radius, and behaviors. Verify each behavior is described with enough
      specificity that a verification scenario could be written against it — i.e.,
      it describes a user action, expected product behavior, and observable outcome.
    pass_criteria: >
      All top-level sections present (identity, invariants, scope, features). Every
      feature has all required IDD fields. Every behavior entry describes what the
      product does in response to a stimulus with an observable outcome, not an
      abstract capability statement.

  - id: SE-3
    step: 1
    name: "features.yaml audience is product stakeholders only"
    validates: [C11]
    check: >
      Scan features.yaml for implementation-audience language: file paths, code
      snippets, API endpoint definitions, schema DDL, component names that imply
      internal architecture, or jargon targeted at developers rather than product
      stakeholders.
    pass_criteria: >
      Zero implementation-audience language found. Every section is comprehensible
      to a non-technical product stakeholder.

  - id: SE-4
    step: 1
    name: "features.yaml respects intent-sufficient input model"
    validates: [C1]
    check: >
      Verify that the skill executed successfully when given only a product intent
      (no vision, no roadmap). If vision or roadmap were provided, verify they
      were used as enrichment but their absence would not have blocked artifact
      production.
    pass_criteria: >
      Skill output includes enrichment_used flags. If vision: false and
      roadmap: false, features.yaml is still complete with all required sections.
      No error or incomplete output due to missing upstream artifacts.

  # ---------------------------------------------------------------------------
  # Step 4 — draft-technical-approach → architecture.yaml
  # ---------------------------------------------------------------------------

  - id: SE-5
    step: 4
    name: "architecture.yaml names concrete technologies"
    validates: [C4, F2]
    check: >
      Scan architecture.yaml for vague technology references: phrases like
      "a relational database," "a web framework," "an LLM provider," "a message
      queue," "a hosting platform," "a vector store," or any unnamed technology
      placeholder. Every architectural component in the stack sections must map
      to a named product (e.g., "PostgreSQL" not "a relational database",
      "Next.js" not "a web framework").
    pass_criteria: >
      Every component in the stack section names a specific product, library,
      framework, or platform. Zero vague or placeholder technology references found.

  - id: SE-6
    step: 4
    name: "architecture.yaml includes rationale for every technology selection"
    validates: [C4]
    check: >
      For every technology named in architecture.yaml stack and integrations
      sections, verify a rationale is provided explaining why that specific
      technology was chosen over alternatives.
    pass_criteria: >
      Every technology selection entry in architecture.yaml includes a
      non-empty rationale field or rationale paragraph.

  - id: SE-7
    step: 4
    name: "architecture.yaml audience is architects and implementers"
    validates: [C11]
    check: >
      Verify architecture.yaml does not define product behaviors, user-facing
      acceptance scenarios, or scope boundaries that belong in features.yaml.
      Verify it does not contain verification scenarios, pass/fail criteria, or
      test classifications that belong in scenarios.yaml.
    pass_criteria: >
      Zero product-behavior definitions found (behaviors are referenced but not
      defined). Zero scenario content found. Content is implementation-focused:
      architecture, technology decisions, deployment topology, data flow.

  # ---------------------------------------------------------------------------
  # Step 8 — draft-verification-scenarios → scenarios.yaml
  # ---------------------------------------------------------------------------

  - id: SE-8
    step: 8
    name: "Every scenario has all required fields"
    validates: [C7, F6]
    check: >
      For every verification scenario in scenarios.yaml groups, verify presence of:
      (1) description — concrete situation being tested, (2) expected_behavior —
      observable outcomes, (3) pass_criteria — explicit binary conditions,
      (4) automation classification — either Automated or Hybrid.
    pass_criteria: >
      Every scenario in scenarios.yaml contains all four required fields with
      non-empty content. No scenario is missing description, expected_behavior,
      pass_criteria, or automation classification.

  - id: SE-9
    step: 8
    name: "Hybrid scenarios document manual element"
    validates: [C7]
    check: >
      For every scenario in scenarios.yaml classified as Hybrid, verify a
      manual_element field exists that documents which element requires human
      judgment and what the human evaluates.
    pass_criteria: >
      Every Hybrid scenario has a documented manual_element. No Hybrid scenario
      is missing the manual_element field.

  - id: SE-10
    step: 8
    name: "Full behavior-to-scenario coverage"
    validates: [C8, F7]
    check: >
      Extract every product behavior from features.yaml (behaviors list per
      feature, success_scenarios, behavioral invariants). For each behavior,
      verify at least one scenario in scenarios.yaml covers it. Coverage is
      measured by traceability via feature_ref and behavior_ref back-links.
    pass_criteria: >
      Every product behavior in features.yaml has at least one corresponding
      scenario in scenarios.yaml. The coverage section in scenarios.yaml
      confirms full coverage with zero uncovered_behaviors.

  - id: SE-11
    step: 8
    name: "scenarios.yaml audience is validators only"
    validates: [C11]
    check: >
      Scan scenarios.yaml for implementation details: file paths, code snippets,
      technology-specific assertions (e.g., "check Postgres table"), internal
      component names, or implementation guidance. Scenarios should describe
      observable product behavior, not internal mechanics.
    pass_criteria: >
      Zero implementation details or file paths found in scenario descriptions,
      expected_behavior, or pass_criteria. Scenarios are testable by a validator
      without implementation knowledge.

  # ---------------------------------------------------------------------------
  # Step 9 — draft-implementation-plan → plan.yaml
  # Owner: tech-designer
  # ---------------------------------------------------------------------------

  - id: SE-12
    step: 9
    name: "Every plan.yaml scope item has file path mapping"
    validates: [C5, F4]
    check: >
      For every execution_order entry in plan.yaml, inspect the scope_items list.
      Every scope item must have a non-empty key_files field containing one or
      more specific file paths. File paths must be consistent with the project
      structure in tech.yaml.
    pass_criteria: >
      Every scope item in every execution_order entry has at least one file path
      in key_files. Zero scope items with empty or missing key_files.

  - id: SE-13
    step: 9
    name: "Every execution_order entry delivers end-to-end capability"
    validates: [C6, F3]
    check: >
      For every entry in execution_order in plan.yaml, verify the feature slice
      delivers a testable end-to-end capability. A feature slice that creates
      only infrastructure, only API routes, or only UI components without a
      complete testable path is invalid.
    pass_criteria: >
      Every execution_order entry's exit_gate describes a working capability that
      can be independently observed and tested. The scope_items together span
      enough layers to deliver that capability.

  - id: SE-14
    step: 9
    name: "plan.yaml is compartmentalized from scenarios"
    validates: [C9, F8]
    check: >
      Scan plan.yaml for any scenario descriptions, scenario text, or explicit
      links to scenarios.yaml content. The plan must reference scenario IDs in
      scenario_gate fields only — no scenario descriptions, no scenario content.
    pass_criteria: >
      Zero scenario descriptions found in plan.yaml. Zero references to scenario
      content. scenario_gate fields contain only scenario IDs and counts.

  - id: SE-15
    step: 9
    name: "plan.yaml summary with cumulative scenario counts"
    validates: [C12]
    check: >
      Verify plan.yaml contains a summary section with per-feature rows showing:
      feature_ref, delivers (one-line), scope_items count, scenario_count, and
      cumulative_scenarios. Final cumulative_scenarios must equal the total
      scenarios across all feature gates.
    pass_criteria: >
      Summary section present with all required columns. scenario_count values
      are integers, not ID lists. cumulative_scenarios column is monotonically
      increasing. Final cumulative value equals the sum of all individual
      scenario_count values.

  - id: SE-16
    step: 9
    name: "Every execution_order entry has an observable exit gate"
    validates: [C13, F5]
    check: >
      For every execution_order entry in plan.yaml (and prerequisites), verify
      an exit_gate field exists. The exit gate must describe observable outcomes
      (e.g., "User can log in via OAuth, session persisted to database") not
      process steps (e.g., "Phase complete" or "Code reviewed").
    pass_criteria: >
      Every entry has a non-empty exit_gate. Zero exit gates that reference
      process steps instead of observable outcomes.

  - id: SE-17
    step: 9
    name: "plan.yaml has minimum execution_order count"
    validates: [F10]
    check: >
      Count entries in execution_order in plan.yaml (excluding prerequisites).
      The plan must contain at least 2 feature entries.
    pass_criteria: >
      execution_order contains >= 2 entries. prerequisites section is present
      but excluded from the count.

  # ---------------------------------------------------------------------------
  # Step 12 — validate-implementation-design → validation_result
  # ---------------------------------------------------------------------------

  - id: SE-22
    step: 12
    name: "All 14 validation checks executed"
    validates: [C2, C3, C4, C5, C6, C7, C8, C9, C11, C12, C13, F1, F2, F3, F4, F5, F6, F7, F8, F10]
    check: >
      Verify the validation_result contains all 14 checks (V1-V14) with a status
      of PASS or FAIL for each. Verify ready_for_lock is true only when all 14
      checks pass and no blocker-severity issues exist. Verify every individual
      violation is listed in the issues array with check_id, message, and severity.
    pass_criteria: >
      validation_result.checks contains exactly 14 entries (V1 through V14).
      Each check has a status field (PASS or FAIL). ready_for_lock is false if
      any check has FAIL status. Issues array contains one entry per violation
      found, with no violations summarized or collapsed.

  # ---------------------------------------------------------------------------
  # Step 14 — Lock all artifacts
  # ---------------------------------------------------------------------------

  - id: SE-23
    step: 14
    name: "All five artifacts locked with no content changes"
    validates: [C2]
    check: >
      Read all 5 artifacts (features.yaml, architecture.yaml, tech.yaml,
      scenarios.yaml, plan.yaml) and verify each contains `status: "LOCKED"`.
      Compare artifact content to the DRAFT version — the only change should be
      the status field from DRAFT to LOCKED. No behavioral content, technology
      decisions, scenarios, scope items, or execution order entries should be
      modified.
    pass_criteria: >
      All 5 artifacts contain `status: "LOCKED"`. Diff between DRAFT and LOCKED
      versions shows only the status field change — zero content modifications.

  # ---------------------------------------------------------------------------
  # Step lifecycle — DRAFT → VALIDATE → LOCKED (C2)
  # ---------------------------------------------------------------------------

  - id: SE-24
    step: 3
    name: "Human checkpoint 1 required before Stage 2"
    validates: [C10, F12]
    check: >
      Verify that features.yaml was presented to the user for review at
      Checkpoint 1 (Step 3) and received explicit approval (Tether) before
      Steps 4-6 (architecture, tech) were executed. Verify the features HTML
      brief was generated (Step 2) before the checkpoint.
    pass_criteria: >
      Step 2 (brief generation) completed before Step 3 (checkpoint). Step 3
      resolved with Tether before Step 4 began. Status file shows checkpoint-1
      completed before draft-architecture started.

  - id: SE-25
    step: 7
    name: "Human checkpoint 2 required before Stage 3"
    validates: [C10, F12]
    check: >
      Verify that architecture.yaml and tech.yaml were presented to the user
      for review at Checkpoint 2 (Step 7) and received explicit approval
      (Tether) before Steps 8-9 (scenarios, plan) were executed. Verify the
      architecture and tech HTML briefs were generated (Step 6) before the
      checkpoint.
    pass_criteria: >
      Step 6 (brief generation) completed before Step 7 (checkpoint). Step 7
      resolved with Tether before Steps 8/9 began. Status file shows
      checkpoint-2 completed before draft-verification-scenarios and
      draft-plan started.

  - id: SE-26
    step: 11
    name: "Human checkpoint 3 required before VALIDATE phase"
    validates: [C10, F12]
    check: >
      Verify that scenarios.yaml and plan.yaml were presented to the user
      for consolidated review at Checkpoint 3 (Step 11) and received explicit
      approval (Tether) before Step 12 (cross-validation) was executed. Verify
      the scenarios and plan HTML briefs were generated (Step 10) before the
      checkpoint.
    pass_criteria: >
      Step 10 (brief generation) completed before Step 11 (checkpoint). Step 11
      resolved with Tether before Step 12 began. Status file shows checkpoint-3
      completed before validate-implementation-design started.


# =============================================================================
# SCENARIO EVALS (SCE-*)
# Each eval verifies one end-to-end acceptance scenario (S1-S6) from intent.yaml.
# =============================================================================

scenario_evals:

  - id: SCE-1
    scenario: S1
    persona: "Product Owner"
    name: "Behavior-to-scenario traceability"
    check: >
      Given the locked features.yaml and scenarios.yaml, extract every product
      behavior from features.yaml (behaviors list per feature, success_scenarios,
      invariants). For each behavior, locate the corresponding scenario(s) in
      scenarios.yaml that test it via feature_ref and behavior_ref back-links.
      Verify every scenario has clear pass_criteria that the product owner can
      evaluate without technical knowledge.
    pass_criteria: >
      Every product behavior in the locked features.yaml maps to at least one
      scenario in scenarios.yaml. Every mapped scenario has explicit pass_criteria
      that are evaluable by a non-technical product owner. Zero uncovered behaviors
      (confirmed by scenarios.yaml coverage.uncovered_behaviors being empty).
      Traceability is demonstrable via feature_ref and behavior_ref fields.

  - id: SCE-2
    scenario: S2
    persona: "Technical Architect"
    name: "Technology stack faithfully implements product spec"
    check: >
      Given the locked features.yaml and architecture.yaml, for each product
      behavior and invariant in features.yaml, verify that architecture.yaml
      provides a concrete technology selection and architectural decision that
      enables that behavior. Identify any product behavior that lacks architectural
      support or any architectural decision that contradicts a product invariant.
    pass_criteria: >
      Every product behavior has a corresponding architectural component and
      technology selection in architecture.yaml. Every product invariant is
      honored by the architecture (no contradictions). The architect can confirm
      alignment between product intent and implementation architecture with zero
      gaps or misalignments.

  - id: SCE-3
    scenario: S3
    persona: "Engineering Lead"
    name: "Single-feature-slice implementability without external context"
    check: >
      Select any single execution_order entry in plan.yaml (any feature after
      prerequisites). Given only that entry's scope_items (with key_files),
      the exit_gate, and architecture.yaml, verify the engineering lead has
      sufficient context to assign the feature slice to an implementer. The
      implementer must NOT need access to other feature slices, the full
      features.yaml, or scenarios.yaml to begin coding.
    pass_criteria: >
      For any selected execution_order entry: (1) scope_items have specific
      key_files for every item, (2) exit_gate defines an observable testable
      outcome, (3) technology stack from architecture.yaml covers all technologies
      referenced in the scope items, (4) no scope item requires reading another
      feature entry to understand. The engineering lead can hand off the feature
      slice as a self-contained work package.

  - id: SCE-4
    scenario: S4
    persona: "Quality Lead"
    name: "Feature-gated validation plan from scenarios.yaml and plan.yaml"
    check: >
      Given the locked scenarios.yaml and plan.yaml, construct a validation plan:
      for each execution_order entry in plan.yaml, read the scenario_gate to get
      the required scenario IDs, then look up those scenario IDs in
      scenarios.yaml feature_gates. Verify every scenario ID resolves to a
      real scenario. Verify plan.yaml does not expose scenario content — only IDs.
    pass_criteria: >
      The quality lead can construct a complete feature-gated validation plan
      from scenarios.yaml feature_gates and plan.yaml scenario_gate fields alone.
      Every scenario ID in plan.yaml resolves to an existing scenario in
      scenarios.yaml. plan.yaml contains no scenario descriptions — only IDs and
      counts. Implementers cannot derive test expectations from plan.yaml.

  - id: SCE-5
    scenario: S5
    persona: "Product Manager"
    name: "features.yaml is technology-free for stakeholder communication"
    check: >
      Given the locked features.yaml, read it end-to-end and attempt to describe
      the product's identity, core behaviors, invariants, and scope boundaries
      using only the language in the document. Verify no technology names,
      implementation details, framework references, or architectural jargon appear.
    pass_criteria: >
      The product manager can describe the full product using only features.yaml
      without encountering any technology name, SDK reference, database product,
      hosting platform, library name, or deployment pattern. The document reads
      as a product description, not a technical specification.

  - id: SCE-6
    scenario: S6
    persona: "Technical Architect"
    name: "plan.yaml summary provides implementation sequence and scenario accounting"
    check: >
      Given the locked plan.yaml summary section, verify the architect can
      determine: (1) the implementation sequence (execution order), (2) what
      each feature slice delivers as a working capability, (3) the scenario count
      per feature, and (4) the cumulative_scenarios count reaches the total number
      of verification scenarios by the final feature. Verify scenario counts are
      integers only (not scenario IDs — compartmentalization).
    pass_criteria: >
      Summary section shows clear sequential ordering. Each row describes what
      the feature delivers. Scenario counts are integers (no scenario IDs).
      cumulative_scenarios is monotonically increasing. Final cumulative value
      equals total scenario count from scenarios.yaml. The architect can plan
      the full implementation sequence from the summary table alone.


# =============================================================================
# COVERAGE SUMMARY
# Maps every constraint and failure condition to the step evals that validate it.
# =============================================================================

coverage_summary:
  constraints:
    C1:
      description: "Intent-sufficient — product intent is the only required input"
      covered_by: [SE-4]
    C2:
      description: "Three-phase lifecycle — DRAFT, VALIDATE, LOCKED"
      covered_by: [SE-22, SE-23]
    C3:
      description: "features.yaml defines behaviors only — no technology choices"
      covered_by: [SE-1, SE-2, SE-22]
    C4:
      description: "architecture.yaml names concrete technologies"
      covered_by: [SE-5, SE-6, SE-22]
    C5:
      description: "Every plan.yaml scope item maps to file paths"
      covered_by: [SE-12, SE-22]
    C6:
      description: "Every execution_order entry delivers end-to-end capability"
      covered_by: [SE-13, SE-22]
    C7:
      description: "Every scenario has description, expected_behavior, pass_criteria, automation"
      covered_by: [SE-8, SE-9, SE-22]
    C8:
      description: "Every product behavior covered by at least one scenario"
      covered_by: [SE-2, SE-10, SE-22]
    C9:
      description: "Scenarios compartmentalized from implementer — no scenario content in plan.yaml"
      covered_by: [SE-14, SE-22]
    C10:
      description: "Three human review checkpoints in DRAFT phase"
      covered_by: [SE-24, SE-25, SE-26]
    C11:
      description: "Each artifact serves its distinct audience — no collision"
      covered_by: [SE-3, SE-7, SE-11, SE-22]
    C12:
      description: "plan.yaml summary with scenario counts; feature_gates in scenarios.yaml"
      covered_by: [SE-15, SE-22]
    C13:
      description: "Every execution_order entry has exit gate with observable outcomes"
      covered_by: [SE-16, SE-22]

  failure_conditions:
    F1:
      description: "features.yaml contains technology names"
      covered_by: [SE-1, SE-22]
    F2:
      description: "architecture.yaml uses vague technology references"
      covered_by: [SE-5, SE-22]
    F3:
      description: "execution_order entry does not deliver end-to-end capability"
      covered_by: [SE-13, SE-22]
    F4:
      description: "plan.yaml scope item lacks file path"
      covered_by: [SE-12, SE-22]
    F5:
      description: "Entry has no exit gate or exit gate references process steps"
      covered_by: [SE-16, SE-22]
    F6:
      description: "Scenario missing required fields"
      covered_by: [SE-8, SE-22]
    F7:
      description: "Product behavior has no corresponding scenario"
      covered_by: [SE-10, SE-22]
    F8:
      description: "plan.yaml contains scenario descriptions or content"
      covered_by: [SE-14, SE-22]
    F10:
      description: "plan.yaml has fewer than 2 execution_order entries"
      covered_by: [SE-17, SE-22]
    F12:
      description: "Artifacts produced without passing all three human review checkpoints"
      covered_by: [SE-24, SE-25, SE-26]

  scenarios:
    S1:
      description: "Product Owner — behavior-to-scenario traceability"
      covered_by: SCE-1
    S2:
      description: "Technical Architect — technology stack implements product spec"
      covered_by: SCE-2
    S3:
      description: "Engineering Lead — single-feature-slice implementability"
      covered_by: SCE-3
    S4:
      description: "Quality Lead — feature-gated validation plan"
      covered_by: SCE-4
    S5:
      description: "Product Manager — technology-free features.yaml"
      covered_by: SCE-5
    S6:
      description: "Technical Architect — plan.yaml summary and scenario accounting"
      covered_by: SCE-6
