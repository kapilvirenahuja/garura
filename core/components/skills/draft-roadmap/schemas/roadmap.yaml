# roadmap.yaml — Schema Definition
# Consolidates: roadmap.md + feasibility.yaml
# Produced by: /plan-roadmap
# Lifecycle: DRAFT → APPROVED → LOCKED
# Depends on: product.yaml

slug: "{product-slug}"
status: "DRAFT|APPROVED|LOCKED"
created_at: "{ISO-8601}"
updated_at: "{ISO-8601}"
product_ref: "{path to product.yaml}"
epics_ref: "{path to epics.yaml}"
feasibility_ref: "{path to feasibility.yaml}"

# --- The Bet (was: roadmap summary / intent frontmatter) ---

thesis: "{1-2 sentence core strategic thesis — why this roadmap, why now}"

narrative: |
  {3-4 paragraphs describing how the features flow together,
   what gets built first and why, how each horizon builds on the previous.
   This is the story of the roadmap.}

# --- Timeline — feature sequencing by horizon ---

timeline:
  - horizon: "near"
    label: "MVP"
    epic_refs: ["E1", "E2"]         # references to epics.yaml IDs
  - horizon: "mid"
    label: "MVP-Beyond"
    epic_refs: ["E3"]
  - horizon: "long"
    label: "Future"
    epic_refs: ["E4", "E5"]

# --- Feasibility per epic (was: feasibility.yaml) ---

feasibility:
  - epic_ref: "E1"
    risk_level: "low|medium|high"
    technical_risks:
      - risk: "{risk description}"
        severity: "low|medium|high"
        affected_systems: "{systems impacted}"
        mitigation: "{approach to reduce risk}"
    blockers: ["{blocker description or empty}"]
    sequencing_constraints: "{why this must come before/after something}"
    architecture_impact: "{systems and patterns affected}"

# --- Critical blockers — must be resolved before proceeding ---

critical_blockers:
  - blocker: "{description of what blocks progress}"
    severity: "high|critical"
    affected_epics: ["E1"]
    resolution: "{proposed resolution or 'unresolved'}"

# --- Open questions ---

open_questions:
  - question: "{technical or strategic question}"
    affected_epics: ["E1", "E2"]

# --- Risk summary ---

risk_summary:
  total_epics: 0
  high_risk_count: 0
  medium_risk_count: 0
  blocker_count: 0
  foundation_epics: ["E1"]             # epics that are foundational investments

# --- Exclusions & Assumptions ---

exclusions: ["{what is deliberately NOT in this roadmap}"]

assumptions: ["{assumption carried from product.yaml or new}"]
