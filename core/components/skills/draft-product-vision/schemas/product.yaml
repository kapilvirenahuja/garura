# product.yaml — Schema Definition
# Consolidates: market-context.yaml + vision.md
# Produced by: /discover-product
# Lifecycle: DRAFT → VALIDATED → LOCKED
# Depends on: nothing (root artifact)

slug: "{product-slug}"
status: "DRAFT|VALIDATED|LOCKED"
type: "product"              # "product" (default) or "library". Determines validation criteria and brief rendering.
created_at: "{ISO-8601}"
updated_at: "{ISO-8601}"

# --- Problem & Market Context (was: market-context.yaml) ---

problem: "{refined one-sentence problem statement}"

target_users:
  - id: "U1"
    persona: "{role/title}"
    goal: "{primary goal}"
    frustration: "{key pain point}"
    context: "{when/where they encounter this}"

competitors:
  - name: "{competitor name}"
    strengths: ["{str1}", "{str2}"]
    weaknesses: ["{wk1}", "{wk2}"]
    our_advantage: "{how we differentiate against this competitor}"

market_size:
  tam: "{total addressable market estimate or null}"
  sam: "{serviceable addressable market estimate or null}"
  som: "{serviceable obtainable market estimate or null}"
  note: "{derivation note — how estimates were reached}"

differentiators: ["{diff1}", "{diff2}"]

risks: ["{market risk 1}", "{market risk 2}"]

# --- Vision (was: vision.md) ---

value_proposition: "{1-2 paragraphs — what makes this worth building}"

strategic_goals:
  - id: "SG1"
    title: "{goal title}"
    description: "{what this means concretely}"
    metric: "{measurable indicator}"
    target: "{quantifiable target}"
    measurement: "{how to measure — method/tool}"

success_metrics:
  - strategic_goal_ref: "SG1"
    metric: "{metric name}"
    target: "{target value}"
    measurement_method: "{how measured}"

assumptions:
  - "{assumption 1 — reframed from risks}"
  - "{assumption 2}"

out_of_scope:
  - category: "{category name}"
    rationale: "{why excluded from this product}"

# --- Project Profiles (Three-Axis Model) ---
# Derived during discover-product. PP → NFR → QP cascade.
# Agent derives values from BRD/intent, user validates.
# Each dimension is 1-5 with optional rationale.

profiles:
  product_profile:
    pp1_user_sophistication: { level: 3, rationale: "{why this level}" }
    pp2_ux_maturity: { level: 2, rationale: "{why this level}" }
    pp3_persona_complexity: { level: 2, rationale: "{why this level}" }
    pp4_geographic_scope: { level: 1, rationale: "{why this level}" }
    pp5_integration_density: { level: 2, rationale: "{why this level}" }
    pp6_delivery_ambition: { level: 3, rationale: "{why this level}" }
    pp7_industry_vertical: { level: 1, rationale: "{why this level}" }
  nfr_profile:
    nfr1_risk: { level: 2, rationale: "{why this level}" }
    nfr2_security: { level: 2, rationale: "{why this level}" }
    nfr3_performance: { level: 3, rationale: "{why this level}" }
    nfr4_availability: { level: 2, rationale: "{why this level}" }
    nfr5_compliance: { level: 1, rationale: "{why this level}" }
    nfr6_scalability: { level: 2, rationale: "{why this level}" }
    nfr7_data_sensitivity: { level: 2, rationale: "{why this level}" }
  quality_profile:
    qp1_testing_depth: { level: 2, rationale: "{why this level}" }
    qp2_code_quality: { level: 2, rationale: "{why this level}" }
    qp3_documentation: { level: 2, rationale: "{why this level}" }
    qp4_ci_cd_maturity: { level: 2, rationale: "{why this level}" }
    qp5_observability: { level: 2, rationale: "{why this level}" }
    qp6_accessibility: { level: 1, rationale: "{why this level}" }
    qp7_security_testing: { level: 2, rationale: "{why this level}" }
