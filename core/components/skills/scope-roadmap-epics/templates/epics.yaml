# Scoped Epics — {Product Name}
# Generated by scope-roadmap-epics skill
# Path: .meridian/project/product/{slug}/epics.yaml

slug: "{product slug}"
vision_path: "{path to locked vision.md}"
time_horizon: "12 months"
generated_at: "{ISO-8601 timestamp}"

epics:
  - id: "E1"
    name: "{epic name}"
    strategic_goal: "{linked strategic goal text from vision}"
    description: "{2–3 sentences — what this epic delivers and why}"
    bucket: "near|mid|long"
    priority: "P1|P2|P3"
    effort: "S|M|L|XL"
    depends_on: []
    foundation_investment: true|false
    github_issue_ref: "TBD"

  # Repeat per epic (minimum 3, maximum 6)
