name: generate-intent-epics
description: >
  Instantiate the intent-epic template once per enriched capability and write
  one epic YAML file per capability to the product epics directory. Every
  mandatory field is populated from the enriched capability data plus the
  project profile plus the market brief — no empty sections reach the
  validator.
version: 0.2.0
checksum: "<computed by /create-play --rebuild>"

intent: >
  Given enriched-capabilities.yaml, a project profile, a market brief, and a
  features catalog, instantiate the intent-epic template once per enriched
  capability. Merge component-type capabilities into their parent vertical
  before instantiation so that each written epic maps to exactly one vertical
  capability. Populate every mandatory intent-block field: problem_statement
  (market gap + profile constraint), intents[] (one or more measurable end-state
  strings, each naming a human actor and observable outcome), appetite, in_scope,
  anti_goals, must_not_break, failure_conditions (>=2 plain cause strings),
  quantified constraints (performance with number+unit, security with named
  standard, accessibility with WCAG level), business_rules, hypothesis (We believe
  / will result in / We will know), assumptions, depends_on, foundation_investment,
  kb_source traceability. Write an expectation stub block (vetted.status:
  not_generated, success_scenarios: [], recovery: []) — the stub is populated
  later by draft-epic-expectation. Emit a decision-manifest.yaml recording every
  inferred decision (problem-statement synthesis, intents[] phrasing and metric
  pick, appetite computation, hypothesis template fill, component-to-parent merge).
  Use features_path to cross-check epic KB IDs against the declared product feature
  catalog. Output: one YAML file per vertical capability under epics_output_dir,
  plus the decision manifest.

input_contract:
  - name: enriched_capabilities_path
    type: path
    required: true
    description: >
      Path to enriched-capabilities.yaml produced by enrich-capabilities
      (Stage 4 of the specify play).

  - name: project_profile_path
    type: path
    required: true
    description: >
      Path to the project profile YAML. Used for appetite derivation, audience,
      and constraint mappings (NFR-2 performance level, security_level mapping,
      QP-6 accessibility level, compliance entries).

  - name: market_brief_path
    type: path
    required: true
    description: >
      Path to the market brief. Used for problem_statement context — competitive
      gap and market landscape data that grounds the problem statement.

  - name: ltm_intent_epic_schema_path
    type: path
    required: true
    description: >
      Path to intent-epic-schema.yaml — the schema defining all required fields,
      their types, and structural invariants for every epic.

  - name: ltm_rules_epics_path
    type: path
    required: true
    description: >
      Path to standards/rules/epics.md — the authoritative rule file for epic
      field rules (Rule 1 through Rule 7+). All populated fields must respect these.

  - name: ltm_rules_features_path
    type: path
    required: true
    description: >
      Path to standards/rules/features.md — rules for quantification, hypothesis
      format (Rule 2 for quantified constraints, Rule 3 for hypothesis, Rule 9 for
      source_for_quantification).

  - name: ltm_rules_scenarios_path
    type: path
    required: true
    description: >
      Path to standards/rules/scenarios.md — rules for success scenario phrasing
      (Rule 2: binary-testable language, forbidden words: should / smooth /
      intuitive / seamless / better / user-friendly / fast without a number /
      improved without a measurement).

  - name: epics_output_dir
    type: string
    required: true
    description: >
      Directory path for writing epic YAML files. Typically
      .garura/product/scope/epics/. One file per vertical capability written
      as epic-{domain}-{capability-slug}-001.yaml.

  - name: decision_manifest_path
    type: path
    required: true
    description: >
      Path for the decision-manifest.yaml output file. Written alongside the
      primary epic artifacts. Typically
      .garura/product/scope/decision-manifest-generate-intent-epics.yaml.

  - name: features_path
    type: path
    required: true
    description: >
      Path to .garura/product/scope/features.yaml produced by manage-features
      (Stage 4b of the specify play). Used to cross-check epic KB IDs against
      the declared product feature catalog — every epic's capability field must
      trace to a real feature ID in this catalog.

output_contract:
  epics:
    output_dir: "<path to epics_output_dir>"
    file_count: "<int — equals count of vertical capabilities after merge>"
    files:
      - path: "<absolute path to written epic YAML>"
        capability: "<feature ID>"
    quantification_coverage:
      performance_quantified: "<int — count of epics with a number+unit performance constraint>"
      security_named_standard: "<int — count of epics naming a specific standard>"
      accessibility_wcag: "<int — count of epics referencing a WCAG level>"
      compliance_entries: "<int — total compliance list entries across all epics>"
  decision_manifest:
    path: "<written path>"
    decisions_recorded: "<int>"

constraints:
  - id: C1
    rule: >
      NEVER leave a mandatory field empty, null, or TBD / to be determined.
      If the required data is not derivable, return structured failure for that
      capability and skip writing the epic.

  - id: C2
    rule: >
      NEVER invent a capability. Every epic maps 1:1 to an enriched capability
      (after component-to-parent merge). No epics are written for component-type
      capabilities — they are merged into their parent vertical.

  - id: C3
    rule: >
      NEVER write vague constraint values. performance must contain a number and
      unit; security must name a specific standard or control; accessibility must
      reference a WCAG level. Vague values ("fast", "secure", "reliable") are
      blocking validation failures.

  - id: C4
    rule: >
      NEVER produce fewer than 2 entries in failure_conditions per epic. Success
      scenarios are generated by draft-epic-expectation in the expectation block —
      they are not written by this skill.

  - id: C5
    rule: >
      NEVER use "should" language in success scenario then clauses. Observable
      outcomes only. Forbidden words in then: should, smooth, intuitive, seamless,
      better, user-friendly, fast (without a number), improved (without a measurement).

  - id: C6
    rule: >
      NEVER write a numeric constraint without a source_for_quantification block
      per rules/features.md Rule 9. KB-default numbers are tagged and surfaced at
      the checkpoint before reaching this skill — if one arrives unsourced, halt
      with unsourced_constraint.

  - id: C7
    rule: >
      NEVER write a capability whose provenance is assumption into the epic body.
      Assumptions live in assumptions_requiring_validation until user grounding
      per rules/product.md Rule 11.

  - id: C8
    rule: >
      NEVER leave must_not_break empty. Use "None — foundational epic" when
      there are no predecessors.

  - id: C9
    rule: >
      NEVER span domains in in_scope without cross_cutting_justification
      populated.

  - id: C10
    rule: >
      NEVER produce circular depends_on relationships. If epic A depends on B
      and B depends on A, merge or re-scope.

  - id: C11
    rule: >
      NEVER set uses_mocks: true without also populating demock_epic_ref.

  - id: C12
    rule: >
      NEVER skip kb_source. Every epic carries its provenance (capability, rules
      applied, experiential warnings).

  - id: C13
    rule: >
      ALWAYS write one file per vertical epic — the epics directory gets one
      file per vertical capability.

  - id: C14
    rule: >
      ALWAYS use the exact top-level keys from the schema — no extras, no renames.

  - id: C15
    rule: >
      ALWAYS enforce the rules in standards/rules/epics.md, rules/features.md,
      and rules/scenarios.md. These files are the authoritative rule source.

  - id: C16
    rule: >
      NEVER commit an inferred decision to the primary artifact (epic YAML files)
      without recording it in decision-manifest.yaml first.

  - id: C17
    rule: >
      NEVER tag a decision tier: high unless grounding_source.kind is kb_path AND
      the referenced KB file exists.

  - id: C18
    rule: >
      ALWAYS include alternatives_considered (>=1 entry) for every decision in the
      manifest, even high-confidence ones.

  - id: C19
    rule: >
      NEVER use a subsystem or component name as the grammatical actor of an intent
      field. The intent subject must be a named persona or a canonical user role per
      rules/epics.md Rule 1. If the source capability resolves as a component-type
      record it must have been merged in Step 2b — not instantiated as its own epic.

process:
  - step: "1"
    name: load-schema-and-rules
    description: >
      Read intent-epic-schema.yaml to understand the required field structure.
      Read rules/epics.md, rules/features.md, and rules/scenarios.md and hold all
      four files in context for the full run. Apply the following rules throughout:
      epics.md Rule 1 (intent names a user and observable outcome, not a layer),
      epics.md Rule 2 (domain is exactly one value; cross_cutting_justification when
      multi-domain), epics.md Rule 4 (must_not_break never empty), epics.md Rule 6
      (depends_on uses epic IDs only, no cycles), epics.md Rule 7 (foundation_investment
      true when >= 2 other epics depend on this), features.md Rule 2 (quantify every
      constraints sub-field), features.md Rule 3 (hypothesis three-phrase format),
      scenarios.md Rule 2 (binary-testable success scenario language).

  - step: "2"
    name: load-enriched-capabilities
    description: >
      Parse enriched-capabilities.yaml. Iterate over each enriched record.

  - step: "2b"
    name: merge-components-into-parent-verticals
    description: >
      Before instantiating epic templates, pre-process the enriched capability list
      to merge component-type records into their parent verticals.

      Walk every enriched record and check its type tag (from configure-capabilities
      Step 1c). For each capability tagged component:
        1. Read its rolls_up_into field to find the parent vertical's feature ID.
        2. Find the parent in the enriched list. If missing, return structured failure
           orphan_component.
        3. Merge component content into the parent's buckets:
           - Component's in_scope items -> appended to parent's in_scope with prefix
             "[component: {component_id}] {original item}" to preserve provenance.
           - Component's business_rules_applied -> appended to parent's rules;
             dedup on equal rule text.
           - Component's failure_conditions -> appended to parent's failure_conditions list.
           - Component's experiential_warnings -> appended to parent's warnings.
        4. Mark the component as merged_into: {parent_id}. Do NOT write it as a
           standalone epic.

      At the end of the merge pass, the list of epic-eligible records is ONLY the
      vertical capabilities. A vertical epic may have 15-25 in_scope items after
      absorbing 3-5 components — this is correct.

  - step: "3"
    name: instantiate-epic-template-per-vertical
    description: >
      For each vertical capability (after merge), compute all epic fields.

      Identity:
        - id: EPIC-{domain}-{capability-short-slug}-001
        - domain: from enriched record
        - capability: feature ID from enriched record; must trace to a real feature
          ID in features.yaml (cross-check using features_path input).

      WHAT:
        - problem_statement: pull market-brief competitive gap + profile-specific
          constraint. Must be specific. If KB Failure Scenarios have a concrete
          impact line, weave it in.
        - intents[]: a list of one or more measurable end-state strings. Each entry
          names a human actor (persona or canonical user role) and an observable
          outcome. At minimum one entry. Subject must never be a subsystem or
          component name (C19).

      BOUNDARIES:
        - appetite: from project profile's appetite or derived from timeline +
          capability count. Typical values: "2 weeks", "6 weeks".
        - in_scope: enumerate the capability at selected depth level. List 2-5 items.
        - anti_goals: at least 1 entry naming what is explicitly NOT in scope.
        - must_not_break: existing capabilities this epic cannot regress. Use
          "None — foundational epic" for foundation epics. Never leave empty (C8).
        - cross_cutting_justification: leave empty UNLESS the epic legitimately spans
          domains AND the product scope explicitly names the cross-cutting capability.
          When populated, name the scope item, the reason single-module does not apply,
          and how ownership is delineated.

      OUTCOMES:
        - failure_conditions[]: pass through cause strings from enriched record's
          failure_conditions. Plain strings only — no impact or mitigation sub-fields.
          At least 2 entries.
        - Do NOT write success_scenarios at top level. Write an expectation stub block
          (vetted.status: not_generated, success_scenarios: [], recovery: []). The
          draft-epic-expectation skill populates the expectation block later.

      CONSTRAINTS:
        - performance: pull from Success Criteria performance target or profile NFR-2
          level. MUST contain a number + unit.
        - security: pull from Business Rules or profile security_level mapping:
          critical -> "OWASP ASVS Level 3, NIST 800-63B AAL3, argon2id".
          MUST reference a named standard.
        - accessibility: from profile QP-6 mapping: level 3 -> "WCAG 2.1 AA",
          level 4+ -> "WCAG 2.1 AAA". MUST reference a WCAG level.
        - compliance: list from profile.compliance. May be empty if no entries.

      BUSINESS RULES:
        - Pass through business_rules_applied from the enriched record.

      VALIDATION:
        - hypothesis: format "We believe that {action} for {persona} will result in
          {outcome}. We will know this is true when {measurable signal}." Derive
          {action} from the primary entry in intents[], {persona} from the actor named
          in that intent entry, {outcome} from highest-impact success metric, {signal}
          from the same metric's threshold.
        - assumptions_requiring_validation: at least 1 entry, usually from Signals
          section of KB or inferred from profile.
        - dependencies: cross-team, external vendor, or data dependencies. Can be
          empty list.

      EPIC DEPENDENCIES:
        - depends_on: list of other EPIC ids in the same scope that this epic
          requires. Use short form EPIC-{domain}-{capability-slug}-001. Never
          reference external systems here. Never produce a cycle.
        - foundation_investment: true when this epic is shared infrastructure that
          >= 2 other epics depend on (e.g., auth, database, CI pipeline). Default
          false. When set, verify >= 2 other epics carry this id in their depends_on.

      MOCK TRACKING:
        - uses_mocks: true when implementation relies on mocks for phased delivery.
          Default false.
        - demock_epic_ref: required when uses_mocks == true. Names the follow-up
          EPIC id that replaces mocks with real integrations.

      KB TRACEABILITY:
        - kb_source.capability: feature ID (same as capability top-level).
        - kb_source.rules_applied: list the specific business rule IDs or names applied.
        - kb_source.experiential_warnings: pass through from enriched record.

  - step: "3b"
    name: emit-decision-manifest
    description: >
      Before writing any epic file, write decision-manifest.yaml to
      {decision_manifest_path}.

      Record every inferred decision produced during Steps 2b and 3. Assign tier
      at runtime: high when decision matched a KB rule/file/catalog entry directly;
      mid when context was built via web research; low when neither KB nor research
      yielded a grounding source.

      Decision types to record (prefix D-gie-, repeat per capability for
      D-gie-001 through D-gie-003 and D-gie-005, one entry per component for D-gie-006):

        D-gie-001 (problem-statement-synthesis): which competitive gap + profile
          constraint + KB failure condition cause string are woven into problem_statement.
        D-gie-002 (intents-phrasing-metric-pick): which success metric is selected as
          highest-impact and how it is phrased as the measurable end-state in intents[].
        D-gie-003 (appetite-computation): whether appetite is taken from profile.appetite
          directly or derived from timeline + capability count, and the computed value.
        Note: D-gie-004 (success-scenario-phrasing) was removed in #390 — that decision
          is now emitted by draft-epic-expectation under the D-dee- prefix.
        D-gie-005 (hypothesis-template-fill): which persona and metric fill the
          {persona} and {outcome} slots in the hypothesis template.
        D-gie-006 (component-to-parent-merge): for each component capability, which
          parent vertical it merges into and which in_scope items, rules, and failure
          conditions are absorbed.

      Manifest schema:
        schema_version: "1.0"
        skill: "generate-intent-epics"
        generated_at: "{ISO8601}"
        decisions:
          - decision_id: "D-gie-001"
            decision_type: "problem-statement-synthesis"
            tier: high | mid | low   # assigned at runtime per grounding source
            grounding_source:
              kind: kb_path | web_citation | none
              ref: "{KB file path | URL | null}"
              excerpt: "{optional short quote when kind=kb_path}"
            recommendation: "{the synthesized problem statement}"
            alternatives_considered:
              - alt: "{alternative framing}"
                why_not: "{one-line dismissal reason}"
            agent_reasoning_summary: "{2-3 sentence explanation}"
            user_response: null
            user_response_detail: null
          # ... repeat per decision type and per capability as applicable.
          # D-gie-001, D-gie-002, D-gie-003, D-gie-005 repeat once per vertical capability.
          # D-gie-006 repeats once per component capability merged.

  - step: "4"
    name: write-epic-files
    description: >
      Write each epic YAML to {epics_output_dir}/epic-{domain}-{capability-slug}-001.yaml.
      Ensure the parent directory exists before writing.

  - step: "5"
    name: return-output-contract
    description: >
      Return the structured output contract per the output_contract section.
      file_count must equal the count of vertical capabilities (after component merge).
      quantification_coverage counts must reflect actual populated constraint fields.

failure_conditions:
  - id: F1
    condition: >
      The epics output directory contains zero epic YAML files after the skill
      completes — no epics were produced despite enriched capabilities being present.

  - id: F2
    condition: >
      Any epic file has one or more mandatory fields that are empty, null, or
      contain only whitespace or placeholder strings (TBD, to be determined, ???).

  - id: F3
    condition: >
      Any epic's performance constraint field does not contain a number and unit,
      or security does not name a specific standard, or accessibility does not
      reference a WCAG level.

  - id: F4
    condition: >
      Any epic has fewer than 2 entries in failure_conditions. (Success scenarios
      are generated by draft-epic-expectation and are not validated by this skill.)

  - id: F5
    condition: >
      Any epic's kb_source.capability field points at a feature ID that does not
      exist in the referenced domain-taxonomy file or in features.yaml.

  - id: F6
    condition: >
      A component-type capability was not merged into its parent vertical and was
      instead written as a standalone epic. Component epics are structurally
      invalid — they must be absorbed.

  - id: F7
    condition: >
      decision-manifest.yaml is missing or contains fewer entries than the total
      inferred decisions made across Steps 2b, 3, and 3b. Decision types D-gie-001
      through D-gie-006 must have entries per applicable capability.

  - id: F8
    condition: >
      Any epic's must_not_break field is empty or null. The value "None —
      foundational epic" is the correct placeholder; empty is a failure.

success_scenarios:
  - id: S1
    persona: Product Manager
    given: >
      An enriched-capabilities.yaml with 23 vertical capabilities across 5
      domains, a project profile with appetite and compliance constraints, and
      a features.yaml with all 85 features. No component-type capabilities
      in the enriched record.
    then: >
      23 epic YAML files are written to epics_output_dir, each with all
      mandatory fields populated. Every epic's capability traces to a real
      feature ID in features.yaml. decision-manifest.yaml records at least
      one entry per decision type (D-gie-001 through D-gie-005) per capability
      where applicable. No empty mandatory fields.

  - id: S2
    persona: Product Manager
    given: >
      An enriched-capabilities.yaml that includes 5 vertical capabilities and
      3 component capabilities, where each component has a rolls_up_into field
      pointing to one of the vertical capabilities.
    then: >
      5 epic YAML files are written (one per vertical). Each vertical epic's
      in_scope contains the merged component items with provenance prefix
      "[component: {component_id}]". The 3 component capabilities are marked
      merged_into: {parent_id} and no standalone epic is written for them.
      D-gie-006 manifest entries record the merge decision for each component.

  - id: S3
    persona: Technical Architect
    given: >
      A vertical epic whose enriched record has performance targets from the
      KB Success Criteria and security requirements from profile security_level:
      critical.
    then: >
      The epic's performance constraint contains a number+unit sourced from the
      KB Success Criteria (cited in source_for_quantification). The security
      constraint names "OWASP ASVS Level 3, NIST 800-63B AAL3, argon2id" per
      the critical-level mapping. Every quantified constraint has a
      source_for_quantification block.
