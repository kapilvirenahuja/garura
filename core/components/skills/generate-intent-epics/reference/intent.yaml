name: generate-intent-epics
description: >
  Instantiate the intent-epic template once per enriched capability and write
  one epic YAML file per capability to the product epics directory. Every
  mandatory field is populated from the enriched capability data plus the
  project profile plus the market brief — no empty sections reach the
  validator.
version: 0.2.0
checksum: "<computed by /create-play --rebuild>"

intent: >
  Given enriched-capabilities.yaml, a project profile, a market brief, and a
  features catalog, instantiate the intent-epic template once per enriched
  capability under the four-section ICE schema (intent, expectations,
  connections, provenance — in that order, with identity id/domain/capability
  above them). Merge component-type capabilities into their parent vertical
  before instantiation so that each written epic maps to exactly one vertical
  capability. Populate every mandatory field in the new shape: intent.goal
  (one plain-language sentence with a persona subject and an observable
  outcome, <= 30 words), intent.constraints (plain-language strings with
  numeric values inline), intent.failure_scenario (>=2 plain cause strings),
  connections.before_chain/after/peers (epic-id lists, no cycles),
  connections.dependency_check (non-empty string), provenance.source.{kind,
  quote, confidence}, provenance.appetite, provenance.business_rules (>=1),
  provenance.kb_source (capability, rules_applied, experiential_warnings),
  provenance.uses_mocks (plus demock_epic_ref when true), provenance.foundation_investment.
  Write an expectations stub block (vetted.status: not_generated,
  success_scenario: [], recovery: []) — the stub is populated later by
  draft-epic-expectation. Emit a decision-manifest.yaml recording every
  inferred decision (goal source synthesis, goal phrasing and metric pick,
  appetite computation, connections dependency-check derivation, component-to-parent
  merge). Use features_path to cross-check epic KB IDs against the declared
  product feature catalog. Output: one YAML file per vertical capability under
  epics_output_dir, plus the decision manifest. Every epic file must be
  readable by a non-technical reviewer (tenet — epics are written for humans
  to read; rules/epics.md is binding).

input_contract:
  - name: enriched_capabilities_path
    type: path
    required: true
    description: >
      Path to enriched-capabilities.yaml produced by enrich-capabilities
      (Stage 4 of the specify play).

  - name: project_profile_path
    type: path
    required: true
    description: >
      Path to the project profile YAML. Used for appetite derivation, audience,
      and constraint mappings (NFR-2 performance level, security_level mapping,
      QP-6 accessibility level, compliance entries).

  - name: market_brief_path
    type: path
    required: true
    description: >
      Path to the market brief. Used for problem_statement context — competitive
      gap and market landscape data that grounds the problem statement.

  - name: ltm_intent_epic_schema_path
    type: path
    required: true
    description: >
      Path to intent-epic-schema.yaml — the schema defining all required fields,
      their types, and structural invariants for every epic.

  - name: ltm_rules_epics_path
    type: path
    required: true
    description: >
      Path to standards/rules/epics.md — the authoritative rule file for epic
      field rules (Rule 1 through Rule 7+). All populated fields must respect these.

  - name: ltm_rules_features_path
    type: path
    required: true
    description: >
      Path to standards/rules/features.md — rules for quantification, hypothesis
      format (Rule 2 for quantified constraints, Rule 3 for hypothesis, Rule 9 for
      source_for_quantification).

  - name: ltm_rules_scenarios_path
    type: path
    required: true
    description: >
      Path to standards/rules/scenarios.md — rules for success scenario phrasing
      (Rule 2: binary-testable language, forbidden words: should / smooth /
      intuitive / seamless / better / user-friendly / fast without a number /
      improved without a measurement).

  - name: epics_output_dir
    type: string
    required: true
    description: >
      Directory path for writing epic YAML files. Typically
      .garura/product/scope/epics/. One file per vertical capability written
      as epic-{domain}-{capability-slug}-001.yaml.

  - name: decision_manifest_path
    type: path
    required: true
    description: >
      Path for the decision-manifest.yaml output file. Written alongside the
      primary epic artifacts. Typically
      .garura/product/scope/decision-manifest-generate-intent-epics.yaml.

  - name: features_path
    type: path
    required: true
    description: >
      Path to .garura/product/scope/features.yaml produced by manage-features
      (Stage 4b of the specify play). Used to cross-check epic KB IDs against
      the declared product feature catalog — every epic's capability field must
      trace to a real feature ID in this catalog.

output_contract:
  epics:
    output_dir: "<path to epics_output_dir>"
    file_count: "<int — equals count of vertical capabilities after merge>"
    files:
      - path: "<absolute path to written epic YAML>"
        capability: "<feature ID>"
    quantification_coverage:
      performance_quantified: "<int — count of epics with a number+unit performance constraint>"
      security_named_standard: "<int — count of epics naming a specific standard>"
      accessibility_wcag: "<int — count of epics referencing a WCAG level>"
      compliance_entries: "<int — total compliance list entries across all epics>"
  decision_manifest:
    path: "<written path>"
    decisions_recorded: "<int>"

constraints:
  - id: C1
    rule: >
      NEVER leave a mandatory field empty, null, or TBD / to be determined.
      If the required data is not derivable, return structured failure for that
      capability and skip writing the epic.

  - id: C2
    rule: >
      NEVER invent a capability. Every epic maps 1:1 to an enriched capability
      (after component-to-parent merge). No epics are written for component-type
      capabilities — they are merged into their parent vertical.

  - id: C3
    rule: >
      NEVER write vague entries into intent.constraints[]. Every numeric value
      carries its unit inline; every security control names a specific standard;
      every accessibility requirement references a WCAG level. Vague phrasing
      ("fast", "secure", "reliable") is a blocking validation failure.

  - id: C4
    rule: >
      NEVER produce fewer than 2 entries in intent.failure_scenario per epic.
      Success scenarios are generated by draft-epic-expectation into the
      expectations block — they are not written by this skill.

  - id: C5
    rule: >
      NEVER use taste-word language in any string this skill writes. Forbidden
      words anywhere a reviewer reads the epic (intent.goal, intent.constraints,
      intent.failure_scenario): should, smooth, intuitive, seamless, better,
      user-friendly, feels, fast (without a number), improved (without a
      measurement).

  - id: C6
    rule: >
      NEVER write a numeric value into intent.constraints[] without its unit
      and a verifiable source-of-quantification context. KB-default numbers
      are tagged and surfaced at the capability-configuration checkpoint
      before reaching this skill — if one arrives unsourced, halt with
      unsourced_constraint.

  - id: C7
    rule: >
      NEVER write a capability whose provenance is assumption into intent or
      expectations. Assumption-provenance epics carry provenance.source.kind:
      assumption with provenance.source.quote: needs_user_grounding until user
      grounding (rules/product.md Rule 11).

  - id: C8
    rule: >
      NEVER leave connections.dependency_check empty whenever
      connections.before_chain.intents[] has entries. Rule 6 requires a
      non-empty verification string for every declared dependency set.

  - id: C9
    rule: >
      NEVER span domains in any of the four sections without
      provenance.source.quote explicitly naming the cross-cutting product-scope
      item. Inferred cross-cutting is not allowed.

  - id: C10
    rule: >
      NEVER produce circular connections.before_chain.intents[] relationships.
      If epic A lists B in before_chain and B lists A, merge or re-scope.

  - id: C11
    rule: >
      NEVER set provenance.uses_mocks: true without also populating
      provenance.demock_epic_ref AND listing that integration epic id in
      connections.after.intents[].

  - id: C12
    rule: >
      NEVER skip provenance.kb_source. Every epic carries its provenance
      (capability, rules_applied, experiential_warnings).

  - id: C13
    rule: >
      ALWAYS write one file per vertical epic — the epics directory gets one
      file per vertical capability.

  - id: C14
    rule: >
      ALWAYS use the exact top-level keys from the schema — no extras, no renames.

  - id: C15
    rule: >
      ALWAYS enforce the rules in standards/rules/epics.md, rules/features.md,
      and rules/scenarios.md. These files are the authoritative rule source.

  - id: C16
    rule: >
      NEVER commit an inferred decision to the primary artifact (epic YAML files)
      without recording it in decision-manifest.yaml first.

  - id: C17
    rule: >
      NEVER tag a decision tier: high unless grounding_source.kind is kb_path AND
      the referenced KB file exists.

  - id: C18
    rule: >
      ALWAYS include alternatives_considered (>=1 entry) for every decision in the
      manifest, even high-confidence ones.

  - id: C19
    rule: >
      NEVER use a subsystem or component name as the grammatical subject of
      intent.goal. The subject must be a named persona or a canonical user role
      per rules/epics.md Rule 1. If the source capability resolves as a
      component-type record it must have been merged in Step 2b — not
      instantiated as its own epic.

  - id: C20
    rule: >
      NEVER emit any banned legacy top-level key. Banned keys: intents (plural
      list), failure_conditions, in_scope, anti_goals, must_not_break,
      cross_cutting_justification, problem_statement, hypothesis,
      assumptions_requiring_validation, top-level appetite, top-level
      business_rules, top-level constraints as an NFR struct, top-level
      depends_on, top-level dependencies, top-level foundation_investment,
      top-level uses_mocks, top-level demock_epic_ref, top-level kb_source,
      top-level expectation (singular). The four sections in the new schema
      absorb all of these.

  - id: C21
    rule: >
      ALWAYS keep every sentence in intent.goal, intent.constraints[],
      intent.failure_scenario[], and provenance.business_rules[] plain-language
      and reviewer-readable. The tenet at the top of rules/epics.md
      ("Epics are written for humans to read") is non-negotiable and overrides
      every other rule when they conflict.

  - id: C22
    rule: >
      NEVER start the first sentence of intent.goal with a file path, a schema
      field name, or an unexpanded acronym. Lead with persona + outcome.

process:
  - step: "1"
    name: load-schema-and-rules
    description: >
      Read intent-epic-schema.yaml to understand the four-section structure
      (identity then intent, expectations, connections, provenance). Read
      rules/epics.md (including its TENET at the top: "Epics are written for
      humans to read" — non-negotiable), rules/features.md, and rules/scenarios.md
      and hold all four files in context for the full run. Apply throughout:
      the tenet (plain language, persona-led sentences, no schema-field soup);
      epics.md Rule 1 (intent.goal subject is a persona or canonical role;
      expectations.success_scenario[].then is observable);
      epics.md Rule 2 (domain is exactly one value; cross-cutting requires
      explicit product-scope quote in provenance.source.quote);
      epics.md Rule 3 (mock-first epic ships paired with an integration epic in
      connections.after.intents[]);
      epics.md Rule 4 (strict four-section schema; no banned legacy top-level keys);
      epics.md Rule 5 (success_scenario.then and .measure are binary-testable, no
      taste words);
      epics.md Rule 6 (connections.before_chain.intents[] explicit and acyclic;
      connections.dependency_check non-empty);
      epics.md Rule 7 (provenance.foundation_investment true when >= 2 incoming
      before_chain references); features.md Rule 2 (quantify numeric values
      inline in intent.constraints[] strings).

  - step: "2"
    name: load-enriched-capabilities
    description: >
      Parse enriched-capabilities.yaml. Iterate over each enriched record.

  - step: "2b"
    name: merge-components-into-parent-verticals
    description: >
      Before instantiating epic templates, pre-process the enriched capability list
      to merge component-type records into their parent verticals.

      Walk every enriched record and check its type tag (from configure-capabilities
      Step 1c). For each capability tagged component:
        1. Read its rolls_up_into field to find the parent vertical's feature ID.
        2. Find the parent in the enriched list. If missing, return structured failure
           orphan_component.
        3. Merge component content into the parent's buckets:
           - Component's business_rules_applied -> appended to the parent's rules
             list with prefix "[component: {component_id}] {original rule}" to
             preserve provenance. These flow into the parent's provenance.business_rules.
             Dedup on equal rule text.
           - Component's failure_scenario (or legacy failure_conditions) -> appended
             to the parent's failure-scenario list. These flow into the parent's
             intent.failure_scenario.
           - Component's experiential_warnings -> appended to the parent's warnings,
             flowing into provenance.kb_source.experiential_warnings.
        4. Mark the component as merged_into: {parent_id}. Do NOT write it as a
           standalone epic.

      At the end of the merge pass, the list of epic-eligible records is ONLY the
      vertical capabilities.

  - step: "3"
    name: instantiate-epic-template-per-vertical
    description: >
      For each vertical capability (after merge), compute all epic fields under
      the four-section ICE schema. Field order in the written file is:
      identity (id, domain, capability), then intent, expectations, connections,
      provenance.

      Identity (top of file, above the four sections):
        - id: EPIC-{domain}-{capability-short-slug}-001
        - domain: from enriched record (exactly one value)
        - capability: feature ID from enriched record; must trace to a real feature
          ID in features.yaml (cross-check using features_path input).

      Section 1 — intent:
        - intent.goal: one plain-language sentence. The persona or canonical role
          is the grammatical subject; the predicate is an observable outcome.
          <= 30 words. No file paths, schema field names, or unexpanded acronyms
          in the lead (tenet). Subject must never be a subsystem or component
          name (C19, C22).
        - intent.constraints: list of plain-language strings. Each NFR, policy,
          or hard limit the goal must respect appears as one sentence. Numeric
          values carry their number + unit inline. Pull performance targets from
          KB Success Criteria or profile NFR-2; security from Business Rules or
          profile security_level (critical -> OWASP ASVS Level 3, NIST 800-63B
          AAL3, argon2id); accessibility from profile QP-6 (level 3 -> WCAG 2.1
          AA; level 4+ -> WCAG 2.1 AAA); compliance from profile.compliance.
        - intent.failure_scenario: list of plain cause strings, minimum 2.
          Pass through from the enriched record's failure_scenario (or legacy
          failure_conditions) list. Plain strings only — no impact or mitigation
          sub-fields.

      Section 2 — expectations (stub only; populated later by draft-epic-expectation):
        - expectations.vetted.status: not_generated
        - expectations.vetted.approved_by: null
        - expectations.vetted.approved_at: null
        - expectations.success_scenario: []
        - expectations.recovery: []
        Do NOT populate success_scenario or recovery here.

      Section 3 — connections:
        - connections.before_chain.intents[]: list of EPIC ids that must be
          delivered before this epic. Short form EPIC-{domain}-{capability-slug}-001.
          No external systems. No cycles.
        - connections.after.intents[]: list of EPIC ids that depend on this one
          (mirror of before_chain on the consumer side). When provenance.uses_mocks
          is true, the integration epic id MUST appear here.
        - connections.peers.intents[]: list of EPIC ids that ship in the same
          envelope or share a slice with no ordering requirement.
        - connections.dependency_check: REQUIRED non-empty string. States how a
          reviewer or the pipeline verifies the listed before_chain epics are
          satisfied before this epic begins. Example: "All before_chain epics
          carry expectations.vetted.status: approved and have been delivered to main."

      Section 4 — provenance (last section in the file):
        - provenance.source.kind: brief_explicit | brief_inferred | rule_derived |
          research_supplemental | profile_default | assumption.
        - provenance.source.quote: verbatim brief text, OR CTC-NNN for rule_derived,
          OR profile.<field> for profile_default, OR needs_user_grounding for assumption.
        - provenance.source.confidence: high | medium | low.
        - provenance.appetite: time-box. From project profile's appetite or derived
          from timeline + capability count. Typical values: "2 weeks", "6 weeks".
        - provenance.business_rules: list of plain-language strings, minimum 1
          entry. Pass through business_rules_applied from the enriched record.
        - provenance.kb_source.capability: feature ID (equals top-level capability).
        - provenance.kb_source.rules_applied: list of KB business rule IDs or
          names that shaped this epic.
        - provenance.kb_source.experiential_warnings: pass through from enriched
          record. May be empty.
        - provenance.uses_mocks: true when this epic ships the mock-first part
          of the two-part delivery (Rule 3). Default false.
        - provenance.demock_epic_ref: REQUIRED when uses_mocks == true. Names the
          integration epic id that retires the mocks. That epic id MUST also
          appear in connections.after.intents[].
        - provenance.foundation_investment: true when this epic has >= 2 incoming
          connections.before_chain references from other epics (Rule 7). Default
          false. When set, verify >= 2 other epics list this id in their
          before_chain.intents[].

  - step: "3b"
    name: emit-decision-manifest
    description: >
      Before writing any epic file, write decision-manifest.yaml to
      {decision_manifest_path}.

      Record every inferred decision produced during Steps 2b and 3. Assign tier
      at runtime: high when decision matched a KB rule/file/catalog entry directly;
      mid when context was built via web research; low when neither KB nor research
      yielded a grounding source.

      Decision types to record (prefix D-gie-, IDs are audit-stable across schema
      migrations — do NOT renumber. D-gie-001/002/003/005 repeat per vertical
      capability; D-gie-006 repeats per merged component):

        D-gie-001 (goal-source-synthesis): which brief excerpt + profile
          constraint + KB failure-scenario cause are woven into intent.goal and
          provenance.source.quote.
        D-gie-002 (goal-phrasing-metric-pick): which highest-impact success
          metric is selected and how it is phrased into intent.goal as the
          measurable end-state.
        D-gie-003 (appetite-computation): whether provenance.appetite is taken
          from profile.appetite directly or derived from timeline + capability
          count, and the computed value.
        Note: D-gie-004 (success-scenario-phrasing) was removed in #390 — that
          decision is now emitted by draft-epic-expectation under the D-dee-
          prefix.
        D-gie-005 (connections-dependency-check-derivation): which verification
          rule fills connections.dependency_check, and which other epic ids are
          listed in before_chain, after, and peers.
        D-gie-006 (component-to-parent-merge): for each component capability,
          which parent vertical it merges into and which rules, failure-scenario
          strings, and warnings are absorbed.

      Manifest schema:
        schema_version: "1.0"
        skill: "generate-intent-epics"
        generated_at: "{ISO8601}"
        decisions:
          - decision_id: "D-gie-001"
            decision_type: "problem-statement-synthesis"
            tier: high | mid | low   # assigned at runtime per grounding source
            grounding_source:
              kind: kb_path | web_citation | none
              ref: "{KB file path | URL | null}"
              excerpt: "{optional short quote when kind=kb_path}"
            recommendation: "{the synthesized problem statement}"
            alternatives_considered:
              - alt: "{alternative framing}"
                why_not: "{one-line dismissal reason}"
            agent_reasoning_summary: "{2-3 sentence explanation}"
            user_response: null
            user_response_detail: null
          # ... repeat per decision type and per capability as applicable.
          # D-gie-001, D-gie-002, D-gie-003, D-gie-005 repeat once per vertical capability.
          # D-gie-006 repeats once per component capability merged.

  - step: "4"
    name: write-epic-files
    description: >
      Write each epic YAML to {epics_output_dir}/epic-{domain}-{capability-slug}-001.yaml.
      Ensure the parent directory exists before writing.

  - step: "5"
    name: return-output-contract
    description: >
      Return the structured output contract per the output_contract section.
      file_count must equal the count of vertical capabilities (after component merge).
      quantification_coverage counts must reflect actual populated constraint fields.

failure_conditions:
  - id: F1
    condition: >
      The epics output directory contains zero epic YAML files after the skill
      completes — no epics were produced despite enriched capabilities being present.

  - id: F2
    condition: >
      Any epic file has one or more mandatory fields (identity or anything inside
      intent, expectations, connections, provenance) that is empty, null, or
      contains only whitespace or placeholder strings (TBD, to be determined, ???).

  - id: F3
    condition: >
      Any epic carries a numeric value in intent.constraints[] without an inline
      unit, or names a security control without a recognized standard, or names
      an accessibility requirement without a WCAG level.

  - id: F4
    condition: >
      Any epic has fewer than 2 entries in intent.failure_scenario. (Success
      scenarios are generated by draft-epic-expectation and are not validated by
      this skill.)

  - id: F5
    condition: >
      Any epic's provenance.kb_source.capability field points at a feature ID
      that does not exist in the referenced domain-taxonomy file or in
      features.yaml.

  - id: F6
    condition: >
      A component-type capability was not merged into its parent vertical and was
      instead written as a standalone epic. Component epics are structurally
      invalid — they must be absorbed.

  - id: F7
    condition: >
      decision-manifest.yaml is missing or contains fewer entries than the total
      inferred decisions made across Steps 2b, 3, and 3b. Decision types D-gie-001
      through D-gie-006 must have entries per applicable capability.

  - id: F8
    condition: >
      Any epic's connections.dependency_check is empty while
      connections.before_chain.intents[] has entries. The check string is
      mandatory whenever a dependency is declared (Rule 6).

  - id: F9
    condition: >
      Any epic emits a banned legacy top-level key (intents plural, failure_conditions,
      in_scope, anti_goals, must_not_break, cross_cutting_justification,
      problem_statement, hypothesis, assumptions_requiring_validation, top-level
      appetite/constraints/business_rules/depends_on/dependencies/foundation_investment/
      uses_mocks/demock_epic_ref/kb_source/expectation). The four sections in the
      new schema absorb all of these.

  - id: F10
    condition: >
      intent.goal opens with a file path, a schema field name, or an unexpanded
      acronym, OR exceeds 30 words, OR carries a subsystem name as its subject.
      The tenet ("Epics are written for humans to read") bars this.

success_scenarios:
  - id: S1
    persona: Product Manager
    given: >
      An enriched-capabilities.yaml with 23 vertical capabilities across 5
      domains, a project profile with appetite and compliance constraints, and
      a features.yaml with all 85 features. No component-type capabilities
      in the enriched record.
    then: >
      23 epic YAML files are written to epics_output_dir, each shaped per the
      four-section ICE schema (identity at the top; intent, expectations,
      connections, provenance in that order). Every epic's
      provenance.kb_source.capability traces to a real feature ID in
      features.yaml. decision-manifest.yaml records at least one entry per
      decision type (D-gie-001, 002, 003, 005) per capability where applicable.
      No empty mandatory fields. No banned legacy top-level keys present.

  - id: S2
    persona: Product Manager
    given: >
      An enriched-capabilities.yaml that includes 5 vertical capabilities and
      3 component capabilities, where each component has a rolls_up_into field
      pointing to one of the vertical capabilities.
    then: >
      5 epic YAML files are written (one per vertical). Each vertical epic's
      provenance.business_rules contains the merged component rules with
      provenance prefix "[component: {component_id}]". The 3 component
      capabilities are marked merged_into: {parent_id} and no standalone epic
      is written for them. D-gie-006 manifest entries record the merge decision
      for each component.

  - id: S3
    persona: Technical Architect
    given: >
      A vertical epic whose enriched record has performance targets from the
      KB Success Criteria and security requirements from profile security_level:
      critical.
    then: >
      The epic's intent.constraints[] carries a sentence with the performance
      number + unit sourced from the KB Success Criteria, and a sentence naming
      "OWASP ASVS Level 3, NIST 800-63B AAL3, argon2id" per the critical-level
      mapping. provenance.source carries kind/quote/confidence sub-fields.

  - id: S4
    persona: Reviewer
    given: >
      Any generated epic file.
    then: >
      A non-technical reviewer can open the file and read intent.goal,
      intent.constraints, intent.failure_scenario, and provenance.business_rules
      end-to-end in plain language. No sentence opens with a file path, schema
      field name, or unexpanded acronym. intent.goal stays at or below 30 words
      and names a persona or canonical role as its subject.
