intent: >
  Resolve or create an issue, produce IDD-aware planning artifacts, create a branch,
  and deliver a ready-to-execute task graph — stopping before implementation.

constraints:
  - id: C1
    rule: >
      Working tree must be clean (no uncommitted changes) before planning begins.
  - id: C2
    rule: >
      Intent must contain enough context to derive a meaningful design;
      empty or trivially vague input is rejected.
  - id: C3
    rule: >
      Planning must be performed via sub-agent delegation, never via
      interactive plan-mode tools.
  - id: C4
    rule: >
      Issue resolution, branch creation, and STM initialization are embedded
      in this workflow — no separate feature-start play is invoked.
  - id: C5
    rule: >
      Planning artifacts must be IDD-aware: each section carries its own
      intent, constraints, and failure conditions.
  - id: C6
    rule: >
      Planning artifacts are lightweight — no formal gates, no bundles,
      no audience separation.
  - id: C7
    rule: >
      Tasks must be granular enough for direct implementation and must
      include a dependency graph.
  - id: C8
    rule: >
      Orchestrator must delegate domain work to agents — never execute
      domain tools directly.
  - id: C9
    rule: >
      Maximum 2 distinct domain agents may be invoked; built-in planning
      tools and recovery calls are exempt from this limit.
  - id: C10
    rule: >
      When no type hint is provided, the branch prefix defaults to feature/.

failure_conditions:
  - id: F1
    condition: >
      Planning artifacts are empty or contain no actionable design —
      the sub-agent produced no meaningful output from the given intent.
  - id: F2
    condition: >
      User rejected the plan at the approval gate (Vanish) and the
      remote branch still exists after halt — cleanup was incomplete.
  - id: F3
    condition: >
      Planning output is missing one or more of the three required
      sections: SPEC, VERIFY, or TASKS.
  - id: F4
    condition: >
      Branch does not exist on origin after the branch-creation step
      completes — the repository is not in a ready-to-execute state.
