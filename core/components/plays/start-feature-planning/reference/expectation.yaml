# Expectation for the start-feature-planning play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: start-feature-planning

generated_from:
  intent: core/components/plays/start-feature-planning/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Developer
    given: >
      The three planning artifacts (spec.md, verify.md, tasks.md) written
      to the STM planning directory.
    then: >
      Can pick up the first unblocked task from the dependency graph and
      begin implementation without further planning or clarification.
    measure: >
      tasks.md contains a dependency graph and a task breakdown in which the
      first unblocked task (Depends on: none) carries files, details, and an
      expected outcome — a developer can begin it with no further planning input.
  - id: S2
    persona: Tech Lead
    given: >
      The spec.md artifact containing the IDD-aware design with intent,
      constraints, and failure conditions per section.
    then: >
      Can review the design for completeness and either approve
      (Tether) or reject (Vanish) at the checkpoint with full context.
    measure: >
      spec.md carries an Intent, Constraints, and Failure Conditions header plus
      a technical approach with a chosen strategy, alternatives considered, and
      risks — enough for a Tech Lead to make an informed Tether/Vanish call.
  - id: S3
    persona: Developer
    given: >
      The verify.md artifact containing verification scenarios tied to
      the specification sections.
    then: >
      Can determine exactly what conditions must hold for each piece of
      work to be considered complete — no ambiguity about acceptance criteria.
    measure: >
      verify.md lists specific acceptance criteria, verification steps with
      expected outcomes, and edge cases — each criterion is concrete enough that
      completion can be judged without re-interpreting the intent.
  - id: S4
    persona: Project Manager
    given: >
      The tasks.md artifact containing the granular task graph with
      dependencies.
    then: >
      Can assess scope, estimate effort, and identify the critical path
      through the dependency graph without needing to read the full spec.
    measure: >
      tasks.md contains an explicit dependency graph (task -> task edges) over
      the granular tasks, from which the critical path and overall scope are
      readable without opening spec.md.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # empty / no actionable planning output
    trigger: >
      The planning artifacts are empty or contain no actionable design — the
      planning sub-agent returned no meaningful output for the given intent.
    direction: >
      The planning artifacts must carry an actionable design derived from the
      intent; re-run the planning sub-agent with the full intent context so it
      produces a non-empty, design-bearing output.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2                 # branch lingers on origin after Vanish
    trigger: >
      The plan was rejected at the approval gate (Vanish) but the remote feature
      branch still exists on origin — cleanup did not complete.
    direction: >
      A rejected plan must leave no remote branch behind; delete the lingering
      feature branch from origin, treating an already-deleted remote as success.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC3
    for_failure: F3                 # a required section is missing
    trigger: >
      The planning output is missing one or more of the three required
      sections — SPEC, VERIFY, or TASKS.
    direction: >
      All three sections (SPEC, VERIFY, TASKS) must be present; re-run the
      planning sub-agent and re-parse its output until every required section
      is produced.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC4
    for_failure: F4                 # branch absent on origin after creation
    trigger: >
      After the branch-creation step completes, the feature branch does not
      exist on origin — the repository is not in a ready-to-execute state.
    direction: >
      The feature branch must exist on origin after creation; re-create and
      push the branch to origin so the ready-to-execute state holds.
    handoff: autonomous
    derivable_at_l4: true
