# Expectation for the decode play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: decode

generated_from:
  intent: core/components/plays/decode/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# Lifted verbatim from the legacy intent scenarios block; only `measure` was added.
success_scenarios:
  - id: S1
    persona: "Migration lead extracting a single high-value feature on a single-stack codebase"
    given: >
      A Spring Boot monolith with features.yaml in product LTM. User
      invokes /decode --issue 500 --feature MEM-F001-signup.
    then: >
      Play detects stack "spring-boot-3" from physical-architecture.yaml,
      loads playbook at core/components/memory/knowledge/tech/spring-boot-3.md,
      synthesizes extract-from-spring-boot-3 temp skill in STM, and
      symlinks it into .claude/skills/ for dispatch. tech-architect uses
      the temp skill to extract MEM-F001's behavior-spec. test-engineer
      generates Tier-A contract tests for the signup endpoint and Tier-C
      pure-logic tests for the validation rules. test-runner executes the
      generated suite; all green. Phase 2 summary shown; user Tethers;
      evidence commits; temp skill is removed from STM and .claude/.
    measure: >
      behaviors/MEM-F001-signup.yaml exists with baseline_green=true in
      proposals.yaml; a temp skill was synthesized under temp-skills/ and the
      cleanup-report.yaml shows temp-skills/ removed after final Tether; the
      evidence self-commit recorded a SHA.

  - id: S2
    persona: "Platform engineer extracting an entire capability on a multi-stack codebase"
    given: >
      Ghost-style monorepo: Express backend, Ember legacy admin, React
      micro-apps. User invokes /decode --issue 500 --capability CMS.
    then: >
      Play detects 3 stacks; synthesizes 3 temp skills (express,
      ember-octane, react-18). tech-architect uses the stack-to-path map
      to dispatch the right skill per file. For each feature in CMS, a
      feature-spec is produced plus flow-specs for any user journey the
      feature participates in plus aspect-specs for any cross-cutting
      concern the feature is governed by. Tier-A contract tests generated
      for every exposed endpoint; Tier-B flow tests for every journey;
      Tier-C selective unit tests for pure logic; stack-coupled
      middleware tests cited as existing. test-runner executes all; all
      green on current code. User interrupts mid-run after 5 features;
      re-invokes /decode --issue 500 --capability CMS; play resumes from
      feature 6. On final Tether, all 3 temp skills cleaned up.
    measure: >
      stacks-detected.yaml lists 3 resolved stacks and temp-skills/ holds 3
      synthesized skills; after an interrupted run, status/decode.json shows
      the first 5 features completed and the resumed run starts at feature 6
      without re-extracting them; cleanup-report.yaml shows all 3 temp skills
      removed after final Tether.

  - id: S3
    persona: "Reviewer examining a test/code drift finding"
    given: >
      A feature whose existing test asserts HTTP 402 for expired
      subscription but whose source returns HTTP 403.
    then: >
      The drafted scenario lands in ambiguities[] with both citations.
      tech-architect does NOT generate a new test asserting either value —
      it would contradict the existing test or the existing code. The
      feature is surfaced 1-by-1 at Phase 1; user picks truth source. Only
      then does test-engineer emit a replacement test aligned with the
      chosen truth, and test-runner verifies green before capture.
    measure: >
      The feature spec's ambiguities[] carries one entry with both the
      test citation and the source citation; no generated test for the
      drifted assertion exists before the Phase 1 decision; checkpoint-
      decisions.yaml records the user's truth-source pick, and the replacement
      test is baseline_green=true only after that decision.

  - id: S4
    persona: "Reviewer examining a horizontal aspect"
    given: >
      Ghost's rate-limit policy via express-brute plus bypass rules for
      admin sessions.
    then: >
      aspects/ASP-rate-limit-001.yaml captures the full policy: routes it
      applies to (from middleware registration sites), limits (per route),
      storage backend (from client config), bypass_conditions (admin
      session check, cited). applies_to.routes populates from scan of
      every router file where the middleware is registered. Tier-A tests
      verify the rate-limit is active on one or two representative
      endpoints (not every endpoint — the aspect test asserts the aspect
      pattern, not redundant per-endpoint coverage). test-runner executes;
      green.
    measure: >
      aspects/ASP-rate-limit-001.yaml has non-empty applies_to.routes, a
      policy block with limit/window/storage_backend, and non-empty
      bypass_conditions[] each with cited_locations; one or two Tier-A
      representative tests exist for the aspect and report baseline_green=true.

  - id: S5
    persona: "Reviewer examining a user flow that crosses features"
    given: >
      "New member first-post" flow: signup → verify email → dashboard →
      compose → publish. Five features involved.
    then: >
      flows/FLOW-first-post-001.yaml captures the 5-step journey with
      participating_features: [MEM-F001, MEM-F002, CMS-F001, CMS-F002,
      CMS-F003]. Each feature-spec lists participates_in_flows:
      [FLOW-first-post-001]. traversing_aspects: [ASP-auth,
      ASP-rate-limit, ASP-error-envelope]. Tier-B E2E test generated
      covering the full journey using the codebase's existing E2E
      framework. test-runner executes; green.
    measure: >
      flows/FLOW-first-post-001.yaml lists the ordered participating_features
      and non-empty traversing_aspects; each named feature-spec back-links the
      flow in participates_in_flows[]; one Tier-B E2E test for the journey
      exists and reports baseline_green=true.

  - id: S6
    persona: "Tech lead running /decode against a stack with no playbook"
    given: >
      A codebase using a framework Garura has never indexed (e.g., Laravel
      in a PHP project). No playbook at
      core/components/memory/knowledge/tech/laravel-10.md.
    then: >
      Play halts with hard error listing detected stacks and the missing
      playbook path. User is prompted to author
      core/components/memory/knowledge/tech/laravel-10.md following the C30
      playbook template, then re-run. No generic extraction proceeds.
    measure: >
      The play halts at Step 5 with stacks-detected.yaml showing the stack
      as playbook_missing and the error names the missing playbook path; no
      spec, no temp skill, and no generated test exist for that run.

  - id: S7
    persona: "Reviewer whose generated test fails on current code"
    given: >
      tech-architect extracted a rule "reject registration when email
      domain is on the blocklist". test-engineer generated a Tier-C unit
      test asserting the block. test-runner reports FAIL — the test
      rejects registration but the code allows it.
    then: >
      Baseline-green gate halts the feature. Options presented: revise
      the spec (the rule was wrong), revise the test (assertion was
      wrong), drop the rule (it's actually not enforced), or defer. On
      revise-spec path, test-architect re-reads the code, confirms
      blocklist is not enforced in current implementation, and moves the
      finding to ambiguities[] — a feature the README claims exists but
      the code does not implement. Surface at Phase 1 for user decision.
    measure: >
      The failing unit is NOT marked captured (baseline_green=false in its
      test-run report); after the revise-spec path, the disputed rule appears
      in the spec's ambiguities[] and the unit is surfaced 1-by-1 at Phase 1
      with a recorded decision in checkpoint-decisions.yaml.

  - id: S8
    persona: "Tech lead Vanishing mid-run and resuming later"
    given: >
      /decode run extracted 5 of 12 features; user Vanishes at Phase 2
      (wants to review specs before committing). Temp skills preserved per
      C32.
    then: >
      status/decode.json records 5 completed, 7 pending. User re-invokes
      /decode --issue 500 --capability CMS after a week. Play finds temp
      skills still present, skips synthesis (already done), resumes from
      feature 6. No re-extraction of completed features. On final Tether
      this run, temp skills cleaned up.
    measure: >
      After Vanish, temp-skills/ still exists (no cleanup-report.yaml with
      success); status/decode.json shows 5 completed and 7 pending; the resumed
      run skips synthesis and starts at feature 6, and only the final-Tether run
      produces a cleanup-report.yaml showing temp-skills/ removed.

  - id: S9
    persona: "Migration lead encountering a flow with no existing E2E tests"
    given: >
      Flow FLOW-checkout-001 crosses 4 features; codebase has unit tests
      for each feature but no E2E Playwright tests for the full checkout
      journey.
    then: >
      test-engineer generates a Tier-B flow test from the extracted flow
      spec — new test file added under generated-tests/flow/. test-runner
      provisions the framework (Playwright detected in
      package.json devDependencies) and executes. On failure, halts per
      C25; on green, flow is captured.
    measure: >
      A new Tier-B flow test for FLOW-checkout-001 exists under
      generated-tests/flow/; its test-run report shows baseline_green=true and
      the flow is marked captured in proposals.yaml only when green.

  - id: S10
    persona: "Tech lead using /decode immediately after /codify, before /garura:enrich"
    given: >
      /codify completed on issue 321 producing STM features.yaml. /garura:enrich
      NOT yet run. User invokes /decode --issue 500
      --features-from .garura/project/issues/321/evidence/codify/proposals/scope/features.yaml
      --all.
    then: >
      Play accepts STM-sourced features.yaml per C2(b). All units tier 3
      (addition). /garura:enrich later promotes features + behaviors + flows +
      aspects + generated tests together.
    measure: >
      features-resolution.yaml records source=features_from with the STM path,
      and every proposal in proposals.yaml carries tier=3 (addition).

  - id: S11
    persona: "Tech lead running /decode against a non-runnable environment"
    given: >
      A repo where dependencies are not installed and there is no package
      manifest discoverable by scan-index's TEST_HARNESS detector (C26).
    then: >
      Play halts before extraction with a structured prerequisites error:
      "test harness not detectable / runnable. Install dependencies and
      re-run, or point at a prepared workspace via --workspace <path>."
      No specs emitted. No tests generated. Matches C25's absolute gate:
      unverifiable specs are not captured.
    measure: >
      The play halts at Step 7 with test-harness.yaml runnability_summary =
      not-detectable and a prerequisites error; no spec and no generated test
      exist for that run.

# Recovery — one entry per failure condition in intent.yaml (F0–F24, 25 entries).
# The validator turns a tripped failure into a recovery handoff plan and routes it:
# `autonomous` loops the fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F0                 # extraction dispatched before issue resolved/recorded
    trigger: >
      Extraction work was dispatched before the issue number was resolved and
      recorded in status/decode.json.
    direction: >
      Anchor STM first — resolve the issue and record the issue number in
      status/decode.json before any scan, synthesis, or extraction dispatch.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC2
    for_failure: F1                 # write outside STM / temp-skills boundary
    trigger: >
      A write landed on {product_base}, ~/.garura/core/memory/,
      core/components/skills/, or global ~/.claude/skills/ during the play.
    direction: >
      All outputs belong in STM (evidence/decode/, status/decode.json) and the
      allowed ephemeral temp-skills paths — re-route the offending write there
      and undo the out-of-bounds write.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC3
    for_failure: F2                 # features.yaml unresolvable
    trigger: >
      features.yaml could not be resolved from {product_base}/scope/features.yaml
      or from --features-from.
    direction: >
      A resolvable feature catalog must exist before extraction — run /codify and
      /garura:enrich to produce features.yaml, or supply a valid --features-from
      path; the builder cannot conjure the catalog.
    handoff: human
    derivable_at_l4: false

  - id: REC4
    for_failure: F3                 # no feature selector supplied
    trigger: >
      The invocation supplied no feature selector (--feature / --capability /
      --domain / --all).
    direction: >
      Scope must be bounded by the user's intent — the user must pick a selector;
      /decode refuses unbounded scope and cannot choose the scope for them.
    handoff: human
    derivable_at_l4: false

  - id: REC5
    for_failure: F4                 # entry emitted without cited_locations
    trigger: >
      An entry in business_rules, scenarios, data_contracts,
      integration_behaviors, edge_cases, flow steps, or aspect policies was
      emitted with empty cited_locations[].
    direction: >
      Every such entry must carry a non-empty citation or move to
      knowledge_gaps[] — re-derive the offending entry with its citation, or
      relocate the uncitable content to knowledge_gaps[].
    handoff: autonomous
    derivable_at_l4: true

  - id: REC6
    for_failure: F5                 # deny-list token in prose
    trigger: >
      A prose field across any stream contains a deny-list token (framework,
      SDK method, library class, specific product) outside cited_locations.excerpt.
    direction: >
      Prose must be framework-agnostic — re-word the offending field so technology
      names appear only inside cited_locations.excerpt, then re-validate.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC7
    for_failure: F6                 # test/code disagreement silently picked
    trigger: >
      Tests and source disagree and the play picked one side without recording
      the drift.
    direction: >
      Drift must surface, never resolve silently — record the disagreement in
      ambiguities[] with both citations and route the unit to Phase 1 surfacing.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC8
    for_failure: F7                 # citation integrity failed but spec emitted
    trigger: >
      Citation integrity failed (file missing, line range invalid, or excerpt
      mismatch) and the spec was emitted anyway.
    direction: >
      A spec must not ship with a broken citation — re-check the cited source and
      re-derive the offending citation, or drop the uncitable content, before the
      spec is marked captured.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC9
    for_failure: F8                 # spec missing a mandatory section
    trigger: >
      A spec was emitted missing a mandatory section for its stream (per
      C4a / C4b / C4c).
    direction: >
      Every spec must carry all mandatory sections for its stream — re-derive the
      offending spec so the missing section is populated.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC10
    for_failure: F9                 # spec captured without generated tests
    trigger: >
      A spec was captured without its corresponding generated tests, or without
      cited_existing references for stack-coupled units.
    direction: >
      Specs and tests ship together — generate the missing tests (or attach
      cited_existing references for stack-coupled units) before the spec is
      marked captured.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC11
    for_failure: F10                # red baseline marked captured
    trigger: >
      A generated test fails against the current codebase and the spec was marked
      "captured" in proposals.yaml anyway.
    direction: >
      Red baseline never ships — keep the unit uncaptured and route it to revise
      the spec, revise the test, drop the rule to ambiguity, or defer until the
      suite runs green.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC12
    for_failure: F11                # stack-coupled units got generated tests
    trigger: >
      Stack-coupled units (Tier D) received generated test files instead of
      cited_existing references.
    direction: >
      Stack-coupled units must be cited_existing only — drop the generated tests
      for the Tier-D unit and replace them with cited_existing references.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC13
    for_failure: F12                # test-runner received extraction context
    trigger: >
      test-runner received extraction context, spec content, or tech-architect /
      test-engineer reasoning in its dispatch contract.
    direction: >
      Runner isolation is absolute — re-issue the test-runner contract carrying
      only test_files, test_harness_path, and codebase_root, and re-run.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC14
    for_failure: F13                # cross-stream linking missing when links exist
    trigger: >
      Cross-stream linking is missing on a spec when the codebase demonstrably
      contains those links (e.g., a feature spec without participates_in_flows[]
      or governed_by_aspects[]).
    direction: >
      Existing cross-stream links must be populated — re-derive the offending spec
      so its cross-links reflect the links the codebase actually contains.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC15
    for_failure: F14                # extraction without tech-skill synthesis
    trigger: >
      The play proceeded to extraction without runtime tech-skill synthesis.
    direction: >
      Tech-aware extraction requires synthesized skills — synthesize the temp
      skills from the detected stacks before any extraction dispatch.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC16
    for_failure: F15                # detected stack has no playbook
    trigger: >
      A detected stack has no playbook at
      core/components/memory/knowledge/tech/{stack}.md and the play proceeded with
      generic extraction.
    direction: >
      A stack without a playbook is a hard halt — the user must author the missing
      playbook before /decode can extract from that stack; the builder cannot
      synthesize the playbook from nothing.
    handoff: human
    derivable_at_l4: false

  - id: REC17
    for_failure: F16                # temp skills written to framework paths / persist
    trigger: >
      Temp skills were written to core/components/skills/ or non-project
      ~/.claude/skills/, or persisted beyond the cleanup trigger.
    direction: >
      Temp skills live only in STM and the project-scoped link path — re-route the
      synthesis output to the STM temp-skills location and remove any skill that
      crossed the framework boundary.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC18
    for_failure: F17                # cleanup skipped after final Tether
    trigger: >
      Cleanup of temp skills was skipped after the final Tether, leaving stale
      decode-temp-*/ directories.
    direction: >
      The cleanup gate is enforced — run the temp-skill cleanup after final Tether
      so no stale temp skills remain.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC19
    for_failure: F18                # TEST_HARNESS not detectable, specs emitted anyway
    trigger: >
      TEST_HARNESS detection failed (no runnable framework, missing deps,
      non-executable environment) and the play proceeded to emit specs anyway.
    direction: >
      Specs that cannot be verified green are not captured — the user must install
      dependencies or supply a runnable workspace before /decode emits any spec;
      the builder cannot provision the environment on its own.
    handoff: human
    derivable_at_l4: false

  - id: REC20
    for_failure: F19                # wrong taxonomy on a proposal
    trigger: >
      A proposal in proposals.yaml carries learning_category != "product" or
      sub_category != null.
    direction: >
      The taxonomy is fixed for /decode output — re-derive the offending proposal
      with learning_category "product" and sub_category null.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC21
    for_failure: F20                # ltm_context agent produced no resolution-trace
    trigger: >
      An agent invoked with ltm_context produced no resolution-trace.yaml.
    direction: >
      Every ltm_context-bearing dispatch must leave a resolution trace — re-run
      the offending agent so it writes resolution-trace.yaml at its declared path.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC22
    for_failure: F21                # a checkpoint phase skipped
    trigger: >
      Phase 1 (1-by-1) or Phase 2 (summary) checkpoint was skipped, even for a
      zero-unit exit.
    direction: >
      The checkpoint gate cannot be self-granted — pause, present the required
      phase, and await the human Tether/Vanish before proceeding.
    handoff: human
    derivable_at_l4: false

  - id: REC23
    for_failure: F22                # flagged units batched into Phase 2
    trigger: >
      Flagged units (per the C17 flag criteria) were batched into Phase 2 instead
      of surfaced 1-by-1 in Phase 1.
    direction: >
      Decision Surfacing requires a per-unit human call — surface each flagged
      unit 1-by-1 in Phase 1 and record the user's explicit accept/reject/defer.
    handoff: human
    derivable_at_l4: false

  - id: REC24
    for_failure: F23                # proposals.yaml absent after completion
    trigger: >
      proposals.yaml is absent from STM after the play completed with a Tether.
    direction: >
      A completed run must leave a master index — re-run the aggregation step to
      write proposals.yaml (total_units: 0 for a zero-unit run).
    handoff: autonomous
    derivable_at_l4: true

  - id: REC25
    for_failure: F24                # completed unit missing artifacts on disk
    trigger: >
      A unit marked "completed" in status/decode.json has no spec_path on disk,
      no generated tests on disk, or baseline_green != true.
    direction: >
      A completed unit must have its spec and tests on disk and a green baseline —
      re-run the offending unit's extraction, test generation, and baseline-green
      verification, or revert its completed status until those hold.
    handoff: autonomous
    derivable_at_l4: true
