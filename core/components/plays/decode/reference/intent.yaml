name: decode
description: >
  Brownfield behavior extraction with executable verification. Given a
  codebase's feature catalog (from /codify + /enrich, or directly from /codify
  STM), /decode extracts the business logic the code encodes and emits it as
  three cross-linked artifact streams — feature specs, user-flow specs, and
  cross-cutting aspect specs — plus a tiered suite of generated tests that
  must pass green against the current codebase before the extraction is
  considered captured. Pairs with /codify: codify captures shape, decode
  captures logic. Output is the migration contract — the set of behaviors the
  new stack must reproduce.

version: "0.1.0"

checksum: "placeholder-replaced-by-create-play-build"

intent: >
  A migration lead with a brownfield codebase invokes /decode against a named
  set of features. The play is deliberately tech-agnostic at compile time —
  /create-play compiles no tech-specific skills into the play. At runtime, the
  play detects the technology stacks from physical-architecture.yaml, reads
  matching tech playbooks from core/components/memory/knowledge/tech/, and
  synthesizes ephemeral extraction-skills in STM scoped to this issue. Those
  temp skills drive stack-aware extraction (Spring patterns for Spring Boot
  code, React patterns for React code, etc.) and are cleaned up after the
  user's final Tether. This keeps the framework lean — only the stacks
  encountered in a given run produce skill artifacts, only for the duration
  of the run.

  Production behavior lives on three axes, and /decode captures all three:

  1. Vertical — feature slice. What this single feature does end-to-end:
     rules, data contracts, integration behaviors, edge cases. Output:
     behaviors/{feature-id}.yaml.

  2. Vertical — user journey. What happens when the user clicks X or does Y.
     A flow crosses multiple features (signup → verify → onboarding → first
     action). Output: flows/{flow-id}.yaml.

  3. Horizontal — cross-cutting aspect. Concerns applied universally or by
     decorator: authentication, authorization, rate-limiting, idempotency,
     input validation, error-envelope shape, logging, observability, i18n,
     feature flags. These live between features, not inside them. Output:
     aspects/{aspect-id}.yaml.

  Every feature spec names the flows it participates in and the aspects that
  govern it. Every flow spec names the features it traverses. Every aspect
  spec names the features, routes, or components it applies to. The three
  streams are bidirectionally linked, making verticality and horizontal-ness
  navigable.

  Tests are the cornerstone of validation. For every extracted behavior,
  scenario, or aspect, /decode generates executable tests tiered by
  portability across stacks:

  - Contract tests (HTTP request/response at API boundary) — generated
    aggressively, fully portable across backend stacks.
  - Flow tests (E2E user journey) — generated for every user flow, mostly
    portable across frontend E2E frameworks.
  - Pure business-logic unit tests (no stack coupling) — generated
    selectively where logic is non-trivial, portable within language family.
  - Stack-coupled units (middleware internals, framework hooks) — NOT
    generated; existing tests cited only.

  Generated tests are verified by a test-runner agent in strict context
  isolation: the runner sees only the test files plus the current codebase
  and reports pass/fail. No extraction context, no implementation context,
  no LLM interpretation of outcomes. A feature-spec or flow-spec cannot be
  captured unless its generated tests run GREEN against the current
  codebase. Tests failing on current code mean the extraction was wrong —
  the extraction is fixed or dropped, never committed with a red baseline.

  Outputs are staged under {stm_base}/{issue}/evidence/decode/proposals/ with
  a master proposals.yaml index. No writes to product LTM — /enrich is the
  sole promotion gate. Processing is per-feature and per-flow, resumable via
  status file. Downstream, locked specs plus the generated test suite feed
  /prepare as the migration contract: /prepare plans LLD against the new
  stack; /implement builds until the ported test suite runs green on the new
  stack.

  /decode is scoped to stack transforms where behavior must be re-implemented
  on a different runtime. It is explicitly NOT a version-upgrade helper —
  API-surface diffs for Java 8→21 or React 13→17 style same-framework
  upgrades need a different play focused on compat-surface analysis.
  /check-drift has no role in /decode; drift detection runs later against
  locked specs, not against raw brownfield code.

constraints:
  - id: C0
    rule: >
      Issue resolution: the play requires a GitHub issue number to anchor its
      STM output paths. Resolution order: (a) explicit --issue argument;
      (b) current branch name matching decode/{issue}-* or feat/{issue}-decode-*;
      (c) if neither, delegate to project-orchestrator to create a tracking
      issue from invocation args. The resolved issue number is written to
      {stm_base}/{issue}/status/decode.json before any scan, synthesis, or
      extraction work begins. Unresolvable AND uncreatable is a hard halt.

  - id: C1
    rule: >
      Feature-scope input is mandatory. /decode never runs against an
      unbounded codebase. Invocations must name at least one feature via
      --feature FEAT-ID (repeatable), --capability CAP-ID (repeatable,
      expands to capability's features), --domain DOMAIN-ID (repeatable,
      expands to domain's features), or --all (every feature in
      features.yaml). An invocation with no selector is a hard halt. The
      play refuses to auto-discover features — that is /codify's job, and
      conflating the two responsibilities produces shallow output in both.

  - id: C2
    rule: >
      features.yaml must be resolvable. Resolution order:
        (a) {product_base}/scope/features.yaml (post-/enrich, canonical);
        (b) --features-from <path> (explicit override, e.g. STM output from
            a prior /codify run);
        (c) if neither resolves, hard halt with a clear error pointing at
            /codify + /enrich as the prerequisite.

  - id: C3
    rule: >
      The play writes ONLY to {stm_base}/{issue}/evidence/decode/,
      {stm_base}/{issue}/status/decode.json, and the ephemeral temp-skills
      location per C27. No writes to product LTM ({product_base}). No writes
      to global core LTM (~/.garura/core/memory/). No writes to the permanent
      skill directories (core/components/skills/, ~/.claude/skills/) — temp
      skills synthesized at runtime go to the STM-scoped location and are
      deleted per C29. Reads of product LTM (features.yaml,
      physical-architecture.yaml, architecture/*, research/*) are permitted
      for context.

  - id: C4
    rule: >
      Three-stream artifact output. Every /decode run produces artifacts in
      three streams, cross-linked bidirectionally:
        (a) Feature specs at
            {stm_base}/{issue}/evidence/decode/proposals/scope/behaviors/{feature-id}.yaml
        (b) Flow specs at
            {stm_base}/{issue}/evidence/decode/proposals/scope/flows/{flow-id}.yaml
        (c) Aspect specs at
            {stm_base}/{issue}/evidence/decode/proposals/scope/aspects/{aspect-id}.yaml
      Zero of any single stream is valid only when the codebase genuinely
      lacks that concern (e.g., no user flows in a headless service → flows/
      empty). Omitting a stream silently when it exists is a structural
      failure.

  - id: C4a
    rule: >
      Feature-spec shape is fixed. Every behaviors/{feature-id}.yaml contains:
        meta              — source_type ("extracted_from_code"), confidence,
                            evidence[], learning_category ("product"),
                            sub_category (null), tier, feature_ref,
                            file_surface[], participates_in_flows[],
                            governed_by_aspects[]
        business_rules[]  — each with id, statement, cited_locations[]
        data_contracts[]  — each with entity, fields[], constraints[],
                            cited_locations[]
        integration_behaviors[] — each with boundary, direction, contract
                                  (endpoint/method/payload_shape/retry/
                                  idempotency/timeout), cited_locations[]
        edge_cases[]      — each with trigger, behavior, cited_locations[]
        ambiguities[]     — may be empty; test/code disagreements with both
                            citations (never silently resolved)
        knowledge_gaps[]  — areas that could not be cited, with reason
        scenarios[]       — Given/When/Then per rule, cross-linked to
                            generated_tests_ref[] (see C23)
      Missing any mandatory section is a validation failure.

  - id: C4b
    rule: >
      Flow-spec shape. Every flows/{flow-id}.yaml captures an end-to-end user
      journey that crosses features and layers:
        meta              — source_type, confidence, evidence[],
                            learning_category ("product"), sub_category (null),
                            tier, flow_kind (e.g., signup, checkout, publish)
        trigger           — user action or system event that initiates the
                            flow, with cited_locations[]
        participating_features[] — feature_ids traversed by this flow, in
                            order
        traversing_aspects[] — aspect_ids governing any step of this flow
        steps[]           — ordered steps with {actor, action, system_effect,
                            cited_locations[]}. Actor is one of {user,
                            system, external_service}.
        success_criteria  — observable end state with cited_locations[]
        failure_paths[]   — alternate ends with {trigger, outcome,
                            cited_locations[]}
        generated_tests_ref[] — E2E test files generated for this flow
                            (see C23)

  - id: C4c
    rule: >
      Aspect-spec shape. Every aspects/{aspect-id}.yaml captures a
      cross-cutting concern applied outside feature boundaries:
        meta              — source_type, confidence, evidence[],
                            learning_category ("product"), sub_category (null),
                            tier, aspect_kind (e.g., auth, authorization,
                            rate_limit, validation, error_envelope, logging,
                            observability, idempotency, i18n, feature_flag)
        applies_to        — {routes[], components[], features[]} — the scope
                            of application, cited_locations[]
        policy            — structured description of the policy (e.g. for
                            rate_limit: limit, window, bypass_conditions,
                            storage_backend) with cited_locations[]
        decorator_pattern — how the aspect is applied in the codebase
                            (middleware, annotation, HOC, interceptor, etc.)
                            — descriptive only, cited_locations[] names
                            concrete file/line
        bypass_conditions[] — when the aspect does NOT apply, with
                            cited_locations[]
        ambiguities[]     — may be empty; disagreements between declared
                            policy and observed policy
        knowledge_gaps[]  — uncited areas
        generated_tests_ref[] — aspect-level tests generated (see C23)

  - id: C4d
    rule: >
      Cross-stream linking is mandatory. Every feature-spec MUST populate
      participates_in_flows[] and governed_by_aspects[]. Every flow-spec MUST
      populate participating_features[] (in order) and traversing_aspects[].
      Every aspect-spec MUST populate applies_to.{routes,components,features}.
      A spec with empty cross-links is valid only when the codebase
      genuinely has none — the emptiness must be justified in the spec's
      knowledge_gaps[] if it is surprising (e.g., a feature with no
      governing aspects at all).

  - id: C5
    rule: >
      Evidence citation is mandatory at rule, scenario, contract,
      integration, edge-case, step, and policy granularity. Every such entry
      across all three streams carries a non-empty
      cited_locations: [{file, line_start, line_end, excerpt}] with excerpts
      as verbatim source quotes. Uncitable content moves to knowledge_gaps[]
      or is dropped — never emitted without citation. This is the hard
      discipline that prevents LLM fabrication.

  - id: C6
    rule: >
      Framework-agnostic prose: validate-abstraction-layer applies to every
      descriptive prose field across all three streams (rule statements,
      scenario narratives, contract descriptions, integration descriptions,
      edge-case text, flow step descriptions, aspect policy descriptions,
      aspect decorator_pattern text). Framework, SDK, library, and
      specific-product names appear ONLY inside cited_locations.excerpt
      (direct file quotes are evidence, not prescription). Prose with
      deny-list tokens is rejected at validation.

  - id: C7
    rule: >
      Tests-first reading order. For each feature, flow, and aspect, the
      play reads existing test files identified via scan-index and
      feature-to-file mapping BEFORE reading source files. Tests encode
      intent more cleanly than source. Source is read to validate drafted
      scenarios, fill gaps where no test covers a rule, and capture
      implementation-only behaviors. A unit with no tests in scope falls
      back to code-only extraction and MUST be flagged confidence: "low"
      with mandatory Phase 1 surfacing.

  - id: C8
    rule: >
      Citation integrity is the static verification standard. Before any
      spec is finalized, every cited_locations entry is checked:
        (a) the file exists at the cited path;
        (b) the line range exists;
        (c) the excerpt at that line range matches the quoted excerpt
            byte-for-byte after trim-equivalent normalization.
      Citation-integrity failure halts the spec with a structured error —
      the extraction referenced source that no longer exists or has changed.
      Runtime scenario execution is a separate gate — see C25.

  - id: C9
    rule: >
      Test-code drift is surfaced in ambiguities[], never silently resolved.
      When a scenario drafted from tests asserts behavior X, and the source
      at the cited path implements behavior Y, the drift is recorded with
      both citations and both excerpts. The spec's overall_confidence is
      lowered and the spec is routed to Phase 1 surfacing (C18). Silent
      resolution of test/code drift is a structural failure.

  - id: C10
    rule: >
      Two-level learning taxonomy. Every spec and every proposals.yaml entry
      carries learning_category: "product" and sub_category: null (product
      is flat in the canonical tree). These are the single canonical values
      for all three streams. Any other value is invalid.

  - id: C11
    rule: >
      Per-unit LOC pre-check. Before dispatching extraction for a feature,
      flow, or aspect, the play measures its file_surface LOC (source + test
      combined, from scan-index byte counts). Exceeding the configurable
      soft cap (default 5000 LOC) surfaces the overage to the user BEFORE
      extraction and requests narrower scoping: --exclude-files patterns,
      split the unit, or explicit Tether to proceed over-budget. Silent
      over-budget proceed is a constraint violation.

  - id: C12
    rule: >
      Runtime extraction-budget overrun is handled separately from the LOC
      pre-check. If an extraction dispatch returns a structured failure with
      what_failed: "extraction_budget_exhausted", the play marks that unit
      "deferred" in the status file, preserves any partial output under
      proposals/deferred/{unit-id}/, and continues with the remaining
      targeted units. Deferred units are surfaced at the Phase 1 checkpoint
      and NOT emitted as completed specs. No automatic split or retry.

  - id: C13
    rule: >
      Extraction is owned by a single domain agent — tech-architect.
      tech-architect produces every section of every spec across all three
      streams (rules, scenarios, contracts, integrations, edge cases, flow
      steps, aspect policies, ambiguities, knowledge gaps). Single ownership
      preserves consistency between rules and scenarios describing the same
      behavior. tech-architect dispatches tech-aware extraction via the
      runtime-synthesized skills per C27.

  - id: C14
    rule: >
      test-engineer owns two things only in /decode: (1) feature- and
      flow-scoped test-surface mapping (which existing tests exercise which
      units, per its /prepare role), and (2) authoring of generated tests
      per the tier rules in C24. test-engineer does NOT author
      behavior-specs, flow-specs, or aspect-specs — those are
      tech-architect's domain per C13.

  - id: C15
    rule: >
      test-runner is a third domain agent dedicated to context-isolated test
      execution. It sees ONLY the generated test files plus the current
      codebase and the test-framework invocation command. It does not
      receive extraction context, spec content, tech-architect's reasoning,
      or test-engineer's test-authoring rationale. It reports pass/fail per
      test plus stderr capture. This mirrors the code-builder vs test-writer
      isolation in /implement. The runner agent is non-interpreting — it
      executes and reports.

  - id: C16
    rule: >
      Zero-unit exit is valid. If the resolved scope (after applying
      selectors against features.yaml plus derived flow and aspect
      enumeration) is empty, the play writes proposals.yaml with
      total_units: 0 and extraction_complete: true, presents a summary
      checkpoint, and exits cleanly on Tether. Zero-unit is a valid outcome
      of a no-match selector, not an error.

  - id: C17
    rule: >
      A human checkpoint is required before evidence commit. Two sequential
      phases mirroring /codify C12:
        (1) 1-by-1 surfacing per C18 for units flagged by any of:
            overall_confidence: "low", non-empty ambiguities[],
            citation-integrity warnings, deferred status (C12), LOC
            over-budget proceed-anyway (C11), no-tests fallback (C7),
            baseline-green failures that were remediated (C25).
        (2) Summary Tether/Vanish covering the remainder with aggregate
            counts by stream, by confidence, ambiguity totals,
            knowledge-gap totals, deferred count, tests generated per
            tier, baseline-green status per unit.
      Evidence commit happens only after both phases and the final Tether.

  - id: C18
    rule: >
      Decision Surfacing Discipline governs Phase 1. Units meeting any flag
      criterion in C17 are surfaced individually for explicit
      accept | reject | defer. Batching flagged units into the Phase 2
      summary is a structural failure. Unflagged units with
      confidence >= "medium" and empty ambiguities[] batch through Phase 2.

  - id: C19
    rule: >
      Evidence self-commit via repo-orchestrator is non-blocking. Commit
      failure is logged and the play exits cleanly. proposals.yaml, specs,
      and generated tests remain on disk for /enrich to consume.

  - id: C20
    rule: >
      Master proposals.yaml lists every unit processed with fields:
        proposal_id, stream (behaviors|flows|aspects), unit_id, spec_path,
        target_path, overall_confidence, rules_count, scenarios_count,
        tests_generated_by_tier (contract|flow|unit_pure|cited_existing),
        baseline_green (true|false|deferred), ambiguity_count,
        knowledge_gap_count, citation_integrity_status, file_surface_loc,
        learning_category, sub_category, tier, source_type, notes.
      Tier assignment: Tier 2 when the unit has an existing entry in
      {product_base}/scope/ (features/flows/aspects); Tier 3 when the unit
      exists only in STM from a prior /codify run (fresh addition).
      source_type is uniformly "extracted_from_code" — distinct from
      /codify's "inferred_from_code" so /enrich routes behavior output
      through its own consumption path.

  - id: C21
    rule: >
      The LTM Resolution Protocol applies to every agent dispatch. Each
      dispatch populates ltm_context with product_base, core_base, and
      query_domains scoped to the unit (feature's domain + capability,
      flow's traversed features, or aspect's aspect_kind). Every dispatch
      produces a resolution-trace.yaml. R4 entries (LLM fallback) flag
      organizational knowledge gaps and propagate into the spec's
      knowledge_gaps[] section.

  - id: C22
    rule: >
      Per-unit resumability via status file.
      {stm_base}/{issue}/status/decode.json tracks each unit's state with
      entries of the form
      {unit_id: {stream, status: pending|in_progress|completed|deferred|failed,
      started_at, completed_at, spec_path, baseline_green, notes}}. On
      re-invocation, /decode resumes from the first non-completed unit.
      in_progress entries reset to pending (prior session assumed
      abandoned). Completed units are never re-extracted unless --force.

  # ---------- HARD-REQUIREMENT TEST GENERATION + VERIFICATION ----------

  - id: C23
    rule: >
      Test generation is a HARD REQUIREMENT of /decode, not a configurable
      output. Every /decode run produces both specs AND their generated
      tests. There is no spec-only mode and no --with-tests / --no-tests
      flag. A run that produces specs without corresponding generated tests
      fails validation and is not committable. The test suite is the
      migration contract — specs without tests are opinions without proof.

  - id: C24
    rule: >
      Tests are generated tiered by portability across stacks:
        Tier A — Contract tests: HTTP request/response at API boundary.
          Generated aggressively; one per integration_behavior (outbound)
          and one per exposed API endpoint traversed by a flow. Fully
          portable across backend stacks.
        Tier B — Flow tests: E2E user journey at the system boundary
          (Playwright-level or equivalent). Generated for EVERY flow spec.
          Mostly portable across frontend E2E frameworks.
        Tier C — Pure business-logic unit tests: covering rules that are
          free of framework/stack coupling. Generated selectively where
          the rule's logic is non-trivial (e.g., multi-branch guards,
          state transitions, computational rules). Portable within
          language family.
        Tier D — Stack-coupled unit tests: middleware internals, framework
          hooks, ORM-specific behaviors, adapter internals. NOT generated.
          Existing tests are cited in generated_tests_ref with tier:
          "cited_existing" — they die with the old stack and do not
          constitute migration contracts.
      Tests are placed at
      {stm_base}/{issue}/evidence/decode/proposals/generated-tests/{tier}/{id}.{ext}
      with the {ext} matching the source codebase's primary test framework
      (detected from scan-index manifest + existing test files).

  - id: C25
    rule: >
      Baseline-green verification is the gate. Before any spec is marked
      "captured" in proposals.yaml, its generated tests are executed by the
      test-runner agent (C15) against the CURRENT unmodified codebase. Pass
      is required. Failures halt the unit with a structured report. The
      extraction team (tech-architect + test-engineer) revises the test or
      the spec until green, OR drops the failing test with an ambiguity
      entry, OR defers the unit. Red baseline NEVER ships — the gate is
      absolute. Generated tests that fail on current code mean the
      extraction described behavior the code doesn't exhibit.

  - id: C26
    rule: >
      The test harness invocation command and runtime environment are
      detected at play start, not assumed. test-engineer inspects
      scan-index manifests (package.json scripts, pyproject.toml entry
      points, pom.xml build sections, etc.), the existing CI workflow, and
      the detected test framework to produce a TEST_HARNESS record
      containing: framework, runner command, working directory, dependency
      install command (if environment not yet provisioned), environment
      variables required, expected stdout format for pass/fail parsing.
      The test-runner agent consumes this record verbatim. If no runnable
      test harness is detected (missing deps, non-executable environment),
      the play halts with a structured error listing prerequisites — it
      does NOT emit a spec set that cannot be verified.

  - id: C27
    rule: >
      Metric is scenario coverage, not line coverage. "Baseline green"
      means: every scenario in every spec has a corresponding passing test,
      and every generated test is mapped back to the scenarios / rules /
      policies it covers via cited_specs[]. Line-coverage-only reports are
      recorded as sidecar info (when the test framework produces them) but
      are NOT the pass/fail gate. A passing test suite with line gaps is
      acceptable when the gaps correspond to stack-coupled code that C24
      excludes from generation.

  # ---------- TECH-AGNOSTIC PLAY + RUNTIME TECH-SKILL SYNTHESIS ----------

  - id: C28
    rule: >
      The /decode play itself is tech-agnostic at compile time.
      /create-play compiles NO tech-specific extraction skills into the
      play. The SKILL.md emitted by the build contains no
      extract-from-spring-boot / extract-from-react / extract-from-express
      entries. Introducing tech-specific skills into the permanent
      framework (core/components/skills/, ~/.claude/skills/) is a structural
      failure — those paths remain unchanged by any /decode invocation.

  - id: C29
    rule: >
      Runtime tech-skill synthesis is required. Early in the play (after
      features.yaml resolution and scan, before extraction dispatch), the
      play reads physical-architecture.yaml to enumerate the technology
      stacks present (runtime, framework, frontend framework, ORM, template
      engine, etc.). For every detected stack, the play locates the matching
      tech playbook at core/components/memory/knowledge/tech/{stack}.md and
      synthesizes a temporary extraction skill from that playbook scoped to
      this issue. The synthesis is deterministic (playbook + detected
      version → SKILL.md), not LLM-reasoned.

  - id: C30
    rule: >
      Tech playbooks are authored once and reused. Each playbook at
      core/components/memory/knowledge/tech/{stack}.md describes, for that
      stack: where business logic lives (directory conventions, file
      naming, entry points), the canonical patterns for controllers /
      services / repositories / middleware / hooks / components, how to
      recognize aspects (decorators, annotations, middleware chains), and
      how to trace a user action end-to-end through the stack. Playbooks
      are versioned (supports "spring-boot-3" vs "spring-boot-2" if
      patterns diverge). A missing playbook for a detected stack is a hard
      halt — /decode cannot extract from a stack it has no playbook for.
      The user is directed to author the playbook and re-run.

  - id: C31
    rule: >
      Synthesized temp skills live ONLY at
      {stm_base}/{issue}/evidence/decode/temp-skills/ during the play run.
      Any discoverability required by the Skill tool is achieved by
      symlinking (or copying) these into .claude/skills/decode-temp-{name}/
      at dispatch and removing them at cleanup. .claude/ is gitignored per
      repo convention so these do not appear in version control. Writes to
      ~/.claude/skills/ (global) by /decode are forbidden — global is the
      framework boundary and temp skills never cross it.

  - id: C32
    rule: >
      Cleanup of temp skills triggers on final Tether (C17 Phase 2
      approval). On Tether: every file under
      {stm_base}/{issue}/evidence/decode/temp-skills/ and every
      .claude/skills/decode-temp-*/ symlink or copy is removed. On Vanish
      (abort): temp skills are preserved so a re-run resumes without
      resynthesis. On --force cleanup (explicit user command): temp skills
      are removed regardless of play state. Stale temp skills accumulating
      across runs is a constraint violation — the cleanup gate is
      enforced.

  - id: C33
    rule: >
      The tech-architect dispatches the right temp skill per file during
      extraction based on a stack-to-path map produced by scan-index and
      physical-architecture. Example: files matching apps/admin/**/*.hbs
      dispatch the ember template skill; ghost/core/**/*.js dispatches the
      express/node skill; apps/stats/**/*.tsx dispatches the react skill.
      A file with no matching stack is cited in the spec but flagged
      unmapped_stack in knowledge_gaps[].

failure_conditions:
  - id: F0
    condition: >
      The play dispatches extraction work before the issue number is
      resolved and recorded in {stm_base}/{issue}/status/decode.json.

  - id: F1
    condition: >
      Any write to {product_base}, ~/.garura/core/memory/,
      core/components/skills/, or ~/.claude/skills/ occurs during this play.
      All outputs are confined to STM and the ephemeral temp-skills paths
      allowed by C31.

  - id: F2
    condition: >
      features.yaml cannot be resolved from either
      {product_base}/scope/features.yaml or --features-from. Hard halt with
      /codify + /enrich prerequisite guidance.

  - id: F3
    condition: >
      An invocation supplies no feature selector. /decode refuses unbounded
      scope — feature selection via --feature / --capability / --domain /
      --all is mandatory.

  - id: F4
    condition: >
      Any entry in business_rules, scenarios, data_contracts,
      integration_behaviors, edge_cases, flow steps, or aspect policies is
      emitted without non-empty cited_locations[]. Uncited content must
      live in knowledge_gaps[] or be dropped.

  - id: F5
    condition: >
      Any prose field (across all three streams) contains a deny-list token
      (framework name, SDK method, library class, specific product).
      Technology names are only permitted inside cited_locations.excerpt.

  - id: F6
    condition: >
      Tests and source code disagree and the play silently picks one side.
      Drift MUST appear in ambiguities[] with both citations.

  - id: F7
    condition: >
      Citation integrity fails (file missing, line range invalid, excerpt
      mismatch) and the spec is emitted anyway.

  - id: F8
    condition: >
      A spec is emitted missing any mandatory section for its stream (per
      C4a / C4b / C4c).

  - id: F9
    condition: >
      A spec is captured without its corresponding generated tests, or
      without cited_existing references for stack-coupled units per C24.
      Specs and tests are produced together; neither ships without the
      other.

  - id: F10
    condition: >
      A generated test fails against the current codebase and the spec is
      marked "captured" in proposals.yaml anyway. Red baseline is an
      absolute gate per C25.

  - id: F11
    condition: >
      Stack-coupled units (Tier D per C24) receive generated tests.
      Middleware internals, framework hooks, ORM-specific behavior, and
      adapter internals MUST be cited_existing only — generating tests for
      them leaks stack coupling into the migration contract.

  - id: F12
    condition: >
      test-runner receives extraction context, spec content, tech-architect
      or test-engineer reasoning. Runner isolation per C15 is absolute.

  - id: F13
    condition: >
      Cross-stream linking is missing when units exist. A feature spec
      without participates_in_flows[] or governed_by_aspects[], a flow spec
      without participating_features[] or traversing_aspects[], an aspect
      spec without applies_to.{routes,components,features}[] — when the
      codebase demonstrably contains those links — is a structural failure
      (not a knowledge gap).

  - id: F14
    condition: >
      The play proceeds to extraction without runtime tech-skill synthesis
      (C29). tech-architect dispatching extraction without tech-aware
      playbooks produces generic output that misses stack-specific patterns.

  - id: F15
    condition: >
      A detected stack has no playbook at
      core/components/memory/knowledge/tech/{stack}.md and the play
      proceeded with a generic extraction for that stack. Missing playbook
      is a hard halt — the user is prompted to author it.

  - id: F16
    condition: >
      Temp skills are written to core/components/skills/ or ~/.claude/skills/
      (non-project), or persist beyond the play's cleanup trigger. These
      paths are framework boundaries and temp skills never cross them.

  - id: F17
    condition: >
      Cleanup of temp skills is skipped after final Tether. Stale
      decode-temp-*/ directories across runs is a structural violation.

  - id: F18
    condition: >
      TEST_HARNESS detection per C26 fails (no runnable framework / missing
      deps / non-executable environment) and the play proceeded to emit
      specs anyway. Specs that cannot be verified green are not captured.

  - id: F19
    condition: >
      A proposal in proposals.yaml carries learning_category != "product"
      or sub_category != null.

  - id: F20
    condition: >
      An agent invoked with ltm_context produces no resolution-trace.yaml.

  - id: F21
    condition: >
      Phase 1 (1-by-1) OR Phase 2 (summary) checkpoint is skipped. Even for
      zero-unit exits, Phase 2 MUST show the summary and Tether/Vanish is
      awaited.

  - id: F22
    condition: >
      Flagged units (per C17 criteria) batched into Phase 2 instead of
      surfaced 1-by-1 in Phase 1.

  - id: F23
    condition: >
      proposals.yaml absent from STM after the play completes with Tether.
      Zero-unit runs still write total_units: 0.

  - id: F24
    condition: >
      A unit marked "completed" in status/decode.json has no spec_path on
      disk, no generated tests on disk, or baseline_green != true.

scenarios:
  - id: S1
    persona: "Migration lead extracting a single high-value feature on a single-stack codebase"
    given: >
      A Spring Boot monolith with features.yaml in product LTM. User
      invokes /decode --issue 500 --feature MEM-F001-signup.
    then: >
      Play detects stack "spring-boot-3" from physical-architecture.yaml,
      loads playbook at core/components/memory/knowledge/tech/spring-boot-3.md,
      synthesizes extract-from-spring-boot-3 temp skill in STM, and
      symlinks it into .claude/skills/ for dispatch. tech-architect uses
      the temp skill to extract MEM-F001's behavior-spec. test-engineer
      generates Tier-A contract tests for the signup endpoint and Tier-C
      pure-logic tests for the validation rules. test-runner executes the
      generated suite; all green. Phase 2 summary shown; user Tethers;
      evidence commits; temp skill is removed from STM and .claude/.

  - id: S2
    persona: "Platform engineer extracting an entire capability on a multi-stack codebase"
    given: >
      Ghost-style monorepo: Express backend, Ember legacy admin, React
      micro-apps. User invokes /decode --issue 500 --capability CMS.
    then: >
      Play detects 3 stacks; synthesizes 3 temp skills (express,
      ember-octane, react-18). tech-architect uses the stack-to-path map
      to dispatch the right skill per file. For each feature in CMS, a
      feature-spec is produced plus flow-specs for any user journey the
      feature participates in plus aspect-specs for any cross-cutting
      concern the feature is governed by. Tier-A contract tests generated
      for every exposed endpoint; Tier-B flow tests for every journey;
      Tier-C selective unit tests for pure logic; stack-coupled
      middleware tests cited as existing. test-runner executes all; all
      green on current code. User interrupts mid-run after 5 features;
      re-invokes /decode --issue 500 --capability CMS; play resumes from
      feature 6. On final Tether, all 3 temp skills cleaned up.

  - id: S3
    persona: "Reviewer examining a test/code drift finding"
    given: >
      A feature whose existing test asserts HTTP 402 for expired
      subscription but whose source returns HTTP 403.
    then: >
      The drafted scenario lands in ambiguities[] with both citations.
      tech-architect does NOT generate a new test asserting either value —
      it would contradict the existing test or the existing code. The
      feature is surfaced 1-by-1 at Phase 1; user picks truth source. Only
      then does test-engineer emit a replacement test aligned with the
      chosen truth, and test-runner verifies green before capture.

  - id: S4
    persona: "Reviewer examining a horizontal aspect"
    given: >
      Ghost's rate-limit policy via express-brute plus bypass rules for
      admin sessions.
    then: >
      aspects/ASP-rate-limit-001.yaml captures the full policy: routes it
      applies to (from middleware registration sites), limits (per route),
      storage backend (from client config), bypass_conditions (admin
      session check, cited). applies_to.routes populates from scan of
      every router file where the middleware is registered. Tier-A tests
      verify the rate-limit is active on one or two representative
      endpoints (not every endpoint — the aspect test asserts the aspect
      pattern, not redundant per-endpoint coverage). test-runner executes;
      green.

  - id: S5
    persona: "Reviewer examining a user flow that crosses features"
    given: >
      "New member first-post" flow: signup → verify email → dashboard →
      compose → publish. Five features involved.
    then: >
      flows/FLOW-first-post-001.yaml captures the 5-step journey with
      participating_features: [MEM-F001, MEM-F002, CMS-F001, CMS-F002,
      CMS-F003]. Each feature-spec lists participates_in_flows:
      [FLOW-first-post-001]. traversing_aspects: [ASP-auth,
      ASP-rate-limit, ASP-error-envelope]. Tier-B E2E test generated
      covering the full journey using the codebase's existing E2E
      framework. test-runner executes; green.

  - id: S6
    persona: "Tech lead running /decode against a stack with no playbook"
    given: >
      A codebase using a framework Garura has never indexed (e.g., Laravel
      in a PHP project). No playbook at
      core/components/memory/knowledge/tech/laravel-10.md.
    then: >
      Play halts with hard error listing detected stacks and the missing
      playbook path. User is prompted to author
      core/components/memory/knowledge/tech/laravel-10.md following the C30
      playbook template, then re-run. No generic extraction proceeds.

  - id: S7
    persona: "Reviewer whose generated test fails on current code"
    given: >
      tech-architect extracted a rule "reject registration when email
      domain is on the blocklist". test-engineer generated a Tier-C unit
      test asserting the block. test-runner reports FAIL — the test
      rejects registration but the code allows it.
    then: >
      Baseline-green gate halts the feature. Options presented: revise
      the spec (the rule was wrong), revise the test (assertion was
      wrong), drop the rule (it's actually not enforced), or defer. On
      revise-spec path, test-architect re-reads the code, confirms
      blocklist is not enforced in current implementation, and moves the
      finding to ambiguities[] — a feature the README claims exists but
      the code does not implement. Surface at Phase 1 for user decision.

  - id: S8
    persona: "Tech lead Vanishing mid-run and resuming later"
    given: >
      /decode run extracted 5 of 12 features; user Vanishes at Phase 2
      (wants to review specs before committing). Temp skills preserved per
      C32.
    then: >
      status/decode.json records 5 completed, 7 pending. User re-invokes
      /decode --issue 500 --capability CMS after a week. Play finds temp
      skills still present, skips synthesis (already done), resumes from
      feature 6. No re-extraction of completed features. On final Tether
      this run, temp skills cleaned up.

  - id: S9
    persona: "Migration lead encountering a flow with no existing E2E tests"
    given: >
      Flow FLOW-checkout-001 crosses 4 features; codebase has unit tests
      for each feature but no E2E Playwright tests for the full checkout
      journey.
    then: >
      test-engineer generates a Tier-B flow test from the extracted flow
      spec — new test file added under generated-tests/flow/. test-runner
      provisions the framework (Playwright detected in
      package.json devDependencies) and executes. On failure, halts per
      C25; on green, flow is captured.

  - id: S10
    persona: "Tech lead using /decode immediately after /codify, before /enrich"
    given: >
      /codify completed on issue 321 producing STM features.yaml. /enrich
      NOT yet run. User invokes /decode --issue 500
      --features-from .garura/project/issues/321/evidence/codify/proposals/scope/features.yaml
      --all.
    then: >
      Play accepts STM-sourced features.yaml per C2(b). All units tier 3
      (addition). /enrich later promotes features + behaviors + flows +
      aspects + generated tests together.

  - id: S11
    persona: "Tech lead running /decode against a non-runnable environment"
    given: >
      A repo where dependencies are not installed and there is no package
      manifest discoverable by scan-index's TEST_HARNESS detector (C26).
    then: >
      Play halts before extraction with a structured prerequisites error:
      "test harness not detectable / runnable. Install dependencies and
      re-run, or point at a prepared workspace via --workspace <path>."
      No specs emitted. No tests generated. Matches C25's absolute gate:
      unverifiable specs are not captured.
