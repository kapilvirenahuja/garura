name: craft-ice
description: >
  Turn an epic or feature into an ICE-compliant specification — a clean
  Intent triple, a Context bundle, and a generated, approved Expectation
  — that a downstream play (prepare or enhance) can consume. For
  substantial work, not quick fixes.
version: 0.1.0
checksum: "<computed by /create-play --build>"

intent: >
  Given an epic or feature describing a substantial body of work,
  interview the user and assemble the surrounding context to produce
  an ICE-compliant specification — a clean Intent triple (goal,
  constraints, failure conditions), a Context bundle (relevant memory,
  knowledge, and codebase grounding), and a generated, approved
  Expectation (success scenarios + recovery) — that an agent can
  consume to select and run the right downstream play (prepare or
  enhance) without re-deriving the source. The produced specification
  is approved at a checkpoint whose human-in-the-loop requirement is
  set by configuration. It is the doorway from having an epic/feature
  to having a complete, checkable spec a downstream play can act on. It
  is for substantial, sweeping work, not quick fixes.

constraints:
  - id: C1
    rule: >
      The specification it produces must contain all three ICE layers —
      Intent (goal + constraints + failure conditions), Context
      (relevant memory, knowledge, and codebase grounding), and
      Expectation (success scenarios + recovery). A specification
      missing any layer is incomplete.
  - id: C2
    rule: >
      The Intent layer it produces must be implementation-agnostic — it
      must not name agents, skills, tools, technologies, file paths, or
      step-by-step instructions.
  - id: C3
    rule: >
      The Expectation layer must carry an explicit approval marker and a
      provenance link to the Intent it was derived from.
  - id: C4
    rule: >
      The work must be anchored to a tracking issue, and every artifact
      the specification contains must be traceable back to the source
      epic or feature it specifies.
  - id: C5
    rule: >
      The specification must not be produced for fix-it-scale work —
      work whose scope fits a quick fix is out of scope.
  - id: C6
    rule: >
      The play must not hardcode whether the approval checkpoint
      requires human-in-the-loop; that requirement must be externally
      configurable.

failure_conditions:
  - id: F1
    condition: >
      The delivered specification is missing one or more of the three
      ICE layers.
  - id: F2
    condition: >
      The delivered Intent layer carries implementation details — agent
      names, skill names, tool names, technologies, file paths, or
      step-by-step instructions.
  - id: F3
    condition: >
      The delivered Expectation lacks an approval marker, or lacks a
      provenance link to the Intent it was derived from.
  - id: F4
    condition: >
      The delivered specification has no traceable link back to the
      source epic/feature or tracking issue.
  - id: F5
    condition: >
      A full specification exists for fix-it-scale work.
  - id: F6
    condition: >
      The specification's approval contradicts the human-in-the-loop
      configuration — for example, it was auto-approved when the
      configuration requires human-in-the-loop.
