# Expectation for the check-drift play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: check-drift

generated_from:
  intent: core/components/plays/check-drift/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# Lifted verbatim from the legacy intent.yaml scenarios block (S1–S7); only the
# binary/observable `measure` was added per the generate-before-strip rule.
success_scenarios:
  - id: S1
    persona: Developer
    given: >
      A drift report, ADR list, debt catalog, and memory items produced from
      a feature branch with 20 commits that diverged from the locked technical
      approach in several areas
    then: >
      Can identify every point where implementation diverged from specification,
      understand the root cause of each divergence, and execute the spec-change
      and code-change recommendations without further clarification
    measure: >
      Every drift item carries a non-empty "what was specified / where / what was
      built / where" mapping and an RCA, and every REC-SPEC and REC-CODE entry names
      a specific artifact path, section, and concrete change — zero entries contain
      vague directives.
  - id: S2
    persona: Tech Lead
    given: >
      A drift report showing zero drift items, with justification artifacts
      from each analysis domain
    then: >
      Can verify that the "no drift" finding is credible by reviewing the
      evidence of what was examined, and can confidently approve the
      implementation as spec-aligned
    measure: >
      Each empty analysis domain carries a justification block that lists the
      specific inputs examined and states a confidence of at least 90% that no
      items exist — no domain is empty without that evidence.
  - id: S3
    persona: Tech Lead
    given: >
      A cross-validation artifact showing a contradiction was detected between
      the drift report and the ADR list, along with the remediation that was applied
    then: >
      Can verify that the contradiction was correctly identified, the remediation
      is sound, and the final artifacts are internally consistent
    measure: >
      The cross-validation artifact records the contradiction, the responsible
      domain's remediation, and a post-remediation state showing zero unresolved
      contradictions across the four analysis outputs.
  - id: S4
    persona: Product Manager
    given: >
      An HTML brief summarizing three technology-drift items where the
      implementation replaced major technology choices from the specification
    then: >
      Can understand the business impact of each technology change, review
      the rationale, and decide which specification updates to prioritize
      without reading code or technical artifacts
    measure: >
      The brief presents each technology-drift item with impact and rationale in
      plain language, and every value shown in the brief matches the corresponding
      value in the underlying structured drift data byte-for-byte.
  - id: S5
    persona: Developer
    given: >
      A partially completed drift analysis that was interrupted after two
      of four analysis domains completed
    then: >
      Can resume the analysis and receive complete output covering all four
      domains without re-running the completed domains
    measure: >
      After resume, all four analysis artifacts (drift report, ADRs, debt catalog,
      memory items) are present and complete, and the two domains completed before
      the interruption are reused unchanged rather than regenerated.
  - id: S6
    persona: Engineering Lead
    given: >
      Drift reports from three consecutive issues (issue #28, #35, #42)
      with consistent DRIFT-xxx IDs and categorization
    then: >
      Can aggregate drift items across issues to identify recurring drift
      patterns, assess cumulative blast radius, and determine which
      specification areas are chronically misaligned
    measure: >
      Every drift item across the three reports uses the DRIFT-xxx ID format and
      one of the five fixed drift categories, so the items concatenate into a single
      cross-issue set with no ID collisions and no untransformed categories.
  - id: S7
    persona: Developer
    given: >
      A structured defect manifest tagged with drift IDs and categorized
      by drift type
    then: >
      Can trace each defect back to its originating drift item, understand
      the priority and blast radius, and plan remediation work
    measure: >
      Every entry in the defect manifest references an existing DRIFT-xxx id and
      carries a drift type, priority, and blast radius — and no defect was created
      directly in an issue tracker.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # core artifact empty without 90% justification
    trigger: >
      One of the four core output artifacts (drift report, ADRs, debt catalog,
      memory items) is empty and carries no justification asserting at least 90%
      confidence that no items exist.
    direction: >
      Every core artifact must be either populated or empty-with-evidence; re-run
      the empty domain and either surface the items it missed or attach the
      90%-confidence justification of what was examined.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2                 # "no items found" lacks examined-evidence
    trigger: >
      An analysis domain claims "no items found" but the justification does not
      list the specific inputs examined and why no items were found.
    direction: >
      A "no items" claim must carry the evidence of what was examined; regenerate
      the justification listing the inputs inspected and the reason none qualified.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC3
    for_failure: F3                 # unresolved cross-validation contradictions
    trigger: >
      The cross-validation artifact still records contradictions between analysis
      outputs that have not been resolved.
    direction: >
      Cross-validation must end with zero open contradictions; loop each
      contradiction back to the responsible domain to remediate, then re-run
      cross-validation until none remain.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC4
    for_failure: F4                 # inconsistent IDs / categorization
    trigger: >
      Output items lack the consistent DRIFT/ADR/DEBT/MEM/REC ID scheme or the
      fixed categorization, leaving them unparseable by downstream aggregation.
    direction: >
      All items must use the canonical ID prefixes and the five fixed drift
      categories; re-apply the ID-and-category scheme across every output item.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # files outside the output area modified
    trigger: >
      Source code, design specifications, or any file outside the analysis output
      area has been modified during the run.
    direction: >
      The run must be read-only outside its output area; this outward-facing
      modification needs a user go/no-go on how to revert or reconcile the changed
      files — the builder cannot make that call.
    handoff: human
    derivable_at_l4: false
  - id: REC6
    for_failure: F6                 # cross-contamination before cross-validation
    trigger: >
      An analysis domain's input context contained another domain's output before
      the cross-validation phase.
    direction: >
      Each domain must be analyzed in isolation until cross-validation; re-run the
      contaminated domain with a clean input context carrying no other domain's
      output.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # analysis ran without a resolved scope
    trigger: >
      Analysis began without a resolved scope — no issue number, epic ID, or branch
      was identified first.
    direction: >
      A specific implementation unit must be resolved before any analysis; the scope
      choice among candidate issues/epics/branches needs a user decision the builder
      cannot make on its own.
    handoff: human
    derivable_at_l4: false
  - id: REC8
    for_failure: F8                 # vague recommendations
    trigger: >
      Recommendations contain vague directives without specific file paths, sections,
      and change descriptions.
    direction: >
      Every recommendation must name a path, a section, and a concrete change;
      rewrite each vague directive into an executable unit using the analysis data
      already gathered.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC9
    for_failure: F9                 # brief diverges from structured data
    trigger: >
      The brief displays data that differs from the underlying structured data
      artifacts.
    direction: >
      The brief is a derived presentation layer and must match its source exactly;
      regenerate the brief from the structured data so every displayed value agrees.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC10
    for_failure: F10                # defects filed in tracker instead of manifest
    trigger: >
      Defects were created directly in an issue tracker rather than produced as a
      structured defect manifest for delegation.
    direction: >
      Defect logging must stop at a structured manifest; the tracker entries already
      created are outward-facing and need a user call on whether to close or keep
      them — the builder lacks that authority.
    handoff: human
    derivable_at_l4: false
  - id: REC11
    for_failure: F11                # locked design artifacts ignored when present
    trigger: >
      Analysis ran without reading the locked design artifacts that exist at
      {stm_base}/{issue}/context/design/, leaving the "what was specified" column
      referencing only product-level specs.
    direction: >
      Locked design artifacts are the PRIMARY spec source when present; re-run the
      analysis consuming tech.yaml, scenarios.yaml, and plan.yaml and re-anchor the
      "what was specified" column to them.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC12
    for_failure: F12                # spec-correction-manifest absent
    trigger: >
      spec-correction-manifest.yaml is missing from the output directory after
      analysis completes.
    direction: >
      The manifest must always exist; write spec-correction-manifest.yaml — with an
      empty items list and documented justification when no corrections were found.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC13
    for_failure: F13                # arbiter verdicts not consumed
    trigger: >
      Arbiter verdict files exist at the implement evidence path but were not
      consumed, so spec_ambiguous verdicts were not turned into evidence-drift items.
    direction: >
      Every arbiter verdict must be consumed; re-run consuming the verdict files and
      translate each spec_ambiguous verdict into an evidence-drift item.
    handoff: autonomous
    derivable_at_l4: true
