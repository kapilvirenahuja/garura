intent: >
  Given a scoped implementation unit (issue, epic, or branch) and its locked design
  specifications, produce four independent analysis artifacts — a categorized drift
  report, architecture decision records, a technical debt catalog, and memory items —
  each analyzed in isolation without cross-contamination. Cross-validate findings
  across all four artifacts to detect contradictions, then synthesize into actionable
  recommendations split into spec changes and code changes in executable units.
  Generate a human-reviewable brief backed by structured data. Log drift-originated
  defects for issue tracking. All artifacts use consistent templates and IDs for
  downstream aggregation across issues and epics.

constraints:
  - id: C1
    rule: >
      Each analysis domain (drift identification, ADR extraction, debt cataloging,
      memory item surfacing) is produced independently. No analysis domain receives
      the output of another domain until cross-validation.

  - id: C2
    rule: >
      The process writes analysis artifacts, briefs, and a spec-correction-manifest
      to the output area. New ADR files for deliberate design-drift decisions are
      written additively to {product_base}architecture/ — never overwriting or
      modifying existing locked files. Source code is never modified.

  - id: C3
    rule: >
      All output items use consistent IDs — DRIFT-xxx, ADR-xxx, DEBT-xxx, MEM-xxx,
      REC-SPEC-xxx, REC-CODE-xxx — and consistent categorization. A downstream
      tool must be able to aggregate drift reports across issues and epics using
      these IDs without transformation.

  - id: C4
    rule: >
      All four output artifacts use templates. The template structure is stable
      across runs so that downstream tooling can parse artifacts reliably.

  - id: C5
    rule: >
      Cross-validation produces its own artifact documenting contradictions,
      confirmations, and corrections between the four analysis outputs.

  - id: C6
    rule: >
      When cross-validation identifies a contradiction, the responsible analysis
      must remediate the contradiction. Contradictions are not acceptable as
      final output — they must be resolved before the brief is generated.

  - id: C7
    rule: >
      Scope is resolved to a specific implementation unit before any analysis
      begins. No analysis runs without a resolved scope. Full-project analysis
      is never performed.

  - id: C8
    rule: >
      Recommendations are in executable units — specific artifact paths, specific
      sections, specific changes. Vague guidance ("consider improving X") is not
      an acceptable recommendation.

  - id: C9
    rule: >
      The human-reviewable brief is a presentation layer. It is derived from
      structured data artifacts. Any discrepancy between the brief and the
      underlying data constitutes a defect.

  - id: C10
    rule: >
      Memory items target valid paths within the long-term memory knowledge
      structure. Items that cannot be placed in an existing knowledge category
      must propose a new category with justification.

  - id: C11
    rule: >
      Defect logging is delegated — the process produces a structured defect
      manifest tagged with drift IDs, not raw issues. Defect resolution is
      out of scope.

  - id: C12
    rule: >
      Drift items are categorized by type (context-drift, spec-drift,
      technology-drift, design-drift, evidence-drift) and severity. This
      categorization feeds a future project-wide drift snapshot that tracks
      drift flow across epics and issues. design-drift captures locked design
      artifact (tech.yaml, scenarios.yaml, plan.yaml) vs implementation
      divergence. evidence-drift captures spec gaps revealed by arbiter
      spec_ambiguous verdicts and milestone REJECT traceable to spec ambiguity.

  - id: C13
    rule: >
      When locked design artifacts from prepare exist at
      {stm_base}/{issue}/context/design/ (tech.yaml, scenarios.yaml, plan.yaml,
      epic-spec.yaml, architecture-context.yaml), they are the PRIMARY "what was
      specified" source. Product-level specs (specification/, scope/, architecture/)
      are the SECONDARY source. Analysis that ignores locked design artifacts when
      they exist is a failure (F11).

  - id: C14
    rule: >
      All arbiter verdicts at {stm_base}/{issue}/evidence/implement/
      arbiter-verdict-*.yaml must be consumed. Every verdict with
      verdict: spec_ambiguous maps to an evidence-drift item — the spec contract
      was too ambiguous to determine if the implementation was correct or not.
      This is a direct spec gap signal.

  - id: C15
    rule: >
      Analysis must produce spec-correction-manifest.yaml at the output path.
      The manifest contains proposed corrections to locked design artifacts and
      product-level specs as structured entries (artifact path, section, proposed
      change). No locked artifact is modified in-place — the manifest is a
      human-reviewed proposal. New ADR files for design-drift items representing
      deliberate decisions are written additively to {product_base}architecture/
      as new files, never overwriting existing ADRs.

  - id: C16
    rule: >
      Drift items must use exactly 5 categories: context-drift, spec-drift,
      technology-drift, design-drift, evidence-drift. No other categories are
      valid. Any item that cannot be classified under these 5 types must be
      escalated as an uncategorized item requiring product decision.

failure_conditions:
  - id: F1
    condition: >
      Any of the four core output artifacts (drift report, ADRs, debt catalog,
      memory items) is empty without documented justification showing at least
      90% confidence that no items exist.

  - id: F2
    condition: >
      An analysis domain claims "no items found" and the justification does not
      include specific evidence of what was examined and why no items were found.

  - id: F3
    condition: >
      The cross-validation artifact contains unresolved contradictions between
      analysis outputs.

  - id: F4
    condition: >
      Output items lack consistent IDs or categorization, making them unparseable
      by downstream aggregation tooling.

  - id: F5
    condition: >
      Source code, design specifications, or files outside the analysis output
      area have been modified.

  - id: F6
    condition: >
      An analysis domain's input context contains the output of another analysis
      domain prior to cross-validation.

  - id: F7
    condition: >
      Analysis was performed without a resolved scope — no issue number, epic ID,
      or branch was identified before analysis began.

  - id: F8
    condition: >
      Recommendations contain vague directives without specific file paths,
      sections, and change descriptions.

  - id: F9
    condition: >
      The brief displays data that differs from the underlying structured
      data artifacts.

  - id: F10
    condition: >
      Defects were created directly in an issue tracker rather than produced
      as a structured manifest for delegation.

  - id: F11
    condition: >
      Analysis was performed without reading locked design artifacts when they
      exist at {stm_base}/{issue}/context/design/. The "what was specified"
      column of drift items references only product-level specs when issue-scoped
      locked design artifacts (tech.yaml, scenarios.yaml, plan.yaml) were
      available and not consulted.

  - id: F12
    condition: >
      spec-correction-manifest.yaml is absent from the output directory after
      analysis completes, regardless of whether any spec corrections were
      identified. Even when no corrections are needed, the manifest must exist
      with an empty items list and documented justification.

  - id: F13
    condition: >
      Arbiter verdict files exist at the implement evidence path but were
      not consumed during analysis. spec_ambiguous verdicts that were not
      translated into evidence-drift items represent missed spec gap signals.
