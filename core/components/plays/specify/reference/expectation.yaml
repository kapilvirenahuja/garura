# Expectation for the specify play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: garura:specify

generated_from:
  intent: core/components/plays/specify/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Product Manager
    given: >
      The enriched intent epics produced by this play for a healthcare B2B
      SaaS with HIPAA compliance and high security level
    then: >
      Can derive per-epic acceptance criteria for the engineering team
      directly from each epic's expectation.success_scenarios and
      failure_conditions without consulting any other source.
    measure: >
      Every intent epic in the epics directory contains an expectation block with
      success_scenarios (populated with id/persona/given/then/measure sub-fields)
      and a failure_conditions list at the intent level, such that per-epic
      acceptance criteria can be derived from those sections alone.

  - id: S2
    persona: Technical Architect
    given: >
      The quality profile artifact aggregating constraints across all
      selected capabilities
    then: >
      Can make informed decisions on technology stack, data architecture,
      security architecture, and infrastructure — every architectural
      decision has a quality-attribute driver that traces to a specific
      characteristic in the profile.
    measure: >
      quality-profile.yaml aggregates constraints across all selected
      capabilities and contains measurable targets for every ISO 25010
      characteristic that is relevant (not marked not_applicable) to the
      selected capability set, with each target citing its source epic.

  - id: S3
    persona: Product Owner
    given: >
      The scope document listing selected capabilities with per-capability
      rationale and the constraint_trace showing which cross-tree
      constraints fired
    then: >
      Can trace every intent epic back to the exact feature ID in the KB
      that motivated its inclusion, and can defend every capability
      selection to a stakeholder who asks "why this and not that".
    measure: >
      Every entry in scope.selected_capabilities and scope.rejected_capabilities
      has a rationale or reason field, AND scope.constraint_trace links each
      cross-tree-driven decision to the triggering CTC-NNN identifier.

  - id: S4
    persona: Product Manager
    given: >
      The failure_conditions list and expectation.recovery entries of every
      intent epic
    then: >
      Can enumerate the error-handling, edge-case, and unhappy-path work
      that the implementation must cover — no unhappy path is silently
      skipped, because the validator would have blocked an epic with fewer
      than two failure_conditions.
    measure: >
      Every intent epic's failure_conditions list contains at least 2 cause
      strings, and expectation.recovery contains at least one recovery entry per
      failure condition, each with for_failure_condition, trigger, direction, and
      handoff sub-fields populated.

  - id: S5
    persona: Engineering Lead
    given: >
      The market brief with quantified landscape data and the selected
      capabilities scoped against the project profile
    then: >
      Can assess technical feasibility of the scope within the stated
      appetite, flag capabilities whose implementation cost exceeds the
      appetite's bandwidth, and propose either scope cuts or appetite
      expansion with concrete justification.
    measure: >
      market-brief.md contains quantified TAM/SAM/SOM data AND scope.yaml
      records capability count and depth caps, together providing enough
      quantified data for a feasibility-within-appetite assessment.

  - id: S6
    persona: Compliance Officer
    given: >
      The intent epics plus the constraint_trace for a regulated-industry
      project (healthcare, BFSI, government)
    then: >
      Can verify that every applicable cross-tree constraint (MFA for
      regulated industries, audit logging for HIPAA, data export for GDPR)
      has been applied and recorded, without re-deriving the compliance
      mapping from scratch.
    measure: >
      For any project whose profile.industry is in {BFSI, healthcare,
      government} or whose profile.compliance is non-empty,
      scope.constraint_trace records the outcome of every cross-tree
      constraint relevant to the profile with no silent skips.

  - id: S7
    persona: Stakeholder (non-technical)
    given: >
      The scope document presented at the capability-configuration
      checkpoint
    then: >
      Can review phasing decisions (what ships in the first appetite window
      versus what's deferred) and either Tether to approve, Orbit to push
      back with specific feedback, or Vanish to abandon — without needing
      engineering context for the call.
    measure: >
      The capability-configuration checkpoint artifact presents selected
      capabilities by human-readable name rather than feature ID alone, and
      is readable without engineering context.

  - id: S8
    persona: Product Manager
    given: >
      A mid-run Orbit on the capability-configuration checkpoint requesting
      that a specific capability be excluded
    then: >
      Can cycle the play back to stage 3 with the exclusion as additional
      context, re-run capability configuration, and receive an updated
      scope document that honors the Orbit feedback — without restarting
      the entire play from stage 1.
    measure: >
      An Orbit response at the capability-configuration checkpoint cycles back
      to the configure-capabilities step with the toggle decisions passed as
      optional_capability_selections input; market-brief, domain-selection and
      earlier stage artifacts are preserved and not regenerated.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # zero intent epics produced
    trigger: >
      After completion, the product epics output directory contains zero intent
      epic YAML files.
    direction: >
      The run must end with at least one intent epic per selected capability;
      re-run epic generation so every selected capability yields an epic file in
      the epics directory.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC2
    for_failure: F2                 # mandatory field empty/null/placeholder
    trigger: >
      One or more intent epics carry a mandatory field that is empty, null,
      whitespace-only, or a placeholder string.
    direction: >
      Every mandatory field defined in the intent-epic schema must be populated
      with real content; re-generate the affected epics so no mandatory field is
      empty or placeholder.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC3
    for_failure: F3                 # unquantified constraint language
    trigger: >
      An intent epic constraint field (performance, security, accessibility,
      compliance) carries unquantified prose ("fast", "secure", "reliable") with
      no number, standard, or specific control.
    direction: >
      Every constraint must be quantified — a number+unit, a named standard or
      control, a WCAG level, or a specific regulation; re-generate the affected
      constraints with concrete quantified values.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC4
    for_failure: F4                 # fewer than two entries / unapproved expectation
    trigger: >
      An intent epic has fewer than two entries in failure_conditions, or fewer
      than two entries in expectation.success_scenarios, or
      expectation.vetted.status is not "approved".
    direction: >
      Every epic must carry at least two failure_conditions and at least two
      expectation.success_scenarios, with expectation.vetted.status set to
      "approved" after the human Tether at the Epic Review checkpoint;
      re-generate or re-approve the affected epics to meet these requirements.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC5
    for_failure: F5                 # dangling kb_source.capability
    trigger: >
      An intent epic's kb_source.capability points at a feature ID that does not
      exist in the referenced domain-taxonomy file.
    direction: >
      Every epic's kb_source.capability must resolve to a real feature ID in the
      referenced domain-taxonomy file; re-derive the traceability so it points at
      an existing feature.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC6
    for_failure: F6                 # scope selection not a real feature ID
    trigger: >
      The scope artifact's selected_capabilities list contains an entry that does
      not correspond to a real feature ID in any domain-taxonomy file.
    direction: >
      Every selected capability must be a real feature ID from a domain-taxonomy
      file; re-run capability configuration so every selection resolves to an
      existing feature.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC7
    for_failure: F7                 # constraint_trace missing/incomplete
    trigger: >
      The scope artifact's constraint_trace section is missing, or fails to record
      every cross-tree constraint that was walked during capability configuration.
    direction: >
      Every cross-tree constraint walked must be recorded in the constraint_trace
      (applied or not_applicable); re-run capability configuration so the trace is
      complete.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC8
    for_failure: F8                 # quality profile missing/incomplete
    trigger: >
      The quality profile artifact is missing, has zero entries for at least one
      relevant ISO 25010 characteristic, or fails to record the risk register.
    direction: >
      The quality profile must populate every relevant ISO 25010 characteristic
      and carry a risk register; re-derive the quality profile so both are present.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC9
    for_failure: F9                 # missing checkpoint / proceeded without gate
    trigger: >
      One of the four mandatory checkpoint artifacts is missing, or a checkpoint
      proceeded past its gate without recording a Tether/Vanish/Orbit response.
    direction: >
      Every mandatory checkpoint must produce its artifact and capture an explicit
      human Tether/Vanish/Orbit before its gate opens; the missing approval is a
      human gate that cannot be self-granted — pause at the checkpoint and obtain
      the response.
    handoff: human
    derivable_at_l4: false

  - id: REC10
    for_failure: F10                # epic locked despite unresolved blocker/placeholder
    trigger: >
      An intent epic was locked while the pre-lock resolution gate still reported
      unresolved blockers or placeholder values in its mandatory fields.
    direction: >
      No epic may lock with an unresolved blocker or placeholder; the resolution
      gate's RESOLVED-keyword interview is a human judgment that the builder cannot
      grant — return to the gate and resolve each issue before locking.
    handoff: human
    derivable_at_l4: false

  - id: REC11
    for_failure: F11                # write outside whitelist / bypassed scriber
    trigger: >
      An artifact was written outside the ADR 017 whitelist, or an evidence /
      checkpoint / status file was written without going through the scriber agent.
    direction: >
      Every product artifact must land under .garura/product/ per the whitelist,
      and every evidence/checkpoint/status write must go through scriber; re-route
      the offending write to a whitelisted path via scriber dispatch.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC12
    for_failure: F12                # monolithic scope, no phasing recommendation
    trigger: >
      The epic count exceeds the appetite's reasonable bandwidth and no phasing
      recommendation was surfaced — the scope is handled as a single monolithic
      package.
    direction: >
      When the epic count exceeds the appetite's bandwidth, a phasing
      recommendation naming the capabilities that warrant sub-issue phasing must be
      surfaced; emit that recommendation in the close evidence.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC13
    for_failure: F13                # abstraction-layer deny-list token in artifact
    trigger: >
      A file under product/research/, product/specification/, or product/scope/
      contains an implementation-specific token from the abstraction-layer
      deny-list.
    direction: >
      Product specification artifacts must stay implementation-agnostic; re-author
      the offending file with domain-level vocabulary so no deny-list token remains.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC14
    for_failure: F14                # silent commit of an unsurfaced decision
    trigger: >
      A skill committed an inferred decision into a downstream artifact (epic,
      scope, quality-profile, grounding-questions) whose decision-manifest entry
      has a null user_response — it was never surfaced via the tier-appropriate flow.
    direction: >
      No inferred decision may be committed before it is surfaced and a user
      response is recorded; the surfacing flow requires a human Tether/Orbit/Vanish
      that the builder cannot self-grant — run the surfacing flow for the
      unsurfaced decision before it influences downstream artifacts.
    handoff: human
    derivable_at_l4: false

  - id: REC15
    for_failure: F15                # missing or malformed decision manifest
    trigger: >
      A skill that produces inferred decisions completed without writing a
      decision-manifest.yaml, or wrote a manifest that omits tier, grounding_source,
      recommendation, or alternatives_considered for any decision, or failed to
      update user_response after the surfacing flow.
    direction: >
      Every decision-producing skill must emit a complete decision-manifest with
      all required fields and updated user_response; re-run the skill so a
      well-formed manifest is written alongside its primary artifact.
    handoff: autonomous
    derivable_at_l4: true
