# evals.yaml — implement play
# Generated by evals-creator from:
#   intent.yaml      — constraints C1-C34, failure conditions F1-F26
#   expectation.yaml — success_scenarios S1-S19
#   constraint_classifications — artifact-verifiable: C7, C8, C12, C13, C14, C18, C19, C22, C26
# Step evals: one (or more) per failure condition F1-F26, plus one per artifact-verifiable constraint.
# Scenario evals: one per success_scenario S1-S19, derived from each scenario's binary `measure`.
# Regenerated for the #411 DAG-runner redesign (self-locating, continuous, two-boundary halt).

step_evals:

  # ---- Failure-condition evals (F1-F26) ----

  - id: SE-1
    source_type: failure_condition
    failure_condition_id: F1
    constraint_id: null
    skill: quality-check
    check: >
      After implementation completes, verify the project build and type check produce no errors.
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml"
    pass_criteria: >
      Build and type check both complete without errors.
    fail_criteria: >
      The project build or type check produces errors after implementation is complete.

  - id: SE-2
    source_type: failure_condition
    failure_condition_id: F2
    constraint_id: null
    skill: judge
    check: >
      On the first judge run, compute the evaluation failure rate and verify it does not exceed 50%.
    artifact_pattern: "{evidence_dir}/judge-report-{node_id}.yaml"
    pass_criteria: >
      The first judge run shows a 50%-or-lower evaluation failure rate.
    fail_criteria: >
      The judge report shows greater than 50% evaluation failure rate on the first judge run.

  - id: SE-3
    source_type: failure_condition
    failure_condition_id: F3
    constraint_id: null
    skill: judge
    check: >
      After the fix loop, verify that if three iterations were used the judge report contains no
      failing evaluation.
    artifact_pattern: "{evidence_dir}/judge-report-{node_id}.yaml"
    pass_criteria: >
      All evaluations pass within the 3-iteration budget, or a structured failure report exists.
    fail_criteria: >
      Three fix iterations have been exhausted and the judge report still contains at least one
      failing evaluation.

  - id: SE-4
    source_type: both
    failure_condition_id: F4
    constraint_id: C8
    skill: generate-encrypted-evals
    check: >
      After the encryption step, verify no plaintext evaluation files exist on disk and no
      evaluation content (encrypted or plaintext) exists inside the project repository tree.
    artifact_pattern: "{eval_dir}/ (outside repo) + repository tree scan"
    pass_criteria: >
      Zero plaintext eval files on disk after encryption; zero eval content (encrypted or
      plaintext) inside the repository tree.
    fail_criteria: >
      Plaintext evaluation files exist on disk after the encryption step, or evaluation content
      (encrypted or plaintext) exists inside the project repository tree.

  - id: SE-5
    source_type: failure_condition
    failure_condition_id: F5
    constraint_id: null
    skill: code-builder
    check: >
      Inspect the builder's input context. Verify it contains no test source code, test assertion
      text, mock data patterns derived from test files, evaluation ID, evaluation text, evaluation
      pass criteria, or raw judge report content. A bare test scope-directory path in Verification
      Steps is NOT a violation.
    artifact_pattern: "code-builder dispatch contract (stm.input + config.instructions)"
    pass_criteria: >
      Builder context carries only the spec (context_path + architecture_context_path) plus, at
      most, a bare scope-directory path in Verification Steps.
    fail_criteria: >
      The builder's input context contains test source code, assertion text, mock data patterns
      from test files, evaluation ID/text/pass criteria, or raw judge report content.

  - id: SE-6
    source_type: failure_condition
    failure_condition_id: F6
    constraint_id: null
    skill: judge
    check: >
      Inspect the judge's input context. Verify it contains no builder prompt, builder reasoning,
      or implementation rationale.
    artifact_pattern: "judge dispatch contract (stm.input + config)"
    pass_criteria: >
      Judge context carries zero builder prompts, builder reasoning, or implementation rationale.
    fail_criteria: >
      The judge agent's input context contains a builder prompt, builder reasoning, or
      implementation rationale.

  - id: SE-7
    source_type: failure_condition
    failure_condition_id: F7
    constraint_id: null
    skill: generate-encrypted-evals
    check: >
      Inspect the evaluation generator's input context. Verify it contains no implementation code,
      builder output, or prior evaluation results.
    artifact_pattern: "evals-engineer dispatch contract (stm.input + config)"
    pass_criteria: >
      Eval generator context carries zero implementation code, builder output, and prior eval
      results.
    fail_criteria: >
      The evaluation generator's input context contains implementation code, builder output, or
      prior evaluation results.

  - id: SE-8
    source_type: failure_condition
    failure_condition_id: F8
    constraint_id: null
    skill: orchestrator
    check: >
      When the DAG walk reaches a milestone node and its acceptance gate is about to run, verify
      the milestone node's plan.yaml entry has status LOCKED.
    artifact_pattern: "plan.yaml execution_order entry for the reached milestone node"
    pass_criteria: >
      The reached milestone node's plan.yaml entry has status LOCKED before its acceptance gate runs.
    fail_criteria: >
      The DAG walk reaches a milestone node whose plan.yaml entry has a status other than LOCKED
      (e.g., DRAFT) when the acceptance gate is about to run.

  - id: SE-9
    source_type: failure_condition
    failure_condition_id: F9
    constraint_id: null
    skill: orchestrator
    check: >
      For the reached milestone node, verify its plan.yaml entry defines an exit_gate and the
      feature in features.yaml backing it has at least one success scenario and at least one
      failure condition.
    artifact_pattern: "plan.yaml execution_order[].exit_gate + features.yaml backing feature"
    pass_criteria: >
      The milestone node has a non-empty exit_gate and its backing feature defines >=1 success
      scenario and >=1 failure condition.
    fail_criteria: >
      A reached milestone node has no exit_gate, or the feature backing it has no success scenarios
      or failure conditions to generate evaluations from.

  - id: SE-10
    source_type: failure_condition
    failure_condition_id: F10
    constraint_id: null
    skill: judge
    check: >
      After a fix iteration, verify the judge ran against freshly generated evaluations, not the
      same evaluations used in the previous iteration.
    artifact_pattern: "{eval_dir}/manifest.json per iteration (checksum differs across iterations)"
    pass_criteria: >
      Each iteration's judge run used freshly generated evals (manifest checksum differs from the
      prior iteration).
    fail_criteria: >
      After a fix iteration, the judge runs against the same evaluations used in the previous
      iteration rather than freshly generated ones.

  - id: SE-11
    source_type: failure_condition
    failure_condition_id: F11
    constraint_id: null
    skill: test-writer
    check: >
      For each implemented scope item, verify a corresponding unit test exists that exercises its
      behavior and that the unit tests pass.
    artifact_pattern: "{evidence_dir}/test-files-manifest.yaml + test run results"
    pass_criteria: >
      Every implemented scope item has a passing unit test exercising its behavior.
    fail_criteria: >
      Unit tests fail or are absent for any implemented scope item.

  - id: SE-12
    source_type: failure_condition
    failure_condition_id: F12
    constraint_id: null
    skill: quality-check
    check: >
      After implementation completes, verify there are no linting violations in the implemented code.
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml (lint section)"
    pass_criteria: >
      Zero linting violations in the implemented code after implementation is complete.
    fail_criteria: >
      Linting violations exist in the implemented code after implementation is complete.

  - id: SE-13
    source_type: failure_condition
    failure_condition_id: F13
    constraint_id: null
    skill: quality-check
    check: >
      Verify every code-quality metric meets the threshold specified in the project's quality
      vision gates.
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml vs quality gates"
    pass_criteria: >
      Every quality vision gate metric meets or exceeds its threshold.
    fail_criteria: >
      A metric falls below the threshold specified in the quality vision gates.

  - id: SE-14
    source_type: failure_condition
    failure_condition_id: F14
    constraint_id: null
    skill: test-writer
    check: >
      Inspect the test-writer's input context. Verify it contains no file paths from CONTEXT.md
      "Files You Own", no arch architecture artifact references, no tech.yaml references, and no
      implementation-specific information; TEST-CONTEXT.md contains no file paths or technology
      decisions.
    artifact_pattern: "test-writer dispatch contract + TEST-CONTEXT.md"
    pass_criteria: >
      Test-writer context carries only behavioral TEST-CONTEXT.md; zero file paths, arch refs,
      tech.yaml refs, or implementation specifics.
    fail_criteria: >
      The test-writer's input context contains "Files You Own" file paths, arch references,
      tech.yaml references, or implementation-specific information, or TEST-CONTEXT.md contains
      file paths or technology decisions.

  - id: SE-15
    source_type: both
    failure_condition_id: F15
    constraint_id: C18
    skill: orchestrator
    check: >
      Inspect the spec-referenced status report. Verify it maps each failure to a tech.yaml
      contract ID with expected behavior per spec and observed deviation, and contains no test
      source code, assertion text, test file paths, mock data patterns, or implementation code.
    artifact_pattern: "{evidence_dir}/status-report-{scope_item}-cycle-{N}.yaml"
    pass_criteria: >
      The status report describes failures exclusively via tech.yaml contract IDs and expected
      behavior per spec; zero test source, assertion text, file paths, mock data, or impl code.
    fail_criteria: >
      The status report contains test source code, assertion text, test file paths, mock data
      patterns, or implementation code.

  - id: SE-16
    source_type: both
    failure_condition_id: F16
    constraint_id: C19
    skill: orchestrator
    check: >
      When quality-vision.yaml exists, verify the quality vision gate thresholds contain no null
      entries for dimensions with QP levels >= 2 — the QP translation step ran.
    artifact_pattern: "resolved quality-gates.yaml (QP-derived thresholds)"
    pass_criteria: >
      Every dimension with QP level >= 2 carries a concrete (non-null) threshold derived from
      quality-vision.yaml via the QP translation table.
    fail_criteria: >
      quality-vision.yaml exists but quality vision gate thresholds contain null entries for
      dimensions with QP levels >= 2.

  - id: SE-17
    source_type: failure_condition
    failure_condition_id: F17
    constraint_id: null
    skill: judge
    check: >
      Verify the judge did not execute while quality-report.yaml showed overall FAIL.
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml + judge-report timestamps"
    pass_criteria: >
      No judge-report exists for an iteration whose quality-report shows overall FAIL; the judge
      ran only after a quality PASS.
    fail_criteria: >
      The judge executed while quality-report.yaml shows overall FAIL — quality gates were not
      blocking.

  - id: SE-18
    source_type: failure_condition
    failure_condition_id: F18
    constraint_id: null
    skill: orchestrator
    check: >
      When quality-report.yaml (incl qp_certification) or spec-referenced status reports contain
      failures, verify remediation instructions include at least one entry from each failing source.
    artifact_pattern: "{evidence_dir}/remediation-{node_id}-{iteration}.md"
    pass_criteria: >
      Every failing source (quality-report and/or status reports) has at least one remediation
      entry.
    fail_criteria: >
      A source reports failures but remediation instructions have zero entries from that source.

  - id: SE-19
    source_type: both
    failure_condition_id: F19
    constraint_id: C22
    skill: orchestrator
    check: >
      When fresh eval count is less than the original count, verify a consolidation_rationale
      artifact exists explaining which eval IDs were removed and why.
    artifact_pattern: "{evidence_dir}/eval-audit-{node_id}-{iteration}.yaml"
    pass_criteria: >
      A reduced fresh eval count is accompanied by a consolidation_rationale for each removed
      eval ID.
    fail_criteria: >
      Fresh eval count is less than original eval count and no consolidation_rationale artifact
      exists explaining which eval IDs were removed and why.

  - id: SE-20
    source_type: failure_condition
    failure_condition_id: F20
    constraint_id: null
    skill: orchestrator
    check: >
      Verify every external_service and test_double in tech.yaml mock_strategy was instantiated;
      if any could not be, the process halted before the test-writer ran.
    artifact_pattern: "{evidence_dir}/mock-setup-report-{node_id}.yaml"
    pass_criteria: >
      Every mock_strategy service and test double instantiated successfully; otherwise a hard halt
      is recorded before test-writer.
    fail_criteria: >
      Mock infrastructure setup failed — tech.yaml mock_strategy references services or test
      doubles that could not be instantiated, and the test-writer proceeded anyway.

  - id: SE-21
    source_type: failure_condition
    failure_condition_id: F21
    constraint_id: null
    skill: orchestrator
    check: >
      After individual scope items passed, verify the full test suite (unit + integration with
      mocks + regression) passes; an integration failure enters the fix loop.
    artifact_pattern: "integration test run results for the segment"
    pass_criteria: >
      The full suite passes after individual scope items passed; any integration failure is routed
      to the fix loop.
    fail_criteria: >
      The full test suite (unit + integration with mocks) fails after individual scope items
      passed — cross-scope-item behavior is broken.

  - id: SE-22
    source_type: both
    failure_condition_id: F22
    constraint_id: C26
    skill: quality-check
    check: >
      When quality-vision.yaml exists at {product_base}architecture/quality-vision.yaml, verify the
      quality-auditor report includes a qp_certification section with overall (CERTIFIED|BLOCKED),
      per-dimension checks (level, threshold, actual_value, status PASS|FAIL), and a blockers list.
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml (qp_certification section)"
    pass_criteria: >
      The quality report includes a qp_certification section with overall verdict, per-dimension
      level/threshold/actual_value/status, and blockers list.
    fail_criteria: >
      The quality-auditor report is missing the qp_certification section while quality-vision.yaml
      exists.

  - id: SE-23
    source_type: failure_condition
    failure_condition_id: F23
    constraint_id: null
    skill: orchestrator
    check: >
      Inspect every agent contract invoked by implement. Verify none contains an ltm_context field,
      a product_base reference, or a path outside {stm_base}/{issue}/.
    artifact_pattern: "all agent dispatch contracts for the run"
    pass_criteria: >
      Every agent contract reads only from STM; zero ltm_context fields, product_base references,
      or core/memory paths.
    fail_criteria: >
      An agent invoked by implement reads from KB (~/.garura/core/memory/) or LTM ({product_base}),
      or a contract carries ltm_context fields, product_base references, or paths outside
      {stm_base}/{issue}/.

  - id: SE-24
    source_type: failure_condition
    failure_condition_id: F24
    constraint_id: null
    skill: orchestrator
    check: >
      For the next candidate node, verify every depends_on edge resolves: the target node ID exists
      in plan.yaml, a gate target's exit_gate condition is satisfied, and a milestone target has
      status ACCEPTED. The DAG-walk pre-flight ran and passed before dispatch.
    artifact_pattern: "pre-flight DAG-edge-resolution record for the candidate node"
    pass_criteria: >
      Every depends_on edge of the candidate node resolves by its type (task=done in branch state,
      gate=exit_gate met, milestone=ACCEPTED) before the node is dispatched.
    fail_criteria: >
      A depends_on edge target cannot be resolved (node ID absent from plan.yaml), OR a resolved
      gate target's exit_gate condition is not satisfied, OR a resolved milestone target is not
      ACCEPTED — and the DAG-walk pre-flight failed or was skipped.

  - id: SE-25
    source_type: failure_condition
    failure_condition_id: F25
    constraint_id: null
    skill: judge
    check: >
      Verify judge-as-arbiter was invoked only after the same contract ID appeared in the status
      report for two consecutive implementation cycles — never on a first failure.
    artifact_pattern: "{evidence_dir}/arbiter-verdict-{scope_item}-{contract_ref}.yaml + status reports"
    pass_criteria: >
      An arbiter invocation record shows the same contract ID in two consecutive status reports
      before invocation.
    fail_criteria: >
      Judge-as-arbiter was invoked after only one failed implementation cycle for a given contract.

  - id: SE-26
    source_type: failure_condition
    failure_condition_id: F26
    constraint_id: null
    skill: orchestrator
    check: >
      For each code-builder and test-writer dispatch, verify all four labeled sections
      (Description, Preconditions, Expected Behavior, Verification Steps) are present, in order,
      and labeled.
    artifact_pattern: "code-builder / test-writer dispatch config.instructions"
    pass_criteria: >
      Every dispatch carries all four labeled sections in the prescribed order, each labeled.
    fail_criteria: >
      A dispatch is missing one or more of the four required sections, or any section is present
      but unlabeled.

  # ---- Artifact-verifiable constraint evals (not already covered as "both" above) ----
  # Already covered above via source_type "both": C8 (SE-4), C18 (SE-15), C19 (SE-16),
  # C22 (SE-19), C26 (SE-22). Remaining artifact-verifiable constraints: C7, C12, C13, C14.

  - id: SE-27
    source_type: constraint
    failure_condition_id: null
    constraint_id: C7
    skill: generate-encrypted-evals
    check: >
      Verify evaluations are encrypted at rest, plaintext evaluation content is deleted after
      encryption, and only the judge possesses the decryption capability.
    artifact_pattern: "{eval_dir}/ encrypted eval files + manifest.json"
    pass_criteria: >
      Evaluations exist only in encrypted form at rest; plaintext is deleted after encryption;
      decryption capability belongs only to the judge.
    fail_criteria: >
      Plaintext evaluation content remains after encryption, or the decryption capability is held
      by an agent other than the judge.

  - id: SE-28
    source_type: both
    failure_condition_id: F1
    constraint_id: C12
    skill: quality-check
    check: >
      Verify the project builds successfully after implementation and type checking and the
      production build both pass without errors.
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml (build + typecheck)"
    pass_criteria: >
      Type checking and the production build both pass without errors after implementation.
    fail_criteria: >
      Type checking or the production build produces errors after implementation.

  - id: SE-29
    source_type: constraint
    failure_condition_id: null
    constraint_id: C13
    skill: tech-designer
    check: >
      Verify CONTEXT.md is generated before implementation and describes the API surface,
      interface contracts, service contracts, scope items, file ownership, and conventions for the
      scope under implementation only, and does NOT include behavioral descriptions from
      features.yaml.
    artifact_pattern: "{stm_dir}/CONTEXT-{node_id}.md"
    pass_criteria: >
      CONTEXT.md exists before implementation, carries API surface + interface/service contracts +
      scope items + file ownership + conventions, and contains zero behavioral descriptions from
      features.yaml.
    fail_criteria: >
      CONTEXT.md is missing before implementation, omits a required section, or includes
      behavioral descriptions from features.yaml.

  - id: SE-30
    source_type: constraint
    failure_condition_id: null
    constraint_id: C14
    skill: quality-check
    check: >
      Verify the quality-auditor report independently covers linting, unit tests, type checking,
      build, and coverage against the project's quality vision gates, and includes a
      qp_certification section with per-dimension PASS/FAIL, overall CERTIFIED|BLOCKED, and a
      blockers list; and that it did not receive evaluations, builder prompts/reasoning,
      evals-engineer prompts, or judge reports.
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml + quality-auditor contract"
    pass_criteria: >
      The quality report covers lint/tests/typecheck/build/coverage and carries a qp_certification
      section; the quality-auditor contract carries zero eval/builder/judge content.
    fail_criteria: >
      The quality report omits a gate category or the qp_certification section, or the
      quality-auditor contract carries evaluations, builder prompts, or judge reports.


scenario_evals:

  - id: SCE-1
    scenario_id: S1
    persona: "Engineer"
    artifact_pattern: "run pre-flight self-location record + run inputs"
    check: >
      With no milestone_id supplied, verify the pre-flight record names the starting node as the
      topologically-earliest node whose depends_on edges are all satisfied and that is not yet
      marked done in branch state, and that no run input carries a milestone_id.
    pass_criteria: >
      The pre-flight record names the topologically-earliest runnable node as the start and no run
      input carries a milestone_id.
    fail_criteria: >
      A milestone_id was supplied/required, or the start node is not the topologically-earliest
      runnable node per branch state.

  - id: SCE-2
    scenario_id: S2
    persona: "Engineer"
    artifact_pattern: "run log across a chain of plain task nodes"
    check: >
      For a segment of consecutive task nodes (none a gate, none a milestone), verify each node
      executed and the next dispatched with no intervening pause or human prompt; a pause appears
      only at a gate node or a milestone node.
    pass_criteria: >
      Consecutive task nodes run continuously with no pause between them; pauses occur only at a
      gate or milestone node.
    fail_criteria: >
      Execution paused at a plain task node that is neither a gate nor a milestone.

  - id: SCE-3
    scenario_id: S3
    persona: "Engineer"
    artifact_pattern: "run log at a gate node + gate exit_gate recheck record"
    check: >
      At a gate node, verify the run log records a pause, a recheck of the gate's exit_gate
      condition, then automatic resumption at the next unsatisfied node once the condition is met,
      with no validate invocation and no human-acceptance entry for the gate boundary.
    pass_criteria: >
      The gate boundary records pause -> exit_gate recheck -> auto-resume, with zero validate
      invocation and zero human-acceptance entry.
    fail_criteria: >
      A gate boundary triggered a validate invocation or a human-acceptance step, or did not
      auto-resume once its exit condition cleared.

  - id: SCE-4
    scenario_id: S4
    persona: "Engineer"
    artifact_pattern: "run log at a milestone node + validate verdict record"
    check: >
      At a milestone node, verify the run log records eval generation, scenario-gate execution, and
      a validate invocation, and the next node is dispatched only after a validate verdict of
      ACCEPTED; a milestone with no ACCEPTED verdict shows no subsequent node dispatched.
    pass_criteria: >
      The milestone boundary records eval generation + scenario gates + validate invocation, and
      the next node is dispatched only after a validate ACCEPTED verdict.
    fail_criteria: >
      A node after the milestone was dispatched without a validate ACCEPTED verdict, or the
      milestone boundary skipped eval generation, scenario gates, or validate.

  - id: SCE-5
    scenario_id: S5
    persona: "Engineer"
    artifact_pattern: "pre-flight DAG-edge-resolution record for the candidate node"
    check: >
      Verify the pre-flight classifies each depends_on edge of the candidate node by target type
      and records the satisfied condition per type (milestone=ACCEPTED, gate=exit_gate met,
      task=done in branch state); the node is dispatched only when every edge resolves, else a
      structured F24 halt is recorded with no node executed.
    pass_criteria: >
      Each edge is classified by type with its satisfied condition recorded; the node dispatches
      only when all edges resolve, else a structured F24 halt with no node executed.
    fail_criteria: >
      An edge was not classified/resolved by type, or the node executed with an unresolved edge,
      or no F24 halt was recorded on an unresolved edge.

  - id: SCE-6
    scenario_id: S6
    persona: "Engineer"
    artifact_pattern: "{stm_dir}/.../node status-report.yaml"
    check: >
      For the executed node, verify the status-report.yaml shows status COMPLETE with
      judge_eval_review.iterations == 0 (no fix loop), judge pass rate 100%, and build/type-check
      pass.
    pass_criteria: >
      Node status-report shows COMPLETE, iterations == 0, judge pass rate 100%, build/type-check
      pass.
    fail_criteria: >
      The node status-report shows a fix loop ran, a judge pass rate below 100%, a failing
      build/type-check, or a status other than COMPLETE.

  - id: SCE-7
    scenario_id: S7
    persona: "Engineer"
    artifact_pattern: "{eval_dir}/manifest.json per iteration + {evidence_dir}/judge-report per iteration"
    check: >
      When the first judge run failed, verify each fix iteration (<= 3) has a distinct fresh eval
      manifest (checksum differs from the prior iteration) and a fresh judge-report, and the final
      judge run shows 100% pass or a structured failure report exists after iteration 3.
    pass_criteria: >
      Each iteration has a distinct fresh manifest and judge-report; the final run shows 100% pass
      or a structured failure report exists after iteration 3.
    fail_criteria: >
      An iteration reused the prior manifest, more than 3 iterations ran, or the loop ended without
      100% pass and without a structured failure report.

  - id: SCE-8
    scenario_id: S8
    persona: "QA Engineer"
    artifact_pattern: "scenarios.yaml verification scenarios + deployed environment"
    check: >
      Verify every verification scenario in scenarios.yaml for this milestone is executable against
      the deployed environment and its observed behavior matches the expected outcome, with no
      codebase read and no encrypted-eval reference required.
    pass_criteria: >
      Every verification scenario runs against the deployed environment with matching behavior, no
      codebase read, no encrypted-eval reference.
    fail_criteria: >
      A verification scenario is not executable against the deployed environment, behavior
      mismatches, or running it required a codebase read or eval reference.

  - id: SCE-9
    scenario_id: S9
    persona: "Security Auditor"
    artifact_pattern: "all agent dispatch contracts + quality-report security dimension"
    check: >
      Verify the builder contract carries only context_path + architecture_context_path (zero
      eval/test content), the judge contract carries zero builder prompts, the evals-engineer
      contract carries zero implementation code, the quality-auditor contract carries zero eval
      content, the test-writer contract carries zero implementation paths, and the quality-report
      security dimension shows PASS against the quality vision gates.
    pass_criteria: >
      Each agent contract carries only its designated inputs (zero cross-boundary content) and the
      quality-report security dimension shows PASS.
    fail_criteria: >
      Any agent contract carries content outside its scope, or the quality-report security
      dimension is not PASS.

  - id: SCE-10
    scenario_id: S10
    persona: "Engineering Lead"
    artifact_pattern: "{evidence_dir}/failure-report-{node_id}.md"
    check: >
      Verify the failure report names each persistently failing evaluation, carries a per-iteration
      remediation table (iterations 1-3 with quality status and judge result), and surfaces a
      restructure-or-escalate decision point — all without inspecting source.
    pass_criteria: >
      The failure report lists each persistently failing eval, a per-iteration remediation table,
      and a restructure-or-escalate decision point.
    fail_criteria: >
      The failure report omits the failing evals, the per-iteration table, or the
      restructure-or-escalate decision point.

  - id: SCE-11
    scenario_id: S11
    persona: "Performance Auditor"
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml vs quality-vision.yaml"
    check: >
      Verify the quality-report.yaml records measured bundle size, lighthouse score, and runtime
      metrics, and each measured value meets or exceeds its threshold from quality-vision.yaml.
    pass_criteria: >
      Measured bundle size, lighthouse score, and runtime metrics are recorded and each meets or
      exceeds its quality-vision.yaml threshold.
    fail_criteria: >
      A performance metric is unrecorded or falls below its quality-vision.yaml threshold.

  - id: SCE-12
    scenario_id: S12
    persona: "Evals Engineer"
    artifact_pattern: "{evidence_dir}/judge-report-{node_id}.yaml + {eval_dir}/manifest.json + features.yaml"
    check: >
      Verify the judge-report shows every eval in the manifest executed (executed count == manifest
      count), every features.yaml behavior maps to at least one eval, and the overall pass rate
      meets or exceeds the defined threshold.
    pass_criteria: >
      Executed count == manifest count, every features.yaml behavior has >=1 eval, and the overall
      pass rate meets or exceeds threshold.
    fail_criteria: >
      An eval went unexecuted, a behavior has zero eval coverage, or the pass rate is below
      threshold.

  - id: SCE-13
    scenario_id: S13
    persona: "Quality Lead"
    artifact_pattern: "{evidence_dir}/quality-report-{node_id}.yaml qp_certification section"
    check: >
      For every QP dimension with level >= 2, verify the quality gates carry a non-null threshold
      and the quality-report.yaml qp_certification section shows that dimension with PASS/FAIL and
      an actual_value; no dimension with level >= 2 is absent.
    pass_criteria: >
      Every QP dimension with level >= 2 has a non-null threshold and appears in qp_certification
      with PASS/FAIL and an actual_value.
    fail_criteria: >
      A QP dimension with level >= 2 has a null threshold or is absent from the qp_certification
      section.

  - id: SCE-14
    scenario_id: S14
    persona: "Build Engineer"
    artifact_pattern: "{evidence_dir}/quality-report + judge-report timestamps per iteration"
    check: >
      Whenever a quality-report.yaml shows overall FAIL or qp_certification.overall BLOCKED, verify
      no judge-report.yaml carries a later timestamp for that iteration; a judge-report exists only
      after a quality-report showing PASS with CERTIFIED.
    pass_criteria: >
      No judge-report follows a FAIL/BLOCKED quality-report in the same iteration; a judge-report
      exists only after a PASS-with-CERTIFIED quality-report.
    fail_criteria: >
      A judge-report carries a later timestamp than a FAIL/BLOCKED quality-report for the same
      iteration.

  - id: SCE-15
    scenario_id: S15
    persona: "Testing Architect"
    artifact_pattern: "test-writer + code-builder contracts + status reports routed to builder"
    check: >
      Verify the test-writer contract input is only test_context_path, the code-builder contract
      input is only context_path + architecture_context_path (zero test files/code/assertions), and
      every status report routed to the builder references only tech.yaml contract IDs (zero test
      source or assertion text).
    pass_criteria: >
      Test-writer input is only test_context_path; code-builder input is only context_path +
      architecture_context_path; status reports reference only tech.yaml contract IDs.
    fail_criteria: >
      The test-writer or code-builder contract carries content outside its scope, or a status
      report routed to the builder carries test source or assertion text.

  - id: SCE-16
    scenario_id: S16
    persona: "Engineering Lead"
    artifact_pattern: "{evidence_dir}/arbiter-verdict + two consecutive status reports"
    check: >
      Verify the arbiter invocation record shows the same contract ID in two consecutive status
      reports before invocation (none on a first failure), the arbiter contract input carries only
      tech.yaml contracts + the status report (zero implementation/test/eval content), and the
      arbiter verdict is one of implementation_wrong, implementation_correct_per_spec, or
      spec_ambiguous with the matching downstream action recorded.
    pass_criteria: >
      The arbiter ran only after two consecutive same-contract failures, with input limited to
      spec contracts + status report, and emitted one of the three named verdicts with its
      matching downstream action.
    fail_criteria: >
      The arbiter ran on a first failure, carried implementation/test/eval content, or emitted a
      verdict outside the three named values without the matching action.

  - id: SCE-17
    scenario_id: S17
    persona: "Eval Auditor"
    artifact_pattern: "{evidence_dir}/eval-audit-{node_id}.yaml + {eval_dir}/ + repo tree scan"
    check: >
      Verify an eval-audit artifact records the per-iteration count delta, every removed eval ID
      carries a consolidation_rationale when the delta is negative, no plaintext eval exists on
      disk after encryption, and no eval content (encrypted or plaintext) exists inside the
      repository tree.
    pass_criteria: >
      The eval-audit records each count delta with a consolidation_rationale for every removed eval
      when negative; zero plaintext evals after encryption; zero eval content inside the repo tree.
    fail_criteria: >
      A negative delta lacks a consolidation_rationale, a plaintext eval remains after encryption,
      or eval content exists inside the repository tree.

  - id: SCE-18
    scenario_id: S18
    persona: "Developer"
    artifact_pattern: "{evidence_dir}/mock-setup-report + test-writer dispatch + status reports + builder context"
    check: >
      Verify a mock-setup report exists and is dated before the test-writer dispatch, every
      external_service and test_double in tech.yaml mock_strategy has a functioning mock, and no
      status report or builder context contains mock data patterns.
    pass_criteria: >
      A mock-setup report predates the test-writer dispatch, every mock_strategy entry has a
      functioning mock, and zero status reports or builder contexts carry mock data patterns.
    fail_criteria: >
      The mock-setup report is missing or post-dates the test-writer dispatch, a mock_strategy
      entry lacks a functioning mock, or a status report/builder context carries mock data
      patterns.

  - id: SCE-19
    scenario_id: S19
    persona: "Developer"
    artifact_pattern: "code-builder / test-writer dispatch config.instructions"
    check: >
      Verify each code-builder and test-writer dispatch contains all four labeled sections in the
      prescribed order (Description, Preconditions, Expected Behavior, Verification Steps), and the
      Verification Steps section contains only a scope-directory path plus exit/red-path directives
      with zero test source, assertion text, or eval content.
    pass_criteria: >
      Each dispatch carries all four labeled sections in order, with Verification Steps holding only
      a scope-directory path plus exit/red-path directives.
    fail_criteria: >
      A dispatch is missing/unordered a section, or the Verification Steps section carries test
      source, assertion text, or eval content.


