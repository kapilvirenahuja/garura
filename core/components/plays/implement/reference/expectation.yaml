# Expectation for the implement play.
# Generated from reference/intent.yaml by draft-play-expectation.
# Regenerated for the DAG / self-locating / continuous execution model (#411).
# Two parts only: success_scenarios and recovery.

name: implement

generated_from:
  intent: core/components/plays/implement/reference/intent.yaml

vetted:
  status: approved
  approved_by: human (fix-it #411 checkpoint)
  approved_at: "2026-05-29"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# Re-derived from the intent goal + the play's consumers under the new execution model.
success_scenarios:
  - id: S1
    persona: "Engineer"
    given: >
      A locked plan.yaml (a DAG of task nodes with depends_on edges) in the issue STM and a
      feature branch with some nodes already executed and committed
    then: >
      Can run /implement with NO milestone_id and have it self-locate — read the plan DAG and the
      current branch state, identify the set of nodes whose depends_on edges are all satisfied and
      that have not yet been executed, and begin at the topologically-earliest such node
    measure: >
      With no milestone_id supplied, the run's pre-flight record names the starting node as the
      topologically-earliest node whose depends_on edges are all satisfied and that is not yet marked
      done in branch state; no run input carries a milestone_id — checkable without human opinion.

  - id: S2
    persona: "Engineer"
    given: >
      A self-located starting node followed by a chain of plain task nodes (no gate, no milestone)
      connected by depends_on edges
    then: >
      Can observe execution run continuously through the chain, node after node following DAG edges,
      without pausing at any plain task node between boundaries
    measure: >
      For a segment of consecutive task nodes (none a gate, none a milestone), the run log shows each
      node executed and the next dispatched with no intervening pause or human prompt; a pause appears
      only at a gate node or a milestone node.

  - id: S3
    persona: "Engineer"
    given: >
      A DAG walk that reaches a gate node (a .GATE-suffixed entry or kind: gate) whose exit condition
      is not yet met
    then: >
      Can observe execution halt at the gate as a readiness/tooling stop, the gate's exit condition be
      checked, and execution AUTO-RESUME at the next node once the condition clears — with no human
      acceptance step
    measure: >
      At a gate node the run log records a pause, then a recheck of the gate's exit_gate condition, then
      automatic resumption at the next unsatisfied node once the condition is met; no validate invocation
      and no human-acceptance entry appears for a gate boundary.

  - id: S4
    persona: "Engineer"
    given: >
      A DAG walk that reaches a milestone node (an entry carrying a milestone_id) with status LOCKED
      and backing scenarios/failure conditions defined
    then: >
      Can observe execution halt at the milestone as a human-acceptance stop — evals are generated,
      scenario gates run, validate is invoked — and execution resume only after validate confirms
      ACCEPTED
    measure: >
      At a milestone node the run log records eval generation, scenario-gate execution, and a validate
      invocation, and the next node is dispatched only after a validate verdict of ACCEPTED is recorded;
      a milestone with no ACCEPTED verdict shows no subsequent node dispatched.

  - id: S5
    persona: "Engineer"
    given: >
      A candidate next node whose depends_on edges target a mix of node types — another milestone,
      a gate task, and a plain task
    then: >
      Can observe the pre-flight resolve each edge by its type before dispatch — a milestone edge
      requires status ACCEPTED (via validate), a gate edge requires its exit_gate condition met, a
      task edge requires that task marked done in branch state — and dispatch only when all resolve
    measure: >
      The pre-flight record classifies each depends_on edge of the candidate node by target type and
      records the satisfied condition per type (milestone=ACCEPTED, gate=exit_gate met, task=done in
      branch state); the node is dispatched only when every edge is resolved, else a structured F24 halt
      is recorded with no node executed.

  - id: S6
    persona: "Engineer"
    given: >
      A self-located node whose scope items are implemented, tested, and verified, on a passing build
    then: >
      Can receive committed, deployed code that passes all evaluations on the first judge run with no
      fix loop required for that node
    measure: >
      For the executed node, the node status-report.yaml shows status COMPLETE with
      judge_eval_review.iterations == 0 (no fix loop), judge pass rate 100%, and the build/type-check
      pass — checkable without human opinion.

  - id: S7
    persona: "Engineer"
    given: >
      A judge report showing evaluation failures after the first implementation attempt for a node
    then: >
      Can observe the fix loop execute up to 3 iterations, with each iteration producing fresh
      evaluations and a fresh judge run, until all evaluations pass or the budget is exhausted
    measure: >
      When the first judge run failed, each fix iteration (<= 3) has a distinct fresh eval manifest
      (manifest checksum differs from the prior iteration) and a fresh judge-report; the final judge
      run shows 100% pass or a structured failure report exists after iteration 3.

  - id: S8
    persona: "QA Engineer"
    given: >
      The scenarios.yaml verification scenarios and the deployed implementation for a milestone
    then: >
      Can execute each verification scenario against the deployed environment and verify that expected
      user-facing behaviors match actual behavior, without reading the codebase or referencing
      encrypted evals
    measure: >
      Every verification scenario in scenarios.yaml for this milestone is executable against the deployed
      environment and its observed behavior matches the scenario's expected outcome, with no codebase read
      and no encrypted-eval reference required to run it.

  - id: S9
    persona: "Security Auditor"
    given: >
      The input contexts of all agents (code-builder, evaluation generator, judge, quality-auditor,
      test-writer) and the project's security quality vision gates
    then: >
      Can verify that no agent received information outside its designated scope — builder has zero
      evaluation/test content, judge has zero builder prompts, evaluation generator has zero
      implementation code, quality-auditor has zero eval content, test-writer has zero implementation
      info — and that security standards in the quality vision gates are met
    measure: >
      The builder contract carries only context_path + architecture_context_path (zero eval/test content),
      the judge contract carries zero builder prompts, the evals-engineer contract carries zero
      implementation code, the quality-auditor contract carries zero eval content, the test-writer
      contract carries zero implementation paths, and the quality-report security dimension shows PASS
      against the quality vision gates.

  - id: S10
    persona: "Engineering Lead"
    given: >
      A structured failure report produced after 3 exhausted fix iterations for a node
    then: >
      Can identify which evaluations persistently failed, what remediation was attempted in each
      iteration, and decide whether to restructure the feature scope or escalate
    measure: >
      The failure report names each persistently failing evaluation, carries a per-iteration remediation
      table (iterations 1-3 with quality status and judge result), and surfaces a restructure-or-escalate
      decision point — all without inspecting source.

  - id: S11
    persona: "Performance Auditor"
    given: >
      The deployed preview environment and the project's quality vision gates defining performance
      thresholds (bundle size, lighthouse scores, runtime performance)
    then: >
      Can verify that bundle size, lighthouse scores, and runtime performance metrics meet or exceed
      the thresholds defined in the quality vision gates
    measure: >
      The quality-report.yaml records measured bundle size, lighthouse score, and runtime metrics, and
      each measured value meets or exceeds its threshold from quality-vision.yaml.

  - id: S12
    persona: "Evals Engineer"
    given: >
      The judge report, eval execution results, and the features.yaml behaviors list
    then: >
      Can verify that every eval was executed, every feature behavior has eval coverage, and the
      overall pass rate meets the defined threshold
    measure: >
      The judge-report shows every eval in the manifest executed (executed count == manifest count),
      every features.yaml behavior maps to at least one eval, and the overall pass rate meets or exceeds
      the defined threshold.

  - id: S13
    persona: "Quality Lead"
    given: >
      A node implementation completed with quality-vision.yaml declaring QP levels >= 2 for testing,
      code quality, and security dimensions
    when: >
      The quality lead reviews the quality-auditor QP certification report
    then: >
      Every QP dimension with level >= 2 has a concrete threshold (not null) and the quality-report.yaml
      qp_certification section shows per-dimension PASS/FAIL with actual measurements; no QP dimension
      was skipped; the quality-auditor handles gates AND certification in one step
    measure: >
      For every QP dimension with level >= 2, the quality gates carry a non-null threshold and the
      quality-report.yaml qp_certification section shows that dimension with PASS/FAIL and an actual_value;
      no dimension with level >= 2 is absent from the section.

  - id: S14
    persona: "Build Engineer"
    given: >
      The quality-auditor reports overall FAIL or qp_certification.overall BLOCKED for a node
    when: >
      The build engineer checks pipeline behavior
    then: >
      The judge did NOT execute while quality-auditor reported FAIL or BLOCKED — one gate controls
      judge access, requiring quality-auditor PASS with CERTIFIED — and after fix iteration the
      quality-auditor reports PASS with CERTIFIED before the judge runs
    measure: >
      Whenever a quality-report.yaml shows overall FAIL or qp_certification.overall BLOCKED, no
      judge-report.yaml carries a later timestamp for that iteration; a judge-report exists only after a
      quality-report showing PASS with CERTIFIED.

  - id: S15
    persona: "Testing Architect"
    given: >
      A node implementation used the test-writer / code-builder separation
    when: >
      The testing architect audits test authorship and agent isolation
    then: >
      Test files were authored by the test-writer agent from TEST-CONTEXT.md (behavioral specs only);
      the code-builder NEVER received test files, test code, or assertion text — its only inputs were
      CONTEXT.md (derived from tech.yaml contracts) and architecture-context.yaml — and all test results
      flowed to the builder exclusively via spec-referenced status reports mapping failures to tech.yaml
      contract IDs
    measure: >
      The test-writer contract input is only test_context_path, the code-builder contract input is only
      context_path + architecture_context_path (zero test files/code/assertions), and every status report
      routed to the builder references only tech.yaml contract IDs (zero test source or assertion text).

  - id: S16
    persona: "Engineering Lead"
    given: >
      The same tech.yaml contract ID appeared in the spec-referenced status report for two consecutive
      implementation cycles
    when: >
      The engineering lead audits the arbiter escalation
    then: >
      Judge-as-arbiter was invoked only after the second consecutive failure (never on a first failure),
      read only the SPEC contracts and the status report (not implementation code, test code, or eval
      content), and rendered exactly one of three verdicts — implementation_wrong (builder gets a 3rd
      cycle with the diagnostic appended), implementation_correct_per_spec (test-writer re-invoked), or
      spec_ambiguous (human Orbit checkpoint)
    measure: >
      The arbiter invocation record shows the same contract ID in two consecutive status reports before
      invocation (none on a first failure), the arbiter contract input carries only tech.yaml contracts +
      the status report (zero implementation/test/eval content), and the arbiter verdict is one of the
      three named values with the matching downstream action recorded.

  - id: S17
    persona: "Eval Auditor"
    given: >
      Fresh evals were generated during a fix iteration with a different eval count than the original
    when: >
      The eval auditor reviews the eval audit trail
    then: >
      An eval-audit artifact documents the count delta; if evals were removed, each carries a
      consolidation_rationale; no evals silently disappeared between iterations; and evaluations are
      stored encrypted and entirely outside the repository tree
    measure: >
      An eval-audit artifact records the per-iteration count delta, every removed eval ID carries a
      consolidation_rationale when the delta is negative, no plaintext eval exists on disk after
      encryption, and no eval content (encrypted or plaintext) exists inside the repository tree.

  - id: S18
    persona: "Developer"
    given: >
      tech.yaml contains mock_strategy with external service mocks and test doubles
    then: >
      Mock infrastructure is set up before test-writer runs; test-writer authors tests against defined
      mock shapes from TEST-CONTEXT.md; code-builder implements against the same mocked dependencies
      described as service contracts in CONTEXT.md; and the orchestrator runs tests against mock
      infrastructure producing spec-referenced status reports — mock details never appear in status
      reports or builder context
    measure: >
      A mock-setup report exists and is dated before the test-writer dispatch; every external_service and
      test_double in tech.yaml mock_strategy has a functioning mock; and no status report or builder
      context contains mock data patterns.

  - id: S19
    persona: "Developer"
    given: >
      A dispatch to code-builder or test-writer for a scope item
    when: >
      The developer audits the dispatch prompt structure
    then: >
      Every dispatch carries the four labeled sections in order — Description, Preconditions, Expected
      Behavior, Verification Steps — with Verification Steps holding only a procedural run directive
      (scope-directory path, exit criterion, red-path action), never test content or eval criteria
    measure: >
      Each code-builder and test-writer dispatch contains all four labeled sections in the prescribed
      order, and the Verification Steps section contains only a scope-directory path plus exit/red-path
      directives with zero test source, assertion text, or eval content.

# Recovery — one entry per failure condition in intent.yaml (F1-F26). The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # build/type-check errors after implementation
    trigger: >
      After implementation completes, the project build or type check produces errors.
    direction: >
      The build and type check must pass cleanly after implementation; route the compile/type errors
      back to the builder to correct the code until both pass.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2                 # >50% eval failure on first judge run
    trigger: >
      The first judge run reports a greater-than-50% evaluation failure rate.
    direction: >
      A first judge run must pass the majority of evaluations; a majority failure signals the feature
      scope or spec needs rethinking — a restructuring call the builder cannot make.
    handoff: human
    derivable_at_l4: false
  - id: REC3
    for_failure: F3                 # 3 iterations exhausted, still failing
    trigger: >
      Three fix iterations are exhausted and the judge report still contains at least one failing
      evaluation.
    direction: >
      All evaluations must pass within the iteration budget; once exhausted, escalate with the structured
      failure report — restructure-vs-escalate is a judgment the builder lacks.
    handoff: human
    derivable_at_l4: false
  - id: REC4
    for_failure: F4                 # plaintext evals on disk / eval content in repo
    trigger: >
      Plaintext evaluation files exist on disk after encryption, or evaluation content exists inside the
      project repository tree.
    direction: >
      Evaluations must live encrypted and entirely outside the repo; re-encrypt and relocate the eval
      content outside the tree and delete the plaintext.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # builder context carries test/eval content
    trigger: >
      The builder's input context contains test source code, assertion text, mock data patterns from
      test files, evaluation IDs/text/pass criteria, or raw judge report content.
    direction: >
      The builder context must carry only the spec (CONTEXT.md + architecture-context.yaml plus a bare
      scope-directory path); rebuild the contract stripping every forbidden input before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC6
    for_failure: F6                 # judge context carries builder prompts/reasoning
    trigger: >
      The judge's input context contains a builder prompt, builder reasoning, or implementation
      rationale.
    direction: >
      The judge context must carry only the encrypted evals plus implementation artifacts; rebuild the
      judge contract stripping every builder prompt and reasoning artifact before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # eval generator context carries impl code / prior evals
    trigger: >
      The evaluation generator's input context contains implementation code, builder output, or prior
      evaluation results.
    direction: >
      The eval generator context must carry only the listed spec inputs; rebuild the contract stripping
      all implementation code, builder output, and prior evals before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8                 # milestone node status != LOCKED
    trigger: >
      The DAG walk reaches a milestone node whose plan.yaml entry has a status other than LOCKED
      (e.g., DRAFT) when its acceptance gate is about to run.
    direction: >
      A milestone node's acceptance gate may run only against a LOCKED plan.yaml entry; hold until the
      milestone node is moved out of DRAFT and locked upstream — a state the builder cannot grant.
    handoff: human
    derivable_at_l4: false
  - id: REC9
    for_failure: F9                 # no exit gate / no success scenarios or failure conditions
    trigger: >
      A milestone node the walk reaches has no exit_gate in plan.yaml, or the feature backing it has no
      success scenarios or failure conditions to generate evaluations from.
    direction: >
      A milestone node must carry an exit gate and its backing feature must define success scenarios and
      failure conditions; hold until the upstream spec supplies them — the builder cannot author missing
      spec.
    handoff: human
    derivable_at_l4: false
  - id: REC10
    for_failure: F10                # judge ran against reused evals
    trigger: >
      After a fix iteration, the judge ran against the same evaluations used in the previous iteration
      rather than freshly generated ones.
    direction: >
      Each fix iteration must run the judge against freshly generated evals; discard the prior set and
      regenerate from the original specs before the judge runs.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC11
    for_failure: F11                # unit tests fail or absent for a scope item
    trigger: >
      Unit tests fail or are absent for any implemented scope item.
    direction: >
      Every scope item must have passing unit tests that exercise its behavior; author or fix the tests
      via the test-writer and re-run until each scope item is covered and green.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC12
    for_failure: F12                # lint violations
    trigger: >
      Linting violations exist in the implemented code after implementation completes.
    direction: >
      The implemented code must be lint-clean; route the lint findings back to the builder to correct
      until the linter passes.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC13
    for_failure: F13                # quality vision gates not met
    trigger: >
      A code-quality metric falls below the threshold defined in the project's quality vision gates.
    direction: >
      Every quality-vision gate threshold must be met; enter the fix loop to raise the failing metric to
      its threshold via builder fixes.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC14
    for_failure: F14                # test-writer context carries impl info
    trigger: >
      The test-writer's input context contains file paths from "Files You Own", arch artifact references,
      tech.yaml references, or any implementation-specific information.
    direction: >
      The test-writer context must carry only behavioral TEST-CONTEXT.md (no file paths, no tech
      decisions); rebuild the contract stripping every implementation-specific input before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC15
    for_failure: F15                # status report carries test code
    trigger: >
      The spec-referenced status report contains test source code, assertion text, test file paths, mock
      data patterns, or implementation code.
    direction: >
      The status report must describe failures only via tech.yaml contract IDs and expected behavior;
      regenerate the report stripping all test source, assertion text, and implementation code.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC16
    for_failure: F16                # QP gate thresholds null for QP level >= 2
    trigger: >
      quality-vision.yaml exists but the quality gate thresholds carry null entries for dimensions with
      QP levels >= 2.
    direction: >
      Every QP dimension with level >= 2 must have a concrete threshold; re-run the QP translation table
      to derive the missing thresholds from quality-vision.yaml.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC17
    for_failure: F17                # judge executed while quality FAIL
    trigger: >
      The judge executed while quality-report.yaml showed overall FAIL — gates were not blocking.
    direction: >
      The judge must run only after a quality-auditor PASS with CERTIFIED; enforce the single gate so the
      judge cannot run while quality reports FAIL or BLOCKED.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC18
    for_failure: F18                # failing source omitted from remediation
    trigger: >
      quality-report.yaml or the spec-referenced status reports contain failures, but remediation
      instructions have zero entries from that source.
    direction: >
      Remediation must draw from every failing source; rebuild the remediation to include entries from
      each source that reported a failure.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC19
    for_failure: F19                # fresh eval count down without rationale
    trigger: >
      The fresh eval count is less than the original count and no consolidation_rationale artifact exists
      explaining which eval IDs were removed and why.
    direction: >
      A reduced eval count must be justified; require a consolidation_rationale for each removed eval ID
      or re-invoke the evals-engineer to produce the full set.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC20
    for_failure: F20                # mock setup failed
    trigger: >
      Mock infrastructure setup failed — tech.yaml mock_strategy references services or test doubles that
      could not be instantiated.
    direction: >
      Mock infrastructure must stand up before the test-writer runs; the failing mock_strategy needs a
      correction in the upstream tech.yaml that the builder cannot author.
    handoff: human
    derivable_at_l4: false
  - id: REC21
    for_failure: F21                # integration test fail
    trigger: >
      The full test suite (unit + integration with mocks) fails after individual scope items passed —
      cross-scope-item behavior is broken.
    direction: >
      The integration suite must pass once scope items are individually green; enter the fix loop to
      correct the cross-scope-item behavior via builder fixes.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC22
    for_failure: F22                # qp_certification section missing
    trigger: >
      The quality-auditor report is missing the qp_certification section while quality-vision.yaml
      exists.
    direction: >
      The quality-auditor report must include qp_certification when quality-vision.yaml exists; re-invoke
      the quality-auditor to emit the section.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC23
    for_failure: F23                # agent reads KB/LTM
    trigger: >
      An agent contract contains an ltm_context field, a product_base reference, or a path outside
      {stm_base}/{issue}/.
    direction: >
      Every agent must read only from STM; strip all ltm_context fields, product_base references, and
      core/memory paths from the agent contracts before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC24
    for_failure: F24                # DAG-edge cannot be resolved at pre-flight
    trigger: >
      A depends_on edge target for the current plan node cannot be resolved — the node ID does not exist
      in plan.yaml, or a resolved gate target's exit_gate condition is not satisfied, or a resolved
      milestone target does not have status ACCEPTED — and the DAG-walk pre-flight failed or was skipped.
    direction: >
      Every depends_on edge of the next candidate node must resolve before dispatch — a missing node ID
      is an upstream plan.yaml error a human must correct; an unmet gate exit condition holds until the
      gate clears; an un-ACCEPTED milestone holds until validate confirms ACCEPTED. Hold the walk and
      surface the unresolved edge rather than executing the node.
    handoff: human
    derivable_at_l4: false
  - id: REC25
    for_failure: F25                # arbiter invoked on first failure
    trigger: >
      Judge-as-arbiter was invoked after only one failed implementation cycle for a given contract.
    direction: >
      Arbiter escalation is valid only after the same contract fails two consecutive cycles; enforce the
      two-cycle gate so the arbiter is not invoked on a first failure.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC26
    for_failure: F26                # dispatch missing one of the four labeled sections
    trigger: >
      A dispatch to code-builder or test-writer is missing one of the required four sections
      (Description, Preconditions, Expected Behavior, Verification Steps), or a section is unlabeled.
    direction: >
      Every dispatch must carry all four labeled sections in order; rebuild the dispatch with the missing
      or unlabeled section restored before invocation.
    handoff: autonomous
    derivable_at_l4: true
