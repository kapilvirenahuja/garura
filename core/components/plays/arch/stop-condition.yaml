# arch stop condition — baked from reference/ice.md "### Done means" (#464, #466 Batch C;
# #500 direct-model-write, ADR 026).
# Evaluated by scripts/check_stop_condition.py at Step C0 of the Standard Play Close.
# Paths are relative to the run's working root ({stm_base}_realize/arch/). These are STM,
# non-model artifacts — the model itself is written in place under <product_base>product-os/.
# A run whose keyed persist or scoped-write guard did not land leaves a clause unmet —
# the close reads HALTED, never COMPLETED.
schema: { name: stop-condition }
content:
  done:
    - id: D1
      says: "the persist record exists — the lens and any decision were written in place on the live model"
      check: { type: artifact_exists, path: "persist-manifest.json" }
    - id: D2
      says: "the lens was persisted — the persist record stamps the write applied"
      check: { type: field_equals, file: "persist-manifest.json", field: "applied", equals: true }
    - id: D3
      says: "the scoped-write guard held — no model path changed outside the slice's write scope (the allowlist held)"
      check: { type: field_equals, file: "guard-report.json", field: "ok", equals: true }
