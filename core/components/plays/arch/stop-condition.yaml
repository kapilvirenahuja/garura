# arch stop condition — baked from reference/ice.md "### Done means" (#464, #466 Batch C).
# Evaluated by scripts/check_stop_condition.py at Step C0 of the Standard Play Close.
# Paths are relative to the run's working root ({stm_base}_realize/arch/). A run that never
# applied (checkpoint cancelled, validation failed) leaves D3 unmet — the run closes HALTED,
# never COMPLETED.
schema: { name: stop-condition }
content:
  done:
    - id: D1
      says: "the architecture lens draft exists"
      check: { type: artifact_exists, path: "draft/product-os/*/slices/*/lens/architecture.md" }
    - id: D2
      says: "the grounding manifest exists"
      check: { type: artifact_exists, path: "draft/arch-manifest.yaml" }
    - id: D3
      says: "the approved lens was applied and verified surgical"
      check: { type: field_equals, file: "arch-checks.json", field: "ok", equals: true }
