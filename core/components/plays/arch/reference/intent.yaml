name: garura:arch
description: >
  Produce the architecture shape of the product as five artifacts — a refined
  quality profile, a systems inventory, a layered logical architecture, a
  layered physical architecture, a tech-stack with patterns, and a technical
  risk register. Every decision is grounded in upstream inputs, the user, or
  KB memory; nothing is invented by the play.
version: 1.0.0
checksum: "<computed by /create-play --build>"

intent: >
  Given the locked output of /specify (scope, enriched capabilities, intent
  epics, domain → capability tree, quality profile) and /design (personas,
  screens, flows, design spec), produce FIVE canonical architecture artifacts
  that together describe the shape of the product:

    (A1) quality-profile.yaml — the REFINED quality profile. /specify
         authored a first-cut profile; /arch refines targets given
         architectural reality, records every delta with rationale, and
         locks the result. This artifact DESCRIBES the NFRs the software
         must deliver.

    (A2) systems-inventory/ — one file per system the product depends on
         (ERP, CRM, CMS, DAM, identity, payment gateway, search,
         observability, etc.). Each file follows the KB-extension shape
         and is sourced either by KB pull-to-product (origin: kb) or by
         in-product research (origin: stm_research) when the system is
         not yet in KB. A system file MAY declare sub_systems[] — named
         child surfaces of the same system (e.g., a CMS with
         authoring-app and delivery-api as sub-systems; an ERP with
         finance-module and inventory-module). Sub-systems live inside
         their parent's inventory file; they are not separate inventory
         files. This is the inventory both logical and physical draw
         components from. Anything used as a component in A3 or A4 MUST
         appear here first.

    (A3) logical-architecture.yaml — components organized into a
         product-chosen LAYER MODEL. Every logical component IS a system
         (or a sub-system) from the inventory in A2 — components are not
         invented at logical-time, they are SELECTED from inventory and
         placed in a layer. Every selected capability maps to at least
         one component. Cycles between components are forbidden. Every
         user-facing capability has an end-to-end trace through layers
         from the entry surface to the system that serves it. Logical
         names systems by their inventory ID and role — never by their
         product, runtime, language, protocol, or schema.

    (A4) physical-architecture.yaml — the runtime shape. Where each
         logical component runs (cloud / on-prem / hybrid), the resources
         it needs, how components talk to each other on the wire, and
         the mechanism that delivers each NFR described in the refined
         quality profile. Every physical component references its logical
         component by ID and inherits its inventory grounding — physical
         components are NOT invented at physical-time. Every system or
         sub-system that appears in physical reverse-traces to an
         inventory entry; inventory bypass at physical is a structural
         violation. Every NFR target in quality-profile.yaml appears in
         physical with a named delivery mechanism.

    (A5) tech-stack.yaml — libraries, languages, frameworks, and
         DESIGN PATTERNS picked per box. Tech can be the same across
         boxes or different per box. Patterns referenced MUST be
         industry-documented patterns (GoF, microservice, monolith,
         serverless, MVC, MVVM, CQRS, event-sourcing, outbox, saga,
         circuit breaker, retry-with-backoff, idempotency key, etc.)
         with a literature citation; invented patterns are rejected.
         System-level decisions (monolith / microservice / serverless)
         are patterns and live here, not in a separate artifact.

    (A6) technical-risks.yaml — the LAST artifact produced. Once
         everything else is selected and in place, the play identifies
         what can go wrong, the cost to the business if the risk hits,
         and the mitigation. One entry per risk; no risk without all
         three.

  Plus one decision-manifest-{skill}.yaml per emitting skill carrying the
  inferred decisions and the user's response (accept / override / orbit),
  per the existing Decision Surfacing Discipline.

  The play is the brain that runs the process. It does not invent
  selection rules. Every decision traces to one of: (a) an upstream
  artifact from /specify or /design, (b) a pin in project-profile, (c)
  a KB entry the agent read, or (d) a user answer captured at a
  checkpoint or in grounding-questions.md. Decisions outside that set
  are blocking failures.

constraints:
  - id: C1
    rule: >
      Soft pre-flight. /arch uses upstream /specify and /design artifacts
      when they exist; it does NOT hard-halt when they are missing. For
      each expected input the play probes:
        .garura/product/scope/scope.yaml
        .garura/product/scope/garura:enriched-capabilities.yaml
        .garura/product/scope/epics/*.yaml
        .garura/product/research/{domain}.md (one per selected domain)
        .garura/product/specification/quality-profile.yaml
        .garura/product/experience/personas.md
        .garura/product/experience/screens/*.md
        .garura/product/experience/flows/*.md
        .garura/product/experience/design-spec.md
      If an artifact is present and LOCKED, the play reads it. If an
      artifact is missing or DRAFT, the play asks the user the
      equivalent questions interactively at the relevant stage and
      writes the answers into a stm-authored stand-in under
      .garura/product/{matching-folder}/ with origin: stm_user_answer
      so downstream stages have something to read. Hard-halting on
      missing upstream is a violation of the agentic-coding rule —
      previous commands are NOT hard gates.

      Per-stage probe + question fallback:
        Stage 1 (Systems Inventory) — needs scope.selected_capabilities
          or its question-equivalent ("which capabilities does this
          product serve?").
        Stage 2 (Refined QP) — needs specification/quality-profile.yaml
          or its question-equivalent (the ISO 25010 characteristic walk).
        Stage 3 (Logical) — needs the layer-model choice plus the
          systems inventory plus the capability list.
        Stage 4 (Physical) — needs logical plus project-profile (or
          questions for deployment-target, region, scaling shape).
        Stage 5 (Tech Stack) — needs logical + physical plus
          project-profile pins (or questions for unpinned slots).
        Stage 6 (Risks) — needs Stages 1-5 only.

  - id: C2
    rule: >
      Output contract. The play emits exactly six artifacts under
      .garura/product/architecture/ per ADR 017:
        quality-profile.yaml (refined; replaces the specify version
          conceptually but lands at architecture/quality-profile.yaml so
          the upstream specify file remains the authored intake)
        systems-inventory/{system}.md (one file per system in play)
        logical-architecture.yaml
        physical-architecture.yaml
        tech-stack.yaml
        technical-risks.yaml
      Companion decision-manifest-{skill}.yaml files live alongside as
      each emitting skill produces them. Evidence writes go through the
      scriber agent — the play never writes evidence files directly.

  - id: C3
    rule: >
      Stage order is load-bearing. Stages run as:
        Stage 1 — Systems Inventory (independent of QP)
        Stage 2 — Quality Profile refinement (independent of systems
                  inventory; gates Stages 3 and 4 only)
        Stage 3 — Logical Architecture (requires Stages 1 and 2)
        Stage 4 — Physical Architecture (requires Stage 3)
        Stage 5 — Tech Stack (requires Stages 3 and 4)
        Stage 6 — Technical Risks (requires Stages 1-5)
      Stages 1 and 2 may run in either order or in parallel. Stages 3-6
      are strictly sequential. Quality-profile MAY NOT gate systems
      inventory or tech-stack. Technical risks MAY NOT be produced until
      every other stage is complete.

  - id: C4
    rule: >
      Layer model is a product-level input, not a play-level constant.
      Stage 3 first establishes the layer model for this product by:
        (a) reading project-profile.layer_model if pinned, OR
        (b) asking the user via a checkpoint, with KB blueprints
            (systems / process / experience / AOP; the 7-layer IDSD
            model; others under core/components/memory/knowledge/arch/
            layer-models/) surfaced as candidates.
      The play does NOT enforce a fixed taxonomy. Once chosen for this
      product, the layer model is load-bearing — every logical component
      and every physical component MUST land in exactly one layer.
      Adding or removing a layer after the model is locked requires
      explicit user approval at a checkpoint.

  - id: C5
    rule: >
      Systems Inventory population. Stage 1 walks every selected
      capability (from scope.selected_capabilities if present, else
      from the C1 question fallback) and identifies which system or
      sub-system serves it. For each identified system:
        (a) if a KB file exists at
            core/components/memory/knowledge/arch/systems/{system}.md,
            copy it to
            .garura/product/architecture/systems-inventory/{system}.md
            with a provenance header (origin: kb, kb_path,
            kb_version_sha, copied_at, editable: false);
        (b) if no KB file exists, author one in product space with
            origin: stm_research, editable: true, and the required
            KB-extension sections (When to Use, When to Avoid, Scale
            Profile, Capabilities Served, Sub-Systems, Tradeoffs,
            Anti-Patterns).
      A system file MAY declare sub_systems[] — each carrying id,
      name, responsibilities, capabilities_served[]. Sub-systems are
      child surfaces of the same system (e.g., CMS → authoring-app,
      delivery-api) and live INSIDE the parent system file, not as
      separate inventory files. Anything that will be used as a
      component in logical-architecture.yaml or physical-
      architecture.yaml MUST be present in inventory as either a
      system or a sub-system before logical begins.
      Downstream stages read inventory from product space only —
      knowledge/arch/systems/ is the authoring surface, not the read
      path. Promotion of stm_research entries to KB happens through
      /enrich after vetting.

  - id: C6
    rule: >
      Logical Architecture content shape. Every entry in
      logical-architecture.yaml.components carries:
        id, name, layer (must be one of the locked layer model),
        system_ref (the inventory file ID this component IS — a system,
          NOT a reference to some other concept),
        sub_system_ref (optional — when the component is a sub-system,
          this names the sub_system id within the parent system file),
        responsibilities, capability_ids (one or more capabilities this
        component serves), inbound_edges (list of component IDs that
        call this one), outbound_edges (list of component IDs this one
        calls, each with sync_mode = "sync" | "async" | "hybrid" and a
        rationale), driver_epics, driver_capabilities.
      Every component MUST resolve to a system (or a sub-system within a
      system) that exists in
      .garura/product/architecture/systems-inventory/. Components are
      SELECTED from inventory and placed in a layer — they are NOT
      invented at logical-time. A component whose system_ref (or
      system_ref + sub_system_ref) does not resolve to an inventory
      entry is a structural violation. Components without a layer or
      without at least one capability_id are also a structural
      violation.

  - id: C7
    rule: >
      Logical is tech-agnostic. logical-architecture.yaml MUST NOT name
      any specific product, runtime, programming language, protocol,
      wire format, schema column, or library. Components are named by
      role (e.g., "order-orchestrator") with a system_ref to the
      inventory. Product names and protocols belong in physical-
      architecture.yaml and tech-stack.yaml.

  - id: C8
    rule: >
      No cycles. The directed graph formed by
      logical-architecture.components and their outbound_edges MUST be
      acyclic. The same applies to physical-architecture.components and
      their outbound runtime calls. A detected cycle is a blocking
      failure; the play surfaces the cycle to the user at the relevant
      checkpoint and refuses to proceed until it is broken (by removing
      an edge, splitting a component, or introducing an async boundary
      that breaks the synchronous cycle).

  - id: C9
    rule: >
      End-to-end traceability. Every selected capability from
      scope.selected_capabilities must have at least one end-to-end
      path in logical-architecture.yaml from a component in the
      user-facing entry layer (the layer the chosen layer model
      designates as the experience / channel surface) through
      intermediate layers to a component whose system_ref serves that
      capability. Orphan capabilities (no entry-layer path) and
      orphan components (in the graph but not reachable from any entry
      layer for any capability) are blocking failures.

  - id: C10
    rule: >
      Physical Architecture content shape. Every entry in
      physical-architecture.yaml.components carries:
        id, logical_ref (the logical component ID it implements),
        system_ref (inherited from the referenced logical component's
          system_ref — MUST resolve to an inventory entry),
        sub_system_ref (inherited from the referenced logical
          component's sub_system_ref when present),
        layer (must match the logical component's layer),
        deployment_target (cloud provider product, on-prem class, or
        hybrid mix — named specifically), resources (CPU, memory,
        storage, scaling shape), comms (per outbound edge: protocol,
        sync/async, retry/idempotency stance), nfr_delivery (list of
        {nfr_id, mechanism, rationale} — at least one entry per NFR
        from quality-profile.yaml whose delivery falls in this
        component's scope).
      Physical components are NOT invented at physical-time. Every
      physical component reverse-traces through logical_ref to a
      logical component, and through that logical component's
      system_ref / sub_system_ref to a system or sub-system in
      .garura/product/architecture/systems-inventory/. A physical
      component whose system_ref does not resolve to an inventory
      entry is a structural violation — even when logical_ref is
      valid (the inventory grounding is the load-bearing trace, not
      the logical link alone). A physical component without a
      logical_ref, a system_ref, a layer, or a deployment_target is
      a structural violation.

  - id: C11
    rule: >
      Logical → physical mapping cardinality. Each logical component
      may map to one OR many physical components (1:N when sharded,
      replicated, or split across tiers). Multiple logical components
      may collapse into one physical component (N:1) when justified by
      a cited rationale (operational simplicity, latency budget,
      transactional coupling). Cardinality is recorded on each physical
      component's logical_ref as one of "one-to-one", "many-to-one",
      "one-to-many". Unjustified collapses (N:1 without rationale) are
      a structural violation.

  - id: C12
    rule: >
      Physical names specific products. Every deployment_target,
      resource class, comm protocol, and nfr_delivery mechanism in
      physical-architecture.yaml names a specific product or
      construct — "PostgreSQL 16 RDS Multi-AZ", "AWS Application Load
      Balancer with health checks every 10s", "Temporal worker pool".
      Category terms ("a relational database", "a message queue") are
      a structural violation.

  - id: C13
    rule: >
      Refined Quality Profile. Stage 2 reads
      .garura/product/specification/quality-profile.yaml and produces
      .garura/product/architecture/quality-profile.yaml carrying:
        every characteristic from the specify QP, every target,
        plus a delta_log[] entry for each adjustment made during /arch
        (field changed, before, after, rationale citing the architectural
        constraint that forced the change).
      The refined QP DESCRIBES the NFRs the product must deliver. It
      does not name delivery mechanisms — those live in physical. The
      refined QP gates Stages 3 and 4; it does not gate Stages 1, 5,
      or 6.

  - id: C14
    rule: >
      NFR delivery is grounded in physical. Every characteristic in
      quality-profile.yaml with a target (performance, reliability,
      security, compliance, observability, etc.) must appear in at
      least one physical-architecture.yaml component's nfr_delivery[]
      block with a named mechanism and a rationale. An NFR target
      without a mapped delivery mechanism is a blocking failure.

  - id: C15
    rule: >
      Tech Stack content shape. Every entry in tech-stack.yaml carries:
        id, scope (which logical or physical components this entry
        applies to, by ID), category (language | runtime | framework |
        library | tool | pattern), name (specific product or pattern
        name), version (where applicable), source_type (per C18
        source-type discipline), source_citation, alternatives_considered,
        rationale (citing QP target, project profile pin, or user
        answer that motivated the pick).
      A tech-stack entry without scope, category, name, source_type,
      or rationale is a structural violation.

  - id: C16
    rule: >
      Patterns must be industry-documented. Every tech-stack entry
      with category = pattern MUST cite an industry literature source
      for the pattern (GoF, "Patterns of Enterprise Application
      Architecture", microservices.io, official RFC, etc.). Invented
      or undocumented patterns are rejected. System-level decisions
      (monolith / microservice / serverless / modular monolith) are
      patterns and live in tech-stack — there is no separate
      system-level concept.

  - id: C17
    rule: >
      Technical Risks shape. Stage 6 reads all prior stage outputs
      and produces technical-risks.yaml. Every entry carries:
        id, risk_statement (what can go wrong), trigger_conditions
        (when this risk materializes), business_cost (concrete cost
        to the business if it hits — revenue, reputation, compliance,
        SLA penalty), likelihood (low | medium | high with rationale),
        mitigation (concrete action to take, owner, when), residual_risk
        (what remains after mitigation), driver_refs (which artifacts
        the risk surfaces from — components, NFRs, tech picks).
      A risk entry missing risk_statement, business_cost, or mitigation
      is a structural violation. Stage 6 MAY NOT run until Stages 1-5
      have produced their artifacts.

  - id: C18
    rule: >
      Source-Type Discipline. Every decision in any /arch artifact
      (system selection, layer assignment, component definition,
      deployment-target pick, resource sizing, NFR mechanism, tech
      pick, pattern selection, risk identification) carries a
      `source_type` enum:
        - upstream_artifact (cited file:section)
        - project_profile_pin (cited slot)
        - kb_catalog_single_candidate (cited KB file)
        - kb_catalog_multi_candidate_user_approved (cited
          grounding-question or checkpoint ID)
        - user_direct_answer (cited checkpoint or grounding-question)
        - agent_default_with_user_approval (cited checkpoint)
        - agent_default_unilateral (BLOCKING — validator rejects)
      A decision without source_type is a schema violation.

  - id: C19
    rule: >
      Decision Surfacing Discipline. Every inferred decision is
      surfaced to the user before commit, classified by confidence tier:
        HIGH — direct match against an upstream artifact, project
          profile pin, or kb_catalog_single_candidate. Surfaced as a
          batch confirmation at the next checkpoint.
        MID — agent reasoned from web research or KB synthesis because
          no single grounding existed. Surfaced as a batch with
          explicit questions and recommendations.
        LOW — no KB and no research grounded the choice. Surfaced
          one-by-one with no batching.
      Decisions sourced from project_profile_pin are exempt. Trivial
      echoes are exempt. High confidence is permission to batch — never
      permission to skip surfacing.

  - id: C20
    rule: >
      Multi-candidate resolution. When the KB offers more than one
      legitimate candidate for a slot AND project-profile does not pin
      it, the derivation agent MUST either (a) append a Q-arch-NNN
      question to
      .garura/product/user-provided/grounding-questions.md and halt the
      slot, OR (b) surface the choice at the next stage checkpoint for
      explicit user selection. Silent multi-candidate resolution is a
      blocking failure.

  - id: C21
    rule: >
      Grounded-tools pins are authoritative. When
      project-profile.grounded_tools carries a pin for a slot
      (deployment target, database, runtime, framework, etc.), the
      /arch artifact filling that slot MUST use the pinned value and
      tag the decision with source_type = project_profile_pin.
      Overriding a grounded_tools pin is a blocking failure.

  - id: C22
    rule: >
      Decision Manifests. Every skill that produces inferred decisions
      emits a decision-manifest-{skill}.yaml alongside its primary
      artifact. Each manifest entry carries: decision_id, decision_type,
      tier (high | mid | low), grounding_source (upstream_path |
      kb_path | profile_slot | web_citation | none), recommendation,
      alternatives_considered, agent_reasoning_summary, and (after the
      orchestrator runs the surfacing flow) user_response (accept |
      override | orbit) plus user_response_detail. A skill that
      produces inferred decisions and writes no manifest is a
      structural violation.

  - id: C23
    rule: >
      Stage Checkpoints. Six stage checkpoints are mandatory, one
      after each stage's artifact is derived, in dependency order:
      systems-inventory → quality-profile → logical → physical →
      tech-stack → technical-risks. Each checkpoint produces a
      checkpoint artifact and waits for Tether / Vanish / Orbit. Orbit
      cycles back to the stage that produced the artifact. Stages 1
      and 2 may share a checkpoint if both completed before the user
      reviews.

  - id: C24
    rule: >
      Agent delegation. Domain work is delegated to agents. The
      orchestrator dispatches tech-architect for systems inventory,
      logical, physical, and tech-stack derivation; tech-designer for
      quality-profile refinement and technical-risks. Scriber is
      dispatched in the background for evidence, checkpoint, and
      status writes. The orchestrator never executes domain work
      inline.

  - id: C25
    rule: >
      User-Facing Voice. Every reply the play emits to the user —
      stage announcement, checkpoint prompt, summary, close report —
      leads in product / feature / capability / outcome language, not
      file paths, schema field names, or YAML keys. Machine-facing
      detail goes in an appendix or the underlying artifact, never in
      the lead. See standards/rules/user-facing-voice.md.

  - id: C26
    rule: >
      /arch produces NO code, NO test suites, NO implementation
      surfaces. It produces only the six handoff artifacts that
      /prepare reads to scope per-feature implementation plans. Any
      code, test, or implementation surface emitted by an agent during
      /arch is a structural violation.

failure_conditions:
  - id: F1
    condition: >
      The play completes with any of the six canonical artifact
      surfaces missing, empty, or carrying zero entries in their
      primary section (zero systems in inventory, zero components in
      logical, zero components in physical, zero entries in tech-stack,
      zero entries in technical-risks, zero entries in refined QP).

  - id: F2
    condition: >
      logical-architecture.yaml contains any product name, runtime,
      programming language, protocol, wire format, schema column, or
      library name. Logical must stay tech-agnostic.

  - id: F3
    condition: >
      Any logical component has no system_ref, no layer assignment, or
      no capability_ids[].

  - id: F4
    condition: >
      Any selected capability from scope.selected_capabilities has no
      logical component mapped to it, OR has no end-to-end path through
      layers from the user-facing entry layer to a component serving
      it.

  - id: F5
    condition: >
      The directed graph of logical components contains a cycle, OR
      the directed graph of physical components at runtime contains a
      synchronous cycle that no async boundary breaks.

  - id: F6
    condition: >
      Any physical component has no logical_ref, no layer, or no
      deployment_target, OR any deployment_target / resource / comm
      protocol / nfr_delivery mechanism is named by category instead
      of a specific product.

  - id: F7
    condition: >
      The logical → physical mapping has any N:1 collapse without a
      cited rationale, or any physical layer does not match its
      logical component's layer.

  - id: F8
    condition: >
      Any NFR target in the refined quality-profile.yaml has no
      mapped delivery mechanism in any physical-architecture.yaml
      component's nfr_delivery[].

  - id: F9
    condition: >
      Any tech-stack entry has category = pattern but cites no
      industry literature source, OR any system-level decision
      (monolith / microservice / serverless) lives outside tech-stack.

  - id: F10
    condition: >
      Any tech-stack entry has no scope, no category, no name, no
      source_type, or no rationale.

  - id: F11
    condition: >
      Any technical-risks entry has no risk_statement, no
      business_cost, or no mitigation. OR technical-risks.yaml was
      produced before any of Stages 1-5 completed.

  - id: F12
    condition: >
      The refined quality-profile.yaml has any delta versus the
      upstream specify quality-profile.yaml without a delta_log entry
      citing the architectural constraint that motivated the change.

  - id: F13
    condition: >
      Any decision in any artifact lacks a source_type field, OR any
      decision is tagged source_type = agent_default_unilateral, OR
      any decision overrides a project_profile_pin.

  - id: F14
    condition: >
      Any decision was committed to a single value when the KB offered
      more than one legitimate candidate AND project-profile did not
      pin the slot AND the user was not asked via grounding-questions
      or a checkpoint.

  - id: F15
    condition: >
      Any inferred decision is committed to an artifact without being
      surfaced to the user via the tier-appropriate flow defined in
      C19.

  - id: F16
    condition: >
      Any skill that produces inferred decisions completes without
      writing a decision-manifest-{skill}.yaml, or writes a manifest
      that omits the tier, grounding_source, recommendation, or
      alternatives_considered fields for any decision, or fails to
      update user_response after the surfacing flow.

  - id: F17
    condition: >
      Any of the six mandatory stage checkpoint artifacts is missing.

  - id: F18
    condition: >
      Any artifact is written outside the ADR 017 whitelist, OR any
      evidence file bypasses the scriber agent.

  - id: F19
    condition: >
      The play produces code, test suites, or implementation-level
      work products. /arch is design-shape only.

  - id: F20
    condition: >
      Stage order is violated — logical produced before systems
      inventory and refined QP both exist, physical produced before
      logical, tech-stack produced before logical and physical both
      exist, technical-risks produced before any of Stages 1-5
      complete, OR the refined QP gates Stages 1, 5, or 6.

  - id: F21
    condition: >
      The layer model is not established before Stage 3 begins, OR a
      component is committed to a layer not in the locked model, OR
      the layer model is changed after lock without explicit user
      approval at a checkpoint.

  - id: F22
    condition: >
      A system used as a component's system_ref is neither pulled
      from KB with a provenance header nor authored in product space
      with origin: stm_research and the required KB-extension
      sections.

  - id: F23
    condition: >
      Any logical component's system_ref (or system_ref + sub_system_ref
      pair) does not resolve to a system or sub-system entry in
      .garura/product/architecture/systems-inventory/, OR any physical
      component's system_ref (or system_ref + sub_system_ref pair)
      does not resolve to inventory. Components are SELECTED from
      inventory — invented components at logical-time or physical-time
      are a structural violation.

  - id: F24
    condition: >
      The play hard-halted on missing or DRAFT upstream /specify or
      /design artifacts instead of falling back to the C1 interactive
      question path. Previous commands are NOT hard gates on /arch —
      hard-halting violates the agentic-coding rule.
