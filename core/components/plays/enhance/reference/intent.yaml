intent: |
  Given an existing open issue describing an enhancement, gather context from
  the user via targeted Q&A, assemble a context package from LTM/KB/codebase,
  assess whether the scope is right-sized for this play (redirect to fix-it if
  too small, /prepare if too big), design an approach with tasks and
  self-evaluation criteria, implement autonomously, have a judge independently
  rate solution confidence, and ship via PR with full review. Two approval
  gates: a configurable mid-checkpoint after approach design (default OFF), and
  a mandatory PR checkpoint after review.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Issue & Branch
# ═══════════════════════════════════════════════════════════════════════════

constraints:
  - id: C1
    rule: >
      Must have an existing open issue. If no issue is resolvable from the
      branch name or arguments, hard halt immediately.

  - id: C2
    rule: >
      Must not run on main/master/default branch. Create
      enhance/{issue}-{slug} branch if needed.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Q&A Discovery
# ═══════════════════════════════════════════════════════════════════════════

  - id: C3
    rule: >
      Play must gather context from the user before design. Read the issue
      body first, then ask targeted questions to fill gaps: what to build,
      why, constraints, existing code involved, success criteria. Record all
      answers in STM at {stm_base}/{issue}/evidence/enhance/discovery.md.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Context Assembly
# ═══════════════════════════════════════════════════════════════════════════

  - id: C4
    rule: >
      Context assembly reads LTM (product_base architecture when present),
      KB (core memory knowledge relevant to the enhancement), and codebase
      (files mentioned in issue + Q&A). Writes context to
      {stm_base}/{issue}/context/. Context is the ONLY input to
      implementation — no spec pollution.

  - id: C5
    rule: >
      product_base resolution from .garura/core/config.yaml. If product
      LTM absent, context assembly uses core LTM only. Not a hard failure.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Scope Gate
# ═══════════════════════════════════════════════════════════════════════════

  - id: C6
    rule: >
      Scope assessment uses these guideposts (override with justification
      allowed):
        Files touched ≤3 single concern → recommend fix-it.
        Files 4-15 → enhance (continue).
        Files >15 or new module → recommend /prepare.
        Domains crossed: 1 → fix-it eligible, 1-2 → enhance, 3+ → /prepare.
        New abstractions: 0 → fix-it eligible, 0-2 → enhance,
          new bounded context → /prepare.
        Existing tests impacted: ≤5 → fix-it eligible, 6-30 → enhance,
          >30 → /prepare.
        Estimated effort: <1hr → fix-it, 1hr-1day → enhance, >1day → /prepare.
      When redirecting, present the assessment and recommendation to the
      user — do not silently halt.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Approach Design
# ═══════════════════════════════════════════════════════════════════════════

  - id: C7
    rule: >
      Approach design produces approach.yaml with: problem_statement,
      solution_summary, files_to_create, files_to_modify, connections
      (how new code integrates with existing), tasks (ordered
      implementation steps), evals (self-evaluation criteria with
      pass/fail conditions), risks (each risk entry must carry:
      description (string), mitigation (string), type
      (technical|business|architectural), action (eval-driven|approval-
      required|monitor-only), ltm_reference (string path or null),
      generated_evals (list, populated when action is eval-driven)),
      alternatives_considered (at least one with rejection reason).

  - id: C8
    rule: >
      Approach must include at least one alternative considered with
      reason it was rejected.

  - id: C19
    rule: >
      Risk Classification Constraint. Every risk in approach.yaml MUST
      carry: type (technical|business|architectural), action (eval-driven|
      approval-required|monitor-only), ltm_reference (string path or null),
      mitigation, description, and generated_evals (list). Type taxonomy:
      type:technical covers code/system-level risks; type:business covers
      process/outcome-level risks; type:architectural covers component
      boundary/design-decision-level risks. Action taxonomy: eval-driven —
      risk is covered by evals, generated_evals field is populated;
      approval-required — risk blocks implementation without human approval
      via focused C20 checkpoint; monitor-only — risk is documented with
      no blocking gate. LTM/KB grounding rule: tech-designer MUST search
      LTM before assigning type; if a relevant standard is found, set
      ltm_reference to the path; if not found, set ltm_reference to null.
      Eval-driven propagation: for each risk with action:eval-driven, all
      entries in generated_evals MUST be appended to the top-level evals
      list in approach.yaml at approach design time so C13 self-eval
      captures them. Backward compatibility: risks without explicit
      type/action in existing approach.yaml files produced before this
      constraint was active default to type:technical, action:monitor-only
      at runtime — this default applies only to historical files; any
      approach.yaml produced after this constraint is active MUST carry
      explicit type and action. Override: type and action may differ from
      defaults with justification documented in mitigation or ltm_reference.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Mid-Checkpoint
# ═══════════════════════════════════════════════════════════════════════════

  - id: C9
    rule: >
      Mid-checkpoint after approach design is configurable. Default OFF.
      When --approve-plan flag is passed, present approach for approval.
      When OFF, proceed directly to implementation.

  - id: C10
    rule: >
      When mid-checkpoint is ON and user Vanishes, halt — do not implement.

  - id: C20
    rule: >
      Auto-triggered Risk Checkpoint. When approach.yaml contains any risk
      with action:approval-required, a focused risk checkpoint MUST fire
      before implementation begins. This checkpoint is non-configurable —
      it fires regardless of the --approve-plan (C9) flag. The checkpoint
      displays ONLY the approval-required risks and their fields: type,
      description, mitigation, and ltm_reference. It does not display the
      full approach plan. User Tethers to proceed to implementation or
      Vanishes to halt and redesign the approach. Explicit orthogonality:
      C9 and C20 are independent gates; both can fire on the same run when
      --approve-plan is set AND approval-required risks are present — when
      both fire, C9 shows the full approach plan and C20 shows only the
      approval-required risks.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Implementation
# ═══════════════════════════════════════════════════════════════════════════

  - id: C11
    rule: >
      code-builder receives approach.yaml + context ONLY. Does not receive
      evals, judge reports, or feature specs. Context isolation preserved.

  - id: C12
    rule: >
      Fix loop maximum 3 iterations. After 3 iterations with failures,
      halt with structured failure report.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Self-Evaluation & Judge
# ═══════════════════════════════════════════════════════════════════════════

  - id: C13
    rule: >
      After implementation, run self-evaluation using evals from
      approach.yaml. Record results.

  - id: C14
    rule: >
      Judge independently rates solution confidence on 0-1 scale. Judge
      receives ONLY the codebase and approach.yaml — not builder prompts,
      not self-eval results.

  - id: C15
    rule: >
      If judge confidence < 0.6, play MUST pause and present findings to
      user for approval before proceeding to PR. This is non-configurable
      — always fires when confidence is low.

  - id: C21
    rule: >
      Step 10 (judge-rating) dispatch MUST include eval_path pointing to
      core/components/plays/enhance/reference/evals/solution-rating.yaml,
      artifact_paths.approach pointing to the issue's approach.yaml, and
      config.instructions with the following ask: "Rate enhancement solution
      against the supplied evals. Boundary is the approach.yaml plus
      project_root. For each ER-N eval, execute its verification procedure
      against the delivered work and record PASS/FAIL with evidence. Compute
      overall_confidence per ER-4: any blocker-classified concern →
      overall_confidence ≤ 0.55; else reflect quality across per-area
      assessments."

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — PR & Quality
# ═══════════════════════════════════════════════════════════════════════════

  - id: C16
    rule: >
      Quality gates (build, lint, typecheck, tests) must pass before PR
      creation.

  - id: C17
    rule: >
      PR checkpoint is ALWAYS presented. Surfaces: problem statement,
      solution summary, technical decisions, code changes, review findings
      from analyze-pr. User Tethers to merge or Vanishes to iterate.

  - id: C18
    rule: >
      After Tether at PR checkpoint, merge proceeds without further
      approval. Ship delegates to repo-orchestrator.

# ═══════════════════════════════════════════════════════════════════════════
# FAILURE CONDITIONS
# ═══════════════════════════════════════════════════════════════════════════

failure_conditions:
  - id: F1
    condition: >
      Implementation proceeds without PR checkpoint approval (Tether not
      received).

  - id: F2
    condition: >
      Judge confidence < 0.6 and play proceeds to PR without human
      approval.

  - id: F3
    condition: >
      Fix loop exhausted (3 iterations) with eval failures remaining.

  - id: F4
    condition: >
      Scope gate classifies enhancement as out-of-range but play continues
      instead of presenting recommendation and halting.

  - id: F5
    condition: >
      Context assembly skipped — implementation runs without
      {issue}/context/.

  - id: F6
    condition: >
      Q&A discovery skipped — approach design runs without user context.

  - id: F7
    condition: >
      PR created without quality checks (build/lint/typecheck/tests)
      passing.

  - id: F8
    condition: >
      Mid-checkpoint configured ON (--approve-plan) but skipped.

  - id: F9
    condition: >
      Approach design missing alternatives_considered or evals.

  - id: F10
    condition: >
      Judge receives builder prompts, self-eval results, or implementation
      rationale — context isolation violated.

  - id: F11
    condition: >
      One or more risks in approach.yaml have action:approval-required but
      the focused risk checkpoint (C20) was skipped and implementation
      proceeded. This is non-configurable — F11 fires regardless of the
      --approve-plan flag, unlike F8 which only applies when --approve-plan
      is set. F8 and F11 are distinct failure conditions and can both be
      violated on the same run.

# ═══════════════════════════════════════════════════════════════════════════
# SCENARIOS
# ═══════════════════════════════════════════════════════════════════════════

scenarios:
  - id: S1
    persona: "Developer enhancing a Meridian play"
    given: >
      An open issue describing a new skill to add to an existing play.
    then: >
      Q&A gathers what, why, constraints. Context assembled from LTM and
      codebase. Scope gate confirms right-sized. Approach designed with
      tasks and evals. Implemented, judge rates > 0.6. Quality passes.
      PR created, reviewed, approved, merged.

  - id: S2
    persona: "Developer with a large enhancement"
    given: >
      An open issue that touches 20+ files across 3 domains.
    then: >
      Scope gate detects out-of-range. Presents assessment showing files,
      domains, effort exceeding enhance thresholds. Recommends /prepare.
      User redirected — no implementation attempted.

  - id: S3
    persona: "Developer with a trivial fix"
    given: >
      An open issue that changes 2 lines in 1 file.
    then: >
      Scope gate detects too small. Recommends fix-it. User redirected.

  - id: S4
    persona: "Developer with a risky enhancement"
    given: >
      Judge rates confidence at 0.45 after implementation.
    then: >
      Play pauses. Presents judge findings: what's low-confidence, what
      evidence. User reviews, decides to iterate or approve. If iterate,
      fix loop runs. If approve, continues to PR.

  - id: S5
    persona: "Developer using --approve-plan"
    given: >
      Mid-checkpoint is ON.
    then: >
      After approach design, plan is presented with tasks, files, evals,
      risks. User Tethers to proceed to implementation or Vanishes to
      redesign.

  - id: S6
    persona: "Developer reviewing PR"
    given: >
      PR checkpoint fires with full review.
    then: >
      Sees: problem statement, solution summary, all files changed with
      rationale, tech decisions, review findings from analyze-pr. Can
      Tether to merge or Vanish to request changes.

  - id: S7
    persona: "Developer with eval failures"
    given: >
      Self-evaluation finds 2 of 5 evals failing after implementation.
    then: >
      Fix loop iterates: builder reads remediation, fixes issues,
      re-evaluates. After max 3 iterations, if still failing, structured
      failure report presented.

  - id: S8
    persona: "Developer with an architectural risk flagged approval-required"
    given: >
      approach.yaml contains a risk with type:architectural and
      action:approval-required, and --approve-plan is NOT set.
    then: >
      A focused risk checkpoint fires automatically before implementation.
      The checkpoint displays only the approval-required risk(s) — showing
      type, description, mitigation, and ltm_reference. User Tethers to
      proceed to implementation or Vanishes to halt and redesign the
      approach. The full approach plan is not displayed at this checkpoint —
      S8 is distinct from S5 (--approve-plan full plan review): S5 is
      user-requested and shows the complete plan; S8 is play-auto-triggered
      and shows only approval-required risks. If the user Tethers,
      implementation proceeds. If the user Vanishes, the play halts and the
      user must redesign the approach before re-running enhance.
