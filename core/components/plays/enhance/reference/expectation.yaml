# Expectation for the enhance play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: enhance

generated_from:
  intent: core/components/plays/enhance/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# Lifted verbatim from the legacy intent scenarios (persona/given/then); each gains
# an observable, binary `measure`.
success_scenarios:
  - id: S1
    persona: "Developer enhancing a Garura play"
    given: >
      An open issue describing a new skill to add to an existing play.
    then: >
      Q&A gathers what, why, constraints. Context assembled from LTM and
      codebase. Scope gate confirms right-sized. Approach designed with
      tasks and evals. Implemented, judge rates > 0.6. Quality passes.
      PR created, reviewed, approved, merged.
    measure: >
      The full STM evidence chain exists for the issue — issue-read.yaml (state=open),
      discovery.md, understanding.md, approach.yaml (all nine fields), build-report.yaml,
      verification-report.yaml (every eval PASS), judge-report.yaml (confidence >= 0.6),
      quality-report.yaml (build/lint/typecheck/tests all PASS), pr-result.yaml (PR URL +
      issue link), ship-result.yaml (merge SHA, branch deleted=true) — with no scope
      redirect recorded.
  - id: S2
    persona: "Developer with a large enhancement"
    given: >
      An open issue that touches 20+ files across 3 domains.
    then: >
      Scope gate detects out-of-range. Presents assessment showing files,
      domains, effort exceeding enhance thresholds. Recommends /prepare.
      User redirected — no implementation attempted.
    measure: >
      The scope assessment table was presented with at least one out-of-range signal
      (files > 15 OR domains >= 3 OR effort > 1 day) and a /prepare recommendation; no
      approach.yaml, build-report.yaml, or PR exists for the issue — the play halted after
      the scope gate.
  - id: S3
    persona: "Developer with a trivial fix"
    given: >
      An open issue that changes 2 lines in 1 file.
    then: >
      Scope gate detects too small. Recommends fix-it. User redirected.
    measure: >
      The scope assessment table was presented with all signals in the too-small range
      (files <= 3, single concern, effort < 1 hour) and a fix-it recommendation; no
      approach.yaml exists, no implementation was attempted, and no PR was opened — the
      play halted after the scope gate.
  - id: S4
    persona: "Developer with a risky enhancement"
    given: >
      Judge rates confidence at 0.45 after implementation.
    then: >
      Play pauses. Presents judge findings: what's low-confidence, what
      evidence. User reviews, decides to iterate or approve. If iterate,
      fix loop runs. If approve, continues to PR.
    measure: >
      judge-report.yaml records confidence < 0.6 and a human approval checkpoint was
      presented before quality-check or PR — showing the score, per-area findings, and
      low-confidence areas; on Vanish no PR was created and quality-check did not run, on
      Tether continuation was recorded in STM before quality-check.
  - id: S5
    persona: "Developer using --approve-plan"
    given: >
      Mid-checkpoint is ON.
    then: >
      After approach design, plan is presented with tasks, files, evals,
      risks. User Tethers to proceed to implementation or Vanishes to
      redesign.
    measure: >
      With --approve-plan set, a mid-checkpoint was presented after approach.yaml was
      written and before implementation, showing problem statement, solution summary,
      files to create/modify, numbered tasks, eval pass/fail criteria, risks, and
      alternatives with rejection reasons; build-report.yaml exists only if the user
      Tethered and is absent if the user Vanished.
  - id: S6
    persona: "Developer reviewing PR"
    given: >
      PR checkpoint fires with full review.
    then: >
      Sees: problem statement, solution summary, all files changed with
      rationale, tech decisions, review findings from analyze-pr. Can
      Tether to merge or Vanish to request changes.
    measure: >
      The PR checkpoint was presented with all six sections non-empty — problem
      statement, solution summary, technical decisions (risks + alternatives), files
      changed with rationale, review findings from analyze-pr, and judge confidence —
      plus the PR URL; ship-result.yaml was written only after a Tether response.
  - id: S7
    persona: "Developer with eval failures"
    given: >
      Tester reports 2 of 5 evals failing in verification-report.yaml.
    then: >
      Tester writes verification-report.yaml showing 2 of 5 evals FAIL. Fix
      loop iterates: orchestrator derives remediation-{N}.md from failing eval
      IDs, re-dispatches implementer with impl-context.md + understanding.md +
      remediation-{N}.md. After max 3 iterations, if tester still reports
      failures, structured failure report presented.
    measure: >
      verification-report.yaml records >= 1 FAIL on first pass and an iteration count
      <= 3; for each iteration a remediation-{N}.md was derived from failing eval IDs and
      the implementer was re-dispatched with impl-context.md + understanding.md +
      remediation-{N}.md only; if all PASS before iteration 3 judge-rating ran, otherwise a
      structured failure report listing each failing eval was presented and judge-rating
      did not run.
  - id: S8
    persona: "Developer with an architectural risk flagged approval-required"
    given: >
      approach.yaml contains a risk with type:architectural and
      action:approval-required, and --approve-plan is NOT set.
    then: >
      A focused risk checkpoint fires automatically before implementation.
      The checkpoint displays only the approval-required risk(s) — showing
      type, description, mitigation, and ltm_reference. User Tethers to
      proceed to implementation or Vanishes to halt and redesign the
      approach. The full approach plan is not displayed at this checkpoint —
      S8 is distinct from S5 (--approve-plan full plan review): S5 is
      user-requested and shows the complete plan; S8 is play-auto-triggered
      and shows only approval-required risks. If the user Tethers,
      implementation proceeds. If the user Vanishes, the play halts and the
      user must redesign the approach before re-running enhance.
    measure: >
      With an approval-required risk in approach.yaml and --approve-plan NOT set, a
      focused risk checkpoint fired before implementation showing ONLY the
      approval-required risks (type, description, mitigation, ltm_reference) and NOT the
      full approach plan; on Tether implementation proceeded (build-report.yaml exists),
      on Vanish the play halted (no build-report.yaml).
  - id: S9
    persona: "Developer who wants to browse issues before enhancing"
    given: >
      Developer invokes the play with no issue argument and is not on a
      branch whose name yields an issue number — there is no resolvable
      issue at invocation time.
    then: >
      Play queries the project's open issues for enhancement candidates
      (open state, no assignee, label "enhancement" or no label),
      sorted by most-recently-updated, capped at 5. Candidates are
      presented as a numbered list with issue number, title, and
      last-updated date. The developer picks one by number; the selected
      issue is confirmed open and the play proceeds normally from that
      point — Q&A discovery, context assembly, scope gate, approach
      design, implementation, verification, judge rating, and PR
      checkpoint all run as in S1. If the developer types "none" or
      zero candidates were returned, the play hard halts with a clear
      message and no enhance-stage artifacts are produced.
    measure: >
      With no --issue arg and no branch-resolvable issue, discovery-result.yaml lists
      candidates filtered to (state=open, no assignee, label=enhancement OR no-label),
      sorted updated_desc, capped at 5, presented numbered with number/title/updated_at;
      EITHER a numeric pick re-validated the issue as open and produced the full S1
      evidence chain, OR a 'none' response or candidate_count==0 recorded a halt_reason
      and produced no enhance-stage artifacts for any unselected issue.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # implementation proceeded without PR checkpoint Tether
    trigger: >
      Implementation or merge proceeded without a Tether recorded at the PR checkpoint —
      the checkpoint approval is absent.
    direction: >
      Nothing past the PR checkpoint may proceed without an explicit Tether; the merge
      authorization is a user decision that must be obtained before anything ships — get
      the user's go/no-go at the checkpoint.
    handoff: human
    derivable_at_l4: false
  - id: REC2
    for_failure: F2                 # judge < 0.6 proceeded to PR without approval
    trigger: >
      judge-report.yaml records confidence below 0.6 and the play advanced toward PR
      without a recorded human approval.
    direction: >
      A below-threshold judge confidence must pause for explicit human approval before
      PR; the low-confidence findings need a user go/no-go that the builder cannot grant.
    handoff: human
    derivable_at_l4: false
  - id: REC3
    for_failure: F3                 # fix loop exhausted with eval failures remaining
    trigger: >
      The fix loop reached 3 iterations and verification-report.yaml still records one or
      more failing evals.
    direction: >
      A persistently failing enhancement must stop and hand back rather than ship; after
      the bounded fix loop, the remaining failures need a human to decide how to proceed —
      redesign, narrow scope, or abandon.
    handoff: human
    derivable_at_l4: false
  - id: REC4
    for_failure: F4                 # scope out-of-range but play continued
    trigger: >
      The scope assessment placed the enhancement out of enhance range (files > 15,
      domains >= 3, effort > 1 day, or a new bounded context) yet the play continued to
      design or implementation.
    direction: >
      An out-of-range scope must halt with the assessment table and the fix-it or /prepare
      recommendation surfaced — present the recommendation and stop before any approach or
      implementation work.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # context assembly skipped before implementation
    trigger: >
      Implementation ran with the issue's context/ directory unpopulated — no
      understanding.md was assembled.
    direction: >
      Implementation must be preceded by a populated context package; assemble context
      (LTM/KB/codebase) into context/understanding.md before any implementation runs.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC6
    for_failure: F6                 # Q&A discovery skipped before approach design
    trigger: >
      Approach design ran without discovery.md — the user Q&A capturing what/why/
      constraints/success was never recorded.
    direction: >
      Approach design must be preceded by user Q&A; ask the user the targeted what/why/
      constraints/success questions and record the answers before any approach is designed.
    handoff: human
    derivable_at_l4: false
  - id: REC7
    for_failure: F7                 # PR created without quality checks passing
    trigger: >
      A PR was created while quality-report.yaml does not record build, lint, typecheck,
      and tests all PASS.
    direction: >
      A PR may only be created after all quality gates pass; run build/lint/typecheck/
      tests and confirm all PASS before any PR is opened.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8                 # mid-checkpoint configured ON but skipped
    trigger: >
      --approve-plan was set yet the mid-checkpoint after approach design was not
      presented and implementation proceeded.
    direction: >
      When the mid-checkpoint is configured ON it must be presented before implementation;
      surface the full approach plan and obtain the user's Tether/Vanish before proceeding.
    handoff: human
    derivable_at_l4: false
  - id: REC9
    for_failure: F9                 # approach missing alternatives_considered or evals
    trigger: >
      approach.yaml is missing a non-empty alternatives_considered list or a non-empty
      evals list.
    direction: >
      Every approach must carry at least one alternative with a rejection reason and at
      least one eval with pass/fail criteria; regenerate the missing field into
      approach.yaml.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC10
    for_failure: F10                # judge context contaminated
    trigger: >
      The judge dispatch carried builder prompts, verification-report.yaml,
      build-report.yaml, or implementation rationale — beyond approach.yaml and the
      project codebase.
    direction: >
      The judge must see only approach.yaml plus the project codebase and the static eval
      file; strip the contaminating inputs from the contract and re-dispatch the judge
      clean.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC11
    for_failure: F11                # approval-required risk but risk checkpoint skipped
    trigger: >
      approach.yaml contains a risk with action:approval-required yet the focused risk
      checkpoint was not presented and implementation proceeded.
    direction: >
      An approval-required risk must trigger the focused risk checkpoint before
      implementation regardless of --approve-plan; present the approval-required risks and
      obtain the user's Tether/Vanish before proceeding.
    handoff: human
    derivable_at_l4: false
  - id: REC12
    for_failure: F12                # implementer context contaminated
    trigger: >
      The implementer dispatch carried test-context.md, evals, or approach.yaml — beyond
      impl-context.md and understanding.md.
    direction: >
      The implementer must see only impl-context.md and understanding.md (plus
      remediation-{N}.md in the fix loop); strip the tester/eval/approach inputs from the
      contract and re-dispatch the implementer clean.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC13
    for_failure: F13                # tester context contaminated
    trigger: >
      The tester dispatch carried impl-context.md, understanding.md, build-report.yaml, or
      any implementer output — beyond test-context.md.
    direction: >
      The tester must see only test-context.md; strip the implementer artifacts from the
      contract and re-dispatch the tester clean.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC14
    for_failure: F14                # fix loop gated on builder self-report not tester verdict
    trigger: >
      The fix-loop branching decision was taken from build-report.yaml or implementer
      self-report rather than the tester verdict in verification-report.yaml.
    direction: >
      The fix loop must gate only on the tester verdict; read PASS/FAIL from
      verification-report.yaml and never branch on builder self-report.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC15
    for_failure: F15                # discovery returned zero candidates but play proceeded
    trigger: >
      Issue discovery (C1 Path B) returned zero candidates yet the play produced
      enhance-stage artifacts instead of hard halting.
    direction: >
      When discovery returns zero candidates the play must hard halt with the no-issue
      message and produce no enhance-stage artifacts; stop before Q&A, context, design, or
      implementation.
    handoff: autonomous
    derivable_at_l4: true
