# Expectation for the ship play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: ship

generated_from:
  intent: core/components/plays/ship/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Developer
    given: >
      The main branch after ship completes
    then: >
      Can verify all feature work is in main's history, the feature
      branch is gone, and main is current with remote — ready to
      start the next feature immediately.
    measure: >
      After completion, local HEAD is on main, the local main branch is level with
      its remote (0 commits behind origin), the feature branch is absent from both
      `git branch` and `git branch -r`, and the feature commits are reachable from
      main's tip.
  - id: S2
    persona: Code Reviewer
    given: >
      The merged pull request on the git platform
    then: >
      Can trace the shipped work back to its originating issue,
      review the quality checklist and evidence, and confirm the
      merge landed on main.
    measure: >
      The platform reports the PR state as merged, the PR body links the originating
      issue and carries the quality checklist, and the merge commit for that PR is
      reachable from main's tip.
  - id: S3
    persona: Code Reviewer
    given: >
      A pull request immediately before merge with review-pr.bypass
      set to false
    then: >
      Can see the review-pr quality gate outcome on the PR — findings
      grouped by P1/P2/P3, the confidence score, and the selected
      reviewers — as a structured comment posted by review-pr.
    measure: >
      When the run executed with review-pr.bypass == false, the PR carries a
      review-pr structured comment containing P1/P2/P3 finding sections, a numeric
      confidence score, and the selected reviewers. (Not applicable when bypass was
      true.)
  - id: S4
    persona: Developer
    given: >
      ship completes on a non-trivial PR for an issue that had a prior
      enhance or fix-it run, with STM evidence available in the issue's
      evidence directory
    then: >
      Learning proposals are staged at
      {stm_base}/{issue}/evidence/distill/proposals.yaml.
      The ship evidence file records the Mode 1 outcome (completed with
      proposals_path, or completed with no_learnings, or skipped with reason).
      Product LTM is unchanged — no artifact under {product_base} is
      modified during ship.
    measure: >
      The ship evidence file records a distill outcome (completed with proposals_path,
      completed with no_learnings, or skipped with reason); when the PR was non-trivial
      with STM evidence available, proposals_path is non-null; and no file under
      {product_base} was created or modified during the ship run.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # feature branch still exists after pipeline
    trigger: >
      After the pipeline completes, the feature branch still exists locally or on the
      remote.
    direction: >
      The feature branch must be absent from both local and remote after the merge;
      delete the lingering branch, treating an already-deleted remote as success.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2                 # merge conflicts between feature branch and main
    trigger: >
      Merge conflicts exist between the feature branch and main (conflict markers
      present, or the platform reports the PR as conflicting).
    direction: >
      A merge must only proceed on a conflict-free PR; never auto-resolve — the
      conflicted state needs a user decision to resolve or decline before anything
      lands on main.
    handoff: human
    derivable_at_l4: false
  - id: REC3
    for_failure: F3                 # not on main / main behind remote
    trigger: >
      After completion, the local checkout is not on main, or the local main branch
      is behind the remote main branch.
    direction: >
      The run must end on main up to date with its remote; checkout main and
      fast-forward it to match the remote.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC4
    for_failure: F4                 # commit references wrong issue / no issue ref
    trigger: >
      A commit produced during the pipeline references the wrong issue or has no issue
      reference at all.
    direction: >
      Every commit must reference the correct originating issue; reconcile the commit
      to its true issue — the right issue mapping is external knowledge the builder
      cannot determine on its own.
    handoff: human
    derivable_at_l4: false
  - id: REC5
    for_failure: F5                 # PR has no linked issue / wrong target branch
    trigger: >
      The pull request has no linked issue, or it targets the wrong base branch.
    direction: >
      The PR must link its originating issue and target the correct base branch;
      reconcile the linkage and target — both require knowing the intended issue and
      base, which is external judgment the builder lacks.
    handoff: human
    derivable_at_l4: false
  - id: REC6
    for_failure: F6                 # uncommitted work remains at merge attempt
    trigger: >
      Uncommitted work remains on the feature branch at the point the merge is
      attempted.
    direction: >
      All work must be committed before the merge is attempted; the leftover
      uncommitted state needs a user go/no-go on how to reconcile it before any merge
      proceeds — the builder cannot make that call.
    handoff: human
    derivable_at_l4: false
  - id: REC7
    for_failure: F7                 # merged despite review-pr block/escalate
    trigger: >
      A merge was completed while review-pr.bypass was false and review-pr returned a
      P1 finding or sub-threshold confidence (routing == block or escalate).
    direction: >
      When the quality gate blocks or escalates, the pipeline must halt before merge;
      a merge past a blocking gate is an outward-facing override that needs a human
      go-ahead — it cannot be granted by the builder.
    handoff: human
    derivable_at_l4: false
  - id: REC8
    for_failure: F8                 # sub-play evidence files remain untracked
    trigger: >
      After ship completes, sub-play evidence files written during the pipeline remain
      untracked in the working tree.
    direction: >
      All sub-play evidence files written during the run must be committed; sweep the
      untracked evidence paths and commit them alongside ship's own evidence.
    handoff: autonomous
    derivable_at_l4: true
