intent: >
  Deliver all uncommitted work on the current feature branch to the main
  branch in a single automated pipeline: commit all changes, create and
  submit a pull request, optionally run the review-pr quality gate, merge
  the PR, switch to main, pull latest, and delete the feature branch
  (local and remote). Auto-proceeds end-to-end unless the review-pr
  quality gate blocks. When review-pr.bypass is false in .meridian/core/config.yaml,
  review-pr runs between create-pr and merge-pr; a P1 finding or
  sub-threshold confidence halts the pipeline before merge. Set
  review-pr.bypass to true to preserve the unconditional auto-proceed
  behavior. The end state is: local checkout on main, main up to date
  with remote, feature branch gone, and all work reachable from main's
  history.

constraints:
  - id: C1
    rule: >
      Must not run when the current branch is main, master, or the
      repository's default branch.
  - id: C2
    rule: >
      All chained operations execute without human approval gates,
      EXCEPT the review-pr quality gate when review-pr.bypass is false
      in .meridian/core/config.yaml. When bypass is true, the pipeline auto-proceeds
      end-to-end at every step.
  - id: C3
    rule: >
      Merge strategy uses the repository's configured default. No
      override to squash, rebase, or any specific strategy.
  - id: C4
    rule: >
      If the local main branch is behind the remote, it must be
      updated from remote before any merge occurs.
  - id: C5
    rule: >
      The feature branch (local and remote) must be deleted after
      the merge is confirmed on main.
  - id: C6
    rule: >
      Merge conflicts are never auto-resolved. Any conflict is a
      hard stop.
  - id: C7
    rule: >
      When review-pr.bypass is false, review-pr MUST run after
      create-pr and before merge-pr, and its block or escalate
      verdict MUST halt the ship pipeline before merge-pr.

failure_conditions:
  - id: F1
    condition: >
      The pipeline completes but the feature branch (local or remote)
      still exists.
  - id: F2
    condition: >
      Merge conflicts exist between the feature branch and main.
  - id: F3
    condition: >
      After completion, the local checkout is not on main or main
      is not up to date with the remote.
  - id: F4
    condition: >
      Any commit produced during the pipeline references the wrong
      issue or has no issue reference.
  - id: F5
    condition: >
      The pull request has no linked issue or targets the wrong branch.
  - id: F6
    condition: >
      Uncommitted work remains on the feature branch at the point
      the merge is attempted.
  - id: F7
    condition: >
      Ship completed a merge while review-pr.bypass was false and
      review-pr returned a P1 finding or sub-threshold confidence
      (routing == block or escalate).

scenarios:
  - id: S1
    persona: Developer
    given: >
      The main branch after ship completes
    then: >
      Can verify all feature work is in main's history, the feature
      branch is gone, and main is current with remote — ready to
      start the next feature immediately.
  - id: S2
    persona: Code Reviewer
    given: >
      The merged pull request on the git platform
    then: >
      Can trace the shipped work back to its originating issue,
      review the quality checklist and evidence, and confirm the
      merge landed on main.
  - id: S3
    persona: Code Reviewer
    given: >
      A pull request immediately before merge with review-pr.bypass
      set to false
    then: >
      Can see the review-pr quality gate outcome on the PR — findings
      grouped by P1/P2/P3, the confidence score, and the selected
      reviewers — as a structured comment posted by review-pr.
