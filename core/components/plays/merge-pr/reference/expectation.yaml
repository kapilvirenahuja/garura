# Expectation for the merge-pr play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: merge-pr

generated_from:
  intent: core/components/plays/merge-pr/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Developer
    given: >
      The terminal state after merge-pr completes — local repository and platform PR status.
    then: >
      Can immediately begin a new feature branch from an up-to-date base branch,
      with no stale feature branch lingering locally or on the remote.
    measure: >
      After completion, local HEAD is on the base branch, the local base branch is level
      with its remote (0 commits behind origin), and the feature branch is absent from
      both `git branch` and `git branch -r`.
  - id: S2
    persona: Code Reviewer
    given: >
      The platform pull request page and the base branch commit history.
    then: >
      Can confirm the PR is reflected as merged on the platform and the merge commit is
      present on the base branch.
    measure: >
      The platform reports the PR state as merged, and the merge commit produced for that
      PR is reachable from the base branch tip.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # conflicted merge landed on base
    trigger: >
      The base branch contains merge conflict markers, or the platform shows the PR was
      merged while conflicts were present on the source branch.
    direction: >
      A merge must only land on a conflict-free PR; do not merge while conflicts are
      present — the conflicted state needs a user decision to resolve or decline before
      anything lands on base.
    handoff: human
    derivable_at_l4: false
  - id: REC2
    for_failure: F2                 # feature branch lingers after merge
    trigger: >
      After completion, the feature branch still exists locally or on the remote, and the
      remote branch was not already removed by the platform before the deletion step.
    direction: >
      The feature branch must be absent from both local and remote after the merge; delete
      the lingering branch, treating an already-deleted remote as success.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC3
    for_failure: F3                 # not on base / base behind remote
    trigger: >
      After completion, the local checkout is not on the base branch, or the local base
      branch is behind the remote base branch.
    direction: >
      The run must end on the base branch up to date with its remote; checkout the base
      branch and fast-forward it to match the remote.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC4
    for_failure: F4                 # merged despite a dirty tree at start
    trigger: >
      After completion, the PR is merged on the platform but the working tree or index had
      uncommitted or staged changes that were present before the operation started.
    direction: >
      The tree must be clean before any operation begins; this pre-condition violation
      should have halted before the merge, and the uncommitted state now needs a user
      go/no-go on how to reconcile it — the builder cannot make that call.
    handoff: human
    derivable_at_l4: false
  - id: REC5
    for_failure: F5                 # merge with no corresponding merged PR
    trigger: >
      After completion, a merge was performed but no corresponding merged PR exists on the
      platform for the feature branch.
    direction: >
      Every merge must correspond to a merged PR on the platform; reconcile the mismatch
      against the platform's record of truth — locate/confirm the merged PR or treat the
      local merge as invalid.
    handoff: human
    derivable_at_l4: false
