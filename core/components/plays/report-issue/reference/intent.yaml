intent: >
  Allow any caller — human or agent — to report a defect against Meridian OS
  by providing structured input. File the defect as a GitHub Issue on the
  Meridian repository. If GitHub is unreachable or unauthorized, produce a
  portable local defect file the caller can share manually.

constraints:
  - id: C1
    rule: >
      Every defect report MUST contain all required fields: Severity,
      Affected component, Reported from, Problem, Expected behavior, Impact.
  - id: C2
    rule: >
      Severity MUST be one of: Critical, High, Medium, Low.
  - id: C3
    rule: >
      The target repository is kapilvirenahuja/meridian-os. Issues are
      filed via the gh CLI.
  - id: C4
    rule: >
      The date field MUST be auto-generated as the current date (YYYY-MM-DD),
      never caller-provided.
  - id: C5
    rule: >
      The GitHub Issue body MUST use a structured markdown format — severity
      and metadata as a front table, problem/evidence/expected/impact as
      labeled sections.
  - id: C6
    rule: >
      Optional fields (Evidence, Root cause, Specific issues) MUST be
      included only when the caller provides them. They MUST NOT appear
      as empty sections.
  - id: C7
    rule: >
      If gh CLI access fails (auth, network, repo permissions), the play
      MUST NOT silently succeed. It MUST create a local markdown defect
      file and tell the caller exactly what failed and how to share the
      file manually (email, Slack, paste into a GitHub issue).
  - id: C8
    rule: >
      The GitHub Issue title MUST follow the pattern:
      [DEF][Severity] Short problem description.
  - id: C9
    rule: >
      The play MUST apply the label "defect" to the created GitHub Issue.
      If the label does not exist, create it.

failure_conditions:
  - id: F1
    condition: >
      A defect is filed with one or more required fields missing.
  - id: F2
    condition: >
      A defect is filed with a severity value outside the allowed set.
  - id: F3
    condition: >
      GitHub access fails and the play produces no output — neither
      an issue nor a local fallback file.
  - id: F4
    condition: >
      GitHub access fails and the play does not tell the caller what
      went wrong and how to share the fallback file.
  - id: F5
    condition: >
      The play silently succeeds without confirming the issue URL or
      the fallback file path to the caller.

scenarios:
  - id: S1
    persona: Play consumer (agent in another project)
    given: >
      An agent in the Phoenix project discovers that a Meridian play
      hardcodes paths and wants to report a defect with all required
      fields plus optional Evidence and Root cause sections.
    then: >
      A GitHub Issue is created on kapilvirenahuja/meridian-os with the
      defect label, structured body containing all provided fields, and
      the issue URL is returned to the caller.
  - id: S2
    persona: Human developer
    given: >
      A developer wants to report a low-severity defect with only the
      required fields — no Evidence, no Root cause, no Specific issues.
    then: >
      A GitHub Issue is created with only the required field sections
      in the body. No empty optional sections appear. The issue URL is
      returned.
  - id: S3
    persona: Play consumer (agent)
    given: >
      An agent attempts to report a defect but provides an invalid
      severity value ("Urgent" instead of Critical/High/Medium/Low).
    then: >
      The play rejects the report with a clear error identifying the
      invalid severity value and the allowed values. No issue is created
      and no fallback file is produced.
  - id: S4
    persona: Play consumer (agent)
    given: >
      An agent attempts to report a defect but omits the "Expected
      behavior" required field.
    then: >
      The play rejects the report with a clear error identifying the
      missing required field. No issue is created and no fallback file
      is produced.
  - id: S5
    persona: Human developer
    given: >
      The developer's gh CLI is not authenticated or the network is
      down when they attempt to report a defect with valid fields.
    then: >
      The play creates a local markdown file with the full defect
      content, tells the caller exactly what failed (auth/network),
      and provides the file path with instructions to share it
      manually (email, paste into GitHub issue, Slack).
