name: refactor

generated_from:
  intent: core/components/plays/refactor/reference/intent.yaml

vetted:
  status: approved
  approved_by: human (create-play checkpoint, #376)
  approved_at: "2026-05-25"

success_scenarios:
  - id: S1
    persona: Developer
    given: >
      The git history of a refactor session targeting a specified module,
      with a clean working tree and a green test suite at the start.
    then: >
      Can review a sequence of small `refactor:` (and possibly `test:`)
      commits, each of which can be checked out independently and runs
      green, and can confidently revert any single commit without
      breaking the build.
    measure: >
      Every commit on the produced history is prefixed `refactor:` or
      `test:`; checking out each commit individually and running the test
      suite returns green; reverting any single commit leaves the
      remaining history green.
  - id: S2
    persona: Tech Lead
    given: >
      The final report produced by the refactor play.
    then: >
      Can verify behaviour preservation at a glance — baseline vs final
      test counts and runtime, a public-API diff that is empty or matches
      the authorised list, and an explicit list of what did NOT change —
      without having to re-derive any of it from the diff.
    measure: >
      The report states baseline and final test counts and runtimes, shows
      a public-API diff that is empty or exactly the authorised list, and
      carries an explicit "what did not change" section; none of these
      requires reading the diff to obtain.
  - id: S3
    persona: Reviewer of the resulting pull request
    given: >
      The diff and commit log produced by the play.
    then: >
      Can confirm that every commit is a single refactor move with a
      conventional prefix, no test was deleted or weakened, no new
      dependency was added, and any deferred work appears in FOLLOWUPS.md
      rather than being smuggled into the diff.
    measure: >
      Each commit's diff contains exactly one refactor move with a
      `refactor:`/`test:`/`fix:` prefix; no test file is deleted, skipped,
      or weakened across the diff; no dependency manifest gains an entry;
      every out-of-scope item is present in FOLLOWUPS.md and absent from
      the diff.
  - id: S4
    persona: Developer
    given: >
      A target scope where the existing test suite was already failing
      before the play was invoked.
    then: >
      Receives an immediate halt with a clear report that refactoring on
      red is forbidden, and no commits have been made to the branch.
    measure: >
      The play output is a halt that names the red baseline as the reason;
      the branch has zero new commits relative to its state before the
      play was invoked.
  - id: S5
    persona: Developer
    given: >
      A target scope with thin test coverage and a stated refactor goal.
    then: >
      Receives, before any structural change, a `test:` commit (or
      commits) introducing characterization tests that pin the current
      behaviour, so the subsequent refactor commits are protected by an
      explicit safety net.
    measure: >
      At least one `test:` commit introducing characterization tests
      appears in the history strictly before the first `refactor:` commit,
      and those tests are green at the point they are committed.
  - id: S6
    persona: Product Owner
    given: >
      The deployed application after the refactor branch has been merged.
    then: >
      Observes no change in features, no change in API contracts, no
      change in user-facing behaviour, and no change in upstream/
      downstream integrations.
    measure: >
      Post-merge, the feature set, API contracts, user-facing behaviour,
      and upstream/downstream integrations are identical to pre-merge;
      the report's "what did not change" section asserts this and the
      empty/authorised public-API diff corroborates it.

recovery:
  - id: REC1
    for_failure: F1
    trigger: >
      At least one commit on the produced history leaves the test suite
      red.
    direction: >
      Every commit must leave the suite green on its own; revert the
      offending refactor move and re-do it so the commit it lands in is
      green before the history is presented.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2
    trigger: >
      The public API surface differs from the baseline in ways not
      covered by an explicit user authorisation.
    direction: >
      The public surface must match the baseline unless authorised; the
      unauthorised change needs a user decision to either authorise it or
      revert it — the builder cannot grant that authorisation.
    handoff: human
    derivable_at_l4: false
  - id: REC3
    for_failure: F3
    trigger: >
      A test that was green at baseline is missing, skipped, or weakened
      in the final state.
    direction: >
      Every baseline-green test must remain present and unweakened;
      restore the test to its baseline strength and revert any refactor
      move that depended on weakening it.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC4
    for_failure: F4
    trigger: >
      At least one commit mixes a behaviour change (feature, bug fix,
      dependency change) with refactor work.
    direction: >
      Refactor and behaviour changes must live in separate commits; split
      the mixed commit so the refactor part stands alone and the behaviour
      part is removed or queued as a separate `fix:` commit.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5
    trigger: >
      The final test count is lower than the baseline test count.
    direction: >
      The final test count must equal or exceed the baseline; restore any
      dropped tests so the count is at or above baseline.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC6
    for_failure: F6
    trigger: >
      Commits are not atomic single refactor moves, or commit messages
      are not prefixed `refactor:`, `test:`, or `fix:` as appropriate.
    direction: >
      Each commit must be one atomic move with the correct conventional
      prefix; re-split multi-move commits and re-message them so every
      commit is atomic and correctly prefixed.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7
    trigger: >
      The target scope had thin coverage at start and no characterization
      tests were committed before the first refactor commit.
    direction: >
      Thin-coverage scope must be pinned by characterization tests before
      the first refactor; author and commit those `test:` commits and
      re-sequence them ahead of the first `refactor:` commit.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8
    trigger: >
      A new dependency, framework, or pattern was introduced without
      explicit user authorisation.
    direction: >
      No new dependency, framework, or pattern without authorisation; the
      introduction needs a user decision to authorise it or be removed —
      the builder cannot grant that authorisation.
    handoff: human
    derivable_at_l4: false
  - id: REC9
    for_failure: F9
    trigger: >
      Out-of-scope edits appear in the diff instead of being deferred to
      FOLLOWUPS.md.
    direction: >
      Out-of-scope edits must live in FOLLOWUPS.md, not the diff; remove
      the out-of-scope edits from the diff and record them as entries in
      FOLLOWUPS.md.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC10
    for_failure: F10
    trigger: >
      The play began executing refactor commits without first reporting
      the baseline test result, the blast-radius map, and a 3-to-7-step
      plan (or a Mikado prerequisite graph) to the user.
    direction: >
      Baseline result, blast-radius map, and the plan must be reported
      before any edit; produce and present the missing pre-edit report
      before continuing execution.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC11
    for_failure: F11
    trigger: >
      The play executed refactor commits despite a red baseline test
      suite or an unclean working tree at start.
    direction: >
      Execution must start only from a green baseline and a clean tree;
      the unsafe start needs a user decision to clean the tree or accept
      the state before any execution — the builder cannot make that
      go/no-go call.
    handoff: human
    derivable_at_l4: false
  - id: REC12
    for_failure: F12
    trigger: >
      The final report omits any of: baseline metrics, the executed plan
      with commit references, before/after structural summary, an explicit
      statement of what did not change, deferred follow-ups, and the
      self-check results.
    direction: >
      The report must carry all six required sections; fill in any missing
      section from the session record before the report is delivered.
    handoff: autonomous
    derivable_at_l4: true
