name: prepare-implementation
intent: >
  Produce a complete set of implementation-ready design artifacts for a single
  issue or epic. The play auto-resolves work context from the current branch
  or STM; an --epic flag is optional for roadmap-driven entry. Before generating
  artifacts, the play deeply understands the codebase through architecture
  inference, test surface mapping, dependency graph construction, and git history
  analysis — all in parallel. It then computes the blast radius via test impact
  analysis, identifies coverage gaps, and specifies baseline tests for
  uncharacterized code paths. Only after the blast radius is fully characterized
  does artifact generation begin. When upstream locked artifacts (product.yaml,
  roadmap.yaml, architecture.yaml, quality-standards.yaml) exist, they are used
  as authoritative inputs. When absent, the play derives equivalent context
  from the codebase, LTM, and targeted user interviews — never halting the user.
  Architecture and quality context are essential: when their locked artifacts are
  missing, the play enters discovery mode to establish this understanding.
  The output set includes: features.yaml defining product behaviors and
  invariants, scenarios.yaml with three-tier verification scenarios (baseline,
  new, regression), tech.yaml with file-level change specifications and LLD,
  and plan.yaml with a task-level DAG including per-task dependencies and exit
  gates. All artifacts must contain everything the implementation agent needs
  so that no codebase scanning, LTM reading, or design decisions are required
  at implementation time. Verification scenarios are compartmentalized from the
  implementer. All work is issue-mapped — even epics require an issue.

constraints:
  - id: C1
    rule: >
      Product.yaml and roadmap.yaml are nice-to-have upstream inputs. When
      present and locked, they are authoritative. When absent, the play
      proceeds with issue context and codebase-derived understanding. The
      play never halts for missing product.yaml or roadmap.yaml.

  - id: C2
    rule: >
      The play runs as a single invocation per issue or epic. Context
      resolution, codebase understanding, blast radius analysis, artifact
      generation, validation, and lock happen in one flow with inline
      checkpoints. No separate phase invocations.

  - id: C3
    rule: >
      features.yaml defines product behaviors, invariants, scope boundaries, and
      acceptance criteria. It must not contain technology choices, implementation
      patterns, runtime topology, library names, or deployment decisions.

  - id: C4
    rule: >
      tech.yaml must align with the established architecture context (locked
      architecture.yaml when present, or discovery-derived architecture
      understanding when absent). tech.yaml provides issue-scoped implementation
      detail (file paths, component structure, development patterns) within
      the architecture decisions. tech.yaml must not contradict the established
      architecture context.

  - id: C5
    rule: >
      Every plan.yaml task must map to one or more specific file paths with
      change type (CREATE, MODIFY, DELETE). A task without file paths and
      change types is not implementation-ready.

  - id: C6
    rule: >
      Every feature slice in plan.yaml must deliver an end-to-end working
      capability that is independently testable. A feature slice that delivers
      only infrastructure, only backend, or only frontend without a testable
      user-facing path is not valid — except prerequisites (Phase 0), which
      covers project scaffold and baseline test implementation.

  - id: C7
    rule: >
      Every verification scenario must have a description, expected behavior,
      explicit pass/fail criteria, and an automation classification of either
      Automated or Hybrid. Hybrid scenarios must document which element requires
      human judgment. A scenario without pass/fail criteria is incomplete.

  - id: C8
    rule: >
      Every product behavior defined in the product specification must be covered
      by at least one verification scenario. There must be no product behavior
      without a corresponding testable scenario. Coverage is measured by
      traceability, not by count.

  - id: C9
    rule: >
      Verification scenarios must be compartmentalized from the implementer.
      plan.yaml must not contain scenario descriptions or scenario content.
      plan.yaml scenario_gate fields reference scenario IDs and counts only —
      never scenario descriptions. scenarios.yaml is a separate artifact that
      serves only the validator. This prevents the implementer from optimizing
      for test cases instead of building correct software.

  - id: C10
    rule: >
      The play uses a staged human review model with five checkpoints:
      (0) context assembly and architecture discovery results, (1) blast radius
      and baseline test specifications, (2) features.yaml, (3) tech.yaml with
      LLD and file-level change specs, (4) scenarios.yaml plus plan.yaml with
      task DAG. Each checkpoint requires explicit human approval before
      proceeding to the next stage.

  - id: C11
    rule: >
      Each artifact serves a distinct audience. features.yaml serves product
      stakeholders. scenarios.yaml serves validators. tech.yaml serves
      implementers. plan.yaml serves implementers (task DAG and scope) and
      quality leads (scenario gates by ID only). No artifact may contain content
      that belongs to a different artifact's audience — audience collision is a
      constraint violation.

  - id: C12
    rule: >
      plan.yaml must contain a summary section showing per-feature rows with:
      feature_ref, what it delivers, scenario count (integer only — not scenario
      IDs, to maintain compartmentalization), and cumulative scenario count.
      scenarios.yaml must contain a feature_gates section mapping each feature
      to its required scenario IDs. Every scenario must appear in at least one
      feature gate.

  - id: C13
    rule: >
      Every task in plan.yaml (and prerequisites) must have an explicit
      exit_gate that defines what must be observable before moving to the next
      task. The exit gate references observable outcomes, not process steps.

  - id: C14
    rule: >
      The play auto-resolves work context from the current branch name or
      STM directory. An --epic flag is optional for roadmap-driven entry.
      When --epic is provided and a locked roadmap exists, the epic ID must
      exist in the roadmap. The play halts only when neither an issue nor
      an epic can be resolved — nothing to scope the work against.

  - id: C15
    rule: >
      Epic dependency enforcement applies only when a locked roadmap exists
      and --epic is provided. All epic dependencies (from roadmap depends_on)
      must be either prepared or built. When working from an issue without a
      roadmap, epic dependency enforcement does not apply.

  - id: C16
    rule: >
      The play must deeply understand the codebase before producing any
      artifacts. This includes: architecture inference (module structure,
      service boundaries, data flow, design patterns, framework conventions,
      logical architecture), test surface mapping (all test files, what they
      cover, what assertions they make), dependency graph construction (file
      imports, module API calls, service messaging), and git commit history
      analysis (co-change patterns, recent activity, commit message intent).
      The scan always runs — there is no greenfield vs brownfield distinction.

  - id: C17
    rule: >
      The play must read LTM at ~/.meridian/core/memory/ for architectural
      standards, implementation patterns, technology decisions, and prior
      learnings. LTM findings and gaps must both be documented. Gaps tell the
      implementation agent what organizational knowledge is missing.

  - id: C18
    rule: >
      The context assembly and blast radius reports require explicit user
      approval (Tether) before artifact generation begins. The user validates
      the play's understanding of the codebase state, architecture, test
      coverage, change surface, and blast radius.

  - id: C19
    rule: >
      Existing artifacts from prior epics or issues are read-only inputs, not
      targets for modification. All work is issue-mapped — artifacts live under
      {stm_base}/{issue}/. Even when working on an epic, there must be an
      issue (created via /start-feature).

  - id: C20
    rule: >
      After structural validation passes, the play must scan the four
      design artifacts (features.yaml, tech.yaml, scenarios.yaml, plan.yaml)
      for open_questions[] fields and for risks[] or risk_assessment[] entries
      with severity "high". If any open questions or high-severity risks are
      found, the play must present a structured resolution interview
      requiring the user to resolve each item (RESOLVED keyword) before
      proceeding. All resolutions must be written to a pre-lock-resolutions.yaml
      audit artifact before auto-lock executes.

  - id: C21
    rule: >
      Architecture context is essential but not a hard-halt. When a locked
      architecture.yaml exists at {product_base}/architecture/architecture.yaml,
      it is used as the authoritative source. When absent, the play enters
      discovery mode — deriving architecture understanding from the codebase
      scan (design patterns, framework conventions, logical architecture) and
      LTM, then working with the user via targeted interview to fill gaps.
      The goal is equivalent understanding, not a shortcut.

  - id: C22
    rule: >
      Quality standards context is essential but not a hard-halt. When a locked
      quality-standards.yaml exists, it is used as the authoritative source.
      When absent, the play derives quality context from toolchain detection
      (test config, linting, CI files, coverage config) and LTM, then works
      with the user via targeted interview to establish quality gates.

  - id: C23
    rule: >
      Context resolution follows a hierarchy for each upstream artifact:
      locked YAML artifact (authoritative) → project LTM (advisory) →
      codebase scan (derived) → user interview (collected). Each source has
      an authority level. The play documents which source provided each
      piece of context in context-assembly.yaml.

  - id: C24
    rule: >
      Test-driven blast radius analysis is required before design artifact
      generation. The change surface must be fully characterized through test
      impact analysis. Every code path in the change surface must have either
      an existing test that is understood, or a new baseline test specified.
      Design proceeds only when the blast radius is fully characterized.

  - id: C25
    rule: >
      Baseline tests must be specified for every coverage gap in the change
      surface. A baseline test targets the CURRENT behavior of the code (not
      the future behavior). It must pass on the unmodified codebase. No design
      artifact generation proceeds with uncharacterized code paths in the
      impact zone.

  - id: C26
    rule: >
      plan.yaml must contain a task-level DAG with explicit depends_on chains
      between tasks, per-task file lists with change type (CREATE, MODIFY,
      DELETE), and per-task exit gates. Tasks reference file-level change
      specifications from tech.yaml.

  - id: C27
    rule: >
      tech.yaml must contain file-level change specifications. For MODIFY
      files: exact location and before/after content. For CREATE files:
      content template. For DELETE files: justification. These specifications
      must be detailed enough for mechanical implementation.

  - id: C28
    rule: >
      scenarios.yaml must contain three tiers: baseline scenarios (existing
      behavior from blast radius coverage gaps), new scenarios (from features),
      and regression scenarios (from blast radius — must still pass after
      changes). Feature gates must reference all three tiers.

  - id: C29
    rule: >
      Git commit history must be analyzed as a parallel data source during
      codebase understanding. Co-change patterns, recent activity, and commit
      messages inform the change surface and blast radius. This runs in
      parallel with architecture inference and test surface mapping.

  - id: C30
    rule: >
      All intermediate data collected by agents must be stored in STM on disk
      at {stm_base}/{issue}/evidence/prepare-implementation/. The play
      orchestrates by passing STM paths between agents. Agent outputs are
      never passed through conversation memory.

  - id: C31
    rule: >
      Artifacts that benefit from diagrams and narrative use dual format
      (YAML contract + MD rich content): architecture-inference,
      dependency-graph, commit-history-analysis, tech, plan. Pure data
      artifacts stay YAML-only: context-assembly, test-surface,
      change-surface, blast-radius, baseline-tests, features, scenarios.

  - id: C32
    rule: >
      Testing and architecture agent work must be separated. The tech-architect
      handles architecture inference, design patterns, dependency graphs,
      change surface identification, tech.yaml, and plan.yaml. The
      test-engineer handles test surface mapping, blast radius computation,
      baseline test specification, and scenarios.yaml. These are different
      domains with different agents.

  - id: C33
    rule: >
      Must resolve or create a GitHub issue before artifact production begins.
      When invoked with an issue number, it is validated. When invoked with a
      description or --epic, an issue is created. The play never proceeds
      to Context Resolution without a resolved issue number.

  - id: C34
    rule: >
      Must create a feature branch (type/issue-slug convention) if not already
      on one. Branch creation is idempotent — if already on a matching feature
      branch, it is reused. Branch must exist before any artifact is written.

  - id: C35
    rule: >
      Must initialize the STM directory at {stm_base}/{issue}/ before writing
      any artifact. Directory initialization is idempotent (mkdir -p). No
      design artifact or evidence file may be written before STM init.

  - id: C36
    rule: >
      The artifact lock step must use path {stm_base}/{issue}/context/design/{artifact},
      not {stm_base}/{issue}/{artifact}. All design artifacts (features.yaml,
      tech.yaml, scenarios.yaml, plan.yaml) reside in the context/design/
      subdirectory of the issue STM.

failure_conditions:
  - id: F1
    condition: >
      features.yaml contains technology names, library names, SDK references,
      database product names, hosting platform names, or deployment patterns.
      These indicate audience collision.

  - id: F2
    condition: >
      tech.yaml contradicts the established architecture context — uses
      different technologies, frameworks, or patterns than those in the
      locked architecture.yaml or discovery-derived architecture understanding.

  - id: F3
    condition: >
      Any feature slice in plan.yaml does not deliver an end-to-end working
      capability. The scope covers only one layer without a testable path
      through the full stack.

  - id: F4
    condition: >
      Any plan.yaml task lacks file path mappings with change types. Tasks
      have empty or missing file lists.

  - id: F5
    condition: >
      Any task in plan.yaml has no exit_gate, or the exit_gate references
      process steps rather than observable outcomes.

  - id: F6
    condition: >
      Any verification scenario in scenarios.yaml is missing one or more of:
      description, expected_behavior, pass_criteria, or automation
      classification.

  - id: F7
    condition: >
      A product behavior defined in features.yaml has no corresponding
      verification scenario in scenarios.yaml.

  - id: F8
    condition: >
      plan.yaml contains scenario descriptions, scenario content, or explicit
      references to scenarios.yaml content. Compartmentalization is violated.

  - id: F10
    condition: >
      plan.yaml contains fewer than 2 feature slices in the task DAG
      (excluding prerequisites).

  - id: F12
    condition: >
      Artifacts were produced or locked without passing through all required
      human review checkpoints (context assembly, blast radius, features,
      tech design, scenarios+plan).

  - id: F13
    condition: >
      The blast radius analysis identifies unmet epic dependencies (when
      working from a roadmap) but the play proceeded to artifact generation
      without halting.

  - id: F14
    condition: >
      The codebase understanding phase missed technology dependencies,
      design patterns, or architectural structures that exist in the
      repository but are not reflected in the architecture-inference or
      dependency-graph outputs.

  - id: F15
    condition: >
      The output artifacts contain implicit references to codebase state that
      is not documented within the artifacts themselves — phrases like "see
      existing codebase," "follow established patterns," or "use available
      port" instead of explicit values.

  - id: F16
    condition: >
      LTM was not consulted or LTM findings and gaps were not documented.
      The context assembly must show what was found in LTM and what was not.

  - id: F17
    condition: >
      The play locks artifacts while any of the four design artifacts
      (features.yaml, tech.yaml, scenarios.yaml, plan.yaml) contain
      open_questions[] entries or high-severity risks that have not been
      explicitly resolved by the user.

  - id: F19
    condition: >
      The play proceeded with no issue AND no epic — nothing to scope
      the work against. The play must have at least one of these to
      define the work.

  - id: F20
    condition: >
      Design artifacts were produced without the blast radius analysis
      completing first. The change surface was not fully characterized
      through test impact analysis before artifact generation began.

  - id: F21
    condition: >
      Coverage gaps exist in the change surface without corresponding
      baseline test specifications. Code paths in the impact zone are
      uncharacterized.

  - id: F22
    condition: >
      plan.yaml tasks lack depends_on chains or per-task file lists with
      change types. The task DAG is incomplete or missing.

  - id: F23
    condition: >
      tech.yaml MODIFY entries lack before/after change specifications,
      or CREATE entries lack content templates. File-level detail is
      insufficient for mechanical implementation.

  - id: F24
    condition: >
      Baseline test specifications do not cover every coverage gap
      identified in the blast radius analysis.

  - id: F25
    condition: >
      Architecture context is missing and the play did not enter
      discovery mode to derive it from the codebase and user interview.
      Architecture understanding was skipped rather than discovered.

  - id: F26
    condition: >
      Intermediate agent data was not stored in STM on disk. Data was
      passed through conversation memory instead of via STM file paths.

  - id: F27
    condition: >
      Play proceeds to Context Resolution without a resolved issue number.
      No issue was resolved or created during the setup phase.

  - id: F28
    condition: >
      Artifacts are locked but no feature branch exists matching the
      type/issue-slug naming convention. Work was done on main or a
      non-conforming branch.

  - id: F29
    condition: >
      Any design artifact is written before the STM directory at
      {stm_base}/{issue}/ is initialized. Artifacts land in an
      unexpected location or fail to write.

scenarios:
  - id: S1
    persona: Product Owner
    given: The locked features.yaml and scenarios.yaml
    then: >
      Can confirm that every product behavior in features.yaml has at least
      one testable verification scenario in scenarios.yaml with clear pass/fail
      criteria, achieving full traceability between features and acceptance via
      feature_ref and behavior_ref back-links.

  - id: S2
    persona: Technical Architect
    given: The locked features.yaml and established architecture context (locked artifact or discovery-derived)
    then: >
      Can evaluate whether the technology stack and architectural decisions
      faithfully implement the product behaviors and invariants defined in
      features.yaml, and can identify any architectural gaps or misalignments.

  - id: S3
    persona: Engineering Lead
    given: A single task in plan.yaml and the established architecture context
    then: >
      Can assign the task to an implementer with confidence that the file
      paths, change types, change specifications, and exit_gate provide
      sufficient context to implement without requiring access to other tasks,
      the full features.yaml, or scenarios.yaml content.

  - id: S4
    persona: Quality Lead
    given: The locked scenarios.yaml feature_gates and plan.yaml scenario_gate entries
    then: >
      Can construct a feature-gated validation plan where each feature slice
      has a defined set of scenarios (by ID) that must pass before the next
      feature begins, without exposing scenario content to implementers.

  - id: S5
    persona: Product Manager
    given: The locked features.yaml
    then: >
      Can describe the product's identity, core behaviors, invariants, and scope
      boundaries to stakeholders without referencing any technology,
      implementation detail, or architectural decision.

  - id: S6
    persona: Technical Architect
    given: The locked plan.yaml summary section
    then: >
      Can determine the implementation sequence, understand what each feature
      slice delivers as a working capability, and verify that the cumulative
      scenario count in the summary accounts for all verification scenarios by
      the final feature.

  - id: S7
    persona: Engineering Lead
    given: The context assembly and blast radius reports
    then: >
      Can verify that codebase architecture is understood (design patterns,
      framework conventions, logical architecture), all technology dependencies
      are identified, test coverage is mapped, the change surface is fully
      characterized, and coverage gaps have baseline test specifications —
      sufficient to approve proceeding to artifact generation.

  - id: S8
    persona: Implementation Agent
    given: The locked artifacts (features, tech, scenarios, plan) and established architecture context
    then: >
      Can implement any task from the DAG using only the provided artifacts
      without scanning the codebase, reading LTM, or resolving dependencies.
      File paths, change types, before/after specifications, and exit gates
      are all explicit in the artifacts.

  - id: S9
    persona: Technical Architect
    given: >
      tech.yaml containing open_questions[] and high-severity risks, plus
      the pre-lock-resolutions.yaml audit artifact
    then: >
      Can verify that every high-severity risk and every open question across
      the four design artifacts was surfaced to the user, that each received
      an explicit resolution, and that resolutions are recorded in
      pre-lock-resolutions.yaml as an audit trail.

  - id: S10
    persona: Engineer
    given: The blast radius report and baseline test specifications
    then: >
      Can verify every impacted test is identified (direct and transitive),
      every coverage gap has a baseline test specification, co-change patterns
      from git history were considered, and the change surface is fully
      characterized — no uncharacterized code paths in the impact zone.

  - id: S11
    persona: Implementation Agent
    given: The task DAG in plan.yaml with depends_on chains and file-level change specs in tech.yaml
    then: >
      Can execute tasks in dependency order where each task specifies exact
      files, exact change types, exact before/after content (for MODIFY) or
      templates (for CREATE), and exact exit gates — no design decisions
      required at build time.

  - id: S12
    persona: Quality Lead
    given: Three-tier scenarios.yaml (baseline, new, regression) and feature_gates
    then: >
      Can verify baseline tests pass on current unmodified code, new tests
      define the target behavior for the change, and regression tests ensure
      nothing outside the change surface breaks. All three tiers are mapped
      to features via feature_gates.

  - id: S13
    persona: Technical Architect
    given: architecture-inference.md and tech.md
    then: >
      Can review the logical architecture, design patterns in use, framework
      conventions, and low-level design with diagrams — understanding the
      system's structure beyond what YAML fields can express.

  - id: S14
    persona: Developer
    given: >
      Developer invokes prepare-implementation with no prior start-feature
      or start-feature-planning run. No issue exists, no branch exists, no
      STM directory exists.
    then: >
      The play creates the issue, creates the branch, initializes STM, and
      completes all planning — producing fully locked artifacts in
      {stm_base}/{issue}/context/design/. The developer never needs to run
      start-feature separately.
