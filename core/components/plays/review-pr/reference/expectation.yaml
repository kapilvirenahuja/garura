# Expectation for the review-pr play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: review-pr

generated_from:
  intent: core/components/plays/review-pr/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Reviewer
    given: >
      The PR page after review-pr completes.
    then: >
      Opens the PR after review-pr completes and sees a single
      structured comment with a confidence score, P1/P2/P3 sections,
      every finding cited to a standard ID, and the names of the
      selected reviewers.
    measure: >
      Exactly one review-pr comment is present on the PR (carrying the
      review-pr marker), and that comment contains a confidence score,
      P1/P2/P3 sections, a standard ID on every finding line, and a
      Reviewers block listing the selected names.
  - id: S2
    persona: PR Author
    given: >
      A finding line in the posted review-pr comment.
    then: >
      For each finding in the comment, can click through to the
      cited standard ID and see the exact match line in the diff
      that triggered it. No finding is "vibes-based".
    measure: >
      Every finding line carries a standard_id that maps to a real KB
      rule row in the PR severity taxonomy and points to a specific
      file:line inside the PR diff; no finding lacks a standard_id or a
      diff location.
  - id: S3
    persona: Ship Pipeline
    given: >
      A ship run that invokes review-pr with review-pr.bypass set to false.
    then: >
      When review-pr.bypass is false and review-pr returns a P1
      finding or sub-threshold confidence, the ship play halts
      before merge-pr and surfaces the routing decision.
    measure: >
      With review-pr.bypass=false and confidence.yaml routing equal to
      block or escalate, ship stops before merge-pr and reports the
      routing decision instead of merging.
  - id: S4
    persona: QA / Determinism Auditor
    given: >
      Two back-to-back review-pr runs on the same PR with no intervening commits.
    then: >
      Runs review-pr twice on the same PR with no intervening commits
      and gets byte-identical findings.yaml (modulo timestamps) and
      identical P1..P4 buckets.
    measure: >
      The two findings.yaml files are byte-identical except for
      meta.generated_at, and the P1..P4 counts match exactly across
      both runs.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # uncited / unknown standard ID
    trigger: >
      A finding is emitted without a cited standard ID, or with a standard ID that
      does not exist in the PR severity taxonomy.
    direction: >
      Every finding must cite a standard ID that exists in the PR severity taxonomy;
      drop or re-tag any finding whose standard ID is missing or unknown before the
      findings set is accepted.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2                 # read outside diff / invoked full-repo
    trigger: >
      The play or quality-check-scoped reads a file outside the PR's changed paths,
      or invokes /quality-check.
    direction: >
      Evaluation must stay bounded to the PR's changed paths and never run the
      full-repo quality check; re-scope the read set to the diff and re-run the
      diff-bounded skill.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC3
    for_failure: F3                 # short pool + empty fallback
    trigger: >
      Reviewer selection returns fewer than review-pr.reviewer_count candidates AND
      review-pr.fallback_reviewers is empty.
    direction: >
      A short candidate pool must have a configured fallback to draw from; with the
      fallback list empty this needs a human to name reviewers or populate
      review-pr.fallback_reviewers — the builder cannot invent owners.
    handoff: human
    derivable_at_l4: false
  - id: REC4
    for_failure: F4                 # author in reviewer list
    trigger: >
      The PR author appears in the selected reviewer list.
    direction: >
      The PR author must never be a selected reviewer; remove the author from the
      candidate set and re-select from the remaining committers.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # P1 present but not blocked / not request-changes
    trigger: >
      A P1 finding is present but the PR is not set to request-changes, OR a P1
      finding is present but the routing decision is not "block".
    direction: >
      A P1 finding must force routing to block and the PR to request-changes; recompute
      the routing from the findings and set request-changes accordingly.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC6
    for_failure: F6                 # sub-threshold confidence, no reviewers
    trigger: >
      Confidence is below review-pr.confidence_threshold but no reviewers are requested
      on the PR.
    direction: >
      Sub-threshold confidence must escalate by requesting reviewers; add the selected
      reviewers to the PR when confidence falls below the threshold.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # severity not stable across runs
    trigger: >
      Severity classification differs across two back-to-back runs on the same diff.
    direction: >
      Severity must be sourced verbatim from the PR severity taxonomy row for each
      standard ID, never computed at runtime; re-derive severities from the taxonomy
      so two runs on the same diff agree.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8                 # missing taxonomy / config keys
    trigger: >
      Pre-flight runs without the PR severity taxonomy file at the configured path,
      or with any of the six required review-pr config keys missing.
    direction: >
      The taxonomy file and all six review-pr config keys must be present before any
      review runs; this is a configuration/authority gap the builder cannot fill — a
      human must provide the missing file or config keys.
    handoff: human
    derivable_at_l4: false
  - id: REC9
    for_failure: F9                 # over agent budget
    trigger: >
      The play dispatches more than 5 domain agents (utility agents exempt).
    direction: >
      The play must stay within 5 domain agents; collapse or drop dispatches so the
      domain-agent count is back within budget.
    handoff: autonomous
    derivable_at_l4: true
