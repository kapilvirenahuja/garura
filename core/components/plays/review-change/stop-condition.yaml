# review-change stop condition — baked from reference/ice.md "### Done means" (#464/#466).
# Evaluated by scripts/check_stop_condition.py at Step C0 of the Standard Play Close.
# Paths are relative to the run's STM root ({stm_base}{issue}/).
schema: { name: stop-condition }
content:
  done:
    - id: D1
      says: "findings exist"
      check: { type: artifact_exists, path: "review/findings.yaml" }
    - id: D2
      says: "the verdict exists"
      check: { type: artifact_exists, path: "review/verdict.yaml" }
    - id: D3
      says: "the verdict is on the PR"
      check: { type: field_equals, file: "review/posted.json", field: "posted", equals: true }
