intent: >
  Create git commits for all changed files (staged, unstaged, and untracked) in the
  current repository, grouped by concern, using conventional commit message format
  with issue references, and push the branch to the remote. Each commit message must
  describe the actual change and link to an existing issue. Approval is required only
  when confidence is low on change grouping or issue mapping.

constraints:
  - id: C1
    rule: >
      The play must not operate on main, master, or the repository's default branch.
  - id: C2
    rule: >
      If no changed files exist (staged, unstaged, or untracked), the play exits
      gracefully with a message to the user. This is not a failure.
  - id: C3
    rule: >
      Every commit must reference an existing issue. If any changes cannot be mapped
      to an existing issue, the play halts and instructs the user to create the
      issue first.
  - id: C4
    rule: >
      Sensitive files (secrets, credentials, environment files, private keys) must
      never be committed. If detected in the changeset, the play blocks and reports
      the specific files and reason to the user.
  - id: C5
    rule: >
      Commit messages must follow conventional commit format. Conventional commit
      types are sourced from LTM and are not hardcoded.
  - id: C6
    rule: >
      Commit messages must include the linked issue number.
  - id: C7
    rule: >
      After commits are created, the branch must be pushed to the remote.
      Push failure is non-blocking — commits are valid regardless of push
      outcome. The play logs the failure and continues.
  - id: C9
    rule: >
      Human approval is required before committing when any change group's
      issue mapping has less than high confidence. When all mappings are
      high confidence, the play proceeds without approval.

failure_conditions:
  - id: F1
    condition: >
      A single commit contains changes belonging to unrelated concerns.
  - id: F2
    condition: >
      A commit message follows conventional format but does not describe the actual
      change (e.g., "fix: resolve issue #42" with no description of what was fixed).
  - id: F3
    condition: >
      Changed files remain uncommitted after the play completes with no stated
      reason for their exclusion.
  - id: F4
    condition: >
      A commit references the wrong issue.
  - id: F5
    condition: >
      A commit is created from a change group that had an unresolved
      conflict in issue mapping (multiple competing issue matches)
      without the conflict being surfaced for review.
  - id: F6
    condition: >
      A commit is created from a change group whose issue mapping had
      less than high confidence, and no human approval was obtained for
      that mapping.

scenarios:
  - id: S1
    persona: Code reviewer
    given: >
      The git log of commits produced by this play on a feature branch
    then: >
      Can understand the scope and nature of each change without reading the diff,
      and can trace every commit to its originating issue.
  - id: S2
    persona: Team lead
    given: >
      The git log of commits produced by this play across multiple branches
    then: >
      Can report on progress per issue and use commit history as a mentoring
      reference for conventional commit practices.
