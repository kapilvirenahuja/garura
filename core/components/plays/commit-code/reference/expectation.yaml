# Expectation for the commit-code play (ICE refactor, #376).
# The generated/vetted spec layer that pairs with reference/intent.yaml.
# Two parts only: success_scenarios and recovery.

name: commit-code
generated_from:
  intent: reference/intent.yaml
vetted:
  status: approved          # framework-authored = the human-vetted version
  approved_by: framework-author

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# These are the stop/go target and the source the scenario evals are built from.
success_scenarios:
  - id: S1
    persona: Code reviewer
    given: the git log of commits produced by this play on a feature branch
    then: can understand the scope and nature of each change without reading the diff, and trace every commit to its originating issue
    measure: every commit has a conventional type, a meaningful scope, a descriptive subject, and an existing-issue reference — all readable from `git log` alone
  - id: S2
    persona: Team lead
    given: the git log of commits produced by this play across multiple branches
    then: can report progress per issue and use the history as a conventional-commit mentoring reference
    measure: commits filter cleanly by issue number; 100% follow conventional format

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # a commit spans unrelated concerns
    trigger: a commit (or staged set) covers more than one concern
    direction: regroup so each commit holds a single concern; re-stage by group and recommit
    handoff: autonomous
  - id: REC2
    for_failure: F2                 # message names the issue but not the change
    trigger: a commit subject references the issue but does not describe the actual change
    direction: rewrite the subject to describe the specific change
    handoff: autonomous
  - id: REC3
    for_failure: F3                 # files left uncommitted with no reason
    trigger: changed files remain uncommitted with no recorded exclusion reason
    direction: commit the remaining files in an appropriate group, or record an explicit exclusion reason
    handoff: autonomous
  - id: REC4
    for_failure: F4                 # commit references the wrong issue
    trigger: a commit references an issue unrelated to its change group
    direction: re-map the change group to the correct issue and correct the reference
    handoff: human
  - id: REC5
    for_failure: F5                 # unresolved mapping conflict committed silently
    trigger: a change group has multiple competing issue matches
    direction: surface the competing matches and have the user pick before committing
    handoff: human
  - id: REC6
    for_failure: F6                 # low-confidence mapping committed without approval
    trigger: a change group's issue mapping is below high confidence
    direction: halt and request human approval for the mapping before committing
    handoff: human
