intent: >
  Given a locked execution plan entry and a defined feature with success scenarios and failure conditions,
  produce a working implementation that passes all independently-generated evaluations and
  meets project quality standards. Test authorship is isolated: a test-writer agent writes
  behavioral tests from specifications before the code-builder sees them, preventing context
  bias in the red-green cycle. A quality agent verifies gates (build, lint, typecheck, coverage)
  derived from the project's Quality Profile. An engineering-manager agent certifies QP compliance
  before behavioral evaluation begins — quality gate FAIL and EM BLOCKED are hard stops, not
  informational. A judge evaluates behavior independently. When failures occur, remediation draws
  from all three sources: judge failures, quality gate failures, and QP threshold failures.
  Eval count stability is audited across fix iterations to prevent silent eval reduction.

constraints:
  - id: C1
    rule: >
      The plan.yaml execution order entry referenced by the feature must have status: "LOCKED".
      An entry in DRAFT status is not eligible for implementation.

  - id: C2
    rule: >
      The feature must have at least one success scenario and at least one failure condition
      defined in features.yaml before implementation begins.

  - id: C3
    rule: >
      All prerequisite execution order entries (entries the target entry depends on) must be
      complete before implementation of the target entry begins.

  - id: C4
    rule: >
      The evaluation generator receives only: features.yaml behaviors, scenarios.yaml
      verification scenarios, feature success/failure conditions, and plan.yaml exit gate criteria.
      It does not receive: vision documents, design tokens, architecture.yaml, tech.yaml,
      plan.yaml (full), implementation code, builder prompts, or prior evaluation results.

  - id: C5
    rule: >
      The code-builder receives only: CONTEXT.md (which describes the architecture, scope items,
      file ownership, and conventions) and test file paths (marked read-only). It does not
      receive: features.yaml, scenarios.yaml, evaluation criteria, evaluation IDs, judge reports,
      or pass/fail thresholds. The builder implements each scope item to make existing tests
      pass — test first, then implementation, then verification — before moving to the next
      scope item. Test files are authored by the test-writer, not the builder. The builder
      MUST NOT modify test files.

  - id: C6
    rule: >
      The judge receives only: encrypted evaluations and implementation artifacts (deployed
      code and build output). It does not receive: builder prompts, builder reasoning,
      implementation rationale, evaluation-generator prompts, or quality agent results.

  - id: C7
    rule: >
      Evaluations are encrypted at rest. Plaintext evaluation content is deleted after encryption.
      Only the judge possesses the decryption capability.

  - id: C8
    rule: >
      Evaluation files are stored outside the project repository tree.
      No evaluation content (encrypted or plaintext) exists inside the repository at any point.

  - id: C9
    rule: >
      After a fix iteration, old evaluations are discarded entirely. A fresh evaluation agent
      with no knowledge of prior evaluations generates new evaluations from the original specs.

  - id: C10
    rule: >
      The builder receives only remediation instructions derived from judge failures.
      It does not receive evaluation IDs, evaluation text, pass criteria, or the raw judge report.

  - id: C11
    rule: >
      The fix loop runs a maximum of 3 iterations. If evaluations still fail after 3 rounds,
      the process halts with a structured failure report.

  - id: C12
    rule: >
      The project builds successfully after implementation.
      Type checking and production build both pass without errors.

  - id: C13
    rule: >
      A codebase context document (CONTEXT.md) is generated before implementation begins,
      distilled from plan.yaml execution order entry, architecture.yaml, and tech.yaml,
      reflecting the current scope, tech decisions, domain rules, and constraints for the
      target feature only.

  - id: C14
    rule: >
      A quality agent independently verifies linting, unit tests, type checking, and build
      against the project's quality vision gates, which include QP-derived thresholds when
      quality-standards.yaml is present. It does not receive: evaluations, builder prompts,
      builder reasoning, eval-generator prompts, or judge reports. The quality agent reports
      measurements against declared thresholds.

  - id: C15
    rule: >
      Project quality standards (quality vision gates) are captured in STM before the quality
      agent runs. When .meridian/product/architecture/quality-standards.yaml exists, gates MUST
      derive thresholds from it using the QP translation table. When absent, gates are detected
      from toolchain defaults. The quality-standards.yaml is the authoritative source for
      coverage targets, complexity limits, and security scan requirements.

  - id: C16
    rule: >
      Each scope item's tests are authored by the test-writer agent from specifications
      (TEST-CONTEXT.md) before the code-builder sees them. The code-builder receives test
      files as read-only input and implements each scope item to make its tests pass. Scope
      items are not batched -- one scope item's implement-verify cycle completes before the
      next scope item begins. The orchestrator records test file checksums after the test-writer
      returns and verifies they are unchanged after the code-builder returns.

  - id: C17
    rule: >
      The test-writer receives only TEST-CONTEXT.md, which contains scope item descriptions
      and acceptance criteria extracted from CONTEXT.md 'Scope' section and features.yaml
      success_scenarios. It does not receive CONTEXT.md 'Files You Own' section, file paths,
      architecture decisions, technology choices, or any implementation context. Test assertions
      must be behavioral, not structural.

  - id: C18
    rule: >
      Test files authored by the test-writer are read-only for the code-builder. The orchestrator
      records test file checksums before passing to the code-builder and verifies checksums are
      unchanged after the code-builder returns. Checksum mismatch is a failure condition (F16).

  - id: C19
    rule: >
      The engineering-manager agent certifies QP compliance after the quality-auditor runs and
      before the judge runs. It receives quality-standards.yaml and quality-report.yaml. It does
      not receive evals, judge reports, builder prompts, or feature specs. If the EM reports
      BLOCKED, the judge does not execute. Blocked QP dimensions enter the fix loop for
      remediation.

  - id: C20
    rule: >
      When quality-standards.yaml exists, quality vision gate thresholds MUST be derived from
      it. The orchestrator translates QP dimension levels to concrete thresholds: QP-1 levels
      map to min_coverage percentages, QP-2 levels map to complexity limits, QP-7 levels map
      to security scan requirements. Manual override of QP-derived thresholds is not permitted.

  - id: C21
    rule: >
      If the quality-auditor reports overall FAIL, the orchestrator MUST NOT proceed to EM
      certification or judge. Quality gate failures enter the fix loop as 'tooling' category
      remediation. The judge only executes after quality gates PASS AND EM certifies CERTIFIED.

  - id: C22
    rule: >
      The remediation step reads three sources: judge-report.yaml (behavioral failures),
      quality-report.yaml (gate failures), and em-certification.yaml (QP threshold failures).
      Remediation instructions are categorized as behavioral, tooling, or quality. All three
      sources are re-checked after each fix iteration. No source with failures may be omitted
      from remediation.

  - id: C23
    rule: >
      When fresh evals are generated during a fix iteration, the orchestrator compares eval
      count against the original manifest. If the count decreased, the eval-generator must
      provide a consolidation_rationale for each removed eval ID. If no rationale is provided,
      the fresh eval set is rejected and the eval-generator is re-invoked. Eval count may
      increase (new behaviors discovered) but may not decrease without documented explanation.

  - id: C24
    rule: >
      All input design artifacts (plan.yaml, features.yaml, tech.yaml, scenarios.yaml) must
      be sourced from the issue STM at {stm_base}/{issue}/context/design/, where
      prepare-implementation writes them. Architecture.yaml and quality-standards.yaml remain
      sourced from {product_base}/architecture/ — they are product-level artifacts, not
      issue-specific. The pre-flight must derive artifact_base from the issue STM path.

failure_conditions:
  - id: F1
    condition: >
      The project build or type check produces errors after implementation is complete.

  - id: F2
    condition: >
      The judge report shows greater than 50% evaluation failure rate on the first judge run.

  - id: F3
    condition: >
      Three fix iterations have been exhausted and the judge report still contains
      at least one failing evaluation.

  - id: F4
    condition: >
      Plaintext evaluation files exist on disk after the encryption step, or evaluation
      content (encrypted or plaintext) exists inside the project repository tree.

  - id: F5
    condition: >
      The builder agent's input context contains any evaluation ID, evaluation text,
      evaluation pass criteria, or raw judge report content.

  - id: F6
    condition: >
      The judge agent's input context contains any builder prompt, builder reasoning,
      or implementation rationale.

  - id: F7
    condition: >
      The evaluation generator's input context contains any implementation code,
      builder output, or prior evaluation results.

  - id: F8
    condition: >
      The plan.yaml execution order entry referenced by the feature has a status other
      than LOCKED at the time implementation begins.

  - id: F9
    condition: >
      The feature has no exit gate defined in plan.yaml execution_order[].exit_gate,
      or the feature in features.yaml has no success scenarios or failure conditions
      to generate evaluations from.

  - id: F10
    condition: >
      After a fix iteration, the judge runs against the same evaluations that were
      used in the previous iteration rather than freshly generated ones.

  - id: F11
    condition: >
      No manual test scenarios are produced alongside the implementation.

  - id: F12
    condition: >
      Unit tests fail or are absent for any implemented scope item. A scope item
      without a corresponding test that exercises its behavior is incomplete.

  - id: F13
    condition: >
      Linting violations exist in the implemented code after implementation is complete.

  - id: F14
    condition: >
      Code quality standards defined in the project's quality vision gates are not met.
      Any metric falling below the threshold specified in the vision gates constitutes failure.

  - id: F15
    condition: >
      The test-writer agent's input context contains file paths from CONTEXT.md 'Files You Own',
      architecture.yaml references, tech.yaml references, or any implementation-specific
      information. TEST-CONTEXT.md contains file paths or technology decisions.

  - id: F16
    condition: >
      The code-builder modified one or more test files authored by the test-writer. Checksum
      mismatch between post-test-writer and post-code-builder states.

  - id: F17
    condition: >
      The engineering-manager certification reports BLOCKED because a QP dimension's actual
      measurement falls below the threshold derived from quality-standards.yaml. This enters
      the fix loop -- hard halt only after 3 fix iterations (F3).

  - id: F18
    condition: >
      The judge executed without a prior engineering-manager certification of CERTIFIED.
      judge-report.yaml exists but em-certification.yaml does not exist or shows BLOCKED.

  - id: F19
    condition: >
      quality-standards.yaml exists but quality-vision-gates.yaml was generated with null
      thresholds for dimensions that have QP levels >= 2. The QP translation step was skipped
      or failed.

  - id: F20
    condition: >
      The judge executed while quality-report.yaml shows overall FAIL. Quality gates were not
      blocking -- the pipeline proceeded despite gate failures.

  - id: F21
    condition: >
      quality-report.yaml or em-certification.yaml contains failures but remediation
      instructions have zero entries from that source. A failing source was omitted from
      the fix loop.

  - id: F22
    condition: >
      Fresh eval count is less than original eval count and no consolidation_rationale artifact
      exists explaining which eval IDs were removed and why.

scenarios:
  - id: S1
    persona: "Engineer"
    given: >
      A locked plan.yaml execution order entry, a fully-defined feature in features.yaml, and a passing project build
    then: >
      Can trigger the implementation process and receive committed, deployed code
      that passes all evaluations on the first judge run with no fix loop required

  - id: S2
    persona: "Engineer"
    given: >
      A judge report showing evaluation failures after the first implementation attempt
    then: >
      Can observe the fix loop execute up to 3 iterations, with each iteration producing
      fresh evaluations and a fresh judge run, until all evaluations pass

  - id: S3
    persona: "QA Engineer"
    given: >
      The scenarios.yaml verification scenarios and the deployed implementation
    then: >
      Can execute each verification scenario against the deployed environment and verify
      that expected user-facing behaviors match actual behavior, without reading the
      codebase or referencing encrypted evals

  - id: S4
    persona: "Security Auditor"
    given: >
      The input contexts of all agents (builder, evaluation generator, judge, quality agent)
      and the project's security quality vision gates
    then: >
      Can verify that no agent received information outside its designated scope --
      builder has zero evaluation content, judge has zero builder prompts, evaluation
      generator has zero implementation code, quality agent has zero eval content --
      and that security standards defined in the quality vision gates are met

  - id: S5
    persona: "Engineering Lead"
    given: >
      A structured failure report produced after 3 exhausted fix iterations
    then: >
      Can identify which evaluations persistently failed, what remediation was attempted
      in each iteration, and decide whether to restructure the feature scope or escalate

  - id: S6
    persona: "Engineer"
    given: >
      A feature with external dependencies that cannot be fully evaluated by automated checks
    then: >
      Can use the manual test scenarios to validate integration points that require
      a running deployed environment, covering what automated evaluations cannot reach

  - id: S7
    persona: "Performance Auditor"
    given: >
      The deployed preview environment and the project's quality vision gates defining
      performance thresholds (bundle size, lighthouse scores, runtime performance)
    then: >
      Can verify that bundle size, lighthouse scores, and runtime performance metrics
      meet or exceed the thresholds defined in the quality vision gates

  - id: S8
    persona: "Evals Engineer"
    given: >
      The judge report, eval execution results, and the features.yaml behaviors list
    then: >
      Can verify that every eval was executed, every feature behavior has eval
      coverage, and the overall pass rate meets the defined threshold

  - id: S9
    persona: "Quality Lead"
    given: >
      An epic implementation has completed with quality-standards.yaml declaring QP levels
      >= 2 for testing, code quality, and security dimensions
    when: >
      The quality lead reviews the EM certification report
    then: >
      Every QP dimension with level >= 2 has a concrete threshold in quality-vision-gates.yaml
      (not null). The em-certification.yaml shows per-dimension PASS/FAIL with actual
      measurements. No QP dimension was skipped.

  - id: S10
    persona: "Testing Architect"
    given: >
      An epic implementation used the test-writer / code-builder separation
    when: >
      The testing architect audits test authorship
    then: >
      Test files were authored by the test-writer agent from TEST-CONTEXT.md (behavioral specs
      only). The code-builder received test files as read-only. Checksums confirm no test files
      were modified by the builder. Tests assert behavioral outcomes, not structural
      implementation details.

  - id: S11
    persona: "Build Engineer"
    given: >
      The quality-auditor reports overall FAIL (e.g., build errors, lint violations)
    when: >
      The build engineer checks pipeline behavior
    then: >
      The judge did NOT execute while gates were failing. The fix loop addressed tooling
      failures (build, lint) alongside behavioral failures. After fix iteration, all quality
      gates pass before the judge runs.

  - id: S12
    persona: "Eval Auditor"
    given: >
      Fresh evals were generated during a fix iteration with a different eval count than
      the original
    when: >
      The eval auditor reviews the eval audit trail
    then: >
      An eval-audit artifact exists documenting the count delta. If evals were removed, each
      has a consolidation_rationale. No evals silently disappeared between iterations.
