name: garura:algorithm
version: "1.0.0"
description: "Optional play between prepare and implement that produces language-agnostic pseudocode for algorithmically complex interfaces identified in tech.yaml."

intent: >
  Optional play between `prepare` and `implement` that produces language-agnostic
  pseudocode (reference-algorithms.md) for algorithmically complex interfaces
  identified in tech.yaml. Dispatches `tech-architect` with the
  `draft-reference-algorithms` skill when complexity indicators are found. CRUD
  epics with no indicators exit gracefully with no agent dispatch. Evidence
  writing is gated by `evidence.record` in config.

constraints:
  - id: C1
    rule: >
      Play directory is `core/components/plays/algorithm/`; SKILL.md compiled
      from `reference/intent.yaml` via `/create-play --build algorithm`. Do not
      hand-edit SKILL.md.

  - id: C2
    rule: >
      Play is OPTIONAL — pre-flight detects algorithmic complexity indicators in
      tech.yaml; graceful skip (exit code 0) if none found.

  - id: C3
    rule: >
      Complexity detection scans `internal_interfaces[].behavior_contracts`
      fields for indicator patterns: state machine, scheduler, retry, backoff,
      reconciliation, consensus, leader election, conflict resolution, merkle,
      diff, patch, compaction. (11 patterns total)

  - id: C4
    rule: >
      An explicit `algorithm_spec_required: true` flag on any
      `internal_interfaces` entry triggers the play unconditionally regardless
      of C3 scan results.

  - id: C5
    rule: >
      tech.yaml is READ-ONLY. Play MUST NOT modify tech.yaml or any other
      artifact produced by `prepare`.

  - id: C6
    rule: >
      Output artifact path is
      `{stm_base}/{issue}/context/design/reference-algorithms.md` — sibling to
      tech.yaml in the existing context package.

  - id: C7
    rule: >
      Agent is `tech-architect` (reuse — no new agent); new skill is
      `draft-reference-algorithms` at
      `core/components/skills/draft-reference-algorithms/SKILL.md`.

  - id: C8
    rule: >
      `draft-reference-algorithms` skill receives ONLY: `tech_yaml_path`, list
      of qualifying `interface_ids`, `stm_base`, `issue`. Nothing else.

  - id: C9
    rule: >
      Output artifact is Markdown structured by interface ID: one
      `## {interface_id}` section per qualifying interface, each containing:
      complexity classification, language-agnostic pseudocode block, invariants
      list, edge cases list.

  - id: C10
    rule: >
      Play follows Structure B (direct-generation): pre-flight → execution →
      approval → evidence.

  - id: C11
    rule: >
      Play MUST NOT read from KB (`~/.garura/core/memory/`) or LTM during
      execution. Context is STM-only.

  - id: C12
    rule: >
      `tech-architect` dispatched via ADR 016 JSON contract containing:
      `intent_path`, `stm_base`, `stm.input` (tech_yaml_path, interface_ids),
      `stm.output` (reference_algorithms_path), `task_id`.

  - id: C13
    rule: >
      Pre-flight verifies: stm_base resolves from config.yaml, issue number is
      known, tech.yaml exists at `{stm_base}/{issue}/context/design/tech.yaml`
      and is non-empty.

  - id: C14
    rule: >
      Evidence & Close phase is gated by `evidence.record` from
      `.garura/core/config.yaml` (default `true`). When `true`: write evidence
      file, write status file, invoke repo-orchestrator self-commit. When
      `false`: skip all three. User-facing summary is always presented
      regardless of flag value.

  - id: C15
    rule: >
      Compiled SKILL.md MUST include `## Task DAG` section per ADR 013.

  - id: C16
    rule: >
      `draft-reference-algorithms` output is marked DRAFT; approval step gates
      the LOCK. If user rejects, tech-architect is re-dispatched with feedback
      (max 1 retry).

  - id: C17
    rule: >
      Play MUST NOT set or alter any `status` field in plan.yaml or milestone
      status files.

failure_conditions:
  - id: F1
    condition: >
      `stm_base` cannot be resolved from `.garura/core/config.yaml` → Hard halt
      with structured failure.

  - id: F2
    condition: >
      `tech.yaml` not found at expected path → Hard halt. Message: "prepare must
      run before algorithm."

  - id: F3
    condition: >
      `tech.yaml` is present but empty or unparseable YAML → Hard halt with
      structured failure.

  - id: F4
    condition: >
      No complexity indicators found in any `internal_interfaces` entry AND no
      `algorithm_spec_required: true` flag → Graceful exit (exit code 0).
      Message: "No algorithmic complexity detected — skipping."

  - id: F5
    condition: >
      `draft-reference-algorithms` skill returns error after 2 recovery attempts
      → Hard halt with list of failing interface_ids.

  - id: F6
    condition: >
      `reference-algorithms.md` not written to
      `{stm_base}/{issue}/context/design/` after skill execution → Hard halt
      (evidence integrity violation).

  - id: F7
    condition: >
      Prepare context package is incomplete (plan.yaml or scenarios.yaml missing
      alongside tech.yaml) → Warn and continue (play only requires tech.yaml).

scenarios:
  - id: S1
    persona: "Lead developer"
    given: "An issue whose tech.yaml contains only CRUD `internal_interfaces` (no indicator terms, no `algorithm_spec_required: true`)"
    then: "When `/algorithm` is invoked, pre-flight exits 0 with skip notice; no tech-architect dispatch; no `reference-algorithms.md` created."

  - id: S2
    persona: "Lead developer"
    given: "An issue whose tech.yaml has an `internal_interfaces` entry whose `behavior_contracts` contains 'state machine transitions'"
    then: "When `/algorithm` is invoked, pre-flight identifies the qualifying interface, tech-architect is dispatched with `interface_ids` containing that interface, and `reference-algorithms.md` is written to `context/design/` with a `## {interface_id}` section."

  - id: S3
    persona: "Lead developer"
    given: "An issue whose tech.yaml has an `internal_interfaces` entry with `algorithm_spec_required: true` but no indicator terms in `behavior_contracts`"
    then: "When `/algorithm` is invoked, pre-flight treats the entry as qualifying (C4 unconditional trigger) and tech-architect is dispatched."

  - id: S4
    persona: "Lead developer"
    given: "An issue where `reference-algorithms.md` exists in `context/design/`"
    then: "When `/implement` is invoked, implement runs normally with the unchanged tech-designer input contract; `reference-algorithms.md` is NOT passed to tech-designer; implement behavior is identical with or without the file."
