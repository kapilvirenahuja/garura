# Two parts only: success_scenarios and recovery.

name: algorithm

generated_from:
  intent: core/components/plays/algorithm/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# Lifted verbatim from the legacy intent scenarios block; only `measure` is added.
success_scenarios:
  - id: S1
    persona: "Lead developer"
    given: "An issue whose tech.yaml contains only CRUD `internal_interfaces` (no indicator terms, no `algorithm_spec_required: true`)"
    then: "When `/algorithm` is invoked, pre-flight exits 0 with skip notice; no tech-architect dispatch; no `reference-algorithms.md` created."
    measure: >
      No `reference-algorithms.md` exists at
      `{stm_base}/{issue}/context/design/reference-algorithms.md`, the play output
      contains a skip notice, the exit code is 0, and the run log shows no
      tech-architect dispatch.
  - id: S2
    persona: "Lead developer"
    given: "An issue whose tech.yaml has an `internal_interfaces` entry whose `behavior_contracts` contains 'state machine transitions'"
    then: "When `/algorithm` is invoked, pre-flight identifies the qualifying interface, tech-architect is dispatched with `interface_ids` containing that interface, and `reference-algorithms.md` is written to `context/design/` with a `## {interface_id}` section."
    measure: >
      `reference-algorithms.md` exists at
      `{stm_base}/{issue}/context/design/reference-algorithms.md`, the
      tech-architect dispatch carried the qualifying `interface_id` in its
      `interface_ids` input, and a `## {interface_id}` heading for that interface
      is present in the file.
  - id: S3
    persona: "Lead developer"
    given: "An issue whose tech.yaml has an `internal_interfaces` entry with `algorithm_spec_required: true` but no indicator terms in `behavior_contracts`"
    then: "When `/algorithm` is invoked, pre-flight treats the entry as qualifying (C4 unconditional trigger) and tech-architect is dispatched."
    measure: >
      `reference-algorithms.md` exists at the output path with a section for the
      `algorithm_spec_required: true` interface, the play did not emit a skip
      notice, and a tech-architect dispatch is recorded for that interface.
  - id: S4
    persona: "Lead developer"
    given: "An issue where `reference-algorithms.md` exists in `context/design/`"
    then: "When `/implement` is invoked, implement runs normally with the unchanged tech-designer input contract; `reference-algorithms.md` is NOT passed to tech-designer; implement behavior is identical with or without the file."
    measure: >
      After `implement` runs, `reference-algorithms.md` is byte-for-byte
      unchanged in `context/design/`, and the tech-designer input contract
      written during `implement` contains no reference to
      `reference-algorithms.md`.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # stm_base unresolvable from config
    trigger: >
      `stm_base` cannot be resolved from `.garura/core/config.yaml` — the
      `stm.base-path` key is missing, empty, or the config file is unreadable.
    direction: >
      `stm_base` must resolve to a valid path before any work begins; the config
      file's `stm.base-path` needs a user fix — the builder cannot author or
      repair the project config it merely reads.
    handoff: human
    derivable_at_l4: false
  - id: REC2
    for_failure: F2                 # tech.yaml not found
    trigger: >
      `tech.yaml` is absent at `{stm_base}/{issue}/context/design/tech.yaml` —
      the prepare context package has not been produced.
    direction: >
      `tech.yaml` must exist before algorithm runs; prepare has to run first to
      produce it — the builder cannot synthesize an upstream prepare artifact.
    handoff: human
    derivable_at_l4: false
  - id: REC3
    for_failure: F3                 # tech.yaml empty or unparseable
    trigger: >
      `tech.yaml` is present but empty or not parseable as valid YAML.
    direction: >
      `tech.yaml` must be a non-empty, parseable artifact; a malformed prepare
      output needs prepare to be re-run or the file repaired by its owner — the
      builder cannot author the upstream design.
    handoff: human
    derivable_at_l4: false
  - id: REC4
    for_failure: F4                 # no complexity indicators — graceful exit
    trigger: >
      No complexity indicators are present in any `internal_interfaces` entry and
      no `algorithm_spec_required: true` flag is set, yet the play did not exit
      gracefully with a skip notice.
    direction: >
      When no complexity is detected the play must exit 0 with a skip notice and
      no agent dispatch; emit the skip notice and exit cleanly — this is the
      OPTIONAL-play graceful path, fully mechanical for the builder.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # skill errors after 2 recovery attempts
    trigger: >
      `draft-reference-algorithms` still returns an error after 2 recovery
      attempts for one or more `interface_ids`.
    direction: >
      The skill must produce reference algorithms for every qualifying interface;
      a repeated skill failure on the same interfaces exhausts mechanical retry
      and needs a human to diagnose the failing `interface_ids`.
    handoff: human
    derivable_at_l4: false
  - id: REC6
    for_failure: F6                 # artifact not written after skill execution
    trigger: >
      `reference-algorithms.md` is absent from
      `{stm_base}/{issue}/context/design/` after the skill reported execution.
    direction: >
      The artifact must be present at the output path after a successful skill
      run; re-dispatch the skill to produce the missing file — a mechanical
      re-run from inputs the builder already holds.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # incomplete prepare context package
    trigger: >
      The prepare context package is incomplete — `plan.yaml` or `scenarios.yaml`
      is missing alongside `tech.yaml`.
    direction: >
      algorithm only requires `tech.yaml`; warn about the incomplete package and
      continue the run using `tech.yaml` alone — a mechanical warn-and-proceed.
    handoff: autonomous
    derivable_at_l4: true
