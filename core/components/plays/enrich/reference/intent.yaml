name: garura:enrich
description: >
  Terminal stage of the Learning Pipeline. Promote tier-classified,
  taxonomy-tagged proposals staged in per-issue STM by distill, reap,
  codify, or decode into product LTM artifacts under reviewer control,
  then archive
  the processed issue STM. Sole LTM write boundary.
intent: >
  Promote tier-classified, taxonomy-tagged proposals staged in per-issue
  STM into product LTM artifacts under reviewer control. The play
  accepts either a single issue identifier or no argument; with no
  argument it sweeps every non-archived, non-pending issue directory in
  turn. For each issue, it reads the staged proposals in their native
  source shape (distill, reap, codify, or decode), maps each proposal onto the
  structure of the product LTM artifact it targets, surfaces them to
  the reviewer at a granularity appropriate to their tier, applies the
  approved changes to product LTM, promotes any approved Tier 1 ADR
  draft content into the ADR archive with the next sequential number,
  and on success archives the entire issue STM directory so subsequent
  runs treat that issue as already processed. Outputs: updated product
  LTM artifacts, optionally a new ADR file, and a relocated issue STM
  directory under the archived subtree.

constraints:
  - id: C1
    rule: >
      Writes are confined to the product LTM tree (.garura/product/)
      and the ADR archive (docs/adr/); no writes to global knowledge
      base, core memory, or any path outside these two roots.
  - id: C2
    rule: >
      Every proposal consumed must carry the two-level taxonomy
      contract fields (learning_category, sub_category, _proposed flags
      where applicable, taxonomy_justification); proposals lacking any
      of these are rejected and not applied.
  - id: C3
    rule: >
      Proposals are read in the native shape emitted by their producing
      extractor (distill, reap, codify, or decode); the play detects the
      source per proposals file and applies a source-appropriate mapping onto
      the target LTM artifact structure without rewriting the source
      files.
  - id: C4
    rule: >
      Tier 1 proposals require explicit per-proposal reviewer approval
      before any write occurs; Tier 2 and Tier 3 proposals default to
      batch-with-diff approval and may be opted into per-proposal
      review.
  - id: C5
    rule: >
      On approval of a Tier 1 proposal that carries an ADR draft, the
      draft content is promoted into the ADR archive as a new ADR with
      the next sequential number, in addition to any LTM artifact write
      the proposal entails.
  - id: C6
    rule: >
      Idempotency is enforced by archival: after an issue's proposals
      are processed, the entire issue STM directory is moved into the
      archived subtree of the issues area, so a second invocation finds
      no source to re-apply.
  - id: C7
    rule: >
      Two invocation modes are supported: a single-issue mode that
      processes exactly one issue identifier, and a sweep mode that
      processes every issue directory currently present in the issues
      area excluding the archived and pending subtrees; both modes
      apply the same per-issue processing and archival behavior.
  - id: C8
    rule: >
      A malformed or unparseable source proposal halts processing of
      that proposal without partial writes to product LTM and without
      archiving the containing issue.
  - id: C9
    rule: >
      Promotion of recurring _proposed taxonomy values into the
      canonical taxonomy is out of scope for this play.
  - id: C10
    rule: >
      Evidence of the play's actions is recorded in the issue's
      evidence area before archival, and the evidence commit is
      non-blocking with respect to the play's success.

failure_conditions:
  - id: F1
    condition: >
      A product LTM artifact contains content sourced from a proposal
      that was missing one or more required taxonomy fields.
  - id: F2
    condition: >
      A write was made to a path outside the product LTM tree or the
      ADR archive.
  - id: F3
    condition: >
      The same proposal's content appears applied more than once across
      product LTM as a result of repeated invocations.
  - id: F4
    condition: >
      A Tier 1 proposal's content appears in product LTM or the ADR
      archive without a recorded explicit approval for that proposal.
  - id: F5
    condition: >
      An approved Tier 1 proposal carrying ADR draft content completed
      without a corresponding new ADR file in the ADR archive.
  - id: F6
    condition: >
      An issue's STM directory remains in the active issues area after
      its proposals were reported as successfully applied.
  - id: F7
    condition: >
      An issue's STM directory was archived while one or more of its
      proposals were neither applied nor explicitly rejected.
  - id: F8
    condition: >
      A malformed source proposal resulted in a partial product LTM
      write for that proposal.
  - id: F9
    condition: >
      A sweep-mode invocation processed a directory under the archived
      or pending subtrees of the issues area.

scenarios:
  - id: S1
    persona: Repository maintainer
    given: >
      A single issue's STM proposals file containing a mix of Tier 1,
      Tier 2, and Tier 3 entries with complete taxonomy fields.
    then: >
      Can review each Tier 1 entry individually, approve Tier 2 and
      Tier 3 entries as a batch with diffs, and observe the resulting
      updates in product LTM with the issue's STM directory now present
      only under the archived subtree.
  - id: S2
    persona: Repository maintainer
    given: >
      An issues area containing several unprocessed issue directories
      alongside archived and pending subtrees.
    then: >
      Can run the play with no issue argument and end up with every
      previously-unprocessed issue's approved changes reflected in
      product LTM and each of those issues relocated into the archived
      subtree, with archived and pending entries untouched.
  - id: S3
    persona: Repository maintainer
    given: >
      An issue whose proposals were applied and archived in a prior
      run.
    then: >
      Can re-invoke the play for that same issue and observe no further
      changes to product LTM and no error, because the source no longer
      exists at the active path.
  - id: S4
    persona: Architecture reviewer
    given: >
      A Tier 1 proposal that carries draft ADR content and is approved.
    then: >
      Can locate a new ADR file in the ADR archive bearing the next
      sequential number and content derived from the draft, alongside
      any in-place LTM edit the proposal also entailed.
  - id: S5
    persona: Repository maintainer
    given: >
      An issue whose proposals file contains one entry missing required
      taxonomy fields among otherwise valid entries.
    then: >
      Can confirm that the offending entry was rejected and not
      applied, that valid entries were processed per their tier rules,
      and that the issue's directory archival reflects only the
      resolved entries.
  - id: S6
    persona: Learning pipeline auditor
    given: >
      The archived subtree after a sweep-mode run.
    then: >
      Can trace, for each archived issue, the evidence of which
      proposals were approved, which were rejected, and what product
      LTM artifacts and ADRs were produced as a result.

version: 1.0.0
