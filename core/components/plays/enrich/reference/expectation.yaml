# Expectation for the enrich play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Incrementally regenerated for #381: added S7 (archive-gate guard, C11) and
# sharpened REC7's trigger to mirror the sharpened F7. S1-S6 and the other
# recovery entries are preserved verbatim from the prior vetted version.
# Two parts only: success_scenarios and recovery.

name: enrich

generated_from:
  intent: core/components/plays/enrich/reference/intent.yaml

vetted:
  status: approved
  approved_by: user (Tether at create-play checkpoint, #381)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# Lifted verbatim from the legacy intent scenarios (persona/given/then); each adds a
# binary, observable `measure` from which the scenario eval is compiled.
success_scenarios:
  - id: S1
    persona: Repository maintainer
    given: >
      A single issue's STM proposals file containing a mix of Tier 1,
      Tier 2, and Tier 3 entries with complete taxonomy fields.
    then: >
      Can review each Tier 1 entry individually, approve Tier 2 and
      Tier 3 entries as a batch with diffs, and observe the resulting
      updates in product LTM with the issue's STM directory now present
      only under the archived subtree.
    measure: >
      The archived reconciliation file records each Tier 1 entry with an individual
      approval record and Tier 2 / Tier 3 entries with a batch approval record; every
      product LTM artifact named in an approved entry reflects that change; and the
      issue path is absent under the active issues area but present under the archived
      subtree.
  - id: S2
    persona: Repository maintainer
    given: >
      An issues area containing several unprocessed issue directories
      alongside archived and pending subtrees.
    then: >
      Can run the play with no issue argument and end up with every
      previously-unprocessed issue's approved changes reflected in
      product LTM and each of those issues relocated into the archived
      subtree, with archived and pending entries untouched.
    measure: >
      For every issue directory active at run start (excluding the archived and pending
      subtrees), its approved changes are present in product LTM and the directory now
      lives under the archived subtree; every directory that was already under the
      archived or pending subtrees is byte-identical before and after the run.
  - id: S3
    persona: Repository maintainer
    given: >
      An issue whose proposals were applied and archived in a prior
      run.
    then: >
      Can re-invoke the play for that same issue and observe no further
      changes to product LTM and no error, because the source no longer
      exists at the active path.
    measure: >
      Re-invocation for the already-archived issue exits without error and product LTM
      plus docs/adr/ are byte-identical to their pre-re-invocation state.
  - id: S4
    persona: Architecture reviewer
    given: >
      A Tier 1 proposal that carries draft ADR content and is approved.
    then: >
      Can locate a new ADR file in the ADR archive bearing the next
      sequential number and content derived from the draft, alongside
      any in-place LTM edit the proposal also entailed.
    measure: >
      A new file docs/adr/NNNN-{slug}.md exists whose NNNN is one greater than the
      maximum ADR number that existed before the run, whose body matches the draft
      content, and whose frontmatter sourced_from equals the proposal's id; any in-place
      LTM edit the proposal entailed is present in its named target.
  - id: S5
    persona: Repository maintainer
    given: >
      An issue whose proposals file contains one entry missing required
      taxonomy fields among otherwise valid entries.
    then: >
      Can confirm that the offending entry was rejected and not
      applied, that valid entries were processed per their tier rules,
      and that the issue's directory archival reflects only the
      resolved entries.
    measure: >
      The archived reconciliation file lists the offending entry in rejected[] with
      reason missing_taxonomy and not in proposals[]; valid entries carry
      approval_status approved or rejected with approved entries' writes present in
      product LTM; no entry remains pending.
  - id: S6
    persona: Learning pipeline auditor
    given: >
      The archived subtree after a sweep-mode run.
    then: >
      Can trace, for each archived issue, the evidence of which
      proposals were approved, which were rejected, and what product
      LTM artifacts and ADRs were produced as a result.
    measure: >
      Every archived issue contains a reconciliation file recording each entry's final
      approval_status and an enrichment report listing every applied write with its
      target path and references to any ADRs produced during the run.
  - id: S7
    persona: Repository maintainer
    given: >
      An issue whose proposals include an approved entry whose write to
      product LTM reaches a terminal non-success state during the run.
    then: >
      Can confirm the issue was NOT archived, that it remains in the
      active issues area, and that the failed approved write was
      surfaced to the reviewer as a failure rather than reported as
      applied.
    measure: >
      The issue path is present under the active issues area and absent under the
      archived subtree, and the run's evidence / enrichment report records the approved
      entry's write with a terminal non-success status surfaced as a failure rather than
      listed among applied writes.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call. enrich is the LTM
# write boundary — its writes are outward-facing, so unwinding a bad LTM/ADR write or
# an authority-bearing decision routes to a human; the mechanical STM/archival
# failures route to autonomous.
recovery:
  - id: REC1
    for_failure: F1                 # LTM content from a taxonomy-incomplete proposal
    trigger: >
      A product LTM artifact contains content sourced from a proposal that was missing
      one or more required taxonomy fields.
    direction: >
      Only taxonomy-complete proposals may reach product LTM; a taxonomy-incomplete
      proposal must be rejected before any write, and the content it already placed in
      outward-facing LTM needs a human call to unwind.
    handoff: human
    derivable_at_l4: false
  - id: REC2
    for_failure: F2                 # write outside the product LTM / ADR roots
    trigger: >
      A write was made to a path outside the product LTM tree (.garura/product/) or the
      ADR archive (docs/adr/).
    direction: >
      Every write must land under .garura/product/ or docs/adr/; an out-of-boundary
      write touches a foreign root and needs a human call to reverse it safely.
    handoff: human
    derivable_at_l4: false
  - id: REC3
    for_failure: F3                 # same proposal applied more than once
    trigger: >
      The same proposal's content appears applied more than once across product LTM as a
      result of repeated invocations.
    direction: >
      Each proposal's content must appear in product LTM at most once; a duplicate
      application is an outward-facing LTM edit that needs a human call to deduplicate.
    handoff: human
    derivable_at_l4: false
  - id: REC4
    for_failure: F4                 # Tier 1 content without a recorded approval
    trigger: >
      A Tier 1 proposal's content appears in product LTM or the ADR archive without a
      recorded explicit approval for that proposal.
    direction: >
      No Tier 1 content may land without a recorded explicit approval; the missing
      approval is an authority the builder does not hold, so the unapproved write must
      escalate to a human.
    handoff: human
    derivable_at_l4: false
  - id: REC5
    for_failure: F5                 # approved Tier 1 ADR draft with no ADR file
    trigger: >
      An approved Tier 1 proposal carrying ADR draft content completed without a
      corresponding new ADR file in the ADR archive.
    direction: >
      Every approved Tier 1 proposal that carries ADR draft content must yield exactly
      one new ADR file at the next sequential number; promote the missing draft into the
      ADR archive.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC6
    for_failure: F6                 # issue STM lingers in active area after success
    trigger: >
      An issue's STM directory remains in the active issues area after its proposals were
      reported as successfully applied.
    direction: >
      A successfully processed issue must not remain in the active area; move the issue
      STM directory into the archived subtree.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # archived while an approved write was unconfirmed and entry not rejected
    trigger: >
      An issue's STM directory was archived while one or more of its proposals lacked a
      confirmed successful write to product LTM and was not explicitly rejected.
    direction: >
      Archival must happen only after every approved proposal has a confirmed successful
      write to product LTM and every other proposal is explicitly rejected; restore the
      prematurely archived issue to the active area, ensure every approved proposal's
      write actually lands or is explicitly rejected, then re-archive.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8                 # malformed proposal caused a partial LTM write
    trigger: >
      A malformed source proposal resulted in a partial product LTM write for that
      proposal.
    direction: >
      A malformed proposal must produce no LTM write at all; the partial outward-facing
      write it left behind needs a human call to unwind cleanly.
    handoff: human
    derivable_at_l4: false
  - id: REC9
    for_failure: F9                 # sweep processed an archived/pending directory
    trigger: >
      A sweep-mode invocation processed a directory under the archived or pending
      subtrees of the issues area.
    direction: >
      Sweep mode must enumerate only active issue directories; exclude the archived and
      pending subtrees from the enumeration and re-run without them.
    handoff: autonomous
    derivable_at_l4: true
