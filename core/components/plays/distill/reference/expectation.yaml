# Expectation for the distill play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: distill

generated_from:
  intent: core/components/plays/distill/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Developer
    given: >
      ship completes on a non-trivial PR for an issue that had a prior enhance or
      fix-it run, with STM evidence available in {stm_base}/{issue}/evidence/
    then: >
      Learning proposals are staged at
      {stm_base}/{issue}/evidence/distill/proposals.yaml.
      The proposals reference specific diff evidence and STM artifacts.
      The ship evidence file records Mode 1 outcome as "completed" with proposals_path.
      Product LTM is unchanged.
    measure: >
      proposals.yaml exists under {stm_base}/{issue}/evidence/distill/, each proposal
      cites concrete diff evidence and/or an STM artifact path, the distill return
      struct has status "completed" with a non-null proposals_path, and no file under
      {product_base} was created or modified by the run.
  - id: S2
    persona: Developer
    given: >
      ship completes on a trivial PR (documentation-only changes, version bump,
      or formatting fix) with no STM evidence of non-trivial design work
    then: >
      No proposals.yaml is written. distill returns
      { status: "completed", no_learnings: true, proposals_path: null }.
      Ship evidence file records Mode 1 outcome as "completed — no learnings detected".
      Product LTM is unchanged.
    measure: >
      No proposals.yaml is present under {stm_base}/{issue}/evidence/distill/, the
      distill return struct is exactly status "completed" with no_learnings true and
      proposals_path null, and no file under {product_base} was created or modified.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # failure of distill halts or delays ship
    trigger: >
      distill propagated an exception or a non-zero exit to ship's orchestrator, or
      otherwise halted or delayed the ship pipeline instead of returning a result struct.
    direction: >
      distill must always return gracefully — any error at any stage is caught and
      logged, and the run returns { status: "skipped", reason: "<error>" } so ship
      continues to scenario validation; never let the failure escape to the caller.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2                 # proposals written directly to product LTM
    trigger: >
      proposals.yaml (or any distill output) was written to a path under {product_base}
      instead of {stm_base}/{issue}/evidence/distill/.
    direction: >
      The only valid output path is {stm_base}/{issue}/evidence/distill/; re-stage the
      write there and remove any artifact that landed under {product_base} — product LTM
      is read-only for this play.
    handoff: autonomous
    derivable_at_l4: true
