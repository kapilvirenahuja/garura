# Expectation for the fix-it play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: fix-it

generated_from:
  intent: core/components/plays/fix-it/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Developer
    given: >
      A developer runs fix-it against an open bug issue. The play
      completes all phases: RCA, design, checkpoint approval, implementation,
      and shipping.
    then: >
      The fix is merged to main, the PR links to the originating issue, the
      feature branch is deleted, the evidence artifact contains the full
      RCA trace, design rationale, implementation record, and merge SHA, and
      issue-comment-agent.yaml exists in evidence tracking background dispatch
      status.
    measure: >
      The evidence directory contains rca.yaml (non-empty root_cause),
      design.yaml (non-empty alternatives_considered), implementation-report.yaml
      (files_modified), and a delivery record ({YYYYMMDD-HHMMSS}.md) that carries
      the merge SHA on main and a PR URL referencing issue #{issue}; the delivery
      record confirms branch_deleted: true; and issue-comment-agent.yaml exists
      with status dispatched or completed.
  - id: S2
    persona: Tech Lead
    given: >
      A tech lead reviews the checkpoint brief during the single approval
      gate.
    then: >
      The checkpoint shows inline markdown sections rendered directly from STM
      artifacts: root cause traced to specific code (not just symptoms), blast
      radius of affected files, proposed fix strategy, at least one alternative
      considered with rejection reason, and confidence assessment. Enough
      information to make an informed Tether or Vanish decision.
    measure: >
      The Step 5 inline checkpoint markdown — derived from STM YAML with no
      standalone brief file — contains a root cause section naming a specific
      file and logic (from rca.yaml), a blast radius table with at least one
      affected-file row (from design.yaml.affected_files), a fix strategy (from
      design.yaml), at least one alternative with a rejection reason (from
      design.yaml.alternatives_considered), and a confidence value (from
      design.yaml.confidence).
  - id: S3
    persona: QA Engineer
    given: >
      A QA engineer examines the PR and evidence after the fix is shipped.
    then: >
      The PR body and evidence artifact allow tracing: what was changed, why
      (root cause), what the blast radius was, and that the design was
      approved before implementation. The fix is auditable end-to-end.
    measure: >
      The PR body references issue #{issue} (e.g., Closes #N or Fixes #N) and
      summarizes the root cause and changed files; the delivery record contains
      the root cause summary, the list of files modified, the blast radius, and a
      checkpoint approval timestamp strictly earlier than the
      implement-fix.started_at timestamp in the status file.
  - id: S4
    persona: QA Engineer reviewing audit trail
    given: >
      fix-it runs to completion: RCA and fix design produced, checkpoint
      approved via Tether, implementation and shipping complete.
    then: >
      The GitHub issue carries a timestamped RCA-approved comment with root
      cause, fix strategy, and Approved-by header posted at the Tether event
      — before the PR is opened. The comment is traceable to the STM evidence
      via the issue-comment-agent.yaml tracking artifact.
    measure: >
      GitHub issue #{issue} carries a comment with an "Approved by" header and
      timestamp, the root cause text matching rca.yaml.root_cause, the fix
      strategy from design.yaml, and the "## RCA & Fix Plan — Approved" heading
      from the issue-comment-rca-approved.md template; the comment creation
      timestamp is earlier than the PR's created_at, and issue-comment-agent.yaml
      carries a dispatched_at at or before the comment creation timestamp.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # implementation began without an approved Tether
    trigger: >
      An implementation artifact (implementation-report.yaml) exists, or the
      implement-fix task entered in_progress, while the approval-gate task is not
      completed with a tether_received_at timestamp earlier than implementation start.
    direction: >
      Implementation must only begin after the single human checkpoint is approved
      via Tether; the approval is an authority the builder lacks — hold for the
      human Tether (or Vanish) before any implementation step runs.
    handoff: human
    derivable_at_l4: false
  - id: REC2
    for_failure: F2                 # RCA has no root cause / restates the issue
    trigger: >
      rca.yaml is missing, its root_cause is empty, or root_cause is textually a
      restatement of the issue title or body rather than a traced cause.
    direction: >
      The RCA must trace symptom to a specific file, the specific logic, and why it
      is wrong, distinct from the issue text; re-run the RCA to produce a traced
      root cause before continuing.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC3
    for_failure: F3                 # fix design has no alternatives_considered
    trigger: >
      design.yaml is missing or its alternatives_considered list is empty, or an
      entry lacks a non-empty rejection_reason.
    direction: >
      The fix design must carry at least one alternative considered with the reason
      it was rejected; re-run the design step to add the alternative(s) before the
      checkpoint.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC4
    for_failure: F4                 # ship completed partially
    trigger: >
      Commits exist but no PR was created, or a PR exists but was not merged,
      leaving the branch in an intermediate post-ship state.
    direction: >
      Shipping must run to completion — commit, PR, merge, branch delete; resume
      the ship pipeline from the first incomplete step to reach a fully merged,
      branch-deleted state.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # issue absent or not open at start
    trigger: >
      The issue does not exist on GitHub, or it is not in an open state, when the
      play starts.
    direction: >
      A fix requires an existing open issue; this is an external state the builder
      cannot grant — escalate for the human to provide or reopen a valid open issue
      before the play proceeds.
    handoff: human
    derivable_at_l4: false
  - id: REC6
    for_failure: F6                 # changes outside affected_files, undocumented
    trigger: >
      implementation-report.yaml lists a file in files_modified that is absent from
      design.yaml.affected_files and carries no deviation_justification.
    direction: >
      Modifications must stay within the design's affected_files, or carry a
      documented deviation justification; restrict the change to the mapped files
      or record the justification before shipping.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # builder received checkpoint brief content
    trigger: >
      The code-builder invocation contract carries a checkpoint brief path, an HTML
      file path, or inline rendered checkpoint markdown in any field.
    direction: >
      The builder contract must carry only the STM design paths plus the
      regression-test path in read_only_files; rebuild the contract stripping all
      checkpoint brief content before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8                 # missing resolution trace when ltm_context given
    trigger: >
      The tech-designer contract included an ltm_context block but
      resolution-trace.yaml is missing, empty, or contains zero entries.
    direction: >
      When ltm_context is provided, the RCA must emit a non-empty resolution trace
      recording which knowledge layer answered each domain question; re-run the RCA
      to produce the trace before continuing.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC9
    for_failure: F9                 # standalone HTML artifact under evidence
    trigger: >
      A standalone HTML artifact (or a briefs/ directory) exists under
      evidence/fix-it/ after the checkpoint preparation phase.
    direction: >
      The checkpoint is rendered inline from STM YAML with no standalone HTML
      artifact; remove the HTML artifact (and any briefs/ directory) so the
      evidence directory holds none.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC10
    for_failure: F10                # no issue-comment tracking artifact after Tether
    trigger: >
      Tether was received but issue-comment-agent.yaml was not written (or remains
      status: pending) before Step 6 begins.
    direction: >
      On Tether, the issue-comment tracking artifact must be written before
      implementation starts; write the dispatched tracking stub (with a
      dispatched_at timestamp) before implement-fix transitions to in_progress.
    handoff: autonomous
    derivable_at_l4: true
