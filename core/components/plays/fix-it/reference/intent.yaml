name: fix-it
intent: >
  Given an existing open issue describing a defect, perform thorough root cause
  analysis tracing symptoms to the specific code and logic that is wrong, design
  a fix with alternatives considered, present RCA findings and fix design at a
  single human checkpoint for approval, then upon approval implement the fix
  (with independent verification by quality-auditor) and ship it (commit, PR,
  merge) fully autonomously. The end state is: fix merged to main, feature
  branch deleted, issue traceable in commit and PR history.

constraints:
  - id: C1
    rule: >
      Must have an existing open issue. If no issue is resolvable from the
      branch name or arguments, halt immediately.
  - id: C2
    rule: >
      Must not run on main/master/default branch for implementation. A feature
      branch is created if needed using the convention fix/{issue}-{slug}.
  - id: C3
    rule: >
      RCA must trace from symptom to specific root cause — the file, the logic,
      and why it is wrong. Restating the issue title or problem description is
      not RCA.
  - id: C4
    rule: >
      Fix design must include at least one alternative considered with the
      reason it was rejected.
  - id: C6
    rule: >
      There is exactly one human checkpoint — after RCA and fix design are
      complete. This checkpoint is never skippable. It is always presented.
  - id: C7
    rule: >
      After the checkpoint is approved via Tether, all remaining steps
      (implementation and shipping) execute without any further human approval.
  - id: C8
    rule: >
      The implementation agent reads design artifacts from STM paths. It MUST
      NOT receive or read the checkpoint brief content.
  - id: C9
    rule: >
      The shipping phase delegates to the ship sub-play with
      approval_override set to auto-proceed, suppressing all ship's internal
      checkpoints.
  - id: C10
    rule: >
      All domain work is delegated to agents. The play orchestrator never
      executes direct git, gh, or codebase analysis commands.
  - id: C11
    rule: >
      The RCA and design agent contract must include ltm_context with
      project_base pointing to the product's architecture directory (when
      product architecture artifacts exist) and core_base pointing to core
      memory. The agent follows the R1-R4 resolution protocol from
      standards/rules/resolution.md. The resolution trace is written to
      STM evidence and included in the output contract. When product_base
      has no architecture artifacts, ltm_context omits project_base and
      the agent resolves against core LTM only (R3-R4).
  - id: C12
    rule: >
      The checkpoint summary is rendered inline from STM YAML artifacts;
      no standalone HTML artifact is produced.
  - id: C13
    rule: >
      On Tether approval, the play immediately dispatches a background
      update to the originating issue thread mirroring the approved RCA
      and fix plan; this dispatch is tracked in STM and is non-blocking
      — it does not gate subsequent implementation steps.
  - id: C14
    rule: >
      TDD invariant: tech-designer MUST author a failing regression-test artifact
      to the repo's canonical eval path before code-builder is invoked. The play
      enforces the red-before-green invariant — the regression test must exist and
      be failing prior to implementation. This is not delegated to builder
      self-report; the play verifies test existence from the path returned in the
      tech-designer output contract (stm.output.regression_test_path).
  - id: C15
    rule: >
      Validator-not-implementer: verification MUST be executed by quality-auditor,
      never by the agent that implemented the fix. code-builder MUST NOT run its
      own post-implementation verification. quality-auditor receives the
      regression_test_path and project_root and writes an exit-code-style verdict
      to STM (regression_test_verdict: pass | fail).
  - id: C16
    rule: >
      Independent signal: the pass/fail verdict MUST come from quality-auditor's
      report written to STM. Builder self-report (any claim in code-builder's
      output that the fix works or tests pass) is not a valid verification signal
      under any circumstances and MUST NOT be used as the basis for shipping.
  - id: C17
    rule: >
      Contract-level test-file isolation: the code-builder JSON contract MUST
      include the source-file paths to modify (via design.yaml affected_files)
      and the regression-test file path in read_only_files. It MUST NOT include
      the test file content, test assertion text, or eval entries inline. Only
      the path reference is permitted in the builder contract.
  - id: C18
    rule: >
      Play-owned task list: status/fix-it.json is extended with a task_list
      array. The play is the sole writer of task_list; agents may propose
      additions but MUST NOT mutate task_list directly. task_list is initialized
      from RCA output before code-builder is invoked. Each entry contains: id,
      description, status (pending | in_progress | completed | failed),
      retry_count, and regression_test_path.
  - id: C19
    rule: >
      Retry cap and re-plan: per-task retry cap is 2. On verification failure
      after retry exhaustion, the play invokes tech-designer to revise the
      current task or insert a new task. If the re-plan grows total task_list
      beyond 6 entries or inserts more than 3 new tasks, the play emits a
      warning to stdout but DOES NOT halt and DOES NOT escalate to /enhance;
      it continues with the expanded plan.

failure_conditions:
  - id: F1
    condition: >
      The play proceeds to implementation without the human approving the
      checkpoint via Tether.
  - id: F2
    condition: >
      The RCA output contains no root cause identification, or the root cause
      is a restatement of the issue title or problem description.
  - id: F3
    condition: >
      The fix design contains no alternatives_considered entries.
  - id: F4
    condition: >
      Shipping completes partially — commits exist but no PR was created, or
      a PR exists but was not merged — leaving the branch in an intermediate
      state.
  - id: F5
    condition: >
      The issue does not exist on GitHub or is not in an open state when the
      play starts.
  - id: F6
    condition: >
      The implementation creates changes in files not listed in the design's
      affected_files map without documented justification in the evidence.
  - id: F7
    condition: >
      The code-builder agent receives checkpoint brief content in its input
      contract, violating Structure A context isolation.
  - id: F8
    condition: >
      The tech-designer produces RCA or fix design without a resolution trace
      when ltm_context was provided in the contract. The resolution trace is
      missing, empty, or contains zero entries.
  - id: F9
    condition: >
      A standalone HTML artifact exists under the evidence/fix-it/ directory
      after the checkpoint preparation phase.
  - id: F10
    condition: >
      Tether is received but no issue-comment tracking artifact is written
      to STM before Step 6 begins.

version: 1.2.0
