intent: |
  Given a completed epic (post-validate), reconcile the full product LTM by
  comparing what prepare-epic knew at planning time (the context baseline)
  against what actually happened during implementation and validation. Detect
  changes across three tiers: foundational artifacts that should NOT have
  changed (ADR if they did), artifacts that need enrichment from implementation
  outcomes, and new content that needs to be added. Archive the issue's STM
  directory after reconciliation. The issue must be in a closed state before
  any work proceeds.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Archival (UNCHANGED from original)
# ═══════════════════════════════════════════════════════════════════════════

constraints:
  - id: C1
    rule: >
      The issue must be in a closed state before archival proceeds.
      Open or in-progress issues must not be archived.

  - id: C2
    rule: >
      Archival moves the complete issue STM directory to
      _archive/{YYYY-MM}/{issue}/ where {YYYY-MM} is derived from the
      issue's close date. Every file and subdirectory present in the
      original STM directory must be present in the archive location.

  - id: C3
    rule: >
      The original STM directory is removed from the active workspace
      after the archive copy is confirmed complete. The active workspace
      must not contain the issue's STM directory when the play finishes.

  - id: C4
    rule: >
      The archive directory structure mirrors the original STM directory
      structure. No files are renamed, restructured, or modified during
      the move.

# ═══════════════════════════════════════════════════════════════════════════
# CONSTRAINTS — Product LTM Reconciliation
# ═══════════════════════════════════════════════════════════════════════════

  - id: C5
    rule: >
      STM artifacts are read-only during analysis. The knowledge-extractor
      reads context and evidence but does not modify any STM artifact.

  - id: C6
    rule: >
      Three-tier analysis model. Every product LTM artifact is classified
      into exactly one tier:
        Tier 1 (foundational, check-only): project-profile, logical-architecture,
          physical-architecture, nfr-spec, quality-vision, design-patterns.
          These SHOULD NOT change. If implementation evidence shows they did
          change, produce an ADR proposal + impact assessment. Never silently
          update a Tier 1 artifact.
        Tier 2 (enrichment): research/{domain}.md (Experiential sections),
          enriched-capabilities, scope/epics/{id}.yaml (post_implementation),
          quality-profile, mvp-recommendation, scope.yaml.
          These are updated in place with implementation outcomes.
        Tier 3 (additions): domain-selection (new domains), new research/{domain}.md,
          new experience/screens/, new experience/flows/, personas.md, design-spec.md.
          These are proposed only when implementation evidence demonstrates
          new content that does not exist in product LTM.

  - id: C7
    rule: >
      Primary inputs are the context baseline and implementation outcomes.
      The context baseline is {stm_base}/{issue}/context/ — what prepare-epic
      curated as the knowledge the epic needed at planning time. Implementation
      outcomes are the evidence produced by implement-epic and validate-epic:
      milestones, verdicts, status-reports, e2e-results, arbiter-verdicts,
      judge-reports, code changes, and test results.

  - id: C8
    rule: >
      check-drift spec-correction-manifest is consumed as input when present
      at {stm_base}/{issue}/evidence/check-drift/. Findings from check-drift
      are incorporated into the reconciliation — not re-derived. If no
      check-drift output exists, the play performs its own comparison.

  - id: C9
    rule: >
      All writes target product LTM ({product_base}/). No writes to global
      core LTM (~/.meridian/core/memory/). No standalone knowledge files
      created outside the existing product LTM artifact structure.

  - id: C10
    rule: >
      Enrichment proposals follow the format of their target artifact.
      research/{domain}.md enrichments use the Experiential section format
      from kb-extension.md. Epic enrichments use the post_implementation
      schema from intent-epic.yaml. Architecture annotations use the
      existing YAML structure of the target artifact.

  - id: C11
    rule: >
      No product LTM write without human approval. All enrichment proposals
      are staged in STM as a reconciliation report for review before any
      write to product LTM.

  - id: C12
    rule: >
      Tier 1 changes produce ADR proposals with: what changed, why it
      changed (evidence from implementation), impact on downstream artifacts,
      and recommended next steps. ADRs are written to the product's ADR
      location. An impact assessment identifies which other epics, components,
      or NFRs are affected by the change.

  - id: C13
    rule: >
      If product LTM artifacts for a tier are absent (e.g., build-arch was
      not run, so architecture/ does not exist), that tier is skipped with
      a warning in the reconciliation report. Missing product LTM is not
      a hard failure — the play processes whichever tiers have artifacts.

  - id: C14
    rule: >
      Epic post_implementation section is the write target for delivery
      status and retrospective data. Fields: status (delivered/partial/
      deferred/cancelled), delivered_scope, deferred_items, scope_additions,
      hypothesis_result, assumptions_validated, constraints_met, lessons.
      Schema defined in intent-epic.yaml.

  - id: C15
    rule: >
      When the diff between context baseline and implementation outcomes
      produces no enrichment candidates across all three tiers, the
      reconciliation phase exits cleanly with zero proposals. No files
      are written to product LTM. Evidence records the zero-proposal outcome.

  - id: C16
    rule: >
      Archival proceeds AFTER reconciliation. The play first analyzes and
      writes approved enrichments, then archives the STM directory. This
      ensures the reconciliation can read the full STM before it is moved.

# ═══════════════════════════════════════════════════════════════════════════
# FAILURE CONDITIONS — Archival (UNCHANGED from original)
# ═══════════════════════════════════════════════════════════════════════════

failure_conditions:
  - id: F1
    condition: >
      The archive directory at _archive/{YYYY-MM}/{issue}/ does not exist
      or is empty after the play completes.

  - id: F2
    condition: >
      The original STM directory still exists at its active workspace
      location after the play completes.

  - id: F3
    condition: >
      The archive is incomplete — files or subdirectories present in the
      original STM directory are missing from the archive location.

  - id: F4
    condition: >
      The archive path uses an incorrect date — the {YYYY-MM} segment
      does not match the issue's actual close date.

  - id: F5
    condition: >
      The play attempts to archive an issue that is not in a closed state.

# ═══════════════════════════════════════════════════════════════════════════
# FAILURE CONDITIONS — Product LTM Reconciliation
# ═══════════════════════════════════════════════════════════════════════════

  - id: F6
    condition: >
      Product LTM artifact written without human approval — enrichment
      bypassed the staging and review checkpoint.

  - id: F7
    condition: >
      Standalone knowledge file created outside the product LTM artifact
      structure (e.g., a new file in global core LTM or an ad-hoc
      location not in the product_base directory tree).

  - id: F8
    condition: >
      Tier 1 foundational artifact modified without producing an ADR
      proposal and impact assessment. Silent updates to project-profile,
      logical-architecture, nfr-spec, quality-vision, or design-patterns
      are structural failures.

  - id: F9
    condition: >
      Enrichment written to the wrong artifact or wrong section — e.g.,
      domain learning written to an architecture file, or post_implementation
      data written to the wrong epic.

  - id: F10
    condition: >
      Tier 1 change detected but no impact assessment produced. The ADR
      alone is insufficient — downstream impact on other epics, components,
      and NFRs must be identified.

  - id: F11
    condition: >
      check-drift findings re-derived instead of consumed from the existing
      spec-correction-manifest when one is present.

# ═══════════════════════════════════════════════════════════════════════════
# SCENARIOS
# ═══════════════════════════════════════════════════════════════════════════

scenarios:
  - id: S1
    persona: "Engineering lead reviewing agent-produced work"
    given: "The archived STM directory at _archive/{YYYY-MM}/{issue}/"
    then: >
      Can review the complete history of how an issue was worked —
      evidences, checkpoints, analysis, and delivery artifacts — to build
      trust in agent-produced outcomes and verify that nothing was lost
      during archival.

  - id: S2
    persona: "Developer starting the next feature"
    given: "The active STM workspace after capture-learning completes"
    then: >
      Can confirm the completed issue's directory is no longer cluttering
      the active workspace, reducing noise when navigating current work.

  - id: S3
    persona: "Tech Lead reviewing post-epic reconciliation"
    given: "A completed epic where implementation deviated from the architecture"
    then: >
      Can see Tier 1 check results showing which foundational artifacts
      were validated, any ADR proposals for detected changes, and impact
      assessments identifying affected downstream artifacts. Can approve
      or reject each ADR before it is written.

  - id: S4
    persona: "Developer preparing the next epic in the same domain"
    given: "capture-learning enriched the domain research file after the prior epic"
    then: >
      When prepare-epic runs for the next epic, the Experiential section
      in research/{domain}.md contains lessons, failure patterns, and
      capability observations from the prior implementation — so the
      next epic benefits from what was learned without manual knowledge
      transfer.

  - id: S5
    persona: "Operator running capture-learning on a trivial bug fix"
    given: "The issue produced no meaningful delta between context and outcomes"
    then: >
      Reconciliation phase exits cleanly with zero proposals. Archival
      completes normally. No files written to product LTM. Evidence
      records the zero-proposal outcome.

  - id: S6
    persona: "PM reviewing delivery status across epics"
    given: "capture-learning wrote post_implementation to the epic's YAML"
    then: >
      Can read the epic file and see: delivery status, which in_scope
      items were delivered vs deferred, any scope additions with
      justification, hypothesis validation result, and constraints
      actually met — all in one structured section alongside the
      original specification.
