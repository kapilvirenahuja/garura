# Expectation for the create-pr play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: create-pr

generated_from:
  intent: core/components/plays/create-pr/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: Code Reviewer
    given: A pull request on the git platform
    then: >
      Can assess whether the changes are safe to merge, understand the
      rationale via the checklist and evidence, and trace the work back
      to the originating issue — sufficient to approve, reject, or
      comment without needing external context.
    measure: >
      The PR body contains a change summary, a quality checklist whose every item
      carries a trigger reason tied to an actual change, a non-empty evidence entry
      per item, a resolvable link to the originating issue, and embedded eval results
      when evals ran — a reviewer can reach an approve/reject/comment decision from the
      PR alone, with no field missing.
  - id: S2
    persona: Author (Developer)
    given: A pull request on the git platform with eval results
    then: >
      Can verify that all changes are accounted for in the checklist,
      that evidence supports each item, and that the PR is linked to
      the correct issue — confident the PR is submission-ready.
    measure: >
      Every change in the diff is reflected by at least one checklist item, every
      checklist item has a backing evidence entry, the linked issue matches the issue
      the work was done against, and eval results are present in the PR body — leaving
      no checklist item unbacked and no diff change unaccounted for.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # PR has no linked issue
    trigger: >
      The PR body contains no resolvable link to an originating issue, or the linked
      issue cannot be resolved on the platform.
    direction: >
      Every PR must link to its originating issue; the correct issue must be identified
      and the link added — mapping the work to the right external issue is a judgment
      the builder cannot make on its own.
    handoff: human
    derivable_at_l4: false
  - id: REC2
    for_failure: F2                 # generic checklist items not tied to the diff
    trigger: >
      The quality checklist contains items with no trigger reason tying them to an
      actual change in the diff, or generic boilerplate items unrelated to what changed.
    direction: >
      Every checklist item must be tailored to the actual changes; regenerate the
      checklist from the diff so each item traces to a real change, dropping any generic
      item that does not.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC3
    for_failure: F3                 # checklist items lack evidence backing
    trigger: >
      One or more checklist items have no evidence entry, or the evidence entry is empty.
    direction: >
      Every checklist item must carry evidence derived from the actual changes; fill in
      the missing evidence by analysing the diff for each unbacked item.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC4
    for_failure: F4                 # evals passed but PR body has no eval results
    trigger: >
      Evals were run and passed, but the PR body (or its comments) does not contain the
      eval results.
    direction: >
      When evals pass, their results must appear in the PR; embed the recorded eval
      results into the PR body.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # low-confidence target branch, user not asked
    trigger: >
      The PR targets a branch that was selected with less than high confidence, and no
      user confirmation of that target was recorded before creation.
    direction: >
      A less-than-high-confidence target branch must be confirmed by the user before the
      PR is created; pause for that confirmation rather than auto-submitting — granting
      that go-ahead is an authority the builder lacks.
    handoff: human
    derivable_at_l4: false
