name: codify
description: >
  Brownfield bootstrap. Reverse-engineer a product's full LTM artifact tree from
  an existing codebase — producing the same file set that /specify + /design +
  /arch would have produced, but via code inference rather than user interview.
  All output is staged as proposals in STM. Nothing is written to product LTM
  during this play — the /garura:enrich play is the only promotion gate.

version: "0.1.0"

checksum: "placeholder-replaced-by-create-play-build"

intent: >
  A product owner with an existing codebase — from a single 10k-LOC service to
  a million-LOC multi-repo monolith — invokes /codify to derive the Garura
  product LTM that the code already embodies. The play executes a deterministic
  scan of the codebase via a companion scan script, builds a bounded structured
  index (scan-index.json), and then delegates inference of each LTM artifact to
  existing framework agents (tech-architect, test-engineer, product-keeper, and
  conditionally designer). Every inferred decision is marked
  source_type: inferred_from_code and carries its evidence path(s) plus a
  confidence rating. Output shape matches exactly what specify+design+arch
  produce — existing validators pass on codify's output unchanged. All proposals
  are staged under {stm_base}/{issue}/evidence/codify/proposals/ with a master
  proposals.yaml index classified by the same two-level learning taxonomy used
  by /reap. A single Tether/Vanish checkpoint gates evidence commit. No writes
  to product LTM occur during this play — the /garura:enrich play is the sole
  promotion path from STM proposals to product LTM. codify is the /specify +
  /design + /arch equivalent for brownfield; /garura:enrich is the next step in that
  pipeline. /check-drift has no role in the brownfield flow — it is used later,
  on ongoing work, to detect divergence between code and already-established
  product LTM.

constraints:
  - id: C0
    rule: >
      Issue resolution: the play requires a GitHub issue number to anchor its
      STM output paths. Resolution order: (a) explicit --issue argument;
      (b) current branch name matching pattern codify/{issue}-* or
      feat/{issue}-codify-*; (c) if neither, the play delegates to
      project-orchestrator to create a new tracking issue from invocation args
      (root paths, target filter, incremental flag). The resolved issue number
      is written to {stm_base}/{issue}/status/codify.json before any scan or
      inference work begins. No issue number resolvable AND no issue creatable
      is a hard halt — no STM target means no place to stage proposals.

  - id: C1
    rule: >
      The play writes ONLY to {stm_base}/{issue}/evidence/codify/ and to
      {stm_base}/{issue}/status/codify.json, where {issue} is the number
      resolved per C0. No writes to product LTM ({product_base}) occur during
      this play run. No writes to global core LTM (~/.garura/core/memory/)
      occur. Any attempted write outside the permitted STM paths is a
      constraint violation.

  - id: C2
    rule: >
      A deterministic scan script at core/components/plays/codify/lib/scan.*
      runs BEFORE any agent dispatch or LLM inference. Its output,
      scan-index.json, is the sole structured input to every inference agent
      in later phases. Agents MUST reason over the index; they MUST NOT
      navigate the codebase at large as their primary source. Targeted file
      reads are permitted only for paths explicitly named in scan-index.json
      and only for the subset specified in each agent's contract.

  - id: C3
    rule: >
      scan-index.json is bounded in size and coverage. The scan script enforces
      a default hard size cap of 10 MB and a default soft wall-clock budget of
      600 seconds. If either cap is reached during scanning, the script writes
      a partial index with scan_status: "budget_exhausted" and records the
      paths that contributed the most bytes. The play presents the partial
      status to the user for confirmation before inference proceeds. A scan
      that crashes or produces no index at all is a hard halt.

  - id: C4
    rule: >
      Every proposal produced by this play MUST carry three fields:
        source_type: "inferred_from_code" (string, required, exactly this value)
        evidence: non-empty list of scan-index entry IDs and/or repository file
          paths that drove the inference
        confidence: one of "high" | "medium" | "low"
      A proposal missing any of these fields is invalid and MUST be rejected
      at validation before it reaches the checkpoint.

  - id: C5
    rule: >
      Output shape matches exactly the artifact schemas produced by /specify,
      /design, and /arch. The following target artifacts are produced as
      proposals under {stm_base}/{issue}/evidence/codify/proposals/, preserving
      the same relative paths and filenames that product LTM uses:
        user-provided/project-profile.yaml
        specification/domain-selection.yaml
        specification/quality-profile.yaml
        specification/market-brief.md
        scope/mvp-recommendation.md
        scope/scope.yaml
        scope/garura:enriched-capabilities.yaml
        scope/features.yaml
        scope/epics/{epic-id}.yaml            (one file per derived epic)
        research/{domain}.md                   (one file per detected domain)
        experience/personas.md                 (only if frontend detected)
        experience/screens/{screen-id}.md      (only if frontend detected)
        experience/flows/{flow-id}.md          (only if frontend detected)
        experience/design-system.md            (only if frontend detected)
        experience/design-spec.md              (only if frontend detected)
        architecture/logical-architecture.yaml
        architecture/physical-architecture.yaml
        architecture/nfr-spec.yaml
        architecture/quality-vision.yaml
        architecture/design-patterns.yaml
      Proposals MUST pass the corresponding schema validators (validate-intent-epics,
      validate-architecture-spec, validate-screen-coverage, validate-abstraction-layer)
      unchanged. Validator failures halt the play before checkpoint.

  - id: C6
    rule: >
      Three-tier classification inherited from /reap is applied uniformly:
        Tier 1 (foundational — ADR-worthy): user-provided/project-profile,
          architecture/logical-architecture, architecture/physical-architecture,
          architecture/nfr-spec, architecture/quality-vision,
          architecture/design-patterns.
        Tier 2 (enrichment): specification/quality-profile, scope/scope,
          scope/garura:enriched-capabilities, scope/features, scope/mvp-recommendation,
          research/{domain}.md, scope/epics/{id}.yaml.
        Tier 3 (addition): new domains not present in KB, new epics, new
          experience artifacts for frontends.
      Every proposal declares its tier in proposals.yaml. Tier 1 proposals that
      conflict with an existing LOCKED product LTM artifact carry an adr_draft_path
      pointing to a staged ADR under {stm_base}/{issue}/evidence/codify/adrs/.

  - id: C7
    rule: >
      Every proposal carries a two-level learning taxonomy per /reap's C7:
        learning_category: one of {arch | domain | product | quality | standards}
        sub_category: canonical child for parents with children
          (arch, quality, standards); null for flat parents (domain, product).
      Canonical taxonomy tree (source of truth: core/components/memory/):
        arch      → agentic | data | operations | patterns | platforms | stacks
        domain    → (flat)
        product   → (flat)
        quality   → architecture | backend | code | data | documentation | frontend |
                    operations | performance | security | tech-debt | testing
        standards → rules | schemas | templates
      A proposal missing a required taxonomy field is invalid and MUST be rejected.
      Proposed-new values require a taxonomy_justification block per /reap C7a.

  - id: C8
    rule: >
      Designer agent is invoked ONLY when the scan detects a frontend. Frontend
      detection is a deterministic rule evaluated by scan.*:
        Any of — a dependency match for react|vue|svelte|angular|solid|qwik|
        preact|lit|ember in any manifest; presence of any directory named
        src/components|src/pages|src/views|src/routes|app/pages|app/routes;
        presence of public/index.html or index.html at repo root.
      If no frontend is detected, experience/* proposals are skipped with a
      recorded warning in proposals.yaml under skipped_phases. Invoking designer
      when no frontend is detected is a structural failure.

  - id: C9
    rule: >
      Multi-repo support: codify accepts one or more codebase roots via its
      invocation arguments (--path <dir> may repeat). scan-index.json aggregates
      across roots, preserving per-root file path prefixes and declaring a
      repos: [...] header. Inference agents see unified input. Per-repo
      architecture artifacts are permitted when clear boundaries exist —
      logical-architecture.yaml may declare multiple bounded_contexts keyed to
      repos.

  - id: C10
    rule: >
      The LTM Resolution Protocol (core/components/memory/standards/rules/resolution.md)
      applies to every inference agent dispatched by this play. Every dispatch
      populates ltm_context with product_base (for Path-1 codebases where LTM
      may already partially exist), core_base (~/.garura/core/memory/), and
      query_domains drawn from the target artifact. Agents produce a
      resolution-trace.yaml per invocation. R4 (LLM fallback) entries are
      valid — they flag organizational knowledge gaps that surface in proposals.

  - id: C11
    rule: >
      Incremental mode is opt-in via --incremental. When set, for each target
      artifact the play consults the product LTM path (via R2 of the Resolution
      Protocol). If the artifact exists and is LOCKED, the play skips inference
      for that artifact entirely and records the skip in proposals.yaml under
      skipped_locked. For all other states — artifact absent, or artifact
      present but not LOCKED — inference proceeds and produces a fresh proposal.
      codify does NOT compare fresh inferences against existing DRAFT artifacts
      or produce deltas. Reconciliation of a fresh proposal against any existing
      DRAFT LTM is the exclusive responsibility of /garura:enrich, which is the sole
      promotion gate from STM to product LTM.

  - id: C12
    rule: >
      A human checkpoint is required before evidence commit. The checkpoint
      runs in two sequential phases: (1) 1-by-1 surfacing per C13 for
      low-confidence proposals and for Tier-1 proposals that conflict with
      existing LOCKED LTM — user explicitly accepts, rejects, or defers each;
      (2) a final summary Tether/Vanish covering remaining high- and
      medium-confidence proposals with aggregate counts by tier, by
      learning_category, by confidence, plus skipped artifacts with reasons
      and resolution-trace R4 gap counts. Evidence commit happens only after
      both phases and final Tether. Vanish at either phase halts the play
      without committing evidence.

  - id: C13
    rule: >
      Decision Surfacing Discipline governs Phase 1 of the C12 checkpoint.
      Low-confidence proposals (confidence: "low") AND Tier-1 proposals that
      conflict with existing LOCKED LTM are surfaced 1-by-1 for explicit user
      decision (accept | reject | defer). Medium-confidence proposals are
      batched in Phase 2 for summary confirmation. High-confidence proposals
      auto-pass pending overall Tether at Phase 2. Silent acceptance of
      low-confidence or Tier-1-conflicting proposals — skipping Phase 1 — is
      a structural failure.

  - id: C14
    rule: >
      A zero-proposal exit IS valid. When incremental mode and a fully aligned
      product LTM produce no new proposals, the play writes proposals.yaml with
      total_proposals: 0 and an empty proposals list, records
      alignment_confirmed: true, and exits cleanly. This makes /codify usable
      as a periodic LTM-vs-code alignment check on greenfield products.

  - id: C15
    rule: >
      Inference work is delegated to four domain agents — tech-architect,
      test-engineer, product-keeper, and conditionally designer — via JSON
      contracts. The play orchestrates scan execution, dispatches, validation,
      and checkpoint flow. The play MUST NOT perform inference inline (no
      direct reading of source files beyond manifests and scan-index; no
      direct architecture/domain reasoning).

  - id: C16
    rule: >
      Agent dispatch parallelism: tech-architect, test-engineer, product-keeper,
      and designer (when applicable) operate on disjoint artifact sets and MAY
      run in parallel. scope-level artifacts (scope.yaml, features.yaml, epics)
      depend on domain-selection.yaml and project-profile.yaml — they run AFTER
      those foundations are produced. Architecture artifacts depend on the
      dependency graph and detected tech stack — they run AFTER scan completes
      but in parallel with scope work.

  - id: C17
    rule: >
      Evidence self-commit via repo-orchestrator is non-blocking (same as /reap
      C13). Commit failure is logged in evidence and the play exits cleanly.
      A commit failure does not retroactively invalidate proposals.yaml or the
      user's Tether decision.

  - id: C18
    rule: >
      No discovery mode for missing infrastructure. If .garura/core/config.yaml
      is missing, or if ~/.garura/core/memory/ is absent, the play hard halts
      with a clear error message pointing to the missing resource. No fallback
      to a synthesized config.

  - id: C19
    rule: >
      The abstraction-layer deny-list rule (core/components/skills/
      validate-abstraction-layer) applies to every artifact under
      specification/, research/, and scope/ that codify produces. Proposals
      containing deny-list tokens (specific SDK method names, framework
      identifiers as literal tech nouns in non-technical artifacts, wire
      protocol details in product-layer artifacts) are rejected before they
      reach the checkpoint. Architecture artifacts are exempt from this rule
      as they are the correct home for technology names.

  - id: C20
    rule: >
      proposals.yaml is the single master index. It lists every proposal with
      fields: proposal_id, target_path (relative to product LTM),
      learning_category, sub_category, tier, source_type, confidence,
      evidence_paths, resolution_trace_path, notes. The master index is the
      only artifact /garura:enrich needs to consume — individual proposal files are
      reachable via the target_path / proposal_id tuple.

failure_conditions:
  - id: F0
    condition: >
      The play enters the scan phase or dispatches any inference agent before
      an issue number has been resolved per C0 and recorded in
      {stm_base}/{issue}/status/codify.json. STM paths MUST be anchored before
      any work that would write to them begins.

  - id: F1
    condition: >
      Any write to {product_base} or to ~/.garura/core/memory/ occurs during
      this play run. All outputs must be under
      {stm_base}/{issue}/evidence/codify/ or {stm_base}/{issue}/status/codify.json.

  - id: F2
    condition: >
      scan-index.json is absent, empty, or malformed at the start of the
      inference phase. Agents MUST NOT be dispatched without a valid index.

  - id: F3
    condition: >
      Any proposal is missing source_type, evidence, or confidence. The three
      fields are required on every proposal without exception.

  - id: F4
    condition: >
      Any proposal fails its target schema validator (validate-intent-epics,
      validate-architecture-spec, validate-screen-coverage,
      validate-abstraction-layer). Validation failures halt the play before
      the checkpoint and report structured errors per artifact.

  - id: F5
    condition: >
      designer agent is dispatched when the scan reports no frontend detected.
      Conversely, designer is NOT dispatched when the scan reports a frontend.
      Either mismatch is a structural failure.

  - id: F6
    condition: >
      A Tier-1 proposal that conflicts with an existing LOCKED product LTM
      artifact is produced without an adr_draft_path or without an impact block.
      Tier-1 conflicts require both.

  - id: F7
    condition: >
      Incremental mode writes proposals for artifacts already present and
      LOCKED in product LTM. Locked artifacts must be skipped with a recorded
      entry in skipped_locked.

  - id: F8
    condition: >
      Any proposal is missing learning_category, or carries sub_category non-null
      for a flat parent (domain, product), or carries sub_category null for a
      hierarchical parent (arch, quality, standards) without sub_category_proposed
      set with a complete taxonomy_justification block. These mirror /reap F2/F7/F8.

  - id: F9
    condition: >
      An inference agent invoked with ltm_context produces no resolution-trace.yaml
      at the declared output path. The Resolution Protocol requires a trace from
      every agent that receives ltm_context.

  - id: F10
    condition: >
      The play proceeds past the inference phase without presenting the
      checkpoint summary. Even when incremental mode produces zero proposals,
      the summary MUST be shown (stating alignment_confirmed) and Tether/Vanish
      awaited before any evidence commit.

  - id: F11
    condition: >
      The scan script reports scan_status: "budget_exhausted" and the play
      proceeds to inference without an explicit user confirmation (Tether).
      A partial scan is acceptable only when the user has acknowledged it.

  - id: F12
    condition: >
      Inference agents read source files outside the set named in
      scan-index.json. Agents are bounded to the scan index — they MUST NOT
      navigate the entire codebase as a primary discovery mechanism.

  - id: F13
    condition: >
      Low-confidence proposals or Tier-1 proposals that conflict with existing
      LOCKED LTM are accepted silently at the checkpoint (no 1-by-1 surfacing).
      Decision Surfacing Discipline requires explicit per-proposal decision for
      these cases.

  - id: F14
    condition: >
      proposals.yaml is absent from {stm_base}/{issue}/evidence/codify/ after
      the play completes and the user Tethered. Even a zero-proposal run writes
      the master index with total_proposals: 0.

scenarios:
  - id: S1
    persona: "Product owner onboarding a single-service brownfield codebase"
    given: >
      A ~50k-LOC single-repo service with a README, a package.json, a src/
      directory, tests, and a Dockerfile. No prior Garura LTM exists.
    then: >
      /codify produces a full proposal set: project-profile, domain-selection,
      quality-profile, scope.yaml with 3-5 capabilities, features.yaml, 2-4
      epics, research/{domain}.md for every detected domain, and all 5
      architecture artifacts. Every proposal carries source_type, evidence,
      confidence. Validators pass. A summary checkpoint shows counts by tier.
      On Tether, evidence commits and /garura:enrich can later consume the proposals.

  - id: S2
    persona: "Platform engineer onboarding a multi-repo monolith"
    given: >
      Five top-level repositories totalling ~600k LOC, each with its own
      manifest, invoked as /codify --path repoA --path repoB --path repoC
      --path repoD --path repoE. No prior LTM.
    then: >
      The scan aggregates across all five repos, scan-index records repos: [...]
      header with per-repo byte counts, logical-architecture.yaml proposes
      multiple bounded contexts keyed to repos, physical-architecture.yaml
      captures shared infra, and the scan stays within size budget.

  - id: S3
    persona: "Backend engineer onboarding a headless service"
    given: >
      A pure API service with no frontend — no React/Vue/Svelte dep, no src/
      components, no public/index.html.
    then: >
      The scan records frontend_detected: false. The designer agent is NOT
      dispatched. experience/* proposals are skipped. proposals.yaml records
      skipped_phases: [experience] with a reason. All other proposals are
      produced normally. The play completes cleanly.

  - id: S4
    persona: "Tech lead re-running codify to check LTM alignment"
    given: >
      A product with a fully-populated LOCKED product LTM that has evolved
      alongside the code. User invokes /codify --incremental.
    then: >
      For each target artifact, the play sees a LOCKED file in product LTM and
      skips inference. proposals.yaml records skipped_locked entries and
      writes total_proposals: 0 with alignment_confirmed: true. The play
      completes as a clean alignment check with no new proposals.

  - id: S5
    persona: "Platform engineer running codify on an extreme codebase"
    given: >
      A 1.2M-LOC monorepo where the scan script exhausts the default 10 MB
      size budget mid-run.
    then: >
      The scan writes a partial scan-index.json with scan_status:
      "budget_exhausted" and contributors showing the top paths by size. The
      play presents the partial status and prompts the user to Tether (proceed
      with partial inference) or Vanish (halt to adjust filters). If the user
      Tethers, inference proceeds over the partial index. If Vanish, the play
      halts without invoking inference agents.

  - id: S6
    persona: "Product owner with a codebase in a domain Garura's KB does not yet cover"
    given: >
      A codebase in a domain not represented in
      core/components/memory/knowledge/domain/ (e.g., a vertical Garura has
      never indexed).
    then: >
      domain-selection.yaml proposes a new domain with
      learning_category: domain, inferred_domain_new: true, and a
      taxonomy_justification block per /reap C7a. A research/{new-domain}.md
      draft is proposed as a Tier-3 addition. The user sees the proposed-new
      value at the checkpoint with its justification.

  - id: S7
    persona: "Tech lead with partial LOCKED LTM and missing scope"
    given: >
      A product whose LTM has LOCKED architecture artifacts and no scope
      artifacts yet. User invokes /codify --incremental.
    then: >
      LOCKED architecture files are skipped and recorded under skipped_locked.
      The 4 missing scope artifacts plus research/{domain}.md proposals are
      produced as fresh inferences. proposals.yaml reflects the mixed outcome.
      Reconciling the fresh scope proposals with any DRAFT scope content is
      left to /garura:enrich — codify does not compare against DRAFT LTM.

  - id: S8
    persona: "Tech lead invoking codify with a single-artifact target"
    given: >
      /codify --target architecture on a codebase where only the 5 architecture
      artifacts are desired.
    then: >
      Only tech-architect is dispatched. scope, experience, research,
      specification, and user-provided phases are skipped. proposals.yaml
      records skipped_phases with the reason "target filter". The 5
      architecture artifact proposals are produced and validated normally.
