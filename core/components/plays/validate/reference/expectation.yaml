# Expectation for the validate play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: validate

generated_from:
  intent: core/components/plays/validate/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: "QA Engineer"
    given: >
      Committed code from implement for a specific milestone and a deployed preview
      environment with all services running
    then: >
      Can run the milestone-scoped e2e suite (baseline regression from prior milestones →
      new milestone scenarios → regression) and receive a structured results report with
      per-scenario PASS/FAIL and evidence artifacts (screenshots, traces, response bodies)
      for every test execution
    measure: >
      `{evidence_dir}/e2e-results.yaml` exists carrying the run's milestone_id, lists every
      executed scenario under the baseline/new/regression tiers with a PASS or FAIL status,
      and `{evidence_dir}/traces/` holds at least one evidence artifact (screenshot, trace,
      or response body) per executed scenario.
  - id: S2
    persona: "QA Engineer"
    given: >
      The manual test scenarios checklist produced by the feature-steward for this milestone
    then: >
      Can execute hybrid/manual test scenarios against the deployed environment without
      reading source code, with clear pass/fail criteria for each checklist item
    measure: >
      `{evidence_dir}/manual-test-scenarios.md` exists with at least one numbered scenario,
      each scenario carries an explicit pass/fail criterion, and no item requires reading
      source code to evaluate.
  - id: S3
    persona: "Security Auditor"
    given: >
      The input contexts of all agents (evals-engineer, judge, test-engineer) and the
      compartmented isolation model
    then: >
      Can verify no agent received information outside its designated scope — evals-engineer
      has zero implementation code, judge has zero evals-engineer prompts, test-engineer
      has zero implementation details beyond this milestone's scenarios and design-spec screens
    measure: >
      Each agent's recorded invocation contract resolves only to the input paths permitted
      for its role (per the SKILL.md Agent boundaries table): the evals-engineer contract
      carries no implementation-code, builder-prompt, prior-eval, or other-milestone scenario
      path; the judge contract carries only the encrypted eval path, manifest, and deploy_url;
      the test-engineer contract carries no unit-test or builder-prompt path. No contract
      contains an `ltm_context` field or a `{product_base}`/`~/.garura/core/memory/` path.
  - id: S4
    persona: "Engineering Lead"
    given: >
      A structured failure report produced after 3 fix iterations are exhausted for a milestone
    then: >
      Can identify persistent system-level failures, see remediation history including
      implement re-runs per iteration, and decide whether to restructure scope
      or escalate
    measure: >
      When the fix loop reaches 3 iterations with failures remaining, a failure report exists
      under `{evidence_dir}` listing each persistent failure, a per-iteration remediation
      history table (iterations 1–3, each naming the implement re-run and its e2e/judge result),
      and a recommendation line; no milestone-verdict.yaml records ACCEPT.
  - id: S5
    persona: "Product Owner"
    given: >
      The per-milestone QA verdict (ACCEPT or REJECT) and e2e evidence (screenshots, traces,
      response bodies)
    then: >
      Can make a release decision without running tests themselves — the verdict and
      evidence provide sufficient confidence for go/no-go
    measure: >
      `{milestone_base}/milestone-verdict.yaml` exists with verdict set to ACCEPT or REJECT
      and the e2e/judge result counts that back it, and the e2e evidence it references in
      `{evidence_dir}/traces/` is present on disk.
  - id: S6
    persona: "Testing Architect"
    given: >
      The e2e-results.yaml execution report for a milestone
    then: >
      Can verify all 3 scenario tiers were executed in order, baseline failures halted
      execution of subsequent tiers, and evidence artifacts (screenshots, traces, response
      bodies) exist for every executed test
    measure: >
      `{evidence_dir}/e2e-results.yaml` records the baseline tier before new before regression;
      when the baseline tier status is FAIL the new and regression tiers show SKIPPED; and
      every scenario with a PASS/FAIL status has at least one evidence artifact path that
      resolves on disk.
  - id: S7
    persona: "Developer"
    given: >
      Judge failures in validate with structured remediation instructions for this milestone
    then: >
      Can make targeted fixes via implement for this milestone without re-running the full
      implementation cycle — remediation instructions identify specific system-level failures,
      affected milestone scenarios, and suggested fix areas
    measure: >
      `{evidence_dir}/remediation-{iteration}.md` exists for the failing iteration, names this
      milestone_id as the implement target, lists the affected scenarios and suggested fix
      areas, and contains zero eval IDs and zero eval text.
  - id: S8
    persona: "QA Engineer"
    given: >
      implement completes milestone T-001 and produces a status report showing all unit
      tests passing and quality-auditor CERTIFIED for T-001
    then: >
      Can trigger validate for milestone T-001, observe only T-001's scenario_gate
      scenarios plus prior-milestone baseline regression being executed, and receive a
      per-milestone verdict (ACCEPT or REJECT) scoped solely to T-001
    measure: >
      `{evidence_dir}/milestone-scenarios.yaml` for the run contains exactly the milestone's
      scenario_gate.ids[] in the new tier plus prior-milestone cumulative scenarios in the
      baseline tier and no scenarios from non-prior milestones, and the resulting
      milestone-verdict.yaml is keyed to that single milestone_id.
  - id: S9
    persona: "Engineering Lead"
    given: >
      Multiple milestones (e.g. T-001, T-002, T-003) have each been individually validated
      by validate and each produced a per-milestone verdict file
    then: >
      Can review the sequence of per-milestone QA verdicts to track progressive epic
      completion, confirm all milestones are ACCEPTED before marking the epic ACCEPT, and
      identify which milestone first introduced a regression if a later milestone's baseline
      tier fails
    measure: >
      One `milestone-verdict.yaml` exists per validated milestone under its
      `{stm_base}/{issue}/milestones/{milestone_id}/` path, each carries an ACCEPT/REJECT
      verdict, and a baseline-tier failure in any e2e-results.yaml records the
      source_milestone of the failed scenario.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # implement did not complete this milestone / quality FAIL
    trigger: >
      The milestone status report is missing or shows failures below threshold, or this
      milestone's quality-report.yaml shows overall FAIL or QP BLOCKED, when validate starts.
    direction: >
      validate requires a completed, quality-certified milestone implementation; the
      milestone must be finished and certified upstream before validation — this is an
      upstream completion state the builder cannot grant, so hold until implement reports
      this milestone COMPLETE and CERTIFIED.
    handoff: human
    derivable_at_l4: false
  - id: REC2
    for_failure: F2                 # deployment environment not accessible
    trigger: >
      The deployment environment health check fails — the URL is unreachable or services
      are not running — so e2e tests cannot execute.
    direction: >
      A reachable deployed environment must exist before e2e runs; the play does not
      provision infrastructure, so the environment availability is external state the
      builder cannot grant — escalate to stand up or restore the environment.
    handoff: human
    derivable_at_l4: false
  - id: REC3
    for_failure: F3                 # 3 fix iterations exhausted, evals still failing
    trigger: >
      Three fix iterations have completed and system-level evals still contain at least one
      failing evaluation.
    direction: >
      Validation must not loop past the iteration budget; once the budget is spent with
      failures remaining, the next move (restructure milestone scope vs. escalate) is a
      judgment the builder lacks — escalate with the structured failure report.
    handoff: human
    derivable_at_l4: false
  - id: REC4
    for_failure: F4                 # validate invoked code-builder directly
    trigger: >
      A code-builder invocation originated from validate, rather than remediation being
      routed back through implement for this milestone.
    direction: >
      Code changes must flow through implement's TDD cycle, never a direct code-builder
      call from validate; re-route the remediation handoff through implement for this
      milestone instead of dispatching code-builder directly.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # e2e scripts use a unit test framework
    trigger: >
      An e2e test script imports or runs under a unit test framework (Jest, pytest, vitest)
      instead of an e2e framework, or targets localhost rather than the deploy URL.
    direction: >
      E2E scripts must use an e2e framework (Playwright, Cypress, or equivalent) exercising
      the deployed environment; regenerate the test scripts on the e2e framework targeting
      the deploy URL.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC6
    for_failure: F6                 # judge ran without a deployed environment
    trigger: >
      The judge report is based on source-code reading, static analysis, or unit-test
      results rather than runtime behavior of the deployed product.
    direction: >
      The judge must exercise the running deployed product via HTTP/browser automation, not
      static analysis; re-run the judge against the live deploy URL so its evidence carries
      runtime responses or screenshots.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # evals-engineer context contaminated
    trigger: >
      The evals-engineer's input context contains implementation code, builder prompts, unit
      test code, quality-auditor results from implement, prior judge reports, or scenarios
      from other milestones.
    direction: >
      The evals-engineer must receive only this milestone's behaviors, milestone-scoped
      scenarios, plan exit gates, and design-context screens; rebuild its contract stripping
      every forbidden input before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8                 # judge context contaminated
    trigger: >
      The judge's input context contains evals-engineer prompts, builder prompts,
      quality-auditor results from implement, implementation source code, or unit test code.
    direction: >
      The judge must receive only the encrypted system evals plus the deployed env
      URL/credentials; rebuild its contract stripping every forbidden input before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC9
    for_failure: F9                 # e2e results lack evidence artifacts
    trigger: >
      E2E test results lack evidence artifacts — no screenshots, traces, or response bodies —
      carrying only PASS/FAIL without reviewable supporting material.
    direction: >
      Every executed e2e test must capture reviewable evidence; re-run the suite with
      evidence capture enabled so each executed test records a screenshot, trace, or
      response body.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC10
    for_failure: F10                # baseline failed but Tier 2 still executed
    trigger: >
      Baseline scenarios (Tier 1) failed yet new scenarios (Tier 2) were still executed for
      the same iteration.
    direction: >
      Execution must halt on baseline failure with new and regression tiers skipped; enforce
      the tier-ordering halt so Tier 2 and Tier 3 do not run once baseline fails.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC11
    for_failure: F11                # no manual test scenarios produced
    trigger: >
      The feature-steward step was skipped or produced an empty checklist, so no manual test
      scenarios exist for this milestone.
    direction: >
      Every milestone validation must include a manual QA checklist; re-run the
      feature-steward to produce at least one numbered manual scenario with pass/fail
      criteria for this milestone.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC12
    for_failure: F12                # ACCEPT verdict contradicts e2e failures
    trigger: >
      The QA verdict is ACCEPT while automated e2e tests have failures — the verdict
      contradicts the evidence.
    direction: >
      ACCEPT is valid only when all automated e2e tests PASS and judge evals meet threshold;
      recompute the verdict from the evidence so it reads REJECT whenever any e2e test failed.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC13
    for_failure: F13                # an agent read from KB/LTM
    trigger: >
      An agent contract contains an ltm_context field, a product_base reference, or a path
      outside `{stm_base}/{issue}/` and the deployed environment URL.
    direction: >
      All context must come from STM and the deployed environment — KB and LTM are forbidden;
      strip every ltm_context field, product_base path, and core/memory path from agent
      contracts before dispatch.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC14
    for_failure: F14                # validate ran for a milestone implement has not completed
    trigger: >
      validate ran for a milestone whose implement status report is missing or shows
      INCOMPLETE.
    direction: >
      validate cannot validate an uncommitted or incomplete milestone; this is an upstream
      completion state the builder cannot grant — hold until implement's status report for
      this milestone exists and shows COMPLETE.
    handoff: human
    derivable_at_l4: false
  - id: REC15
    for_failure: F15                # ran ALL epic scenarios instead of milestone-scoped
    trigger: >
      The scenario set passed to the evals-engineer or test-engineer includes scenarios
      outside the milestone's scenario_gate plus its cumulative regression set.
    direction: >
      Scope must be strictly the designated milestone's scenario_gate plus cumulative
      regression; re-scope the scenario set to exclude any scenario from non-prior milestones
      before dispatching the agents.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC16
    for_failure: F16                # epic-level verdict with only a subset validated
    trigger: >
      An epic-level ACCEPT or REJECT verdict was produced while only one or a subset of
      milestones has been validated.
    direction: >
      An epic-level verdict is valid only when every milestone has its own ACCEPT/REJECT
      verdict; withhold the epic-level verdict and emit only the per-milestone verdict until
      all milestone-verdict files exist.
    handoff: autonomous
    derivable_at_l4: true
