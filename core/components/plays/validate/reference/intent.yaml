intent: >
  Given committed code from implement for a specific milestone (feature phase from
  plan.yaml, identified by milestone_id e.g. T-001) and locked verification scenarios
  for that milestone from prepare, deploy to a preview/staging environment and execute
  system-level verification against that milestone's acceptance criteria. validate
  accepts a milestone_id and validates ONLY that milestone's scenarios. An evals-engineer
  produces system-behavior evals scoped to this milestone's scenario_gate from plan.yaml —
  not all epic scenarios. A test-engineer authors e2e test scripts (Playwright, Cypress, or
  project-appropriate framework) from this milestone's scenarios and design-spec screens,
  exercising the deployed environment via browser automation or HTTP requests. E2E execution
  runs all 3 scenario tiers in order: baseline (verify behavior from all prior milestones
  still works — cumulative regression), new (verify this milestone's new scenarios), regression
  (verify nothing outside this milestone's change surface broke). A judge exercises the running
  product independently via the deployed environment — this is QA acceptance, not developer
  self-check. A feature-steward generates manual test scenarios for anything e2e automation
  cannot cover, scoped to this milestone. When judge failures occur, remediation routes back
  to implement for code changes for this specific milestone — validate does not invoke
  code-builder directly. After implement fixes and re-commits, validate re-deploys
  and re-runs. Max 3 fix iterations per milestone. The final output is a per-milestone QA
  verdict: ACCEPT or REJECT. An epic-level ACCEPT requires all milestones ACCEPTED.

constraints:
  - id: C1
    rule: >
      implement must have completed for this MILESTONE before validate runs.
      Pre-flight verifies: implement's status report for this milestone_id exists at
      {stm_base}/{issue}/milestones/{milestone_id}/status-report.yaml and shows all unit
      tests passing, and quality-auditor shows CERTIFIED for this milestone. Hard halt if
      implement has not completed this milestone.

  - id: C2
    rule: >
      A deployment environment (preview, staging, or local docker-compose) must be accessible
      before e2e tests run. The play does not provision infrastructure — it requires an
      accessible environment. Pre-flight verifies the environment is reachable via health
      check before proceeding.

  - id: C3
    rule: >
      The evals-engineer receives ONLY: this milestone's locked behaviors, this milestone's
      scenarios from scenarios.yaml (scoped to the milestone's scenario_gate from plan.yaml —
      baseline, new, regression tiers for THIS milestone), plan.yaml exit gates for this
      milestone, and design-spec screens relevant to this milestone. It is scoped to SYSTEM
      BEHAVIOR for THIS MILESTONE — not all epic scenarios. It does NOT receive: unit test
      code, builder prompts, prior evals, implementation code, quality-auditor results from
      implement, judge reports from implement, or scenarios from other milestones.

  - id: C4
    rule: >
      The test-engineer authors e2e test scripts (Playwright, Cypress, or project-appropriate
      e2e framework) from scenarios.yaml and design-spec screens. Tests exercise the deployed
      environment via browser automation or HTTP requests — not mocked services. Test scripts
      target the deployment URL, not localhost unit test runners.

  - id: C5
    rule: >
      E2E test execution runs all 3 scenario tiers in order for THIS MILESTONE: (1) baseline
      scenarios — verify behavior from ALL prior milestones still works (cumulative regression),
      (2) new scenarios — verify THIS milestone's new scenarios work, (3) regression scenarios —
      verify nothing outside THIS milestone's change surface broke. Execution halts on baseline
      failure — new and regression tiers do not execute if baseline fails.

  - id: C6
    rule: >
      The judge receives ONLY: encrypted system-level evals and deployed environment access
      (URL, credentials). It does NOT receive: builder prompts, unit test code, quality-auditor
      results from implement, evals-engineer prompts, implementation source code, or
      prior judge reports from implement. The judge exercises the running product via
      HTTP calls and/or browser automation against the deployed environment.

  - id: C7
    rule: >
      Evaluations are encrypted at rest. Same encryption/isolation model as implement.
      Plaintext evaluation content is deleted after encryption. Eval files are stored outside
      the project repository tree. No evaluation content (encrypted or plaintext) exists
      inside the repository at any point.

  - id: C8
    rule: >
      The fix loop routes remediation back to implement for code changes for THIS
      MILESTONE ONLY. validate does NOT invoke code-builder directly. After implement
      fixes and re-commits for this milestone, validate re-deploys and re-runs the full
      e2e suite and judge evaluation for this milestone. The remediation handoff includes:
      which milestone-scoped scenarios failed, which judge evals failed, and structured
      remediation instructions targeting this milestone's implementation.

  - id: C9
    rule: >
      The fix loop runs a maximum of 3 iterations. If system-level evals still fail after
      3 rounds, the process halts with a structured failure report including: persistent
      failures with per-scenario detail, remediation attempted per iteration (including
      implement re-runs), and recommendation for scope restructuring or escalation.

  - id: C10
    rule: >
      The feature-steward generates manual test scenarios for anything e2e automation cannot
      cover, scoped to this milestone: visual review, UX flow validation, accessibility
      spot-checks, complex multi-step user journeys requiring human judgment. Produces a
      numbered QA checklist with clear pass/fail criteria per item.

  - id: C11
    rule: >
      The QA verdict is ACCEPT or REJECT per milestone. Per-milestone ACCEPT requires: all
      automated e2e tests for this milestone PASS (including prior-milestone baseline
      regression), judge evals meet threshold (configurable, default 100%), and manual test
      scenario checklist is generated. REJECT includes: which scenarios failed, which judge
      evals failed, what remediation was attempted, and iteration history. An epic-level QA
      ACCEPT requires ALL milestones to be individually ACCEPTED.

  - id: C12
    rule: >
      E2E test results must include traces, screenshots, and response bodies as evidence
      artifacts. Not just PASS/FAIL — reviewable artifacts that allow post-hoc debugging
      and audit. Evidence is stored in the issue STM evidence directory.

  - id: C13
    rule: >
      Scenarios from prepare (scenarios.yaml) are the test contract, scoped to THIS
      milestone's scenario_gate from plan.yaml. validate does NOT author new scenarios —
      it executes the locked scenarios listed in the milestone's scenario_gate field. The
      3-tier scenario set for this milestone (baseline, new, regression) is immutable during
      validation. Scenarios from other milestones are NOT included in this run's new or
      regression tiers.

  - id: C14
    rule: >
      Context isolation between evals-engineer and judge follows the same compartmented model
      as implement: evals-engineer never sees implementation code or builder prompts,
      judge never sees evals-engineer prompts or quality-auditor results. Each agent operates
      in a sealed input context with no cross-contamination.

  - id: C15
    rule: >
      validate reads ONLY from STM at {stm_base}/{issue}/context/ and the
      deployed environment. KB (~/.garura/core/memory/) and LTM ({product_base})
      are FORBIDDEN. All context — epic specification, scenarios, design context,
      API contracts — must exist in the STM context package produced by
      prepare. No agent contract may include ltm_context fields, product_base
      paths, or core/memory paths.

  - id: C16
    rule: >
      validate accepts a milestone_id parameter (e.g. T-001) that identifies the feature
      phase from plan.yaml. All scenario selection, eval generation, judge evaluation, and
      verdict issuance are scoped to that milestone. validate never runs scenarios beyond
      those listed in the milestone's scenario_gate plus cumulative regression from all prior
      milestones.

  - id: C17
    rule: >
      Each milestone validation runs cumulative regression: the baseline tier includes scenarios
      from ALL previously ACCEPTED milestones, not just the current milestone. Prior-milestone
      scenarios that have already received an ACCEPT verdict are included in the baseline tier
      as regression verification. This ensures no prior milestone is silently broken by current
      milestone changes.

  - id: C18
    rule: >
      validate reads implement's status report for this milestone_id before
      proceeding. The status report must exist at
      {stm_base}/{issue}/milestones/{milestone_id}/status-report.yaml and must show
      implementation COMPLETE for this milestone. If the status report is missing or shows
      INCOMPLETE, validate halts with a pre-flight failure.

  - id: C19
    rule: >
      The QA verdict is issued per-milestone, not per-epic. Each milestone run produces a
      milestone-verdict.yaml at {stm_base}/{issue}/milestones/{milestone_id}/milestone-verdict.yaml.
      An epic-level QA verdict (ACCEPT or REJECT) is derived only when all milestones have been
      individually validated and verdict files exist. A single milestone REJECT propagates to an
      epic-level REJECT.

failure_conditions:
  - id: F1
    condition: >
      implement did not complete for this milestone — the milestone status report is missing
      or shows failures below threshold, or quality-report.yaml for this milestone shows overall
      FAIL or QP BLOCKED. validate cannot proceed without a completed, quality-certified
      milestone implementation.

  - id: F2
    condition: >
      The deployment environment is not accessible — health check fails, URL is unreachable,
      or services are not running. E2E tests cannot execute against a non-running service.

  - id: F3
    condition: >
      Three fix iterations have been exhausted and system-level evals still contain at least
      one failing evaluation. The structured failure report is produced and the process halts.

  - id: F4
    condition: >
      validate invoked code-builder directly instead of routing fixes through
      implement. Code changes must flow through implement's TDD cycle, not
      bypass it.

  - id: F5
    condition: >
      E2E test scripts use a unit test framework (Jest, pytest, vitest) instead of an e2e
      framework (Playwright, Cypress, or equivalent browser automation / HTTP integration
      tool). Tests must exercise the deployed environment, not run in-process.

  - id: F6
    condition: >
      The judge executed without a deployed environment — judge report is based on source
      code reading, static analysis, or unit test results rather than runtime behavior of
      the deployed product.

  - id: F7
    condition: >
      The evals-engineer's input context contains implementation code, builder prompts,
      unit test code, quality-auditor results from implement, prior judge reports,
      or scenarios from other milestones. Evals-engineer scope is strictly this milestone's
      system-behavior from specs.

  - id: F8
    condition: >
      The judge's input context contains evals-engineer prompts, builder prompts,
      quality-auditor results from implement, implementation source code, or unit
      test code. Judge scope is strictly deployed-product exercise.

  - id: F9
    condition: >
      E2E test results lack evidence artifacts — no screenshots, no traces, no response
      bodies. Results contain only PASS/FAIL without reviewable supporting material.

  - id: F10
    condition: >
      Baseline scenarios (Tier 1) failed but new scenarios (Tier 2) were still executed.
      Execution must halt on baseline failure — new and regression tiers are skipped when
      baseline is broken.

  - id: F11
    condition: >
      No manual test scenarios were produced — the feature-steward step was skipped or
      produced an empty checklist. Every milestone validation must include a manual QA
      checklist.

  - id: F12
    condition: >
      QA verdict is ACCEPT but automated e2e tests have failures — the verdict contradicts
      the evidence. ACCEPT is only valid when all automated e2e tests PASS and judge evals
      meet threshold.

  - id: F13
    condition: >
      Any agent invoked by validate reads from KB (~/.garura/core/memory/)
      or LTM ({product_base}). Agent contracts contain ltm_context fields,
      product_base references, or paths outside {stm_base}/{issue}/ and the
      deployed environment URL.

  - id: F14
    condition: >
      validate runs for a milestone whose implement has not completed —
      status report for this milestone_id is missing or shows INCOMPLETE. validate
      cannot validate uncommitted or incomplete milestone implementations.

  - id: F15
    condition: >
      validate runs ALL epic scenarios instead of milestone-scoped scenarios — the
      scenario set passed to the evals-engineer or test-engineer includes scenarios outside
      the milestone's scenario_gate plus cumulative regression set. Scope must be strictly
      limited to the designated milestone's scenarios.

  - id: F16
    condition: >
      validate produces an epic-level ACCEPT or REJECT verdict when only one or a subset
      of milestones has been validated. Epic-level verdict is only valid when all milestones
      have individually received ACCEPT or REJECT verdicts.
