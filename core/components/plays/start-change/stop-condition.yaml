# start-change stop condition — baked from reference/ice.md "### Done means" (#464/#466).
# Evaluated by scripts/check_stop_condition.py at Step C0 of the Standard Play Close.
# Paths are relative to the run's STM root ({stm_base}{issue}/).
schema: { name: stop-condition }
content:
  done:
    - id: D1
      says: "the issue is anchored"
      check: { type: artifact_exists, path: "context/issue.json" }
    - id: D2
      says: "the branch record exists"
      check: { type: artifact_exists, path: "context/branch.json" }
    - id: D3
      says: "we are not on main"
      check: { type: field_equals, file: "context/branch.json", field: "on_default_branch", equals: false }
    - id: D4
      says: "the STM workspace exists"
      check: { type: artifact_exists, path: "specs" }
