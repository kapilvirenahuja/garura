name: plan-roadmap
intent: >
  Produce a time-phased product roadmap from a locked product vision.
  The output set includes: scoped epics with full IDD fields,
  a technical feasibility assessment, and an approved full roadmap.
  All epics trace to strategic goals from the vision.
  Epics and feasibility must receive explicit human approval before the
  roadmap is finalized — the review surface is the epics.yaml and
  feasibility.yaml paths. Users may run /briefs separately to generate an
  HTML rendering if desired.

constraints:
  - id: C1
    rule: >
      Vision must have LOCKED status before any roadmap planning begins.
      No artifacts may be produced from an unlocked vision.
  - id: C5
    rule: >
      The number of epics is determined by the product's strategic goals —
      each epic must trace to a named goal. The count is a natural outcome
      of the vision, not an artificial constraint. Epics should be scoped
      at a level where each represents a distinct, deliverable capability.
  - id: C6
    rule: >
      Every epic must have complete IDD fields: intent (problem, outcome,
      strategic connection), constraints (in-scope, out-of-scope,
      must-not-break), success scenarios (minimum 2, given/when/then),
      and failure conditions (2-4 observable outcomes).
  - id: C7
    rule: >
      Every epic must trace to a named strategic goal from the locked vision.
      No orphan epics.
  - id: C8
    rule: >
      The full roadmap must not be produced until epics.yaml and
      feasibility.yaml have received explicit human approval at the
      play checkpoint. Approval gates the roadmap. The review surface
      at the checkpoint is the epics.yaml and feasibility.yaml file paths.
  - id: C11
    rule: >
      After epics and feasibility approval, roadmap production must be
      blocked when the feasibility assessment contains non-empty
      critical_blockers or open_questions arrays. Each unresolved item must be presented to
      the user via a structured resolution interview using the RESOLVED
      keyword to collect decisions. All resolutions must be written to a
      pre-lock-resolutions.yaml audit artifact before the roadmap is
      produced.
  - id: C12
    rule: >
      When product.yaml contains a profiles section, the play must pass
      profiles to the scope-epics and assess-feasibility agents so they can
      use profile-informed reasoning for epic depth, priority, and risk
      calibration. Profile data is advisory — its absence does not block
      the play (backward compatible).
  - id: C13
    rule: >
      Epics use E-IDs (E1, E2, E3...) throughout all roadmap pipeline
      artifacts — epics.yaml, feasibility.yaml, and roadmap.yaml.
      F-IDs are reserved for features.yaml produced by prepare-implementation.
  - id: C14
    rule: >
      Every epic must include an ltm_citations field listing the LTM/memory
      file paths consulted when deriving that epic (domain taxonomy modules,
      profile knowledge, architecture patterns). The evidence report must
      surface these citations per epic so the reasoning is traceable.
  - id: C15
    rule: >
      After epics are scoped, a context-isolated confidence assessment must
      be performed by the judge agent. The judge receives ONLY epics.yaml
      and product.yaml — no drafting context, no intermediate reasoning from
      the product-strategist. The judge scores each epic's alignment with
      the product vision (high/medium/low confidence) with rationale. The
      confidence report is included in the evidence output.
  - id: C16
    rule: >
      Every discrete capability listed in product.yaml scope.in_scope must
      map to at least one epic's in_scope as that epic's owned responsibility.
      If a capability is cross-cutting (touches multiple domain modules),
      the scoping agent must either (a) create a dedicated epic with a
      documented justification for why single-module-scope does not apply,
      or (b) explicitly assign each fragment of the capability to a named
      epic whose in_scope list claims it. No in_scope capability may be
      silently absorbed as an implementation detail without explicit
      ownership in an epic's in_scope field.
  - id: C17
    rule: >
      No epic may include in its in_scope any capability that appears in
      product.yaml scope.out_of_scope or is explicitly marked as deferred.
      The reverse-coverage check must cross-reference every epic's in_scope
      against product.yaml's out_of_scope and deferred items and flag
      violations as deferred_violation status. A deferred_violation is a
      hard halt — the epic must be corrected before proceeding.

failure_conditions:
  - id: F1
    condition: >
      Any epic in the roadmap does not represent a distinct, deliverable
      capability — epics are too granular (task-level) or too broad
      (multiple unrelated capabilities merged).
  - id: F2
    condition: >
      Any epic in the roadmap does not trace to a strategic goal
      from the locked vision.
  - id: F3
    condition: >
      Any epic is missing one or more IDD fields (intent, constraints,
      success scenarios, or failure conditions).
  - id: F5
    condition: >
      The final roadmap was produced without explicit human approval
      of epics.yaml and feasibility.yaml at the play checkpoint.
  - id: F7
    condition: >
      The roadmap contains thesis, narrative, timeline sequencing,
      exclusions, or assumptions that differ from the locked upstream
      artifacts (product.yaml) or approved epics/feasibility —
      indicating regeneration rather than verbatim transcription.
  - id: F8
    condition: >
      The roadmap was produced while critical_blockers or open_questions
      from the feasibility assessment remain unresolved — items exist
      in the arrays but no corresponding resolution was collected from
      the user.
  - id: F9
    condition: >
      Any epic in epics.yaml has an empty ltm_citations field when
      LTM knowledge files were available — indicating the agent did
      not record which memory informed the epic's derivation.
  - id: F10
    condition: >
      The confidence assessment was performed by the same agent that
      scoped the epics (product-strategist) rather than by a
      context-isolated judge — self-assessment, not independent evaluation.
  - id: F11
    condition: >
      A discrete capability listed in product.yaml scope.in_scope has no
      owning epic — it does not appear in any epic's in_scope field, or
      was silently absorbed as an implementation detail into an epic whose
      in_scope does not explicitly claim it.
  - id: F12
    condition: >
      An epic's in_scope contains a capability that is explicitly listed
      in product.yaml scope.out_of_scope or marked as deferred — the epic
      claims work that the product vision intentionally excludes from the
      current scope.

scenarios:
  - id: S1
    persona: Product Manager
    given: Approved epics.yaml, feasibility.yaml, and full roadmap
    then: >
      Can clearly describe each epic's intent, constraints, and
      success criteria to stakeholders without additional research.
  - id: S2
    persona: Product Owner
    given: Full roadmap with scoped epics
    then: >
      Can break every epic into backlog items with clear acceptance
      criteria derived from the epic's success scenarios and
      failure conditions.
  - id: S3
    persona: Engineering Lead
    given: Full roadmap with feasibility data (per-feature risk, blockers, sequencing constraints)
    then: >
      Can identify technical dependencies, risk levels, and
      blockers across all features, and sequence engineering work
      accordingly using the feasibility section of roadmap.yaml.
  - id: S4
    persona: Stakeholder
    given: epics.yaml and feasibility.yaml presented at the play checkpoint
    then: >
      Can review the artifacts, identify blockers that need resolution,
      and approve, reject, or request specific changes using the play
      checkpoint flow. May optionally run /briefs to generate an HTML
      rendering for review.
  - id: S5
    persona: Technical Architect
    given: Feasibility section of roadmap.yaml and risk summary
    then: >
      Can identify architecture-impacting features, shared
      infrastructure needs, and cross-cutting technical risks
      that require resolution before architecture planning begins.
  - id: S6
    persona: Product Manager
    given: Feasibility assessment with non-empty critical_blockers and open_questions
    then: >
      Can resolve each blocker and open question through a structured
      resolution interview, with all resolutions captured in an audit
      artifact before roadmap production proceeds.
  - id: S7
    persona: Technical Architect
    given: >
      A roadmap produced from a product.yaml with three-axis profiles
      (PP, NFR, QP)
    then: >
      Can verify that epic scope and depth reflect the profile values —
      a POC-level product (PP-6=1) has lightweight epics, while an
      enterprise product (PP-6=5) has comprehensive epics with
      infrastructure and quality considerations.
  - id: S8
    persona: Product Manager
    given: >
      The evidence report for a completed plan-roadmap run
    then: >
      Can trace each epic back to the specific LTM knowledge files
      that informed its derivation — domain taxonomy, profile knowledge,
      architecture patterns — providing full reasoning traceability.
  - id: S9
    persona: Stakeholder
    given: >
      The confidence report produced by the judge agent
    then: >
      Can see an independent (not self-assessed) confidence score per
      epic with rationale, helping prioritize which epics need deeper
      review or refinement before committing to them.
  - id: S10
    persona: Product Manager
    given: >
      The reverse-coverage report produced by the judge after epic scoping,
      with scope-item-level and deferred-item cross-reference results
    then: >
      Can verify that every in_scope capability from product.yaml has an
      explicit epic owner, that no epic claims deferred capabilities, and
      can identify any cross-cutting capabilities that required horizontal
      epic exceptions — with full traceability from product scope to epic
      ownership.
