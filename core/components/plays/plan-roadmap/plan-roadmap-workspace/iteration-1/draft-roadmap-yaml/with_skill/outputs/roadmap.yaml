# --- The Bet ---

thesis: "Meridian OS bets that intent-driven development — where AI assistants carry persistent project memory and execute structured, auditable workflows — will eliminate the context-switching tax that makes current AI-assisted development wasteful and inconsistent."

narrative: |
  The roadmap begins with two foundational investments that everything else depends on: Persistent Project Memory (F1) and the Play Execution Engine (F2). These are near-horizon, P1 priorities because without a memory layer that survives across sessions and an execution backbone that orchestrates agents reliably, no downstream feature can function. F1 establishes the .meridian/ directory structure, STM/LTM resolution, and config.yaml patterns. F2 builds the play/agent/skill hierarchy with JSON contract flows, checkpoint handling, and evidence collection.

  Once the foundation is solid, the mid-horizon focuses on the Artifact Generation Pipeline (F3) and Product Discovery Flow (F4). F3 introduces the 7-artifact schema system where specialized skills produce YAML artifacts and HTML briefs from structured inputs — enabling audience-separated views from a single source of truth. F4 builds on top of both the play engine and artifact pipeline to deliver the /discover-product flow, taking engineers from a problem statement to a locked product.yaml with market context, vision, and stakeholder-reviewable HTML briefs.

  The long-horizon addresses Zero-Friction Onboarding (F5), ensuring that adopting Meridian OS requires nothing more than a git clone and /sync-claude. This can be built in parallel with mid-horizon work once the foundation is stable. The deployment model (global vs project mode) is defined here, making sure the barrier to entry stays near zero.

  The overall sequencing is driven by dependency reality: memory before execution, execution before artifacts, artifacts before discovery flows. Risk is concentrated in the medium tier (F2's agent timeout constraints, F3's schema validation gap) but no hard blockers exist. The two foundation features (F1, F2) represent the highest-leverage work — they unlock everything that follows.

