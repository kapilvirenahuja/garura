# --- The Bet ---

thesis: "Meridian OS establishes the operating layer for intent-driven AI development by building persistent project memory and structured play execution first, then layering artifact generation, product discovery, and frictionless onboarding on top — converting AI assistants from session-scoped suggestion engines into context-aware development partners."

narrative: |
  The roadmap begins with two foundational investments that every subsequent capability depends on: persistent project memory (F1) and the play execution engine (F2). Without a durable memory layer, AI sessions start blank and engineers waste cycles re-explaining context. Without a structured execution engine, development operations remain ad-hoc and unauditable. These two features run in the near horizon because nothing else can function without them.

  Once the foundation is in place, the mid horizon introduces the artifact generation pipeline (F3) and the product discovery flow (F4). The artifact pipeline establishes the seven-artifact schema system where product, engineering, and stakeholder views are all derived from a single source of truth — eliminating the manual sync tax that plagues multi-audience documentation. Product discovery builds on both the play engine and the artifact pipeline to deliver a structured path from problem statement to locked product vision, enabling progressive enrichment from the very first interaction.

  The long horizon addresses zero-friction onboarding (F5), which can only be validated after the core loop — memory, plays, artifacts, and discovery — is proven. Onboarding depends on F1 and F2 being stable enough that a new project can sync components and execute its first play within five minutes. Attempting to optimize onboarding before the core experience is solid would optimize for the wrong thing.

  This sequencing reflects a deliberate bet: invest in infrastructure depth before breadth. The near horizon carries the highest architectural impact — establishing directory structures, execution hierarchies, and contract patterns that all downstream features inherit. Getting these patterns wrong would compound across every subsequent feature, so they receive priority and the most rigorous feasibility scrutiny.

