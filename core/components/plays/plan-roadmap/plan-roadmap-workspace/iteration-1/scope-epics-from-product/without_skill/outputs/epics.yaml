epics:
  - id: "F1"
    title: "Project Memory Layer"
    strategic_goal_ref: "SG1"
    rationale: >
      SG1 demands that >90% of AI sessions start with full project context.
      This requires a persistent memory layer that captures project intent,
      constraints, architectural decisions, and current state — and loads
      them automatically into every new AI session without manual re-entry.
    intent:
      p1: "Eliminate cold-start problem for AI sessions by providing persistent, structured project memory"
      p2: "Enable AI assistants to resume work with full awareness of project intent, constraints, and past decisions"
      p3: "Reduce context re-explanation overhead from minutes-per-session to zero"
    constraints:
      in_scope:
        - "Long-term memory (LTM) storage format and schema for project artifacts"
        - "Short-term memory (STM) per-session and per-issue state management"
        - "Automatic context loading on session start"
        - "Memory read/write operations exposed to agents and skills"
      out_of_scope:
        - "Cross-project memory sharing or federation"
        - "Memory sync across multiple concurrent AI sessions"
        - "Visual memory browser or dashboard"
      must_not_break:
        - "Existing Claude Code session startup behavior"
        - "File system conventions already adopted by users"
        - "CLAUDE.md loading mechanism"
    success_scenarios:
      - given: "A developer has run three prior AI sessions on a project that produced architectural decisions and constraint artifacts"
        when: "The developer starts a new AI session in the same project"
        then: "The AI session loads all prior decisions, constraints, and current state automatically — the developer issues a task without re-explaining context and the AI references prior decisions correctly"
      - given: "An agent is executing a play step that depends on knowing the project's target users and value proposition"
        when: "The agent queries the memory layer for the product artifact"
        then: "The agent receives the complete product artifact including target_users, differentiators, and strategic_goals — and uses them to produce contextually accurate output"
      - given: "A project has accumulated 50+ memory artifacts across LTM and STM"
        when: "A new session starts"
        then: "Only relevant context is loaded (not the entire memory store), and session startup completes in under 5 seconds"
    failure_conditions:
      - "AI session starts without loading any prior project context despite artifacts existing in memory"
      - "Memory artifacts become stale or contradictory with no mechanism to detect or resolve conflicts"
      - "Memory loading adds more than 10 seconds to session startup time"

  - id: "F2"
    title: "Play Execution Engine"
    strategic_goal_ref: "SG2"
    rationale: >
      SG2 requires >80% play execution success without human intervention.
      This demands a deterministic execution engine that resolves play DAGs,
      delegates to agents, tracks progress, and handles failure — making
      development operations repeatable and auditable rather than ad-hoc.
    intent:
      p1: "Make common development operations repeatable, auditable, and delegatable through structured play execution"
      p2: "Achieve >80% play completion without human intervention by deterministic DAG resolution and agent orchestration"
      p3: "Replace ad-hoc AI prompting with contractual workflows that produce predictable, traceable outputs"
    constraints:
      in_scope:
        - "Play definition format and execution model"
        - "DAG resolution for play steps with dependency tracking"
        - "Agent delegation via Task tool with JSON contracts"
        - "Play completion tracking and eval pass rate measurement"
        - "Error handling and recovery within play execution"
      out_of_scope:
        - "Visual play builder or drag-and-drop editor"
        - "Play marketplace or sharing platform"
        - "Cross-project play orchestration"
      must_not_break:
        - "Existing play invocation patterns"
        - "Agent autonomy within their delegated scope"
        - "Claude Code Task tool semantics"
    success_scenarios:
      - given: "A developer invokes the plan-roadmap play on a project with a LOCKED product artifact"
        when: "The play executes its full DAG including product analysis, epic derivation, and roadmap generation"
        then: "All play steps complete successfully, each agent produces its contracted output, and the final roadmap artifact is written to STM — no human intervention required"
      - given: "A play step fails because an agent cannot resolve a dependency"
        when: "The play engine detects the failure"
        then: "The engine logs the failure with context, marks the step as failed, reports the failure condition to the user, and does not silently skip the step or produce partial output"
    failure_conditions:
      - "Play silently skips a step and produces incomplete output without surfacing the gap"
      - "Play inlines domain work that should be delegated to an agent (bypassing the agent layer)"
      - "Play execution produces different outputs for identical inputs without any change in context"

  - id: "F3"
    title: "Audience-Separated Artifact Generation"
    strategic_goal_ref: "SG3"
    rationale: >
      SG3 requires 100% of artifacts to be derived from shared intent.
      Different audiences (product, engineering, stakeholders) need different
      views of the same underlying truth. This epic delivers the machinery
      to generate audience-specific artifacts from a single source of truth
      with full traceability.
    intent:
      p1: "Generate product, engineering, and stakeholder artifacts from a single source of truth"
      p2: "Ensure every generated artifact is traceable to its source intent — no orphaned or contradictory documents"
      p3: "Eliminate the drift between what product describes, what engineering builds, and what stakeholders see"
    constraints:
      in_scope:
        - "Artifact generation pipeline from source product/intent artifacts"
        - "Audience-specific rendering (product spec, technical spec, stakeholder summary)"
        - "Lineage tracking — every artifact references its source"
        - "Doc-builder agent orchestration for artifact production"
      out_of_scope:
        - "Real-time collaborative editing of artifacts"
        - "Artifact versioning with diff/merge capabilities"
        - "Export to external formats (PDF, Confluence, Google Docs)"
      must_not_break:
        - "Existing artifact formats already in use (product.yaml, epics.yaml)"
        - "STM file structure and naming conventions"
        - "Agent contracts — doc-builder must remain the artifact production agent"
    success_scenarios:
      - given: "A LOCKED product.yaml exists with strategic goals, target users, and differentiators"
        when: "The artifact generation pipeline is triggered for engineering and stakeholder audiences"
        then: "Two distinct artifacts are produced — an engineering-facing technical roadmap and a stakeholder-facing summary — both traceable to the same product.yaml source, with no contradictions between them"
      - given: "The product.yaml is updated with a new strategic goal"
        when: "Artifacts are regenerated"
        then: "All downstream artifacts reflect the new strategic goal, and lineage metadata shows they were derived from the updated source"
    failure_conditions:
      - "An artifact is generated that contains information not present in or contradicting the source artifact"
      - "Traceability is broken — an artifact exists with no reference to its source, making audit impossible"

  - id: "F4"
    title: "Progressive Enrichment Pipeline"
    strategic_goal_ref: "SG4"
    rationale: >
      SG4 targets <30 minutes from idea to first AI-assisted commit.
      This demands a pipeline where artifacts start minimal and gain depth
      incrementally — users should not be blocked by heavyweight upfront
      specification. The system must support lightweight entry points that
      progressively enrich into full specifications.
    intent:
      p1: "Enable developers to go from raw idea to first AI-assisted commit in under 30 minutes"
      p2: "Support artifact maturity progression — lightweight drafts evolve into rich specifications without rework"
      p3: "Prevent upfront specification overhead from blocking execution velocity"
    constraints:
      in_scope:
        - "Artifact status lifecycle (DRAFT → REVIEW → LOCKED)"
        - "Incremental enrichment — agents add depth to existing artifacts without rewriting"
        - "Minimal viable artifact templates that capture just enough to start"
        - "Discovery-to-commit workflow spanning product discovery through implementation"
      out_of_scope:
        - "Automatic enrichment without human trigger (no background processing)"
        - "Enrichment of third-party or externally authored documents"
        - "AI-driven artifact merging from multiple conflicting sources"
      must_not_break:
        - "LOCKED artifact immutability — LOCKED artifacts must not be modified by enrichment"
        - "Existing play chains that depend on artifact status gates"
        - "STM/LTM separation — enrichment writes to correct memory tier"
    success_scenarios:
      - given: "A developer has a raw product idea described in two sentences"
        when: "They invoke the discover-product play"
        then: "A DRAFT product.yaml is produced within 5 minutes containing problem, target_users, and value_proposition — sufficient to invoke the next play in the chain"
      - given: "A DRAFT product.yaml exists with minimal fields"
        when: "The developer invokes progressive enrichment"
        then: "The artifact is enriched with competitors, risks, market_size, and differentiators — the original fields are preserved, not overwritten — and the status advances to REVIEW"
    failure_conditions:
      - "Enrichment overwrites existing fields instead of augmenting them, losing prior human-validated content"
      - "The minimum viable artifact is too heavyweight — requiring more than 10 minutes of input to produce the first usable artifact"
      - "A LOCKED artifact is modified by an enrichment operation"

  - id: "F5"
    title: "Zero-Friction Project Onboarding"
    strategic_goal_ref: "SG5"
    rationale: >
      SG5 demands <5 minutes from git clone to first play execution.
      Adoption collapses if setup requires new infrastructure, tool installation,
      or migration. This epic ensures Meridian works within existing Claude Code
      setups with minimal configuration and no external dependencies.
    intent:
      p1: "Enable any developer with Claude Code to run their first Meridian play within 5 minutes of cloning the repo"
      p2: "Eliminate infrastructure requirements, tool installations, and migration costs as adoption barriers"
      p3: "Make the onboarding path self-evident — no documentation study required before first use"
    constraints:
      in_scope:
        - "Single sync command to deploy all components (/sync-claude)"
        - "CLAUDE.md as the sole configuration surface for project behavior"
        - "Convention-based directory structure that Claude Code discovers automatically"
        - "First-run experience that guides users to their first play"
      out_of_scope:
        - "GUI-based setup wizard or installer"
        - "Support for non-Claude AI providers during onboarding"
        - "Automated CI/CD pipeline integration during initial setup"
      must_not_break:
        - "Standard Claude Code behavior and file conventions"
        - "Existing .claude/ directory usage patterns"
        - "Git repository structure — no mandatory gitignore overrides"
    success_scenarios:
      - given: "A developer has Claude Code installed and clones the meridian-os repository"
        when: "They run /sync-claude and then invoke a play"
        then: "All components deploy to ~/.claude/ within 60 seconds, the play is available as a slash command, and the first play executes successfully"
      - given: "A developer on a fresh machine with only Claude Code installed tries to adopt Meridian for an existing project"
        when: "They follow the onboarding path"
        then: "No additional tools, packages, or infrastructure are required — setup completes using only git clone and /sync-claude, total elapsed time under 5 minutes"
    failure_conditions:
      - "Setup requires installing a tool or runtime beyond Claude Code and git"
      - "First play execution fails due to missing configuration that was not set up by /sync-claude"
      - "Onboarding requires reading more than one page of documentation before the first successful play run"

  - id: "F6"
    title: "Agent-Skill Composition Framework"
    strategic_goal_ref: "SG2"
    rationale: >
      SG2's play success rate depends on a reliable agent-skill composition
      layer. Plays delegate to agents, agents invoke skills — but this
      three-layer hierarchy needs a formal contract system so that agents
      and skills are interchangeable, testable, and composable without
      tight coupling. Without this, play reliability degrades as
      complexity grows.
    intent:
      p1: "Establish a formal contract system for agent-skill composition that ensures reliable delegation and output consistency"
      p2: "Enable agents and skills to be independently testable, replaceable, and composable within plays"
      p3: "Prevent tight coupling between play logic and specific agent/skill implementations"
    constraints:
      in_scope:
        - "Agent definition format with explicit capability declarations"
        - "Skill interface contracts — input schema, output schema, invocation protocol"
        - "Agent-to-skill delegation via structured JSON contracts"
        - "Skill discovery — agents can find and invoke skills by capability, not hardcoded name"
        - "Budget enforcement — L1 max 2 agent calls, L2 max 5 domain agent calls"
      out_of_scope:
        - "Dynamic skill generation or runtime skill creation"
        - "Multi-model agent orchestration (agents using different LLM providers)"
        - "Agent-to-agent direct communication (all communication goes through play)"
      must_not_break:
        - "Existing agent definitions in core/components/agents/"
        - "Existing skill definitions in core/components/skills/"
        - "Play execution engine's agent invocation mechanism"
    success_scenarios:
      - given: "A play delegates a task to the tech-designer agent which requires producing a low-level design"
        when: "The tech-designer agent identifies the draft-lld skill as the appropriate capability"
        then: "The agent invokes the skill with a well-formed JSON contract, receives the LLD artifact, validates it against the skill's output schema, and returns the result to the play"
      - given: "A new skill is added to core/components/skills/ with a properly defined interface contract"
        when: "An agent needs the capability that skill provides"
        then: "The agent discovers and invokes the new skill without any changes to the agent definition or play logic"
    failure_conditions:
      - "An agent invokes a skill with malformed input and receives no error — the skill silently produces garbage output"
      - "Adding a new skill requires modifying existing agent definitions or play code to make it discoverable"
      - "Budget enforcement is bypassed — a play exceeds its max agent call limit without detection"
