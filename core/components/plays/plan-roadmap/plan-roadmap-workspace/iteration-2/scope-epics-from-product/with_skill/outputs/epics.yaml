slug: "meridian-os"
product_yaml_path: "core/components/plays/plan-roadmap/evals/fixtures/product.yaml"
time_horizon: "12 months"
generated_at: "2026-03-16"

epics:
  - id: "F1"
    name: "Project Memory Layer"
    strategic_goal_ref: "SG1"
    description: "Establish a persistent, structured memory system that retains project intent, constraints, architectural decisions, and current state across AI sessions. This is the foundation that all other epics depend on — without durable context, every session starts blank."
    bucket: "near"
    priority: "P1"
    effort: "L"
    depends_on: []
    foundation_investment: true
    github_issue_ref: "TBD"
    intent:
      p1: "Today, AI assistants operate in an amnesiac loop. Every new Claude Code session starts with zero knowledge of the project's architecture, past decisions, active constraints, or current state. Engineers waste significant time re-explaining context — describing the same intent model, the same repo structure, the same design constraints — before the AI can do useful work. This re-entry tax compounds across sessions: a team running 10+ AI sessions per day loses hours to context reconstruction that a human colleague would never need."
      p2: "After this epic ships, every AI session begins fully informed. The assistant loads the project's intent hierarchy (product vision, strategic goals, epics), knows which decisions have been made and why, understands the current codebase structure, and can reference past conversations. Engineers issue a command and the AI executes with full awareness — no preamble, no re-explanation, no drift from prior decisions. The experience shifts from 'teaching a new intern every morning' to 'resuming work with a colleague who was here yesterday.'"
      p3: "Persistent context is the single most foundational capability in the Meridian OS thesis. The entire value proposition — that AI assistants can be delegated to rather than babysitted — collapses without it. If the AI cannot remember what the project is, structured workflows become brittle (they lack context to make decisions), artifact generation becomes generic (it has no product-specific knowledge to draw from), and progressive enrichment is impossible (there is no prior state to enrich from). SG1 is not just a goal — it is the enabling condition for SG2 through SG5."
    constraints:
      in_scope: "Long-term memory (LTM) storage for standards, templates, and reusable knowledge. Short-term memory (STM) storage for project-specific artifacts, issue-level state, and session context. Memory read/write primitives that skills and agents can invoke. A defined memory layout convention (directory structure, file naming, YAML schema). Memory deployment mechanism to make context available at session start (CLAUDE.md, config.yaml loading)."
      out_of_scope: "Semantic search or vector-based retrieval over memory. Cross-project memory sharing or team-level memory aggregation. Memory versioning or rollback (git handles this at the file level). Real-time memory synchronization across concurrent sessions."
      must_not_break: "None at this stage — foundational epic."
    success_scenarios:
      - "Given a project with a locked product.yaml and three prior AI sessions, when a new Claude Code session starts, then the AI can state the product's strategic goals, active epics, and most recent decisions without being prompted to read any files manually."
      - "Given an agent executing a skill that requires project context, when the skill reads from STM at the configured base path, then it retrieves the correct project-specific artifacts (product.yaml, epics.yaml, feasibility reports) without path guessing or file-not-found errors."
      - "Given an engineer switching between two Meridian-managed projects, when they open a Claude Code session in each project directory, then the AI loads the correct project's memory — not the other project's context."
    failure_conditions:
      - "An AI session begins and the assistant cannot name the product's strategic goals without being explicitly told to read product.yaml."
      - "A skill writes an artifact to STM but a subsequent skill in the same play cannot find it because the path convention is ambiguous or undocumented."
      - "Memory files are scattered across inconsistent locations with no discoverable layout, forcing engineers to manually point the AI at the right files each session."

  - id: "F2"
    name: "Play Execution Engine"
    strategic_goal_ref: "SG2"
    description: "Build the play execution model that chains agents and skills into repeatable, auditable development workflows. Plays are the primary interface through which engineers delegate complex operations to AI — from product discovery to code commits."
    bucket: "near"
    priority: "P1"
    effort: "L"
    depends_on:
      - "F1"
    foundation_investment: true
    github_issue_ref: "TBD"
    intent:
      p1: "Engineers using AI assistants today operate in an ad-hoc mode: they issue free-form prompts, manually sequence multi-step operations, and have no structured way to repeat a successful workflow. When a complex task like 'plan a roadmap' requires reading product context, deriving epics, assessing feasibility, and producing a sequenced plan — the engineer must orchestrate each step by hand, remembering the right order, the right inputs, and the right validation checks. There is no replayable, auditable record of what happened or why."
      p2: "After this epic ships, engineers invoke a single play command (e.g., /plan-roadmap, /commit-code) and the system orchestrates the full workflow automatically. The play chains the right agents in the right order, passes structured contracts between them, runs evaluations at each stage, and produces auditable evidence of what was done. Engineers delegate the workflow, not just individual prompts. Failed steps are traceable — the engineer can see exactly where and why a play broke down."
      p3: "Structured workflows are the mechanism through which Meridian OS delivers its core promise of delegation over babysitting. Without plays, the system is just a collection of disconnected skills — useful individually but requiring human orchestration to combine. SG2's target of >80% play success without human intervention sets the quality bar: plays must be robust enough to run end-to-end, not fragile chains that break at every junction. This epic transforms Meridian from a toolkit into an operating system."
    constraints:
      in_scope: "Atomic play execution (human or model invocable, up to 2 agent calls). High-order play execution (human invocable only, up to 5 domain agent calls). Agent invocation via Task tool with structured JSON contracts. Play-level evaluation and evidence generation. Play DAG resolution for multi-step workflows. SKILL.md as the canonical definition format for skills invoked by agents."
      out_of_scope: "L3 or higher play nesting. Visual play builder or drag-and-drop workflow editor. Play marketplace or sharing across organizations. Custom agent creation by end users — agents are framework-defined."
      must_not_break: "None at this stage — foundational epic. However, plays must operate cleanly with F1's memory layer — reading from and writing to STM at the correct paths."
    success_scenarios:
      - "Given a locked product.yaml in STM, when an engineer invokes the plan-roadmap play, then the play chains product-strategist and tech-designer agents in sequence, produces epics.yaml and feasibility reports, and completes without manual intervention."
      - "Given a play that fails at the feasibility assessment stage, when the engineer reviews the execution, then they can identify the exact agent call that failed, the input it received, and the structured error it returned — without re-running the play."
      - "Given two atomic plays that share no dependencies, when they are invoked in sequence, then each executes with its own isolated agent context and neither corrupts the other's STM artifacts."
    failure_conditions:
      - "A play requires the engineer to manually invoke agents or skills between steps — the orchestration is not automatic."
      - "Play execution produces no evidence trail — there is no audit record of which agents ran, what inputs they received, or what outputs they produced."
      - "Plays silently succeed even when an agent returns a structured failure — errors are swallowed instead of surfacing to the engineer."

  - id: "F3"
    name: "Artifact Generation Pipeline"
    strategic_goal_ref: "SG3"
    description: "Enable generation of audience-separated artifacts — product specs, technical designs, stakeholder summaries — all derived from a single source of truth in the intent hierarchy. Different audiences get different views of the same underlying intent."
    bucket: "mid"
    priority: "P2"
    effort: "M"
    depends_on:
      - "F1"
      - "F2"
    foundation_investment: false
    github_issue_ref: "TBD"
    intent:
      p1: "In current AI-assisted development, artifacts are generated independently with no shared lineage. A product spec written in one session has no structural connection to the technical design written in another. When the product intent changes, there is no mechanism to propagate that change to downstream artifacts — the engineer must manually update each document, often discovering drift only when implementation contradicts the spec. Teams end up with conflicting artifacts that each tell a slightly different story about what the product is and what it should do."
      p2: "After this epic ships, engineers generate product specs, technical approaches, implementation briefs, and stakeholder summaries from the same intent hierarchy. When a strategic goal changes in product.yaml, downstream artifacts can be regenerated with updated context. A product manager sees a product-focused view; an engineer sees a technical-focused view; a stakeholder sees an executive summary — all traceable to the same source. Artifact lineage is explicit: every generated document references the intent artifacts it was derived from."
      p3: "Audience-separated artifacts are the tangible output layer of Meridian OS. While persistent context (SG1) and structured workflows (SG2) are enabling infrastructure, artifact generation is where users see direct value — documents they would otherwise write manually are produced automatically and consistently. SG3's target of 100% artifact derivation from shared intent ensures there is one truth, not many versions of it. This positions Meridian as the single pane of glass for project intent, not just another document generator."
    constraints:
      in_scope: "Product spec generation from product.yaml and epics. Technical approach documents from feasibility assessments. Implementation briefs that bridge product intent to code tasks. Artifact lineage metadata — each artifact records which source artifacts it was derived from. Template-driven generation using LTM standards."
      out_of_scope: "Real-time collaborative editing of generated artifacts. PDF or slide deck rendering — output is Markdown and YAML only. Artifact diffing or change-impact analysis across versions. Localization or multi-language artifact generation."
      must_not_break: "F1 memory layer — artifact generation must read from and write to STM without corrupting existing artifacts. F2 play execution — artifact generation runs inside plays, not as standalone scripts."
    success_scenarios:
      - "Given a locked product.yaml with 5 strategic goals and a completed epics.yaml, when the engineer invokes a spec-generation play, then the system produces a product spec and a technical approach document, both referencing the same strategic goals and epic IDs from the source artifacts."
      - "Given two artifacts generated from the same product.yaml, when a reviewer compares them, then both artifacts reference the same strategic goal IDs and epic IDs — there are no orphaned references or contradictory goal descriptions."
    failure_conditions:
      - "Generated artifacts contain strategic goal descriptions that differ from product.yaml — the generation process paraphrased or fabricated goal text instead of deriving from source."
      - "An engineer cannot trace a generated artifact back to the specific product.yaml and epics.yaml versions it was derived from — lineage metadata is missing or incomplete."
      - "Artifacts for different audiences contain contradictory statements about scope, priority, or intent because they were generated independently without a shared source."

  - id: "F4"
    name: "Progressive Enrichment Pipeline"
    strategic_goal_ref: "SG4"
    description: "Implement the progressive enrichment model where artifacts start lightweight and gain depth as the project matures. Early stages produce thin artifacts quickly; later stages enrich them with feasibility analysis, implementation detail, and verification scenarios."
    bucket: "mid"
    priority: "P2"
    effort: "M"
    depends_on:
      - "F1"
    foundation_investment: false
    github_issue_ref: "TBD"
    intent:
      p1: "Current AI-assisted workflows force a binary choice: either produce a shallow artifact quickly (and revisit it endlessly) or invest heavily upfront in a comprehensive document (and risk wasting effort on an idea that pivots). There is no structured path from lightweight to detailed. Engineers who start with a rough product description have no guided process to systematically deepen it into strategic goals, then epics, then feasibility assessments, then implementation plans. Each enrichment step is manual, ad-hoc, and disconnected from the prior step."
      p2: "After this epic ships, engineers start with a minimal product description and progressively enrich it through defined stages. A single discover-product session produces a locked product.yaml in under 30 minutes. From there, plan-roadmap enriches it with epics and feasibility. Create-play enriches further with implementation-ready specifications. Each stage builds on the prior stage's artifacts — no re-entry, no redundant re-description. The artifact at each stage is complete for that stage's purpose, and the system knows which enrichment stages have been completed and which remain."
      p3: "Progressive enrichment is what makes Meridian OS practical for real-world development. SG4's target of idea-to-first-commit in under 30 minutes is only achievable if each stage produces just enough artifact for the next stage to consume — no over-engineering, no premature detail. This model also makes the system resilient to pivots: if an idea changes direction after product discovery but before implementation planning, only the lightweight early artifacts need updating, not a monolithic specification document. Progressive enrichment aligns AI effort with project certainty."
    constraints:
      in_scope: "Defined enrichment stages with clear input/output contracts (discover → plan → create → implement). Stage-awareness metadata in artifacts (which stages have been completed). Thin-to-deep artifact evolution — each stage adds fields without rewriting prior fields. Stage gating — later stages validate that prerequisite stages are complete (e.g., plan-roadmap requires LOCKED product.yaml)."
      out_of_scope: "Automatic stage advancement without engineer invocation — each stage is explicitly triggered. Rollback of enrichment stages — enrichment is forward-only (git handles version history). Parallel enrichment paths — stages are sequential by design."
      must_not_break: "F1 memory layer — enrichment writes to STM and must not corrupt artifacts from prior stages. Existing artifact schemas — enrichment adds fields, never removes or renames fields defined by earlier stages."
    success_scenarios:
      - "Given a brand-new project with no artifacts, when an engineer runs discover-product followed by plan-roadmap, then the total elapsed time from first command to completed epics.yaml is under 30 minutes, and each artifact is valid for its stage without requiring manual correction."
      - "Given a product.yaml that was locked two weeks ago, when the engineer invokes plan-roadmap, then the play reads the existing product.yaml (does not re-ask discovery questions), enriches it with epics and feasibility, and writes new artifacts alongside the existing ones without modifying product.yaml."
    failure_conditions:
      - "An enrichment stage overwrites or modifies artifacts from a prior stage instead of writing new artifacts alongside them."
      - "The system cannot determine which enrichment stages have been completed for a project — there is no stage-awareness metadata, forcing the engineer to manually track progress."
      - "A later enrichment stage (e.g., create-play) succeeds even though a prerequisite stage (e.g., plan-roadmap) was never completed — stage gating is absent."

  - id: "F5"
    name: "Bootstrap and Onboarding"
    strategic_goal_ref: "SG5"
    description: "Deliver a zero-friction onboarding experience where engineers go from git clone to first play execution in under 5 minutes. No new infrastructure, no external dependencies, no migration cost — works with existing Claude Code setup."
    bucket: "near"
    priority: "P1"
    effort: "S"
    depends_on:
      - "F1"
      - "F2"
    foundation_investment: false
    github_issue_ref: "TBD"
    intent:
      p1: "Developer tools live or die by their onboarding friction. Today, adopting a new AI workflow framework means installing dependencies, configuring integrations, migrating existing project state, and learning a new mental model — all before seeing any value. Most engineers abandon tools during setup, not during use. For Meridian OS specifically, the risk is that the play/agent/skill hierarchy appears complex, and engineers bounce before experiencing the productivity gain. There is no guided path from 'I cloned this repo' to 'I just ran my first play and it worked.'"
      p2: "After this epic ships, an engineer clones the Meridian OS repository, runs a single sync command, and immediately has access to all plays, agents, and skills in their Claude Code environment. The first play they run (e.g., discover-product) works out of the box with no configuration. CLAUDE.md loads automatically, memory paths resolve correctly, and the engineer is productive within minutes. The onboarding experience is self-documenting — the system itself guides the engineer through the first workflow rather than relying on external documentation."
      p3: "Zero-friction adoption is a strategic necessity, not a nice-to-have. SG5's target of under 5 minutes from clone to first play execution ensures that Meridian OS competes on ease of adoption, not just capability. If the framework requires 30 minutes of setup, it loses to ad-hoc prompting — which requires zero setup. Every minute of onboarding friction is a minute where the engineer questions whether structured workflows are worth the investment. This epic ensures the answer is obvious within the first 5 minutes."
    constraints:
      in_scope: "Single-command deployment via /sync-claude (global mode as default). CLAUDE.md auto-loading with project context. Config resolution from core/config.yaml without manual path editing. First-run validation that confirms memory paths, skill deployment, and play availability. Clear error messages when prerequisites are missing (e.g., Claude Code version too old)."
      out_of_scope: "GUI-based setup wizard or installer. Docker or container-based deployment. Multi-OS packaging (homebrew, apt, etc.) — assumes macOS/Linux with Claude Code installed. Automated CI/CD pipeline setup — this is about developer workstation onboarding."
      must_not_break: "F1 memory layer — bootstrap must correctly initialize memory paths without corrupting any existing project memory. F2 play engine — deployed plays must be immediately executable after sync."
    success_scenarios:
      - "Given a developer who has never used Meridian OS, when they clone the repository and run the sync command, then all plays appear as available slash commands in Claude Code within 5 minutes of starting, with no manual file copying or path configuration."
      - "Given a freshly synced Meridian OS installation, when the developer invokes /discover-product for the first time, then the play executes successfully — it does not fail due to missing memory paths, unresolved config references, or undeployed skills."
    failure_conditions:
      - "A new user must edit configuration files or set environment variables before plays work — the setup is not truly zero-configuration."
      - "The sync command completes but plays fail at runtime because memory paths, agent definitions, or skill files were not deployed to the correct locations."
