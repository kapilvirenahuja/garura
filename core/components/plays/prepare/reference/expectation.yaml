# Expectation for the prepare play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: prepare

generated_from:
  intent: core/components/plays/prepare/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
# Lifted verbatim from the legacy intent scenarios (S1–S13); only `measure` is added.
success_scenarios:
  - id: S1
    persona: Product Owner
    given: The locked epic from specify and scenarios.yaml
    then: >
      Can confirm that every product behavior in the locked epic has at least
      one testable verification scenario in scenarios.yaml with clear pass/fail
      criteria, achieving full traceability between epic behaviors and acceptance
      via feature_ref and behavior_ref back-links.
    measure: >
      Every behavior in the locked epic resolves to at least one new_scenarios (NS-*)
      entry in scenarios.yaml whose feature_ref/behavior_ref points back to that
      behavior, and each such scenario carries non-empty pass_criteria. Zero epic
      behaviors are left without a back-linked scenario.

  - id: S2
    persona: Technical Architect
    given: The locked epic and arch 5-artifact output
    then: >
      Can evaluate whether the technology stack and architectural decisions
      faithfully implement the product behaviors and invariants defined in
      the locked epic, and can identify any architectural gaps or misalignments.
    measure: >
      tech.yaml's technology and pattern choices each trace to an entry in the arch
      output (logical-architecture.yaml, physical-architecture.yaml,
      design-patterns.yaml) with no contradicting choice, and every epic behavior
      maps to a tech.yaml interface that realizes it. No technology appears in
      tech.yaml that is absent from or contradicts the locked architecture.

  - id: S3
    persona: Engineering Lead
    given: A single task in plan.yaml and the established architecture context
    then: >
      Can assign the task to an implementer with confidence that the file
      paths, change types, change specifications, and exit_gate provide
      sufficient context to implement without requiring access to other tasks,
      the full locked epic, or scenarios.yaml content.
    measure: >
      Any single plan.yaml task carries file_changes[] with path and action, a
      spec_ref to a tech.yaml interface ID, and an observable exit_gate — enough to
      implement using only that task plus tech.yaml, with no reference to other
      tasks, the full epic, or any scenario description.

  - id: S4
    persona: Quality Lead
    given: The locked scenarios.yaml feature_gates and plan.yaml scenario_gate entries
    then: >
      Can construct a feature-gated validation plan where each feature slice
      has a defined set of scenarios (by ID) that must pass before the next
      feature begins, without exposing scenario content to implementers.
    measure: >
      Each feature slice's scenario_gate in plan.yaml lists scenario IDs (no
      descriptions, expected_behavior, or pass_criteria), and every listed ID
      resolves to an entry in scenarios.yaml feature_gates. A validation plan can be
      built from IDs alone with zero scenario content present in plan.yaml.

  - id: S5
    persona: Technical Architect
    given: The locked plan.yaml summary section
    then: >
      Can determine the implementation sequence, understand what each feature
      slice delivers as a working capability, and verify that the cumulative
      scenario count in the summary accounts for all verification scenarios by
      the final feature.
    measure: >
      plan.yaml summary rows give a readable execution order with a `delivers`
      sentence per milestone, and the final milestone's cumulative_scenarios is an
      explicit ID list equal to the union of all scenario IDs in scenarios.yaml
      (all baseline + new + regression) with no omissions.

  - id: S6
    persona: Engineering Lead
    given: The context assembly and blast radius reports
    then: >
      Can verify that codebase architecture is understood (design patterns,
      framework conventions, logical architecture), all technology dependencies
      are identified, test coverage is mapped, the change surface is fully
      characterized, and coverage gaps have baseline test specifications —
      sufficient to approve proceeding to artifact generation.
    measure: >
      context-assembly.yaml documents architecture inference, dependencies, test
      surface, and git history with sources, and blast-radius.yaml shows every
      coverage_gaps entry with baseline_test_needed=true has a matching baseline
      test specified — no uncharacterized code path remains in the impact zone.

  - id: S7
    persona: Implementation Agent
    given: The locked artifacts (locked epic, tech, scenarios, plan) and arch architecture output
    then: >
      Can implement any task from the DAG using only the provided artifacts
      without scanning the codebase, reading LTM, or resolving dependencies.
      File paths, change types, interface specifications, and exit gates
      are all explicit in the artifacts.
    measure: >
      For any task in plan.yaml, the file paths, change types, tech.yaml interface
      specifications, and exit gates are all explicit in the artifacts — no field
      points to "see codebase", "follow existing patterns", or any external lookup,
      so implementation needs no codebase scan, LTM read, or dependency resolution.

  - id: S8
    persona: Technical Architect
    given: >
      tech.yaml containing open_questions[] and high-severity risks, plus
      the pre-lock-resolutions.yaml audit artifact
    then: >
      Can verify that every high-severity risk and every open question across
      the three design artifacts was surfaced to the user, that each received
      an explicit resolution, and that resolutions are recorded in
      pre-lock-resolutions.yaml as an audit trail.
    measure: >
      Every open_questions[] entry and every high-severity risk across tech.yaml,
      scenarios.yaml, and plan.yaml has a matching entry in pre-lock-resolutions.yaml
      with status RESOLVED, or the audit records "none found" — no unresolved item
      is present at lock time.

  - id: S9
    persona: Engineer
    given: The blast radius report and baseline test specifications
    then: >
      Can verify every impacted test is identified (direct and transitive),
      every coverage gap has a baseline test specification, co-change patterns
      from git history were considered, and the change surface is fully
      characterized — no uncharacterized code paths in the impact zone.
    measure: >
      blast-radius.yaml lists directly_impacted, transitively_impacted,
      coverage_gaps, and regression_surface; every coverage gap needing a baseline
      test has one in baseline-tests.yaml; and the change surface reflects git
      co-change inputs — leaving no uncharacterized code path in the impact zone.

  - id: S10
    persona: Implementation Agent
    given: The task DAG in plan.yaml with depends_on chains and interface-level specs in tech.yaml
    then: >
      Can execute tasks in dependency order where each task specifies exact
      files, exact change types, exact interface contracts (for MODIFY) or
      component specifications (for CREATE), and exact exit gates — no design
      decisions required at build time.
    measure: >
      The plan.yaml depends_on chains form a valid acyclic order, and every task
      specifies exact files, change types, a tech.yaml interface/component spec_ref,
      and an exit_gate — so tasks execute in order with no design decision required
      at build time.

  - id: S11
    persona: Quality Lead
    given: Three-tier scenarios.yaml (baseline, new, regression) and feature_gates
    then: >
      Can verify baseline tests pass on current unmodified code, new tests
      define the target behavior for the change, and regression tests ensure
      nothing outside the change surface breaks. All three tiers are mapped
      to features via feature_gates.
    measure: >
      scenarios.yaml contains baseline_scenarios, new_scenarios, and
      regression_scenarios tiers, and feature_gates reference IDs from all three
      tiers — baseline tied to current behavior, new to the target change,
      regression to preserved behavior.

  - id: S12
    persona: Technical Architect
    given: architecture-inference.md and tech.md
    then: >
      Can review the logical architecture, design patterns in use, framework
      conventions, and low-level design with diagrams — understanding the
      system's structure beyond what YAML fields can express.
    measure: >
      architecture-inference.md and tech.md each contain at least one diagram
      (mermaid or ASCII) plus narrative explaining logical architecture, patterns,
      framework conventions, and low-level design — content that the YAML fields
      alone do not express.

  - id: S13
    persona: Developer
    given: >
      Developer invokes prepare with no prior start-feature
      or start-feature-planning run. No issue exists, no branch exists, no
      STM directory exists.
    then: >
      The play creates the issue, creates the branch, initializes STM, and
      completes all planning — producing fully locked artifacts in
      {stm_base}/{issue}/context/design/.
      The developer never needs to run start-feature separately.
    measure: >
      Starting with no issue, no branch, and no STM, the run ends with a resolved
      issue, a feature branch checked out, an initialized STM directory, and
      tech.yaml/scenarios.yaml/plan.yaml all status LOCKED under
      {stm_base}/{issue}/context/design/ — with no separate start-feature run needed.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # locked epic carries technology/audience-collision names
    trigger: >
      The locked epic from specify contains technology names, library names, SDK
      references, database product names, hosting platform names, or deployment
      patterns detected during pre-flight.
    direction: >
      The locked epic must stay free of technology and implementation detail; the
      collision lives in an upstream artifact prepare cannot edit, so the epic owner
      must clean it before prepare proceeds.
    handoff: human
    derivable_at_l4: false

  - id: REC2
    for_failure: F2                 # tech.yaml contradicts established architecture
    trigger: >
      tech.yaml uses technologies, frameworks, or patterns that differ from those in
      the arch output (logical-architecture.yaml, physical-architecture.yaml,
      design-patterns.yaml).
    direction: >
      tech.yaml must align with the established architecture; which choice is correct
      when they diverge is an architectural decision, so the architect must reconcile
      tech.yaml against the locked arch before the LLD stands.
    handoff: human
    derivable_at_l4: false

  - id: REC3
    for_failure: F3                 # feature slice not end-to-end
    trigger: >
      A feature slice in plan.yaml covers only one layer and delivers no testable
      path through the full stack.
    direction: >
      Every feature slice must deliver an end-to-end, independently testable
      capability; deciding how to re-slice layer-only work into a user-facing path is
      a design judgment the planner must make.
    handoff: human
    derivable_at_l4: false

  - id: REC4
    for_failure: F4                 # plan task lacks file path + change type
    trigger: >
      A plan.yaml task has an empty or missing file_changes list, or a file entry
      lacks a change type.
    direction: >
      Every task must map to specific file paths with CREATE/MODIFY/DELETE; fill the
      missing file paths and change types from the change surface and tech.yaml.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC5
    for_failure: F5                 # task exit_gate missing or process-step
    trigger: >
      A plan.yaml task has no exit_gate, or its exit_gate references process steps
      rather than an observable outcome.
    direction: >
      Every task must carry an exit_gate stated as an observable outcome; rewrite the
      gate to name what is observable after the task, not the steps taken.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC6
    for_failure: F6                 # scenario missing required fields
    trigger: >
      A verification scenario in scenarios.yaml is missing one or more of:
      description, expected_behavior, pass_criteria, or automation classification.
    direction: >
      Every scenario must carry description, expected_behavior, pass/fail criteria,
      and an automation classification; fill the missing fields for the affected
      scenario.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC7
    for_failure: F7                 # epic behavior with no scenario
    trigger: >
      A product behavior defined in the locked epic has no corresponding
      verification scenario in scenarios.yaml.
    direction: >
      Every epic behavior must be covered by at least one scenario; author a
      back-linked scenario for the uncovered behavior so coverage is complete.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC8
    for_failure: F8                 # plan.yaml carries scenario content
    trigger: >
      plan.yaml contains scenario descriptions, scenario content, or explicit
      references to scenarios.yaml content.
    direction: >
      plan.yaml must reference scenario IDs and counts only; strip scenario content
      back to bare IDs so compartmentalization holds.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC9
    for_failure: F9                 # fewer than 2 feature slices
    trigger: >
      plan.yaml contains fewer than two feature slices in the task DAG, excluding
      prerequisites.
    direction: >
      The plan must carry at least two end-to-end feature slices beyond Phase 0;
      how to decompose the epic into multiple deliverable slices is a planning
      judgment the planner must make.
    handoff: human
    derivable_at_l4: false

  - id: REC10
    for_failure: F10                # locked without required checkpoints
    trigger: >
      Artifacts were produced or locked without passing through all required human
      review checkpoints (context assembly, blast radius, LLD review, scenarios+plan).
    direction: >
      Artifacts may lock only after every required checkpoint has been approved;
      the skipped human approvals must be obtained before any lock stands.
    handoff: human
    derivable_at_l4: false

  - id: REC11
    for_failure: F11                # codebase understanding missed deps/patterns
    trigger: >
      The codebase understanding phase missed technology dependencies, design
      patterns, or architectural structures that exist in the repository but are
      absent from architecture-inference or dependency-graph outputs.
    direction: >
      Codebase understanding must reflect what the repository actually contains;
      identifying what was missed requires human knowledge of the system the builder
      does not have, so a human must surface the gaps for re-inference.
    handoff: human
    derivable_at_l4: false

  - id: REC12
    for_failure: F12                # implicit codebase references in artifacts
    trigger: >
      An output artifact contains implicit references to codebase state — phrases
      like "see existing codebase", "follow established patterns", or "use available
      port" instead of explicit values.
    direction: >
      Artifacts must state explicit values, not implicit codebase references;
      replace each vague phrase with the concrete value already known from context.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC13
    for_failure: F13                # LTM not consulted / gaps undocumented
    trigger: >
      LTM was not consulted, or ltm-findings.yaml documents findings without the
      corresponding gaps section.
    direction: >
      LTM must be consulted with both findings and gaps documented; re-run the LTM
      consultation and record what was found and what was not.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC14
    for_failure: F14                # locked with unresolved open questions / high risks
    trigger: >
      The play locked artifacts while tech.yaml, scenarios.yaml, or plan.yaml still
      carried open_questions[] entries or high-severity risks not explicitly resolved
      by the user.
    direction: >
      No artifact may lock while open questions or high-severity risks remain;
      the missing item is the user's resolution, which only the user can provide.
    handoff: human
    derivable_at_l4: false

  - id: REC15
    for_failure: F15                # design before blast radius characterized
    trigger: >
      Design artifacts were produced before blast radius analysis completed — the
      change surface was not fully characterized through test impact analysis first.
    direction: >
      Blast radius analysis must complete and characterize the change surface before
      design generation; re-sequence so blast radius runs and is approved first.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC16
    for_failure: F16                # coverage gaps without baseline specs
    trigger: >
      Coverage gaps exist in the change surface without corresponding baseline test
      specifications — code paths in the impact zone are uncharacterized.
    direction: >
      Every coverage gap must have a baseline test specification; specify a baseline
      test capturing current behavior for each uncharacterized code path.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC17
    for_failure: F17                # plan tasks lack depends_on / file lists
    trigger: >
      plan.yaml tasks lack depends_on chains or per-task file lists with change
      types — the task DAG is incomplete or missing.
    direction: >
      Every task needs a depends_on chain and a file list with change types; fill the
      missing dependencies and file mappings to complete the DAG.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC18
    for_failure: F18                # tech.yaml lacks contract-level interfaces
    trigger: >
      tech.yaml lacks contract-level interface definitions, or CREATE entries lack
      interface specifications and component contracts.
    direction: >
      tech.yaml must carry interface-level detail for every change; fill the missing
      contracts and CREATE-entry specifications from the change surface.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC19
    for_failure: F19                # baseline specs miss some coverage gaps
    trigger: >
      Baseline test specifications do not cover every coverage gap identified in the
      blast radius analysis.
    direction: >
      Baseline specifications must cover every identified coverage gap; add the
      missing baseline tests so each gap is specified.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC20
    for_failure: F20                # intermediate data not stored in STM
    trigger: >
      Intermediate agent data was passed through conversation memory instead of being
      stored on disk in STM.
    direction: >
      All intermediate agent data must live on disk in STM; re-stage the agent
      outputs to their STM file paths.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC21
    for_failure: F21                # proceeded without resolved issue
    trigger: >
      The play proceeded toward context resolution without a resolved issue number —
      no issue was resolved or created during setup.
    direction: >
      A resolved issue number is required before context resolution; resolve or create
      the issue, then proceed.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC22
    for_failure: F22                # locked without conforming feature branch
    trigger: >
      Artifacts are locked but no feature branch exists matching the type/issue-slug
      naming convention — work was done on main or a non-conforming branch.
    direction: >
      A conforming feature branch must exist before any lock; create and switch to the
      type/issue-slug branch.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC23
    for_failure: F23                # artifact written before STM init
    trigger: >
      A design artifact was written before the STM directory at {stm_base}/{issue}/
      was initialized.
    direction: >
      STM must be initialized before any artifact is written; create the STM directory
      tree, then re-emit the artifact to its correct location.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC24
    for_failure: F24                # upstream locked artifacts missing
    trigger: >
      Upstream locked artifacts were not found at expected paths — specify epics,
      design design-spec, or arch architecture files are missing.
    direction: >
      All upstream locked artifacts must exist before prepare runs; the missing
      artifacts come from upstream plays prepare cannot author, so the upstream play
      owner must produce them first.
    handoff: human
    derivable_at_l4: false

  - id: REC25
    for_failure: F25                # tech.yaml interfaces empty for changed APIs
    trigger: >
      tech.yaml api_contracts or internal_interfaces are empty while the change
      surface includes API endpoints or module interface changes.
    direction: >
      tech.yaml interface definitions must cover every API endpoint and module
      interface in the change surface; fill the missing contracts from the change
      surface.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC26
    for_failure: F26                # missing mock_strategy with external deps
    trigger: >
      tech.yaml is missing a mock_strategy section while external dependencies exist
      in the change surface.
    direction: >
      tech.yaml must define a mock_strategy whenever external dependencies are in
      scope; add the mock shapes and test-double approaches for those dependencies.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC27
    for_failure: F27                # feature phase missing milestone fields
    trigger: >
      A feature phase in plan.yaml is missing one or more required milestone fields:
      milestone_id, scenario_gate.ids[] (actual IDs, not count only), depends_on
      (for any non-first milestone), or delivers.
    direction: >
      Every feature phase must carry milestone_id, scenario_gate.ids[], depends_on,
      and delivers; fill the missing milestone fields for the affected phase.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC28
    for_failure: F28                # summary lacks cumulative_scenarios ID list
    trigger: >
      The plan.yaml summary (or the derived plan-milestone-summary.yaml) gives only an
      integer cumulative count, with no explicit cumulative_scenarios ID list per
      milestone row.
    direction: >
      Each milestone row must carry cumulative_scenarios as an explicit ID list —
      the running union of all scenario IDs from this and all prior milestones;
      compute and write the union list for each row.
    handoff: autonomous
    derivable_at_l4: true

  - id: REC29
    for_failure: F29                # interfaces insufficient for independent authorship
    trigger: >
      A tech.yaml api_contracts, internal_interfaces, or service_contracts entry is
      missing request/response field shapes, error conditions with error response
      shapes, behavior contracts, or edge cases — forcing one party to inspect the
      other's output or read the codebase.
    direction: >
      Every interface entry must be complete enough for independent authorship; fill
      the missing field shapes, error responses, behavior contracts, and edge cases so
      neither test-writer nor code-builder needs the other's output.
    handoff: autonomous
    derivable_at_l4: true
