# Expectation for the reap play (ICE refactor, #376).
# Generated from reference/intent.yaml by draft-play-expectation.
# Two parts only: success_scenarios and recovery.

name: reap

generated_from:
  intent: core/components/plays/reap/reference/intent.yaml

vetted:
  status: approved
  approved_by: autonomous-migration (#376, user-authorized non-stop self-approval)
  approved_at: "2026-05-25"

# Success scenarios — acceptance AND the checkable definition of done (one bucket).
success_scenarios:
  - id: S1
    persona: "Tech lead reviewing post-epic learnings"
    given: >
      proposals.yaml at {stm_base}/{issue}/evidence/reap/proposals.yaml after a
      completed epic that deviated from planned architecture
    then: >
      Can see each finding classified by learning_category and sub_category, review
      Tier 1 ADR proposals with impact assessments, and decide which proposals to
      approve for later LTM enrichment by the enrich play — all without needing to
      trace back through raw implementation evidence files.
    measure: >
      Every proposal in proposals.yaml carries a non-empty learning_category and a
      sub_category per the taxonomy rules; every Tier 1 proposal carries an
      adr_draft_path and an impact block; no proposal lacks the tier, target_path,
      and change context a reviewer needs to decide.
  - id: S2
    persona: "Developer invoking reap on an open issue post-validate"
    given: >
      An issue that has completed validate (milestone-verdict.yaml files exist) but
      the GitHub issue has not yet been closed
    then: >
      reap accepts the issue, performs extraction, and produces proposals.yaml.
      No error is raised due to issue state. The open/closed status does not gate
      learning extraction.
    measure: >
      Pre-flight passed without any GitHub issue-state check; the sole gate was the
      presence of at least one milestone-verdict.yaml under evidence/validate/; and
      proposals.yaml was produced at the expected path.
  - id: S3
    persona: "Tech lead reviewing proposals for a domain that had no prior LTM"
    given: >
      proposals.yaml containing a Tier 3 addition proposal with
      learning_category_proposed: true and a taxonomy_justification block
    then: >
      Can read the verbatim excerpt and reasoning in taxonomy_justification to
      understand why the proposed new category was needed, and can decide whether
      to accept the invention and evolve the canonical taxonomy or remap the
      proposal to an existing canonical category.
    measure: >
      Any proposal carrying learning_category_proposed: true or
      sub_category_proposed: true has a taxonomy_justification block with non-empty
      evidence_path, excerpt, and reasoning, and the _proposed flag is present and
      readable in proposals.yaml.
  - id: S4
    persona: "Developer preparing the next epic in the same domain"
    given: >
      proposals.yaml from the prior epic staged in STM, visible in distill-style
      evidence/reap/ output path
    then: >
      Can see what learnings were extracted from the prior epic and which proposals
      are pending for enrich to consume, giving visibility into the learning pipeline
      state without waiting for full LTM promotion.
    measure: >
      proposals.yaml exists at {stm_base}/{issue}/evidence/reap/proposals.yaml — the
      evidence/{play-name}/ whitelist path — and no product LTM artifact under
      {product_base} or ~/.garura/core/memory/ was written by the run.
  - id: S5
    persona: "Operator running reap on a trivial epic with no meaningful delta"
    given: >
      proposals.yaml at {stm_base}/{issue}/evidence/reap/proposals.yaml with
      total_proposals: 0 and an empty proposals list
    then: >
      Can confirm that reap completed cleanly with a zero-proposal exit, that no
      spurious proposals were generated, and that no product LTM was modified.
    measure: >
      proposals.yaml shows total_proposals: 0 with an empty proposals list, the run
      exited without error, and the evidence file records the zero-proposal outcome.
  - id: S6
    persona: "Tech lead with check-drift output from a prior drift detection run"
    given: >
      spec-correction-manifest.yaml in {stm_base}/{issue}/evidence/check-drift/
      and proposals.yaml in {stm_base}/{issue}/evidence/reap/
    then: >
      Can see that drift findings are incorporated in proposals.yaml with
      source: check-drift and that no findings were re-derived — the play
      consumed the existing manifest rather than starting over.
    measure: >
      When a spec-correction-manifest.yaml was present at input, every proposal
      derived from check-drift carries source: check-drift, and no finding already
      present in the manifest appears as an independently re-derived proposal.

# Recovery — one entry per failure condition in intent.yaml. The validator turns a
# tripped failure into a recovery handoff plan and routes it: `autonomous` loops the
# fix back to the builder; `human` escalates for a manual call.
recovery:
  - id: REC1
    for_failure: F1                 # proposals.yaml absent after extraction + Tether
    trigger: >
      After extraction completed and the user Tethered, no proposals.yaml exists at
      {stm_base}/{issue}/evidence/reap/.
    direction: >
      A completed run must always leave a proposals.yaml at the evidence path — even
      a zero-proposal run writes the file with total_proposals: 0; write the missing
      proposals.yaml from the extraction output already on hand.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC2
    for_failure: F2                 # proposal missing learning_category
    trigger: >
      A proposal in proposals.yaml has no learning_category field, or it is empty.
    direction: >
      Every proposal must carry a learning_category; classify the offending proposal
      from the finding the run already produced and fill the missing value.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC3
    for_failure: F3                 # proposed-new value without taxonomy_justification
    trigger: >
      A proposal carries learning_category_proposed: true or sub_category_proposed:
      true but the taxonomy_justification block is absent, incomplete (missing
      evidence_path, excerpt, or reasoning), or holds a placeholder.
    direction: >
      A proposed-new taxonomy value must be backed by a complete justification or
      remapped to a canonical value; deciding whether to invent a new category or
      remap, and authoring the why-no-canonical-fits reasoning, is a reviewer's call
      the builder cannot make for it.
    handoff: human
    derivable_at_l4: false
  - id: REC4
    for_failure: F4                 # proposal targets product or global core LTM path
    trigger: >
      A proposal targets a path under {product_base} or ~/.garura/core/memory/, or
      such a path appears as an output of the run.
    direction: >
      All proposals must stage under {stm_base}/{issue}/evidence/reap/ only; re-target
      any proposal pointing at product or global core LTM back into the STM evidence
      path.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC5
    for_failure: F5                 # Tier 1 finding missing ADR draft or impact block
    trigger: >
      A proposal with tier: 1 has no adr_draft_path, or no impact block.
    direction: >
      Every Tier 1 proposal must carry both an ADR draft and an impact assessment;
      generate the missing adr_draft_path and impact block from the Tier 1 finding the
      run already holds.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC6
    for_failure: F6                 # check-drift findings re-derived instead of consumed
    trigger: >
      A spec-correction-manifest.yaml was present at input, yet findings it already
      carries appear in proposals.yaml as independently re-derived proposals rather
      than consumed from the manifest.
    direction: >
      When a check-drift manifest is present its findings must be consumed as-is and
      marked source: check-drift; drop the re-derived duplicates and carry the
      manifest findings forward verbatim.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC7
    for_failure: F7                 # sub_category non-null for a flat parent
    trigger: >
      A proposal whose learning_category is a flat parent (domain or product) carries
      a non-null sub_category.
    direction: >
      Flat parents (domain, product) carry no sub_category; set sub_category to null
      on the offending proposal.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC8
    for_failure: F8                 # sub_category absent for a hierarchical parent
    trigger: >
      A proposal whose learning_category is a hierarchical parent (arch, quality, or
      standards) has a null or empty sub_category and sub_category_proposed is false.
    direction: >
      Hierarchical parents require a sub_category; assign the correct canonical child
      from the taxonomy tree to the offending proposal.
    handoff: autonomous
    derivable_at_l4: true
  - id: REC9
    for_failure: F9                 # prior-play STM artifacts modified/renamed/deleted
    trigger: >
      An artifact under context/, milestones/, prior-play evidence/, or prior-play
      status/ was modified, renamed, or deleted by the run, or a write landed outside
      evidence/reap/ and status/reap.json.
    direction: >
      Prior-play STM artifacts are read-only; the altered artifacts need their
      original state restored, which is a recovery decision the builder cannot make
      on its own because the unaltered source of truth is outside what it controls.
    handoff: human
    derivable_at_l4: false
  - id: REC10
    for_failure: F10                # proceeded without the human review checkpoint
    trigger: >
      Evidence was committed without proposals.yaml having been staged and presented
      for a Tether/Vanish decision first.
    direction: >
      The human review checkpoint is mandatory before any evidence commit; the run
      must pause and obtain the Tether/Vanish decision, which is an authority the
      builder does not hold.
    handoff: human
    derivable_at_l4: false
