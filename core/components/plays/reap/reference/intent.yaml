name: reap
description: >
  Post-epic learning extraction. After validate completes, read the build trinity
  (prepare context baseline + implement milestones + validate verdicts) and produce
  tiered, taxonomy-classified learning proposals staged in STM for human review.
  Proposals carry a two-level learning taxonomy aligned to the KB structure.

version: "0.1.0"

checksum: "placeholder-replaced-by-create-play-build"

intent: >
  After a feature epic has been validated (prepare + implement + validate complete),
  extract learnings from the build trinity and produce staged proposals that identify
  what the LTM/KB gaps this epic revealed. Each proposal is classified with a
  two-level learning taxonomy (learning_category + sub_category) aligned to the
  core/components/memory/ KB structure. Proposals are written to STM only — no
  product LTM is written during this play. A human reviews and Tethers to commit
  evidence or Vanishes to halt. The play accepts epics in OPEN or CLOSED state;
  issue closure is not a prerequisite for learning extraction.

constraints:
  - id: C1
    rule: >
      Validate evidence must exist at {stm_base}/{issue}/evidence/validate/ with
      at least one milestone-verdict.yaml present. The issue may be in OPEN or
      CLOSED state — both are accepted. Issue closure is NOT a prerequisite. This
      is a deliberate break from prior plays that required CLOSED state: archival
      (which required close) is a separate concern handled by archive-issue-stm,
      not this play.

  - id: C2
    rule: >
      The context baseline must exist at {stm_base}/{issue}/context/ — at minimum
      the design/ subdirectory containing epic-spec.yaml. The prepare play must
      have run and produced its context package before reap is invoked.

  - id: C3
    rule: >
      STM artifacts from prior plays are read-only during extraction. This play
      reads context/, evidence/, milestones/, and status/ artifacts but MUST NOT
      modify, rename, or delete any of them. Any write to a pre-existing STM path
      from prior plays is a constraint violation.

  - id: C4
    rule: >
      All output goes to {stm_base}/{issue}/evidence/reap/. No writes to product
      LTM ({product_base}). No writes to global core LTM
      (~/.garura/core/memory/). The only permitted writes during this play are to
      {stm_base}/{issue}/evidence/reap/ and to the status file
      {stm_base}/{issue}/status/reap.json.

  - id: C5
    rule: >
      This play operates in extraction-and-staging mode only. Product LTM writes
      are the exclusive domain of the enrich play (a separate future play not yet
      built). The LTM-write skill must never be invoked from this play. Proposals
      accumulate in STM and are consumed by enrich when it ships.

  - id: C6
    rule: >
      Three-tier analysis model inherited from the knowledge extraction pipeline.
      Every finding is classified into exactly one tier:
        Tier 1 (foundational, check-only): LOCKED artifacts that SHOULD NOT change.
          If implementation evidence shows they did change, an ADR proposal plus
          impact assessment is required. Silent update of any Tier 1 artifact is
          a structural failure.
          Tier 1 targets: project-profile, logical-architecture, physical-architecture,
          nfr-spec, quality-vision, design-patterns.
        Tier 2 (enrichment): Existing LTM artifacts that should be updated with
          implementation outcomes.
          Tier 2 targets: research/{domain}.md (Experiential sections),
          enriched-capabilities, scope/epics/{id}.yaml (post_implementation),
          quality-profile, mvp-recommendation, scope.yaml.
        Tier 3 (addition): New content with no existing LTM home.
          Tier 3 targets: New domains, new screens, new flows, new personas,
          new design spec sections.
      If product LTM artifacts for a tier are absent, that tier is skipped with
      a warning in proposals.yaml (not a hard failure).

  - id: C7
    rule: >
      Every proposal in proposals.yaml MUST carry a two-level learning taxonomy.
      Required fields per proposal:
        learning_category: canonical value from {arch | domain | product | quality | standards}
        sub_category: canonical child for parents that have children (arch, quality, standards);
          null or empty string for flat parents (domain, product).
      Canonical taxonomy tree (source of truth: core/components/memory/):
        arch      → agentic | data | operations | patterns | platforms | stacks
        domain    → (flat — sub_category null)
        product   → (flat — sub_category null)
        quality   → architecture | backend | code | data | documentation | frontend |
                    operations | performance | security | tech-debt | testing
        standards → rules | schemas | templates
      Both learning_category and sub_category (when parent has children) are REQUIRED
      on every proposal. A proposal missing either required field is invalid and must
      be rejected. Sub_category is explicitly null for domain and product proposals.

  - id: C7a
    rule: >
      Proposed-new learning_category or sub_category values are permitted ONLY when
      the proposal includes a taxonomy_justification block containing all three fields:
        evidence_path: a specific STM artifact path demonstrating the learning type
        excerpt: a verbatim excerpt from that artifact
        reasoning: why no canonical taxonomy value fits this proposal
      Proposals carrying a _proposed flag (learning_category_proposed: true or
      sub_category_proposed: true) that lack a complete taxonomy_justification block
      are invalid and must be rejected. The justification is the reviewer's signal to
      evolve the KB taxonomy — this play does not promote proposed values to canonical.

  - id: C7b
    rule: >
      The canonical taxonomy tree is a starting point, not a closed enum. Proposals
      may propose new learning_category or sub_category values when no canonical value
      fits, provided C7a's justification requirement is met. This play never promotes
      proposed values to canonical — promotion is a KB governance action performed
      separately by a human reviewer.

  - id: C8
    rule: >
      The check-drift spec-correction-manifest is consumed as input when present at
      {stm_base}/{issue}/evidence/check-drift/spec-correction-manifest.yaml. Findings
      from check-drift are incorporated as pre-classified proposals and must NOT be
      re-derived. If no check-drift output exists, the play performs its own
      comparison. Drift findings consumed from check-drift are marked
      source: check-drift in proposals.yaml.

  - id: C9
    rule: >
      If product LTM artifacts for a tier are absent (e.g., architecture/ directory
      does not exist in product LTM), that tier is skipped with a warning recorded
      in proposals.yaml under tiers_skipped. Missing product LTM is not a hard
      failure — the play processes whichever tiers have artifacts available.

  - id: C10
    rule: >
      A human checkpoint is required before any evidence is committed. proposals.yaml
      is staged in STM after extraction completes. The play presents proposals.yaml
      to the user for review. The user Tethers to finalize and commit evidence, or
      Vanishes to halt without committing. Evidence commit happens only on Tether.

  - id: C11
    rule: >
      A zero-proposal exit is valid and not a failure. If the build trinity diff
      produces no learnings across all tiers, the play writes proposals.yaml with
      total_proposals: 0 and an empty proposals list. Evidence records the
      zero-proposal outcome. No error is raised.

  - id: C12
    rule: >
      Primary inputs are the context baseline and build trinity outcomes. The context
      baseline is {stm_base}/{issue}/context/ from prepare. Build trinity outcomes
      are: implement milestones ({stm_base}/{issue}/milestones/*/milestone-verdict.yaml),
      validate verdicts ({stm_base}/{issue}/evidence/validate/*/milestone-verdict.yaml),
      and available implement evidence (status-reports, arbiter-verdicts). The epic_id
      is resolved from {stm_base}/{issue}/context/design/epic-spec.yaml.

  - id: C13
    rule: >
      The evidence self-commit via the git orchestration agent is non-blocking. Any
      commit failure is logged in evidence and the play exits cleanly. A commit
      failure does not retroactively invalidate the proposals.yaml artifact or the
      Tether decision.

  - id: C14
    rule: >
      The proposals output path is {stm_base}/{issue}/evidence/reap/proposals.yaml.
      This path is consistent with the distill play naming convention, within the
      STM folder whitelist (evidence/{play-name}/), and forward-compatible with
      future enrich play consumption.

  - id: C15
    rule: >
      Learning extraction is performed by the knowledge-extractor agent in ANALYZE
      mode. The play orchestrates inputs and checkpoints; it does not perform
      extraction logic inline. All context assembly and skill invocations are
      delegated to the knowledge-extractor agent.

failure_conditions:
  - id: F1
    condition: >
      proposals.yaml absent from {stm_base}/{issue}/evidence/reap/ after extraction
      completes and the user has Tethered. Even a zero-proposal run must write
      proposals.yaml with total_proposals: 0.

  - id: F2
    condition: >
      Any proposal in proposals.yaml is missing learning_category. Every proposal
      must carry learning_category regardless of tier or content type.

  - id: F3
    condition: >
      A proposal carries learning_category_proposed: true or sub_category_proposed: true
      but the taxonomy_justification block is absent, incomplete (missing evidence_path,
      excerpt, or reasoning), or contains a placeholder value. The justification is
      required, not optional, when a proposed-new value is used.

  - id: F4
    condition: >
      A proposal targets a product LTM path or a global core LTM path. All proposals
      are staged for review only — no artifact under {product_base} or
      ~/.garura/core/memory/ should appear as an output of this play run.

  - id: F5
    condition: >
      A Tier 1 finding is present in proposals.yaml without an adr_draft_path or
      without an impact block. Tier 1 proposals require both an ADR draft and an
      impact assessment — finding without either is a structural failure.

  - id: F6
    condition: >
      check-drift findings are re-derived instead of consumed from the existing
      spec-correction-manifest when one is present. Re-deriving findings already
      produced by check-drift introduces inconsistency and redundancy.

  - id: F7
    condition: >
      A proposal has sub_category non-null for a flat parent (domain or product).
      Flat parents carry no sub_category children. Sub_category must be null for
      domain and product proposals.

  - id: F8
    condition: >
      A proposal has sub_category null or empty for a parent with children (arch,
      quality, or standards) and sub_category_proposed is false. Hierarchical
      parents require a sub_category on every proposal. Absence when the parent is
      hierarchical is a structural failure.

  - id: F9
    condition: >
      STM artifacts from prior plays are modified, renamed, or deleted. This play
      must not alter any artifact under context/, milestones/, evidence/ (from prior
      plays), or status/ (from prior plays). Write operations outside
      evidence/reap/ and status/reap.json are failures.

  - id: F10
    condition: >
      The play proceeds without a human review checkpoint. proposals.yaml must be
      staged and presented for Tether/Vanish before any evidence commit is triggered.
      Skipping the checkpoint — even when proposals are empty — is a failure.
