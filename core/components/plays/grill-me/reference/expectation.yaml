name: grill-me
generated_from:
  intent: core/components/plays/grill-me/reference/intent.yaml
vetted:
  status: approved

success_scenarios:
  - id: S1
    persona: solo product owner anchoring on an epic
    given: a candidate epic that already declares constraints, business rules, or failure scenarios
    then: they receive a locked shape document at the product's research path whose final shape contradicts none of the epic's declared constraints, rules, or failure scenarios, and the session terminated on defensibility (not round count, time, or tokens)
    measure: shape document exists at the product's research path; document records anchor=epic; every declared constraint/rule/failure on the epic appears in the shape's tension-check log with status=resolved; termination_reason field equals "defensible"

  - id: S2
    persona: solo product owner who has answered enough
    given: an in-flight grilling session with at least one unresolved tension still recorded
    then: they explicitly declare the shape good enough and receive a locked shape document that names every unresolved tension as an accepted gap (not as "agreed")
    measure: shape document exists; termination_reason field equals "human_good_enough"; every unresolved tension is listed under accepted_gaps with the human's exact words preserved; no unresolved tension is silently marked resolved

  - id: S3
    persona: any human starting the play against a target with nothing to defend
    given: an anchor target whose declared constraints, business rules, and failure scenarios are all empty
    then: they receive a plain-language halt message before round one explaining grilling needs something to defend against, and pointing them at the upstream play that produces declarations; no shape document is written
    measure: play exits before round one; halt message present in transcript; no shape document file created at the product's research path; transcript names the upstream play to run first

  - id: S4
    persona: epic author scoping a new epic
    given: an unanchored grilling request
    then: they answer a single plain-language anchor question, the anchor locks to "epic", and the session uses product-language register (users, outcomes, capabilities, business rules) for every question, synthesis, and push-back
    measure: shape document records anchor=epic; constraints_source path resolves to the epic file or catalog entry; sampled questions/syntheses/push-backs contain no technical-register tokens (component, contract, data flow) and no agent/skill/eval/YAML jargon

  - id: S5
    persona: feature owner anchoring on a feature spec
    given: an unanchored grilling request
    then: the anchor locks to "feature", constraints are sourced from the feature spec, and the session uses product-language register throughout
    measure: shape document records anchor=feature; constraints_source path resolves to the feature spec; register check passes for product language

  - id: S6
    persona: tech lead grilling a technical decision
    given: an unanchored grilling request
    then: the anchor locks to "tech decision", constraints are sourced from the architecture or technical-approach artefact, and the session uses technical-language register (components, contracts, data flow, failure modes)
    measure: shape document records anchor=tech_decision; constraints_source path resolves to the architecture or technical-approach artefact; sampled questions/syntheses/push-backs use technical-register tokens and no product-only register

  - id: S7
    persona: designer grilling a design decision
    given: an unanchored grilling request
    then: the anchor locks to "design decision", constraints are sourced from the design system or design spec, and the session uses technical-language register
    measure: shape document records anchor=design_decision; constraints_source path resolves to the design system or design spec; register check passes for technical language

  - id: S8
    persona: solo product owner mid-session
    given: a round that synthesised the answers and ran a tension check that found a contradiction with a specific declared constraint
    then: they receive a single plain-language push-back that names the tension and quotes (or cites by id) the specific constraint about to break, answer it, and the next round's synthesis records that tension as resolved
    measure: round log contains a tension entry with a cited constraint id or quoted phrase; exactly one push-back was issued for that weak answer in that round; subsequent synthesis records the tension as status=resolved; no badgering re-issue appears in the same round

  - id: S9
    persona: solo product owner at end of session
    given: a defensible locked shape implying changes to N target-shape artefacts (personas, screens, design system, tech decisions, NFRs, feature specs, or epic intent blocks), plus an epic create-or-update for the now→then journey, plus engineering work for code to catch up
    then: they review the full close bundle as one unit — the shape document, the N target-shape edits with diffs shown, the epic create/update with its status, and the single code follow-up issue draft — and approve or reject the bundle in one decision; on approval, every part of the bundle is written in one transaction; on rejection, nothing writes
    measure: bundle approval is recorded once for the whole set; on approval, every artefact in the bundle is present after close with content matching the shown diff; the epic exists with status in {planned, development, rollout, released, cleanup}; exactly one code follow-up issue is filed and labelled with the anchor; on rejection, no artefact in the bundle was touched and no issue was filed

  - id: S10
    persona: any human running a grilling session that surfaces no code work
    given: a defensible locked shape whose target changes are all documentation and need no engineering work to catch the current shape up
    then: the bundle still writes atomically, the epic is created or updated with status reflecting that no code work is pending, and the code follow-up issue is filed with body explicitly stating "no code changes required" rather than being skipped
    measure: bundle written atomically; epic present with appropriate status; exactly one code follow-up issue filed, body declares no code work needed; the locked shape's "Code follow-up" section matches the filed issue body

recovery:
  - id: REC1
    for_failure: F1
    trigger: a push-back is emitted whose payload contains no constraint id and no quoted phrase from the target's declared constraints, rules, or failure scenarios
    direction: every push-back must carry an explicit citation — a constraint id or a quoted phrase from the target — before it reaches the human; uncited push-backs must be blocked at emission and rewritten to cite or dropped
    handoff: autonomous
    derivable_at_l4: true

  - id: REC2
    for_failure: F2
    trigger: a second push-back is issued against the same weak answer within the same round, or a previously-pushed-back answer is carried into the next round still marked weak without an intervening "gap recorded, advancing" entry
    direction: a weak answer gets at most one push-back per round; on the second weak response the play must record the gap, advance, and only revisit the weakness in a later round if a new tension makes it material
    handoff: autonomous
    derivable_at_l4: true

  - id: REC3
    for_failure: F3
    trigger: the human-facing surface contains config-form jargon — field-name soup, A/B/C menus, terse YAML-style prompts, or references to skills/agents/evals/compiled artefacts
    direction: rewrite the surface in plain product or technical prose matched to the anchor before showing the human; never expose schema fields, lettered menus, or framework internals
    handoff: autonomous
    derivable_at_l4: true

  - id: REC4
    for_failure: F4
    trigger: a round closes without a synthesis step, without a tension check against the target's declared constraints, or with questions that do not close an identified gap
    direction: every round must end with both a synthesis and a tension check against declared constraints/rules/failure scenarios; a malformed round must be completed (synthesis + tension check appended) before any new round begins
    handoff: autonomous
    derivable_at_l4: true

  - id: REC5
    for_failure: F5
    trigger: the anchored target's declared constraints, business rules, and failure scenarios are all empty at session start
    direction: do not enter round one against a target with nothing to defend against; halt with a plain-language explanation and direct the human to the upstream play that produces declarations
    handoff: human
    derivable_at_l4: false

  - id: REC6
    for_failure: F6
    trigger: the locked shape records a tension as "agreed" or "resolved" while the cited constraint's defensibility check still fails on the final shape — convergence by capitulation rather than by an answer that actually resolved the cited tension
    direction: a tension is resolved only when the final shape passes its constraint's defensibility check; if the human refuses to resolve, record it as an accepted gap, not as agreement
    handoff: human
    derivable_at_l4: false

  - id: REC7
    for_failure: F7
    trigger: any part of the close bundle — shape document, target-shape artefact edit, epic create/update, or code follow-up issue — was written without an explicit human approval of the full bundle recorded for the session
    direction: the close bundle is approved as one unit; no part of it may be written before that single approval; on approval the bundle writes atomically (REC12)
    handoff: human
    derivable_at_l4: false

  - id: REC8
    for_failure: F8
    trigger: the session ended with a termination_reason of round_count, time_limit, or token_budget
    direction: terminate only on defensibility or explicit human good-enough; round counts, clocks, and token budgets are not termination triggers and must not be wired as such
    handoff: autonomous
    derivable_at_l4: true

  - id: REC9
    for_failure: F9
    trigger: the human disengages mid-session (stops answering, signals fatigue, or asks to stop) and the play continues to issue push-backs instead of pausing and closing out
    direction: on disengagement, pause immediately, record every unresolved tension into the shape document as an accepted gap, and exit cleanly — do not push back further
    handoff: human
    derivable_at_l4: false

  - id: REC10
    for_failure: F10
    trigger: the session ended (any termination reason) without a locked shape document at the product's research path
    direction: the locked shape document is the play's deliverable; if it would not be written at end of session, write it from the in-memory session state before exit
    handoff: autonomous
    derivable_at_l4: true

  - id: REC11
    for_failure: F11
    trigger: round one began without an explicit anchor recorded, or with an anchor outside {epic, feature, tech decision, design decision}, or with a register that does not match the locked anchor
    direction: before round one, lock the anchor to exactly one of the four permitted kinds via a single plain-language question; if the human cannot name one or names something outside the four, halt before round one; the locked anchor decides the constraints source and the C3 register for the whole session
    handoff: autonomous
    derivable_at_l4: true

  - id: REC12
    for_failure: F12
    trigger: the close bundle write left at least one impacted target-shape artefact updated while at least one other impacted artefact was not — the target shape is internally inconsistent
    direction: the bundle writes as one transaction through the repo writer; stage every artefact, write all or none, and on any write failure roll back every staged change before exiting; the play exits in a state where either every artefact in the bundle is updated or none is
    handoff: autonomous
    derivable_at_l4: true

  - id: REC13
    for_failure: F13
    trigger: a write was attempted against a code file, or the close bundle filed more than one code follow-up issue, or the close bundle filed zero code follow-up issues despite the locked shape's "Code follow-up" section being non-empty
    direction: the writer rejects any path matching the project's code paths and the close bundle files exactly one code follow-up issue per session, whose body is the locked shape's "Code follow-up" section verbatim (empty case files with explicit "no code changes required" body, per S10)
    handoff: autonomous
    derivable_at_l4: true

  - id: REC14
    for_failure: F14
    trigger: the close bundle was assembled without an entry that creates or updates the product epic representing the now→then journey, or the epic's status field is absent or set outside {planned, development, rollout, released, cleanup}
    direction: every close bundle includes an epic entry — created at status "planned" when grilling spawned a new epic or addressed a free-text idea or a sibling-split, refreshed in place when grilling refined an in-flight epic; the status field is set from the canonical 5-point vocabulary based on where code work currently sits
    handoff: autonomous
    derivable_at_l4: true
