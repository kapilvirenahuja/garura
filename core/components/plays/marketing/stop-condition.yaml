# marketing stop condition — baked from reference/ice.md "### Done means" (#464, #466 Batch C;
# #500 direct-model-write / ADR 026). Evaluated by scripts/check_stop_condition.py at Step C0 of
# the Standard Play Close. Paths are relative to the run's working root
# ({stm_base}_realize/marketing/).
schema: { name: stop-condition }
content:
  done:
    - id: D1
      says: "the persist record exists — the material decisions were written in place on the live model (and the lens was re-derived within the guarded scope)"
      check: { type: artifact_exists, path: "persist-manifest.json" }
    - id: D2
      says: "the persist was applied — the persist record stamps the write applied"
      check: { type: field_equals, file: "persist-manifest.json", field: "applied", equals: true }
    - id: D3
      says: "the scoped-write guard held — no model path changed outside the slice's write scope (the allowlist held)"
      check: { type: field_equals, file: "guard-report.json", field: "ok", equals: true }
