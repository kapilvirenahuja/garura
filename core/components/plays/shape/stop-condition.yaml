# shape stop condition — baked from reference/ice.md "### Done means" (#464, #466 Batch C; #500 direct-model-write / ADR 026).
# Evaluated by scripts/check_stop_condition.py at Step C0 of the Standard Play Close.
# Paths are relative to the run's working root ({stm_base}_shaping/shape/<domain>/).
# A run whose keyed persist or post-write guard did not land leaves a clause unmet —
# the close reads HALTED, never COMPLETED.
schema: { name: stop-condition }
content:
  done:
    - id: D1
      says: "the persist record exists — the spine merge (capability status flips, the slice index, the persona/journey/decision refs) was written in place through the keyed persist"
      check: { type: artifact_exists, path: "persist-manifest.json" }
    - id: D2
      says: "the keyed persist stamped its applied-record field — the spine merge landed"
      check: { type: field_equals, file: "persist-manifest.json", field: "applied", equals: true }
    - id: D3
      says: "the post-write scoped guard held — no model path changed outside /shape's scope (spine + the new slice/persona/journey/decision records)"
      check: { type: field_equals, file: "guard-report.json", field: "ok", equals: true }
