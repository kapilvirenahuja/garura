# Intent Epic Schema — Canonical Contract (ICE shape, per #397)
#
# An intent epic is shaped to match the play-layer ICE model. Four sections,
# in this exact order: intent, expectations, connections, provenance.
# Identity (id, domain, capability) sits above the four sections at the top
# of the file.
#
# Enforcement: validate-intent-epics is a blocking validator. It refuses to
# write epics that violate this schema. The calling play (specify) halts on
# validation failure and cycles back to generate-intent-epics for a fix.

# ──────────────────────────────────────────────────────────────────────────
# Identity
# ──────────────────────────────────────────────────────────────────────────

id: <string>                           # Unique epic ID: "EPIC-{domain}-{capability}-{seq}"
                                       # Example: "EPIC-user-login-001"
                                       # Required. Unique across all epics in a product.

domain: <string>                       # Business domain from domain-taxonomy
                                       # Example: "user-management" | "commerce" | "payments"
                                       # Must match a domain-taxonomy filename (without .md).

capability: <string>                   # Specific feature ID from the domain file
                                       # Example: "UM-F001" | "CM-F003"
                                       # Must match a real feature ID in the referenced domain.

# ──────────────────────────────────────────────────────────────────────────
# 1. Intent — the clean triple
# ──────────────────────────────────────────────────────────────────────────
# One epic carries one intent. Epics that look like they want more than one
# goal belong in separate epics linked via the `connections` section below.

intent:
  goal: <string>                       # REQUIRED. One sentence — the user-observable
                                       # end-state this epic delivers. Commander's Intent
                                       # format. Must name a persona or canonical role
                                       # as the actor and an observable outcome.
                                       # Example: "Engineering leader extracts a credible
                                       # savings number within 2 minutes of opening the
                                       # leader view at least 80% of the time."

  constraints:                         # REQUIRED. List of strings. Things the goal must
                                       # respect — NFRs, policies, hard limits. Plain
                                       # sentences, not nested fields. Numeric values
                                       # should carry their number inline.
                                       # Example: "p95 login under 500ms at 10K concurrent."
    - <string>

  failure_scenario:                    # REQUIRED. Minimum 2 entries. List of strings.
                                       # Each entry names a way the goal could fail —
                                       # the catch-net. One recovery entry below pairs
                                       # with each failure_scenario entry.
                                       # Example: "Leader view ships as the Simulator only
                                       # — the five-pillar shape goes missing."
    - <string>

# ──────────────────────────────────────────────────────────────────────────
# 2. Expectations — generated, vetted at Tether
# ──────────────────────────────────────────────────────────────────────────
# The expectations block is generated by draft-epic-expectation from the
# intent above. It is NEVER hand-authored. vetted.status starts as pending;
# a human sets approved at the single Tether checkpoint in /specify.

expectations:
  vetted:
    status: <enum>                     # not_generated | pending | approved
    approved_by: <actor>               # OPTIONAL. Set only when status == approved.
    approved_at: <ISO-8601>            # OPTIONAL. Set only when status == approved.

  success_scenario:                    # REQUIRED when status != not_generated.
                                       # Minimum 1 entry. Binary-testable outcomes.
    - id: <string>                     # S1, S2, ... Sequential.
      persona: <string>                # Named persona or canonical role.
      given: <string>                  # Precondition — system + user state before the action.
      then: <string>                   # Observable outcome. Binary-testable. No
                                       # "should", "smooth", "intuitive", "seamless", "better".
      measure: <string>                # Binary-testable metric. Compiled into the
                                       # scenario eval.

  recovery:                            # REQUIRED when status != not_generated.
                                       # Exactly one entry per intent.failure_scenario entry —
                                       # no more, no fewer.
    - id: <string>                     # REC1, REC2, ... Sequential.
      for_failure_scenario: <string>   # The failure_scenario string this entry addresses.
      trigger: <string>                # Observable symptom when the failure manifests.
      direction: <string>              # Directional guidance — inverse of the failure,
                                       # guidance not code.
      handoff: <enum>                  # autonomous | human
      derivable_at_l4: <boolean>       # true when handoff == autonomous, else false.

# ──────────────────────────────────────────────────────────────────────────
# 3. Connections — how this epic relates to other epics
# ──────────────────────────────────────────────────────────────────────────
# Replaces the legacy depends_on / dependencies / foundation_investment soup
# with three explicit relations. Each relation is a list of epic ids.

connections:
  before_chain:                        # Epics that MUST be delivered before this one.
                                       # Directional. The validator runs a cycle check
                                       # across before_chain edges; any cycle is a
                                       # blocking violation.
    intents:                           # List of EPIC ids.
      - <string>                       # Example: "EPIC-user-login-001"

  after:                               # Epics that depend on this one being delivered
                                       # first. Mirror of before_chain on the consumer
                                       # side — declared for readability and bidirectional
                                       # checks.
    intents:
      - <string>

  peers:                               # Epics that ship in the same envelope or that
                                       # share a slice but have no ordering requirement.
                                       # Declared so reviewers can see the cluster.
    intents:
      - <string>

  dependency_check: <string>           # REQUIRED per epics.md Rule 6. Non-empty string
                                       # stating how a reviewer or the pipeline verifies
                                       # the before_chain epics are satisfied before this
                                       # epic can start.
                                       # Example: "All before_chain epics carry
                                       # expectations.vetted.status: approved AND
                                       # post_implementation.status: delivered."

# ──────────────────────────────────────────────────────────────────────────
# 4. Provenance — neutral context, last section
# ──────────────────────────────────────────────────────────────────────────
# Everything that grounds the intent — where it came from, what KB rules
# shaped it, what business rules apply, what time-box bounds it. This is the
# LAST section of every epic and never appears before the three sections
# above.

provenance:
  source:                              # REQUIRED. Where the intent originates.
    kind: <enum>                       # brief_explicit | brief_inferred | rule_derived |
                                       # research_supplemental | profile_default | assumption
    quote: <string>                    # Verbatim brief text, OR 'CTC-NNN' for rule_derived,
                                       # OR 'profile.<field>' for profile_default,
                                       # OR 'needs_user_grounding' for assumption.
    confidence: <enum>                 # high | medium | low

  appetite: <string>                   # REQUIRED. Time-box, not estimate.
                                       # Shape Up semantics: fixed time, variable scope.
                                       # Example: "6 weeks"

  business_rules:                      # REQUIRED. Minimum 1 entry. List of strings.
                                       # Rules lifted from the KB capability definition,
                                       # with profile-specific overrides applied.
    - <string>

  kb_source:                           # REQUIRED. Traces the epic to its KB feature.
    capability: <string>               # Feature ID in domain-taxonomy. Must equal the
                                       # top-level `capability` field.
    rules_applied:                     # KB rules that shaped the intent.
      - <string>
    experiential_warnings:             # MAY be empty. Warnings lifted from the feature's
                                       # `Experiential` section in the KB.
      - <string>

  uses_mocks: <boolean>                # REQUIRED per epics.md Rule 3. Default false.
                                       # Set true when this epic ships the mock-first
                                       # part of the two-part delivery.

  demock_epic_ref: <string>            # REQUIRED when uses_mocks == true. The EPIC id
                                       # of the integration epic that replaces the mocks
                                       # with real integrations. The integration epic
                                       # must also appear in connections.after.intents[].

  foundation_investment: <boolean>     # REQUIRED per epics.md Rule 7. Default false.
                                       # Set true when this epic is shared infrastructure
                                       # that two or more other epics depend on (i.e., it
                                       # has ≥2 incoming connections.before_chain refs).
                                       # Foundation epics are sequenced earliest and
                                       # carry P1 priority.

# ──────────────────────────────────────────────────────────────────────────
# Validation rules (enforced by validate-intent-epics)
# ──────────────────────────────────────────────────────────────────────────
# Rules will be re-derived from the rewritten epics.md after the user's
# review of the rules file. The validator will be updated to read the new
# shape: intent.goal (string), intent.constraints, intent.failure_scenario,
# expectations.success_scenario, expectations.recovery (1:1 with
# failure_scenario), expectations.vetted.status == "approved",
# connections.before_chain.intents (no cycles), and provenance presence.
#
# Until the rules review is complete, the validator MUST refuse epics that
# carry any of the legacy top-level keys (intents[], failure_conditions,
# in_scope, anti_goals, must_not_break, problem_statement, hypothesis,
# assumptions_requiring_validation, dependencies, depends_on,
# foundation_investment, expectation, constraints at top level) — these
# belong inside the four sections above or are deleted entirely.

