# Capability-Intent Schema — v1
#
# The five realization lenses /realize produces for a capability:
#   ux | architecture | run | quality | agentic
# These are INTENT — kept forever in product-os, in the capability's intent
# folder. Every epic of the capability builds against these.
#
# Each lens shares the envelope below; its `content` follows the per-lens
# structure defined further down. All five lenses are LOCKED (#434).

schema:
  name: capability-intent
  version: 1
  persistence: permanent

# ---- Envelope (common to every lens) ---------------------------------------
intent:
  id: string
  capability_ref: string  # the capability this lens belongs to
  type: string            # one of: ux | architecture | run | quality | agentic
  summary: string         # one line of what this lens establishes
  content: {}             # per-lens structure — see below
  status: string          # one of: proposed | active | superseded
  metadata:
    created_by: string    # /realize
    updated_by: string
    version: integer

# ---- type: architecture  (LOCKED #434) -------------------------------------
# Vocabulary locked in plan C3. A component is a HORIZONTAL platform/tier; a
# capability is a VERTICAL threading top-to-down through components.
# content:
#   components:           # the horizontals this capability threads
#     - name: string
#       layer: string     # experience | process | domain | cross-cutting
#       kind: string      # internal | external
#       part: string      # what this capability occupies inside this component
#   contracts:            # the seams crossed between components (incl. owned data model)
#     - between: string   # "A <-> B"
#       interface: string
#       data: string      # the data shapes that cross (the data model lives here)
#   stack:                # locked, WITH versions
#     - component: string
#       tech: string
#       version: string
#   # principle (not a field): the build is a vertical, end-to-end slice through
#   # these components — end-to-end or the story failed.

# ---- type: ux  (LOCKED #434) -----------------------------------------------
# content:
#   screens:              # the surfaces this capability needs
#     - name: string
#       purpose: string
#   states:               # per screen
#     - screen: string
#       states: [string]  # e.g. idle | submitting | error | locked | success | empty | loading
#   flows:                # journeys across screens (tie to persona/journey records)
#     - name: string
#       persona_ref: string
#       steps: [string]   # no dead ends — every state has a way forward
#   accessibility:        # a11y posture, from the box's gate
#     wcag: string        # e.g. "2.1 AA"
#     focus: string       # focus management
#     targets: string     # min touch targets
#     announcements: string  # errors announced to screen readers
#   design_system:        # binding
#     system: string         # the design system
#     component_model: string # e.g. "Primitive -> Block -> Card" (KB technology learning)
#     surface: string         # e.g. "static web tier on CDN"

# ---- type: run  (LOCKED #434; renamed from "delivery") ---------------------
# How the capability is deployed and runs. content:
#   environments: [string]   # the path, e.g. dev -> staging -> prod
#   rollout:
#     flags: [string]        # feature flags (e.g. SSO, MFA gated independently)
#     strategy: string       # blue/green | canary | rolling
#   migrations: string       # data-change strategy — gated, reversible
#   config_secrets: string   # per-env config; secrets via secrets-manager, never in repo
#   cicd: string             # pipeline: build -> quality gates -> deploy on green

# ---- type: quality  (LOCKED #434) ------------------------------------------
# Gates only — the list of gates this capability's ICE must pass. Drawn from the
# box's NFR gates that apply + the ICE's constraints/failures made checkable.
# How to test, coverage, environments are NOT here — that's the builder's job
# off the ICE. /validate checks these gates independently.
# content:
#   gates: [string]   # e.g. "OWASP ASVS L2; no P1/P2", "WCAG 2.1 AA",
#                     #      "p99 < 150ms", "no user enumeration", "lockout after 5 fails"

# ---- type: agentic  (LOCKED #434) ------------------------------------------
# The KIND of weight the agent pulls (intent) — not how it's built. The 7
# principles (reason/plan/orchestrate/act/remember/govern/verify) are build
# mechanics, not the lens. Empty (all none) when the capability has no agent.
# content:
#   weights:
#     cognitive:  { level: string, note: string }   # analysis + decision-making
#     creative:   { level: string, note: string }   # visualization + media creation
#     logistical: { level: string, note: string }   # operational + workflow
#   bounds: string    # the hard limits — what the agent may NOT do alone, e.g.
#                     # "read-only on identity; acts only via lockout/MFA; never
#                     #  bypasses auth; no permanent ban without a human"
# Level scale: none | low | medium | high. Stated per capability — not
# box-governed in v1 (the bounds line carries the safety; governance can be
# added later, parallel to NFR).

# ---- Fill rules -------------------------------------------------------------
fill_rules:
  - play: "/realize"
    writes: "creates/updates the five lenses for the capability"
  - play: "/learn"
    writes: "may update a lens from real-world outcomes"

# ---- Enhance rules ----------------------------------------------------------
enhance_rules:
  governed_by: "PARKED — see product-os.yaml (future schema-evolution play)"
