# Slice Schema — v1
#
# A SLICE is a vertical PRODUCT INCREMENT: a bundle of functionalities — possibly
# across several capabilities of ONE domain — that together deliver something usable.
# It is what /shape hands you as a buildable unit ("pick a slice, open its ICE, build
# it"), and what /roadmap plans (order, dependencies, effort).
#
# NOT an epic. An `epic` (epic.yaml) is the engineering delivery grain — one
# functionality sliced end-to-end through its components, cut by /grill. A `slice` is
# higher: it groups whole functionalities into a usable increment. The chain is:
#   /shape -> slices (this schema)
#   /roadmap -> plans the slices (order + dependencies + effort, written here)
#   /grill -> per functionality inside a chosen slice, cuts epics (epic.yaml)
#
# A slice REFERENCES functionality ICE — it never copies it. The functionality ICE
# stays the single source of truth for each unit.
#
# Lifecycle: PERMANENT (lives in product-os with the structure). One domain's slices
# live under that domain; /roadmap reads slices across all domains to plan globally.

schema:
  name: slice
  version: 1
  persistence: permanent

# ---- The slice record ------------------------------------------------------
slice:
  id: string                # stable, derived from name/slug
  domain_ref: string        # the domain this slice belongs to (slices are domain-scoped)
  name: string              # e.g. "Team burn dashboard"
  outcome: string           # one line: the usable thing this increment delivers

  # the user-facing SURFACE(S) this slice exposes — REQUIRED, at least one.
  # A slice is a VERTICAL increment: a user must be able to OPEN a surface and CHECK the
  # outcome through it. A slice with no surface is not a slice — it is a backend layer,
  # which is exactly what /shape must NOT produce. /shape NAMES the surface; /realize's
  # UX lens DESIGNS it — so NO wireframe/component/layout/visual content lives here, only
  # the name, who opens it, and what they do/see. Journeys reference these by surface id.
  surface:
    - id: string            # stable surface id (journeys point at it via surface_refs)
      name: string          # e.g. "Team Burn dashboard", "Coverage check view"
      persona_ref: string   # the persona who opens this surface
      user_action: string   # what the persona does/sees on it to check the outcome

  # the functionalities this slice bundles — REFERENCES, never copies of ICE
  functionalities:
    - functionality_ref: string   # functionality node id
      ice_ref: string             # path/id of that functionality's ICE (the source of truth)
      delivery: string            # full | partial — is this functionality fully delivered
                                  # in this slice, or only partially used / deepened later

  dependency_notes: string  # human note on what this slice leans on (free text from /shape)
  acceptance_intent: string # what "this increment works" means (slice-level, not per-ICE)
  status: string            # proposed (from /shape) | planned (after /roadmap) |
                            # realized (after /run — all six lenses line up) | deferred

  # ---- filled by /roadmap (the plan) ----
  order: integer            # global build position across all slices; null until planned
  effort: string            # /roadmap's size estimate for this slice; null until planned
  depends_on: [string]      # other slice ids that must come first (resolved by /roadmap,
                            # within and across domains); null/[] until planned

  metadata:
    created_by: string      # /shape
    updated_by: string      # /roadmap when it plans
    version: integer

# ---- The deferred bucket (per domain) --------------------------------------
# Functionalities /shape selected but did not place in any slice yet. Every selected
# functionality MUST appear in at least one slice OR here — nothing falls through.
deferred:
  domain_ref: string
  functionalities: [string] # functionality node ids parked for a later slice
  reason: string            # one line on why deferred

# ---- Storage ----------------------------------------------------------------
# Per domain:
#   product-os/{domain}/slices/{slice-id}.yaml   # one file per slice (shape/roadmap own it)
#   product-os/{domain}/slices/_deferred.yaml    # the deferred bucket (if any)
# A functionality may appear in MORE THAN ONE slice (deepened over time).
#
# The slice is the UNIT OF REALIZATION (#434). The realize lenses hang OFF the
# slice, in a per-slice folder beside the record:
#   product-os/{domain}/slices/{slice-id}/lens/{type}.yaml   # the six realize lenses
#   product-os/{domain}/slices/{slice-id}/decisions/*.yaml   # decisions a lens records
# You pick a slice and run quality -> ux -> agentic -> arch -> run on it, then ship
# it — the slice (not the capability) is what you deliver. See lens/_index.md.

# ---- Fill rules -------------------------------------------------------------
fill_rules:
  - play: "/shape"
    writes: "creates the slices for its one domain — name, outcome, the user-facing
             surface(s) each slice exposes (id + name + persona + user_action; named,
             NOT designed), the bundled functionalities (referencing their ICE),
             dependency_notes, acceptance_intent, delivery full/partial; and the
             _deferred bucket. Every slice MUST name at least one surface. Does NOT set
             order, effort, or resolved depends_on; does NOT design the surface (that is
             /realize's UX lens)."
  - play: "/roadmap"
    writes: "the plan onto existing slices across all domains — order, effort, and
             resolved depends_on; flips status proposed -> planned (or deferred).
             Never creates a slice or edits its composition (that is /shape's)."
  - play: "/run"
    writes: "the done stamp ONLY — flips status -> realized when all six realize
             lenses exist for the slice and line up (every architecture component has a
             run target; every run target binds a real component). Surgical: changes
             status + metadata and nothing else of the record; never composition, order,
             effort, or depends_on. The single marker /grill checks before cutting
             delivery work."

# ---- Enhance rules ----------------------------------------------------------
enhance_rules:
  governed_by: "PARKED — see product-os.yaml (future schema-evolution play)"
