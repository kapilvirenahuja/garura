# Lens: run  (LOCKED #434; renamed from "delivery") — envelope in lens/_index.md
#
# How the SLICE is deployed and runs. The fifth and last realize lens. /run reads the
# slice's hub + the ARCHITECTURE lens (it deploys arch's parts) + the KB, and grounds every
# operational choice in a best-fit architecture/technology learning. As the last lens it also
# runs the lines-up check (all five lenses present + cross-refs resolve) and, on lines-up,
# stamps the slice record `status: realized`.

schema:
  name: lens
  type: run

content:
  environments: [string]   # the path, e.g. dev -> staging -> prod
  rollout:
    flags: [string]        # feature flags (e.g. SSO, MFA gated independently)
    strategy: string       # blue/green | canary | rolling
  migrations: string       # data-change strategy — gated, reversible
  config_secrets: string   # per-env config; secrets via secrets-manager, never in repo
  cicd: string             # pipeline: build -> quality gates -> deploy on green
  targets:                 # per ARCHITECTURE component: where + how it runs (the seam to arch)
    - component: string    # MUST match an architecture-lens component name (no dangling target)
      environment: string  # which env(s) it deploys to (e.g. prod, staging+prod)
      deploy: string       # how it runs — container | service | function | static | managed
      notes: string        # optional one-liner
  tco:                     # ownership-cost picture (#435) — REQUIRED; the stamp gates on it
    hyperscaler:
      selected: string     # the cloud/provider (e.g. Google Cloud Platform)
      default_region: string
      rationale: string
      alternatives:        # >=1 considered-and-rejected
        - name: string
          why_not: string
    services:              # concrete service map — one per ARCHITECTURE component
      - component: string  # MUST match an architecture-lens component name
        service: string    # the managed service that runs it (e.g. Cloud Run, Cloud SQL)
        cost_driver: string
    simulation:
      scenarios:           # >=3: at least seed, pilot, expanded
        - name: string     # seed | pilot | expanded (or richer)
          # load assumptions: users/team_members, sources, frequencies, retention_days, ...
    estimate:
      currency: string
      monthly_range: string  # per-scenario or overall range; MUST carry numbers, not prose
      confidence: string     # low | medium | high
      primary_drivers: [string]
      excludes: [string]     # what the estimate does NOT cover (HA, heavy logging, ...)
      sensitivity: [string]  # the variables that would change the estimate
    guardrails: [string]   # budget alert, retention limits, scale-up/HA triggers, review cadence
