# Intent Schema — Canonical Contract
# This is the schema that intent-crafter produces and /play-creator consumes.
# Any play can serve an intent. Intent says nothing about execution.
#
# Intent YAML has TWO zones: metadata and content. Both are required.

# ──────────────────────────────────────────────────────────────────────────
# METADATA ZONE — describes the intent itself
# ──────────────────────────────────────────────────────────────────────────

name: <string>                         # Short human-readable play name (kebab-case)
                                       # Example: "specify"
                                       # Must match the parent directory name in
                                       # core/components/plays/{name}/.

description: <string>                  # One-sentence discoverability text
                                       # Example: "Transform a product idea plus
                                       # project profile into enriched intent epics
                                       # via KB-driven capability configuration."

version: <string>                      # Semver (e.g. "0.1.0")
                                       # Starts at 0.1.0 for new intents.
                                       # Bump on any content-zone edit that changes
                                       # constraints / failure_conditions / scenarios
                                       # semantics. Metadata-only edits don't bump.

checksum: <string>                     # sha256 hash of the normalized content zone
                                       # (see Checksum rule below).
                                       # Maintained by the `/play-creator --build` step.
                                       # Drift detection: if the on-disk checksum does
                                       # NOT equal the computed checksum of the current
                                       # content zone, the play's compiled artifact is
                                       # stale and must be rebuilt.

# ──────────────────────────────────────────────────────────────────────────
# CONTENT ZONE — the three canonical fields (the ICE Intent layer)
# ──────────────────────────────────────────────────────────────────────────

intent: <string>                       # What the user wants — goal + expected outputs.
                                       # Implementation-agnostic. No play, agent, or
                                       # skill names.

constraints:                           # Boundaries on acceptable output/behavior
  - id: <string>                       # Unique ID (C1, C2, ...)
    rule: <string>                     # A falsifiable boundary statement

failure_conditions:                    # Observable states in the output that
                                       # constitute failure
  - id: <string>                       # Unique ID (F1, F2, ...)
    condition: <string>                # A state observable in artifacts — not an
                                       # event

# Scenarios, success, and recovery are NOT here. They live in the generated
# Expectation layer — see standards/schemas/expectation.yaml. Intent is the clean
# triple; Expectation is generated from it and human-vetted at the play-creator
# checkpoint.

# ──────────────────────────────────────────────────────────────────────────
# Crafting Principles (quality gate for authoring)
# ──────────────────────────────────────────────────────────────────────────
#
# Top-level fields:
#   - EXACTLY these 7 fields permitted: name, description, version, checksum,
#     intent, constraints, failure_conditions. No others. (scenarios moved to the
#     Expectation layer — see expectation.yaml.)
#   - Implementation details (triggers, inputs, outputs, agent names, brief format,
#     defect handlers) are forbidden anywhere in intent.yaml. Those belong in the
#     compiled play artifact, not in intent.
#
# Constraints:
#   - Defines a boundary, not a method
#   - Is falsifiable — you can observe violation
#   - Is independent of implementation — no agent, skill, or tool names
#   - References artifacts or states, not steps
#   - Fewer is better — each narrows the solution space
#
# Failure Conditions:
#   - Observable in the output — look at artifacts, determine pass/fail
#   - Describes a state, not an event
#   - Severity-agnostic — resolver decides halt vs warn
#   - Traceable to the intent
#
# Scenarios / Success / Recovery:
#   - NOT authored in intent. Generated into the Expectation layer
#     (standards/schemas/expectation.yaml) and human-vetted at the play-creator
#     checkpoint. Success scenarios carry a measure; recovery has one entry per
#     failure condition with an autonomous|human handoff.
#
# ──────────────────────────────────────────────────────────────────────────
# Checksum rule (for the `checksum` metadata field)
# ──────────────────────────────────────────────────────────────────────────
#
# Algorithm: sha256 over the normalized content zone.
#
# Normalization steps (the `/play-creator --build` step performs these):
#   1. Load the intent.yaml into an ordered mapping.
#   2. Extract ONLY the content-zone keys: intent, constraints, failure_conditions.
#      The metadata keys (name, description, version, checksum) are
#      EXCLUDED from the hash — otherwise the checksum would be recursive.
#   3. Re-serialize the content zone to YAML with deterministic rules:
#      - Keys sorted alphabetically at every nesting level
#      - List items preserved in document order (they're semantically ordered)
#      - LF line endings (no CRLF)
#      - UTF-8 encoding
#      - No trailing whitespace
#      - No comments
#      - Block style (not flow) for maps and lists
#   4. Compute sha256 over the UTF-8 byte stream of the serialized output.
#   5. Write the hex digest as the `checksum` field value.
#
# Drift detection:
#   - The compiled play artifact records the intent_hash in its Compilation Metadata.
#   - On play run, the orchestrator recomputes the checksum from the current
#     intent.yaml and compares. Mismatch means the compiled artifact is stale.
#   - On intent.yaml edit, `/play-creator --build` recomputes and overwrites.
#
