name: readiness-brief-generation
description: Full workflow — readiness, human brief, checkpoint, and generation. Use for recipes that require human approval before producing final deliverables.

stages:
  - stage: 0
    name: Workflow Pre-flight
    owner_type: recipe
    description: >
      Infrastructure checks before domain work. Recipe MUST resolve stm_base from
      core/config.yaml (stm.base-path) and hold it for all downstream contract paths.
      All agent contracts use {stm_base}/{issue}/ — never hardcoded paths.
    required_resolution:
      stm_base: "stm.base-path from core/config.yaml"

  - stage: 1
    name: Intent Resolution
    owner_type: intent-resolver
    description: >
      Load or resolve the task DAG. Check cache first; if stale, invoke intent-resolver
      with config_path so the DAG carries the resolved stm_base field.

  - stage: 2
    name: Readiness
    owner_type: domain-agent
    description: Analysis, scoping, feasibility. All structured artifacts produced and written to STM.

  - stage: 3
    name: Human-Readable Brief
    owner_type: domain-agent
    skippable: true
    description: Create a human-readable brief from STM artifacts. Skippable when no human review is needed.

  - stage: 4
    name: Human Checkpoint
    owner_type: recipe
    skippable: true
    description: Present brief to user. Tether/Vanish. Skippable when brief is skipped.

  - stage: 5
    name: Generation
    owner_type: domain-agent
    description: Produce final deliverables from approved STM artifacts. Reads STM data, not the brief.

  - stage: 6
    name: Scenario Validation
    owner_type: recipe
    description: E2E scenario evals from intent.yaml. Validate final artifacts against acceptance scenarios.

  - stage: 7
    name: Evidence & Close
    owner_type: recipe
    description: Write evidence artifacts and checkpoint to STM. All paths use the resolved stm_base.
