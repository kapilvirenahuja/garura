# plan-nested-taskdag.yaml — Test Fixture
# Plan with nested task_dag groups: group entries contain a 'tasks' sub-array
# and should be flattened into the top-level execution order.

slug: "taskflow"
status: "LOCKED"
created_at: "2026-02-01"
features_ref: "features.yaml"
tech_ref: "tech.yaml"

prerequisites:
  - id: P0-S1
    description: "Set up project directory structure"
    exit_gate: "All source directories exist"

task_dag:
  # Group node — should NOT appear in executionOrder; its children should
  - id: group-data-layer
    description: "Core data layer tasks"
    tasks:
      - id: T1.1
        feature_id: F1
        description: "Implement task data model and storage layer"
        depends_on: []
        exit_gate: "Task model defined with all required fields"
        scenario_gate:
          scenario_ids: []
          count: 0

      - id: T1.2
        feature_id: F1
        description: "Build inbox API endpoint"
        depends_on: []
        exit_gate: "API returns sorted, filterable task list"

  # Flat task — should appear as-is
  - id: T2.1
    feature_id: F2
    description: "Implement priority scoring algorithm"
    depends_on: ["T1.1"]
    exit_gate: "Priority scores computed correctly for all test scenarios"
    scenario_gate:
      ids: ["SC-AI-001"]
      count: 1

  # Another group node with scenario_gate.ids alias at nested level
  - id: group-automation
    description: "Automation layer tasks"
    tasks:
      - id: T3.1
        feature_id: F3
        description: "Build git event webhook handler"
        depends_on: ["T1.1"]
        exit_gate: "PR events trigger correct task state transitions"
        scenario_gate:
          ids: ["SC-AUTO-001"]
          count: 1

      - id: T3.2
        feature_id: F3
        description: "Implement CI pipeline integration"
        depends_on: ["T3.1"]
        exit_gate: "CI events update task status automatically"
        scenario_gate:
          scenarioIds: ["SC-AUTO-002"]
          count: 1

milestones:
  - id: M1
    name: "Core Data Layer"
    tasks: ["T1.1", "T1.2"]
  - id: M2
    name: "Intelligence Layer"
    tasks: ["T2.1"]
  - id: M3
    name: "Automation Layer"
    tasks: ["T3.1", "T3.2"]
