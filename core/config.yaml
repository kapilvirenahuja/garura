# Meridian Configuration

project:
  name: Meridian
  type: Agentic Framework

platform: github

github:
  repo: https://github.com/kapilvirenahuja/meridian.git

# Source of truth locations
components:
  skills: ./core/components/skills/
  recipes: ./core/components/recipes/
  agents: ./core/components/agents/
  memory: ./core/components/memory/

# Claude Code derived locations (populated by /sync-claude)
claude:
  skills: ./.claude/skills/
  agents: ./.claude/agents/

# Global Claude Code locations (for /sync-claude default global mode)
global-claude:
  skills: ~/.claude/skills/
  agents: ~/.claude/agents/

# Long-Term Memory (LTM)
ltm:
  source: ./core/components/memory/
  project-target: ./.meridian/core/memory/
  global-target: ~/.meridian/core/memory/

# Short-Term Memory (STM) — Issue-centric artifacts (ADR 008, ADR 010)
stm:
  base-path: .meridian/
  pending-path: .meridian/_pending/
  archive-path: .meridian/_archive/
  structure:
    spec: "{issue-number}/spec/"
    design: "{issue-number}/design/"
    evidence: "{issue-number}/evidence/{recipe-name}/{YYYYMMDD-HHMMSS}.md"
    delivery: "{issue-number}/delivery/"
    checkpoint: "{issue-number}/checkpoint/{recipe-name}/{YYYYMMDD-HHMMSS}.md"
